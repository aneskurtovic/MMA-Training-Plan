<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MMA Fight Camp — May 16, 2026</title>
<!-- Fonts loaded locally for offline support -->
__FONTS_CSS_PLACEHOLDER__
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#08080c;
  --bg-card:#0f0f14;
  --bg-card-hover:#141419;
  --bg-raised:#18181f;
  --bg-surface:#1c1c24;
  --border:#1a1a22;
  --border-bright:#28283a;
  --text:#c8c8d0;
  --text-bright:#ededf0;
  --text-dim:#62627a;
  --text-faint:#3e3e52;
  --accent:#f97316;
  --accent-soft:rgba(249,115,22,.08);
  --accent-med:rgba(249,115,22,.15);
  --accent-glow:rgba(249,115,22,.3);
  --accent-bright:#fba04b;
  --green:#22c55e;
  --blue:#3b82f6;
  --purple:#a855f7;
  --red:#ef4444;
  --sidebar-w:272px;
  --radius:10px;
  --radius-lg:14px;
  --font-display:'Anybody',system-ui,sans-serif;
  --font-body:'DM Sans',system-ui,-apple-system,sans-serif;
  --font-mono:'JetBrains Mono',monospace;
}
html{scroll-behavior:smooth;scrollbar-color:var(--border) var(--bg)}
body{
  font-family:var(--font-body);font-size:15px;line-height:1.75;
  color:var(--text);background:var(--bg);
  min-height:100vh;overflow-x:hidden;
  -webkit-font-smoothing:antialiased;
}

/* ═══════════════════════════════════
   NOISE TEXTURE OVERLAY
   ═══════════════════════════════════ */
body::after{
  content:'';position:fixed;inset:0;z-index:9999;pointer-events:none;
  opacity:.025;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
  background-repeat:repeat;background-size:256px 256px;
}

/* ═══════════════════════════════════
   SIDEBAR
   ═══════════════════════════════════ */
.sidebar{
  position:fixed;top:0;left:0;bottom:0;width:var(--sidebar-w);
  background:linear-gradient(180deg,#0c0c12 0%,var(--bg) 100%);
  border-right:1px solid var(--border);
  display:flex;flex-direction:column;z-index:100;
  transition:transform .35s cubic-bezier(.4,0,.2,1);
}
.sidebar-header{
  padding:24px 22px 18px;
  border-bottom:1px solid var(--border);
  position:relative;
}
.sidebar-header::after{
  content:'';position:absolute;bottom:-1px;left:22px;width:60px;
  height:2px;background:var(--accent);border-radius:1px;
}
.sidebar-brand{
  display:flex;align-items:center;gap:10px;margin-bottom:14px;
}
.brand-mark{
  width:36px;height:36px;border-radius:10px;
  background:linear-gradient(135deg,var(--accent),#e05a00);
  display:flex;align-items:center;justify-content:center;
  font-size:16px;flex-shrink:0;
  box-shadow:0 2px 12px var(--accent-glow);
}
.brand-text{
  font-family:var(--font-display);font-size:13px;font-weight:900;
  letter-spacing:.05em;text-transform:uppercase;color:var(--text-bright);
  line-height:1.2;
}
.brand-text span{
  color:var(--text-dim);display:block;font-size:9.5px;
  letter-spacing:.12em;margin-top:2px;font-weight:600;
  font-family:var(--font-body);
}

/* ── Download Button ── */
.dl-btn{
  display:flex;align-items:center;gap:8px;
  margin-top:12px;padding:9px 14px;
  background:linear-gradient(135deg,var(--bg-raised),var(--bg-surface));
  border:1px solid var(--border);border-radius:8px;
  color:var(--text-dim);font-family:var(--font-body);font-size:11.5px;font-weight:600;
  text-decoration:none;transition:all .2s;letter-spacing:.02em;
  cursor:pointer;width:100%;
}
.dl-btn:hover{color:var(--text-bright);border-color:var(--accent);background:var(--accent-soft)}
.dl-btn svg{width:16px;height:16px;flex-shrink:0;opacity:.6}
.dl-btn:hover svg{opacity:1}

/* ── Language Toggle ── */
.lang-toggle{
  display:flex;
  background:var(--bg);border-radius:8px;
  border:1px solid var(--border);overflow:hidden;
  position:relative;
}
.lang-toggle::before{
  content:'';position:absolute;top:2px;bottom:2px;width:calc(50% - 2px);
  background:var(--accent);border-radius:6px;
  transition:transform .25s cubic-bezier(.4,0,.2,1);
  left:2px;z-index:0;
}
.lang-toggle.bos::before{transform:translateX(100%)}
.lang-btn{
  flex:1;padding:6px 0;border:none;background:none;
  color:var(--text-dim);font-family:var(--font-body);
  font-size:11px;font-weight:700;letter-spacing:.08em;
  cursor:pointer;transition:color .25s;text-transform:uppercase;
  position:relative;z-index:1;
}
.lang-btn.active{color:#000}
.lang-btn:not(.active):hover{color:var(--text-bright)}

.sidebar-nav{flex:1;overflow-y:auto;padding:14px 10px;scrollbar-width:thin}
.sidebar-nav a{
  display:flex;align-items:center;gap:11px;
  padding:9px 14px;border-radius:9px;
  color:var(--text-dim);text-decoration:none;font-size:13px;font-weight:500;
  transition:all .15s ease;margin-bottom:1px;position:relative;
  letter-spacing:.01em;
}
.sidebar-nav a:hover{color:var(--text-bright);background:rgba(255,255,255,.03)}
.sidebar-nav a.active{
  color:var(--accent);background:var(--accent-soft);
  font-weight:600;
}
.sidebar-nav a.active::before{
  content:'';position:absolute;left:0;top:8px;bottom:8px;width:3px;
  background:var(--accent);border-radius:0 3px 3px 0;
  box-shadow:0 0 10px var(--accent-glow);
}
.nav-icon{
  width:26px;height:22px;display:flex;align-items:center;justify-content:center;
  font-size:12px;flex-shrink:0;opacity:.5;
  font-family:var(--font-mono);font-weight:500;
}
.sidebar-nav a.active .nav-icon{opacity:1}
.nav-divider{
  font-size:9px;text-transform:uppercase;letter-spacing:.16em;
  color:var(--text-faint);padding:18px 14px 6px;font-weight:700;
  user-select:none;
}
.nav-divider:first-child{padding-top:4px}

/* ── Expandable Nav Sub-Items ── */
.nav-parent{position:relative}
.nav-parent>.nav-expand{
  position:absolute;right:8px;top:50%;transform:translateY(-50%);
  width:22px;height:22px;border:none;background:none;
  color:var(--text-faint);cursor:pointer;font-size:10px;
  display:flex;align-items:center;justify-content:center;
  border-radius:4px;transition:all .15s;
}
.nav-parent>.nav-expand:hover{color:var(--text);background:rgba(255,255,255,.05)}
.nav-parent>.nav-expand.open{transform:translateY(-50%) rotate(90deg)}
.nav-sub{
  display:none;overflow:hidden;
  padding-left:14px;margin-bottom:2px;
}
.nav-sub.open{display:block}
.nav-sub a{
  font-size:11.5px !important;padding:5px 10px 5px 22px !important;
  color:var(--text-faint) !important;opacity:.85;
}
.nav-sub a:hover{color:var(--text) !important;opacity:1}
.nav-sub a.active{color:var(--accent) !important;opacity:1}
.nav-day-row{
  display:flex;gap:2px;padding:2px 10px 4px 22px;flex-wrap:wrap;
}
.nav-day-btn{
  padding:3px 7px;border-radius:4px;border:1px solid var(--border);
  background:none;color:var(--text-faint);font-size:9px;font-weight:600;
  cursor:pointer;transition:all .15s;font-family:var(--font-body);
  letter-spacing:.04em;text-transform:uppercase;
}
.nav-day-btn:hover{border-color:var(--accent);color:var(--accent)}
.nav-day-btn.active{background:var(--accent);color:#000;border-color:var(--accent)}

/* ── Clickable Exercise Links ── */
.exercise-link{
  color:var(--accent);cursor:pointer;
  text-decoration:underline;text-decoration-style:dotted;
  text-underline-offset:2px;transition:all .15s;
}
.exercise-link:hover{color:var(--accent-bright);text-decoration-style:solid}

/* ── Exercise Illustrations ── */
.exercise-svg-wrap{
  display:flex;justify-content:center;gap:16px;
  padding:16px 0 8px;margin-bottom:12px;
  border-bottom:1px solid var(--border);
}
.exercise-svg-wrap svg{
  width:120px;height:140px;flex-shrink:0;
}
.exercise-svg-label{
  font-size:10px;text-align:center;color:var(--text-dim);
  margin-top:2px;letter-spacing:.04em;text-transform:uppercase;
  font-family:var(--font-mono);
}
@media(max-width:600px){
  .exercise-svg-wrap svg{width:90px;height:110px}
}

/* ── Collapsible Sections ── */
.collapsible{
  border:1px solid var(--border);border-radius:var(--radius);
  margin:8px 0;overflow:hidden;
  background:var(--bg-card);
}
.collapsible+.collapsible{margin-top:4px}
.collapsible-header{
  display:flex;align-items:center;gap:10px;
  padding:12px 16px;cursor:pointer;
  background:linear-gradient(135deg,var(--bg-card) 0%,var(--bg-raised) 100%);
  border:none;width:100%;text-align:left;
  color:var(--text-bright);font-family:var(--font-body);
  transition:all .15s;user-select:none;
}
.collapsible-header:hover{background:var(--bg-raised)}
.collapsible-header.open{border-bottom:1px solid var(--border)}
.collapsible-arrow{
  font-size:10px;color:var(--accent);transition:transform .2s;
  flex-shrink:0;width:16px;text-align:center;
}
.collapsible-header.open .collapsible-arrow{transform:rotate(90deg)}
.collapsible-title{flex:1;font-weight:600;font-size:14px}
.collapsible-tag{
  font-size:9px;font-weight:700;padding:2px 8px;
  border-radius:4px;text-transform:uppercase;letter-spacing:.08em;
  flex-shrink:0;
}
.collapsible-tag.am{background:rgba(59,130,246,.15);color:var(--blue)}
.collapsible-tag.pm{background:rgba(168,85,247,.15);color:var(--purple)}
.collapsible-tag.rest{background:rgba(34,197,94,.15);color:var(--green)}
.collapsible-tag.week{background:var(--accent-soft);color:var(--accent)}
.collapsible-tag.day{background:rgba(255,255,255,.05);color:var(--text-dim)}
.collapsible-body{
  padding:16px;display:none;
}
.collapsible-body.open{display:block}
/* Nested collapsibles */
.collapsible .collapsible{
  margin:4px 0;border-color:var(--border);
  background:var(--bg);
}
.collapsible .collapsible .collapsible-header{
  padding:9px 14px;
}
.collapsible .collapsible .collapsible-title{font-size:13px}
/* Phase / week level styling */
.collapsible-level-week>.collapsible-header{
  border-left:3px solid var(--accent);
}
.collapsible-level-day>.collapsible-header{
  border-left:3px solid var(--blue);
  padding:8px 14px;
}
.collapsible-level-session>.collapsible-header{
  border-left:3px solid var(--purple);
  padding:7px 12px;
}
.collapsible-level-session .collapsible-title{font-size:12px}

/* ═══════════════════════════════════
   MAIN AREA
   ═══════════════════════════════════ */
.main{margin-left:var(--sidebar-w);min-height:100vh;position:relative}
.main::before{
  content:'';position:fixed;top:-200px;right:-200px;
  width:700px;height:700px;
  background:radial-gradient(circle,rgba(249,115,22,.04) 0%,transparent 60%);
  pointer-events:none;z-index:0;
}
.main::after{
  content:'';position:fixed;bottom:-300px;left:30%;
  width:600px;height:600px;
  background:radial-gradient(circle,rgba(59,130,246,.02) 0%,transparent 60%);
  pointer-events:none;z-index:0;
}
.content{
  max-width:820px;margin:0 auto;padding:48px 44px 100px;
  position:relative;z-index:1;
}

/* ═══════════════════════════════════
   HAMBURGER & OVERLAY (MOBILE)
   ═══════════════════════════════════ */
.hamburger{
  display:none;position:fixed;top:12px;left:12px;z-index:200;
  width:44px;height:44px;border-radius:var(--radius);
  background:rgba(15,15,20,.85);border:1px solid var(--border);
  cursor:pointer;flex-direction:column;align-items:center;justify-content:center;gap:5px;
  backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
  transition:all .2s;
}
.hamburger:hover{background:var(--bg-raised);border-color:var(--border-bright)}
.hamburger span{
  display:block;width:18px;height:1.5px;background:var(--text);
  border-radius:1px;transition:all .3s cubic-bezier(.4,0,.2,1);
}
.hamburger.active span:nth-child(1){transform:rotate(45deg) translate(4.5px,4.5px)}
.hamburger.active span:nth-child(2){opacity:0;transform:scaleX(0)}
.hamburger.active span:nth-child(3){transform:rotate(-45deg) translate(4.5px,-4.5px)}
.overlay{
  display:none;position:fixed;inset:0;
  background:rgba(0,0,0,.65);z-index:90;
  backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
}

/* ═══════════════════════════════════
   MARKDOWN RENDERED CONTENT
   ═══════════════════════════════════ */

/* ── H1 — Page title ── */
.md h1{
  font-family:var(--font-display);font-size:36px;font-weight:900;
  color:var(--text-bright);margin:0 0 6px;line-height:1.1;
  letter-spacing:-.02em;
}
.md h1::after{
  content:'';display:block;width:44px;height:3px;
  background:var(--accent);
  border-radius:2px;margin-top:18px;margin-bottom:12px;
}

/* ── H2 — Major sections ── */
.md h2{
  font-family:var(--font-display);font-size:21px;font-weight:700;
  color:var(--text-bright);margin:48px 0 16px;line-height:1.2;
  letter-spacing:0;
  padding:14px 18px;
  background:linear-gradient(135deg,var(--bg-card) 0%,var(--bg-raised) 100%);
  border:1px solid var(--border);
  border-left:3px solid var(--accent);
  border-radius:var(--radius);
}

/* ── H3 — Sub-sections ── */
.md h3{
  font-size:16.5px;font-weight:600;color:var(--text-bright);
  margin:36px 0 10px;letter-spacing:.01em;
  padding-bottom:8px;
  border-bottom:1px solid var(--border);
}

/* ── H4 — Labels ── */
.md h4{
  font-size:12px;font-weight:700;color:var(--accent);
  margin:28px 0 8px;text-transform:uppercase;letter-spacing:.08em;
  display:flex;align-items:center;gap:8px;
}
.md h4::before{
  content:'';width:8px;height:8px;border-radius:2px;
  background:var(--accent);opacity:.4;flex-shrink:0;
}

.md p{margin:0 0 16px}
.md a{color:var(--accent);text-decoration:none;transition:all .2s;
  background:linear-gradient(transparent 85%,var(--accent-soft) 85%);
}
.md a:hover{color:var(--accent-bright);background:linear-gradient(transparent 85%,var(--accent-med) 85%)}
.md strong{color:var(--text-bright);font-weight:600}
.md em{color:var(--text-dim)}
.md ul,.md ol{margin:0 0 18px;padding-left:22px}
.md li{margin-bottom:5px}
.md li::marker{color:var(--accent)}
.md hr{border:none;height:1px;background:var(--border);margin:36px 0}

/* ── Blockquotes — used for week metadata ── */
.md blockquote{
  margin:20px 0;padding:18px 22px;
  background:linear-gradient(135deg,var(--accent-soft),rgba(249,115,22,.03));
  border:1px solid rgba(249,115,22,.12);
  border-radius:var(--radius-lg);
  color:var(--text);font-style:normal;
  position:relative;overflow:hidden;
}
.md blockquote::before{
  content:'';position:absolute;top:0;left:0;bottom:0;width:3px;
  background:var(--accent);
}
.md blockquote p{margin-bottom:4px}
.md blockquote p:last-child{margin-bottom:0}

/* ── Tables ── */
.table-wrap{
  overflow-x:auto;margin:20px 0 28px;
  border-radius:var(--radius-lg);
  border:1px solid var(--border);
  background:var(--bg-card);
  box-shadow:0 4px 24px rgba(0,0,0,.25),0 1px 3px rgba(0,0,0,.15);
}
.md table{width:100%;border-collapse:collapse;font-size:13.5px}
.md thead{background:var(--bg-surface)}
.md th{
  text-align:left;padding:12px 16px;font-weight:600;color:var(--text-bright);
  border-bottom:2px solid var(--border-bright);font-size:10.5px;
  text-transform:uppercase;letter-spacing:.1em;
  white-space:nowrap;font-family:var(--font-body);
}
.md td{padding:11px 16px;border-bottom:1px solid var(--border)}
.md tr:last-child td{border-bottom:none}
.md tbody tr{transition:background .15s}
.md tbody tr:nth-child(even){background:rgba(255,255,255,.01)}
.md tbody tr:hover{background:rgba(249,115,22,.04)}

/* ── Code ── */
.md code{
  background:var(--bg-raised);border:1px solid var(--border);
  border-radius:5px;padding:2px 7px;font-size:12.5px;color:var(--accent);
  font-family:var(--font-mono);
}
.md pre{
  background:var(--bg-card);border:1px solid var(--border);
  border-radius:var(--radius);padding:18px 20px;margin:18px 0;
  overflow-x:auto;box-shadow:0 2px 8px rgba(0,0,0,.15);
}
.md pre code{background:none;border:none;padding:0;color:var(--text)}

/* ── Lists inside tables ── */
.md td ul,.md td ol{margin:4px 0;padding-left:16px}
.md td li{margin-bottom:2px;font-size:13px}

/* ═══════════════════════════════════
   SECTION TRANSITION
   ═══════════════════════════════════ */
.md{animation:sectionIn .5s cubic-bezier(.16,1,.3,1)}
@keyframes sectionIn{
  from{opacity:0;transform:translateY(20px)}
  to{opacity:1;transform:none}
}

/* ═══════════════════════════════════
   BACK TO TOP
   ═══════════════════════════════════ */
.back-top{
  position:fixed;bottom:28px;right:28px;width:44px;height:44px;
  border-radius:12px;background:var(--accent);color:#000;
  border:none;cursor:pointer;font-size:18px;font-weight:700;
  opacity:0;transform:translateY(10px);
  transition:all .35s cubic-bezier(.4,0,.2,1);
  z-index:50;display:flex;align-items:center;justify-content:center;
  box-shadow:0 4px 24px var(--accent-glow);
}
.back-top.visible{opacity:1;transform:none}
.back-top:hover{transform:scale(1.08) translateY(-2px);box-shadow:0 8px 32px var(--accent-glow)}

/* ═══════════════════════════════════
   RESPONSIVE — TABLET
   ═══════════════════════════════════ */
@media(max-width:1024px){
  :root{--sidebar-w:248px}
  .content{padding:40px 28px 80px}
}

/* ═══════════════════════════════════
   RESPONSIVE — MOBILE
   ═══════════════════════════════════ */
@media(max-width:768px){
  .sidebar{transform:translateX(-100%);width:280px}
  .sidebar.open{transform:translateX(0);box-shadow:12px 0 48px rgba(0,0,0,.6)}
  .hamburger{display:flex}
  .overlay.open{display:block}
  .main{margin-left:0}
  .content{padding:16px 14px 60px;padding-top:70px}
  .md h1{font-size:26px}
  .md h2{font-size:18px;margin-top:32px;padding:12px 14px}
  .md h3{font-size:15px;margin-top:24px}
  .table-wrap{margin-left:-6px;margin-right:-6px;border-radius:10px}
  .md th{padding:10px 12px;font-size:9.5px}
  .md td{padding:9px 12px;font-size:13px}
  .back-top{bottom:16px;right:16px;width:40px;height:40px;font-size:16px;border-radius:10px}
  .md blockquote{padding:14px 16px}
}

/* ═══════════════════════════════════
   RESPONSIVE — SMALL PHONES
   ═══════════════════════════════════ */
@media(max-width:400px){
  .content{padding:12px 10px 50px;padding-top:66px}
  .md h1{font-size:22px}
  .md h2{font-size:16px;padding:10px 12px}
  .md table{font-size:11.5px}
  .md th{padding:8px 8px;font-size:9px}
  .md td{padding:7px 8px;font-size:12px}
}

/* ═══════════════════════════════════
   RESPONSIVE — TABLE CARDS
   ═══════════════════════════════════ */
@media(max-width:600px){
  .table-wrap{border:none;background:none;box-shadow:none;border-radius:0;overflow:visible}
  .md table,.md thead,.md tbody,.md th,.md tr{display:block}
  .md thead{position:absolute;left:-9999px;top:-9999px}
  .md tr{
    margin-bottom:12px;padding:14px 16px;
    background:var(--bg-card);border:1px solid var(--border);
    border-radius:var(--radius);
    box-shadow:0 2px 8px rgba(0,0,0,.15);
  }
  .md td{
    display:flex;justify-content:space-between;align-items:flex-start;
    padding:6px 0;border-bottom:1px solid var(--border);
    font-size:13px;text-align:right;
  }
  .md td:last-child{border-bottom:none}
  .md td::before{
    content:attr(data-label);
    font-weight:600;color:var(--text-bright);text-align:left;
    margin-right:12px;flex-shrink:0;font-size:10.5px;
    text-transform:uppercase;letter-spacing:.08em;
    padding-top:2px;
  }
}

/* Scrollbar */
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--border-bright)}

/* ── Selection ── */
::selection{background:var(--accent-med);color:var(--text-bright)}

/* ── Progress Badge ── */
.progress-badge{
  margin-top:10px;padding:6px 12px;
  background:var(--accent-soft);border:1px solid rgba(249,115,22,.15);
  border-radius:6px;font-size:11px;font-weight:600;
  color:var(--accent);letter-spacing:.02em;
  display:none;text-align:center;
}
.progress-badge.visible{display:block}

/* ── Rest Timer ── */
/* ── Fight Camp Dashboard Widgets ── */
.fc-countdown{
  display:grid;grid-template-columns:repeat(4,1fr);
  gap:12px;margin:16px 0;
}
.fc-countdown-unit{
  text-align:center;padding:20px 12px;
  background:var(--bg-card);border:1px solid var(--border);
  border-radius:var(--radius-lg);
}
.fc-countdown-num{
  font-family:var(--font-mono);font-size:36px;font-weight:700;
  color:var(--accent);line-height:1;
}
.fc-countdown-label{
  font-size:10px;text-transform:uppercase;letter-spacing:.12em;
  color:var(--text-dim);margin-top:6px;
}
.fc-weight{margin:16px 0}
.fc-weight-bar-track{
  height:32px;background:var(--bg-card);border:1px solid var(--border);
  border-radius:16px;position:relative;overflow:hidden;
}
.fc-weight-bar-fill{
  height:100%;background:linear-gradient(90deg,var(--accent),var(--green));
  border-radius:16px;transition:width .5s ease;
}
.fc-weight-labels{
  display:flex;justify-content:space-between;margin-top:8px;
  font-family:var(--font-mono);font-size:13px;
}
.fc-weight-current{color:var(--accent);font-weight:700}
.fc-weight-input{
  display:flex;align-items:center;gap:10px;margin-top:12px;
}
.fc-weight-input input{
  width:100px;padding:8px 12px;background:var(--bg-card);
  border:1px solid var(--border);border-radius:8px;
  color:var(--text-bright);font-family:var(--font-mono);font-size:14px;
}
.fc-weight-input button{
  padding:8px 16px;background:var(--accent);color:#000;
  border:none;border-radius:8px;font-weight:600;cursor:pointer;
  font-family:var(--font-body);
}
.fc-phase-cards{
  display:grid;grid-template-columns:repeat(4,1fr);
  gap:10px;margin:16px 0;
}
.fc-phase-card{
  padding:14px 12px;background:var(--bg-card);
  border:1px solid var(--border);border-radius:var(--radius);
  text-align:center;opacity:.5;transition:all .3s;
}
.fc-phase-card.active{
  opacity:1;border-color:var(--accent);background:var(--accent-soft);
  box-shadow:0 0 20px var(--accent-glow);
}
.fc-phase-card.completed{opacity:.7;border-color:var(--green)}
.fc-phase-card-name{font-weight:600;font-size:12px;color:var(--text-bright)}
.fc-phase-card-dates{font-size:10px;color:var(--text-dim);margin-top:4px}
.fc-today{
  padding:18px 22px;background:var(--bg-card);
  border:1px solid var(--border);border-left:3px solid var(--accent);
  border-radius:var(--radius-lg);margin:16px 0;
}
.fc-today-day{
  font-family:var(--font-display);font-size:16px;
  font-weight:700;color:var(--text-bright);
}
.fc-today-sessions{margin-top:8px;font-size:13px}
.sidebar-nav a.nav-phase-current{border-right:2px solid var(--green)}
@media(max-width:600px){
  .fc-countdown{grid-template-columns:repeat(2,1fr)}
  .fc-phase-cards{grid-template-columns:repeat(2,1fr)}
  .fc-countdown-num{font-size:28px}
}

/* ── Breadcrumb ── */
.breadcrumb{
  display:flex;align-items:center;gap:6px;
  margin-bottom:20px;font-size:12px;
  color:var(--text-faint);font-weight:500;
  letter-spacing:.02em;flex-wrap:wrap;
}
.breadcrumb-sep{color:var(--text-faint);opacity:.5;font-size:10px}
.breadcrumb a{
  color:var(--text-dim);text-decoration:none;transition:color .15s;
  background:none;
}
.breadcrumb a:hover{color:var(--accent)}
.breadcrumb-current{color:var(--text-bright)}

/* ── Search ── */
.search-wrap{position:relative;margin-top:10px}
.search-input{
  width:100%;padding:9px 12px 9px 34px;
  background:var(--bg);border:1px solid var(--border);border-radius:8px;
  color:var(--text-bright);font-family:var(--font-body);font-size:12.5px;
  outline:none;transition:border-color .2s;
}
.search-input::placeholder{color:var(--text-faint)}
.search-input:focus{border-color:var(--accent)}
.search-icon{
  position:absolute;left:10px;top:50%;transform:translateY(-50%);
  color:var(--text-faint);font-size:14px;pointer-events:none;
}
.search-results{
  position:absolute;top:calc(100% + 4px);left:0;right:0;
  background:var(--bg-raised);border:1px solid var(--border-bright);
  border-radius:var(--radius);max-height:320px;overflow-y:auto;
  z-index:300;display:none;
  box-shadow:0 8px 32px rgba(0,0,0,.5);
}
.search-results.open{display:block}
.search-result{
  display:block;padding:10px 14px;border-bottom:1px solid var(--border);
  cursor:pointer;transition:background .15s;text-decoration:none;color:inherit;
}
.search-result:last-child{border-bottom:none}
.search-result:hover{background:var(--accent-soft)}
.search-result-section{
  font-size:10px;text-transform:uppercase;letter-spacing:.08em;
  color:var(--accent);font-weight:600;margin-bottom:2px;
}
.search-result-text{font-size:12px;color:var(--text);line-height:1.5}
.search-result-text mark{background:var(--accent-med);color:var(--text-bright);border-radius:2px;padding:0 2px}
.search-clear{
  position:absolute;right:8px;top:50%;transform:translateY(-50%);
  background:none;border:none;color:var(--text-faint);cursor:pointer;
  font-size:14px;padding:4px;display:none;
}
.search-clear.visible{display:block}
.search-clear:hover{color:var(--text)}

/* ── Session Completion Checkbox ── */
.session-check{
  -webkit-appearance:none;appearance:none;
  width:18px;height:18px;border:2px solid var(--border-bright);
  border-radius:4px;background:var(--bg);cursor:pointer;
  flex-shrink:0;position:relative;transition:all .2s;
}
.session-check:checked{background:var(--accent);border-color:var(--accent)}
.session-check:checked::after{
  content:'\2713';position:absolute;top:-1px;left:2px;
  color:#000;font-size:12px;font-weight:900;
}
.collapsible.session-done>.collapsible-header{
  border-left-color:var(--green) !important;opacity:.65;
}
.collapsible.session-done .collapsible-title{
  text-decoration:line-through;text-decoration-color:var(--text-faint);
}
.completion-stat{
  font-size:10px;color:var(--green);font-weight:600;
  margin-left:auto;padding-left:8px;white-space:nowrap;
}

/* ── Page TOC ── */
.page-toc{
  margin:16px 0 28px;padding:16px 20px;
  background:var(--bg-card);border:1px solid var(--border);
  border-radius:var(--radius-lg);
}
.page-toc-title{
  font-size:10px;text-transform:uppercase;letter-spacing:.1em;
  color:var(--text-faint);font-weight:700;margin-bottom:10px;
}
.page-toc-list{
  display:flex;flex-wrap:wrap;gap:6px;list-style:none;
  padding:0;margin:0;
}
.page-toc-list a{
  display:inline-block;padding:5px 12px;border-radius:6px;
  background:var(--bg-raised);border:1px solid var(--border);
  color:var(--text-dim);font-size:12px;font-weight:500;
  text-decoration:none;transition:all .15s;
}
.page-toc-list a:hover{color:var(--accent);border-color:var(--accent);background:var(--accent-soft)}

/* ── Weight Chart ── */
.fc-weight-chart{margin:16px 0 4px}
.fc-weight-chart svg{width:100%;height:80px;display:block}
.fc-weight-chart .chart-line{fill:none;stroke:var(--accent);stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.fc-weight-chart .chart-target{fill:none;stroke:var(--green);stroke-width:1;stroke-dasharray:4,4;opacity:.5}
.fc-weight-chart .chart-dot{fill:var(--accent);r:3}
.fc-weight-chart .chart-label{fill:var(--text-faint);font-size:9px;font-family:var(--font-mono)}
.fc-weight-chart .chart-area{fill:url(#chartGrad);opacity:.15}

/* ── Quick-Access Cards ── */
.fc-quicklinks{
  display:grid;grid-template-columns:repeat(2,1fr);
  gap:10px;margin:16px 0;
}
.fc-quicklink{
  display:flex;align-items:flex-start;gap:12px;
  padding:16px;background:var(--bg-card);
  border:1px solid var(--border);border-radius:var(--radius-lg);
  text-decoration:none;color:inherit;transition:all .25s;
}
.fc-quicklink:hover{
  border-color:var(--accent);background:var(--accent-soft);
  transform:translateY(-2px);box-shadow:0 4px 20px rgba(249,115,22,.1);
}
.fc-quicklink-icon{
  width:36px;height:36px;border-radius:8px;
  background:var(--accent-soft);
  display:flex;align-items:center;justify-content:center;
  font-size:16px;flex-shrink:0;
}
.fc-quicklink-text{flex:1;min-width:0}
.fc-quicklink-title{
  font-weight:600;font-size:13px;color:var(--text-bright);
  margin-bottom:2px;
}
.fc-quicklink-desc{font-size:11px;color:var(--text-dim);line-height:1.4}
@media(max-width:600px){
  .fc-quicklinks{grid-template-columns:1fr}
}

/* ── Accessibility Focus ── */
.collapsible-header:focus-visible,
.session-check:focus-visible,
.search-input:focus-visible,
.page-toc-list a:focus-visible,
.fc-quicklink:focus-visible{
  outline:2px solid var(--accent);outline-offset:2px;
}

.rest-timer{
  position:fixed;bottom:28px;left:28px;z-index:50;
}
.timer-toggle{
  width:44px;height:44px;border-radius:12px;
  background:var(--bg-raised);border:1px solid var(--border);
  color:var(--text);font-size:18px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:all .2s;
}
.timer-toggle:hover{border-color:var(--accent);color:var(--accent)}
.timer-toggle.active{background:var(--accent);color:#000;border-color:var(--accent)}
.timer-panel{
  display:none;position:absolute;bottom:54px;left:0;
  background:var(--bg-raised);border:1px solid var(--border-bright);
  border-radius:var(--radius-lg);padding:16px;min-width:200px;
  box-shadow:0 8px 32px rgba(0,0,0,.4);
}
.timer-panel.open{display:block}
.timer-display{
  font-family:var(--font-mono);font-size:36px;font-weight:700;
  color:var(--text-bright);text-align:center;margin-bottom:12px;
  letter-spacing:.05em;
}
.timer-display.warning{color:var(--accent)}
.timer-display.done{color:var(--green);animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
.timer-presets{display:flex;gap:6px;flex-wrap:wrap;justify-content:center;margin-bottom:10px}
.timer-presets button{
  padding:6px 12px;border-radius:6px;border:1px solid var(--border);
  background:var(--bg-card);color:var(--text);font-family:var(--font-mono);
  font-size:12px;cursor:pointer;transition:all .15s;
}
.timer-presets button:hover{border-color:var(--accent);color:var(--accent)}
.timer-stop{
  display:block;width:100%;padding:8px;margin-top:4px;
  border-radius:6px;border:1px solid var(--red);
  background:rgba(239,68,68,.1);color:var(--red);
  font-family:var(--font-body);font-size:12px;font-weight:600;
  cursor:pointer;transition:all .15s;
}
.timer-stop:hover{background:rgba(239,68,68,.2)}
@media(max-width:768px){
  .rest-timer{bottom:16px;left:16px}
}

  nav.querySelectorAll('a:not(.nav-week-link)').forEach(function(a) {

      pendingScroll = null;
      setTimeout(renderCurrent, 20);

// ── Phase Detection ──
function getCurrentPhase() {
  var now = new Date();
  for (var i = 0; i < PHASES.length; i++) {
    var start = new Date(PHASES[i].start);
    var end = new Date(PHASES[i].end + 'T23:59:59');
    if (now >= start && now <= end) return i;
  }
  if (now < new Date(PHASES[0].start)) return 0;
  return PHASES.length - 1;
}

  var hours = Math.floor((diff % 86400000) / 3600000);

// ── Search ──
var searchTimeout = null;
function initSearch() {
  var input = document.getElementById('search-input');
  var results = document.getElementById('search-results');
  var clearBtn = document.getElementById('search-clear');
  if (!input) return;
  input.addEventListener('input', function() {
    clearBtn.classList.toggle('visible', input.value.length > 0);
    clearTimeout(searchTimeout);
    if (input.value.trim().length < 2) { results.classList.remove('open'); return; }
    searchTimeout = setTimeout(function() { doSearch(input.value.trim()); }, 300);
  });
  input.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') { input.value = ''; results.classList.remove('open'); clearBtn.classList.remove('visible'); }
  });
  clearBtn.addEventListener('click', function() {
    input.value = ''; results.classList.remove('open'); clearBtn.classList.remove('visible');
    input.focus();
  });
  document.addEventListener('click', function(e) {
    if (!e.target.closest('.search-wrap')) results.classList.remove('open');
  });
}

function doSearch(query) {
  var content = currentLang === 'bos' ? CONTENT_BOS : CONTENT_EN;
  var results = document.getElementById('search-results');
  var lang = currentLang === 'bos' ? 'bos' : 'en';
  var q = query.toLowerCase();
  var hits = [];
  SECTIONS.forEach(function(id) {
    var raw = content[id];
    if (!raw) return;
    var text = raw.replace(/[#*|>\-`\[\]()]/g, ' ').replace(/\s+/g, ' ');
    var idx = text.toLowerCase().indexOf(q);
    if (idx === -1) return;
    var start = Math.max(0, idx - 40);
    var end = Math.min(text.length, idx + query.length + 60);
    var snippet = (start > 0 ? '...' : '') + text.slice(start, end) + (end < text.length ? '...' : '');
    var meta = SECTION_META[id];
    hits.push({ id: id, section: meta ? meta[lang] : id, snippet: snippet, query: query });
  });
  if (hits.length === 0) {
    results.innerHTML = '<div class="search-result"><div class="search-result-text" style="color:var(--text-dim)">' +
      (lang === 'bos' ? 'Nema rezultata' : 'No results found') + '</div></div>';
    results.classList.add('open');
    return;
  }
  results.innerHTML = hits.slice(0, 8).map(function(h) {
    var highlighted = h.snippet.replace(new RegExp('(' + h.query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + ')', 'gi'), '<mark>$1</mark>');
    return '<div class="search-result" data-id="' + h.id + '">' +
      '<div class="search-result-section">' + h.section + '</div>' +
      '<div class="search-result-text">' + highlighted + '</div></div>';
  }).join('');
  results.classList.add('open');
  results.querySelectorAll('.search-result').forEach(function(el) {
    el.addEventListener('click', function() {
      location.hash = el.getAttribute('data-id');
      results.classList.remove('open');
      document.getElementById('search-input').value = '';
      document.getElementById('search-clear').classList.remove('visible');
      closeMenu();
      renderCurrent();
    });
  });
}

// ── Session Completion Tracking ──
function getCompletionData() {
  try { return JSON.parse(localStorage.getItem('fc-completed') || '{}'); } catch(e) { return {}; }
}
function saveCompletionData(data) {
  try { localStorage.setItem('fc-completed', JSON.stringify(data)); } catch(e) {}
}

function addSessionCheckboxes(container, sectionId) {
  if (sectionId.indexOf('phase-') !== 0) return;
  var data = getCompletionData();
  container.querySelectorAll('.collapsible-level-session').forEach(function(el) {
    var header = el.querySelector('.collapsible-header');
    if (!header || header.querySelector('.session-check')) return;
    // Build a key from parent collapsibles
    var weekEl = el.closest('.collapsible-level-week');
    var dayEl = el.closest('.collapsible-level-day');
    var weekId = weekEl ? (weekEl.id || 'w') : 'w';
    var dayId = dayEl ? (dayEl.id || 'd') : 'd';
    var tag = el.querySelector('.collapsible-tag');
    var sessionType = tag ? tag.textContent.trim().toLowerCase() : 'session';
    var key = sectionId + ':' + weekId + ':' + dayId + ':' + sessionType;
    var cb = document.createElement('input');
    cb.type = 'checkbox';
    cb.className = 'session-check';
    cb.setAttribute('data-key', key);
    cb.title = currentLang === 'bos' ? 'Označi kao završeno' : 'Mark as completed';
    if (data[key]) { cb.checked = true; el.classList.add('session-done'); }
    cb.addEventListener('click', function(e) { e.stopPropagation(); });
    cb.addEventListener('change', function() {
      var d = getCompletionData();
      if (cb.checked) { d[key] = true; el.classList.add('session-done'); }
      else { delete d[key]; el.classList.remove('session-done'); }
      saveCompletionData(d);
      updateCompletionBadge(sectionId);
    });
    header.insertBefore(cb, header.firstChild);
  });
  updateCompletionBadge(sectionId);
}

function updateCompletionBadge(sectionId) {
  var badge = document.getElementById('progress-badge');
  if (!badge) return;
  var phase = PHASE_THEMES[sectionId];
  if (!phase) return;
  var data = getCompletionData();
  var total = 0, done = 0;
  var prefix = sectionId + ':';
  document.querySelectorAll('.session-check').forEach(function() { total++; });
  Object.keys(data).forEach(function(k) { if (k.indexOf(prefix) === 0 && data[k]) done++; });
  if (total > 0) {
    var theme = currentLang === 'bos' ? phase.bos : phase.en;
    var label = currentLang === 'bos' ? 'Faza' : 'Phase';
    badge.textContent = label + ' ' + phase.num + '/4 — ' + theme;
    if (done > 0) badge.textContent += ' (' + done + '/' + total + ')';
    badge.classList.add('visible');
  }
}

// ── Weight Chart ──
function renderWeightChart(container) {
  var stored = [];
  try { stored = JSON.parse(localStorage.getItem('fc-weight-log') || '[]'); } catch(e) {}
  if (stored.length < 2) return;
  var w = 400, h = 60, pad = 20;
  var weights = stored.map(function(e) { return e.kg; });
  var dates = stored.map(function(e) { return e.date; });
  var minW = Math.min.apply(null, weights.concat([TARGET_WEIGHT])) - 1;
  var maxW = Math.max.apply(null, weights) + 1;
  var range = maxW - minW || 1;
  var points = weights.map(function(v, i) {
    var x = pad + (i / (weights.length - 1)) * (w - 2 * pad);
    var y = h - pad - ((v - minW) / range) * (h - 2 * pad);
    return x + ',' + y;
  });
  var targetY = h - pad - ((TARGET_WEIGHT - minW) / range) * (h - 2 * pad);
  var areaPoints = points.join(' ') + ' ' + (pad + (weights.length-1)/(weights.length-1)*(w-2*pad)) + ',' + (h-pad) + ' ' + pad + ',' + (h-pad);
  var svg = '<div class="fc-weight-chart"><svg viewBox="0 0 ' + w + ' ' + h + '" preserveAspectRatio="none">' +
    '<defs><linearGradient id="chartGrad" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="' + '#f97316' + '"/><stop offset="100%" stop-color="transparent"/></linearGradient></defs>' +
    '<line class="chart-target" x1="' + pad + '" y1="' + targetY + '" x2="' + (w-pad) + '" y2="' + targetY + '"/>' +
    '<polygon class="chart-area" points="' + areaPoints + '"/>' +
    '<polyline class="chart-line" points="' + points.join(' ') + '"/>';
  weights.forEach(function(v, i) {
    var x = pad + (i / (weights.length - 1)) * (w - 2 * pad);
    var y = h - pad - ((v - minW) / range) * (h - 2 * pad);
    svg += '<circle class="chart-dot" cx="' + x + '" cy="' + y + '" r="3"/>';
  });
  // Date labels (first and last)
  svg += '<text class="chart-label" x="' + pad + '" y="' + (h - 2) + '">' + dates[0].slice(5) + '</text>';
  svg += '<text class="chart-label" x="' + (w-pad) + '" y="' + (h - 2) + '" text-anchor="end">' + dates[dates.length-1].slice(5) + '</text>';
  svg += '<text class="chart-label" x="' + (w-pad) + '" y="' + (targetY - 3) + '" text-anchor="end" fill="' + '#22c55e' + '">' + TARGET_WEIGHT + 'kg</text>';
  svg += '</svg></div>';
  container.insertAdjacentHTML('beforeend', svg);
}

function renderPhaseWidget(container) {
  var current = getCurrentPhase();
  var now = new Date();
  var html = '<div class="fc-phase-cards">';
  PHASES.forEach(function(p, i) {
    var cls = 'fc-phase-card';
    var end = new Date(p.end + 'T23:59:59');

    else if (now > end) cls += ' completed';
    var name = currentLang === 'bos' ? p.bos.name : p.en.name;
    var startD = new Date(p.start);

// ── Today's Training Widget ──
function renderTodayWidget(container) {
  var now = new Date();
  var dayOfWeek = now.getDay();
  var dayNames = currentLang === 'bos'
    ? ['Nedjelja','Ponedjeljak','Utorak','Srijeda','\u010Cetvrtak','Petak','Subota']
    : ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  var rest = currentLang === 'bos' ? 'Dan odmora. Potpuni oporavak. Iskoristi dan za regeneraciju.' : 'Rest day. Full recovery. Use the day for regeneration.';
  if (dayOfWeek === 0) {
    container.innerHTML = '<div class="fc-today"><div class="fc-today-day">' + dayNames[0] +
      '</div><div class="fc-today-sessions" style="color:var(--green)">' + rest + '</div></div>';
    return;
  }
  var phase = getCurrentPhase();
  var phaseId = PHASES[phase].id;
  var linkText = currentLang === 'bos' ? 'Pogledaj detaljan plan' : 'View detailed plan';
  // Try to extract today's AM/PM session info from phase markdown
  var dayName = dayNames[dayOfWeek];
  var content = getContent()[phaseId] || '';
  var campWeek = Math.max(1, Math.ceil((now - CAMP_START) / (7 * 86400000)));
  var sessions = extractTodaySessions(content, dayName, campWeek);
  var sessionsHtml = '';
  if (sessions.am || sessions.pm) {
    if (sessions.am) sessionsHtml += '<div style="margin:4px 0"><span style="color:var(--blue);font-size:10px;font-weight:700;letter-spacing:.06em">AM</span> <span style="font-size:13px">' + sessions.am + '</span></div>';
    if (sessions.pm) sessionsHtml += '<div style="margin:4px 0"><span style="color:var(--purple);font-size:10px;font-weight:700;letter-spacing:.06em">PM</span> <span style="font-size:13px">' + sessions.pm + '</span></div>';
  }
  container.innerHTML = '<div class="fc-today"><div class="fc-today-day">' + dayName +
    ' <span style="font-size:12px;color:var(--text-dim);font-weight:400">' +
    (currentLang === 'bos' ? 'Sedmica ' : 'Week ') + campWeek + '</span></div>' +
    (sessionsHtml ? '<div class="fc-today-sessions">' + sessionsHtml + '</div>' : '') +
    '<div style="margin-top:8px"><a href="#' + phaseId + '" style="font-size:12px">' + linkText + ' &rarr;</a></div></div>';
}

function extractTodaySessions(markdown, dayName, weekNum) {
  var result = { am: null, pm: null };
  // Look for day heading pattern: "## DayName — Week N"
  var dayPattern = new RegExp('## ' + dayName + '\\s*[—\\-]\\s*(?:Week|Sedmica)\\s*' + weekNum, 'i');
  var dayIdx = markdown.search(dayPattern);
  if (dayIdx === -1) return result;
  // Extract content from this day heading to the next day heading
  var afterDay = markdown.slice(dayIdx);
  var nextDay = afterDay.search(/\n## (?:Monday|Tuesday|Wednesday|Thursday|Friday|Saturday|Sunday|Ponedjeljak|Utorak|Srijeda|Četvrtak|Petak|Subota|Nedjelja)/i);
  var dayContent = nextDay > 0 ? afterDay.slice(0, nextDay) : afterDay.slice(0, 2000);
  // Find AM/PM session headings
  var amMatch = dayContent.match(/### (?:AM|Jutro)\s*[—\-]\s*(.+)/i);
  var pmMatch = dayContent.match(/### (?:PM|Popodne|Večer)\s*[—\-]\s*(.+)/i);
  if (amMatch) result.am = amMatch[1].trim();
  if (pmMatch) result.pm = pmMatch[1].trim();
  return result;
}

// ── Exercise name mapping for clickable links ──
var exerciseNames = null;

function buildExerciseMap() {
  if (exerciseNames) return;
  var raw = getContent()['exercise-detail'];
  if (!raw) return;
  exerciseNames = {};
  // Find all ## headings in exercise-detail markdown
  var lines = raw.split('\n');
  for (var i = 0; i < lines.length; i++) {
    var m = lines[i].match(/^## (.+)/);
    if (m) {
      var name = m[1].trim();
      // Generate slug matching marked.js behavior
      var slug = name.toLowerCase().replace(/[^\w\s-]/g, '').replace(/\s+/g, '-').replace(/-+/g, '-');
      exerciseNames[name.toLowerCase()] = slug;
      // Also store without parenthetical (for Bosnian "Čučanj (Back Squat)" → also index "back squat")
      var paren = name.match(/\(([^)]+)\)/);
      if (paren) {
        exerciseNames[paren[1].toLowerCase()] = slug;
      }
    }
  }
}

function linkExercises(container) {
  buildExerciseMap();
  if (!exerciseNames) return;
  // Find exercise names in table first-column cells
  container.querySelectorAll('td:first-child').forEach(function(td) {
    var text = td.textContent.trim();
    // Strip markdown formatting artifacts
    var cleanText = text.replace(/\*\*/g, '').trim();
    // Check common patterns: "Exercise Name" or "Exercise Name (variant)"
    var baseName = cleanText.split('(')[0].trim().split(' — ')[0].trim();
    var key = baseName.toLowerCase();
    if (exerciseNames[key] || exerciseNames[cleanText.toLowerCase()]) {
      var slug = exerciseNames[key] || exerciseNames[cleanText.toLowerCase()];
      td.querySelectorAll('strong, span').forEach(function(el) {
        if (el.querySelector('.exercise-link')) return;
      });
      if (td.querySelector('.exercise-link')) return;
      var inner = td.innerHTML;
      td.innerHTML = '<span class="exercise-link" data-exercise="' + slug + '">' + inner + '</span>';
    }
  });
  // Click handler for exercise links
  container.querySelectorAll('.exercise-link').forEach(function(el) {
    el.addEventListener('click', function(e) {
      e.preventDefault();
      var slug = el.getAttribute('data-exercise');
      location.hash = 'exercise-detail';
      pendingScroll = slug;
      renderCurrent();
    });
  });
}

// ── Add IDs to week/day headings for scrolling ──
function addScrollAnchors(container) {
  container.querySelectorAll('h1, h2').forEach(function(h) {
    var text = h.textContent.trim();
    // Match "Week X" headings (H1)
    var weekMatch = text.match(/(?:Week|Sedmica)\s+(\d+)/i);
    if (weekMatch && h.tagName === 'H1') {
      h.id = 'week-' + weekMatch[1];
    }
    // Match day headings like "Monday — Week 1" or "Ponedjeljak — Sedmica 1"
    var dayMatch = text.match(/^(Monday|Tuesday|Wednesday|Thursday|Friday|Saturday|Ponedjeljak|Utorak|Srijeda|Četvrtak|Petak|Subota)\s*[—\-]\s*(?:Week|Sedmica)\s*(\d+)/i);
    if (dayMatch) {
      h.id = 'day-' + dayMatch[1].toLowerCase() + '-week-' + dayMatch[2];
    }
  });
}

// ── Collapsible sections ──
function makeCollapsible(container) {
  // Only apply to phase pages, nutrition-plan, and exercise-detail
  var hash = location.hash.slice(1).split(':')[0] || 'dashboard';
  if (hash.indexOf('phase-') !== 0 && hash !== 'nutrition-plan' && hash !== 'exercise-detail') return;

  // Strategy: find heading hierarchy and wrap content between headings
  var nodes = Array.from(container.childNodes);
  var result = document.createDocumentFragment();
  var weekCollapsible = null;
  var dayCollapsible = null;
  var sessionCollapsible = null;
  var currentBody = null;

  function closeSession() {
    if (sessionCollapsible && currentBody) {
      currentBody = dayCollapsible ? dayCollapsible.querySelector('.collapsible-body') : (weekCollapsible ? weekCollapsible.querySelector('.collapsible-body') : null);
    }
    sessionCollapsible = null;
  }
  function closeDay() {
    closeSession();
    if (dayCollapsible && currentBody) {
      currentBody = weekCollapsible ? weekCollapsible.querySelector('.collapsible-body') : null;
    }
    dayCollapsible = null;
  }
  function closeWeek() {
    closeDay();
    weekCollapsible = null;
    currentBody = null;
  }

  function createCollapsible(title, level, tag) {
    var wrapper = document.createElement('div');
    wrapper.className = 'collapsible collapsible-level-' + level;
    var header = document.createElement('div');
    header.className = 'collapsible-header';
    header.setAttribute('role', 'button');
    header.setAttribute('aria-expanded', 'false');
    header.setAttribute('tabindex', '0');
    header.innerHTML = '<span class="collapsible-arrow">&#9654;</span>' +
      '<span class="collapsible-title">' + title + '</span>' +
      (tag ? '<span class="collapsible-tag ' + tag + '">' + tag.toUpperCase() + '</span>' : '');
    function toggleCollapsible() {
      var isOpen = header.classList.toggle('open');
      header.setAttribute('aria-expanded', isOpen ? 'true' : 'false');
      var body = wrapper.querySelector('.collapsible-body');
      if (body) { body.classList.toggle('open'); body.setAttribute('aria-hidden', isOpen ? 'false' : 'true'); }
    }
    header.addEventListener('click', toggleCollapsible);
    header.addEventListener('keydown', function(e) {
      if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); toggleCollapsible(); }
    });
    var body = document.createElement('div');
    body.className = 'collapsible-body';
    body.setAttribute('role', 'region');
    body.setAttribute('aria-hidden', 'true');
    wrapper.appendChild(header);
    wrapper.appendChild(body);
    return wrapper;
  }

  for (var i = 0; i < nodes.length; i++) {
    var node = nodes[i];
    if (node.nodeType !== 1) {
      if (currentBody) currentBody.appendChild(node);
      else result.appendChild(node);
      continue;
    }

    var tag = node.tagName;
    var text = node.textContent.trim();

    // H1 = Week level heading
    if (tag === 'H1' && /(?:Week|Sedmica)\s+\d/i.test(text)) {
      closeWeek();
      weekCollapsible = createCollapsible(text, 'week', 'week');
      // Auto-open current week
      var weekNum = text.match(/(\d+)/);
      if (weekNum) {
        weekCollapsible.id = 'week-' + weekNum[1];
        // Auto-open week 1 on first visit (or current week based on date)
        var campWeek = Math.ceil((new Date() - CAMP_START) / (7 * 86400000));
        if (parseInt(weekNum[1]) === campWeek || parseInt(weekNum[1]) === 1 && campWeek < 1) {
          weekCollapsible.querySelector('.collapsible-header').classList.add('open');
          weekCollapsible.querySelector('.collapsible-body').classList.add('open');
        }
      }
      currentBody = weekCollapsible.querySelector('.collapsible-body');
      result.appendChild(weekCollapsible);
      continue;
    }

    // H2 = Day level heading (e.g., "Monday — Week 1" or "Tuesday — Week 2")
    if (tag === 'H2' && /(?:Monday|Tuesday|Wednesday|Thursday|Friday|Saturday|Sunday|Ponedjeljak|Utorak|Srijeda|Četvrtak|Petak|Subota|Nedjelja)/i.test(text)) {
      closeDay();
      var dayTag = 'day';
      if (/Sunday|Nedjelja/i.test(text)) dayTag = 'rest';
      dayCollapsible = createCollapsible(text, 'day', dayTag);
      // Set scroll anchor ID
      var dayMatch = text.match(/^(\w+)\s*[—\-]\s*(?:Week|Sedmica)\s*(\d+)/i);
      if (dayMatch) {
        dayCollapsible.id = 'day-' + dayMatch[1].toLowerCase() + '-week-' + dayMatch[2];
      }
      currentBody = dayCollapsible.querySelector('.collapsible-body');
      if (weekCollapsible) {
        weekCollapsible.querySelector('.collapsible-body').appendChild(dayCollapsible);
      } else {
        result.appendChild(dayCollapsible);
      }
      continue;
    }

    // H3 = Session level (e.g., "AM — Strength: Upper Push/Pull" or "PM — MMA Striking")
    if (tag === 'H3' && dayCollapsible && /(?:AM|PM|Jutro|Popodne|Večer)/i.test(text)) {
      closeSession();
      var sessionTag = /AM|Jutro/i.test(text) ? 'am' : 'pm';
      sessionCollapsible = createCollapsible(text, 'session', sessionTag);
      currentBody = sessionCollapsible.querySelector('.collapsible-body');
      dayCollapsible.querySelector('.collapsible-body').appendChild(sessionCollapsible);
      continue;
    }

    // H2 in exercise-detail or nutrition-plan = collapsible section
    if (tag === 'H2' && (hash === 'exercise-detail' || hash === 'nutrition-plan')) {
      closeWeek();
      var sectionTag = hash === 'nutrition-plan' ? '' : '';
      weekCollapsible = createCollapsible(text, 'week', '');
      // Preserve heading ID for exercise linking
      if (node.id) weekCollapsible.id = node.id;
      currentBody = weekCollapsible.querySelector('.collapsible-body');
      result.appendChild(weekCollapsible);
      continue;
    }

    // Everything else goes to current body
    if (currentBody) {
      currentBody.appendChild(node);
    } else {
      result.appendChild(node);
    }
  }

  container.innerHTML = '';
  container.appendChild(result);
}

// ── Exercise SVG Illustrations ──
// Minimalist stick-figure exercise diagrams showing start & end positions.
// Each entry: [startPoseSVG, endPoseSVG] or single pose for isometric holds.
// Figure is drawn in a 120x140 viewBox. Colors use CSS variables.

function svgWrap(inner) {
  return '<svg viewBox="0 0 120 140" xmlns="http://www.w3.org/2000/svg">' +
    '<style>line,polyline,path{stroke:#f97316;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round;fill:none}' +
    'circle{fill:#f97316}.eq{stroke:#62627a;stroke-width:2;fill:none}.plate{fill:#3b82f6;opacity:.6}' +
    '.ground{stroke:#28283a;stroke-width:1.5}.muscle{fill:rgba(249,115,22,.12);stroke:none}' +
    'text{fill:#62627a;font-size:8px;font-family:sans-serif;text-anchor:middle}</style>' + inner + '</svg>';
}

// Reusable parts: head, torso, limbs
function head(x,y){return '<circle cx="'+x+'" cy="'+y+'" r="7"/>';}
function torso(x1,y1,x2,y2){return '<line x1="'+x1+'" y1="'+y1+'" x2="'+x2+'" y2="'+y2+'"/>';}
function limb(pts){return '<polyline points="'+pts+'"/>';}
function bar(x1,y1,x2,y2){return '<line class="eq" x1="'+x1+'" y1="'+y1+'" x2="'+x2+'" y2="'+y2+'"/>';}
function plate(x,y,w,h){return '<rect class="plate" x="'+x+'" y="'+y+'" width="'+w+'" height="'+h+'" rx="1"/>';}
function ground(y){return '<line class="ground" x1="10" y1="'+y+'" x2="110" y2="'+y+'"/>';}
function kb(x,y){return '<circle class="eq" cx="'+x+'" cy="'+y+'" r="6"/><path class="eq" d="M'+(x-3)+','+(y-6)+' Q'+x+','+(y-14)+' '+(x+3)+','+(y-6)+'"/>';}
function db(x,y,a){
  a=a||0;
  var r=a*Math.PI/180;var dx=Math.cos(r)*8;var dy=Math.sin(r)*8;
  return '<line class="eq" x1="'+(x-dx)+'" y1="'+(y-dy)+'" x2="'+(x+dx)+'" y2="'+(y+dy)+'"/>'+
    '<rect class="plate" x="'+(x-dx-3)+'" y="'+(y-dy-2)+'" width="6" height="4" rx="1" transform="rotate('+a+','+(x-dx)+','+(y-dy)+')"/>'+
    '<rect class="plate" x="'+(x+dx-3)+'" y="'+(y+dy-2)+'" width="6" height="4" rx="1" transform="rotate('+a+','+(x+dx)+','+(y+dy)+')"/>';
}
function arrow(x1,y1,x2,y2){
  return '<line x1="'+x1+'" y1="'+y1+'" x2="'+x2+'" y2="'+y2+'" style="stroke:#22c55e;stroke-width:1.5;stroke-dasharray:3,2"/>'+
    '<polygon points="'+(x2-3)+','+(y2-3)+' '+x2+','+y2+' '+(x2+3)+','+(y2-3)+'" style="fill:#22c55e;stroke:none"/>';
}
function label(x,y,t){return '<text x="'+x+'" y="'+y+'">'+t+'</text>';}

// Inject SVG illustrations into exercise collapsible sections
function injectExerciseSVGs(container) {
  var hash = location.hash.slice(1).split(':')[0] || 'dashboard';
  if (hash !== 'exercise-detail') return;

  container.querySelectorAll('.collapsible-level-week').forEach(function(col) {
    var slug = col.id;
    if (!slug) return;
    var svgs = EXERCISE_SVGS[slug];
    if (!svgs) return;

    var body = col.querySelector('.collapsible-body');
    if (!body) return;

    var wrap = document.createElement('div');
    wrap.className = 'exercise-svg-wrap';

    if (Array.isArray(svgs)) {
      for (var i = 0; i < svgs.length; i++) {
        var fig = document.createElement('div');
        fig.innerHTML = svgs[i];
        wrap.appendChild(fig);
      }
    } else {
      var fig = document.createElement('div');
      fig.innerHTML = svgs;
      wrap.appendChild(fig);
    }

    body.insertBefore(wrap, body.firstChild);
  });
}

// ── Routing ──
function renderCurrent() {
  var hash = location.hash.slice(1) || 'dashboard';
  // Handle phase:week-N style anchors
  var parts = hash.split(':');
  var id = parts[0];
  if (parts.length > 1 && !pendingScroll) {
    pendingScroll = parts[1];
  }
  if (SECTIONS.indexOf(id) === -1) id = 'dashboard';
  var page = document.getElementById('page');
  page.innerHTML = renderBreadcrumb(id) + getSection(id);
  addTableLabels(page);
  addScrollAnchors(page);
  // Link exercises in phase pages
  if (id.indexOf('phase-') === 0) {
    linkExercises(page);
  }
  // Make sections collapsible
  makeCollapsible(page);
  injectExerciseSVGs(page);
  // Add session completion checkboxes
  addSessionCheckboxes(page, id);
  // Add page TOC for long reference pages
  renderPageTOC(page, id);
  page.style.animation = 'none';
  void page.offsetHeight;
  page.style.animation = '';
  updateNav(id);
  updateProgress(id);
  // Dashboard widgets
  clearInterval(countdownInterval);
  if (id === 'dashboard') {
    initDashboardWidgets();
    // Render quick links widget
    var ql = document.getElementById('widget-quicklinks');
    if (ql) renderQuickLinks(ql);
    countdownInterval = setInterval(function() {
      var c = document.getElementById('widget-countdown');
      if (c) renderCountdown(c);
    }, 1000);
  }
  // Handle sub-anchor scrolling
  if (pendingScroll) {
    var scrollTarget = pendingScroll;
    pendingScroll = null;
    setTimeout(function() {
      var target = document.getElementById(scrollTarget);
      if (target) {
        // Auto-open all parent collapsibles
        var el = target;
        while (el && el !== page) {
          if (el.classList && el.classList.contains('collapsible')) {
            var h = el.querySelector('.collapsible-header');
            var b = el.querySelector('.collapsible-body');
            if (h && !h.classList.contains('open')) h.classList.add('open');
            if (b && !b.classList.contains('open')) b.classList.add('open');
          }
          el = el.parentElement;
        }
        // If target itself is a collapsible, open it
        if (target.classList && target.classList.contains('collapsible')) {
          var th = target.querySelector('.collapsible-header');
          var tb = target.querySelector('.collapsible-body');
          if (th && !th.classList.contains('open')) th.classList.add('open');
          if (tb && !tb.classList.contains('open')) tb.classList.add('open');
        }
        target.scrollIntoView({ behavior: 'smooth', block: 'start' });
      }
    }, 150);
  } else {
    window.scrollTo({ top: 0 });
  }
}

function updateNav(id) {
  document.querySelectorAll('#nav a').forEach(function(a) {
    a.classList.toggle('active', a.getAttribute('href') === '#' + id);
  });
}

// ── Mobile menu ──
var hamburger = document.getElementById('hamburger');
var sidebar = document.getElementById('sidebar');
var overlay = document.getElementById('overlay');

function toggleMenu() {
  var open = sidebar.classList.toggle('open');
  overlay.classList.toggle('open', open);
  hamburger.classList.toggle('active', open);
}
function closeMenu() {
  sidebar.classList.remove('open');
  overlay.classList.remove('open');
  hamburger.classList.remove('active');
}
hamburger.addEventListener('click', toggleMenu);
overlay.addEventListener('click', closeMenu);

// ── Back to top ──
var backtop = document.getElementById('backtop');
window.addEventListener('scroll', function() {
  backtop.classList.toggle('visible', window.scrollY > 400);
});
backtop.addEventListener('click', function() {
  window.scrollTo({ top: 0, behavior: 'smooth' });
});

window.addEventListener('hashchange', renderCurrent);
initSearch();

// ── Rest Timer ──
var timerInterval = null;
var timerSeconds = 0;
var timerToggle = document.getElementById('timer-toggle');
var timerPanel = document.getElementById('timer-panel');
var timerDisplay = document.getElementById('timer-display');

timerToggle.addEventListener('click', function() {
  timerPanel.classList.toggle('open');
});

function startTimer(seconds) {
  clearInterval(timerInterval);
  timerSeconds = seconds;
  timerDisplay.className = 'timer-display';
  timerToggle.classList.add('active');
  updateTimerDisplay();
  timerInterval = setInterval(function() {
    timerSeconds--;
    updateTimerDisplay();
    if (timerSeconds <= 5 && timerSeconds > 0) {
      timerDisplay.classList.add('warning');
    }
    if (timerSeconds <= 0) {
      clearInterval(timerInterval);
      timerDisplay.classList.remove('warning');
      timerDisplay.classList.add('done');
      timerDisplay.textContent = 'REST!';
      timerToggle.classList.remove('active');
      // Vibrate if supported
      if (navigator.vibrate) navigator.vibrate([200, 100, 200, 100, 200]);
      // Beep using Web Audio API
      try {
        var ctx = new (window.AudioContext || window.webkitAudioContext)();
        var osc = ctx.createOscillator();
        var gain = ctx.createGain();
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.frequency.value = 800;
        gain.gain.value = 0.3;
        osc.start();
        setTimeout(function(){ osc.stop(); ctx.close(); }, 500);
      } catch(e) {}
    }
  }, 1000);
}

function stopTimer() {
  clearInterval(timerInterval);
  timerSeconds = 0;
  timerDisplay.className = 'timer-display';
  timerDisplay.textContent = '0:00';
  timerToggle.classList.remove('active');
}

function updateTimerDisplay() {
  var m = Math.floor(timerSeconds / 60);
  var s = timerSeconds % 60;
  timerDisplay.textContent = m + ':' + (s < 10 ? '0' : '') + s;
}
</script>
