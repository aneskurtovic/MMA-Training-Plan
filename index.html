a. Spor povratak.\n\n### Česte greške\n\n- Podizanje ramena\n- savijanje laktova\n- korištenje momenta.\n\n### MMA primjena\n\nZdravlje lopatica i održavanje držanja. Drži gornja leđa jakima i ramena uravnotežena protiv visokog volumena udaranja i posezanja u treningu. Idealan svakodnevni pokret preventive.\n\n---\n\n## Pallof potisak (Pallof Press)\n\n**Kategorija:** Jezgra / Anti-pokret (Core / Anti-Movement)  \n**Primarne mišićne grupe:** Kosi trbušni mišići (obliques), poprečni trbušni mišić (transverse abdominis), stabilizatori kukova  \n**Oprema:** Koloturnik ili traka\n\n### Postava\n\nStani okomito na koloturnik, ručka na prsima. Stopala u širini ramena, blagi atletski savijak.\n\n### Izvođenje\n\nPotisni ručku ravno od prsa i drži. Odupri se rotaciji. Vrati na prsa. Drži kukove ravne.\n\n### Česte greške\n\n- Dopuštanje koloturku da te rotira\n- zaključana koljena\n- potiskivanje pod uglom umjesto ravno.\n\n### MMA primjena\n\nStabilnost jezgre protiv rotacije — sposobnost odupiranja okretanju u klinču, tokom borbi za poziciju i pri apsorpciji udaraca u tijelo. Direktno trenira primarnu funkciju jezgre u borbi: otpor neželjenom pokretu.\n\n---\n\n## Kotačić za trbušnjake (Ab Wheel Rollout)\n\n**Kategorija:** Jezgra / Anti-pokret (Core / Anti-Movement)  \n**Primarne mišićne grupe:** Ravni trbušni mišić (rectus abdominis), kosi trbušni, latisimus (lats), fleksori kuka  \n**Oprema:** Kotačić za trbušnjake\n\n### Postava\n\nKlekni na podlogu, uhvati kotačić, ruke ispružene.\n\n### Izvođenje\n\nKotrljaj se polako naprijed, držeći kukove opružene (ne sjedi nazad). Idi koliko daleko možeš kontrolirati, zatim povuci natrag koristeći trbušnjake.\n\n### Česte greške\n\n- Tonjenje donjih leđa\n- savijanje u kukovima umjesto opružanja\n- odlazak dalje nego što možeš kontrolirati.\n\n### MMA primjena\n\nSnaga jezgre protiv ekstenzije za održavanje držanja u klinču, otpor savijanju leđa u hrvanju i stabilizaciju kičme tokom udaraca. Ekscentrični izazov odražava povlačenje naprijed od strane protivnika.\n\n---\n\n## Podizanje nogu u visu (Hanging Leg Raises)\n\n**Kategorija:** Jezgra / Anti-pokret (Core / Anti-Movement)  \n**Primarne mišićne grupe:** Fleksori kuka, donji trbušnjaci, hvat  \n**Oprema:** Šipka za zgibove\n\n### Postava\n\nVisi sa šipke s punim hvatom, ramena povučena.\n\n### Izvođenje\n\nPodigni noge do paralelne pozicije (ili prstima do šipke za napredne). Kontroliraj spuštanje — bez ljuljanja. Pokreni iz jezgre, ne iz momenta.\n\n### Česte greške\n\n- Ljuljanje\n- korištenje momenta\n- samo podizanje koljena (ako su podizanja punih nogu cilj)\n- gubitak hvata.\n\n### MMA primjena\n\nSnaga fleksora kuka za zadržavanje garde, visoke udarce nogama i udarce koljenom. Izdržljivost hvata tokom izvođenja pokreta jezgre odražava istovremene zahtjeve visenja na protivniku dok radiš jezgrom u klinču.\n\n---\n\n## Kopenhagenska daska (Copenhagen Plank)\n\n**Kategorija:** Jezgra / Anti-pokret (Core / Anti-Movement)  \n**Primarne mišićne grupe:** Aduktori, kosi trbušni, jezgra (core)  \n**Oprema:** Klupa\n\n### Postava\n\nLežeći na boku, gornje stopalo na klupi, donje stopalo visi. Oslonac na podlaktici.\n\n### Izvođenje\n\nPodigni kukove i donju nogu tako da tijelo formira ravnu liniju. Drži. Aduktor gornje noge radi teški dio.\n\n### Česte greške\n\n- Rotiranje kukova naprijed ili nazad\n- tonjenje u kuku\n- zadržavanje daha.\n\n### MMA primjena\n\nSnaga aduktora i bočne jezgre kritična za zatvorenu gardu, postavljanje trokuta (triangle), stiskanje zaključavanja tijelom (body lock) i prevenciju povreda tokom bočnog kretanja i udaranja nogom. Povrede prepona su česte u MMA — ovo je direktan oklop.\n\n---\n\n## Mrtva buba (Dead Bug)\n\n**Kategorija:** Jezgra / Anti-pokret (Core / Anti-Movement)  \n**Primarne mišićne grupe:** Duboki stabilizatori jezgre, fleksori kuka  \n**Oprema:** Vlastita težina (strunjača)\n\n### Postava\n\nLezi na leđa, ruke ispružene prema stropu, koljena savijena na 90 stepeni iznad kukova. Pritisni donja leđa u pod.\n\n### Izvođenje\n\nIspruži suprotnu ruku i nogu prema podu dok držiš donja leđa zalijepljena za strunjač. Vrati i promijeni strane.\n\n### Česte greške\n\n- Podizanje donjih leđa od poda\n- prebrzo kretanje\n- nedovoljno izdisanje pri opružanju.\n\n### MMA primjena\n\nUči jezgru da stabilizira kičmu dok se udovi kreću nezavisno — tačno ono što se dešava tokom udaranja, grapplinga i prelaza između pozicija. Temelj za sav ostali rad jezgre.\n\n---\n\n## Ptičji pas (Bird Dog)\n\n**Kategorija:** Jezgra / Anti-pokret (Core / Anti-Movement)  \n**Primarne mišićne grupe:** Erektori, gluteusi, duboki stabilizatori jezgre  \n**Oprema:** Vlastita težina (strunjača)\n\n### Postava\n\nPozicija na rukama i koljenima, zglobovi ispod ramena, koljena ispod kukova.\n\n### Izvođenje\n\nIspruži suprotnu ruku i nogu dok ne budu paralelne s podom. Pauza. Vrati. Drži kukove u ravnini — bez rotacije.\n\n### Česte greške\n\n- Rotiranje kukova\n- savijanje leđa\n- žurenje kroz ponavljanja\n- podizanje udova previsoko.\n\n### MMA primjena\n\nAnti-rotacija i anti-ekstenzija u četveronožnom položaju — direktno oponaša zahtjeve održavanja baze u kornjača (turtle) poziciji i tokom borbi za poziciju na strunjači. Odlična vježba za zagrijavanje i preventivu.\n\n---\n\n## Nošenje farmer (Farmer's Carry)\n\n**Kategorija:** Jezgra / Anti-pokret (Core / Anti-Movement)  \n**Primarne mišićne grupe:** Trapezius, hvat, jezgra (core) (anti-bočna fleksija), cijelo tijelo  \n**Oprema:** Teške bučice ili ručke za farmer nošenje\n\n### Postava\n\nStani uspravno s teškim tegovima sa strane. Ramena povučena, prsa gore.\n\n### Izvođenje\n\nHodaj kratkim, kontroliranim koracima. Stani uspravno — ne naginjaj se. Jako stisni ručke. Diši.\n\n### Česte greške\n\n- Naginjanje na jednu stranu\n- predugački koraci\n- podizanje ramena\n- raspad držanja.\n\n### MMA primjena\n\nStabilnost cijelim tijelom, izdržljivost hvata i posturalna snaga pod opterećenjem. Direktno se prenosi na izdržljivost klinča, održavanje držanja dok držiš protivnika i opću tenziju cijelim tijelom potrebnu u grapplingu.\n\n---\n\n## Nošenje kovčega (Suitcase Carry)\n\n**Kategorija:** Jezgra / Anti-pokret (Core / Anti-Movement)  \n**Primarne mišićne grupe:** Kosi trbušni (obliques), jezgra (core) (anti-bočna fleksija), hvat  \n**Oprema:** Teška bučica ili girja (kettlebell)\n\n### Postava\n\nDrži teški teg u jednoj ruci sa strane. Stani uspravno, ne naginjaj se prema ili od opterećenja.\n\n### Izvođenje\n\nHodaj kontroliranim koracima, odupirući se naginjanju prema opterećenoj strani. Ostani savršeno uspravan.\n\n### Česte greške\n\n- Naginjanje prema tegu\n- kompenzacija suprotnim kukom\n- podizanje opterećenog ramena.\n\n### MMA primjena\n\nJednostrana anti-bočna fleksija — sposobnost odupiranja povlačenju na jednu stranu. Prenosi se na odbranu od zahvata jednom rukom za ovratnik, otpor povlačenju ruke (arm drag) i održavanje držanja kada protivnik vuče jednu stranu tvog tijela.\n\n---\n\n## Tursko ustajanje (Turkish Get-Up)\n\n**Kategorija:** Jezgra / Anti-pokret (Core / Anti-Movement)  \n**Primarne mišićne grupe:** Ramena, jezgra (core), kukovi, stabilizatori (cijelo tijelo)  \n**Oprema:** Girja (kettlebell)\n\n### Postava\n\nLezi na leđa, potisni girju gore jednom rukom. Suprotna ruka i noga pod uglom za bazu.\n\n### Izvođenje\n\nZakotrljaj se na lakat, postavi se na ruku, premosti kukove, provuci nogu ispod u klečeći, ustani. Obrni sekvencu. Oči na zvonu cijelo vrijeme.\n\n### Česte greške\n\n- Žurenje pokreta\n- gubitak vizualnog kontakta sa zvonom\n- preskakanje premošćivanja kukova\n- potiskivanje zvona umjesto držanja ruke vertikalno.\n\n### MMA primjena\n\nNajspecifičnija vježba jezgre za MMA. Svaka faza oponaša grappling tranziciju: premošćivanje iz donje pozicije, oslanjanje na lakat, stvaranje okvira, izgradnja baze i ustajanje sa strunjače — sve dok se stabilizira opterećenje iznad glave (simulirajući kontrolu protivnikovog uda).\n\n---\n\n## Vanjske rotacije s trakom (Band External Rotations)\n\n**Kategorija:** Prevencija povreda / Mobilnost (Prehab / Mobility)  \n**Primarne mišićne grupe:** Infraspinatus, teres minor (rotatorna manšeta)  \n**Oprema:** Lagana elastična traka\n\n### Postava\n\nStani s laktom priljubljenim uz bok pod 90 stepeni, traka pričvršćena na visini lakta.\n\n### Izvođenje\n\nRotiraj podlakticu prema van protiv trake, držeći lakat zalijepljen uz rebra. Polako i kontrolirano u oba smjera.\n\n### Česte greške\n\n- Lakat se odmičje od tijela\n- korištenje pretešk trake\n- prebrzo kretanje.\n\n### MMA primjena\n\nZdravlje rotatorne manšete je nepregovarivo za borce. Rame apsorbira ogroman stres od udaranja, oslanjanja i manipulacije u grapplingu. Ovo drži vanjske rotatore dovoljno jake da uravnoteže dominantne unutrašnje rotatore.\n\n---\n\n## Povlačenje prema licu (Face Pulls)\n\n**Kategorija:** Prevencija povreda / Mobilnost (Prehab / Mobility)  \n**Primarne mišićne grupe:** —  \n**Oprema:** —\n\n### Postava\n\n—\n\n### Izvođenje\n\n—\n\n### Česte greške\n\n- —\n\n### MMA primjena\n\nPogledaj sekciju Dodaci za gornji dio tijela iznad.\n\n---\n\n## 90/90 prebacivanje kukova (90/90 Hip Switches)\n\n**Kategorija:** Prevencija povreda / Mobilnost (Prehab / Mobility)  \n**Primarne mišićne grupe:** Unutrašnji i vanjski rotatori kuka, gluteusi  \n**Oprema:** Vlastita težina (strunjača)\n\n### Postava\n\nSjedi na pod s jednom nogom ispred (potkoljenica okomita, vanjska rotacija) i jednom iza (potkoljenica okomita, unutrašnja rotacija). Oba koljena na 90 stepeni.\n\n### Izvođenje\n\nRotiraj obje noge u suprotnu poziciju jednim glatkim pokretom. Drži prsa uspravno. Pauza na svakoj krajnjoj poziciji.\n\n### Česte greške\n\n- Naginjanje nazad\n- pretjerano korištenje ruku\n- žurenje kroz tranzicije\n- koljena ne ostaju na 90 stepeni.\n\n### MMA primjena\n\nMobilnost kukova u unutrašnjoj i vanjskoj rotaciji — esencijalna za igru garde, čišćenja (sweep), bjegove kukovima (hip escape) i udaranje nogom. Borci s ograničenim kukovima kompenziraju kičmom, što dovodi do povreda leđa.\n\n---\n\n## Kontrolirane zglobne rotacije kukova (Hip CARs)\n\n**Kategorija:** Prevencija povreda / Mobilnost (Prehab / Mobility)  \n**Primarne mišićne grupe:** Zglob kuka (sva okolna muskulatura)  \n**Oprema:** Vlastita težina\n\n### Postava\n\nNa rukama i koljenima (ili stojeći). Podigni jedno koljeno u stranu.\n\n### Izvođenje\n\nNapravi najveći mogući krug koljenom — gore, van, nazad i okolo — koristeći samo zglob kuka. Kreći se polako i s maksimalnom tenzijom. Obrni smjer.\n\n### Česte greške\n\n- Korištenje momenta\n- pomicanje kičme da lažira opseg kuka\n- žurenje\n- neangažiranje maksimalne tenzije.\n\n### MMA primjena\n\nOdržavanje punog upotrebljivog opsega pokreta kuka. Borci gube mobilnost kukova tokom vremena od čvrstih gardi, ponavljanih udaraca i teškog čučanja. CARs-ovi čuvaju opseg potreban za visoke udarce nogom, rubber guard i duboku polu gardu (deep half guard).\n\n---\n\n## Rotacije torakalne kičme — otvorena knjiga (Thoracic Spine Rotations / Open Books)\n\n**Kategorija:** Prevencija povreda / Mobilnost (Prehab / Mobility)  \n**Primarne mišićne grupe:** Rotatori torakalne kičme, kosi trbušni  \n**Oprema:** Vlastita težina (strunjača)\n\n### Postava\n\nLezi na bok, koljena složena i savijena na 90 stepeni. Ruke ispružene ispred, dlanovi zajedno.\n\n### Izvođenje\n\nRotiraj gornju ruku gore i preko, otvarajući prsa prema stropu. Prati ruku pogledom. Neka se torakalna kičma rotira — drži koljena zalijepljena zajedno.\n\n### Česte greške\n\n- Rotiranje iz lumbalne kičme (koljena se razdvajaju)\n- nepotpuno otvaranje\n- žurenje.\n\n### MMA primjena\n\nRotacija torakalne kičme je motor snage udaraca i odbrane od obaranja. Borci koji gube rotaciju torakalne kičme kompenziraju donjim leđima i ramenima, što dovodi do hroničnog bola. Ovo čuva rotaciju potrebnu za udarce kukama (hook), laktovima i gledanje preko ramena za odbranu od obaranja.\n\n---\n\n## Goblet čučanj (Goblet Squat)\n\n**Kategorija:** Prevencija povreda / Mobilnost (Prehab / Mobility)  \n**Primarne mišićne grupe:** Kvadricepsi, gluteusi, jezgra (core)  \n**Oprema:** Girja (kettlebell) ili bučica\n\n### Postava\n\nDrži teg na visini prsa, laktovi unutar koljena. Stopala u širini ramena, prsti blago prema van.\n\n### Izvođenje\n\nSjedi između kukova, laktovi guraju koljena prema van na dnu. Prsa uspravna, pogon kroz cijelo stopalo.\n\n### Česte greške\n\n- Naginjanje naprijed\n- podizanje peta\n- nedostizanje dubine.\n\n### MMA primjena\n\nZagrijavanje i priprema pokreta za obrasce čučnja. Uči uspravan položaj čučnja koji se prenosi na držanje u klinču i završavanje duplih obaranja (double-leg).\n\n---\n\n## Most gluteusa (Glute Bridge)\n\n**Kategorija:** Prevencija povreda / Mobilnost (Prehab / Mobility)  \n**Primarne mišićne grupe:** Gluteusi, zadnja loža  \n**Oprema:** Vlastita težina ili šipka (strunjača)\n\n### Postava\n\nLezi na leđa, koljena savijena, stopala ravno na podu u širini kukova. Ruke sa strane.\n\n### Izvođenje\n\nPogoni kukove prema stropu stiskajući gluteuse. Drži na trenutak na vrhu. Spusti pod kontrolom.\n\n### Česte greške\n\n- Prekomjerno opružanje donjih leđa\n- pogon kroz prste umjesto peta\n- nedostizanje pune ekstenzije kukova.\n\n### MMA primjena\n\nAktivacija ekstenzije kukova za zagrijavanje. Direktno oponaša bjeg mostom iz donjeg mount-a — jedan od najosnovnijih grappling pokreta.\n\n---\n\n## Dislociranja s trakom (Band Dislocates)\n\n**Kategorija:** Prevencija povreda / Mobilnost (Prehab / Mobility)  \n**Primarne mišićne grupe:** Ramena, rotatorna manšeta, prsa  \n**Oprema:** Elastična traka ili PVC cijev\n\n### Postava\n\nDrži traku/cijev širokim nadlanim hvatom ispred kukova.\n\n### Izvođenje\n\nDržeći ruke ravne, podigni traku iznad glave i iza leđa u sporom luku. Obrni. Proširi hvat ako je potrebno.\n\n### Česte greške\n\n- Savijanje laktova\n- prebrzo kretanje\n- korištenje preuskog hvata prije nego mobilnost dozvoljava.\n\n### MMA primjena\n\nZagrijavanje punog opsega pokreta ramena. Priprema ramensku kapsulu za potiskivanje i rad iznad glave dok suzbija uska prednja ramena koja borci razvijaju od udaranja i rada u klinču.\n\n---\n\n## Sklekovi za lopatice (Scap Push-Ups)\n\n**Kategorija:** Prevencija povreda / Mobilnost (Prehab / Mobility)  \n**Primarne mišićne grupe:** Prednji nazubljeni mišić (serratus anterior), donji trapezius  \n**Oprema:** Vlastita težina\n\n### Postava\n\nStandardna pozicija za sklekove sa zaključanim rukama.\n\n### Izvođenje\n\nBez savijanja laktova, protrakiraj lopatice (guraj pod od sebe) zatim retrakiraj (pusti prsa da potonu). Mali kontrolirani pokret.\n\n### Česte greške\n\n- Savijanje laktova (pretvara se u sklek)\n- prebrzo kretanje\n- pretjeran opseg.\n\n### MMA primjena\n\nAktivacija prednjeg nazubljenog mišića za stabilnost lopatica. Štiti rame tokom potiskivanja i oslanjanja — posebno važno za borce koji provode vrijeme na rukama u grapplingu.\n\n---\n\n## PVC čučanj iznad glave (PVC Overhead Squat)\n\n**Kategorija:** Prevencija povreda / Mobilnost (Prehab / Mobility)  \n**Primarne mišićne grupe:** Ramena, torakalna kičma, kukovi, gležnjevi  \n**Oprema:** PVC cijev ili drška metle\n\n### Postava\n\nDrži PVC iznad glave širokim hvatom poput trzaja (snatch). Stopala u širini ramena.\n\n### Izvođenje\n\nČučni do pune dubine držeći PVC direktno iznad glave s zaključanim rukama. Prsa uspravna, pete dolje.\n\n### Česte greške\n\n- Šipka odlazi naprijed\n- pete se podižu\n- gubitak torakalne ekstenzije\n- pretjeran nagib naprijed.\n\n### MMA primjena\n\nDijagnostika mobilnosti cijelim tijelom i zagrijavanje. Otkriva ograničenja u gležnjevima, kukovima, torakalnoj kičmi i ramenima istovremeno. Gradi stabilnost iznad glave potrebnu za proval (sprawl) s ispruženim rukama.\n\n---\n\n## Kruženje girjom oko glave (KB Halo)\n\n**Kategorija:** Prevencija povreda / Mobilnost (Prehab / Mobility)  \n**Primarne mišićne grupe:** Ramena, jezgra (core), gornja leđa  \n**Oprema:** Girja (kettlebell)\n\n### Postava\n\nStani uspravno, drži girju za rogove naopako na visini prsa.\n\n### Izvođenje\n\nKruži girjom oko glave u glatkom luku, držeći je blizu. Izmjenjuj smjerove svako ponavljanje. Stabiliziraj jezgru.\n\n### Česte greške\n\n- Naginjanje torza\n- pomicanje glave umjesto girje\n- prebrzo kretanje.\n\n### MMA primjena\n\nZagrijavanje ramena s rotacijskim zahtjevom. Priprema ramena za potiskivanje dok gradi kružnu mobilnost ramena potrebnu za pummelovanje u klinču i borbe za potkopavanje (underhook).\n\n---\n\n## Bočno hodanje s trakom (Banded Lateral Walk)\n\n**Kategorija:** Prevencija povreda / Mobilnost (Prehab / Mobility)  \n**Primarne mišićne grupe:** Srednji gluteus (glute medius), abduktori kuka  \n**Oprema:** Mini traka\n\n### Postava\n\nPostavi traku oko gležnjeva ili tik iznad koljena. Četvrt-čučanj atletski stav.\n\n### Izvođenje\n\nPravi kontrolirane bočne korake, održavajući tenziju na traci. Ne dopusti da koljena padnu prema unutra. Ostani nisko.\n\n### Česte greške\n\n- Stajanje previše uspravno\n- puštanje prateće noge da odskakuje nazad\n- koljena padaju prema unutra.\n\n### MMA primjena\n\nAktivacija srednjeg gluteusa za stabilnost bočnog kretanja. Jača abduktore kuka koji stabiliziraju stav tokom udaranja nogom, bočnog rezanja uz kavez i odbrane od obaranja na jednu nogu.\n\n---\n\n## Najbolje istezanje na svijetu (World's Greatest Stretch)\n\n**Kategorija:** Prevencija povreda / Mobilnost (Prehab / Mobility)  \n**Primarne mišićne grupe:** Fleksori kuka, torakalna kičma, zadnja loža, prepone  \n**Oprema:** Vlastita težina\n\n### Postava\n\nZakorači u duboki iskorak, postavi obje ruke na pod unutar prednjeg stopala.\n\n### Izvođenje\n\nRotiraj unutrašnju ruku gore prema stropu, otvarajući prsa. Drži 2-3 sekunde. Vrati ruku na pod. Ispruži prednju nogu za istezanje zadnje lože. Ponovi na drugu stranu.\n\n### Česte greške\n\n- Žurenje kroz pozicije\n- nepotpuno rotiranje\n- zadnje koljeno udara u pod.\n\n### MMA primjena\n\nNajpovoljniji dinamički pokret zagrijavanja. Rješava napetost fleksora kuka, rotaciju torakalne kičme, dužinu zadnje lože i mobilnost prepona u jednoj sekvenci — sve oblasti koje trpe tokom MMA treninga.\n\n---\n\n## Istezanje gležnja uz zid (Wall Ankle Stretch)\n\n**Kategorija:** Prevencija povreda / Mobilnost (Prehab / Mobility)  \n**Primarne mišićne grupe:** Soleus, Ahilova tetiva, prednji tibijalni mišić  \n**Oprema:** Zid\n\n### Postava\n\nPostavi jedno stopalo nekoliko centimetara od zida, drugo stopalo iza za podršku. Prednje koljeno gura naprijed prema zidu.\n\n### Izvođenje\n\nGuraj koljeno preko prstiju prema zidu bez podizanja pete. Pomakni stopalo dalje nazad da povećaš težinu.\n\n### Česte greške\n\n- Peta se podiže od tla\n- koljeno pada prema unutra\n- bez progresije udaljenosti.\n\n### MMA primjena\n\nDorzifleksija gležnja je potrebna za duboke pozicije čučnja, promjene nivoa pri obaranju i apsorpciju sile pri bočnom kretanju. Ograničeni gležnjevi uzrokuju kompenzatorne probleme koljena i kukova — česte kod boraca koji preskaču rad na mobilnosti.\n\n---\n\n## Razdvajanje trake (Band Pull-Aparts)\n\n**Kategorija:** Prevencija povreda / Mobilnost (Prehab / Mobility)  \n**Primarne mišićne grupe:** —  \n**Oprema:** —\n\n### Postava\n\n—\n\n### Izvođenje\n\n—\n\n### Česte greške\n\n- —\n\n### MMA primjena\n\nPogledaj sekciju Dodaci za gornji dio tijela iznad.\n\n---\n\n## Podizanja licem prema dolje Y/T/W (Prone Y/T/W Raises)\n\n**Kategorija:** Prevencija povreda / Mobilnost (Prehab / Mobility)  \n**Primarne mišićne grupe:** Donji trapezius, srednji trapezius, rotatorna manšeta, zadnji deltoidi  \n**Oprema:** Vlastita težina ili lagane bučice (1-2 kg)\n\n### Postava\n\nLezi licem prema dolje na podu ili kosoj klupi. Ruke vise.\n\n### Izvođenje\n\nY: podigni ruke iznad glave u Y-oblik, palčevi gore. T: podigni ruke u strane u T. W: povuci laktove dolje i nazad u W, stiskajući lopatice. Drži svaku gornju poziciju 2 sekunde.\n\n### Česte greške\n\n- Korištenje previše tereta\n- podizanje trapezusa umjesto aktiviranja donjeg/srednjeg trapezusa\n- prebrzo kretanje.\n\n### MMA primjena\n\nAktivacija donjeg i srednjeg trapezusa suzbija zaokruženo držanje ramena uzrokovano radom na vreći, grapplingom i sjedenjem za stolom. Zdrava mehanika lopatica štiti rame tokom poluga ruke (armbar), kimura i doskoka na ruke.\n\n---\n\n## Držanje ploča prstima (Plate Pinch Holds)\n\n**Kategorija:** Hvat / Vrat (Grip / Neck)  \n**Primarne mišićne grupe:** Fleksori prstiju, palac, podlaktica  \n**Oprema:** Tegovi (dvije ploče glatkom stranom prema van)\n\n### Postava\n\nStisni dvije ploče zajedno (glatke strane prema van) između prstiju i palca. Stani uspravno.\n\n### Izvođenje\n\nStisni ploče najjače moguće. Drži na vrijeme. Drži ramena u ravnini.\n\n### Česte greške\n\n- Korištenje bumper ploča (prelako za hvat)\n- puštanje ploča da klize\n- podizanje ramena.\n\n### MMA primjena\n\nSnaga hvata prstima za kontrolu zglobova tokom grapplinga, održavanje hvata na oznojenom protivniku i osiguravanje ovratničkih hvata. Obrazac hvata dominantnim palcem je specifičan za kontrolu udova.\n\n---\n\n## Zgibovi na ručniku (Towel Pull-Ups)\n\n**Kategorija:** Hvat / Vrat (Grip / Neck)  \n**Primarne mišićne grupe:** Latisimus (lats), podlaktice, fleksori prstiju  \n**Oprema:** Šipka za zgibove, dva ručnika\n\n### Postava\n\nObjesite ručnike preko šipke, uhvati po jedan u svaku ruku.\n\n### Izvođenje\n\nIzvodi zgibove dok držiš ručnike. Stisni jako — ako hvat popusti, set je gotov.\n\n### Česte greške\n\n- Omotavanje ručnika oko ruku (poništava svrhu)\n- kip\n- skraćivanje opsega kretanja.\n\n### MMA primjena\n\nIzdržljivost hvata na debeloj, savitljivoj površini oponaša hvatanje gija ili kontrolu oznojenog zgloba/gležnja. Umor podlaktica i prstiju je direktno prenosiv na grappling hvat u kasnim rundama.\n\n---\n\n## Veslanje s debelim hvatom (Fat Grip Rows)\n\n**Kategorija:** Hvat / Vrat (Grip / Neck)  \n**Primarne mišićne grupe:** Latisimus (lats), romboidni, podlaktice  \n**Oprema:** Šipka ili bučice, Fat Gripz / debela šipka\n\n### Postava\n\nPričvrsti Fat Gripz na šipku ili koristi šipku s debelom ručkom. Postavi se za standardno veslanje.\n\n### Izvođenje\n\nVeslaj normalno, ali debela ručka forsira mnogo teži hvat. Smanji težinu za 20-30% u odnosu na normalno veslanje.\n\n### Česte greške\n\n- Korištenje iste težine kao obično veslanje (hvat popusti prije leđa)\n- previše oprezno stiskanje.\n\n### MMA primjena\n\nTrening s debelom šipkom gradi snagu otvorenog hvata koja se koristi u no-gi grapplingu, gdje ne možeš zatvoriti prste oko ovratnika ili rukava. Jače ruke znače bolju kontrolu zglobova i odbranu od zahvata.\n\n---\n\n## Zgibovi na giju (Gi Pull-Ups)\n\n**Kategorija:** Hvat / Vrat (Grip / Neck)  \n**Primarne mišićne grupe:** Latisimus (lats), podlaktice, fleksori prstiju  \n**Oprema:** Šipka za zgibove, stari gi ili gi hlače\n\n### Postava\n\nObjesite gi preko šipke za zgibove. Uhvati revere ili tkaninu.\n\n### Izvođenje\n\nVuci se gore dok držiš gi materijal. Variraj pozicije hvata — rever, rukav, ovratnik. Drži na vrhu za ekstra zasluge.\n\n### Česte greške\n\n- Korištenje tanke tkanine koja se cijepa\n- omotavanje gija oko ruku umjesto hvatanja\n- djelomičan opseg kretanja.\n\n### MMA primjena\n\nNajsportskije specifičnija vježba hvata za grappling s gijem. Čak i u no-gi i MMA, izdržljivost hvata na zglob i tkaninu prenosi se na kontrolu rashguarda i održavanje kontrole zgloba.\n\n---\n\n## Ular za vrat (4 smjera) (Neck Harness 4-Way)\n\n**Kategorija:** Hvat / Vrat (Grip / Neck)  \n**Primarne mišićne grupe:** Sternokleidomastoidni mišić, gornji trapezius, ekstenzori vrata, bočni fleksori  \n**Oprema:** Ular za vrat, teg ili šipka za opterećenje\n\n### Postava\n\nPričvrsti teg na ular. Izvodi fleksiju (brada prema prsima), ekstenziju (gledanje gore) i bočnu fleksiju (uho prema ramenu) iz sjedećeg ili stojećeg savijenog položaja.\n\n### Izvođenje\n\nKontrolirani opseg kretanja kroz puni pokret. 2-sekundno zadržavanje na krajnjem opsegu. Počni vrlo lagano (2-5 kg) i dodaj opterećenje polako tokom sedmica.\n\n### Česte greške\n\n- Prebrzo dodavanje težine\n- trzanje tegom\n- prekomjerno opružanje na krajnjem opsegu\n- preskakanje serija zagrijavanja.\n\n### MMA primjena\n\nJak vrat direktno smanjuje rizik od potresa mozga ograničavajući brzo ubrzanje glave od udaraca. Snaga vrata također pruža otpor giljotinama, otvaračima konzerve (can opener) i polugama vrata (crank). Ovo je vježba s najviše prevencije povreda koju borac može raditi.\n\n---\n\n## Izometrija vrata s trakom (Band Neck Isometrics)\n\n**Kategorija:** Hvat / Vrat (Grip / Neck)  \n**Primarne mišićne grupe:** Sva muskulatura vrata  \n**Oprema:** Elastična traka\n\n### Postava\n\nPetlja trake oko glave (čelo za otpor ekstenziji, potiljak za otpor fleksiji, strana za bočni otpor). Usidri traku na visini glave.\n\n### Izvođenje\n\nDrži glavu u neutralnom položaju protiv povlačenja trake. 10-20 sekundi zadržavanja. Rotiraj kroz sva četiri smjera.\n\n### Česte greške\n\n- Preteška traka (vrat kompenzira pokretom torza)\n- netreniranje sva četiri smjera\n- zadržavanje daha.\n\n### MMA primjena\n\nNiskointenzivno jačanje vrata idealno za svakodnevni trening. Gradi izometrijsku izdržljivost vrata — vrstu snage potrebnu za otpor promjeni pozicije glave u realnom vremenu kada si udaren ili uhvaćen u prednji zahvat glave (front headlock). Dovoljno sigurno za svaku sesiju.\n\n---\n\n## Intervali na assault biciklu (Assault Bike Intervals)\n\n**Kategorija:** Kondicijske modalitete (Conditioning Modalities)  \n**Primarne mišićne grupe:** Kvadricepsi, zadnja loža, ramena, kardiovaskularni sistem  \n**Oprema:** Assault / air bicikl\n\n### Postava\n\nPodesi visinu sjedala tako da postoji blagi savijak u koljenu na dnu. Uhvati ručke.\n\n### Izvođenje\n\nGuraj i vuci rukama, pogoni nogama. Za intervale: maksimalan napor za period rada, lagan okret za odmor. Fokusiraj se na RPM ili kalorije kao cilj.\n\n### Česte greške\n\n- Sjedalo previsoko (ljuljanje kukova)\n- ruke i noge nisu koordinirane\n- ne ideš istinski na maksimum tokom radnih intervala.\n\n### MMA primjena\n\nTrening energetskih sistema cijelim tijelom bez udarca. Istovremeni rad ruku i nogu oponaša metabolički zahtjev borbe. Intervali (npr. 10s rad / 20s odmor) repliciraju obrazac eksplozivnog naleta pa oporavka MMA rundi.\n\n---\n\n## Veslanje — 500m ponavljanja (Rowing — 500m Repeats)\n\n**Kategorija:** Kondicijske modalitete (Conditioning Modalities)  \n**Primarne mišićne grupe:** Noge, leđa, ruke, kardiovaskularni sistem  \n**Oprema:** Ergometar za veslanje (Concept2)\n\n### Postava\n\nPričvrsti stopala, postavi otpor na 4-6. Počni s ispruženim rukama, potkoljenice vertikalne.\n\n### Izvođenje\n\nPogoni nogama prvo, zatim otvori kukove, zatim povuci ručku do sternuma. Obrni redoslijed pri oporavku. Ciljaj konstantna split vremena kroz ponavljanja.\n\n### Česte greške\n\n- Povlačenje rukama prvo (trebaju biti noge-kukovi-ruke)\n- postavljanje otpora previsoko\n- nekonzistentno tempiranje.\n\n### MMA primjena\n\nKondicija cijelog zadnjeg lanca s naglaskom na povlačenju — uravnotežava zahtjeve dominantnog guranja udaračkih vještina. 500m ponavljanja na trkačkom tempu grade toleranciju na laktat potrebnu za runde pune borbi za poziciju i kasne bitke za obaranje.\n\n---\n\n## Preskakanje užeta (Jump Rope)\n\n**Kategorija:** Kondicijske modalitete (Conditioning Modalities)  \n**Primarne mišićne grupe:** Listovi, ramena, koordinacija, kardiovaskularni sistem  \n**Oprema:** Brzo uže\n\n### Postava\n\nDrži ručke na visini kukova, laktovi usko uz tijelo. Stani na jastučiće stopala.\n\n### Izvođenje\n\nMali odskoci — taman dovoljno da preskočiš uže. Okreći iz zglobova, ne iz ramena. Ostani opušten.\n\n### Česte greške\n\n- Preskakanje previsoko\n- okretanje iz laktova\n- tenzija u ramenima\n- dvostruko odskakivanje.\n\n### MMA primjena\n\nKoordinacija stopala, izdržljivost listova i ritam — temelj udaračkog kretanja. Gradi laganu, odskočnu bazu koja omogućava borcima da održe distancu, mijenjaju uglove i ostaju na jastučićima stopala pet rundi.\n\n---\n\n## Guranje / Vučenje saonica (Sled Push / Pull)\n\n**Kategorija:** Kondicijske modalitete (Conditioning Modalities)  \n**Primarne mišićne grupe:** Kvadricepsi, gluteusi, zadnja loža, listovi, jezgra (core)  \n**Oprema:** Saonice, travnata ili glatka površina\n\n### Postava\n\nOptereti saonice. Za guranje: ruke na visokim ili niskim ručkama, nagni se naprijed. Za vučenje: pričvrsti remen ili uže i okreni se licem prema saonicama.\n\n### Izvođenje\n\nGuranje: pogoni nogama, drži ruke ispružene, ostani nisko. Vučenje: sjedi nazad i veslaj ruku po ruku, ili hodaj unatrag s remenom preko ramena.\n\n### Česte greške\n\n- Stajanje previše uspravno pri guranju (gubitak ugla pogona)\n- preopterećivanje i gubitak brzine\n- odmor između koraka.\n\n### MMA primjena\n\nNula ekscentričnog opterećenja znači teška kondicija bez zakašnjele bolnosti mišića — kritično za borce koji moraju trenirati tehničke vještine sljedeći dan. Guranje oponaša pogon uz kavez; vučenje oponaša povlačenje protivnika. Oboje grade kapacitet pogona nogu.\n\n---\n\n## Udarci čekićem po gumi (Sledgehammer Tire Strikes)\n\n**Kategorija:** Kondicijske modalitete (Conditioning Modalities)  \n**Primarne mišićne grupe:** Jezgra (core), ramena, latisimus (lats), hvat, kardiovaskularni sistem  \n**Oprema:** Čekić (5-9 kg), velika guma\n\n### Postava\n\nStani u razdvojeni stav licem prema gumi, čekić iznad glave s blagim uglom sjekanja.\n\n### Izvođenje\n\nKlizi gornju ruku gore tokom dizanja, klizi je dolje da se sretne s donjom rukom tokom udarca. Rotiraj kukove u svaki zamah. Izmjenjuj strane.\n\n### Česte greške\n\n- Prečvrst hvat (umor hvata)\n- sve ruke / bez rotacije kukova\n- neizmjenjivanje vodeće strane.\n\n### MMA primjena\n\nRotacijska snaga-izdržljivost — sposobnost bacanja snažnih, kukovima pogonjen udaraca ponavljano. Težina alata i zahtjev usporavanja odražavaju apsorpciju udarca pri radu na focusima ili protivniku. Gradi borbeno-specifičnu izdržljivost hvata.\n\n---\n\n## Boks iz sjene (Shadow Boxing)\n\n**Kategorija:** Kondicijske modalitete (Conditioning Modalities)  \n**Primarne mišićne grupe:** Ramena, jezgra (core), noge, kardiovaskularni sistem  \n**Oprema:** Ništa (rukavice opcionalno)\n\n### Postava\n\nBorački stav, ruke gore, brada uvučena, težina na jastučićima stopala.\n\n### Izvođenje\n\nBaci kombinacije s namjerom. Pomakni stopala između kombinacija. Vizualiziraj protivnika — nemoj samo mahati rukama. Radi odbranu između napada.\n\n### Česte greške\n\n- Spuštanje ruku\n- kretanje na ravnim stopalima\n- bez defanzivnog kretanja između kombinacija\n- udaranje bez svrhe.\n\n### MMA primjena\n\nNajspecifičniji kondicijski modalitet za udaranje. Omogućava tehničku praksu pod umorom. Kada se koristi u programima treninga, runde boksa iz sjene služe kao aktivni oporavak dok pojačavaju tehniku i generalstvo u ringu.\n\n---\n\n## Rad na vreći (Bag Work)\n\n**Kategorija:** Kondicijske modalitete (Conditioning Modalities)  \n**Primarne mišićne grupe:** Ramena, jezgra (core), noge, ruke, kardiovaskularni sistem  \n**Oprema:** Teška vreća (30-45 kg), rukavice za vreću ili MMA rukavice, bandaže\n\n### Postava\n\nObjesite bandaže, obucite rukavice. Postavi se na udaljenost udarca od vreće. Borački stav.\n\n### Izvođenje\n\nBaci prave kombinacije — džeb-kroše-huk (jab-cross-hook), ne pojedinačne udarce. Pomakni glavu i stopala između kombinacija. Udari kroz vreću, ne po njoj.\n\n### Česte greške\n\n- Stajanje na ravnim stopalima i bacanje pojedinačnih udaraca\n- bez kretanja između kombinacija\n- udaranje s lošim poravnanjem zgloba\n- 100% svaku rundu bez varijacije.\n\n### MMA primjena\n\nKondicija udaranja s punim kontaktom koja gradi izdržljivost udarca, tajming i sposobnost održavanja tehnike pod umorom. Programirano u runde od 3-5 minuta da odgovara taktici borbe. Povratna informacija vreće uči borce da se posvete udarcu.\n\n---\n\n## Proval u burpee (Sprawl-to-Burpee)\n\n**Kategorija:** Kondicijske modalitete (Conditioning Modalities)  \n**Primarne mišićne grupe:** Cijelo tijelo (fleksori kuka, kvadricepsi, prsa, ramena, kardiovaskularni sistem)  \n**Oprema:** Vlastita težina\n\n### Postava\n\nStani u borački stav.\n\n### Izvođenje\n\nSpusti se u proval (sprawl) (kukovi na pod, noge nazad, prsa gore), odmah uskoči na noge, zatim skoči (ili preskoči skok za brzinu). Resetuj stav i ponovi.\n\n### Česte greške\n\n- Lijeni provali (kukovi ostaju visoko — poništava svrhu)\n- nevraćanje u borački stav\n- presporo tempiranje za kondicijski efekat.\n\n### MMA primjena\n\nNajspecifičniji kondicijski pokret MMA s vlastitom težinom. Kombinira odbranu od obaranja (proval / sprawl) s eksplozivnim oporavkom u stojeći. Setovi visokih ponavljanja grade anaerobnu izdržljivost za zaustavljanje obaranja u šampionskim rundama kada se većina borbi odlučuje.\n\n---\n\n", "schedule": "# 9-Week Fight Camp Schedule\n\n> **Fight Date:** May 16, 2026 | **Weight Class:** 77 kg\n> **Camp Start:** March 16, 2026 | **Starting Weight:** 89 kg\n\n---\n\n## Intensity Key\n\n| Marker | Meaning |\n|--------|---------|\n| Easy | Recovery pace, low CNS demand |\n| Moderate | Working hard but controlled |\n| Hard | High demand, plan recovery accordingly |\n\n---\n\n## Phase 1 — Base Camp (Weeks 1-3)\n\n**Focus:** Movement quality, baseline establishment, gradual caloric deficit begins.\n**Weight Target:** 89 kg → 85 kg\n\n### Week 1 — Base Volume (Mar 16-22) | RPE 6-7\n\n| Day | AM Session | PM Session |\n|-----|-----------|------------|\n| **Monday** | Strength — Upper Push/Pull (60 min) Moderate | MMA Striking (75 min) Hard |\n| **Tuesday** | Cardiac Output (40 min) Easy | MMA Grappling (75 min) Moderate |\n| **Wednesday** | Strength — Lower + Posterior (65 min) Hard | Light Technique / Open Mat (60 min) Easy |\n| **Thursday** | HIIT / Fight Circuit (35 min) Hard | MMA Sparring (90 min) Hard |\n| **Friday** | Strength — Full Body Power (55 min) Moderate |
