i Z, Chen Y, Wang X, et al.** — \"Effects of dietary supplements on physical performance in combat athletes: a systematic review and meta-analysis of randomized controlled trials.\" *Scientific Reports*, 2024. DOI: [10.1038/s41598-024-84359-3](https://doi.org/10.1038/s41598-024-84359-3)\n\n---\n\n## 6. Scientific Papers — Sleep & Recovery\n\n1. **Vitale KC, Owens R, Hopkins SR, Malhotra A.** — \"Sleep hygiene for optimizing recovery in athletes: review and recommendations.\" *International Journal of Sports Medicine*, 2019; 40(8): 535–543. PMC: [PMC6988893](https://www.ncbi.nlm.nih.gov/pmc/articles/PMC6988893/)\n\n2. **Bonnar D, Lee S, Roane BM, et al.** — \"Sleep and athletic performance: impacts on physical performance, mental health, injury risk, nutrition, and recovery.\" *Sleep Medicine Reviews*, 2023. PMC: [PMC9960533](https://www.ncbi.nlm.nih.gov/pmc/articles/PMC9960533/)\n\n3. **Mah CD, Mah KE, Kezirian EJ, Dement WC.** — \"The effects of sleep extension on the athletic performance of collegiate basketball players.\" *Sleep*, 2011; 34(7): 943–950. DOI: [10.5665/SLEEP.1132](https://doi.org/10.5665/SLEEP.1132)\n\n---\n\n## 7. Scientific Papers — Hydration\n\n1. **Sawka MN, Burke LM, Eichner ER, Maughan RJ, Montain SJ, Stachenfeld NS.** — \"American College of Sports Medicine position stand: exercise and fluid replacement.\" *Medicine & Science in Sports & Exercise*, 2007; 39(2): 377–390. DOI: [10.1249/mss.0b013e31802ca597](https://doi.org/10.1249/mss.0b013e31802ca597)\n\n---\n\n## 8. Scientific Papers — Vitamin & Mineral\n\n1. **Chiang CM, Ismaeel A, Griffis RB, Weems S.** — \"Effects of vitamin D supplementation on muscle strength in athletes: a systematic review.\" *Journal of Strength and Conditioning Research*, 2023. PMC: [PMC10768611](https://www.ncbi.nlm.nih.gov/pmc/articles/PMC10768611/)\n\n2. **Heffernan SM, Horner K, et al.** — \"The role of vitamin D and magnesium in athletic performance and recovery.\" *Nutrients*, 2025; 17(10): 1655. DOI: [10.3390/nu17101655](https://doi.org/10.3390/nu17101655)\n\n---\n\n## 9. Organizations\n\n1. **UFC Performance Institute (UFCPI)** — Website: [ufcpi.com](https://www.ufcpi.com). Training phases and periodization chart for MMA athletes. *UFC Performance Institute's Training & Nutrition Guide*, 2018 (publicly available PDF). Sport science research on MMA athlete profiling, body composition, and performance benchmarks.\n"};
var CONTENT_BOS = {"overview": "# MMA Program Razvoja Boraca — 4-Sedmični Mezociklus Opšte Pripreme\n\n## Profil Sportiste\n\n| Osobina | Detalj |\n|---------|--------|\n| Spol | Muški |\n| Hodajuća težina | 87-90 kg |\n| Visina | 185 cm |\n| Ciljna težinska kategorija | Srednja kategorija (83.9 kg) ili Poluteška kategorija (93 kg) |\n| Iskustvo | 3-4 godine amaterskog MMA |\n| Dostupnost | Ponedjeljak-Subota (Nedjelja potpuni odmor) |\n| Pristup objektima | Potpuno opremljena teretana + MMA teretana |\n| Povrede | Trenutno nema |\n| Primarni cilj | Sveukupno poboljšanje — izdržljivost, snaga bez mase, tehnika, otpornost |\n\n---\n\n## Filozofija Treninga\n\nOvaj program se oslanja na nekoliko dokazanih metodologija, kombinovanih u koherentan okvir za razvoj MMA boraca.\n\n### Model Istovremenog Treninga (Alex Viada)\nRazvijajte više fizičkih kvaliteta — snagu, eksplozivnost, izdržljivost i sportski specifičnu kondiciju — istovremeno unutar iste sedmice treninga. Sesije su raspoređene kako bi se minimizirala interferencija između suprotstavljenih adaptacija (npr. teški trening snage je odvojen od visokog volumena izdržljivosti za najmanje 6 sati).\n\n### Razvoj Energetskih Sistema (Joel Jamieson)\nIzgradite robusnu aerobnu bazu kroz rad na srčanom minutnom volumenu (održavani srčani ritam na 130-150 BPM tokom 30-60 minuta). Kada se uspostavi aerobna osnova, nadogradite anaerobni kapacitet kroz intervale i borbeno specifične krugove. Jaka aerobna baza ubrzava oporavak između rundi i između sesija.\n\n### Snaga Bez Mase (Pavel Tsatsouline)\nPrioritizirajte neuralne adaptacije umjesto hipertrofije. Koristite nizak raspon ponavljanja (1-5 ponavljanja), submaksimalna opterećenja (70-85% 1RM) i duže periode odmora (3-5 minuta). Izbjegavajte trening do otkaza. Ovo gradi maksimalnu snagu i brzinu razvoja sile bez dodavanja tjelesne mase koja bi mogla preći ciljnu težinsku kategoriju.\n\n### Elementi Trifaznog Treninga (Cal Dietz)\nStrukturirajte rad na snazi kroz tri faze kontrakcije:\n- **Ekscentrična** — kontrolirano spuštanje (tempo 3-5 sekundi) za izgradnju kapaciteta apsorpcije sile i otpornosti tetiva\n- **Izometrička** — pauzirano ponavljanje na tačkama zastoja za razvoj pozicione snage i stabilnosti\n- **Koncentrična** — eksplozivno podizanje za razvoj izlazne snage i brzine razvoja sile\n\n### Volumen Iznad Intenziteta za Rad na Vještinama (Firas Zahabi)\nTrenirajte MMA vještine često ali ostanite ispod praga povrede. Većina tehničkih sesija treba da se osjeća kao napor 6-7 od 10. Teški sparring (sparring) je ograničen na jednom sedmično. Ovaj pristup akumulira više ukupnih ponavljanja vještina tokom vremena dok sportista ostaje zdrav i sposoban za trening.\n\n### Funkcionalni Pokret (Mike Boyle)\nNaglašavajte vježbe na jednoj nozi (bugarski split čučnjevi (Bulgarian Split Squats), rumunsko mrtvo dizanje na jednoj nozi (Single-Leg RDLs), iskoraci) kako biste riješili bilateralne deficite i odrazili zahtjeve borbe. Rad na trupnoj muskulaturi fokusira se na anti-rotaciju, anti-ekstenziju i anti-lateralnu fleksiju umjesto trbušnjaka — primarni zadatak trupa u borbi je otpor neželjenom pokretu.\n\n### Fokus na Prevenciji Povreda (Eric Cressey)\nSvaka sesija uključuje posvećen rad na prevenciji povreda: zdravlje ramena (razvlačenje traka (Band Pull-Aparts), povlačenja ka licu (Face Pulls), vanjska rotacija), mobilnost kukova (90/90 prebacivanja, opseg pokreta kukova (Hip CARs), rad na aduktorima) i mobilnost gležnjeva/zglobova. Prevencija je ugrađena u zagrijavanje, a ne tretirana kao naknadna misao.\n\n### Programiranje Specifično za Borce (Phil Daru)\nSložene vježbe su odabrane za direktan prijenos u kavez. Vježbe oponašaju vektore sile, uglove zglobova i energetske zahtjeve borbe. Potisak s minom (Landmine Press) za rad u klinču, opterećeni bijeg kukovima s trakama (Hip Escapes), turski ustajanja (Turkish Get-Ups) za prelaze iz ležećeg u stojeći položaj.\n\n---\n\n## Kako Čitati Planove\n\n### RPE Skala (Ocjena Percipiranog Napora)\n\n| RPE | Opis |\n|-----|------|\n| 1-2 | Veoma lagano — jedva ikakav napor |\n| 3-4 | Lagano — lagan razgovor, intenzitet zagrijavanja |\n| 5-6 | Umjereno — stalan napor, moguć razgovor u kratkim rečenicama |\n| 7 | Teško — izazovno, moguća još 3 ponavljanja |\n| 8 | Veoma teško — moguće još 1-2 ponavljanja |\n| 9 | Blizu maksimuma — možda još 1 ponavljanje uz dobru formu |\n| 10 | Maksimalno — apsolutna granica, forma se može narušiti |\n\n### Opterećenje Bazirano na Procentima\n\nSve vježbe sa šipkom su programirane kao procenat vašeg procijenjenog 1-ponavljajućeg maksimuma (1RM). Na primjer, \"Čučanj sa šipkom (Back Squat) 4x3 @ 80%\" znači 4 serije po 3 ponavljanja na 80% vašeg 1RM za čučanj sa šipkom (u ovom slučaju 120 kg).\n\n### Oznaka Tempa\n\nZapisuje se kao četiri broja: **Ekscentrična-Pauza na Dnu-Koncentrična-Pauza na Vrhu**\n\nPrimjer: **3-1-1-0**\n- **3** = 3 sekunde spuštanja tegova (ekscentrična faza)\n- **1** = 1 sekunda pauze u donjem položaju\n- **1** = 1 sekunda podizanja tegova (koncentrična faza)\n- **0** = 0 sekundi pauze na vrhu prije sljedećeg ponavljanja\n\n**X** u koncentričnoj poziciji znači eksplozivno (pokreni se što brže moguće).\n\n### Zone Srčanog Ritma\n\n| Zona | Naziv | Raspon BPM | Osjećaj |\n|------|-------|------------|---------|\n| Zona 1 | Oporavak | 100-120 BPM | Veoma lagano, moguć puni razgovor |\n| Zona 2 | Aerobna baza | 130-150 BPM | Ugodno, moguće održavati 60+ min |\n| Zona 3 | Tempo | 150-165 BPM | Umjereno teško, razgovor u fragmentima |\n| Zona 4 | Prag | 165-180 BPM | Teško, moguće izgovoriti samo par riječi |\n| Zona 5 | Maksimalni napor | 180+ BPM | Sve iz sebe, neodrživo duže od 30-60 sekundi |\n\n*Rasponi BPM su približni za treniranog muškog sportistu starosti 25-35 godina. Prilagodite prema individualnom maksimalnom srčanom ritmu.*\n\n### Oznake Intenziteta Sesije\n\n- 🟢 **Lagano** — Tempo oporavka, nizak zahtjev na CNS, trebali biste se osjećati osvježeno nakon\n- 🟡 **Umjereno** — Naporan rad ali kontrolisan, podnošljiv umor\n- 🔴 **Teško** — Visok zahtjev, očekuje se značajan umor, planirajte oporavak u skladu s tim\n\n---\n\n## Procijenjeni 1RM Korišteni za Programiranje\n\n| Vježba | Procijenjeni 1RM |\n|--------|------------------|\n| Čučanj sa šipkom (Back Squat) | 150 kg |\n| Mrtvo dizanje (Deadlift) | 180 kg |\n| Potisak s klupe (Bench Press) | 115 kg |\n| Potisak iznad glave (Overhead Press) | 75 kg |\n\nOvi brojevi određuju sva opterećenja bazirana na procentima u programu. Ponovo procijenite na kraju svakog mezociklusa.\n\n---\n\n## Potrebna Oprema\n\n### Oprema za Teretanu\n- Šipka i tegovi (do 180+ kg)\n- Bučice (raspon do 40+ kg)\n- Girje (Kettlebells) (16 kg, 20 kg, 24 kg, 28 kg, 32 kg)\n- Šipka za zgibove (Pull-up bar)\n- Stalak za propadanja (Dip station)\n- Assault bicikl / Airdyne\n- Veslačka mašina (Concept2 ili slično)\n- Ski erg\n- Elastične trake — lagane, srednje, teške\n- Medicinske lopte (4 kg, 6 kg, 8 kg, 10 kg)\n- Borbena užad (Battle Ropes)\n- Malj + guma\n- Valjak za masažu (Foam Roller)\n- Lopta za masažu (Lacrosse Ball)\n\n### Praćenje\n- Monitor srčanog ritma — preporučuje se traka za grudi (pogledajte odjeljak Praćenje ispod)\n\n### MMA Teretana\n- Teška vreća (Heavy Bag)\n- Tajlandski fokuseri (Thai Pads)\n- Fokus rukavice (Focus Mitts)\n- Rvačke strunjače\n- Pristup kavezu\n\n---\n\n## Preporučeno Praćenje\n\n| Alat | Svrha | Preporuka |\n|------|-------|-----------|\n| Monitor srčanog ritma | Intenzitet sesije, praćenje srčanog minutnog volumena, oporavak | Polar H10 ili Garmin HRM-Pro (traka za grudi za preciznost) |\n| Dnevnik treninga | Praćenje opterećenja, serija, ponavljanja i bilješki sesije | Google Sheets, aplikacija Strong, ili fizička bilježnica |\n| Praćenje RPE | Praćenje umora i spremnosti svake sesije | Zabilježite RPE za svaku radnu seriju i ukupni RPE sesije |\n| Sedmično vaganje | Praćenje trendova tjelesne kompozicije | Isti uslovi svaki put: ujutro, natašte, nakon toaleta |\n| Srčani ritam u mirovanju | Praćenje oporavka i rizika od pretreniranosti | Izmjerite pri buđenju prije ustajanja iz kreveta, bilježite dnevno |\n\nRastući srčani ritam u mirovanju (5-7+ BPM iznad bazne linije tokom nekoliko dana) je rani znak nakupljenog umora ili bolesti. Razmotrite smanjenje treninga ako se ovo dogodi.\n", "schedule": "# 4-Sedmični Raspored Treninga — Kalendarski Pregled\n\n## Ključ Intenziteta\n\n| Oznaka | Značenje |\n|--------|----------|\n| 🟢 | Lagano — tempo oporavka, nizak zahtjev na CNS |\n| 🟡 | Umjereno — naporan rad ali kontrolisan |\n| 🔴 | Teško — visok zahtjev, planirajte oporavak u skladu s tim |\n\n---\n\n## Sedmica 1 — Bazni Volumen\n\n**Fokus:** Kvalitet pokreta, uspostavljanje baznih opterećenja, RPE 6-7 tokom svih sesija.\n\n| Dan | Jutarnja Sesija | Popodnevna Sesija |\n|-----|----------------|-------------------|\n| **Ponedjeljak** | Snaga — Gornji Dio Potisak/Povlačenje (60 min) 🟡 | MMA Udarci (Striking) (75 min) 🔴 |\n| **Utorak** | Kardio Srčani Minutni Volumen (Cardiac Output) (40 min) 🟢 | MMA Grappling (Grappling) (75 min) 🟡 |\n| **Srijeda** | Snaga — Donji Dio Tijela + Zadnji Lanac (65 min) 🔴 | Lagana Tehnika / Otvoreni Mat (60 min) 🟢 |\n| **Četvrtak** | HIIT / Borbeno Specifični Krug (35 min) 🔴 | MMA Sparring (Sparring) (90 min) 🔴 |\n| **Petak** | Snaga — Puni Tijelo Eksplozivnost (55 min) 🟡 | MMA Drilling — Usavršavanje Tehnike (75 min) 🟡 |\n| **Subota** | Borbena Kondicija / Aktivni Oporavak (40 min) 🟡 | Otvoreni Mat / Lagana Tehnika (60 min) 🟢 |\n| **Nedjelja** | ODMOR | ODMOR |\n\n### Sedmica 1 — Pregled Volumena\n\n| Metrika | Vrijednost |\n|---------|-----------|\n| Ukupno sesija | 12 |\n| Ukupno sati treninga | ~12.5 sati |\n| Sesije snage | 3 |\n| MMA/Vještine sesije | 5 |\n| Sesije kondicije | 3 |\n| Aktivni oporavak | 1 |\n| Distribucija intenziteta | 🟢 x3 / 🟡 x5 / 🔴 x4 |\n\n### Sedmica 1 — Napomene o Progresiji\n- Glavne vježbe na 70-75% 1RM, 3-4 serije po 3-5 ponavljanja\n- Kondicija: 3-4 runde po krugu, omjer rada i odmora 1:2\n- Srčani minutni volumen (Cardiac Output): održavajte Zonu 2 (130-150 BPM) tokom cijelog trajanja\n- Sparring (Sparring): kontrolisan, ~70% intenziteta, fokus na primjeni specifičnih tehnika\n- Zabilježite sva opterećenja, RPE i podatke o srčanom ritmu za uspostavljanje baznih vrijednosti\n\n---\n\n## Sedmica 2 — Progresivno Preopterećenje\n\n**Fokus:** Inkrementalno povećanje opterećenja, +1 runda kondicije, RPE 7-8.\n\n| Dan | Jutarnja Sesija | Popodnevna Sesija |\n|-----|----------------|-------------------|\n| **Ponedjeljak** | Snaga — Gornji Dio Potisak/Povlačenje (60 min) 🟡 | MMA Udarci (Striking) (75 min) 🔴 |\n| **Utorak** | Kardio Srčani Minutni Volumen (Cardiac Output) (45 min) 🟢 | MMA Grappling (Grappling) (75 min) 🟡 |\n| **Srijeda** | Snaga — Donji Dio Tijela + Zadnji Lanac (65 min) 🔴 | Lagana Tehnika / Otvoreni Mat (60 min) 🟢 |\n| **Četvrtak** | HIIT / Borbeno Specifični Krug (40 min) 🔴 | MMA Sparring (Sparring) (90 min) 🔴 |\n| **Petak** | Snaga — Puni Tijelo Eksplozivnost (55 min) 🟡 | MMA Drilling — Usavršavanje Tehnike (75 min) 🟡 |\n| **Subota** | Borbena Kondicija / Aktivni Oporavak (45 min) 🟡 | Otvoreni Mat / Lagana Tehnika (60 min) 🟢 |\n| **Nedjelja** | ODMOR | ODMOR |\n\n### Sedmica 2 — Pregled Volumena\n\n| Metrika | Vrijednost |\n|---------|-----------|\n| Ukupno sesija | 12 |\n| Ukupno sati treninga | ~13.0 sati |\n| Sesije snage | 3 |\n| MMA/Vještine sesije | 5 |\n| Sesije kondicije | 3 |\n| Aktivni oporavak | 1 |\n| Distribucija intenziteta | 🟢 x3 / 🟡 x5 / 🔴 x4 |\n\n### Sedmica 2 — Napomene o Progresiji\n- Glavne vježbe: +2.5 kg na gornje vježbe, +5 kg na donje vježbe (ili +1 serija na pomoćne vježbe)\n- Kondicija: +1 runda po krugu, lagano skratite intervale odmora (omjer rada i odmora 1:1.5)\n- Srčani minutni volumen (Cardiac Output): produžite trajanje za 5 min, održavajte Zonu 2\n- Sparring (Sparring): povećajte intenzitet na ~75-80%, počnite pritiskati tempo\n- Pomoćne vježbe: dodajte 1 seriju na 2-3 vježbe\n\n---\n\n## Sedmica 3 — Vršni Volumen / Intenzitet\n\n**Fokus:** Najteža sedmica bloka, RPE 8-9, gurajte sve kvalitete.\n\n| Dan | Jutarnja Sesija | Popodnevna Sesija |\n|-----|----------------|-------------------|\n| **Ponedjeljak** | Snaga — Gornji Dio Potisak/Povlačenje (65 min) 🔴 | MMA Udarci (Striking) (75 min) 🔴 |\n| **Utorak** | Kardio Srčani Minutni Volumen (Cardiac Output) (45 min) 🟢 | MMA Grappling (Grappling) (80 min) 🔴 |\n| **Srijeda** | Snaga — Donji Dio Tijela + Zadnji Lanac (70 min) 🔴 | Lagana Tehnika / Otvoreni Mat (60 min) 🟢 |\n| **Četvrtak** | HIIT / Borbeno Specifični Krug (40 min) 🔴 | MMA Sparring (Sparring) (90 min) 🔴 |\n| **Petak** | Snaga — Puni Tijelo Eksplozivnost (60 min) 🔴 | MMA Drilling — Usavršavanje Tehnike (75 min) 🟡 |\n| **Subota** | Borbena Kondicija (45 min) 🔴 | Otvoreni Mat / Lagana Tehnika (60 min) 🟢 |\n| **Nedjelja** | ODMOR | ODMOR |\n\n### Sedmica 3 — Pregled Volumena\n\n| Metrika | Vrijednost |\n|---------|-----------|\n| Ukupno sesija | 12 |\n| Ukupno sati treninga | ~13.75 sati |\n| Sesije snage | 3 |\n| MMA/Vještine sesije | 5 |\n| Sesije kondicije | 3 |\n| Aktivni oporavak | 1 |\n| Distribucija intenziteta | 🟢 x3 / 🟡 x1 / 🔴 x8 |\n\n### Sedmica 3 — Napomene o Progresiji\n- Glavne vježbe na 80-85% 1RM, gurajte top serije do RPE 8-9\n- Kondicija: vršni broj rundi (5-6 po krugu), omjer rada i odmora 1:1\n- Srčani minutni volumen (Cardiac Output): održavajte 45 min Zone 2 — ovo je sidro oporavka, ne gurajte intenzitet\n- Sparring (Sparring): najteža sesija bloka, razmjene punom brzinom, simulirajte tempo borbe\n- Grappling (Grappling): dodajte runde pozicionog sparringa, povećajte otpor od partnera\n- Očekujte značajan umor do Četvrtka/Petka — pažljivo upravljajte snom i ishranom\n\n---\n\n## Sedmica 4 — Rasterećenje (Deload)\n\n**Fokus:** Oporavak i superkompenzacija, volumen smanjen 40-50%, intenzitet na 70-75%, bez teškog sparringa.\n\n| Dan | Jutarnja Sesija | Popodnevna Sesija |\n|-----|----------------|-------------------|\n| **Ponedjeljak** | Snaga — Gornji Dio Potisak/Povlačenje (40 min) 🟢 | MMA Udarci — Lagana Tehnika (50 min) 🟡 |\n| **Utorak** | Kardio Srčani Minutni Volumen (Cardiac Output) (30 min) 🟢 | MMA Grappling — Lagano Kotrljanje (Flow Rolling) (50 min) 🟢 |\n| **Srijeda** | Snaga — Donji Dio Tijela + Zadnji Lanac (40 min) 🟢 | Mobilnost / Yoga / Oporavak (45 min) 🟢 |\n| **Četvrtak** | Lagana Kondicija — Samo Zona 1-2 (25 min) 🟢 | MMA Tehnički Drilling — Bez Sparringa (60 min) 🟡 |\n| **Petak** | Snaga — Puni Tijelo (35 min) 🟢 | MMA Drilling — Usavršavanje Tehnike (50 min) 🟢 |\n| **Subota** | Aktivni Oporavak — Lagani Kardio (30 min) 🟢 | Otvoreni Mat / Lagana Tehnika (45 min) 🟢 |\n| **Nedjelja** | ODMOR | ODMOR |\n\n### Sedmica 4 — Pregled Volumena\n\n| Metrika | Vrijednost |\n|---------|-----------|\n| Ukupno sesija | 12 |\n| Ukupno sati treninga | ~8.3 sati |\n| Sesije snage | 3 |\n| MMA/Vještine sesije | 5 |\n| Sesije kondicije | 2 |\n| Aktivni oporavak | 2 |\n| Distribucija intenziteta | 🟢 x10 / 🟡 x2 / 🔴 x0 |\n\n### Sedmica 4 — Napomene o Progresiji\n- Glavne vježbe: smanjite na 2-3 serije po 3 ponavljanja na 70-75% 1RM, fokus na brzinu i čistu tehniku\n- Smanjite sve pomoćne vježbe na maksimalno 2 serije, smanjite opterećenje za 30-40%\n- Kondicija: samo kardio Zone 1-2 (srčani ritam ispod 150 BPM u svakom trenutku)\n- Bez sparringa — zamijenite laganim tehničkim kotrljanjima i pozicionim tokom\n- Prioritizirajte san (8-9 sati), hidrataciju i kvalitet ishrane\n- Koristite rad na mekim tkivima dnevno (valjak za masažu, lopta za masažu, istezanje)\n- Ponovo procijenite 1RM i srčani ritam u mirovanju na kraju sedmice za procjenu adaptacije\n\n---\n\n## Pregled 4-Sedmičnog Bloka\n\n| Sedmica | Ukupno sati | Broj sesija | Prosječni intenzitet | Ključna tema |\n|---------|------------|-------------|---------------------|--------------|\n| Sedmica 1 | ~12.5 sati | 12 | 🟡 Umjereno | Izgradnja baze, uspostavljanje obrazaca |\n| Sedmica 2 | ~13.0 sati | 12 | 🟡 Umjereno | Progresivno preopterećenje |\n| Sedmica 3 | ~13.75 sati | 12 | 🔴 Teško | Vršni volumen i intenzitet |\n| Sedmica 4 | ~8.3 sati | 12 | 🟢 Lagano | Rasterećenje i oporavak |\n| **Ukupno** | **~47.5 sati** | **48** | — | **Opšta Priprema** |\n\n### Distribucija Intenziteta Kroz Blok\n\n| Intenzitet | Sedmica 1 | Sedmica 2 | Sedmica 3 | Sedmica 4 | Ukupno |\n|------------|-----------|-----------|-----------|-----------|--------|\n| 🟢 Lagano | 3 | 3 | 3 | 10 | 19 |\n| 🟡 Umjereno | 5 | 5 | 1 | 2 | 13 |\n| 🔴 Teško | 4 | 4 | 8 | 0 | 16 |\n\n---\n\n## Smjernice za Razmak Između Sesija\n\n- **Minimum 6 sati** između jutarnje sesije snage i popodnevne MMA sesije\n- **48 sati** između teškog treninga donjih ekstremiteta i teškog sparringa kada je moguće\n- **Bez uzastopnih 🔴 dana** osim tokom vršne Sedmice 3 (Četvrtak)\n- **Nakon 🔴 sesija**: prioritizirajte 15 min hlađenja, valjak za masažu i unos proteina unutar 60 min\n", "week-1": "# Sedmica 1 — Bazni Volumen\n\n> **Mezociklus:** Baza / Akumulacija\n> **Kontekst trenažnog iskustva:** Srednje-Napredni\n> **Tjelesna masa:** 87-90 kg | **Visina:** 185 cm\n> **Globalni RPE cilj:** 6-7 (ostaviti 3-4 ponavljanja u rezervi na svim vježbama snage)\n> **Tema:** Kvaliteta pokreta, uspostavljanje početnih vrijednosti, konzervativno opterećenje\n> **1RM-ovi:** Čučanj 150 kg | Mrtvo dizanje 180 kg | Potisak s klupe 115 kg | Potisak iznad glave 75 kg\n\n---\n\n## Ponedjeljak\n\n### Jutro — Snaga: Gornji dio tijela Potisak/Povlačenje (60 min) 🟡\n\n**Zagrijavanje** (10 min) — Pogledaj `warmups.md` za kompletan protokol zagrijavanja gornjeg dijela tijela\n\n| Vježba | Serije x Ponavljanja | Opterećenje | Odmor | Tempo | RPE | Napomene |\n|--------|----------------------|-------------|-------|-------|-----|----------|\n| Potisak s klupe (Bench Press) | 4 x 4 | 82 kg (71%) | 3 min | 3-1-1-0 | 6-7 | Povuci lopatice, stopala ravno na podu, kontroliši ekscentričnu fazu. Bez odskakanja od grudi. |\n| Zgibovi s opterećenjem (Weighted Pull-Up) | 4 x 4 | TM + 15 kg | 3 min | 3-1-1-0 | 6-7 | Početak iz mrtvog visa, brada iznad šipke, bez njihanja. Puna ekstenzija svako ponavljanje. |\n| Potisak s minom (Landmine Press) | 3 x 8 | Umjereno | 90 s | 2-0-1-0 | 6 | Razmaknuti stav, potisak pod blagim uglom. Stabilizuj trup tokom cijele vježbe. |\n| Jednoručno veslanje s bučicom (DB Row) | 3 x 10 | Umjereno | 90 s | 2-1-1-0 | 6 | Sa osloncem na grudi ili rukom na klupi. Povuci prema kuku, stisni na vrhu. |\n| Varijacija sklekova (na ringovima ili s deficitom) | 3 x 12-15 | TM | 60 s | 2-0-1-0 | 6 | Puni opseg pokreta, protrakcija lopatica na vrhu. Sporo i kontrolisano. |\n| Povlačenje za lice (Face Pull) | 3 x 15 | Lagana guma/sajla | 60 s | 2-1-1-0 | 5-6 | Vanjska rotacija na vrhu, palčevi nazad. Prevencija povreda — ne žuri. |\n| Vanjska rotacija s gumom (Band External Rotation) | 2 x 15 | Lagana guma | 45 s | 2-1-1-0 | 5 | Lakat priljubljen uz tijelo. Rad na zdravlju ramena. |\n| Pallof potisak (Pallof Press) | 3 x 10/strana | Guma/sajla | 60 s | 2-1-2-0 | 6 | Potpuno ispruži ruke, odupri se rotaciji. Diši. |\n| Trbušni kotačić (Ab Wheel Rollout) | 3 x 8 | TM | 60 s | 3-0-1-0 | 6 | Sa koljena. Održavaj šuplji položaj tijela, bez ekstenzije lumbalnog dijela na dnu. |\n\n**Ukupno sesije:** 28 radnih serija, ~55 min\n\n**Hlađenje** (5 min) — Istezanje prsnih mišića na vratima 2x30s/strana, istezanje latisimusa s gumom 2x30s/strana, pjenasti valjak torakalni dio 60s.\n\n---\n\n### Poslijepodne — MMA Udarci (75 min) 🔴\n\n**Zagrijavanje** (10 min) — Preskakanje užeta 3 min, dinamičko istezanje, kruženje vratom, lagani shadow boxing 2 min.\n\n| Blok | Trajanje | Opis |\n|------|----------|------|\n| Shadow Boxing | 3 x 3 min (1 min odmor) | Samo boks. Fokus na stav, povratak garde, rad nogu. Snimi jednu rundu za pregled s trenerom. |\n| Rad na fokuseru / Vreći | 3 x 3 min (1 min odmor) | Specifične kombinacije prema uputama trenera. Brzi udarci, ne nabijaj. Diši uz svaki udarac. |\n| Vježbe s partnerom | 3 x 3 min (1 min odmor) | Tehnika pod vodstvom trenera — fokus na čista ponavljanja, ne na brzinu. Resetuj između kombinacija. |\n| Slobodne runde | 2 x 5 min (2 min odmor) | Samo boks. 70% intenziteta. Prioritet odbrana i kretanje u ringu nad outputom. |\n\n**Hlađenje** (5 min) — Statičko istezanje: fleksori kuka, ramena, vrat. Lagani shadow boxing 1 min za opuštanje.\n\n---\n\n## Utorak\n\n### Jutro — Kardio-aerobni rad (40 min) 🟢\n\n**Zagrijavanje** (5 min) — Lagano zagrijavanje na odabranom modalitetu.\n\n| Blok | Trajanje | Intenzitet | Napomene |\n|------|----------|------------|----------|\n| Zona 2 — Kontinuirani rad | 40 min | 130-150 BPM | Assault bike, veslač ili lagano trčanje. Odaberi jedno i održavaj stabilan puls. Disanje kroz nos koliko je moguće. Trebao bi moći voditi razgovor. |\n\n> **Ciljni puls:** Drži se u rasponu 130-150 BPM. Ako puls prijeđe 150, smanji tempo. Ovo je aerobni bazni rad — nemoj ga pretvarati u tempo sesiju.\n\n**Hlađenje** (5 min) — Hodanje 2-3 min, lagano istezanje cijelog tijela.\n\n---\n\n### Poslijepodne — MMA Grappling (75 min) 🔴\n\n**Zagrijavanje** (10 min) — Hip escape-ovi, tehnički ustanci, granby rolovi, solo vježbe kretanja.\n\n| Blok | Trajanje | Opis |\n|------|----------|------|\n| Poziciono vježbanje | 20 min | Zadržavanje garde i izlasci iz mounta. Tehnika pod vodstvom trenera. Fokus na okvire, pokret kukova i disanje pod pritiskom. |\n| Specifični trening | 10 min | Počni iz pozicija vježbanih iznad. Reset na izlazak ili polaganje. |\n| Slobodno kotrljanje | 5 x 5 min (1 min odmor) | 70% intenziteta. Mentalitet protočnog kotrljanja — radi pozicije, ne stišći na smrt. Tapaj rano, resetuj brzo. |\n\n**Hlađenje** (10 min) — Istezanje s partnerom, 90/90 držanje kukova, ležeći spinalni zaokret 60s/strana.\n\n---\n\n## Srijeda\n\n### Jutro — Snaga: Donji dio tijela + Stražnji lanac (65 min) 🟡\n\n**Zagrijavanje** (10 min) — Pogledaj `warmups.md` za kompletan protokol zagrijavanja donjeg dijela tijela\n\n| Vježba | Serije x Ponavljanja | Opterećenje | Odmor | Tempo | RPE | Napomene |\n|--------|----------------------|-------------|-------|-------|-----|----------|\n| Čučanj (Back Squat) | 4 x 4 | 108 kg (72%) | 3 min | 3-1-1-0 | 6-7 | Snažan brace, koljena prate prste, kontroliši spuštanje. Kratka pauza na dnu. |\n| Rumunjsko mrtvo dizanje (RDL) | 4 x 5 | 125 kg (69%) | 3 min | 3-1-1-0 | 6-7 | Pregib u kukovima, blago savijena koljena, šipka blizu nogu. Osjeti opterećenje zadnje lože. Bez zaokruživanja donjeg dijela leđa. |\n| Bugarski čučanj (Rear Foot Elevated Split Squat) | 3 x 8/noga | Umjerena bučica | 90 s/noga | 2-1-1-0 | 6 | Potkoljenica prednje noge vertikalna, trup uspravan. Kontroliši ekscentričnu fazu. |\n| Jednonožno rumunjsko mrtvo dizanje (Single-Leg RDL) | 3 x 8/noga | Lagana-umjerena bučica | 90 s/noga | 3-0-1-0 | 6 | Pregibni obrazac, održavaj ravne kukove. Lagani dodir poda ili kratka pauza. |\n| Kopenhaški plank (Copenhagen Plank) | 3 x 20s/strana | TM | 60 s | Izometrički | 6 | Gornja noga na klupi, održavaj ravnu liniju. Prevencija povreda aduktora. |\n| 90/90 rotacija kukova (90/90 Hip Switch) | 2 x 10 | TM | 45 s | Kontrolisano | — | Rad na mobilnosti. Glatke tranzicije, ne forsirati opseg pokreta. |\n| Podizanje nogu u visu (Hanging Leg Raise) | 3 x 10 | TM | 60 s | 2-1-1-0 | 6 | Kontrolisano — bez njihanja. Posteriorna rotacija karlice na vrhu. |\n| Mrtva buba (Dead Bug) | 3 x 8/strana | TM | 60 s | 3-0-1-0 | 5-6 | Pritisni donji dio leđa u pod. Potpuno izdahni dok se udovi ispružaju. |\n\n**Ukupno sesije:** 28 radnih serija, ~60 min\n\n**Hlađenje** (5 min) — Istezanje fleksora kuka uz kauč 2x30s/noga, golubiji isteg 2x30s/strana, pjenasti valjak listovi 60s/strana.\n\n---\n\n### Poslijepodne — Lagana tehnika / Otvoreni mat (60 min) 🟢\n\n**Zagrijavanje** (10 min) — Tok kretanja: životinjsko puzanje, lagani shadow boxing, solo grappling vježbe.\n\n| Blok | Trajanje | Opis |\n|------|----------|------|\n| Pregled tehnike | 30 min | Pod vodstvom trenera ili samostalno. Ponovi tehnike od ponedjeljka/utorka. Spora ponavljanja, fokus na detalje. Postavljaj pitanja. |\n| Lagani pozicioni sparring | 20 min | 50-60% intenziteta. Odaberi specifične pozicije za rad. Bez ega, bez paničnih reakcija — samo ponavljanja. |\n\n**Hlađenje** (10 min) — Statičko istezanje cijelog tijela. Pjenasti valjak na ukočenim mjestima od jutarnjeg čučnja.\n\n> **Napomena:** Ovo je sesija orijentisana na oporavak. Drži intenzitet NISKIM. Jutarnji čučnjevi će te umoriti — poštuj to.\n\n---\n\n## Četvrtak\n\n### Jutro — HIIT / Borbeni krug (35 min) 🔴\n\n**Zagrijavanje** (8 min) — Lagani bike/veslač 3 min, dinamičko istezanje, 2 x 10s sprinta na biku za pripremu.\n\n**Opcija A — Intervali na Assault biku**\n\n| Blok | Rad | Odmor | Runde | Napomene |\n|------|-----|-------|-------|----------|\n| Sprintovi na Assault biku | 30 s maksimalni napor | 30 s lagano vrtenje | 8 | Sjedeći, ruke i noge pokreću. Prati kalorije ili wate po rundi za početne vrijednosti. |\n\n**Opcija B — Veslačka ponavljanja**\n\n| Blok | Rad | Odmor | Runde | Napomene |\n|------|-----|-------|-------|----------|\n| 500 m veslanje | ~1:45-2:00 tempo | 2 min lagano | 4 | Konstantan tempo kroz sva 4 ponavljanja. Zabilježi split vremena za početne vrijednosti. |\n\n> **Napomena za Sedmicu 1:** Odaberi jednu opciju i drži je se kroz cijeli blok. Zabilježi sve rezultate — to su tvoje početne vrijednosti. RPE bi trebao biti težak ali izvediv. Ne daj sve od sebe u prvoj rundi.\n\n**Hlađenje** (5 min) — Hodanje 2 min, dijafragmalno disanje 2 min (box disanje 4-4-4-4), lagano istezanje.\n\n---\n\n### Poslijepodne — MMA Sparring (90 min) 🔴\n\n**Zagrijavanje** (15 min) — Preskakanje užeta 5 min, shadow boxing 3 x 2 min, vježba ogledala s partnerom 2 min, lagane tehničke izmjene 3 min.\n\n| Blok | Trajanje | Opis |\n|------|----------|------|\n| Tehnički sparring | 5 x 5 min (1 min odmor) | Samo boks. 70% intenziteta. **Prioriteti Sedmice 1:** kretanje glave, mehanika džeba, održavanje distance. Ne juri nokdaune. |\n| Analiza runde | 5 min | Brza samoprocjena nakon svake runde. Šta je radilo, šta je propušteno. |\n\n> **Pravila sparringa Sedmice 1:**\n> - Samo boks (bez udaraca nogama, bez klinča osim ako trener ne kaže drugačije)\n> - Ograničenje snage na 70% — fokus na tajming i plasman, ne na štetu\n> - Odbrana na prvom mjestu: ako primaš čiste udarce, uspori i resetuj\n> - Odaberi JEDNU stvar za rad po rundi (npr. runda 1 = džeb, runda 2 = kretanje glave)\n\n**Hlađenje** (10 min) — Izometrija vrata 3x10s/smjer, statičko istezanje, led na sve što je potrebno.\n\n---\n\n## Petak\n\n### Jutro — Snaga: Cijelo tijelo — Eksplozivnost (55 min) 🟡\n\n**Zagrijavanje** (10 min) — Pogledaj `warmups.md` za kompletan protokol dana eksplozivnosti (naglasak na pripremu CNS-a: skokovi, bacanja medicinke)\n\n| Vježba | Serije x Ponavljanja | Opterećenje | Odmor | Tempo | RPE | Napomene |\n|--------|----------------------|-------------|-------|-------|-----|----------|\n| Vučenje iz visa (Hang Clean) | 4 x 3 | 72 kg (~70%) | 2.5 min | Eksplozivno | 6-7 | Trostruka ekstenzija, laktovi visoko i brzo. Dočekaj u četvrt prednjem čučnju. Resetuj svako ponavljanje. |\n| Potisak s nogama (Push Press) | 4 x 3 | 54 kg (72%) | 2.5 min | Eksplozivno | 6-7 | Kontrolisan spust, agresivan potisak. Zaključaj iznad glave, pauza 1s na vrhu. |\n| Skok na kutiju (Box Jump) | 4 x 3 | TM (60-76 cm kutija) | 90 s | Eksplozivno | 6 | Siđi s kutije između ponavljanja. Puna ekstenzija kukova na vrhu. Fokus na brzinu razvoja sile. |\n| Bacanje medicinke u pod (Med Ball Slam) | 3 x 6 | 8-10 kg | 90 s | Eksplozivno | 6 | Potpuni doseg iznad glave, udari kroz pod. Potpuno resetuj između ponavljanja. |\n| Zamah girjom (KB Swing) | 3 x 10 | 26 kg | 90 s | Eksplozivno | 6-7 | Ruski zamah (do visine očiju). Obrazac pregib-udarac, gluteusi pokreću. Čvrst trup na vrhu. |\n| Turski ustanak (Turkish Get-Up) | 2 x 3/strana | 16 kg | 90 s/strana | Kontrolisano | 6 | Sporo i namjerno. Pogled na teg tokom cijelog pokreta. Ovo je rad na kvaliteti pokreta. |\n| Nošenje utega u rukama (Farmer's Carry) | 3 x 40 m | Teške bučice/girje | 90 s | Kontrolisano | 6-7 | Uspravan položaj, ramena spuštena, bez bočnog naginjanja. Stisni snažno, diši. |\n\n**Ukupno sesije:** 23 radne serije, ~50 min\n\n**Hlađenje** (5 min) — Kruženje zglobovima ruku, istezanje fleksora kuka 2x30s/strana, torakalna ekstenzija na pjenastom valjku 60s.\n\n---\n\n### Poslijepodne — MMA Vježbanje tehnike (75 min) 🟡\n\n**Zagrijavanje** (10 min) — Vježbe pokreta: ljestve agilnosti, vježbe reakcije, lagani shadow rad.\n\n| Blok | Trajanje | Opis |\n|------|----------|------|\n| Fokusirano vježbanje tehnike | 45 min | Tehnika pod vodstvom trenera. Veliki volumen, nizak intenzitet. Prioritet preciznost nad brzinom. Pravi bilješke o korekcijama. |\n| Pozicioni sparring | 30 min | Počni iz specifičnih pozicija. 60-70% intenziteta. Primijeni uvježbane tehnike u živom kontekstu. Često resetuj. |\n\n**Hlađenje** (5 min) — Istezanje s partnerom, duboko disanje, pregled bilješki sesije.\n\n> **Napomena:** Jutro je bila sesija eksplozivnosti — CNS može biti umoran. Intenzitet vježbanja bi trebao biti umjeren. Fokus na upijanje tehnike, ne na atletski output.\n\n---\n\n## Subota\n\n### Jutro — Borbena kondicija / Aktivni oporavak (40 min) 🟡\n\n**Zagrijavanje** (5 min) — Lagano preskakanje užeta 2 min, dinamičko istezanje, kruženje rukama, čučnjevi s vlastitom težinom.\n\n**Krug simulacije borbe — 3 runde**\n\n| Vježba | Trajanje/Ponavljanja | Napomene |\n|--------|----------------------|----------|\n| Rad na teškoj vreći | 60 s | Miješaj kombinacije — džeb-kros-kroše, udarci u tijelo. Budi tehničan. |\n| Spraulovi (Sprawls) | 8 ponavljanja | Brz pad, kukovi u pod, nazad u stav. |\n| Shadow Boxing | 60 s | Naglasak na rad nogu — uglovi, pivoti, promjene nivoa. |\n| Burpiji | 8 ponavljanja | Grudi do poda, eksplozivan skok. Tempiraj se. |\n| Shadow Boxing (lijevi stav) | 60 s | Radi na slabijoj strani. Džeb i pomakni se. |\n\n> **Struktura runde:** Izvrši sve vježbe jednu za drugom = 1 runda (~5 min). Odmor 2 min između rundi. Ukupno 3 runde.\n> **Intenzitet Sedmice 1:** 70-75%. Ovo nije test maksimalnog napora. Održavaj formu kroz sve 3 runde. Zabilježi kako se osjećaš za početno poređenje.\n\n**Hlađenje** (5 min) — Hodanje 2 min, statičko istezanje cijelog tijela, dijafragmalno disanje.\n\n---\n\n### Poslijepodne — Otvoreni mat / Lagana tehnika (60 min) 🟢\n\n**Zagrijavanje** (10 min) — Solo vježbe kretanja, lagano protočno kotrljanje s partnerom.\n\n| Blok | Trajanje | Opis |\n|------|----------|------|\n| Istraživanje tehnike | 30 min | Radi na bilo čemu iz sedmice. Vježbaj slabe pozicije. Pitaj iskusnije za savjete. Bez ega. |\n| Protočno kotrljanje | 20 min | 50% intenziteta. Uhvati i pusti — radi tranzicije, ne drži polaganja. Kreći se neprekidno. |\n\n**Hlađenje** (10 min) — Produženo statičko istezanje: zadnja loža, fleksori kuka, ramena, torakalni dio kičme. Pjenasti valjak cijelo tijelo. Ovo je tvoja posljednja sesija prije dana odmora — uloži u oporavak.\n\n---\n\n## Nedjelja — ODMOR 🟢\n\nBez strukturiranog treninga. Puni dan oporavka.\n\n**Kontrolna lista oporavka:**\n- [ ] Spavanje 8-9 sati\n- [ ] Hidratacija: minimum 3-4 L vode\n- [ ] Cilj proteina: 2 g/kg tjelesne mase (~180 g)\n- [ ] Priprema obroka za preostale dane Sedmice 1\n- [ ] Pjenasti valjak / lagana mobilnost po želji (maksimalno 15-20 min)\n- [ ] Pregled dnevnika treninga Sedmice 1 — zabilježi bilo kakvu bol, umor ili tehničke napretke\n- [ ] Mentalna priprema: vizualiziraj ključne tehnike iz sedmice\n\n> **Napomena o oporavku Sedmice 1:** Ako si neuobičajeno ukočen ili umoran do nedjelje, to su podaci. Sedmica baznog volumena bi trebala biti izvediva. Ako nije, prilagođavamo opterećenje Sedmice 2 prije progresije.\n\n---\n\n## Rezime Sedmice 1\n\n| Metrika | Cilj |\n|---------|------|\n| Sesije snage | 3 (Pon / Sri / Pet jutro) |\n| MMA sesije | 6 (Pon-Sub poslijepodne) |\n| Sesije kondicije | 3 (Uto / Čet / Sub jutro) |\n| Ukupno treninga | 12 |\n| Dani odmora | 1 (Nedjelja) |\n| Globalni RPE | 6-7 |\n| Ograničenje intenziteta | 70-75% kroz sve modalitete |\n\n**Početne vrijednosti Sedmice 1 za bilježenje:**\n- Potisak s klupe 4x4 @ 82 kg — ocjena percipiranog napora po seriji\n- Čučanj 4x4 @ 108 kg — ocjena percipiranog napora po seriji\n- Vučenje iz visa 4x3 @ 72 kg — brzina šipke / kvaliteta tehnike\n- HIIT rezultati (kalorije na assault biku ili split-ovi na veslaču)\n- Sparring runde — propusti u odbrani, osjećaj kondicije\n- Tjelesna masa svako jutro (natašte)\n- Kvaliteta sna (skala 1-10)\n- Ukupni umor (skala 1-10)\n", "week-2": "# Sedmica 2 — Progresivno Opterećenje\n\n**Sportista:** 87-90 kg | 185 cm | Amaterski MMA\n**1RM-ovi:** Čučanj 150 kg | Mrtvo dizanje 180 kg | Potisak s klupe 115 kg | Potisak iznad glave 75 kg\n**Fokus sedmice:** Progresivno opterećenje — povećaj težine na glavnim dizanjima, dodaj volumen na pomoćnim vježbama, skrati omjere odmora u kondiciji.\n**RPE cilj:** 7-8 kroz sav rad snage.\n\n---\n\n## Ponedjeljak\n\n### Jutro — Snaga: Gornji dio tijela Potisak/Povlačenje (60 min)\n\n> **Progresija od Sedmice 1:** Potisak s klupe +2.5 kg (bio 82-86 kg, sada 84-89 kg). Zgibovi +2.5 kg (bio TM+15 kg, sada TM+17.5 kg). Pomoćne vježbe: Potisak s minom i Varijacije sklekova dobijaju +2 ponavljanja po seriji. Trup: Pallof potisak +2 ponavljanja/strana, Trbušni kotačić +2 ponavljanja.\n\n**Zagrijavanje (10 min)**\n\n| Vježba | Trajanje/Ponavljanja | Napomene |\n|--------|----------------------|----------|\n| Razdvajanje gume (Band Pull-Aparts) | 2x15 | Lagana guma, povuci lopatice |\n| Dislociranje s gumom (Band Dislocates) | 2x10 | Sporo i kontrolisano |\n| Sklek u psa koji gleda nadolje (Push-Up to Downward Dog) | 2x8 | Otvori torakalni dio kičme |\n| Potisak s klupe s praznom šipkom | 2x8 | Uhodan obrazac, postepeno pojačavaj |\n\n**Glavna dizanja**\n\n| Vježba | Serije x Ponavljanja | Opterećenje (kg) | Opterećenje (%) | Odmor | Tempo | RPE | Napomene |\n|--------|----------------------|------------------
