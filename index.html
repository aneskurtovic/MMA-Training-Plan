<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#08080c;
  --bg-card:#0f0f14;
  --bg-card-hover:#141419;
  --bg-raised:#18181f;
  --bg-surface:#1c1c24;
  --border:#1a1a22;
  --border-bright:#28283a;
  --text:#c8c8d0;
  --text-bright:#ededf0;
  --text-dim:#62627a;
  --text-faint:#3e3e52;
  --accent:#f97316;
  --accent-soft:rgba(249,115,22,.08);
  --accent-med:rgba(249,115,22,.15);
  --accent-glow:rgba(249,115,22,.3);
  --accent-bright:#fba04b;
  --green:#22c55e;
  --blue:#3b82f6;
  --purple:#a855f7;
  --red:#ef4444;
  --sidebar-w:272px;
  --radius:10px;
  --radius-lg:14px;
  --font-display:'Anybody',system-ui,sans-serif;
  --font-body:'DM Sans',system-ui,-apple-system,sans-serif;
  --font-mono:'JetBrains Mono',monospace;
}
html{scroll-behavior:smooth;scrollbar-color:var(--border) var(--bg)}
body{
  font-family:var(--font-body);font-size:15px;line-height:1.75;
  color:var(--text);background:var(--bg);
  min-height:100vh;overflow-x:hidden;
  -webkit-font-smoothing:antialiased;
}

/* ═══════════════════════════════════
   NOISE TEXTURE OVERLAY
   ═══════════════════════════════════ */
body::after{
  content:'';position:fixed;inset:0;z-index:9999;pointer-events:none;
  opacity:.025;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
  background-repeat:repeat;background-size:256px 256px;
}

/* ═══════════════════════════════════
   SIDEBAR
   ═══════════════════════════════════ */
.sidebar{
  position:fixed;top:0;left:0;bottom:0;width:var(--sidebar-w);
  background:linear-gradient(180deg,#0c0c12 0%,var(--bg) 100%);
  border-right:1px solid var(--border);
  display:flex;flex-direction:column;z-index:100;
  transition:transform .35s cubic-bezier(.4,0,.2,1);
}
.sidebar-header{
  padding:24px 22px 18px;
  border-bottom:1px solid var(--border);
  position:relative;
}
.sidebar-header::after{
  content:'';position:absolute;bottom:-1px;left:22px;width:60px;
  height:2px;background:var(--accent);border-radius:1px;
}
.sidebar-brand{
  display:flex;align-items:center;gap:10px;margin-bottom:14px;
}
.brand-mark{
  width:36px;height:36px;border-radius:10px;
  background:linear-gradient(135deg,var(--accent),#e05a00);
  display:flex;align-items:center;justify-content:center;
  font-size:16px;flex-shrink:0;
  box-shadow:0 2px 12px var(--accent-glow);
}
.brand-text{
  font-family:var(--font-display);font-size:13px;font-weight:900;
  letter-spacing:.05em;text-transform:uppercase;color:var(--text-bright);
  line-height:1.2;
}
.brand-text span{
  color:var(--text-dim);display:block;font-size:9.5px;
  letter-spacing:.12em;margin-top:2px;font-weight:600;
  font-family:var(--font-body);
}

/* ── Download Button ── */
.dl-btn{
  display:flex;align-items:center;gap:8px;
  margin-top:12px;padding:9px 14px;
  background:linear-gradient(135deg,var(--bg-raised),var(--bg-surface));
  border:1px solid var(--border);border-radius:8px;
  color:var(--text-dim);font-family:var(--font-body);font-size:11.5px;font-weight:600;
  text-decoration:none;transition:all .2s;letter-spacing:.02em;
  cursor:pointer;width:100%;
}
.dl-btn:hover{color:var(--text-bright);border-color:var(--accent);background:var(--accent-soft)}
.dl-btn svg{width:16px;height:16px;flex-shrink:0;opacity:.6}
.dl-btn:hover svg{opacity:1}

/* ── Language Toggle ── */
.lang-toggle{
  display:flex;
  background:var(--bg);border-radius:8px;
  border:1px solid var(--border);overflow:hidden;
  position:relative;
}
.lang-toggle::before{
  content:'';position:absolute;top:2px;bottom:2px;width:calc(50% - 2px);
  background:var(--accent);border-radius:6px;
  transition:transform .25s cubic-bezier(.4,0,.2,1);
  left:2px;z-index:0;
}
.lang-toggle.bos::before{transform:translateX(100%)}
.lang-btn{
  flex:1;padding:6px 0;border:none;background:none;
  color:var(--text-dim);font-family:var(--font-body);
  font-size:11px;font-weight:700;letter-spacing:.08em;
  cursor:pointer;transition:color .25s;text-transform:uppercase;
  position:relative;z-index:1;
}
.lang-btn.active{color:#000}
.lang-btn:not(.active):hover{color:var(--text-bright)}

.sidebar-nav{flex:1;overflow-y:auto;padding:14px 10px;scrollbar-width:thin}
.sidebar-nav a{
  display:flex;align-items:center;gap:11px;
  padding:9px 14px;border-radius:9px;
  color:var(--text-dim);text-decoration:none;font-size:13px;font-weight:500;
  transition:all .15s ease;margin-bottom:1px;position:relative;
  letter-spacing:.01em;
}
.sidebar-nav a:hover{color:var(--text-bright);background:rgba(255,255,255,.03)}
.sidebar-nav a.active{
  color:var(--accent);background:var(--accent-soft);
  font-weight:600;
}
.sidebar-nav a.active::before{
  content:'';position:absolute;left:0;top:8px;bottom:8px;width:3px;
  background:var(--accent);border-radius:0 3px 3px 0;
  box-shadow:0 0 10px var(--accent-glow);
}
.nav-icon{
  width:26px;height:22px;display:flex;align-items:center;justify-content:center;
  font-size:12px;flex-shrink:0;opacity:.5;
  font-family:var(--font-mono);font-weight:500;
}
.sidebar-nav a.active .nav-icon{opacity:1}
.nav-divider{
  font-size:9px;text-transform:uppercase;letter-spacing:.16em;
  color:var(--text-faint);padding:18px 14px 6px;font-weight:700;
  user-select:none;
}
.nav-divider:first-child{padding-top:4px}

/* ═══════════════════════════════════
   MAIN AREA
   ═══════════════════════════════════ */
.main{margin-left:var(--sidebar-w);min-height:100vh;position:relative}
.main::before{
  content:'';position:fixed;top:-200px;right:-200px;
  width:700px;height:700px;
  background:radial-gradient(circle,rgba(249,115,22,.04) 0%,transparent 60%);
  pointer-events:none;z-index:0;
}
.main::after{
  content:'';position:fixed;bottom:-300px;left:30%;
  width:600px;height:600px;
  background:radial-gradient(circle,rgba(59,130,246,.02) 0%,transparent 60%);
  pointer-events:none;z-index:0;
}
.content{
  max-width:820px;margin:0 auto;padding:48px 44px 100px;
  position:relative;z-index:1;
}

/* ═══════════════════════════════════
   HAMBURGER & OVERLAY (MOBILE)
   ═══════════════════════════════════ */
.hamburger{
  display:none;position:fixed;top:12px;left:12px;z-index:200;
  width:44px;height:44px;border-radius:var(--radius);
  background:rgba(15,15,20,.85);border:1px solid var(--border);
  cursor:pointer;flex-direction:column;align-items:center;justify-content:center;gap:5px;
  backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
  transition:all .2s;
}
.hamburger:hover{background:var(--bg-raised);border-color:var(--border-bright)}
.hamburger span{
  display:block;width:18px;height:1.5px;background:var(--text);
  border-radius:1px;transition:all .3s cubic-bezier(.4,0,.2,1);
}
.hamburger.active span:nth-child(1){transform:rotate(45deg) translate(4.5px,4.5px)}
.hamburger.active span:nth-child(2){opacity:0;transform:scaleX(0)}
.hamburger.active span:nth-child(3){transform:rotate(-45deg) translate(4.5px,-4.5px)}
.overlay{
  display:none;position:fixed;inset:0;
  background:rgba(0,0,0,.65);z-index:90;
  backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
}

/* ═══════════════════════════════════
   MARKDOWN RENDERED CONTENT
   ═══════════════════════════════════ */

/* ── H1 — Page title ── */
.md h1{
  font-family:var(--font-display);font-size:36px;font-weight:900;
  color:var(--text-bright);margin:0 0 6px;line-height:1.1;
  letter-spacing:-.02em;
}
.md h1::after{
  content:'';display:block;width:44px;height:3px;
  background:var(--accent);
  border-radius:2px;margin-top:18px;margin-bottom:12px;
}

/* ── H2 — Major sections ── */
.md h2{
  font-family:var(--font-display);font-size:21px;font-weight:700;
  color:var(--text-bright);margin:48px 0 16px;line-height:1.2;
  letter-spacing:0;
  padding:14px 18px;
  background:linear-gradient(135deg,var(--bg-card) 0%,var(--bg-raised) 100%);
  border:1px solid var(--border);
  border-left:3px solid var(--accent);
  border-radius:var(--radius);
}

/* ── H3 — Sub-sections ── */
.md h3{
  font-size:16.5px;font-weight:600;color:var(--text-bright);
  margin:36px 0 10px;letter-spacing:.01em;
  padding-bottom:8px;
  border-bottom:1px solid var(--border);
}

/* ── H4 — Labels ── */
.md h4{
  font-size:12px;font-weight:700;color:var(--accent);
  margin:28px 0 8px;text-transform:uppercase;letter-spacing:.08em;
  display:flex;align-items:center;gap:8px;
}
.md h4::before{
  content:'';width:8px;height:8px;border-radius:2px;
  background:var(--accent);opacity:.4;flex-shrink:0;
}

.md p{margin:0 0 16px}
.md a{color:var(--accent);text-decoration:none;transition:all .2s;
  background:linear-gradient(transparent 85%,var(--accent-soft) 85%);
}
.md a:hover{color:var(--accent-bright);background:linear-gradient(transparent 85%,var(--accent-med) 85%)}
.md strong{color:var(--text-bright);font-weight:600}
.md em{color:var(--text-dim)}
.md ul,.md ol{margin:0 0 18px;padding-left:22px}
.md li{margin-bottom:5px}
.md li::marker{color:var(--accent)}
.md hr{border:none;height:1px;background:var(--border);margin:36px 0}

/* ── Blockquotes — used for week metadata ── */
.md blockquote{
  margin:20px 0;padding:18px 22px;
  background:linear-gradient(135deg,var(--accent-soft),rgba(249,115,22,.03));
  border:1px solid rgba(249,115,22,.12);
  border-radius:var(--radius-lg);
  color:var(--text);font-style:normal;
  position:relative;overflow:hidden;
}
.md blockquote::before{
  content:'';position:absolute;top:0;left:0;bottom:0;width:3px;
  background:var(--accent);
}
.md blockquote p{margin-bottom:4px}
.md blockquote p:last-child{margin-bottom:0}

/* ── Tables ── */
.table-wrap{
  overflow-x:auto;margin:20px 0 28px;
  border-radius:var(--radius-lg);
  border:1px solid var(--border);
  background:var(--bg-card);
  box-shadow:0 4px 24px rgba(0,0,0,.25),0 1px 3px rgba(0,0,0,.15);
}
.md table{width:100%;border-collapse:collapse;font-size:13.5px}
.md thead{background:var(--bg-surface)}
.md th{
  text-align:left;padding:12px 16px;font-weight:600;color:var(--text-bright);
  border-bottom:2px solid var(--border-bright);font-size:10.5px;
  text-transform:uppercase;letter-spacing:.1em;
  white-space:nowrap;font-family:var(--font-body);
}
.md td{padding:11px 16px;border-bottom:1px solid var(--border)}
.md tr:last-child td{border-bottom:none}
.md tbody tr{transition:background .15s}
.md tbody tr:nth-child(even){background:rgba(255,255,255,.01)}
.md tbody tr:hover{background:rgba(249,115,22,.04)}

/* ── Code ── */
.md code{
  background:var(--bg-raised);border:1px solid var(--border);
  border-radius:5px;padding:2px 7px;font-size:12.5px;color:var(--accent);
  font-family:var(--font-mono);
}
.md pre{
  background:var(--bg-card);border:1px solid var(--border);
  border-radius:var(--radius);padding:18px 20px;margin:18px 0;
  overflow-x:auto;box-shadow:0 2px 8px rgba(0,0,0,.15);
}
.md pre code{background:none;border:none;padding:0;color:var(--text)}

/* ── Lists inside tables ── */
.md td ul,.md td ol{margin:4px 0;padding-left:16px}
.md td li{margin-bottom:2px;font-size:13px}

/* ═══════════════════════════════════
   SECTION TRANSITION
   ═══════════════════════════════════ */
.md{animation:sectionIn .5s cubic-bezier(.16,1,.3,1)}
@keyframes sectionIn{
  from{opacity:0;transform:translateY(20px)}
  to{opacity:1;transform:none}
}

/* ═══════════════════════════════════
   BACK TO TOP
   ═══════════════════════════════════ */
.back-top{
  position:fixed;bottom:28px;right:28px;width:44px;height:44px;
  border-radius:12px;background:var(--accent);color:#000;
  border:none;cursor:pointer;font-size:18px;font-weight:700;
  opacity:0;transform:translateY(10px);
  transition:all .35s cubic-bezier(.4,0,.2,1);
  z-index:50;display:flex;align-items:center;justify-content:center;
  box-shadow:0 4px 24px var(--accent-glow);
}
.back-top.visible{opacity:1;transform:none}
.back-top:hover{transform:scale(1.08) translateY(-2px);box-shadow:0 8px 32px var(--accent-glow)}

/* ═══════════════════════════════════
   RESPONSIVE — TABLET
   ═══════════════════════════════════ */
@media(max-width:1024px){
  :root{--sidebar-w:248px}
  .content{padding:40px 28px 80px}
}

/* ═══════════════════════════════════
   RESPONSIVE — MOBILE
   ═══════════════════════════════════ */
@media(max-width:768px){
  .sidebar{transform:translateX(-100%);width:280px}
  .sidebar.open{transform:translateX(0);box-shadow:12px 0 48px rgba(0,0,0,.6)}
  .hamburger{display:flex}
  .overlay.open{display:block}
  .main{margin-left:0}
  .content{padding:16px 14px 60px;padding-top:70px}
  .md h1{font-size:26px}
  .md h2{font-size:18px;margin-top:32px;padding:12px 14px}
  .md h3{font-size:15px;margin-top:24px}
  .table-wrap{margin-left:-6px;margin-right:-6px;border-radius:10px}
  .md th{padding:10px 12px;font-size:9.5px}
  .md td{padding:9px 12px;font-size:13px}
  .back-top{bottom:16px;right:16px;width:40px;height:40px;font-size:16px;border-radius:10px}
  .md blockquote{padding:14px 16px}
}

/* ═══════════════════════════════════
   RESPONSIVE — SMALL PHONES
   ═══════════════════════════════════ */
@media(max-width:400px){
  .content{padding:12px 10px 50px;padding-top:66px}
  .md h1{font-size:22px}
  .md h2{font-size:16px;padding:10px 12px}
  .md table{font-size:11.5px}
  .md th{padding:8px 8px;font-size:9px}
  .md td{padding:7px 8px;font-size:12px}
}

/* ═══════════════════════════════════
   RESPONSIVE — TABLE CARDS
   ═══════════════════════════════════ */
@media(max-width:600px){
  .table-wrap{border:none;background:none;box-shadow:none;border-radius:0;overflow:visible}
  .md table,.md thead,.md tbody,.md th,.md tr{display:block}
  .md thead{position:absolute;left:-9999px;top:-9999px}
  .md tr{
    margin-bottom:12px;padding:14px 16px;
    background:var(--bg-card);border:1px solid var(--border);
    border-radius:var(--radius);
    box-shadow:0 2px 8px rgba(0,0,0,.15);
  }
  .md td{
    display:flex;justify-content:space-between;align-items:flex-start;
    padding:6px 0;border-bottom:1px solid var(--border);
    font-size:13px;text-align:right;
  }
  .md td:last-child{border-bottom:none}
  .md td::before{
    content:attr(data-label);
    font-weight:600;color:var(--text-bright);text-align:left;
    margin-right:12px;flex-shrink:0;font-size:10.5px;
    text-transform:uppercase;letter-spacing:.08em;
    padding-top:2px;
  }
}

/* Scrollbar */
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--border-bright)}

/* ── Selection ── */
::selection{background:var(--accent-med);color:var(--text-bright)}

/* ── Progress Badge ── */
.progress-badge{
  margin-top:10px;padding:6px 12px;
  background:var(--accent-soft);border:1px solid rgba(249,115,22,.15);
  border-radius:6px;font-size:11px;font-weight:600;
  color:var(--accent);letter-spacing:.02em;
  display:none;text-align:center;
}
.progress-badge.visible{display:block}

/* ── Rest Timer ── */
/* ── Fight Camp Dashboard Widgets ── */
.fc-countdown{
  display:grid;grid-template-columns:repeat(4,1fr);
  gap:12px;margin:16px 0;
}
.fc-countdown-unit{
  text-align:center;padding:20px 12px;
  background:var(--bg-card);border:1px solid var(--border);
  border-radius:var(--radius-lg);
}
.fc-countdown-num{
  font-family:var(--font-mono);font-size:36px;font-weight:700;
  color:var(--accent);line-height:1;
}
.fc-countdown-label{
  font-size:10px;text-transform:uppercase;letter-spacing:.12em;
  color:var(--text-dim);margin-top:6px;
}
.fc-weight{margin:16px 0}
.fc-weight-bar-track{
  height:32px;background:var(--bg-card);border:1px solid var(--border);
  border-radius:16px;position:relative;overflow:hidden;
}
.fc-weight-bar-fill{
  height:100%;background:linear-gradient(90deg,var(--accent),var(--green));
  border-radius:16px;transition:width .5s ease;
}
.fc-weight-labels{
  display:flex;justify-content:space-between;margin-top:8px;
  font-family:var(--font-mono);font-size:13px;
}
.fc-weight-current{color:var(--accent);font-weight:700}
.fc-weight-input{
  display:flex;align-items:center;gap:10px;margin-top:12px;
}
.fc-weight-input input{
  width:100px;padding:8px 12px;background:var(--bg-card);
  border:1px solid var(--border);border-radius:8px;
  color:var(--text-bright);font-family:var(--font-mono);font-size:14px;
}
.fc-weight-input button{
  padding:8px 16px;background:var(--accent);color:#000;
  border:none;border-radius:8px;font-weight:600;cursor:pointer;
  font-family:var(--font-body);
}
.fc-phase-cards{
  display:grid;grid-template-columns:repeat(4,1fr);
  gap:10px;margin:16px 0;
}
.fc-phase-card{
  padding:14px 12px;background:var(--bg-card);
  border:1px solid var(--border);border-radius:var(--radius);
  text-align:center;opacity:.5;transition:all .3s;
}
.fc-phase-card.active{
  opacity:1;border-color:var(--accent);background:var(--accent-soft);
  box-shadow:0 0 20px var(--accent-glow);
}
.fc-phase-card.completed{opacity:.7;border-color:var(--green)}
.fc-phase-card-name{font-weight:600;font-size:12px;color:var(--text-bright)}
.fc-phase-card-dates{font-size:10px;color:var(--text-dim);margin-top:4px}
.fc-today{
  padding:18px 22px;background:var(--bg-card);
  border:1px solid var(--border);border-left:3px solid var(--accent);
  border-radius:var(--radius-lg);margin:16px 0;
}
.fc-today-day{
  font-family:var(--font-display);font-size:16px;
  font-weight:700;color:var(--text-bright);
}
.fc-today-sessions{margin-top:8px;font-size:13px}
.sidebar-nav a.nav-phase-current{border-right:2px solid var(--green)}
@media(max-width:600px){
  .fc-countdown{grid-template-columns:repeat(2,1fr)}
  .fc-phase-cards{grid-template-columns:repeat(2,1fr)}
  .fc-countdown-num{font-size:28px}
}

.rest-timer{
  position:fixed;bottom:28px;left:28px;z-index:50;
}
.timer-toggle{
  width:44px;height:44px;border-radius:12px;
  background:var(--bg-raised);border:1px solid var(--border);
  color:var(--text);font-size:18px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:all .2s;
}
.timer-toggle:hover{border-color:var(--accent);color:var(--accent)}
.timer-toggle.active{background:var(--accent);color:#000;border-color:var(--accent)}
.timer-panel{
  display:none;position:absolute;bottom:54px;left:0;
  background:var(--bg-raised);border:1px solid var(--border-bright);
  border-radius:var(--radius-lg);padding:16px;min-width:200px;
  box-shadow:0 8px 32px rgba(0,0,0,.4);
}
.timer-panel.open{display:block}
.timer-display{
  font-family:var(--font-mono);font-size:36px;font-weight:700;
  color:var(--text-bright);text-align:center;margin-bottom:12px;
  letter-spacing:.05em;
}
.timer-display.warning{color:var(--accent)}
.timer-display.done{color:var(--green);animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
.timer-presets{display:flex;gap:6px;flex-wrap:wrap;justify-content:center;margin-bottom:10px}
.timer-presets button{
  padding:6px 12px;border-radius:6px;border:1px solid var(--border);
  background:var(--bg-card);color:var(--text);font-family:var(--font-mono);
  font-size:12px;cursor:pointer;transition:all .15s;
}
.timer-presets button:hover{border-color:var(--accent);color:var(--accent)}
.timer-stop{
  display:block;width:100%;padding:8px;margin-top:4px;
  border-radius:6px;border:1px solid var(--red);
  background:rgba(239,68,68,.1);color:var(--red);
  font-family:var(--font-body);font-size:12px;font-weight:600;
  cursor:pointer;transition:all .15s;
}
.timer-stop:hover{background:rgba(239,68,68,.2)}
@media(max-width:768px){
  .rest-timer{bottom:16px;left:16px}
}

   PRINT LAYOUT

}

Phase 2 — Intensification (Weeks 4-6)\n\n> **Phase:** Transmutation / Peak Volume | **Duration:** April 6 - April 26, 2026\n> **Weight Target:** 85 kg → 81 kg (continue ~1.3 kg/week deficit)\n> **Training Focus:** Peak training volume, hardest conditioning, increased sparring\n> **RPE Progression:** Week 4: 7-8 | Week 5: 8-9 | Week 6: 8-9 (peak)\n> **1RMs:** Squat 150 kg | Deadlift 180 kg | Bench 115 kg | OHP 75 kg\n\n---\n\n## Phase 2 Overview\n\nThis is the **hardest phase of camp**. Everything escalates: sparring frequency doubles to twice per week, conditioning sessions layer on top of each other, and fight simulation circuits appear regularly. Strength work shifts from progression to **maintenance** — loads stay at 80-85% 1RM with reduced volume so that recovery resources can be directed toward MMA-specific work and sparring.\n\n### Key Changes from Phase 1\n\n| Element | Phase 1 | Phase 2 |\n|---------|---------|---------|\n| Sparring | 1x/week (Thu) | **2x/week (Tue PM + Thu PM)** |\n| Strength Goal | Progressive overload | **Maintenance (80-85% 1RM)** |\n| Conditioning | Single session days | **Double conditioning on some days** |\n| Tempo | 3-1-1-0 (varied) | **3-1-X-0 (explosive concentric throughout)** |\n| Rest Periods | Standard (2-3 min) | **Tightened on conditioning work** |\n| Accessories | General | **MMA-specific replacements** |\n| Fight Simulation | Occasional | **Frequent (2-3x/week)** |\n| Opponent Drilling | None | **Integrated into technique sessions** |\n\n### Tempo Key\n\nAll strength movements use **3-1-X-0** unless otherwise noted:\n- **3** = 3 sec eccentric (lowering)\n- **1** = 1 sec pause at bottom\n- **X** = eXplosive concentric (as fast as possible)\n- **0** = no pause at top\n\n### Intensity Key\n\n| Marker | Meaning |\n|--------|---------|\n| 🟢 | Easy — recovery pace, low CNS demand |\n| 🟡 | Moderate — working hard but controlled |\n| 🔴 | Hard — high intensity, high CNS demand, full effort |\n\n---\n\n## Weekly Schedule Template\n\  min) — Pec doorway stretch 2x30s/side, banded lat stretch 2x30s/side, thoracic foam roll 60s.\n\n---\n\n### PM — Striking (75 min) 🔴\n\n**Warm-Up** (10 min) — Jump rope 3 min, dynamic stretches, shadow boxing 2 rounds light.\n\n| Block | Duration | Intensity | Description |\n|-------|----------|-----------|-------------|\n| Shadow Boxing | 3 x 3 min (1 min rest) | Moderate | Full MMA stance. Incorporate level changes and lateral movement. Film one round. |\n| Pad Work — Combination Chains | 4 x 3 min (1 min rest) | High | 5-6 strike combos with coach. Emphasis on setups and exits. Snap punches, return to guard. |\n| Heavy Bag — Power Rounds | 3 x 3 min (1 min rest) | High | Full power shots. Focus on hip rotation, weight transfer, and exhaling on every strike. |\n| Opponent-Specific Drill | 2 x 5 min (1 min rest) | Moderate-High | Simulate opponent tendencies — work entries, angles, and counters. Coach feeds specific looks. |\n| Burnout Round | 1 x 2 min | Max | Non-stop output on bag. Every strike with intent. Simulates end-of-round push. |\n\n**Cool-Down** (5 min) — Static stretching: hip flexors, shoulders, neck. Wrist circles. Light shadow boxing 1 min.\n\n---\n\n## Tuesday — Week 4\n\n### AM — Cardiac Output (45 min) 🟢\n\n**Warm-Up** (5 min) — Easy pace build-up on chosen modality.\n\n| Block | Duration | Intensity | Notes |\n|-------|----------|-----------|-------|\n| Zone 2 Sustained | 45 min | 130-150 BPM | Assault bike, rower, or jog. Nasal breathing where possible. Conversational pace. Extend to 45 min from Phase 1's 40 min. |\n\n> **HR Target:** 130-150 BPM. If HR drifts above 150, reduce pace immediately. Aerobic base maintenance — do not convert to tempo.\n\n**Cool-Down** (5 min) — Walk 3 min, light full-body stretching.\n\n---\n\n### PM — Sparring: Mixed (75 min) 🔴\n\n> **NEW in Phase 2:** Tuesday PM switches from grappling-only to live sparring. This is the first of two weekly sparring sessions.\n\n**Warm-Up** (10 min) — Hip escapes, shadow boxing, m ow. Simulates 3 rounds. |\n| Finisher | Rower | 500m | — | 1 | All-out | Sprint the last 500m. Leave nothing. |\n\n**Fight Simulation Circuit A (5 min continuous):**\n\n| Exercise | Duration | Notes |\n|----------|----------|-------|\n| Sprawl + Stand-Up | 30 sec | Continuous sprawls, pop to feet |\n| Heavy Bag Combination | 30 sec | 3-4 punch combos, constant output |\n| Clinch Knees on Bag | 30 sec | Alternating knees, squeeze the bag |\n| Bodyweight Shoot (level change) | 30 sec | Shoot to single-leg position, return |\n| Ground-and-Pound on Bag | 30 sec | Mount bag, controlled power shots |\n| Shadow Boxing — Max Output | 30 sec | Everything you have left |\n| Repeat | — | 2 cycles = 5 min, transition immediately |\n\n**Cool-Down** (5 min) — Walk 3 min, full-body stretching, breathing exercises.\n\n---\n\n### PM — Open Mat (60 min) 🟡\n\n| Block | Duration | Intensity | Description |\n|-------|----------|-----------|-------------|\n| Free Rolling / Sparring | 40 min | Self-regulated | Choose training partners wisely. Work on weaknesses identified during the week. Stay controlled — this is bonus work, not a competition. |\n| Technique Exploration | 15 min | Low | Try new techniques or revisit problem areas. Ask questions. Film if useful. |\n\n**Cool-Down** (5 min) — Full stretch routine, foam rolling.\n\n---\n\n## Sunday — Week 4\n\n### Full REST\n\nNo training. Active recovery only: walk, light stretching, sauna/cold plunge if available. Focus on sleep (8+ hours), nutrition, and mental recovery. Meal prep for the week ahead.\n\n---\n\n### Week 4 Volume Summary\n\n| Metric | Value |\n|--------|-------|\n| Total Sessions | 12 |\n| Total Training Hours | ~12.5 hours |\n| Strength Sessions | 3 (maintenance loading) |\n| MMA/Skill Sessions | 6 (including 2 sparring) |\n| Conditioning Sessions | 3 (cardiac output + HIIT + fight conditioning) |\n| Sparring Sessions | 2 (Tue PM + Thu PM) |\n| Fight Simulation Circuits | 3 (Thu AM x2 + Sat AM x3) |\n| Intensity Distributi n| Heavy Bag — Body Shots | 30 sec | Hooks and uppercuts to body only |\n| Clinch Position → Trip Attempt | 30 sec | Pummeling and trip attempts on partner/bag |\n| Mount Escapes (solo or bag) | 30 sec | Hip escape, bridge-and-roll, repeat |\n| Max Output Shadow Boxing | 30 sec | Empty the tank |\n| Repeat | — | 2 cycles = 5 min |\n\n**Cool-Down** (5 min) — Walk 3 min, stretching, extended breathing.\n\n---\n\n### PM — Open Mat (60 min) 🟡\n\n| Block | Duration | Intensity | Description |\n|-------|----------|-----------|-------------|\n| Free Rolling | 35 min | Self-regulated | Pick partners who challenge you. Work weak positions. |\n| Light Sparring — Hands Only | 15 min | Moderate | Boxing sparring at 60%. Focus on defense, head movement, counter-punching. |\n| Technique Exploration | 10 min | Low | Work on anything that needs attention. |\n\n**Cool-Down** (5 min) — Full stretch routine, foam rolling.\n\n---\n\n## Sunday — Week 5\n\n### Full REST\n\nAbsolute rest. Sleep 9+ hours if possible. Epsom salt bath. Light walk only if desired. Mental preparation and visualization. This week was the peak — recovery is critical before Week 6.\n\n---\n\n### Week 5 Volume Summary\n\n| Metric | Value |\n|--------|-------|\n| Total Sessions | 12 |\n| Total Training Hours | ~14 hours |\n| Strength Sessions | 3 (maintenance, small load bumps) |\n| MMA/Skill Sessions | 6 (including 2 hard sparring sessions) |\n| Conditioning Sessions | 3 (cardiac output + finisher, HIIT, peak fight conditioning) |\n| Sparring Sessions | 2 (Tue PM + Thu PM — both harder than Week 4) |\n| Fight Simulation Circuits | 6 (Thu AM x3 + Sat AM x3) |\n| Intensity Distribution | 🟢 x2 / 🟡 x4 / 🔴 x6 |\n\n---\n\n## Mid-Phase Checkpoint — After Week 5\n\nComplete the following assessments on Sunday evening or Monday morning before Week 6 begins.\n\n### Body Composition Check\n\n| Metric | Target | Action if Off-Track |\n|--------|--------|---------------------|\n| Weight | ~81.5 kg | If above 82.5 kg: tighten nutrition, add 10 min Zone 2 to Tuesday/Saturday AM. If below 81 kg: increase carbs slightly — do not undercut performance. |\n| Visual | Noticeably leaner than Phase 1 start | If holding water: check sodium, sleep quality, and stress. |\n\n### Performance Markers\n\n| Test | Minimum Standard | Notes |\n|------|-----------------|-------|\n| Resting HR | Stable or decreasing from Phase 1 | If elevated >5 BPM: overreaching — reduce Week 6 volume 10%. |\n| HRV | Stable or within normal range | Significant drop = overreaching signal. |\n| Grip Strength | No decline from Phase 1 baseline | Drop = CNS fatigue indicator. |\n| Mood / Motivation | Manageable | Some fatigue is normal. If motivation is critically low, reduce Week 6 sparring to 1x. |\n| Sleep Quality | 7+ hours average | If poor: prioritize sleep hygiene over extra training. |\n| Injury Check | No new injuries | Any joint pain, persistent soreness, or swelling = modify. Do not push through injuries this close to fight. |\n\n### Decision Point\n\n| Condition | Action |\n|-----------|--------|\n| All markers green | Proceed with full Week 6 programming |\n| Resting HR elevated or HRV suppressed | Reduce Week 6 conditioning volume by 15-20%. Maintain sparring. |\n| Joint pain or injury | Modify around the issue. If serious, convert Week 6 to modified taper. Consult medical. |\n| Weight ahead of schedule (<81 kg) | Add carbs to performance meals. Prioritize recovery. |\n| Weight behind schedule (>83 kg) | Add 10 min Zone 2 daily. Tighten nutrition. DO NOT crash diet. |\n| Mental burnout | Reduce volume 10%. Add fun training — open mat, flow rolling, playful sparring. |\n\n---\n---\n\n# Week 6 — Absolute Peak\n\n> **Global RPE Target:** 8-9 (peak of entire camp)\n> **Theme:** The highest point of the camp. After this week, volume drops permanently into taper. Everything is at maximum. This is the week that makes or breaks fight readiness.\n> **Weight:** ~81.5 kg → ~81 kg\n\n---\n\n## Monday — Week 6\n\n### AM — Stren (1 min rest) | High | Sharpen the gameplan weapons. Entries, counters, exits. |\n\n**Cool-Down** (5 min) — Static stretching, wrist circles, neck stretches.\n\n---\n\n## Tuesday — Week 6\n\n### AM — Cardiac Output + Conditioning Finisher (55 min) 🟢/🟡\n\n**Warm-Up** (5 min) — Easy pace build-up.\n\n| Block | Duration | Intensity | Notes |\n|-------|----------|-----------|-------|\n| Zone 2 Sustained | 35 min | 130-150 BPM | Assault bike or rower. Slight volume reduction from Week 5 — preserving energy for sparring. |\n| EMOM Finisher | 12 min | Moderate-High | Increased from 10 min in Week 5. See below. |\n\n**EMOM Finisher (12 min):**\n\n| Minute | Exercise | Reps | Notes |\n|--------|----------|------|-------|\n| Odd minutes | Burpee to Sprawl | 6 | MMA-specific variation. Sprawl at the top. |\n| Even minutes | Kettlebell Clean & Press (alternating) | 5/arm | 24 kg. Full extension. |\n\n**Cool-Down** (5 min) — Walk, stretching.\n\n---\n\n### PM — Sparring: Mixed (80 min) 🔴\n\n**Warm-Up** (10 min) — Shadow boxing, pummeling, light wrestling.\n\n| Block | Duration | Intensity | Description |\n|-------|----------|-----------|-------------|\n| Clinch Sparring — Aggressive | 3 x 3 min (45 sec rest) | High | Tight rest. Push the clinch game. Dirty boxing, trips, wall work. |\n| Positional Ground — Escapes Only | 3 x 3 min (45 sec rest) | High | Start from worst positions. Get out. Build confidence in scrambles. |\n| Live MMA Rounds | 4 x 5 min (90 sec rest) | 85% | Fight simulation intensity. Implement the gameplan completely. |\n| Shark Tank | 1 x 5 min | 85-90% | Fresh opponent every minute. You stay in. This is the test. |\n| Championship Overtime Round | 1 x 5 min (after 2 min rest) | 80-85% | One more round when you think you are done. Mental toughness builder. |\n\n> **Week 6 sparring note:** Championship overtime round added. This is the moment you prove you have a sixth gear. After the shark tank, one more full round. Dig deep.\n\n**Cool-Down** (10 min) — Partner ynamic stretches, 5 burpees.\n\n| Block | Protocol | Work | Rest | Rounds | Intensity | Notes |\n|-------|----------|------|------|--------|-----------|-------|\n| Assault Bike Intervals | Sprint | 30 sec | 20 sec | 10 | Max effort | 3:2 work-to-rest ratio. Hardest intervals of the camp. |\n| Rest | — | — | 3 min | — | — | Walk. |\n| Fight Simulation Circuit | Continuous | 5 min | 75 sec | 3 | Max | Tightest rest of the camp. Three rounds, fight pace. |\n\n**Fight Simulation Circuit (5 min continuous):**\n\n| Exercise | Duration | Notes |\n|----------|----------|-------|\n| Explosive Level Change + Double Jab | 30 sec | Shoot level, stand, throw jab-jab |\n| Heavy Bag Combination — Power | 30 sec | 4-5 strike combos, full power |\n| Clinch Knees — Alternating | 30 sec | Maximum output |\n| Sprawl → Technical Stand-Up | 30 sec | Defensive scramble simulation |\n| Ground-and-Pound Flurry | 30 sec | Rapid strikes from mount/side control on bag |\n| Shadow Boxing — Championship Round | 30 sec | You are winning. Close it out. |\n| Repeat | — | 2 cycles = 5 min |\n\n**Cool-Down** (5 min) — Walk, stretching, breathing.\n\n---\n\n### PM — Full MMA Sparring (90 min) 🔴\n\n> **This is the hardest sparring session of the entire camp.**\n\n**Warm-Up** (15 min) — Progressive warm-up: shadow boxing 3 rounds, movement drills, pummeling, 1 technical round.\n\n| Block | Duration | Intensity | Description |\n|-------|----------|-----------|-------------|\n| Striking Sparring | 3 x 3 min (45 sec rest) | 85-90% | Full kickboxing. Execute the striking gameplan. Coach scores rounds. |\n| MMA Sparring | 5 x 5 min (90 sec rest) | 85-90% | Five full rounds. This IS the fight rehearsal. Every round has a purpose — opener, pressure, counter, grappling, championship. |\n| Adversity Rounds | 2 x 5 min (1 min rest) | 85% | Start each round from a bad position. Down on the scorecards — fight your way back. |\n| Final Championship Round | 1 x 5 min | 80-85% | One last round. 30 seconds left — close  | 15 min | Moderate | Wall takedowns, defense, getups, scrambles — all in sequence. |\n| Full Fight Simulation Drill | 20 min | Moderate-High | 4 x 5 min rounds of drilling the entire gameplan. Stand-up → clinch → ground → stand-up. Coach calls positions and transitions. This is the final rehearsal. |\n\n**Cool-Down** (5 min) — Partner stretching, mobility.\n\n---\n\n## Saturday — Week 6\n\n### AM — Fight Conditioning — Final Peak (55 min) 🔴\n\n> **Last hard conditioning session of the camp.** After today, the taper begins. Leave everything here.\n\n**Warm-Up** (5 min) — Jump rope 2 min, dynamic stretches, 5 burpees.\n\n| Block | Protocol | Work | Rest | Rounds | Intensity | Notes |\n|-------|----------|------|------|--------|-----------|-------|\n| Assault Bike | Death Intervals | 30 sec | 15 sec | 10 | Max | 2:1 work-to-rest. The hardest bike intervals of the camp. |\n| Rest | — | — | 3 min | — | — | Walk. Breathe. Recover. |\n| Championship Fight Simulation | Continuous | 5 min | 60 sec | 3 | Max | Three rounds, 60 sec rest (tighter than any previous week). |\n| Finisher | Rower | 1000m | — | 1 | All-out | Final 1km sprint of the camp. Personal best attempt. |\n\n**Championship Fight Simulation (5 min continuous):**\n\n| Exercise | Duration | Notes |\n|----------|----------|-------|\n| Shadow Boxing — Round Opening | 30 sec | Establish range, jab, move |\n| Explosive Double-Leg Level Change | 30 sec | Shoot, stand, repeat |\n| Heavy Bag — Pressure Combo | 30 sec | Walk forward throwing, do not retreat |\n| Clinch Knees + Elbow (on bag) | 30 sec | Close range devastation |\n| Sprawl → Scramble → Stand | 30 sec | Defensive chain |\n| Max Output — 10-9 Round | 30 sec | You need a finish. EVERYTHING you have. |\n| Repeat | — | 2 cycles = 5 min |\n\n**Cool-Down** (10 min) — Extended walk 5 min, full-body stretching, diaphragmatic breathing. Take your time. The hard work is done.\n\n---\n\n### PM — Open Mat (60 min) 🟡\n\n| Block | Duration | Intensity | Description |\n|-------|----------|-----------|-------------|\n| Free Rolling | 30 min | Self-regulated | Last hard rolling session before taper. Work positions you need for the fight. |\n| Light Boxing Sparring | 15 min | 50-60% | Technical boxing. Defense only. Head movement and footwork. |\n| Cool-Down Rolls / Flow | 15 min | Low | Easy flow rolling. Enjoy the movement. Last day of peak volume. |\n\n**Cool-Down** (5 min) — Full stretch routine, foam rolling. Celebrate completing the hardest phase.\n\n---\n\n## Sunday — Week 6\n\n### Full REST\n\n**Critical recovery day.** This was the peak week of the entire camp. Full rest is non-negotiable.\n\n- Sleep 9+ hours\n- Epsom salt bath or cold plunge\n- Light walk only\n- Meal prep for the taper phase\n- Mental debrief: journal what went well this phase, what needs polish\n- Visualization: see yourself winning on May 16\n\n---\n\n### Week 6 Volume Summary\n\n| Metric | Value |\n|--------|-------|\n| Total Sessions | 12 |\n| Total Training Hours | ~14.5 hours |\n| Strength Sessions | 3 (peak maintenance loads — 85% 1RM) |\n| MMA/Skill Sessions | 6 (including 2 peak sparring sessions) |\n| Conditioning Sessions | 3 (cardiac output + finisher, HIIT, final peak fight conditioning) |\n| Sparring Sessions | 2 (Tue PM + Thu PM — hardest of entire camp) |\n| Fight Simulation Circuits | 6 (Thu AM x3 + Sat AM x3) |\n| Sparring Rounds (Thu PM) | 11 rounds (~55 min live work) |\n| Intensity Distribution | 🟢 x2 / 🟡 x4 / 🔴 x6 |\n\n---\n---\n\n# Phase 2 Summary\n\n## Training Volume Progression\n\n| Metric | Week 4 | Week 5 | Week 6 |\n|--------|--------|--------|--------|\n| Total Training Hours | ~12.5 | ~14 | ~14.5 |\n| Sparring Sessions | 2 | 2 | 2 |\n| Sparring Rounds (Thu PM) | 9 | 10 | 11 |\n| Fight Simulation Circuits | 5 | 6 | 6 |\n| Strength Load (compound lifts) | 80% 1RM | 82-83% 1RM | 85% 1RM |\n| Strength Rep Scheme | 3s | 3s | 2s |\n| Conditioning Rest Periods | Standard | Tightened | Minimum |\n| Overall RPE | 7-8 | 8-9 | 8-9 (peak) |\n\n## Strength Loads Across Phase 2\n\n| Exercise | 1RM | Week 4 (80%) | Week 5 (82-83%) | Week 6 (85%) |\n|----------|-----|--------------|-----------------|--------------|\n| Bench Press | 115 kg | 92 kg x 3 | 95 kg x 3 | 98 kg x 2 |\n| Back Squat | 150 kg | 120 kg x 3 | 123 kg x 3 | 127.5 kg x 2 |\n| Trap Bar Deadlift | 180 kg | 144 kg x 3 | 148 kg x 3 | 153 kg x 2 |\n| Weighted Pull-Up | — | BW+20 kg x 3 | BW+22.5 kg x 3 | BW+25 kg x 2 |\n| Push Press | 75 kg (OHP) | 60 kg x 3 | 62.5 kg x 3 | 65 kg x 2 |\n| Hang Power Clean | — | 70 kg x 3 | 72.5 kg x 3 | 75 kg x 2 |\n\n## Key Adaptations Expected by End of Phase 2\n\n| Quality | Expected Outcome |\n|---------|-----------------|\n| Aerobic Base | Maintained. Cardiac output work continues throughout. |\n| Anaerobic Capacity | Significantly improved. Fight simulation circuits and HIIT at peak levels. |\n| Strength | Maintained at current 1RMs. No regression despite caloric deficit. |\n| Power | Maintained or slightly improved through explosive tempo work. |\n| Fight Readiness | High. Two sparring sessions per week with full MMA rounds and adversity training. |\n| Mental Toughness | Forged. Shark tanks, fatigue rounds, and championship overtime build deep reserves. |\n| Weight | ~81 kg. On track for 77 kg fight weight with 4 weeks remaining for water cut strategy. |\n| Gameplan | Polished. Opponent-specific drilling integrated throughout all sessions. |\n\n## What Changes in Phase 3 (Taper)\n\nAfter this peak phase, Phase 3 will:\n- **Reduce volume** by 30-40% while maintaining intensity\n- **Cut sparring** back to once per week, then to technical only\n- **Eliminate fight simulation circuits** — they have served their purpose\n- **Maintain strength** with reduced sets (2-3 sets instead of 4)\n- **Focus on sharpness** — technique drilling replaces volume work\n- **Begin water cut strategy** in the final 7-10 days\n- **Prioritize recovery** — sleep, nutrition, and mental preparation take center stage\n\n> **The hardest work is done.** Everything from here is about arriving at fight night sharp, fresh, and dangerous.\n", "phase-3": "# Phase 3 — Sharpening (Weeks 7-8)\n\n> **Phase:** Realization / Taper | **Duration:** April 27 - May 10, 2026\n> **Weight Target:** 81 kg → 79 kg (within water-cut range of 77 kg)\n> **Training Focus:** Technical sharpness, speed work, game plan drilling, volume reduction\n> **RPE:** 7-8 (controlled intensity, reduced volume)\n> **Key Changes:** Strength 2x/week (down from 3), no hard sparring in Week 8, speed/timing replaces volume\n\n---\n\n## Phase 3 Overview\n\nThis phase is about **subtraction, not addition**. You are not building fitness here — you are sharpening what you already have and allowing your body to supercompensate. Every session has a purpose. If it doesn't make you sharper for fight night, cut it.\n\n### Key Principles\n\n- **Strength drops to 2 sessions/week** (Monday and Wednesday only — Friday power session is removed)\n- **Loads drop to 70-75% of 1RM** with emphasis on bar speed and explosiveness\n- **No hard sparring in Week 8** — light technical sparring only\n- **Week 7** — moderate sparring is still permitted (controlled rounds, trusted partners only)\n- **Conditioning becomes shorter and sharper** — intervals under 10 seconds, full recovery between sets\n- **Game plan specific drilling increases** — positional sparring, situational reps, entries and exits\n- **Mental preparation begins** — daily visualization, fight strategy review, routine-setting\n- **Water loading protocol discussion** — coordinate with coach and reference weight-management section\n\n### Reference 1RMs (for percentage calculations)\n\n| Lift | 1RM |\n|------|-----|\n| Back Squat | 150 kg |\n| Deadlift | 180 kg |\n| Bench Press | 115 kg |\n| OHP | 75 kg |\n\n### Load Guidelines This Phase\n\n| Percentage | Squat | Deadlift | Bench | OHP |\n|------------|-------|----------|-------|-----|\n| 70% | 105 kg | 126 kg | 80 kg | 52.5 kg |\n| 72.5% | 109 t needs adjustment |\n\n---\n\n### Saturday, May 3 — Light Conditioning + Mental Prep\n\n#### AM: Light Conditioning (30 min)\n\n| Block | Duration | Activity | Notes |\n|-------|----------|----------|-------|\n| Warm-Up | 5 min | Easy jog / skip | |\n| Tempo Intervals | 15 min | 4 x 2 min moderate pace Assault Bike / 2 min easy | HR 140-150, not maximal |\n| Cool-Down | 10 min | Walk + stretching | |\n\n#### PM: Mental Preparation (30 min)\n\n| Activity | Duration | Notes |\n|----------|----------|-------|\n| Fight strategy review | 10 min | Review game plan notes with coach |\n| Visualization | 10 min | Walk through full fight mentally — entrances, Round 1 start, key exchanges |\n| Journaling/Reflection | 10 min | Write down confidence points, what you've trained, what you trust |\n\n---\n\n### Sunday, May 4 — Full Rest\n\nComplete rest day. No training. Light walk permitted. Focus on sleep (8-9 hours), nutrition, and hydration. Begin mentally rehearsing fight week routine.\n\n---\n\n## Week 8 (May 4 - May 10, 2026)\n\n**Theme:** Volume drops significantly. No hard sparring. Sharpness and speed only. Mental preparation ramps up. Begin water loading protocol discussion.\n\n> **IMPORTANT:** No hard or moderate sparring this week. Light technical sparring only — timing, distance management, movement. No damage, no fatigue accumulation.\n\n---\n\n### Monday, May 5 — Strength A (Final Heavy Session) + Light MMA\n\n#### AM: Strength A — Speed-Strength, Reduced (50 min)\n\n**Warm-Up (10 min)**\n\n| Exercise | Duration/Sets |\n|----------|---------------|\n| Jump rope | 3 min |\n| World's greatest stretch | 2 x 4 each |\n| Band pull-aparts | 2 x 12 |\n| Box jump (low) | 2 x 3 |\n\n**Main Work — Reduced Volume, Speed Focus**\n\n| Exercise | Sets x Reps | Load | Rest | Notes |\n|----------|-------------|------|------|-------|\n| Back Squat | 3 x 2 | 72.5% (109 kg) | 2.5 min | Speed emphasis, perfect form |\n| Bench Press | 3 x 2 | 72.5% (83 kg) | 2 min | Fast concentric |\n| Weighted Pull-Up | 2 x 3 | +10 kg | 2 min | Controlled |\n\n**Accessory (minimal)**\n\n| Exercise | Sets x Reps | Load | Rest |\n|----------|-------------|------|------|\n| Goblet Squat | 2 x 6 | 24 kg | 60 sec |\n| Band Face Pull | 2 x 12 | Band | 60 sec |\n\n#### PM: Light MMA — Technical Striking (50 min)\n\n| Block | Duration | Activity | Notes |\n|-------|----------|----------|-------|\n| Shadow Boxing | 15 min | Technical, game plan combos | Light, fluid movement |\n| Pad Work (light) | 15 min | Timing and placement focus | 60% power, 100% precision |\n| Light Technical Sparring | 15 min | Touch sparring — distance and timing | NO power, NO body shots |\n| Cool-Down | 5 min | Stretching + visualization | |\n\n---\n\n### Tuesday, May 6 — Light Grappling + Short Conditioning\n\n#### AM: Grappling — Technical Only (50 min)\n\n| Block | Duration | Activity | Notes |\n|-------|----------|----------|-------|\n| Warm-Up | 10 min | Movement flow | |\n| Technique Reps | 20 min | Game plan sequences only | Rehearsal, not learning |\n| Light Flow Rolling | 15 min | 3 x 3 min, 60% effort | Movement and transitions only |\n| Cool-Down | 5 min | Stretching | |\n\n#### PM: Short Conditioning (20 min)\n\n| Block | Duration | Activity | Notes |\n|-------|----------|----------|-------|\n| Warm-Up | 3 min | Dynamic movement | |\n| Intervals | 12 min | 6 x 6 sec Assault Bike sprint / 54 sec rest | Maximum power output, full recovery |\n| Cool-Down | 5 min | Walk + box breathing | |\n\n---\n\n### Wednesday, May 7 — Strength B (Final Session) + Light Skills\n\n#### AM: Strength B — Speed Work, Minimal Volume (45 min)\n\n**Warm-Up (10 min)**\n\n| Exercise | Duration/Sets |\n|----------|---------------|\n| Rowing machine | 3 min easy |\n| Hip circles | 10 each direction |\n| Arm circles | 10 each direction |\n| Kettlebell deadlift | 2 x 5 (light) |\n\n**Main Work — Last Lifting Session Before Fight**\n\n| Exercise | Sets x Reps | Load | Rest | Notes |\n|----------|-------------|------|------|-------|\n| Trap Bar Deadlift | 3 x 2 | 70% (126 kg) | 2.5 min | Clean, explosive reps |\n| OHP | 3 x 2 | 70% (52.5 kg) | 2 min | Crisp lockout |\n\n**Accessory (minimal)**\n\n| Exercise | Sets x Reps | Load | Rest |\n|----------|-------------|------|------|\n| Lateral Lunge | 2 x 5 each | BW | 60 sec |\n| Band Pull-Apart | 2 x 15 | Band | 60 sec |\n\n> **This is the final strength session before the fight.** No more lifting until after May 16.\n\n#### PM: Light MMA — Game Plan Review (50 min)\n\n| Block | Duration | Activity | Notes |\n|-------|----------|----------|-------|\n| Shadow Boxing | 15 min | Full game plan walkthrough | Visualize opponent in front of you |\n| Light Pad Work | 15 min | Key combos and counter sequences | Precision and timing |\n| Positional Review | 10 min | Walk through key grappling positions | Slow, deliberate, technical |\n| Strategy Session | 10 min | Sit down with coach, review fight plan | Verbal walkthrough, Q&A |\n\n---\n\n### Thursday, May 8 — Active Recovery + Visualization\n\n#### Recovery Day (45 min)\n\n| Block | Duration | Activity | Notes |\n|-------|----------|----------|-------|\n| Light Walk | 15 min | Outdoors if possible | Easy pace, fresh air |\n| Mobility | 15 min | Full-body flow | Hips, t-spine, shoulders |\n| Breathing + Visualization | 15 min | Box breathing + full fight visualization | Round-by-round mental rehearsal |\n\n**Additional Mental Prep:**\n- Review fight strategy notes\n- Confirm fight day logistics (schedule, travel, cornermen, equipment)\n- Pack fight bag (see Phase 4 checklist)\n\n---\n\n### Friday, May 9 — Light Technical Session (Final Training)\n\n#### Final Training Session (40 min)\n\n| Block | Duration | Activity | Notes |\n|-------|----------|----------|-------|\n| Shadow Boxing | 15 min | Light, technical, game plan combos | Feel sharp, stay loose |\n| Light Pad Work | 10 min | Timing rounds, 50% power | Coach keeps it relaxed, positive |\n| Movement Drills | 10 min | Footwork, entries, exits | Rehearse distance management |\n| Cool-Down | 5 min | Stretching + team talk | Confidence building |\n\n> **This is the last training session before fight week begins.** Everything from here is about staying sharp, calm, and ready.\n\n---\n\n### Saturday, May 10 — Rest + Mental Prep\n\nComplete rest. No training.\n\n| Activity | Notes |\n|----------|-------|\n| Light walk | 20-30 min, easy |\n| Visualization | 15 min — round-by-round fight rehearsal |\n| Strategy review | Final review of game plan notes |\n| Logistics confirmation | Confirm fight day schedule, weigh-in time, arrival time |\n| Nutrition | Eat well, stay hydrated, enjoy meals (weight cut begins tomorrow) |\n| Sleep | 8-9 hours minimum |\n\n**Begin discussing water loading protocol with coach.** Reference Phase 4 for the full protocol starting Sunday, May 11.\n\n---\n\n## Phase 3 Summary\n\n| Parameter | Week 7 | Week 8 |\n|-----------|--------|--------|\n| Strength Sessions | 2 (Mon, Wed) | 2 (Mon, Wed) — final sessions |\n| Strength Volume | 4x3 main lifts + 2-3 accessories | 3x2 main lifts + minimal accessories |\n| Strength Load | 70-75% 1RM | 70-72.5% 1RM |\n| Sparring | Moderate (Friday, 5 rounds) | Light technical only (Monday) |\n| Conditioning | Short intervals (2 sessions) | Minimal intervals (1 session) |\n| MMA Skills | Game plan focus, positional sparring | Technical rehearsal, shadow boxing |\n| Mental Prep | Visualization begins, strategy review | Daily visualization, logistics finalized |\n| Estimated Body Weight | ~80-81 kg | ~79-80 kg |\n| Recovery Focus | High | Very high |\n\n---\n\n## Notes for Coach\n\n1. **Monitor fatigue closely.** If the athlete reports unusual soreness, sleep disruption, or mood changes, cut volume further.\n2. **Sparring partners in Week 7** should be briefed — controlled rounds, no ego, game plan focus.\n3. **Week 8 has zero hard sparring.** This is non-negotiable. The fight is won in the weeks before, not the week of.\n4. **Weight should be trending toward 79-80 kg** naturally by end of Week 8. If still above 81 kg, consult with nutritionist before beginning water cut.\n5. **Transition to Phase 4 (Fight Week)** begins Sunday, May 11.\n", "phase-4": "# Phase 4 — Fight Week (Week 9)\n\n> **Phase:** Fight Week | **Duration:** May 11 - May 16, 2026\n> **Weight:** 79 kg → 77 kg (water cut)\n> **Focus:** Light technical work, weight management, mental preparation\n> **Training:** Minimal — shadow boxing, visualization, light movement only\n\n---\n\n## Fight Week Overview\n\nThis is not a training week. This is a **preparation and execution** week. The work is done. Your only jobs now are:\n\n1. Make weight safely\n2. Stay mentally sharp\n3. Arrive at the fight healthy, hydrated, and confident\n\nThe 2 kg water cut from 79 kg to 77 kg is a **mild cut** and should be manageable with proper water loading and sodium manipulation. Follow the protocols below exactly as planned with your coach.\n\n---\n\n## Water Loading Protocol\n\nBegin water loading on Sunday. The goal is to upregulate your body's water excretion mechanisms by drinking large volumes, then sharply reducing intake so the body continues flushing water even when intake drops.\n\n| Day | Date | Water Intake | Notes |\n|-----|------|-------------|-------|\n| Sunday | May 11 | 8 L | Begin water loading. Spread across waking hours. |\n| Monday | May 12 | 8 L | Continue loading. Urine should be clear and frequent. |\n| Tuesday | May 13 | 6 L | Begin tapering water. Body still excreting at high rate. |\n| Wednesday | May 14 | 4 L | Further reduction. Noticeable water loss begins. |\n| Thursday | May 15 | 2 L | Minimal water. Sip throughout day. Stop by evening. |\n| Friday | May 16 | Sips only | Small sips until weigh-in. Full rehydration after. |\n\n**Key Rules:**\n- Spread water intake evenly across the day (do not chug large volumes at once)\n- Distilled water is preferred during loading days (lower mineral content)\n- Track all fluid intake — use a measured bottle\n- Weigh yourself morning and evening to track progress\n- If weight is not trending on schedule, consult coach before adjusting\n\n---\n\n## Sodium Manipulation Protocol\n\nSodium manipulation works alongside water loading. High sodium early causes water retention; dropping sodium causes the body to flush stored water.\n\n| Day | Date | Sodium Intake | Food Notes |\n|-----|------|--------------|------------|\n| Sunday | May 11 | Normal (~3,000-4,000 mg) | Eat normally, add salt to food |\n| Monday | May 12 | Normal (~3,000-4,000 mg) | Continue normal salting |\n| Tuesday | May 13 | Reduced (~1,500-2,000 mg) | Begin reducing — avoid processed food, no added salt |\n| Wednesday | May 14 | Low (~500-1,000 mg) | Plain foods only — rice, chicken, vegetables, no seasoning |\n| Thursday | May 15 | Minimal (~200-500 mg) | Very plain food, small portions, no added salt |\n| Friday | May 16 | None until post-weigh-in | No food until after weigh-in |\n\n**Carbohydrate Notes:**\n- Sunday-Tuesday: Normal carb intake\n- Wednesday: Reduce carbs to ~100g (reduces glycogen-bound water)\n- Thursday: Reduce carbs to ~50g\n- Friday: No food until post-weigh-in\n\n---\n\n## Day-by-Day Plan\n\n---\n\n### Sunday, May 11 — Last Light Training + Water Loading Begins\n\n| Time | Activity | Details |\n|------|----------|---------|\n| 7:00 AM | Wake up, weigh in | Record weight (target: ~79 kg) |\n| 7:30 AM | Water: 1 L | Begin water loading |\n| 8:30 AM | Breakfast | Normal meal — oats, eggs, fruit, salt food normally |\n| 10:00 AM | Water: 1 L | Sip steadily |\n| 10:30 AM | Light Training Session (40 min) | See session plan below |\n| 12:00 PM | Lunch + Water: 1 L | Normal meal — rice, protein, vegetables |\n| 2:00 PM | Water: 1 L | |\n| 3:00 PM | Visualization (15 min) | Round-by-round mental rehearsal |\n| 4:00 PM | Water: 1 L | |\n| 6:00 PM | Dinner + Water: 1 L | Normal meal |\n| 8:00 PM | Water: 1 L | |\n| 9:00 PM | Water: 1 L | Final intake |\n| 9:30 PM | Evening weigh-in | Record weight |\n| 10:00 PM | Sleep | Target 8-9 hours |\n\n**Training Session — Sunday (40 min):**\n\n| Block | Duration | Activity | Notes |\n|-------|----------|----------|-------|\n| Shadow Boxing | 15 min | Light, technical, game plan combos | Last real movement session |\n| Light Pad Work | 10 min | Timing and distance, 40% power | Stay sharp, stay relaxed |\n| Movement Drills | 10 min | Footwork patterns, entries/exits | Rehearsal, not training |\n| Visualization | 5 min | Close eyes, breathe, visualize fight | |\n\n> **This is the last training session of fight camp.**\n\n---\n\n### Monday, May 12 — Shadow Boxing + Water Loading\n\n| Time | Activity | Details |\n|------|----------|---------|\n| 7:00 AM | Wake up, weigh in | Record weight |\n| 7:30 AM | Water: 1 L | |\n| 8:30 AM | Breakfast | Normal meal, salt normally |\n| 10:00 AM | Water: 1 L | |\n| 10:30 AM | Shadow Boxing (20 min) | Light, technical, game plan only. No intensity. |\n| 12:00 PM | Lunch + Water: 1 L | Normal meal |\n| 2:00 PM | Water: 1 L | |\n| 3:00 PM | Mental Prep (20 min) | Visualization + strategy review notes |\n| 4:00 PM | Water: 1 L | |\n| 6:00 PM | Dinner + Water: 1 L | Normal meal |\n| 8:00 PM | Water: 1 L | |\n| 9:00 PM | Water: 1 L | |\n| 9:30 PM | Evening weigh-in | Record weight |\n| 10:00 PM | Sleep | 8-9 hours |\n\n---\n\n### Tuesday, May 13 — Very Light Movement + Water Taper Begins\n\n| Time | Activity | Details |\n|------|----------|---------|\n| 7:00 AM | Wake up, weigh in | Record weight — should be trending down |\n| 7:30 AM | Water: 1 L | |\n| 8:30 AM | Breakfast | Reduce sodium — no added salt, avoid processed food |\n| 10:00 AM | Water: 1 L | |\n| 10:30 AM | Light Walk (20-30 min) | Easy pace, outdoors if possible |\n| 11:00 AM | Very Light Movement (15 min) | Gentle stretching, mobility flow, deep breathing |\n| 12:00 PM | Lunch + Water: 1 L | Plain food — rice, grilled chicken, steamed vegetables |\n| 2:00 PM | Water: 1 L | |\n| 3:00 PM | Visualization (15 min) | |\n| 5:00 PM | Water: 1 L | |\n| 6:00 PM | Dinner + Water: 1 L | Plain food, low sodium |\n| 9:00 PM | Evening weigh-in | Record weight |\n| 10:00 PM | Sleep | 8-9 hours |\n\n---\n\n### Wednesday, May 14 — No Training, Water Reduction, Mental Prep\n\n| Time | Activity | Details |\n|------|----------|---------|\n| 7:00 AM | Wake up, weigh in | Record weight — should be noticeably dropping |\n| 7:30 AM | Water: 0.5 L | Sip slowly |\n| 8:30 AM | Breakfast | Small meal — plain rice, egg whites, ~100g carbs for the day |\n| 10:00 AM | Water: 0.5 L | |\n| 10:30 AM | Light Walk (15 min) | Very easy, keep legs moving |\n| 12:00 PM | Lunch + Water: 0.5 L | Small portion — plain chicken, steamed broccoli |\n| 2:00 PM | Water: 0.5 L | |\n| 2:30 PM | Visualization + Strategy (30 min) | Full mental rehearsal — walk-out, touch gloves, Round 1 opening, key sequences, finish |\n| 4:00 PM | Water: 0.5 L | |\n| 5:00 PM | Water: 0.5 L | |\n| 6:00 PM | Dinner + Water: 0.5 L | Small meal — plain rice, lean protein |\n| 7:00 PM | Water: 0.5 L | Final intake for the day |\n| 8:00 PM | Confirm logistics | Final check — travel, cornermen, cutman, equipment, schedule |\n| 9:00 PM | Evening weigh-in | Record weight |\n| 10:00 PM | Sleep | 8-9 hours — prioritize rest |\n\n---\n\n### Thursday, May 15 — No Training, Final Water Reduction, Weight Check\n\n| Time | Activity | Details |\n|------|----------|---------|\n| 7:00 AM | Wake up, weigh in | **Critical weigh-in** — should be within 1-1.5 kg of 77 kg |\n| 7:30 AM | Water: sips | Small sips only when needed |\n| 8:30 AM | Small breakfast | Minimal — half cup rice, 2 egg whites, no salt |\n| 10:00 AM | Water: sips | |\n| 11:00 AM | Light Walk (10 min) | Very easy, stay off feet otherwise |\n| 12:00 PM | Small lunch | Quarter cup rice, small piece of chicken |\n| 1:00 PM | Water: sips | Minimal |\n| 2:00 PM | Mental prep (20 min) | Visualization, breathing exercises, stay calm |\n| 4:00 PM | Water: final sips | Stop water intake by evening |\n| 5:00 PM | Very small dinner | Plain protein, small portion, no carbs |\n| 7:00 PM | Evening weigh-in | Should be very close to 77 kg or within 0.5 kg |\n| 8:00 PM | No more food or water | Done for the night |\n| 9:00 PM | Pack fight bag | Use checklist below |\n| 9:30 PM | Sleep | Sleep as much as possible — 9+ hours target |\n\n**If over 77.5 kg at evening weigh-in:**\n- A warm bath (20 min) can shed 0.5-1 kg\n- Do NOT use sauna unless supervised by experienced coach\n- Light sweat walk in warm clothing (15-20 min maximum)\n\n**If at or below 77 kg at evening weigh-in:**\n- Have a few small sips of water\n- Relax — you are on weight\n\n---\n\n### Friday, May 16 — FIGHT DAY\n\n| Time | Activity | Details |\n|------|----------|---------|\n| 6:00 AM | Wake up, weigh in (private) | Final private weight check — confirm on or under 77 kg |\n| 6:00-8:00 AM | Sips of water only | Very small sips if needed, do not drink freely |\n| 8:00 AM (est.) | **OFFICIAL WEIGH-IN** | Step on scale, make weight, done |\n| **Immediately after weigh-in** | **BEGIN REHYDRATION** | See rehydration protocol below |\n| 8:15 AM | Electrolyte drink (500 mL) | Oral rehydration solution — sip, do not chug |\n| 8:30 AM | Small snack | Banana + white bread with honey |\n| 9:00 AM | Electrolyte drink (500 mL) | Continue sipping |\n| 9:30 AM | Pre-fight Meal 1 | See meal plan below |\n| 11:00 AM | Electrolyte drink (500 mL) | |\n| 11:30 AM | Pre-fight Meal 2 | See meal plan below |\n| 1:00 PM | Sipping water/electrolytes | Continue rehydrating steadily |\n| 2:00 PM | Light snack | Rice cake with honey, banana |\n| 3:00-4:00 PM | Rest / nap if possible | Stay off feet, relax, conserve energy |\n| 4:00 PM | Final pre-fight snack | Small, easily digestible — see meal plan |\n| 5:00 PM | Begin fight prep | Arrive at venue, settle in, start mental routine |\n| 5:30 PM | Light warm-up | Shadow boxing (5 min), dynamic stretches, pad work (2-3 min with corner) |\n| 6:00 PM (est.) | **FIGHT TIME** | Execute the game plan. Trust your preparation. |\n\n> **Note:** Adjust times based on actual weigh-in and fight schedule. The structure remains the same regardless of specific times.\n\n---\n\n## Rehydration Protocol (Post-Weigh-In)\n\nThe goal is to rehydrate from ~77 kg back toward ~79-80 kg before the fight. You have approximately 8-10 hours to rehydrate.\n\n| Timeframe | Fluid | Food | Target |\n|-----------|-------|------|--------|\n| 0-30 min post-weigh-in | 500 mL ORS (oral rehydration solution) | Banana, white bread + honey | Begin absorption |\n| 30-90 min | 500 mL ORS, sip steadily | Pre-fight Meal 1 (see below) | |\n| 90 min - 3 hours | 500 mL water/electrolyte | Pre-fight Meal 2 (see below) | ~1.5 L consumed |\n| 3-6 hours | Sip water/electrolytes as desired | Light snacks as desired | ~2-2.5 L consumed |\n| 6-8 hours | Small sips only | Final small snack (2 hrs before fight) | ~3 L total consumed |\n\n**Rehydration Rules:**\n- **NEVER chug water.** Sip steadily. Chugging causes bloating, nausea, and poor absorption.\n- Use an oral rehydration solution (ORS) or add electrolyte tabs to water (Pedialyte, LMNT, or similar)\n- Do NOT drink plain water only — you need sodium and potassium to retain fluid\n- Stop drinking large volumes 2 hours before fight time\n- Target total fluid intake: 2.5-3.5 L between weigh-in and fight\n- Monitor urine color — aim for pale yellow, not clear (clear means you're flushing, not retaining)\n\n---\n\n## Pre-Fight Meal Plan\n\nAll food should be **easily digestible, familiar, and not gas-producing.** Do not eat anything new on fight day.\n\n### Pre-Fight Meal 1 (~90 min post-weigh-in)\n\n| Food | Amount | Notes |\n|------|--------|-------|\n| White rice | 1.5 cups cooked | Easy carbs, familiar |\n| Grilled chicken breast | 120g | Lean protein |\n| Banana | 1 medium | Potassium source |\n| Honey | 1 tbsp (on rice or bread) | Quick energy |\n\n### Pre-Fight Meal 2 (~3 hours post-weigh-in)\n\n| Food | Amount | Notes |\n|------|--------|-------|\n| White rice or white pasta | 1 cup cooked | Carb loading |\n| Lean protein (chicken/fish) | 100g | |\n| White bread | 1-2 slices | Easily digestible carbs |\n| Small amount of fruit | Banana or melon | |\n\n### Final Pre-Fight Snack (~2 hours before fight)\n\n| Food | Amount | Notes |\n|------|--------|-------|\n| Rice cake | 2 | Light, easy carbs |\n| Honey | 1 tbsp | Quick energy |\n| Banana | Half | |\n| Sips of electrolyte drink | 100-200 mL | |\n\n**Foods to AVOID on fight day:**\n- Dairy (bloating, gas)\n- High fiber foods (beans, whole grains, raw vegetables)\n- Spicy food\n- Fatty or fried food\n- Anything new or unusual\n- Large volumes of any single food\n- Caffeine in excess (one small coffee is fine if habitual)\n\n---\n\n## Mental Preparation Checklist\n\nComplete these tasks across the final week:\n\n### Strategy (Complete by Wednesday, May 14)\n- [ ] Review game plan with coach — know your A-plan and B-plan\n- [ ] Identify opponent's 3 biggest threats and your counter for each\n- [ ] Identify your 3 best weapons and the setups to land them\n- [ ] Know your Round 1 opening — first 30 seconds are scripted\n- [ ] Know your clinch strategy (initiate vs. disengage)\n- [ ] Know your ground strategy (top game vs. get-up plan)\n\n### Visualization (Daily from Thursday, May 8 onward)\n- [ ] Visualize the walk-out — music, crowd, corner team\n- [ ] Visualize touching gloves, opening stance, first exchange\n- [ ] Visualize landing your best combinations\n- [ ] Visualize recovering from adversity (getting hit, taken down)\n- [ ] Visualize executing your game plan under pressure\n- [ ] Visualize winning — hand raised, celebration\n\n### Emotional Readiness\n- [ ] Accept nervousness as normal and useful (adrenaline is fuel)\n- [ ] Identify your pre-fight routine (music, warm-up, breathing)\n- [ ] Practice box breathing (4-4-4-4) — use it between rounds\n- [ ] Have a \"reset word\" for when things get chaotic in the fight\n- [ ] Talk to your corner about communication — keep it simple (1-2 cues max between rounds)\n\n---\n\n## Fight Day Bag Checklist\n\nPack this bag by **Thursday evening, May 15.**\n\n### Competition Gear\n- [ ] MMA gloves (competition approved)\n- [ ] Mouthguard (primary + backup)\n- [ ] Groin protector / cup\n- [ ] MMA shorts (competition approved, no pockets, no zippers)\n- [ ] Rash guard (if required by promotion)\n- [ ] Hand wraps (2 pairs)\n- [ ] Athletic tape\n\n### Warm-Up / Corner\n- [ ] Training gloves or pads (for corner warm-up)\n- [ ] Vaseline (for cornerman to apply)\n- [ ] Ice bags (ask venue or bring cooler)\n- [ ] Towels (2-3)\n- [ ] Gauze and tape (corner supplies)\n- [ ] Adrenaline / epinephrine swabs (if allowed — ask corner)\n- [ ] Enswell (cold compress for swelling)\n\n### Nutrition / Hydration\n- [ ] Electrolyte solution/powder (Pedialyte, LMNT, or similar)\n- [ ] Water bottles (at least 2, filled)\n- [ ] Bananas (2-3)\n- [ ] White rice (pre-cooked in container)\n- [ ] Honey packets\n- [ ] Rice cakes\n- [ ] White bread\n- [ ] Pre-cooked chicken breast (in container, keep cool)\n\n### Personal\n- [ ] Photo ID (required for weigh-in)\n- [ ] Medical clearance / fight license documentation\n- [ ] Insurance documentation (if required)\n- [ ] Phone + charger\n- [ ] Headphones + fight playlist loaded\n- [ ] Change of clothes (post-fight)\n- [ ] Flip-flops / slides\n- [ ] Toiletries (deodorant, etc.)\n- [ ] Cash (for incidentals)\n\n### Recovery (Post-Fight)\n- [ ] Extra food for after the fight (whatever you want — you earned it)\n- [ ] More electrolytes\n- [ ] Compression gear (optional)\n- [ ] Arnica gel or anti-inflammatory cream\n\n---\n\n## Warning Signs During the Water Cut\n\nMonitor for these warning signs throughout the week. **If any STOP signs appear, halt the cut immediately and seek medical advice.**\n\n### Normal / Expected\n| Symptom | Notes |\n|---------|-------|\n| Mild thirst | Expected from Wednesday onward |\n| Slightly reduced energy | Normal, conserve energy |\n| Darker urine | Expected as water intake drops |\n| Mild irritability | Normal — manage with breathing exercises |\n| Slight headache (brief) | Can occur, usually resolves |\n| Dry mouth | Expected Thursday/Friday |\n\n### Caution — Slow Down\n| Symptom | Action |\n|---------|--------|\n| Persistent headache | Small sips of electrolyte solution, reassess in 30 min |\n| Mild dizziness when standing | Sit down, sip electrolytes, move slowly |\n| Muscle cramps | Electrolytes needed — small sips of ORS |\n| Extreme irritability / mood swings | Rest, breathe, reduce any remaining activity |\n| Poor sleep quality | Accept it, stay in bed, rest even if not sleeping |\n\n### STOP — Seek Help Immediately\n| Symptom | Action |\n|---------|--------|\n| Severe dizziness or fainting | **STOP CUT.** Drink electrolytes. Call coach/doctor. |\n| Rapid or irregular heartbeat | **STOP CUT.** Seek medical attention immediately. |\n| Confusion or disorientation | **STOP CUT.** This is dangerous. Rehydrate now. |\n| Inability to stand | **STOP CUT.** Medical emergency possible. |\n| Chest pain | **STOP CUT. CALL EMERGENCY SERVICES.** |\n| Vomiting (unable to keep fluids down) | **STOP CUT.** Seek medical help — dehydration will worsen. |\n| Seizures or muscle spasms (severe) | **STOP CUT. CALL EMERGENCY SERVICES.** |\n\n> **Remember:** No fight is worth your health. A 2 kg water cut is mild and should be straightforward. If it becomes anything more than mildly uncomfortable, something is wrong. Speak up.\n\n---\n\n## Phase 4 Summary\n\n| Day | Date | Training | Water | Sodium | Key Focus |\n|-----|------|----------|-------|--------|-----------|\n| Sunday | May 11 | Last light session (40 min) | 8 L | Normal | Water loading begins |\n| Monday | May 12 | Shadow boxing (20 min) | 8 L | Normal | Continue loading |\n| Tuesday | May 13 | Light walk + movement (30 min) | 6 L | Reduced | Begin sodium reduction |\n| Wednesday | May 14 | No training | 4 L | Low | Mental prep, reduce carbs |\n| Thursday | May 15 | No training | 2 L | Minimal | Final weight check, pack bag |\n| Friday | May 16 | **FIGHT DAY** | Sips → rehydrate | None → normal | Make weight, rehydrate, fight |\n\n---\n\n## Final Note\n\nThe work is done. Eight weeks of preparation have built your body, sharpened your skills, and hardened your mind. Fight week is about executing the plan, making weight safely, and showing up ready.\n\nTrust your preparation. Trust your corner. Trust yourself.\n\nGo get it.\n", "weight-management": "# Weight Management\n\n**Fight Date:** May 16, 2026 | **Weight Class:** 77 kg | **Camp Duration:** 9 weeks\n\n---\n\n## 1. Weight Cut Overview\n\n| Parameter | Value |\n|-----------|-------|\n| Starting weight | 89 kg |\n| Target weigh-in weight | 77 kg |\n| Total cut | 12 kg |\n| Chronic dieting (Weeks 1-8) | ~9 kg (fat loss + glycogen depletion) |\n| Acute water cut (Week 9) | ~3 kg |\n| Camp duration | 9 weeks |\n\n**Strategy:** Lose the majority of weight through sustained caloric deficit over 8 weeks, preserving as much muscle and performance as possible. Reserve the final 3 kg for a water/sodium manipulation protocol in fight week. This keeps the acute water cut within safe limits (~3.8% of body weight at 79 kg).\n\n> **WARNING:** A 12 kg total cut is aggressive. This requires strict dietary compliance, consistent monitoring, and ideally supervision from a sports nutritionist experienced with combat athletes. If weight loss stalls or performance degrades significantly, reassess the target weight class.\n\n---\n\n## 2. Per-Phase Caloric Targets\n\n| Phase | Weeks | Caloric Deficit | Training Day kcal | Rest Day kcal | Target Weight (end of phase) | Notes |\n|-------|-------|----------------|-------------------|---------------|------------------------------|-------|\n| **Phase 1 — Base Cut** | 1-3 | ~500 kcal/day | ~2,600 | ~2,100 | 85 kg | Establish deficit, maintain training intensity. ~1.3 kg/week loss. |\n| **Phase 2 — Accelerated Cut** | 4-6 | ~600 kcal/day | ~2,400 | ~1,900 | 81 kg | Slightly deeper deficit. Increase protein to offset muscle loss. ~1.3 kg/week loss. |\n| **Phase 3 — Final Trim** | 7-8 | ~500 kcal/day | ~2,400 | ~2,000 | 79 kg | Reduce deficit slightly to protect performance before fight. Begin water loading prep at end of Week 8. ~1 kg/week loss. |\n| **Phase 4 — Fight Week** | 9 | Water/sodium manipulation | Minimal structured meals | — | 77 kg | Glycogen depletion + water cut for final ~3 kg. Food intake is minimal and strategic. |\n\n**Key principles:**\n- Protein stays at 2.3 g/kg throughout (higher than maintenance to preserve lean mass during deficit)\n- Deficit is created primarily by reducing carbohydrates and fats — never by cutting protein\n- Training day calories are always higher than rest day calories (carb cycling)\n\n---\n\n## 3. Weight Cut Timeline\n\nTarget weight at the end of each week (weighed fasted, morning, same scale):\n\n| Week | Target Weight (kg) | Cumulative Loss (kg) | Phase | Notes |\n|------|-------------------|----------------------|-------|-------|\n| Start | 89.0 | 0.0 | — | Camp begins |\n| 1 | 87.7 | 1.3 | Phase 1 | Initial water/glycogen drop may be faster |\n| 2 | 86.4 | 2.6 | Phase 1 | Steady loss |\n| 3 | 85.0 | 4.0 | Phase 1 | End of Phase 1 — reassess |\n| 4 | 83.7 | 5.3 | Phase 2 | Deeper deficit begins |\n| 5 | 82.3 | 6.7 | Phase 2 | Mid-camp check — conditioning test |\n| 6 | 81.0 | 8.0 | Phase 2 | End of Phase 2 — reassess |\n| 7 | 80.0 | 9.0 | Phase 3 | Protect performance, moderate deficit |\n| 8 | 79.0 | 10.0 | Phase 3 | Water loading prep begins end of week |\n| 9 | 77.0 | 12.0 | Phase 4 (Fight Week) | Water/sodium cut for final 2-3 kg |\n\n> **If you are more than 1 kg behind target at any checkpoint**, do NOT increase the deficit beyond 600 kcal/day. Instead, add 20-30 minutes of low-intensity steady-state cardio (walking, cycling) on 2-3 rest days. Crash dieting destroys training quality and fight performance.\n\n---\n\n## 4. Macronutrient Framework\n\n### Per-Kilogram Targets\n\n| Nutrient | g/kg | Notes |\n|----------|------|-------|\n| **Protein** | 2.3 | Higher than maintenance (was 2.1) to preserve muscle during deficit. ~185 g constant. |\n| **Carbs** | Varies by day type | Cycled by training demand — see table below |\n| **Fat** | 0.8-1.0 | Minimum for hormonal health. ~65-80 g depending on phase. |\n\n### Daily Totals by Day Type (Phase 1-2 Example at ~83 kg)\n\n| Day Type | Protein | Carbs | Fat | kcal | Carb g/kg |\n|----------|---------|-------|-----|------|-----------|\n| **Training Day** | 185 g | 280-300 g | 70 g | ~2,400-2,600 | 3.4-3.6 |\n| **Double Session Day** | 185 g | 320 g | 75 g | ~2,700 | 3.9 |\n| **Rest Day** | 185 g | 170-200 g | 65 g | ~1,900-2,100 | 2.0-2.4 |\n\n**Adjustments as weight drops:**\n- Protein stays at 185 g constant (this becomes a higher g/kg as weight decreases — protective)\n- Carbs are the primary lever — reduce by 20-30 g per phase as needed\n- Fat should not drop below 0.8 g/kg (~65 g at 80 kg) to maintain testosterone and recovery\n\n---\n\n## 5. Meal Timing\n\n### Pre-Training (2-3 hours before)\n\n| Nutrient | Target | Grams | Goal |\n|----------|--------|-------|------|\n| Carbs | 1-1.5 g/kg | 80-120 g | Top off glycogen without excess calories |\n| Protein | 0.3-0.4 g/kg | 25-35 g | Start muscle protein synthesis |\n| Fat | Low | < 10 g | Speed gastric emptying |\n\n### Pre-Training Snack (30-60 min before)\n\n- **30-40 g fast-digesting carbs** — banana, white rice cake with honey, sports drink\n- Keep fat and fiber minimal to avoid GI distress during training\n\n### Intra-Workout (double sessions or any session > 90 min)\n\n- **30-60 g carbs per hour** — sports drink, gummy bears, highly branched cyclic dextrin\n- **Electrolytes** — 500-700 mg sodium per liter of fluid\n- Sip continuously; do not chug between rounds\n- During a cut, intra-workout carbs are even more critical to protect training quality\n\n### Post-Training (within 1-2 hours)\n\n| Nutrient | Target | Grams | Goal |\n|----------|--------|-------|------|\n| Protein | 0.3-0.5 g/kg | 25-40 g | Kickstart recovery/MPS |\n| Carbs | 1-1.2 g/kg | 80-100 g | Replenish glycogen |\n\n---\n\n## 6. Sample Meal Plans\n\n### Training Day (~2,600 kcal — Phase 1)\n\n| Meal | Time | Food | P | C | F | kcal |\n|------|------|------|---|---|---|------|\n| **Meal 1 — Breakfast** | 7:00 AM | 3 whole eggs scrambled, 1 slice sourdough toast, 1 banana | 25 g | 50 g | 18 g | 460 |\n| **Meal 2 — Pre-Training** | 11:00 AM | 150 g chicken breast, 200 g white rice (cooked), mixed greens, 1 tsp olive oil | 45 g | 70 g | 12 g | 570 |\n| **Pre-Training Snack** | 12:30 PM | 1 banana + 1 tsp honey | 1 g | 35 g | 0 g | 145 |\n| **Intra-Training** | 1:00-3:00 PM | 500 ml sports drink | 0 g | 30 g | 0 g | 120 |\n| **Meal 3 — Post-Training** | 3:30 PM | 40 g whey protein, 80 g oats (dry weight), 150 g blueberries | 40 g | 85 g | 8 g | 570 |\n| **Meal 4 — Dinner** | 7:00 PM | 180 g salmon fillet, 150 g sweet potato, 150 g broccoli | 42 g | 35 g | 18 g | 470 |\n| **Meal 5 — Pre-Bed** | 9:30 PM | 200 g Greek yogurt (full fat), 20 g walnuts | 18 g | 15 g | 16 g | 275 |\n| **DAILY TOTAL** | | | **171 g** | **320 g** | **72 g** | **~2,610** |\n\n*Increase chicken portion at Meal 2 by 30 g to push protein closer to 185 g target. Adjust rice portion down by 25 g if weight loss stalls.*\n\n### Rest Day (~2,100 kcal — Phase 1)\n\n| Meal | Time | Food | P | C | F | kcal |\n|------|------|------|---|---|---|------|\n| **Meal 1 — Breakfast** | 8:30 AM | 3 whole eggs + 2 egg whites scrambled, 100 g cherry tomatoes, 1/4 avocado | 32 g | 10 g | 20 g | 350 |\n| **Meal 2 — Lunch** | 12:30 PM | 180 g lean ground beef (93%), 120 g white rice (cooked), roasted vegetables | 45 g | 40 g | 15 g | 475 |\n| **Meal 3 — Afternoon** | 4:00 PM | 30 g whey protein, 1 apple, 20 g almonds | 30 g | 30 g | 12 g | 350 |\n| **Meal 4 — Dinner** | 7:00 PM | 150 g chicken thigh (skin removed), large mixed salad, 1 tbsp olive oil dressing | 38 g | 12 g | 18 g | 370 |\n| **Meal 5 — Pre-Bed** | 9:30 PM | 250 g cottage cheese, 10 g honey | 32 g | 15 g | 5 g | 235 |\n| **DAILY TOTAL** | | | **177 g** | **107 g** | **70 g** | **~1,780** |\n\n*Add a rice cake or piece of fruit at lunch to bring closer to 2,100 kcal target if needed. Adjust carbs upward with simple additions, not fats.*\n\n---\n\n## 7. Hydration Protocol\n\n### Daily Baseline (Non-Fight-Week)\n\n| Metric | Calculation | Target |\n|--------|-------------|--------|\n| Body weight method | Current weight x 35-45 ml/kg | **3.0-3.8 L per day** |\n\nAim for the higher end on training days and in warm conditions.\n\n### Around Training\n\n| Window | Protocol |\n|--------|----------|\n| **Pre-training** (2 hours before) | 500 ml water, steadily sipped |\n| **During training** | 600-1,200 ml per hour with electrolytes |\n| **Post-training** | Replace 150% of fluid lost (weigh before/after if possible) |\n\n### Electrolyte Targets During Training\n\n- **Sodium:** 500-700 mg per liter of fluid\n- **Potassium:** 150-200 mg per liter\n- Add a pinch of salt to water or use a commercial electrolyte mix\n\n### Monitoring\n\n- **Urine color:** Aim for pale straw yellow. Clear = overhydrated. Dark yellow/amber = dehydrated.\n- Check first thing in the morning — this is your best baseline indicator.\n- If weigh-in shows > 2% body weight loss post-session, increase fluid intake next session.\n\n---\n\n## 8. Water Loading Protocol (Fight Week — Week 9)\n\n> **WARNING: Water manipulation is DANGEROUS if done incorrectly. Work with an experienced coach or nutritionist who has managed weight cuts before. The protocol below is an outline only — individual responses vary significantly.**\n\n**Pre-conditions:** You must be at or below 79 kg entering fight week. If you are above 80 kg at the start of Week 9, reconsider whether the water cut is safe — you may need to cut more than 3 kg acutely, which increases risk.\n\n| Days Out from Weigh-In | Water Intake | Sodium | Carbs | Food | Notes |\n|-------------------------|-------------|--------|-------|------|-------|\n| **7 days (Saturday)** | 8 L/day | Normal (~3,000 mg) | Normal | Normal meals | Begin water loading — train kidneys to excrete at high rate |\n| **6 days (Sunday)** | 8 L/day | Normal | Normal | Normal meals | Continue loading. Spread intake across waking hours. |\n| **5 days (Monday)** | 8 L/day | Normal | Normal | Normal meals | Continue loading. Monitor urine — should be very clear. |\n| **4 days (Tuesday)** | 6 L/day | Reduce by 50% (~1,500 mg) | Normal | Normal meals | Begin tapering. Body still excreting at high rate. |\n| **3 days (Wednesday)** | 4 L/day | Reduce to minimal (~500 mg) | Begin reducing (~150 g) | Smaller meals, lean protein + low-fiber carbs | Taper continues. Avoid high-sodium foods. |\n| **2 days (Thursday)** | 2 L/day | Minimal (~300 mg) | Low (~75 g) | Small meals: chicken, rice, banana | Body still excreting at high rate but intake is low. Weight drops noticeably. |\n| **1 day (Friday — 24h before weigh-in)** | Sips only (~500 ml max) | Minimal | Very low (~50 g) | Light: chicken breast, small portion rice | Restrict to small sips as needed. Hot bath (20 min at 40-42C) for final 0.5-1 kg if needed. |\n| **Weigh-in morning (Saturday)** | Nothing until after weigh-in | — | — | Nothing | Weigh in. Then immediately begin rehydration protocol below. |\n\n**Additional fight week tactics:**\n- Low-fiber diet from Wednesday onward to reduce gut content weight (~0.5 kg)\n- A hot Epsom salt bath (20 min) the night before weigh-in can shed an extra 0.5-1 kg through sweat\n- Sauna use should be limited to 15-20 minute sessions maximum with monitoring — never alone\n- Weigh yourself multiple times per day during fight week to track progress\n\n---\n\n## 9. Rehydration & Refueling Plan (Post-Weigh-In)\n\nBegin immediately after stepping off the scale. The goal is to regain as much of the cut weight as possible before fight time.\n\n| Prio
