 III (WS4SB III)*. Website: [defrancostraining.com](https://www.defrancostraining.com). Upper/lower split with max-effort and repetition-effort methods adapted for athletes.\n\n---\n\n## 2. Scientific Papers — Nutrition\n\n1. **Reale R, Slater G, Cox GR, Dunican IC, Burke LM, et al.** — \"ISSN position stand: nutrition for combat sports.\" *Journal of the International Society of Sports Nutrition*, 2025. DOI: [10.1080/15502783.2025.2467909](https://doi.org/10.1080/15502783.2025.2467909)\n\n2. **Kasper AM, Cocking S, Cocber M, Sherwood M, et al.** — \"Carbohydrate and fluid manipulation in combat sports.\" *Nutrients*, 2021. PMC: [PMC8334642](https://www.ncbi.nlm.nih.gov/pmc/articles/PMC8334642/)\n\n---\n\n## 3. Scientific Papers — Training & Periodization\n\n1. **Wilson JM, Marin PJ, Rhea MR, Wilson SMC, Loenneke JP, Anderson JC.** — \"Concurrent training: a meta-analysis examining interference of aerobic and resistance exercises.\" *Journal of Strength and Conditioning Research*, 2012; 26(8): 2293–2307. PMID: [22002517](https://pubmed.ncbi.nlm.nih.gov/22002517/)\n\n2. **Fyfe JJ, Bishop DJ, Stepto NK.** — \"Interference between concurrent resistance and endurance exercise: molecular bases and the role of individual training variables.\" *Sports Medicine*, 2014; 44(6): 743–762. PMID: [24728927](https://pubmed.ncbi.nlm.nih.gov/24728927/)\n\n3. **Sabag A, Najafi A, Michael S, Esgin T, Halaki M, Hackett D.** — \"The compatibility of concurrent high-intensity interval training and resistance training for muscular strength and hypertrophy: a systematic review and meta-analysis.\" *Journal of Sports Sciences*, 2018; 36(21): 2472–2483. PMID: [29809072](https://pubmed.ncbi.nlm.nih.gov/29809072/)\n\n4. **Franchini E, Cormack S, Takito MY, Hasan AAA, Yuri DA, et al.** — \"Energy system contributions in combat sports: a systematic review.\" *International Journal of Environmental Research and Public Health*, 2023. PMC: [PMC9961508](https://www.ncbi.nlm.nih.gov/pmc/articles/PMC9961508/)\n\n5. **Tota Ł, Drwal T, Fischedick A, et al.** — \"Conditioning training and its effects on preparation of MMA athletes.\" *International Journal of Environmental Research and Public Health*, 2019; 16(9): 1495. PMC: [PMC6942465](https://www.ncbi.nlm.nih.gov/pmc/articles/PMC6942465/)\n\n6. **Kostikiadis IN, Methenitis S, Tsoukos A, Veligekas P, Terzis G, Bogdanis GC.** — \"The effect of short-term sport-specific strength and conditioning training on physical fitness of well-trained mixed martial arts athletes.\" *Journal of Sports Science and Medicine*, 2018; 17(3): 348–358. PMC: [PMC6090403](https://www.ncbi.nlm.nih.gov/pmc/articles/PMC6090403/)\n\n7. **Schoenfeld BJ.** — \"Periodization for MMA: bridging the gap between science and practice.\" Academia.edu. URL: [academia.edu](https://www.academia.edu) (search: Schoenfeld periodization MMA)\n\n8. **James LP, Haff GG, Kelly VG, Beckman EM.** — \"Towards a determination of the physiological characteristics distinguishing successful mixed martial arts athletes: a systematic review of combat sport literature.\" *Sports Medicine*, ResearchGate. URL: [researchgate.net](https://www.researchgate.net) (search: James strength conditioning MMA)\n\n---\n\n## 4. Scientific Papers — Recovery\n\n1. **Dupuy O, Douzi W, Theurot D, Bosquet L, Dugué B.** — \"An evidence-based approach for choosing post-exercise recovery techniques to reduce markers of muscle damage, soreness, fatigue, and inflammation: a systematic review with meta-analysis.\" *Frontiers in Physiology*, 2020. PMID: [33092328](https://pubmed.ncbi.nlm.nih.gov/33092328/)\n\n2. **Souza DB, Delvaux F, Schwartz C, Croisier JL.** — \"Recovery methods used by combat sport athletes: a scoping review.\" *Sports Medicine - Open*, 2025. PMID: [40378882](https://pubmed.ncbi.nlm.nih.gov/40378882/)\n\n3. **Carvalho L, Freitas TT, Pereira LA, Nakamura FY, Loturco I.** — \"Fatigue markers and performance recovery in mixed martial arts athletes after competitive bouts.\" *Scientific Reports*, 2025. DOI: [10.1038/s41598-025-09719-z](https://doi.org/10.1038/s41598-025-09719-z)\n\n---\n\n## 5. Scientific Papers — Supplementation\n\n1. **Kreider RB, Kalman DS, Antonio J, Ziegenfuss TN, Wildman R, et al.** — \"International Society of Sports Nutrition position stand: safety and efficacy of creatine supplementation in exercise, sport, and medicine.\" *Journal of the International Society of Sports Nutrition*, 2017; 14: 18. PMC: [PMC5469049](https://www.ncbi.nlm.nih.gov/pmc/articles/PMC5469049/)\n\n2. **Guest NS, VanDusseldorp TA, Nelson MT, Grgic J, Schoenfeld BJ, et al.** — \"International Society of Sports Nutrition position stand: caffeine and exercise performance.\" *Journal of the International Society of Sports Nutrition*, 2021; 18(1): 1. PMC: [PMC7777221](https://www.ncbi.nlm.nih.gov/pmc/articles/PMC7777221/)\n\n3. **Maughan RJ, Burke LM, Dvorak J, Larson-Meyer DE, Peeling P, et al.** — \"IOC consensus statement: dietary supplements and the high-performance athlete.\" *British Journal of Sports Medicine*, 2018; 52(7): 439–455. PMC: [PMC5867441](https://www.ncbi.nlm.nih.gov/pmc/articles/PMC5867441/)\n\n4. **Ashtary-Larky D, Asbaghi O, Moosavian SP, et al.** — \"Creatine supplementation in combat sports: a systematic review.\" *Journal of the International Society of Sports Nutrition*, 2025. PMID: [40755023](https://pubmed.ncbi.nlm.nih.gov/40755023/)\n\n5. **Li Z, Chen Y, Wang X, et al.** — \"Effects of dietary supplements on physical performance in combat athletes: a systematic review and meta-analysis of randomized controlled trials.\" *Scientific Reports*, 2024. DOI: [10.1038/s41598-024-84359-3](https://doi.org/10.1038/s41598-024-84359-3)\n\n---\n\n## 6. Scientific Papers — Sleep & Recovery\n\n1. **Vitale KC, Owens R, Hopkins SR, Malhotra A.** — \"Sleep hygiene for optimizing recovery in athletes: review and recommendations.\" *International Journal of Sports Medicine*, 2019; 40(8): 535–543. PMC: [PMC6988893](https://www.ncbi.nlm.nih.gov/pmc/articles/PMC6988893/)\n\n2. **Bonnar D, Lee S, Roane BM, et al.** — \"Sleep and athletic performance: impacts on physical performance, mental health, injury risk, nutrition, and recovery.\" *Sleep Medicine Reviews*, 2023. PMC: [PMC9960533](https://www.ncbi.nlm.nih.gov/pmc/articles/PMC9960533/)\n\n3. **Mah CD, Mah KE, Kezirian EJ, Dement WC.** — \"The effects of sleep extension on the athletic performance of collegiate basketball players.\" *Sleep*, 2011; 34(7): 943–950. DOI: [10.5665/SLEEP.1132](https://doi.org/10.5665/SLEEP.1132)\n\n---\n\n## 7. Scientific Papers — Hydration\n\n1. **Sawka MN, Burke LM, Eichner ER, Maughan RJ, Montain SJ, Stachenfeld NS.** — \"American College of Sports Medicine position stand: exercise and fluid replacement.\" *Medicine & Science in Sports & Exercise*, 2007; 39(2): 377–390. DOI: [10.1249/mss.0b013e31802ca597](https://doi.org/10.1249/mss.0b013e31802ca597)\n\n---\n\n## 8. Scientific Papers — Vitamin & Mineral\n\n1. **Chiang CM, Ismaeel A, Griffis RB, Weems S.** — \"Effects of vitamin D supplementation on muscle strength in athletes: a systematic review.\" *Journal of Strength and Conditioning Research*, 2023. PMC: [PMC10768611](https://www.ncbi.nlm.nih.gov/pmc/articles/PMC10768611/)\n\n2. **Heffernan SM, Horner K, et al.** — \"The role of vitamin D and magnesium in athletic performance and recovery.\" *Nutrients*, 2025; 17(10): 1655. DOI: [10.3390/nu17101655](https://doi.org/10.3390/nu17101655)\n\n---\n\n## 9. Organizations\n\n1. **UFC Performance Institute (UFCPI)** — Website: [ufcpi.com](https://www.ufcpi.com). Training phases and periodization chart for MMA athletes. *UFC Performance Institute's Training & Nutrition Guide*, 2018 (publicly available PDF). Sport science research on MMA athlete profiling, body composition, and performance benchmarks.\n"};
var CONTENT_BOS = {"dashboard": "# Kontrolna Tabla Borila\\u010Dkog Kampa\n\n> **Borac:** Anes Kurtovic | **Te\\u017Einska Klasa:** 77 kg | **Datum Borbe:** 16. maj 2026\n> **Po\\u010Detak Kampa:** 16. mart 2026 | **Trajanje:** 9 Sedmica | **Trenutna Te\\u017Eina:** 89 kg\n\n---\n\n## Odbrojavanje do Dana Borbe\n\n<div id=\"widget-countdown\"></div>\n\n---\n\n## Napredak Te\\u017Eine\n\n<div id=\"widget-weight\"></div>\n\n> **Napomena:** Podaci o te\\u017Eini se \\u010Duvaju u lokalnom skladi\\u0161tu va\\u0161eg preglednika. Brisanje podataka preglednika \\u0107e resetovati evidenciju te\\u017Eine. Vagajte se svako jutro \\u2014 nata\\u0161te, nakon kori\\u0161tenja kupatila, ista vaga.\n\n---\n\n## Trenutna Faza\n\n<div id=\"widget-phase\"></div>\n\n---\n\n## Dana\\u0161nji Trening\n\n<div id=\"widget-today\"></div>\n\n---\n\n## Pregled Kampa\n\n| Faza | Sedmice | Datumi | Ciljna Te\\u017Eina | Fokus |\n|------|---------|--------|----------------|-------|\n| **Faza 1 \\u2014 Baza** | 1-3 | 16. mar - 5. apr | 89 \\u2192 85 kg | Kvalitet pokreta, uspostavljanje osnove, postepeni deficit |\n| **Faza 2 \\u2014 Intenzifikacija** | 4-6 | 6. apr - 26. apr | 85 \\u2192 81 kg | Maksimalni volumen, najte\\u017Ei kondicioni, sparring 2x/sed |\n| **Faza 3 \\u2014 O\\u0161trenje** | 7-8 | 27. apr - 10. maj | 81 \\u2192 79 kg | Smanjenje volumena, rad na brzini, uvje\\u017Ebavanje plana igre |\n| **Faza 4 \\u2014 Sedmica Borbe** | 9 | 11. maj - 16. maj | 79 \\u2192 77 kg | Skidanje vode, lagana tehnika, mentalna priprema |\n\n---\n\n## Brze Veze\n\n- [Faza 1: Baza](#phase-1) \\u2014 Sedmice 1-3 (16. mar - 5. apr)\n- [Faza 2: Intenzifikacija](#phase-2) \\u2014 Sedmice 4-6 (6. apr - 26. apr)\n- [Faza 3: O\\u0161trenje](#phase-3) \\u2014 Sedmice 7-8 (27. apr - 10. maj)\n- [Faza 4: Sedmica Borbe](#phase-4) \\u2014 Sedmica 9 (11. maj - 16. maj)\n- [Upravljanje Te\\u017Einom](#weight-management) \\u2014 Ishrana, skidanje te\\u017Eine, suplementi\n- [Alati za Trening](#training-tools) \\u2014 Biblioteka vje\\u017Ebi, protokoli zagrijavanja\n- [Priprema za Borbu](#fight-prep) \\u2014 Sigurnost, testiranje, plan igre\n- [Kompletan Raspored](#schedule) \\u2014 Kalendarski pregled 9 sedmica\n\n---\n\n## Procijenjeni 1RM\n\n| Vje\\u017Eba | Procijenjeni 1RM |\n|--------|------------------|\n| \\u010Cu\\u010Danj | 150 kg |\n| Mrtvo dizanje | 180 kg |\n| Potisak na klupi | 115 kg |\n| Potisak iznad glave | 75 kg |\n\n*Ponovo procijeniti na sredini kampa (Sedmica 5) i prije borbe (Sedmica 8).*\n\n---\n\n## Filozofija Treninga\n\nOvaj borila\\u010Dki kamp koristi provjerene metodologije kombinovane u kohezivni okvir:\n\n- **Konkurentni Trening** (Alex Viada) \\u2014 Istovremeni razvoj snage, eksplozivnosti i izdr\\u017Eljivosti\n- **Razvoj Energetskih Sistema** (Joel Jamieson) \\u2014 Izgradnja aerobne baze, zatim anaerobni kapacitet\n- **Snaga Bez Mase** (Pavel Tsatsouline) \\u2014 Neuralne adaptacije umjesto hipertrofije za ostanak u kategoriji\n- **Trofazi\\u010Dni Trening** (Cal Dietz) \\u2014 Ekscentri\\u010Dna \\u2192 Izometri\\u010Dka \\u2192 Eksplozivna koncentri\\u010Dna progresija\n- **Volumen Iznad Intenziteta za Vje\\u0161tine** (Firas Zahabi) \\u2014 \\u010Cest tehni\\u010Dki rad ispod praga povrede\n- **Funkcionalni Pokret** (Mike Boyle) \\u2014 Naglasak na jednoj nozi, anti-pokretni rad jezgra\n- **Borila\\u010Dki S&C** (Phil Daru) \\u2014 Vje\\u017Ebe s direktnim prijenosom u kavez\n", "schedule": "# 9-Week Fight Camp Schedule\n\n> **Fight Date:** May 16, 2026 | **Weight Class:** 77 kg\n> **Camp Start:** March 16, 2026 | **Starting Weight:** 89 kg\n\n---\n\n## Intensity Key\n\n| Marker | Meaning |\n|--------|---------|\n| Easy | Recovery pace, low CNS demand |\n| Moderate | Working hard but controlled |\n| Hard | High demand, plan recovery accordingly |\n\n---\n\n## Phase 1 — Base Camp (Weeks 1-3)\n\n**Focus:** Movement quality, baseline establishment, gradual caloric deficit begins.\n**Weight Target:** 89 kg → 85 kg\n\n### Week 1 — Base ** | Fight Conditioning (45 min) Hard | Open Mat / Light Technical (60 min) Easy |\n| **Sunday** | REST | REST |\n\n---\n\n## Phase 2 — Intensification (Weeks 4-6)\n\n**Focus:** Peak training volume, hardest conditioning, sparring ramps to 2x/week.\n**Weight Target:** 85 kg → 81 kg\n\n### Week 4 — Intensification Begins (Apr 6-12) | RPE 7-8\n\n| Day | AM Session | PM Session |\n|-----|-----------|------------|\n| **Monday** | Strength — Upper Push/Pull (60 min) Moderate | MMA Striking + Clinch (75 min) Hard |\n| **Tuesday** | Cardiac Output (45 min) Easy | MMA Sparring — Light (75 min) Hard |\n| **Wednesday** | Strength — Lower + Posterior (65 min) Hard | Light Technique / Open Mat (60 min) Easy |\n| **Thursday** | HIIT / Fight Circuit (40 min) Hard | MMA Full Sparring (90 min) Hard |\n| **Friday** | Strength — Full Body Power (55 min) Moderate | MMA Drilling — Game Plan (75 min) Moderate |\n| **Saturday** | Fight Conditioning (45 min) Hard | Open Mat / Light Technical (60 min) Easy |\n| **Sunday** | REST | REST |\n\n### Week 5 — Deep Intensification (Apr 13-19) | RPE 8-9\n\n| Day | AM Session | PM Session |\n|-----|-----------|------------|\n| **Monday** | Strength — Upper Push/Pull (60 min) Hard | MMA Striking + Clinch (75 min) Hard |\n| **Tuesday** | Cardiac Output (45 min) Easy | MMA Sparring — Moderate (80 min) Hard |\n| **Wednesday** | Strength — Lower + Posterior (65 min) Hard | Light Technique / Open Mat (60 min) Easy |\n| **Thursday** | HIIT / Fight Circuit (45 min) Hard | MMA Full Sparring (90 min) Hard |\n| **Friday** | Strength — Full Body Power (55 min) Hard | MMA Drilling — Game Plan (75 min) Moderate |\n| **Saturday** | Fight Conditioning (50 min) Hard | Open Mat / Light Technical (60 min) Easy |\n| **Sunday** | REST | REST |\n\n### Week 6 — Peak Camp (Apr 20-26) | RPE 8-9 (PEAK)\n\n| Day | AM Session | PM Session |\n|-----|-----------|------------|\n| **Monday** | Strength — Upper Push/Pull (60 min) Hard | MMA Striking + Clinch (75 min) Hard |\n| **Tuesday** | Cardiac Output (45 min) Easy | MMA Sparring — Hard (80 min) Hard |\n| **Wednesday** | Strength — Lower + Posterior (65 min) Hard | Light Technique / Open Mat (60 min) Easy |\n| **Thursday** | HIIT / Fight Circuit (45 min) Hard | MMA Full Sparring (90 min) Hard |\n| **Friday** | Strength — Full Body Power (55 min) Hard | MMA Drilling — Game Plan (75 min) Moderate |\n| **Saturday** | Fight Simulation — 5 Rounds (50 min) Hard | Open Mat / Light Technical (60 min) Easy |\n| **Sunday** | REST | REST |\n\n---\n\n## Phase 3 — Sharpening (Weeks 7-8)\n\n**Focus:** Reduce volume, sharpen technique, speed and timing work, game plan specifics.\n**Weight Target:** 81 kg → 79 kg (within water-cut range)\n\n### Week 7 — Volume Reduction (Apr 27 - May 3) | RPE 7-8\n\n| Day | AM Session | PM Session |\n|-----|-----------|------------|\n| **Monday** | Strength — Upper (45 min) Moderate | MMA Striking — Technical (60 min) Moderate |\n| **Tuesday** | Cardiac Output (30 min) Easy | MMA Sparring — Light (60 min) Moderate |\n| **Wednesday** | Strength — Lower (45 min) Moderate | Light Technique / Visualization (45 min) Easy |\n| **Thursday** | Short HIIT (25 min) Hard | MMA Technical Sparring (60 min) Moderate |\n| **Friday** | Active Recovery (30 min) Easy | MMA Drilling — Game Plan (60 min) Moderate |\n| **Saturday** | Conditioning Test — Mid-Camp (45 min) Moderate | Open Mat / Light (45 min) Easy |\n| **Sunday** | REST | REST |\n\n### Week 8 — Final Sharpening (May 4-10) | RPE 6-7\n\n| Day | AM Session | PM Session |\n|-----|-----------|------------|\n| **Monday** | Strength — Light Full Body (35 min) Easy | MMA Striking — Light Technical (50 min) Easy |\n| **Tuesday** | Cardiac Output (25 min) Easy | MMA Light Drilling — No Sparring (50 min) Easy |\n| **Wednesday** | Mobility / Yoga (30 min) Easy | Game Plan Walkthrough (40 min) Easy |\n| **Thursday** | Light Movement (20 min) Easy | Shadow Boxing + Visualization (30 min) Easy |\n| **Friday** | Active Recovery (20 min) Easy | Conditioning Re-Test (45 min) Moderate |\n| **Saturday** | Light Shadow Boxing (20 min) Easy | Mental Prep / Rest Easy |\n| **Sunday** | REST | REST |\n\n---\n\n## Phase 4 — Fight Week (Week 9)\n\n**Focus:** Water cut, mental preparation, light technical work only.\n**Weight Target:** 79 kg → 77 kg (water manipulation)\n\n### Week 9 — Fight Week (May 11-16)\n\n| Day | AM | PM | Weight Protocol |\n|-----|----|----|----------------|\n| **Sunday May 11** | Light shadow boxing (15 min) | Mental prep, visualization | Water 8L, normal food, sodium normal |\n| **Monday May 12** | Light movement (20 min) | Rest, visualization | Water 8L, normal food, sodium normal |\n| **Tuesday May 13** | Very light walk (20 min) | Rest | Water 6L, normal food, sodium -50% |\n| **Wednesday May 14** | No training | Rest, mental prep | Water 4L, reduce carbs, minimal sodium |\n| **Thursday May 15** | No training | Rest | Water 2L, low carbs, minimal sodium |\n| **Friday May 16** | FIGHT DAY | Weigh-in → Rehydrate → Fight | Sips only until weigh-in |\n\n---\n\n## 9-Week Block Summary\n\n| Week | Phase | Hours | Intensity | Weight Target | Theme |\n|------|-------|-------|-----------|---------------|-------|\n| 1 | Base Camp | ~12.5 | Moderate | 87.7 kg | Build base, establish patterns |\n| 2 | Base Camp | ~13.0 | Moderate | 86.4 kg | Progressive overload |\n| 3 | Base Camp | ~13.75 | Hard | 85.1 kg | Peak volume of Phase 1 |\n| 4 | Intensification | ~13.5 | Moderate-Hard | 83.8 kg | Transition to fight-specific |\n| 5 | Intensification | ~14.0 | Hard | 82.5 kg | Deep intensification |\n| 6 | Intensification | ~14.0 | Hard (Peak) | 81.2 kg | Hardest week of camp |\n| 7 | Sharpening | ~10.0 | Moderate | 80.0 kg | Volume reduction, speed focus |\n| 8 | Sharpening | ~7.0 | Easy-Moderate | 79.0 kg | Final sharpening, no hard sparring |\n| 9 | Fight Week | ~2.0 | Easy | 77.0 kg | Water cut, mental prep |\n| **Total** | | **~100 hrs** | | **-12 kg** | **Full Fight Camp** |\n\n---\n\n## Session Spacing Guidelines\n\n- **Minimum 6 hours** between AM strength and PM MMA sessions\n- **48 hours** between heavy lower body and hard sparring when possible\n- **No back-to-back hard days** except during Phase 2 peak weeks (Wed-Thu)\n- **Post-hard sessions:** 15 min cool-down, foam rolling, protein within 60 min\n\n---\n\n## Auto-Regulation\n\n### Missed Session Policy\n\n| Scenario | Action |\n|----------|--------|\n| Miss 1 day | Continue as planned, shift sessions if needed |\n| Miss 2+ consecutive days | Adjust remaining phase, do not try to \"make up\" sessions |\n| Miss 3+ days due to illness | Return with half-volume session, add rest days |\n\n### Resting Heart Rate Monitoring\n\n| RHR Elevation | Duration | Action |\n|---------------|----------|--------|\n| 1-3 bpm above baseline | Any | Normal variation, continue |\n| 4-6 bpm | 1-2 days | Reduce intensity one level |\n| 4-6 bpm | 3+ days | Scale back volume 20% |\n| 7+ bpm | 3+ consecutive days | Immediate deload regardless of phase |\n", "sources": "# Izvori i reference\n\nSvi izvori korišteni u razvoju ovog MMA programa treninga, organizovani po kategorijama.\n\n---\n\n## 1. Metodologije trenera i knjige\n\n1. **Joel Jamieson** — *Ultimate MMA Conditioning*, 2009. Web stranica: [8weeksout.com](https://www.8weeksout.com). Bioforce HRV sistem i pristup energetskim sistemima za MMA kondiciju. Intervjui i članci dostupni na 8weeksout.com/blog.\n\n2. **Phil Daru** — Trener snage i kondicije (bivši UFC Performance Institute, American Top Team). Web stranica: [darustrong.com](https://www.darustrong.com). Članci i programi o sportski specifičnom S&C za MMA borce.\n\n3. **Firas Zahabi** — Glavni trener, Tristar Gym. *JRE MMA Show #32* (Joe Rogan Experience), diskusija o filozofiji obima treninga naspram intenziteta. YouTube i podcast intervjui o periodizaciji za borce.\n\n4. **Pavel Tsatsouline** — *Power to the People!*, 1999. *Simple & Sinister*, 2013 (revidirano 2019). StrongFirst metodologija — trening snage s malim brojem ponavljanja i visokom frekvencijom. Web stranica: [strongfirst.com](https://www.strongfirst.com).\n\n5. **Alex Viada** — *The Hybrid Athlete*, 2015. Web stranica: [completehumanperformance.com](https://www.completehumanperformance.com). Metodologija konkurentnog treninga snage i izdržljivosti.\n\n6. **Mike Boyle** — *New Functional Training for Sports*, 2. izdanje, Human Kinetics, 2016. Članci o funkcionalnom treningu i unilateralnom radu. Web stranica: [bodybyboyle.com](https://www.bodybyboyle.com).\n\n7. **Cal Dietz** — *Triphasic Training: A Systematic Approach to Elite Speed and Explosive Strength Performance*, 2012. Web stranica: [triphasictraining.com](https://www.triphasictraining.com). Trening ekscentrične, izometrijske i koncentrične faze.\n\n8. **Loren Landow** — *Ultimate Conditioning for Martial Arts*, Human Kinetics, 2016. Protokoli brzine, agilnosti i kondicije specifični za borilačke sportove.\n\n9. **Eric Cressey** — *Simplified Shoulder Solutions* (video serija). Web stranica: [ericcressey.com](https://www.ericcressey.com). Zdravlje ramena, mobilnost i prevencija povreda za sportaše.\n\n10. **Joe DeFranco** — *Westside for Skinny Bastards III (WS4SB III)*. Web stranica: [defrancostraining.com](https://www.defrancostraining.com). Gornji/donji split s metodama maksimalnog napora i repetitivnog napora prilagođen za sportaše.\n\n---\n\n## 2. Naučni radovi — Ishrana\n\n1. **Reale R, Slater G, Cox GR, Dunican IC, Burke LM, et al.** — \"ISSN position stand: nutrition for combat sports.\" *Journal of the International Society of Sports Nutrition*, 2025. DOI: [10.1080/15502783.2025.2467909](https://doi.org/10.1080/15502783.2025.2467909)\n\n2. **Kasper AM, Cocking S, Cocber M, Sherwood M, et al.** — \"Carbohydrate and fluid manipulation in combat sports.\" *Nutrients*, 2021. PMC: [PMC8334642](https://www.ncbi.nlm.nih.gov/pmc/articles/PMC8334642/)\n\n---\n\n## 3. Naučni radovi — Trening i periodizacija\n\n1. **Wilson JM, Marin PJ, Rhea MR, Wilson SMC, Loenneke JP, Anderson JC.** — \"Concurrent training: a meta-analysis examining interference of aerobic and resistance exercises.\" *Journal of Strength and Conditioning Research*, 2012; 26(8): 2293–2307. PMID: [22002517](https://pubmed.ncbi.nlm.nih.gov/22002517/)\n\n2. **Fyfe JJ, Bishop DJ, Stepto NK.** — \"Interference between concurrent resistance and endurance exercise: molecular bases and the role of individual training variables.\" *Sports Medicine*, 2014; 44(6): 743–762. PMID: [24728927](https://pubmed.ncbi.nlm.nih.gov/24728927/)\n\n3. **Sabag A, Najafi A, Michael S, Esgin T, Halaki M, Hackett D.** — \"The compatibility of concurrent high-intensity interval training and resistance training for muscular strength and hypertrophy: a systematic review and meta-analysis.\" *Journal of Sports Sciences*, 2018; 36(21): 2472–2483. PMID: [29809072](https://pubmed.ncbi.nlm.nih.gov/29809072/)\n\n4. **Franchini E, Cormack S, Takito MY, Hasan AAA, Yuri DA, et al.** — \"Energy system contributions in combat sports: a systematic review.\" *International Journal of Environmental Research and Public Health*, 2023. PMC: [PMC9961508](https://www.ncbi.nlm.nih.gov/pmc/articles/PMC9961508/)\n\n5. **Tota Ł, Drwal T, Fischedick A, et al.** — \"Conditioning training and its effects on preparation of MMA athletes.\" *International Journal of Environmental Research and Public Health*, 2019; 16(9): 1495. PMC: [PMC6942465](https://www.ncbi.nlm.nih.gov/pmc/articles/PMC6942465/)\n\n6. **Kostikiadis IN, Methenitis S, Tsoukos A, Veligekas P, Terzis G, Bogdanis GC.** — \"The effect of short-term sport-specific strength and conditioning training on physical fitness of well-trained mixed martial arts athletes.\" *Journal of Sports Science and Medicine*, 2018; 17(3): 348–358. PMC: [PMC6090403](https://www.ncbi.nlm.nih.gov/pmc/articles/PMC6090403/)\n\n7. **Schoenfeld BJ.** — \"Periodization for MMA: bridging the gap between science and practice.\" Academia.edu. URL: [academia.edu](https://www.academia.edu) (pretraga: Schoenfeld periodization MMA)\n\n8. **James LP, Haff GG, Kelly VG, Beckman EM.** — \"Towards a determination of the physiological characteristics distinguishing successful mixed martial arts athletes: a systematic review of combat sport literature.\" *Sports Medicine*, ResearchGate. URL: [researchgate.net](https://www.researchgate.net) (pretraga: James strength conditioning MMA)\n\n---\n\n## 4. Naučni radovi — Oporavak\n\n1. **Dupuy O, Douzi W, Theurot D, Bosquet L, Dugué B.** — \"An evidence-based approach for choosing post-exercise recovery techniques to reduce markers of muscle damage, soreness, fatigue, and inflammation: a systematic review with meta-analysis.\" *Frontiers in Physiology*, 2020. PMID: [33092328](https://pubmed.ncbi.nlm.nih.gov/33092328/)\n\n2. **Souza DB, Delvaux F, Schwartz C, Croisier JL.** — \"Recovery methods used by combat sport athletes: a scoping review.\" *Sports Medicine - Open*, 2025. PMID: [40378882](https://pubmed.ncbi.nlm.nih.gov/40378882/)\n\n3. **Carvalho L, Freitas TT, Pereira LA, Nakamura FY, Loturco I.** — \"Fatigue markers and performance recovery in mixed martial arts athletes after competitive bouts.\" *Scientific Reports*, 2025. DOI: [10.1038/s41598-025-09719-z](https://doi.org/10.1038/s41598-025-09719-z)\n\n---\n\n## 5. Naučni radovi — Suplementacija\n\n1. **Kreider RB, Kalman DS, Antonio J, Ziegenfuss TN, Wildman R, et al.** — \"International Society of Sports Nutrition position stand: safety and efficacy of creatine supplementation in exercise, sport, and medicine.\" *Journal of the International Society of Sports Nutrition*, 2017; 14: 18. PMC: [PMC5469049](https://www.ncbi.nlm.nih.gov/pmc/articles/PMC5469049/)\n\n2. **Guest NS, VanDusseldorp TA, Nelson MT, Grgic J, Schoenfeld BJ, et al.** — \"International Society of Sports Nutrition position stand: caffeine and exercise performance.\" *Journal of the International Society of Sports Nutrition*, 2021; 18(1): 1. PMC: [PMC7777221](https://www.ncbi.nlm.nih.gov/pmc/articles/PMC7777221/)\n\n3. **Maughan RJ, Burke LM, Dvorak J, Larson-Meyer DE, Peeling P, et al.** — \"IOC consensus statement: dietary supplements and the high-performance athlete.\" *British Journal of Sports Medicine*, 2018; 52(7): 439–455. PMC: [PMC5867441](https://www.ncbi.nlm.nih.gov/pmc/articles/PMC5867441/)\n\n4. **Ashtary-Larky D, Asbaghi O, Moosavian SP, et al.** — \"Creatine supplementation in combat sports: a systematic review.\" *Journal of the International Society of Sports Nutrition*, 2025. PMID: [40755023](https://pubmed.ncbi.nlm.nih.gov/40755023/)\n\n5. **Li Z, Chen Y, Wang X, et al.** — \"Effects of dietary supplements on physical performance in combat athletes: a systematic review and meta-analysis of randomized controlled trials.\" *Scientific Reports*, 2024. DOI: [10.1038/s41598-024-84359-3](https://doi.org/10.1038/s41598-024-84359-3)\n\n---\n\n## 6. Naučni radovi — San i oporavak\n\n1. **Vitale KC, Owens R, Hopkins SR, Malhotra A.** — \"Sleep hygiene for optimizing recovery in athletes: review and recommendations.\" *International Journal of Sports Medicine*, 2019; 40(8): 535–543. PMC: [PMC6988893](https://www.ncbi.nlm.nih.gov/pmc/articles/PMC6988893/)\n\n2. **Bonnar D, Lee S, Roane BM, et al.** — \"Sleep and athletic performance: impacts on physical performance, mental health, injury risk, nutrition, and recovery.\" *Sleep Medicine Reviews*, 2023. PMC: [PMC9960533](https://www.ncbi.nlm.nih.gov/pmc/articles/PMC9960533/)\n\n3. **Mah CD, Mah KE, Kezirian EJ, Dement WC.** — \"The effects of sleep extension on the athletic performance of collegiate basketball players.\" *Sleep*, 2011; 34(7): 943–950. DOI: [10.5665/SLEEP.1132](https://doi.org/10.5665/SLEEP.1132)\n\n---\n\n## 7. Naučni radovi — Hidratacija\n\n1. **Sawka MN, Burke LM, Eichner ER, Maughan RJ, Montain SJ, Stachenfeld NS.** — \"American College of Sports Medicine position stand: exercise and fluid replacement.\" *Medicine & Science in Sports & Exercise*, 2007; 39(2): 377–390. DOI: [10.1249/mss.0b013e31802ca597](https://doi.org/10.1249/mss.0b013e31802ca597)\n\n---\n\n## 8. Naučni radovi — Vitamini i minerali\n\n1. **Chiang CM, Ismaeel A, Griffis RB, Weems S.** — \"Effects of vitamin D supplementation on muscle strength in athletes: a systematic review.\" *Journal of Strength and Conditioning Research*, 2023. PMC: [PMC10768611](https://www.ncbi.nlm.nih.gov/pmc/articles/PMC10768611/)\n\n2. **Heffernan SM, Horner K, et al.** — \"The role of vitamin D and magnesium in athletic performance and recovery.\" *Nutrients*, 2025; 17(10): 1655. DOI: [10.3390/nu17101655](https://doi.org/10.3390/nu17101655)\n\n---\n\n## 9. Organizacije\n\n1. **UFC Performance Institute (UFCPI)** — Web stranica: [ufcpi.com](https://www.ufcpi.com). Faze treninga i grafikon periodizacije za MMA sportaše. *UFC Performance Institute's Training & Nutrition Guide*, 2018 (javno dostupan PDF). Istraživanja sportske nauke o profiliranju MMA sportaša, tjelesnom sastavu i referentnim vrijednostima performansi.\n", "phase-1": "# Phase 1 — Base Camp (Weeks 1-3)\n\n> **Phase:** Accumulation / Base Building | **Duration:** March 16 - April 5, 2026\n> **Weight Target:** 89 kg → 85 kg (gradual deficit ~1.3 kg/week)\n> **Training Focus:** Movement quality, baseline establishment, progressive overload\n> **RPE Progression:** Week 1: 6-7 | Week 2: 7-8 | Week 3: 8-9\n> **1RMs:** Squat 150 kg | Deadlift 180 kg | Bench 115 kg | OHP 75 kg\n\n---\n\n## Phase 1 Overview\n\nPhase 1 builds the **aerobic and structural foundation** the entire camp depends on. The goal is not to destroy yourself in Week 1 — it's to establish patterns, dial in technique under moderate load, and begin a sustainable caloric deficit that will carry through all 9 weeks.\n\nStrength work uses **linear progressive overload** across the 3 weeks. Loads start at 65-70% 1RM and climb to 80-85% by Week 3. MMA sessions focus on volume and technique accumulation — sparring is limited to once per week (Thursday) and starts at controlled intensity.\n\n### Phase 1 Goals\n\n- Establish 2x/day training rhythm (AM strength + PM MMA)\n- Build aerobic base with 2-3 cardiac output sessions per week\n- Progressive overload on all compound lifts\n- One hard sparring session per week (Thursday)\n- Begin caloric deficit (~500 kcal/day → ~0.5 kg/week from diet alone)\n- Baseline conditioning test (Week 0 or early Week 1)\n- Establish morning weight tracking habit\n\n### Tempo Key\n\nAll strength movements use the following tempo notation unless otherwise noted:\n- **3** = 3 sec eccentric (lowering)\n- **1** = 1 sec pause at bottom\n- **2** = 2 sec concentric (controlled lift)\n- **0** = no pause at top\n\nWeek 3 shifts to **3-1-X-0** on compound lifts (X = explosive concentric) to prepare for Phase 2.\n\n### Intensity Key\n\n| Marker | Meaning |\n|--------|---------|\n| 🟢 | Easy — recovery pace, low CNS demand |\n| 🟡 | Moderate — working hard but controlled |\n| 🔴 | Hard — high intensity, high CNS demand |\n\n---\n\n## Weekly Schedule Template\n\n| Day | AM Session | PM Session |\n|-----|-----------|------------|\n| **Monday** | Strength Upper 🟡 | Striking 🔴 |\n| **Tuesday** | Cardiac Output 🟢 | Grappling 🟡 |\n| **Wednesday** | Strength Lower 🔴 | Light Technique 🟢 |\n| **Thursday** | HIIT / Fight Circuit 🔴 | Sparring 🔴 |\n| **Friday** | Strength Power 🟡 | Drilling 🟡 |\n| **Saturday** | Conditioning 🟡 | Open Mat 🟢 |\n| **Sunday** | REST | REST |\n\n---\n\n# Week 1 — Base Volume\n\n> **Global RPE Target:** 6-7\n> **Theme:** Establish training patterns, learn the rhythm, moderate intensity across the board.\n> **Weight:** ~89 kg → ~88 kg\n\n---\n\n## Monday — Week 1\n\n### AM — Strength: Upper Push/Pull (60 min) 🟡\n\n**Warm-Up** (10 min) — Protocol 1: Upper Body Warm-Up (see Training Tools).\n\n| Exercise | Sets x Reps | Load | Rest | Tempo | RPE | Notes |\n|----------|-------------|------|------|-------|-----|-------|\n| Bench Press | 4 x 6 | 75 kg (65%) | 2.5 min | 3-1-2-0 | 6 | Control the eccentric. Full ROM, scapulae retracted. |\n| Barbell Row | 4 x 6 | 70 kg | 2.5 min | 3-1-2-0 | 6 | Pull to lower sternum. Torso stays still. No heaving. |\n| Overhead Press | 3 x 8 | 45 kg (60%) | 2 min | 3-1-2-0 | 6 | Strict press. Brace core, press straight up. |\n| Weighted Pull-Up | 3 x 6 | BW + 10 kg | 2 min | 3-1-2-0 | 6 | Dead hang start. Full extension at bottom. |\n| Incline DB Press | 3 x 10 | 28 kg each | 90 s | 3-1-2-0 | 6 | 30-degree incline. Controlled path. |\n| Face Pulls | 3 x 15 | Light cable | 60 s | 2-1-1-0 | 5 | Prehab. External rotation at top. |\n| Pallof Press | 3 x 10/side | Band/cable | 60 s | 2-1-2-0 | 6 | Anti-rotation. Full arm extension. |\n\n**Session Total:** 23 working sets, ~50 min\n\n**Cool-Down** (5 min) — Pec doorway stretch 2x30s/side, banded lat stretch 2x30s/side, thoracic foam roll 60s.\n\n---\n\n### PM — MMA Striking (75 min) 🔴\n\n**Warm-Up** (10 min) — Protocol 4: MMA Striking Warm-Up + Neck Isometrics.\n\n| Block | Duration | Intensity | Description |\n|-------|----------|-----------|-------------|\n| Shadow Boxing | 3 x 3 min (1 min rest) | Moderate | Establish stance, basic combos. Jab-cross, jab-cross-hook. Focus on hand return and footwork. |\n| Pad Work — Fundamentals | 4 x 3 min (1 min rest) | Moderate-High | Coach feeds 3-4 strike combos. Focus on technique, snap, and returning to guard. |\n| Heavy Bag — Combinations | 3 x 3 min (1 min rest) | Moderate | Work basic combinations at 70%. Focus on hip rotation and foot position. |\n| Technical Sparring — Light | 2 x 3 min (1 min rest) | Light-Moderate | Striking only, 50-60% power. Focus on range management and defensive movement. |\n| Body Shot Drill | 2 x 2 min (1 min rest) | Moderate | Partner drill: alternate attacking body with hooks and uppercuts, defend with elbows. |\n\n**Cool-Down** (5 min) — Static stretching: shoulders, hip flexors. Light wrist circles. 1 min easy shadow boxing.\n\n---\n\n## Tuesday — Week 1\n\n### AM — Cardiac Output (40 min) 🟢\n\n**Warm-Up** (5 min) — Protocol 6: Conditioning Warm-Up, easy build-up.\n\n| Block | Duration | Intensity | Notes |\n|-------|----------|-----------|-------|\n| Zone 2 Sustained | 40 min | 130-150 BPM | Assault bike, rower, or easy jog. Nasal breathing preferred. Conversational pace — if you can't talk, slow down. |\n\n> **HR Target:** 130-150 BPM. This builds the aerobic engine that fuels recovery between rounds.\n\n**Cool-Down** (5 min) — Walk 3 min, light stretching.\n\n---\n\n### PM — MMA Grappling (75 min) 🟡\n\n**Warm-Up** (12 min) — Protocol 5: MMA Grappling Warm-Up + Neck Isometrics.\n\n| Block | Duration | Intensity | Description |\n|-------|----------|-----------|-------------|\n| Technique Instruction | 15 min | Low | Coach demonstrates technique of the day. Takedown entries or guard passes. |\n| Positional Drilling — Guard | 3 x 5 min (1 min rest) | Moderate | Start in closed guard. Top works passes, bottom works sweeps/submissions. Reset on pass or sweep. |\n| Positional Drilling — Takedowns | 3 x 3 min (1 min rest) | Moderate | Start standing. Single-leg and double-leg entries. 60-70% resistance. |\n| Live Grappling | 3 x 5 min (1 min rest) | Moderate | Submission only (no strikes). Focus on position before submission. |\n\n**Cool-Down** (5 min) — Partner stretching. Hip 90/90 holds 60s/side. Supine spinal twist 60s/side.\n\n---\n\n## Wednesday — Week 1\n\n### AM — Strength: Lower + Posterior Chain (65 min) 🔴\n\n**Warm-Up** (12 min) — Protocol 2: Lower Body Warm-Up.\n\n| Exercise | Sets x Reps | Load | Rest | Tempo | RPE | Notes |\n|----------|-------------|------|------|-------|-----|-------|\n| Back Squat | 4 x 6 | 98 kg (65%) | 3 min | 3-1-2-0 | 6 | Full depth. Brace hard, spread the floor. |\n| Romanian Deadlift | 4 x 8 | 100 kg | 2.5 min | 3-1-2-0 | 6 | Deep hinge. Feel hamstring stretch. Bar stays on legs. |\n| RFESS (Bulgarian Split Squat) | 3 x 8/leg | 20 kg DBs | 90 s/leg | 3-1-2-0 | 6-7 | Rear foot on bench. Drive through front heel. |\n| Glute-Ham Raise or Nor ounted, etc). Work escapes. |\n\n**Post-Sparring:** Neuro check. Extended recovery.\n\n**Cool-Down** (10 min)\n\n---\n\n## Friday — Week 3\n\n### AM — Strength: Full Body Power (60 min) 🔴\n\n**Warm-Up** (11 min) — Protocol 3.\n\n| Exercise | Sets x Reps | Load | Rest | Tempo | RPE | Notes |\n|----------|-------------|------|------|-------|-----|-------|\n| Hang Clean | 5 x 3 | 75 kg | 2.5 min | Explosive | 8 | +5 kg from Week 2. Speed must be maintained. If slow, drop weight. |\n| Box Jump | 4 x 3 | 28\" box | 2 min | Explosive | 7-8 | Higher box. Only if previous landings were solid. |\n| Push Press | 4 x 3 | 60 kg (80%) | 2.5 min | 2-0-X-0 | 8 | Peak load for Phase 1. Aggressive drive. |\n| Broad Jump | 4 x 3 | BW | 90 s | Explosive | 7-8 | +1 set. Track distance for progress. |\n| Med Ball Rotational Slam | 4 x 8/side | 16 lb | 90 s | Explosive | 8 | Heavier ball. Maintain hip-first rotation. |\n| Step-Ups (explosive) | 3 x 6/leg | 20 kg DBs | 90 s | Explosive | 7-8 | Drive through top foot. Controlled descent. |\n| Turkish Get-Up | 2 x 3/side | 20 kg KB | 90 s | Slow | 7 | +4 kg from Week 2. |\n| Neck Harness | 3 x 10 | 7.5 kg | 60 s | 2-1-2-0 | 7 | Peak neck load for Phase 1. Drop back if form degrades. |\n\n**Session Total:** 29 working sets, ~50 min\n\n**Cool-Down** (5 min)\n\n---\n\n### PM — MMA Drilling (75 min) 🟡\n\n| Block | Duration | Intensity | Description |\n|-------|----------|-----------|-------------|\n| Shadow Boxing with Entries | 3 x 3 min (1 min rest) | Moderate | Full game plan rehearsal. |\n| Takedown Drilling (50% Resistance) | 3 x 5 min (1 min rest) | Moderate-High | Partner provides real resistance. Work through chains. |\n| Submission Drilling — Chain Attacks | 3 x 5 min (1 min rest) | Moderate | 3-4 move chains. Speed and transitions. |\n| Cage Drilling — Full Sequences | 3 x 5 min (1 min rest) | Moderate | Strike → clinch → cage work → takedown → ground. Full transition sequences. |\n\n**Cool-Down** (5 min)\n\n---\n\n## Saturday — Week 3\n\n### AM — Fight Conditioning (45 min) 🔴\n\n| Block | Duration | Intensity | Description |\n|-------|----------|-----------|-------------|\n| Jump Rope | 3 x 3 min (1 min rest) | Moderate-Hard | Increase pace. Add single-leg hops, criss-cross. |\n| Fight Simulation Circuit | 3 rounds of: Assault Bike 1 min → Shadow Boxing 1 min → Sprawls 30s → Ground-and-Pound on bag 30s | Hard | 2 min rest between rounds. Simulate fight pacing. |\n| Sled Push | 4 x 40m | Hard (RPE 8-9) | Heaviest push of Phase 1. |\n\n**Cool-Down** (5 min)\n\n---\n\n### PM — Open Mat / Light Technical (60 min) 🟢\n\nSame structure. Recovery focus. Light flow rolling, technique review, mobility.\n\n---\n\n## Sunday — Week 3\n\n### REST DAY\n\nExtended recovery. This is the last rest day before Phase 2 begins. Prioritize sleep, nutrition, and mental recovery.\n\n---\n\n## Phase 1 Nutrition Targets\n\n| Week | Target Weight | Daily Calories | Protein | Carbs | Fat |\n|------|-------------|----------------|---------|-------|-----|\n| 1 | 88 kg | ~2,800 kcal | 200g (2.3g/kg) | 300g | 90g |\n| 2 | 86.5 kg | ~2,700 kcal | 195g (2.3g/kg) | 280g | 85g |\n| 3 | 85 kg | ~2,600 kcal | 190g (2.2g/kg) | 260g | 85g |\n\n> **Deficit Strategy:** ~500 kcal/day below TDEE. Prioritize protein to preserve muscle. Carbs concentrated around training sessions (pre/post AM and PM). Fats from whole food sources.\n\n---\n\n## Phase 1 Benchmarks\n\nBy end of Week 3, you should be able to:\n\n- [ ] Complete all sessions 2x/day for 6 days without excessive fatigue\n- [ ] Squat 80% 1RM for 4 reps with good form and explosive concentric\n- [ ] Deadlift 80% 1RM for 4 reps\n- [ ] Complete 5 rounds of HIIT circuit without form breakdown\n- [ ] Spar 4 × 5-min MMA rounds at 80% and recover between rounds\n- [ ] Maintain Zone 2 HR for 45 minutes without drift above 150 BPM\n- [ ] Morning weight trending toward 85 kg\n- [ ] RHR stable or decreasing from Week 1 baseline\n\n**If all benchmarks are met:** Proceed to Phase 2 as planned.\n**If 2+ benchmarks are missed:** Extend Phase 1 by 1 week (reduce Phase 3 by 1 week to maintain fight date).\n", "phase-2": "# Phase 2 — Intensification (Weeks 4-6)\n\n> **Phase:** Transmutation / Peak Volume | **Duration:** April 6 - April 26, 2026\n> **Weight Target:** 85 kg → 81 kg (continue ~1.3 kg/week deficit)\n> **Training Focus:** Peak training volume, hardest conditioning, increased sparring\n> **RPE Progression:** Week 4: 7-8 | Week 5: 8-9 | Week 6: 8-9 (peak)\n> **1RMs:** Squat 150 kg | Deadlift 180 kg | Bench 115 kg | OHP 75 kg\n\n---\n\n## Phase 2 Overview\n\nThis is the **hardest phase of camp**. Everything escalates: sparring frequency doubles to twice per week, conditioning sessions layer on top of each other, and fight simulation circuits appear regularly. Strength work shifts from progression to **maintenance** — loads stay at 80-85% 1RM with reduced volume so that recovery resources can be directed toward MMA-specific work and sparring.\n\n### Key Changes from Phase 1\n\n| Element | Phase 1 | Phase 2 |\n|---------|---------|---------|\n| Sparring | 1x/week (Thu) | **2x/week (Tue PM + Thu PM)** |\n| Strength Goal | Progressive overload | **Maintenance (80-85% 1RM)** |\n| Conditioning | Single session days | **Double conditioning on some days** |\n| Tempo | 3-1-1-0 (varied) | **3-1-X-0 (explosive concentric throughout)** |\n| Rest Periods | Standard (2-3 min) | **Tightened on conditioning work** |\n| Accessories | General | **MMA-specific replacements** |\n| Fight Simulation | Occasional | **Frequent (2-3x/week)** |\n| Opponent Drilling | None | **Integrated into technique sessions** |\n\n### Tempo Key\n\nAll strength movements use **3-1-X-0** unless otherwise noted:\n- **3** = 3 sec eccentric (lowering)\n- **1** = 1 sec pause at bottom\n- **X** = eXplosive concentric (as fast as possible)\n- **0** = no pause at top\n\n### Intensity Key\n\n| Marker | Meaning |\n|--------|---------|\n| 🟢 | Easy — recovery pace, low CNS demand |\n| 🟡 | Moderate — working hard but controlled |\n| 🔴 | Hard — high intensity, high CNS demand, full effort |\n\n---\n\n## Weekly Schedule Template\n\n| Day | AM Session | PM Session |\n|-----|-----------|------------|\n| **Monday** | Strength Upper 🟡 | Striking 🔴 |\n| **Tuesday** | Cardiac Output 🟢 | Sparring 🔴 |\n| **Wednesday** | Strength Lower 🟡 | Light Technique 🟢 |\n| **Thursday** | HIIT 🔴 | Full MMA Sparring 🔴 |\n| **Friday** | Strength Power 🟡 | Drilling 🟡 |\n| **Saturday** | Fight Conditioning (peak) 🔴 | Open Mat 🟡 |\n| **Sunday** | REST | REST |\n\n---\n\n# Week 4 — Ramp-Up\n\n> **Global RPE Target:** 7-8\n> **Theme:** Transition into peak volume. Second sparring session introduced. Strength enters maintenance mode.\n> **Weight:** ~84 kg → ~83 kg\n\n---\n\n## Monday — Week 4\n\n### AM — Strength: Upper (55 min) 🟡\n\n**Warm-Up** (10 min) — Reference `warmups.md` for full upper-body protocol.\n\n| Exercise | Sets x Reps | Load | Rest | Tempo | RPE | Notes |\n|----------|-------------|------|------|-------|-----|-------|\n| Bench Press | 4 x 3 | 92 kg (80%) | 3 min | 3-1-X-0 | 7 | Bar speed is the priority. Every rep should move fast. No grinding. |\n| Weighted Pull-Up | 4 x 3 | BW + 20 kg | 3 min | 3-1-X-0 | 7 | Dead hang start, chin clears bar, explosive pull. |\n| Landmine Press (single arm) | 3 x 6/arm | 30 kg on bar | 90 s | 3-1-X-0 | 7 | Staggered stance, mimic clinch push-off. Brace hard through core. |\n| Chest-Supported Row | 3 x 8 | Moderate-heavy | 90 s | 3-1-X-0 | 7 | Pull to lower chest, squeeze 1 sec at top. No body English. |\n| Band-Resisted Push-Up | 3 x 10 | Band + BW | 60 s | 3-1-X-0 | 7 | Explosive off floor. Accommodating resistance builds lockout power. |\n| Face Pull to External Rotation | 3 x 12 | Light cable | 60 s | 2-1-1-0 | 6 | Prehab — slow and controlled. Thumbs rotate back at top. |\n| Pallof Press | 3 x 10/side | Band/cable | 60 s | 2-1-2-0 | 6-7 | Anti-rotation. Full arm extension, resist the pull. |\n| Ab Wheel Rollout | 3 x 10 | BW | 60 s | 3-0-1-0 | 7 | From knees. Hollow body throughout, no lumbar sag. |\n\n**Session Total:** 29 working sets, ~50 min\n\n**Cool-Down** (5 min) — Pec doorway stretch 2x30s/side, banded lat stretch 2x30s/side, thoracic foam roll 60s.\n\n---\n\n### PM — Striking (75 min) 🔴\n\n**Warm-Up** (10 min) — Jump rope 3 min, dynamic stretches, shadow boxing 2 rounds light.\n\n| Block | Duration | Intensity | Description |\n|-------|----------|-----------|-------------|\n| Shadow Boxing | 3 x 3 min (1 min rest) | Moderate | Full MMA stance. Incorporate level changes and lateral movement. Film one round. |\n| Pad Work — Combination Chains | 4 x 3 min (1 min rest) | High | 5-6 strike combos with coach. Emphasis on setups and exits. Snap punches, return to guard. |\n| Heavy Bag — Power Rounds | 3 x 3 min (1 min rest) | High | Full power shots. Focus on hip rotation, weight transfer, and exhaling on every strike. |\n| Opponent-Specific Drill | 2 x 5 min (1 min rest) | Moderate-High | Simulate opponent tendencies — work entries, angles, and counters. Coach feeds specific looks. |\n| Burnout Round | 1 x 2 min | Max | Non-stop output on bag. Every strike with intent. Simulates end-of-round push. |\n\n**Cool-Down** (5 min) — Static stretching: hip flexors, shoulders, neck. Wrist circles. Light shadow boxing 1 min.\n\n---\n\n## Tuesday — Week 4\n\n### AM — Cardiac Output (45 min) 🟢\n\n**Warm-Up** (5 min) — Easy pace build-up on chosen modality.\n\n| Block | Duration | Intensity | Notes |\n|-------|----------|-----------|-------|\n| Zone 2 Sustained | 45 min | 130-150 BPM | Assault bike, rower, or jog. Nasal breathing where possible. Conversational pace. Extend to 45 min from Phase 1's 40 min. |\n\n> **HR Target:** 130-150 BPM. If HR drifts above 150, reduce pace immediately. Aerobic base maintenance — do not convert to tempo.\n\n**Cool-Down** (5 min) — Walk 3 min, light full-body stretching.\n\n---\n\n### PM — Sparring: Mixed (75 min) 🔴\n\n> **NEW in Phase 2:** Tuesday PM switches from grappling-only to live sparring. This is the first of two weekly sparring sessions.\n\n**Warm-Up** (10 min) — Hip escapes, shadow boxing, movement drills, light partner pummeling.\n\n| Block | Duration | Intensity | Description |\n|-------|----------|-----------|-------------|\n| Positional Sparring — Clinch | 3 x 3 min (1 min rest) | Moderate-High | Start in clinch. Work dirty boxing, underhooks, trips. Reset on break or takedown. |\n| Positional Sparring — Ground | 3 x 3 min (1 min rest) | Moderate-High | Start from guard/half-guard. Work sweeps, passes, submissions. Reset on escape or sub. |\n| Live MMA Rounds | 3 x 5 min (2 min rest) | 75-80% | Full MMA rules. Controlled intensity — intelligent sparring. Focus on cage work and transitions. |\n| Opponent-Specific Situational | 2 x 3 min (1 min rest) | Moderate | Simulate specific fight scenarios. Coach calls resets and positions. |\n\n**Cool-Down** (10 min) — Partner stretching, hip 90/90 holds, supine spinal twist 60s/side. Ice anything that took impact.\n\n---\n\n## Wednesday — Week 4\n\n### AM — Strength: Lower (55 min) 🟡\n\n**Warm-Up** (10 min) — Reference `warmups.md` for full lower-body protocol.\n\n| Exercise | Sets x Reps | Load | Rest | Tempo | RPE | Notes |\n|----------|-------------|------|------|-------|-----|-------|\n| Back Squat | 4 x 3 | 120 kg (80%) | 3 min | 3-1-X-0 | 7 | Explosive out of the hole. Brace hard, knees track toes. |\n| Trap Bar Deadlift | 4 x 3 | 144 kg (80%) | 3 min | 3-1-X-0 | 7 | Drive through floor. Replaces conventional — less spinal fatigue with heavy sparring week. |\n| Bulgarian Split Squat | 3 x 6/leg | Moderate DB | 90 s/leg | 3-1-X-0 | 7 | Front shin vertical, torso upright. Explosive concentric. |\n| Barbell Hip Thrust | 3 x 8 | Heavy | 90 s | 3-1-X-0 | 7 | Full hip extension, squeeze glutes 1 sec at top. Takedown power. |\n| Banded Hip Escape | 3 x 8/side | Band resistance | 60 s | Explosive | 7 | MMA-specific. Loop band around waist, practice hip escape movement against resistance. |\n| Copenhagen Plank | 3 x 25s/side | BW | 60 s | Isometric | 6-7 | Adductor prehab. Maintain straight line, no hip sag. |\n| Hanging Leg Raise | 3 x 12 | BW | 60 s | 2-1-1-0 | 7 | Controlled. Posterior pelvic tilt at top. No swinging. |\n\n**Session Total:** 26 working sets, ~50 min\n\n**Cool-Down** (5 min) — Couch stretch 2x30s/leg, pigeon stretch 2x30s/side, calf foam roll 60s/side.\n\n---\n\n### PM — Light Technique (60 min) 🟢\n\n**Warm-Up** (5 min) — Joint circles, light shadow boxing, movement flow.\n\n| Block | Duration | Intensity | Description |\n|-------|----------|-----------|-------------|\n| Technique Review | 20 min | Low | Coach-led. Review and refine techniques from Tuesday sparring. Address gaps. |\n| Flow Drilling | 20 min | Low-Moderate | Chains of techniques at 50% speed. Striking → clinch → takedown → ground → stand-up. Smooth transitions. |\n| Opponent Gameplan Work | 15 min | Low | Walk through tactical adjustments. Practice entries and exits specific to opponent's style. |\n\n**Cool-Down** (5 min) — Mobility: 90/90 hip switches, thoracic rotations, wrist stretches.\n\n---\n\n## Thursday — Week 4\n\n### AM — HIIT Conditioning (35 min) 🔴\n\n**Warm-Up** (5 min) — Jump rope 2 min, dynamic stretches, 4 burpees.\n\n| Block | Protocol | Work | Rest | Rounds | Intensity | Notes |\n|-------|----------|------|------|--------|-----------|-------|\n| Assault Bike Intervals | Tabata-style | 30 sec | 30 sec | 8 | Max effort | RPM target: 70+. Full commitment every interval. |\n| Rest | — | — | 3 min | — | — | Walk and breathe. |\n| Fight Simulation Circuit | Continuous | 5 min | — | 1 | High | See circuit below. |\n| Rest | — | — | 2 min | — | — | — |\n| Fight Simulation Circuit | Continuous | 5 min | — | 1 | High | Second round — push through. |\n\n**Fight Simulation Circuit (5 min continuous):**\n\n| Exercise | Duration/Reps | Notes |\n|----------|---------------|-------|\n| Sprawl to Heavy Bag Strike | 30 sec | Sprawl, pop up, throw 3-4 hard shots |\n| Clinch Knees on Bag | 30 sec | Plum clinch on heavy bag, alternating knees |\n| Ground-and-Pound on Bag | 30 sec | Mount heavy bag, controlled strikes |\n| Burpee to Sprawl | 30 sec | Explosive transitions |\n| Shadow Boxing | 30 sec | High output, hands up |\n| Repeat from top | — | Complete 2 full cycles = 5 min |\n\n**Cool-Down** (5 min) — Walk 2 min, light stretching, diaphragmatic breathing 2 min.\n\n---\n\n### PM — Full MMA Sparring (90 min) 🔴\n\n**Warm-Up** (15 min) — Progressive warm-up: shadow boxing 2 rounds, movement drills, light pummeling, 1 round technical sparring at 40%.\n\n| Block | Duration | Intensity | Description |\n|-------|----------|-----------|-------------|\n| Striking Sparring | 3 x 3 min (1 min rest) | 80% | Boxing and kickboxing. Stay technical — use distance management and head movement. |\n| MMA Sparring | 4 x 5 min (2 min rest) | 80% | Full MMA rules. Cage work emphasized. Work the gameplan. Coach provides live feedback. |\n| Situational Rounds | 2 x 3 min (1 min rest) | High | Start from disadvantageous positions. Work escapes and scrambles under fatigue. |\n\n> **Sparring Note:** This is full MMA sparring, harder than Phase 1. Intensity is 80% — hard enough to be honest but smart enough to stay healthy. Mouthguard, shin guards, headgear mandatory.\n\n**Cool-Down** (10 min) — Partner stretching, ice any impact areas, neck stretches, breathing exercises.\n\n---\n\n## Friday — Week 4\n\n### AM — Strength: Power (50 min) 🟡\n\n**Warm-Up** (10 min) — Reference `warmups.md`. Add 3 x 3 box jumps (step down).\n\n| Exercise | Sets x Reps | Load | Rest | Tempo | RPE | Notes |\n|----------|-------------|------|------|-------|-----|-------|\n| Hang Power Clean | 4 x 3 | 70 kg | 2.5 min | Explosive | 7 | Triple extension. Catch in quarter squat. Speed over load. |\n| Push Press | 4 x 3 | 60 kg (80% OHP) | 2.5 min | 3-1-X-0 | 7 | Dip-drive explosive. Lock out overhead. Fighting pressing power. |\n| Plyometric Push-Up | 3 x 5 | BW | 90 s | Explosive | 7 | Hands leave ground. Maximum concentric intent. Land soft. |\n| Kettlebell Swing | 3 x 12 | 32 kg | 60 s | Explosive hip hinge | 7 | Snap hips, float the bell. Hip extension power for clinch and takedowns. |\n| Med Ball Rotational Slam | 3 x 6/side | 6-8 kg | 60 s | Explosive | 7 | MMA-specific. Simulate hook/overhand power generation. Slam with full rotation. |\n| Turkish Get-Up | 2 x 3/side | 20 kg KB | 90 s | Controlled | 6-7 | Ground-to-standing transitions. Stability under load. |\n| Anti-Rotation Cable Chop | 3 x 8/side | Moderate cable | 60 s | 2-1-X-0 | 7 | High-to-low and low-to-high. Rotational power with core control. |\n\n**Session Total:** 25 working sets, ~45 min\n\n**Cool-Down** (5 min) — Hang from bar 3 x 20 sec, shoulder CARs, wrist stretches.\n\n---\n\n### PM — Drilling (75 min) 🟡\n\n**Warm-Up** (10 min) — Movement flow, solo drills, light shadow work.\n\n| Block | Duration | Intensity | Description |\n|-------|----------|-----------|-------------|\n| Takedown Drilling | 20 min | Moderate | Singles, doubles, body locks. Chain wrestling sequences. 50-60% resistance from partner. |\n| Transition Drilling | 20 min | Moderate | Takedown → pass → control → submission chains. Smooth flow between positions. |\n| Cage-Specific Work | 15 min | Moderate | Wall walks, cage takedowns, cage getups. Simulate fight-relevant cage positions. |\n| Opponent Strategy Drilling | 10 min | Low-Moderate | Practice specific techniques targeting opponent weaknesses. Coach-directed scenarios. |\n\n**Cool-Down** (5 min) — Partner stretching, hip mobility, wrist circles.\n\n---\n\n## Saturday — Week 4\n\n### AM — Fight Conditioning (50 min) 🔴\n\n**Warm-Up** (5 min) — Jump rope 2 min, dynamic stretches, 5 burpees.\n\n| Block | Protocol | Work | Rest | Rounds | Intensity | Notes |\n|-------|----------|------|------|--------|-----------|-------|\n| Assault Bike | Intervals | 45 sec | 45 sec | 6 | 90%+ | Push RPM as high as possible. Recover during rest. |\n| Rest | — | n| Sparring Sessions | 2 (Tue PM + Thu PM) |\n| Fight Simulation Circuits | 3 (Thu AM x2 + Sat AM x3) |\n| Intensity Distribution | 🟢 x3 / 🟡 x4 / 🔴 x5 |\n\n---\n---\n\n# Week 5 — Peak Volume Ramp\n\n> **Global RPE Target:** 8-9\n> **Theme:** Highest volume week of the entire camp. Every session pushes harder. Sparring is more competitive. Conditioning is relentless.\n> **Weight:** ~83 kg → ~81.5 kg\n\n---\n\n## Monday — Week 5\n\n### AM — Strength: Upper (55 min) 🟡\n\n**Warm-Up** (10 min) — Reference `warmups.md` for full upper-body protocol.\n\n| Exercise | Sets x Reps | Load | Rest | Tempo | RPE | Notes |\n|----------|-------------|------|------|-------|-----|-------|\n| Bench Press | 4 x 3 | 95 kg (83%) | 3 min | 3-1-X-0 | 8 | Small load bump from Week 4. Maintain bar speed — if grinding, drop to 92 kg. |\n| Weighted Pull-Up | 4 x 3 | BW + 22.5 kg | 3 min | 3-1-X-0 | 8 | Explosive pull. If form breaks, reduce weight. |\n| Single-Arm Landmine Row | 3 x 8/arm | Moderate-heavy | 75 s | 3-1-X-0 | 8 | MMA-specific. Simulates collar tie pull / arm drag force. |\n| Dip (weighted) | 3 x 6 | BW + 15 kg | 90 s | 3-1-X-0 | 7-8 | Slight forward lean. Full ROM. Replaces band push-ups. |\n| Band-Resisted Punch | 3 x 10/arm | Band | 60 s | Explosive | 7-8 | MMA-specific. Loop band behind back, throw straight punches. Power endurance. |\n| Face Pull to External Rotation | 3 x 12 | Light cable | 60 s | 2-1-1-0 | 6 | Prehab. Non-negotiable. |\n| Pallof Press w/ Overhead Reach | 3 x 8/side | Band/cable | 60 s | 2-1-2-0 | 7-8 | Harder Pallof variation — reach overhead while resisting rotation. |\n| Hanging Windshield Wiper | 3 x 6/side | BW | 60 s | Controlled | 8 | Advanced rotational core. Control the descent. |\n\n**Session Total:** 29 working sets, ~50 min\n\n**Cool-Down** (5 min) — Pec doorway stretch 2x30s/side, banded lat stretch 2x30s/side, thoracic foam roll 60s.\n\n---\n\n### PM — Striking (80 min) 🔴\n\n**Warm-Up** (10 min) — Jump rope 3 min, dynamic stretches, shadow boxing 2 rounds.\n\n| Block | Duration | Intensity | Description |\n|-------|----------|-----------|-------------|\n| Shadow Boxing | 3 x 3 min (1 min rest) | Moderate-High | Full MMA. Incorporate takedown feints, level changes, footwork patterns. High volume output. |\n| Pad Work — Pressure Combos | 4 x 3 min (45 sec rest) | High | Tighter rest. Coach pushes pace. 6-8 strike combos with movement. Pressure fighting drills. |\n| Heavy Bag — Volume Rounds | 3 x 3 min (45 sec rest) | High | Minimum 100 strikes per round. Mix punches, kicks, elbows, knees. No resting on the bag. |\n| Opponent-Specific Drill | 3 x 3 min (1 min rest) | High | Simulate opponent entries. Practice counters and defensive responses. |\n| Burnout Round | 1 x 3 min | Max | Extended from 2 min. Non-stop output. Fight through fatigue. |\n\n**Cool-Down** (5 min) — Static stretching, wrist circles, breathing exercises.\n\n---\n\n## Tuesday — Week 5\n\n### AM — Cardiac Output + Conditioning Finisher (55 min) 🟢/🟡\n\n**Warm-Up** (5 min) — Easy pace build-up.\n\n| Block | Duration | Intensity | Notes |\n|-------|----------|-----------|-------|\n| Zone 2 Sustained | 40 min | 130-150 BPM | Assault bike or rower. Steady state. Nasal breathing. |\n| Conditioning Finisher — EMOM | 10 min | Moderate-High | See below. Added this phase to build on aerobic base. |\n\n**EMOM Finisher (10 min — every minute on the minute):**\n\n| Minute | Exercise | Reps | Notes |\n|--------|----------|------|-------|\n| Odd minutes | Burpee | 6 | Explosive. Chest to floor, full jump. |\n| Even minutes | Kettlebell Swing | 10 | 28-32 kg. Snap hips. |\n\n> Remaining time each minute is rest. If unable to complete reps in 40 sec, reduce by 1-2 reps.\n\n**Cool-Down** (5 min) — Walk, light stretching.\n\n---\n\n### PM — Sparring: Mixed (80 min) 🔴\n\n**Warm-Up** (10 min) — Shadow boxing, pummeling, light positional wrestling.\n\n| Block | Duration | Intensity | Description |\n|-------|----------|-----------|-------------|\n| Clinch Sparring | 3 x 3 min (1 min rest) | High | Aggressive clinch work. Dirty boxing, trips, and cage pressing. Push the pace. |\n| Positional Ground Sparring | 3 x 3 min (1 min rest) | High | Start from bad positions (bottom mount, turtle). Work escapes under pressure. |\n| Live MMA Rounds | 4 x 5 min (90 sec rest) | 80-85% | Tighter rest than Week 4. Fight the fatigue. Implement gameplan. Coach provides feedback between rounds. |\n| Shark Tank Round | 1 x 5 min | 85% | Fresh partner every minute. You stay in. They rotate. Survive and work. |\n\n> **Week 5 intensity jump:** Rest between MMA rounds drops from 2 min to 90 sec. Shark tank round added. This simulates late-fight fatigue.\n\n**Cool-Down** (10 min) — Partner stretching, ice impact areas, breathing exercises.\n\n---\n\n## Wednesday — Week 5\n\n### AM — Strength: Lower (55 min) 🟡\n\n**Warm-Up** (10 min) — Reference `warmups.md` for full lower-body protocol.\n\n| Exercise | Sets x Reps | Load | Rest | Tempo | RPE | Notes |\n|----------|-------------|------|------|-------|-----|-------|\n| Back Squat | 4 x 3 | 123 kg (82%) | 3 min | 3-1-X-0 | 8 | Small bump from Week 4. Explosive drive out of the hole. |\n| Trap Bar Deadlift | 4 x 3 | 148 kg (82%) | 3 min | 3-1-X-0 | 8 | Drive through floor. Reset each rep. No touch-and-go. |\n| Walking Lunge | 3 x 8/leg | Moderate DB | 75 s/leg | 3-1-X-0 | 8 | MMA-specific. Replaces RFESS — more dynamic, closer to shooting patterns. |\n| Barbell Hip Thrust | 3 x 8 | Heavy | 90 s | 3-1-X-0 | 8 | Full lockout. Power for double legs and cage work. |\n| Banded Hip Escape | 3 x 10/side | Band resistance | 60 s | Explosive | 7-8 | Increase reps from Week 4. |\n| Side Plank w/ Clamshell | 3 x 10/side | BW | 60 s | Controlled | 7 | Hip stability and adductor activation combined. |\n| Dragon Flag (or progression) | 3 x 6 | BW | 60 s | 3-0-1-0 | 8 | Advanced core. Full body tension. Scale to negative-only if needed. |\n\n**Session Total:** 26 working sets, ~50 min\n\n**Cool-Down** (5 min) — Couch **Cool-Down** (5 min) — Walk 3 min, stretching, diaphragmatic breathing.\n\n---\n\n### PM — Full MMA Sparring (90 min) 🔴\n\n**Warm-Up** (15 min) — Progressive warm-up: shadow boxing 3 rounds, movement drills, pummeling.\n\n| Block | Duration | Intensity | Description |\n|-------|----------|-----------|-------------|\n| Striking Sparring | 3 x 3 min (45 sec rest) | 85% | Tighter rest. Kickboxing rules. Push forward pressure. |\n| MMA Sparring | 5 x 5 min (90 sec rest) | 85% | Five rounds — full fight simulation. Implement gameplan round by round. |\n| Fatigue Rounds | 2 x 3 min (1 min rest) | 85-90% | After 5 hard rounds, two more. This is where mental toughness is built. |\n\n> **Week 5 sparring note:** This is the hardest sparring session of the entire camp. 5 full MMA rounds plus fatigue rounds. This session exists to prove you can fight through exhaustion. If you can survive this, the fight will feel manageable.\n\n**Cool-Down** (10 min) — Partner stretching, ice everything, neck work, extended breathing.\n\n---\n\n## Friday — Week 5\n\n### AM — Strength: Power (50 min) 🟡\n\n**Warm-Up** (10 min) — Reference `warmups.md`. Add 3 x 3 depth jumps (box height 30-40 cm).\n\n| Exercise | Sets x Reps | Load | Rest | Tempo | RPE | Notes |\n|----------|-------------|------|------|-------|-----|-------|\n| Hang Power Clean | 4 x 3 | 72.5 kg | 2.5 min | Explosive | 7-8 | Small bump. Speed must remain fast. If slow, drop back to 70 kg. |\n| Push Press | 4 x 3 | 62.5 kg (83% OHP) | 2.5 min | 3-1-X-0 | 8 | Aggressive dip-drive. Lock out hard. |\n| Clapping Push-Up | 3 x 5 | BW | 90 s | Explosive | 8 | Maximum intent. Land soft, absorb impact. |\n| Kettlebell Swing | 3 x 15 | 32 kg | 60 s | Explosive | 7-8 | Volume increase from Week 4. Maintain hip snap quality. |\n| Med Ball Rotational Slam | 3 x 8/side | 6-8 kg | 60 s | Explosive | 8 | Higher reps. Full rotation, slam with intent. |\n| Turkish Get-Up | 2 x 3/side | 22 kg KB | 90 s | Controlled | 7 | Small load bump. Smooth transitions. |\n| Landmine Rotation | 3 x 8/side | 20 kg on bar | 60 s | Explosive | 8 | MMA-specific rotational power. Control deceleration. |\n\n**Session Total:** 25 working sets, ~45 min\n\n**Cool-Down** (5 min) — Hang from bar, shoulder CARs, wrist stretches.\n\n---\n\n### PM — Drilling (80 min) 🟡\n\n**Warm-Up** (10 min) — Movement flow, solo drills.\n\n| Block | Duration | Intensity | Description |\n|-------|----------|-----------|-------------|\n| Takedown Chains | 20 min | Moderate-High | Single → double → body lock → trip chains. 70% resistance. No rest between attempts — chain immediately. |\n| Scramble Drilling | 15 min | Moderate-High | Start from scramble positions. React and transition. Build instincts for chaos moments. |\n| Cage-Specific Sequences | 20 min | Moderate | Wall work: takedown defense → get off wall → circle → counter. Cage getups under pressure. |\n| Opponent Strategy — Full Sequences | 15 min | Moderate | Full fight sequences: entry → clinch → takedown → ground control. Practice complete chains vs. opponent style. |\n\n**Cool-Down** (5 min) — Partner stretching, mobility.\n\n---\n\n## Saturday — Week 5\n\n### AM — Fight Conditioning — Peak Session (55 min) 🔴\n\n> **This is the hardest conditioning session of the entire camp.** The volume and density peak here.\n\n**Warm-Up** (5 min) — Jump rope 2 min, dynamic stretches, 5 burpees.\n\n| Block | Protocol | Work | Rest | Rounds | Intensity | Notes |\n|-------|----------|------|------|--------|-----------|-------|\n| Assault Bike | Intervals | 40 sec | 20 sec | 10 | Max effort | 10 rounds of brutal 2:1 work-to-rest. |\n| Rest | — | — | 3 min | — | — | Walk. You need this. |\n| Fight Simulation Circuit B | Continuous | 5 min | 90 sec | 3 | Max | Three 5-min rounds. Fight pace. |\n| Finisher | Rower | 1000m | — | 1 | All-out | 1km sprint. The final push. |\n\n**Fight Simulation Circuit B (5 min continuous):**\n\n| Exercise | Duration | Notes |\n|----------|----------|-------|\n| Shadow Boxing —  | Target | Action if Off-Track |\n|--------|--------|---------------------|\n| Weight | ~81.5 kg | If above 82.5 kg: tighten nutrition, add 10 min Zone 2 to Tuesday/Saturday AM. If below 81 kg: increase carbs slightly — do not undercut performance. |\n| Visual | Noticeably leaner than Phase 1 start | If holding water: check sodium, sleep quality, and stress. |\n\n### Performance Markers\n\n| Test | Minimum Standard | Notes |\n|------|-----------------|-------|\n| Resting HR | Stable or decreasing from Phase 1 | If elevated >5 BPM: overreaching — reduce Week 6 volume 10%. |\n| HRV | Stable or within normal range | Significant drop = overreaching signal. |\n| Grip Strength | No decline from Phase 1 baseline | Drop = CNS fatigue indicator. |\n| Mood / Motivation | Manageable | Some fatigue is normal. If motivation is critically low, reduce Week 6 sparring to 1x. |\n| Sleep Quality | 7+ hours average | If poor: prioritize sleep hygiene over extra training. |\n| Injury Check | No new injuries | Any joint pain, persistent soreness, or swelling = modify. Do not push through injuries this close to fight. |\n\n### Decision Point\n\n| Condition | Action |\n|-----------|--------|\n| All markers green | Proceed with full Week 6 programming |\n| Resting HR elevated or HRV suppressed | Reduce Week 6 conditioning volume by 15-20%. Maintain sparring. |\n| Joint pain or injury | Modify around the issue. If serious, convert Week 6 to modified taper. Consult medical. |\n| Weight ahead of schedule (<81 kg) | Add carbs to performance meals. Prioritize recovery. |\n| Weight behind schedule (>83 kg) | Add 10 min Zone 2 daily. Tighten nutrition. DO NOT crash diet. |\n| Mental burnout | Reduce volume 10%. Add fun training — open mat, flow rolling, playful sparring. |\n\n---\n---\n\n# Week 6 — Absolute Peak\n\n> **Global RPE Target:** 8-9 (peak of entire camp)\n> **Theme:** The highest point of the camp. After this week, volume drops permanently into taper. Everything is at maximum. This is oment you prove you have a sixth gear. After the shark tank, one more full round. Dig deep.\n\n**Cool-Down** (10 min) — Partner stretching, ice everything, neck stretches, extended breathing.\n\n---\n\n## Wednesday — Week 6\n\n### AM — Strength: Lower (55 min) 🟡\n\n**Warm-Up** (10 min) — Reference `warmups.md` for full lower-body protocol.\n\n| Exercise | Sets x Reps | Load | Rest | Tempo | RPE | Notes |\n|----------|-------------|------|------|-------|-----|-------|\n| Back Squat | 4 x 2 | 127.5 kg (85%) | 3 min | 3-1-X-0 | 8-9 | Peak load. Doubles. Explosive. Rack it clean. |\n| Trap Bar Deadlift | 4 x 2 | 153 kg (85%) | 3 min | 3-1-X-0 | 8-9 | Peak load. Maximum intent. Dead stop each rep. |\n| Walking Lunge | 3 x 8/leg | Moderate-heavy DB | 75 s/leg | 3-1-X-0 | 8 | Slightly heavier than Week 5. Dynamic and explosive. |\n| Barbell Hip Thrust | 3 x 6 | Heavy | 90 s | 3-1-X-0 | 8 | Fewer reps, heavier. Quality over volume. |\n| Banded Hip Escape | 3 x 10/side | Heavier band | 60 s | Explosive | 8 | Band progression from Week 5. |\n| Side Plank w/ Clamshell | 3 x 12/side | BW | 60 s | Controlled | 7-8 | Rep increase from Week 5. |\n| Dragon Flag | 3 x 8 | BW | 60 s | 3-0-1-0 | 8-9 | Rep increase. Full control. |\n\n**Session Total:** 26 working sets, ~50 min\n\n**Cool-Down** (5 min) — Couch stretch, pigeon stretch, calf foam roll.\n\n---\n\n### PM — Light Technique (60 min) 🟢\n\n**Warm-Up** (5 min) — Joint circles, light shadow boxing.\n\n| Block | Duration | Intensity | Description |\n|-------|----------|-----------|-------------|\n| Sparring Film Review | 15 min | Low | Review Tuesday sparring footage. Final corrections before Thursday's peak sparring. |\n| Gameplan Rehearsal | 25 min | Low | Walk through entire fight gameplan at low intensity. Round-by-round strategy. |\n| Visualization + Mental Prep | 15 min | Low | Guided or self-directed visualization. See yourself executing the gameplan. Walk through adversity scenarios. |\n\n**Cool-Down** (5 min) — Mobility, ake your time. The hard work is done.\n\n---\n\n### PM — Open Mat (60 min) 🟡\n\n| Block | Duration | Intensity | Description |\n|-------|----------|-----------|-------------|\n| Free Rolling | 30 min | Self-regulated | Last hard rolling session before taper. Work positions you need for the fight. |\n| Light Boxing Sparring | 15 min | 50-60% | Technical boxing. Defense only. Head movement and footwork. |\n| Cool-Down Rolls / Flow | 15 min | Low | Easy flow rolling. Enjoy the movement. Last day of peak volume. |\n\n**Cool-Down** (5 min) — Full stretch routine, foam rolling. Celebrate completing the hardest phase.\n\n---\n\n## Sunday — Week 6\n\n### Full REST\n\n**Critical recovery day.** This was the peak week of the entire camp. Full rest is non-negotiable.\n\n- Sleep 9+ hours\n- Epsom salt bath or cold plunge\n- Light walk only\n- Meal prep for the taper phase\n- Mental debrief: journal what went well this phase, what needs polish\n- Visualization: see yourself winning on May 16\n\n---\n\n### Week 6 Volume Summary\n\n| Metric | Value |\n|--------|-------|\n| Total Sessions | 12 |\n| Total Training Hours | ~14.5 hours |\n| Strength Sessions | 3 (peak maintenance loads — 85% 1RM) |\n| MMA/Skill Sessions | 6 (including 2 peak sparring sessions) |\n| Conditioning Sessions | 3 (cardiac output + finisher, HIIT, final peak fight conditioning) |\n| Sparring Sessions | 2 (Tue PM + Thu PM — hardest of entire camp) |\n| Fight Simulation Circuits | 6 (Thu AM x3 + Sat AM x3) |\n| Sparring Rounds (Thu PM) | 11 rounds (~55 min live work) |\n| Intensity Distribution | 🟢 x2 / 🟡 x4 / 🔴 x6 |\n\n---\n---\n\n# Phase 2 Summary\n\n## Training Volume Progression\n\n| Metric | Week 4 | Week 5 | Week 6 |\n|--------|--------|--------|--------|\n| Total Training Hours | ~12.5 | ~14 | ~14.5 |\n| Sparring Sessions | 2 | 2 | 2 |\n| Sparring Rounds (Thu PM) | 9 | 10 | 11 |\n| Fight Simulation Circuits | 5 | 6 | 6 |\n| Strength Load (compound lifts) | 80% 1RM | 82-83% 1RM | 85% 1RM |\n| Strength Rep Scheme | 3s | 3s | 2s |\n| Conditioning Rest Periods | Standard | Tightened | Minimum |\n| Overall RPE | 7-8 | 8-9 | 8-9 (peak) |\n\n## Strength Loads Across Phase 2\n\n| Exercise | 1RM | Week 4 (80%) | Week 5 (82-83%) | Week 6 (85%) |\n|----------|-----|--------------|-----------------|--------------|\n| Bench Press | 115 kg | 92 kg x 3 | 95 kg x 3 | 98 kg x 2 |\n| Back Squat | 150 kg | 120 kg x 3 | 123 kg x 3 | 127.5 kg x 2 |\n| Trap Bar Deadlift | 180 kg | 144 kg x 3 | 148 kg x 3 | 153 kg x 2 |\n| Weighted Pull-Up | — | BW+20 kg x 3 | BW+22.5 kg x 3 | BW+25 kg x 2 |\n| Push Press | 75 kg (OHP) | 60 kg x 3 | 62.5 kg x 3 | 65 kg x 2 |\n| Hang Power Clean | — | 70 kg x 3 | 72.5 kg x 3 | 75 kg x 2 |\n\n## Key Adaptations Expected by End of Phase 2\n\n| Quality | Expected Outcome |\n|---------|-----------------|\n| Aerobic Base | Maintained. Cardiac output work continues throughout. |\n| Anaerobic Capacity | Significantly improved. Fight simulation circuits and HIIT at peak levels. |\n| Strength | Maintained at current 1RMs. No regression despite caloric deficit. |\n| Power | Maintained or slightly improved through explosive tempo work. |\n| Fight Readiness | High. Two sparring sessions per week with full MMA rounds and adversity training. |\n| Mental Toughness | Forged. Shark tanks, fatigue rounds, and championship overtime build deep reserves. |\n| Weight | ~81 kg. On track for 77 kg fight weight with 4 weeks remaining for water cut strategy. |\n| Gameplan | Polished. Opponent-specific drilling integrated throughout all sessions. |\n\n## What Changes in Phase 3 (Taper)\n\nAfter this peak phase, Phase 3 will:\n- **Reduce volume** by 30-40% while maintaining intensity\n- **Cut sparring** back to once per week, then to technical only\n- **Eliminate fight simulation circuits** — they have served their purpose\n- **Maintain strength** with reduced sets (2-3 sets instead of 4)\n- **Focus on sharpness** — technique drilling replaces volume work\n- **Begin water cut strategy** in the final 7-10 days\n- **Prioritize recovery** — sleep, nutrition, and mental preparation take center stage\n\n> **The hardest work is done.** Everything from here is about arriving at fight night sharp, fresh, and dangerous.\n", "phase-3": "# Phase 3 — Sharpening (Weeks 7-8)\n\n> **Phase:** Realization / Taper | **Duration:** April 27 - May 10, 2026\n> **Weight Target:** 81 kg → 79 kg (within water-cut range of 77 kg)\n> **Training Focus:** Technical sharpness, speed work, game plan drilling, volume reduction\n> **RPE:** 7-8 (controlled intensity, reduced volume)\n> **Key Changes:** Strength 2x/week (down from 3), no hard sparring in Week 8, speed/timing replaces volume\n\n---\n\n## Phase 3 Overview\n\nThis phase is about **subtraction, not addition**. You are not building fitness here — you are sharpening what you already have and allowing your body to supercompensate. Every session has a purpose. If it doesn't make you sharper for fight night, cut it.\n\n### Key Principles\n\n- **Strength drops to 2 sessions/week** (Monday and Wednesday only — Friday power session is removed)\n- **Loads drop to 70-75% of 1RM** with emphasis on bar speed and explosiveness\n- **No hard sparring in Week 8** — light technical sparring only\n- **Week 7** — moderate sparring is still permitted (controlled rounds, trusted partners only)\n- **Conditioning becomes shorter and sharper** — intervals under 10 seconds, full recovery between sets\n- **Game plan specific drilling increases** — positional sparring, situational reps, entries and exits\n- **Mental preparation begins** — daily visualization, fight strategy review, routine-setting\n- **Water loading protocol discussion** — coordinate with coach and reference weight-management section\n\n### Reference 1RMs (for percentage calculations)\n\n| Lift | 1RM |\n|------|-----|\n| Back Squat | 150 kg |\n| Deadlift | 180 kg |\n| Bench Press | 115 kg |\n| OHP | 75 kg |\n\n### Load Guidelines This Phase\n\n| Percentage | Squat | Deadlift | Bench | OHP |\n|------------|-------|----------|-------|-----|\n| 70% | 105 kg | 126 kg | 80 kg | 52.5 kg |\n| 72.5% | 109 kg | 130 kg | 83 kg | 54 kg |\n| 75% | 112.5 kg | 135 kg | 86 kg | 56 kg |\n\n---\n\n## Week 7 (April 27 - May 3, 2026)\n\n**Theme:** Controlled sharpening. Moderate sparring still allowed. Volume reduced but intensity stays purposeful.\n\n---\n\n### Monday, April 27 — Strength A + MMA Skills\n\n#### AM: Strength A — Speed-Strength (60-75 min)\n\n**Warm-Up (10 min)**\n\n| Exercise | Duration/Sets |\n|----------|---------------|\n| Jump rope | 3 min |\n| Hip 90/90 rotations | 2 x 8 each side |\n| Band pull-aparts | 2 x 15 |\n| Goblet squat to stand | 2 x 6 |\n| Med ball slam | 2 x 5 |\n\n**Main Work — Bar Speed Emphasis**\n\n| Exercise | Sets x Reps | Load | Rest | Notes |\n|----------|-------------|------|------|-------|\n| Back Squat | 4 x 3 | 75% (112.5 kg) | 2.5 min | Explode up, control down |\n| Bench Press | 4 x 3 | 75% (86 kg) | 2.5 min | Fast concentric, pause at chest |\n| Weighted Pull-Up | 3 x 4 | +15 kg | 2 min | Controlled tempo |\n\n**Accessory Work (reduced volume)**\n\n| Exercise | Sets x Reps | Load | Rest |\n|----------|-------------|------|------|\n| Bulgarian Split Squat | 2 x 6 each | 30 kg DBs | 90 sec |\n| DB Row | 2 x 8 each | 35 kg | 90 sec |\n| Pallof Press | 2 x 10 each | Band | 60 sec |\n\n#### PM: MMA Skills — Striking + Game Plan (75 min)\n\n| Block | Duration | Activity | Notes |\n|-------|----------|----------|-------|\n| Warm-Up | 10 min | Shadow boxing (technical) | Focus on fight-specific combos |\n| Pad Work | 20 min | Game plan combinations | Coach calls fight-specific sequences |\n| Positional Sparring | 20 min | Striking entries/exits | Specific ranges and positions from game plan |\n| Bag Work | 15 min | 3 x 3 min rounds | Fight pace, 1 min rest |\n| Cool-Down | 10 min | Light stretching + visualization | Mentally rehearse game plan |\n\n---\n\n### Tuesday, April 28 — MMA Skills + Conditioning\n\n#### tions from game plan | Rehearse key moments |\n| Cool-Down | 15 min | Light stretching + team debrief | Review what worked, what needs adjustment |\n\n---\n\n### Saturday, May 3 — Light Conditioning + Mental Prep\n\n#### AM: Light Conditioning (30 min)\n\n| Block | Duration | Activity | Notes |\n|-------|----------|----------|-------|\n| Warm-Up | 5 min | Easy jog / skip | |\n| Tempo Intervals | 15 min | 4 x 2 min moderate pace Assault Bike / 2 min easy | HR 140-150, not maximal |\n| Cool-Down | 10 min | Walk + stretching | |\n\n#### PM: Mental Preparation (30 min)\n\n| Activity | Duration | Notes |\n|----------|----------|-------|\n| Fight strategy review | 10 min | Review game plan notes with coach |\n| Visualization | 10 min | Walk through full fight mentally — entrances, Round 1 start, key exchanges |\n| Journaling/Reflection | 10 min | Write down confidence points, what you've trained, what you trust |\n\n---\n\n### Sunday, May 4 — Full Rest\n\nComplete rest day. No training. Light walk permitted. Focus on sleep (8-9 hours), nutrition, and hydration. Begin mentally rehearsing fight week routine.\n\n---\n\n## Week 8 (May 4 - May 10, 2026)\n\n**Theme:** Volume drops significantly. No hard sparring. Sharpness and speed only. Mental preparation ramps up. Begin water loading protocol discussion.\n\n> **IMPORTANT:** No hard or moderate sparring this week. Light technical sparring only — timing, distance management, movement. No damage, no fatigue accumulation.\n\n---\n\n### Monday, May 5 — Strength A (Final Heavy Session) + Light MMA\n\n#### AM: Strength A — Speed-Strength, Reduced (50 min)\n\n**Warm-Up (10 min)**\n\n| Exercise | Duration/Sets |\n|----------|---------------|\n| Jump rope | 3 min |\n| World's greatest stretch | 2 x 4 each |\n| Band pull-aparts | 2 x 12 |\n| Box jump (low) | 2 x 3 |\n\n**Main Work — Reduced Volume, Speed Focus**\n\n| Exercise | Sets x Reps | Load | Rest | Notes |\n|----------|-------------|------|------|-------|\n| Back Squat | 3 x 2 | n Work — Last Lifting Session Before Fight**\n\n| Exercise | Sets x Reps | Load | Rest | Notes |\n|----------|-------------|------|------|-------|\n| Trap Bar Deadlift | 3 x 2 | 70% (126 kg) | 2.5 min | Clean, explosive reps |\n| OHP | 3 x 2 | 70% (52.5 kg) | 2 min | Crisp lockout |\n\n**Accessory (minimal)**\n\n| Exercise | Sets x Reps | Load | Rest |\n|----------|-------------|------|------|\n| Lateral Lunge | 2 x 5 each | BW | 60 sec |\n| Band Pull-Apart | 2 x 15 | Band | 60 sec |\n\n> **This is the final strength session before the fight.** No more lifting until after May 16.\n\n#### PM: Light MMA — Game Plan Review (50 min)\n\n| Block | Duration | Activity | Notes |\n|-------|----------|----------|-------|\n| Shadow Boxing | 15 min | Full game plan walkthrough | Visualize opponent in front of you |\n| Light Pad Work | 15 min | Key combos and counter sequences | Precision and timing |\n| Positional Review | 10 min | Walk through key grappling positions | Slow, deliberate, technical |\n| Strategy Session | 10 min | Sit down with coach, review fight plan | Verbal walkthrough, Q&A |\n\n---\n\n### Thursday, May 8 — Active Recovery + Visualization\n\n#### Recovery Day (45 min)\n\n| Block | Duration | Activity | Notes |\n|-------|----------|----------|-------|\n| Light Walk | 15 min | Outdoors if possible | Easy pace, fresh air |\n| Mobility | 15 min | Full-body flow | Hips, t-spine, shoulders |\n| Breathing + Visualization | 15 min | Box breathing + full fight visualization | Round-by-round mental rehearsal |\n\n**Additional Mental Prep:**\n- Review fight strategy notes\n- Confirm fight day logistics (schedule, travel, cornermen, equipment)\n- Pack fight bag (see Phase 4 checklist)\n\n---\n\n### Friday, May 9 — Light Technical Session (Final Training)\n\n#### Final Training Session (40 min)\n\n| Block | Duration | Activity | Notes |\n|-------|----------|----------|-------|\n| Shadow Boxing | 15 min | Light, technical, game plan combos | Feel sharp, stay loose |\n| Li
