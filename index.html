unjača) | Lezi na bok, koljena složena i savijena na 90 stepeni. Ruke ispružene ispred, dlanovi zajedno. | \"Rotiraj gornju ruku gore i preko, otvarajući prsa prema stropu. Prati ruku pogledom. Neka se torakalna kičma rotira — drži koljena zalijepljena zajedno.\" | Rotiranje iz lumbalne kičme (koljena se razdvajaju), nepotpuno otvaranje, žurenje. | Rotacija torakalne kičme je motor snage udaraca i odbrane od obaranja. Borci koji gube rotaciju torakalne kičme kompenziraju donjim leđima i ramenima, što dovodi do hroničnog bola. Ovo čuva rotaciju potrebnu za udarce kukama (hook), laktovima i gledanje preko ramena za odbranu od obaranja. |\n| Goblet čučanj (Goblet Squat) | Kvadricepsi, gluteusi, jezgra (core) | Girja (kettlebell) ili bučica | Drži teg na visini prsa, laktovi unutar koljena. Stopala u širini ramena, prsti blago prema van. | \"Sjedi između kukova, laktovi guraju koljena prema van na dnu. Prsa uspravna, pogon kroz cijelo stopalo.\" | Naginjanje naprijed, podizanje peta, nedostizanje dubine. | Zagrijavanje i priprema pokreta za obrasce čučnja. Uči uspravan položaj čučnja koji se prenosi na držanje u klinču i završavanje duplih obaranja (double-leg). |\n| Most gluteusa (Glute Bridge) | Gluteusi, zadnja loža | Vlastita težina ili šipka (strunjača) | Lezi na leđa, koljena savijena, stopala ravno na podu u širini kukova. Ruke sa strane. | \"Pogoni kukove prema stropu stiskajući gluteuse. Drži na trenutak na vrhu. Spusti pod kontrolom.\" | Prekomjerno opružanje donjih leđa, pogon kroz prste umjesto peta, nedostizanje pune ekstenzije kukova. | Aktivacija ekstenzije kukova za zagrijavanje. Direktno oponaša bjeg mostom iz donjeg mount-a — jedan od najosnovnijih grappling pokreta. |\n| Dislociranja s trakom (Band Dislocates) | Ramena, rotatorna manšeta, prsa | Elastična traka ili PVC cijev | Drži traku/cijev širokim nadlanim hvatom ispred kukova. | \"Držeći ruke ravne, podigni traku iznad glave i iza leđa u sporom luku. Obrni. Proširi hvat ako je potrebno.\" | Savijanje laktova, prebrzo kretanje, korištenje preuskog hvata prije nego mobilnost dozvoljava. | Zagrijavanje punog opsega pokreta ramena. Priprema ramensku kapsulu za potiskivanje i rad iznad glave dok suzbija uska prednja ramena koja borci razvijaju od udaranja i rada u klinču. |\n| Sklekovi za lopatice (Scap Push-Ups) | Prednji nazubljeni mišić (serratus anterior), donji trapezius | Vlastita težina | Standardna pozicija za sklekove sa zaključanim rukama. | \"Bez savijanja laktova, protrakiraj lopatice (guraj pod od sebe) zatim retrakiraj (pusti prsa da potonu). Mali kontrolirani pokret.\" | Savijanje laktova (pretvara se u sklek), prebrzo kretanje, pretjeran opseg. | Aktivacija prednjeg nazubljenog mišića za stabilnost lopatica. Štiti rame tokom potiskivanja i oslanjanja — posebno važno za borce koji provode vrijeme na rukama u grapplingu. |\n| PVC čučanj iznad glave (PVC Overhead Squat) | Ramena, torakalna kičma, kukovi, gležnjevi | PVC cijev ili drška metle | Drži PVC iznad glave širokim hvatom poput trzaja (snatch). Stopala u širini ramena. | \"Čučni do pune dubine držeći PVC direktno iznad glave s zaključanim rukama. Prsa uspravna, pete dolje.\" | Šipka odlazi naprijed, pete se podižu, gubitak torakalne ekstenzije, pretjeran nagib naprijed. | Dijagnostika mobilnosti cijelim tijelom i zagrijavanje. Otkriva ograničenja u gležnjevima, kukovima, torakalnoj kičmi i ramenima istovremeno. Gradi stabilnost iznad glave potrebnu za proval (sprawl) s ispruženim rukama. |\n| Kruženje girjom oko glave (KB Halo) | Ramena, jezgra (core), gornja leđa | Girja (kettlebell) | Stani uspravno, drži girju za rogove naopako na visini prsa. | \"Kruži girjom oko glave u glatkom luku, držeći je blizu. Izmjenjuj smjerove svako ponavljanje. Stabiliziraj jezgru.\" | Naginjanje torza, pomicanje glave umjesto girje, prebrzo kretanje. | Zagrijavanje ramena s rotacijskim zahtjevom. Priprema ramena za potiskivanje dok gradi kružnu mobilnost ramena potrebnu za pummelovanje u klinču i borbe za potkopavanje (underhook). |\n| Bočno hodanje s trakom (Banded Lateral Walk) | Srednji gluteus (glute medius), abduktori kuka | Mini traka | Postavi traku oko gležnjeva ili tik iznad koljena. Četvrt-čučanj atletski stav. | \"Pravi kontrolirane bočne korake, održavajući tenziju na traci. Ne dopusti da koljena padnu prema unutra. Ostani nisko.\" | Stajanje previše uspravno, puštanje prateće noge da odskakuje nazad, koljena padaju prema unutra. | Aktivacija srednjeg gluteusa za stabilnost bočnog kretanja. Jača abduktore kuka koji stabiliziraju stav tokom udaranja nogom, bočnog rezanja uz kavez i odbrane od obaranja na jednu nogu. |\n| Najbolje istezanje na svijetu (World's Greatest Stretch) | Fleksori kuka, torakalna kičma, zadnja loža, prepone | Vlastita težina | Zakorači u duboki iskorak, postavi obje ruke na pod unutar prednjeg stopala. | \"Rotiraj unutrašnju ruku gore prema stropu, otvarajući prsa. Drži 2-3 sekunde. Vrati ruku na pod. Ispruži prednju nogu za istezanje zadnje lože. Ponovi na drugu stranu.\" | Žurenje kroz pozicije, nepotpuno rotiranje, zadnje koljeno udara u pod. | Najpovoljniji dinamički pokret zagrijavanja. Rješava napetost fleksora kuka, rotaciju torakalne kičme, dužinu zadnje lože i mobilnost prepona u jednoj sekvenci — sve oblasti koje trpe tokom MMA treninga. |\n| Istezanje gležnja uz zid (Wall Ankle Stretch) | Soleus, Ahilova tetiva, prednji tibijalni mišić | Zid | Postavi jedno stopalo nekoliko centimetara od zida, drugo stopalo iza za podršku. Prednje koljeno gura naprijed prema zidu. | \"Guraj koljeno preko prstiju prema zidu bez podizanja pete. Pomakni stopalo dalje nazad da povećaš težinu.\" | Peta se podiže od tla, koljeno pada prema unutra, bez progresije udaljenosti. | Dorzifleksija gležnja je potrebna za duboke pozicije čučnja, promjene nivoa pri obaranju i apsorpciju sile pri bočnom kretanju. Ograničeni gležnjevi uzrokuju kompenzatorne probleme koljena i kukova — česte kod boraca koji preskaču rad na mobilnosti. |\n| Razdvajanje trake (Band Pull-Aparts) | — | — | — | — | — | Pogledaj sekciju Dodaci za gornji dio tijela iznad. |\n| Podizanja licem prema dolje Y/T/W (Prone Y/T/W Raises) | Donji trapezius, srednji trapezius, rotatorna manšeta, zadnji deltoidi | Vlastita težina ili lagane bučice (1-2 kg) | Lezi licem prema dolje na podu ili kosoj klupi. Ruke vise. | \"Y: podigni ruke iznad glave u Y-oblik, palčevi gore. T: podigni ruke u strane u T. W: povuci laktove dolje i nazad u W, stiskajući lopatice. Drži svaku gornju poziciju 2 sekunde.\" | Korištenje previše tereta, podizanje trapezusa umjesto aktiviranja donjeg/srednjeg trapezusa, prebrzo kretanje. | Aktivacija donjeg i srednjeg trapezusa suzbija zaokruženo držanje ramena uzrokovano radom na vreći, grapplingom i sjedenjem za stolom. Zdrava mehanika lopatica štiti rame tokom poluga ruke (armbar), kimura i doskoka na ruke. |\n\n---\n\n## 7. Hvat / Vrat (Grip / Neck)\n\n| Vježba | Primarne mišićne grupe | Oprema | Postava | Upute za izvođenje | Česte greške | MMA korist |\n|---|---|---|---|---|---|---|\n| Držanje ploča prstima (Plate Pinch Holds) | Fleksori prstiju, palac, podlaktica | Tegovi (dvije ploče glatkom stranom prema van) | Stisni dvije ploče zajedno (glatke strane prema van) između prstiju i palca. Stani uspravno. | \"Stisni ploče najjače moguće. Drži na vrijeme. Drži ramena u ravnini.\" | Korištenje bumper ploča (prelako za hvat), puštanje ploča da klize, podizanje ramena. | Snaga hvata prstima za kontrolu zglobova tokom grapplinga, održavanje hvata na oznojenom protivniku i osiguravanje ovratničkih hvata. Obrazac hvata dominantnim palcem je specifičan za kontrolu udova. |\n| Zgibovi na ručniku (Towel Pull-Ups) | Latisimus (lats), podlaktice, fleksori prstiju | Šipka za zgibove, dva ručnika | Objesite ručnike preko šipke, uhvati po jedan u svaku ruku. | \"Izvodi zgibove dok držiš ručnike. Stisni jako — ako hvat popusti, set je gotov.\" | Omotavanje ručnika oko ruku (poništava svrhu), kip, skraćivanje opsega kretanja. | Izdržljivost hvata na debeloj, savitljivoj površini oponaša hvatanje gija ili kontrolu oznojenog zgloba/gležnja. Umor podlaktica i prstiju je direktno prenosiv na grappling hvat u kasnim rundama. |\n| Veslanje s debelim hvatom (Fat Grip Rows) | Latisimus (lats), romboidni, podlaktice | Šipka ili bučice, Fat Gripz / debela šipka | Pričvrsti Fat Gripz na šipku ili koristi šipku s debelom ručkom. Postavi se za standardno veslanje. | \"Veslaj normalno, ali debela ručka forsira mnogo teži hvat. Smanji težinu za 20-30% u odnosu na normalno veslanje.\" | Korištenje iste težine kao obično veslanje (hvat popusti prije leđa), previše oprezno stiskanje. | Trening s debelom šipkom gradi snagu otvorenog hvata koja se koristi u no-gi grapplingu, gdje ne možeš zatvoriti prste oko ovratnika ili rukava. Jače ruke znače bolju kontrolu zglobova i odbranu od zahvata. |\n| Zgibovi na giju (Gi Pull-Ups) | Latisimus (lats), podlaktice, fleksori prstiju | Šipka za zgibove, stari gi ili gi hlače | Objesite gi preko šipke za zgibove. Uhvati revere ili tkaninu. | \"Vuci se gore dok držiš gi materijal. Variraj pozicije hvata — rever, rukav, ovratnik. Drži na vrhu za ekstra zasluge.\" | Korištenje tanke tkanine koja se cijepa, omotavanje gija oko ruku umjesto hvatanja, djelomičan opseg kretanja. | Najsportskije specifičnija vježba hvata za grappling s gijem. Čak i u no-gi i MMA, izdržljivost hvata na zglob i tkaninu prenosi se na kontrolu rashguarda i održavanje kontrole zgloba. |\n| Ular za vrat (4 smjera) (Neck Harness 4-Way) | Sternokleidomastoidni mišić, gornji trapezius, ekstenzori vrata, bočni fleksori | Ular za vrat, teg ili šipka za opterećenje | Pričvrsti teg na ular. Izvodi fleksiju (brada prema prsima), ekstenziju (gledanje gore) i bočnu fleksiju (uho prema ramenu) iz sjedećeg ili stojećeg savijenog položaja. | \"Kontrolirani opseg kretanja kroz puni pokret. 2-sekundno zadržavanje na krajnjem opsegu. Počni vrlo lagano (2-5 kg) i dodaj opterećenje polako tokom sedmica.\" | Prebrzo dodavanje težine, trzanje tegom, prekomjerno opružanje na krajnjem opsegu, preskakanje serija zagrijavanja. | Jak vrat direktno smanjuje rizik od potresa mozga ograničavajući brzo ubrzanje glave od udaraca. Snaga vrata također pruža otpor giljotinama, otvaračima konzerve (can opener) i polugama vrata (crank). Ovo je vježba s najviše prevencije povreda koju borac može raditi. |\n| Izometrija vrata s trakom (Band Neck Isometrics) | Sva muskulatura vrata | Elastična traka | Petlja trake oko glave (čelo za otpor ekstenziji, potiljak za otpor fleksiji, strana za bočni otpor). Usidri traku na visini glave. | \"Drži glavu u neutralnom položaju protiv povlačenja trake. 10-20 sekundi zadržavanja. Rotiraj kroz sva četiri smjera.\" | Preteška traka (vrat kompenzira pokretom torza), netreniranje sva četiri smjera, zadržavanje daha. | Niskointenzivno jačanje vrata idealno za svakodnevni trening. Gradi izometrijsku izdržljivost vrata — vrstu snage potrebnu za otpor promjeni pozicije glave u realnom vremenu kada si udaren ili uhvaćen u prednji zahvat glave (front headlock). Dovoljno sigurno za svaku sesiju. |\n\n---\n\n## 8. Kondicijske modalitete (Conditioning Modalities)\n\n| Vježba | Primarne mišićne grupe | Oprema | Postava | Upute za izvođenje | Česte greške | MMA korist |\n|---|---|---|---|---|---|---|\n| Intervali na assault biciklu (Assault Bike Intervals) | Kvadricepsi, zadnja loža, ramena, kardiovaskularni sistem | Assault / air bicikl | Podesi visinu sjedala tako da postoji blagi savijak u koljenu na dnu. Uhvati ručke. | \"Guraj i vuci rukama, pogoni nogama. Za intervale: maksimalan napor za period rada, lagan okret za odmor. Fokusiraj se na RPM ili kalorije kao cilj.\" | Sjedalo previsoko (ljuljanje kukova), ruke i noge nisu koordinirane, ne ideš istinski na maksimum tokom radnih intervala. | Trening energetskih sistema cijelim tijelom bez udarca. Istovremeni rad ruku i nogu oponaša metabolički zahtjev borbe. Intervali (npr. 10s rad / 20s odmor) repliciraju obrazac eksplozivnog naleta pa oporavka MMA rundi. |\n| Veslanje — 500m ponavljanja (Rowing — 500m Repeats) | Noge, leđa, ruke, kardiovaskularni sistem | Ergometar za veslanje (Concept2) | Pričvrsti stopala, postavi otpor na 4-6. Počni s ispruženim rukama, potkoljenice vertikalne. | \"Pogoni nogama prvo, zatim otvori kukove, zatim povuci ručku do sternuma. Obrni redoslijed pri oporavku. Ciljaj konstantna split vremena kroz ponavljanja.\" | Povlačenje rukama prvo (trebaju biti noge-kukovi-ruke), postavljanje otpora previsoko, nekonzistentno tempiranje. | Kondicija cijelog zadnjeg lanca s naglaskom na povlačenju — uravnotežava zahtjeve dominantnog guranja udaračkih vještina. 500m ponavljanja na trkačkom tempu grade toleranciju na laktat potrebnu za runde pune borbi za poziciju i kasne bitke za obaranje. |\n| Preskakanje užeta (Jump Rope) | Listovi, ramena, koordinacija, kardiovaskularni sistem | Brzo uže | Drži ručke na visini kukova, laktovi usko uz tijelo. Stani na jastučiće stopala. | \"Mali odskoci — taman dovoljno da preskočiš uže. Okreći iz zglobova, ne iz ramena. Ostani opušten.\" | Preskakanje previsoko, okretanje iz laktova, tenzija u ramenima, dvostruko odskakivanje. | Koordinacija stopala, izdržljivost listova i ritam — temelj udaračkog kretanja. Gradi laganu, odskočnu bazu koja omogućava borcima da održe distancu, mijenjaju uglove i ostaju na jastučićima stopala pet rundi. |\n| Guranje / Vučenje saonica (Sled Push / Pull) | Kvadricepsi, gluteusi, zadnja loža, listovi, jezgra (core) | Saonice, travnata ili glatka površina | Optereti saonice. Za guranje: ruke na visokim ili niskim ručkama, nagni se naprijed. Za vučenje: pričvrsti remen ili uže i okreni se licem prema saonicama. | \"Guranje: pogoni nogama, drži ruke ispružene, ostani nisko. Vučenje: sjedi nazad i veslaj ruku po ruku, ili hodaj unatrag s remenom preko ramena.\" | Stajanje previše uspravno pri guranju (gubitak ugla pogona), preopterećivanje i gubitak brzine, odmor između koraka. | Nula ekscentričnog opterećenja znači teška kondicija bez zakašnjele bolnosti mišića — kritično za borce koji moraju trenirati tehničke vještine sljedeći dan. Guranje oponaša pogon uz kavez; vučenje oponaša povlačenje protivnika. Oboje grade kapacitet pogona nogu. |\n| Udarci čekićem po gumi (Sledgehammer Tire Strikes) | Jezgra (core), ramena, latisimus (lats), hvat, kardiovaskularni sistem | Čekić (5-9 kg), velika guma | Stani u razdvojeni stav licem prema gumi, čekić iznad glave s blagim uglom sjekanja. | \"Klizi gornju ruku gore tokom dizanja, klizi je dolje da se sretne s donjom rukom tokom udarca. Rotiraj kukove u svaki zamah. Izmjenjuj strane.\" | Prečvrst hvat (umor hvata), sve ruke / bez rotacije kukova, neizmjenjivanje vodeće strane. | Rotacijska snaga-izdržljivost — sposobnost bacanja snažnih, kukovima pogonjen udaraca ponavljano. Težina alata i zahtjev usporavanja odražavaju apsorpciju udarca pri radu na focusima ili protivniku. Gradi borbeno-specifičnu izdržljivost hvata. |\n| Boks iz sjene (Shadow Boxing) | Ramena, jezgra (core), noge, kardiovaskularni sistem | Ništa (rukavice opcionalno) | Borački stav, ruke gore, brada uvučena, težina na jastučićima stopala. | \"Baci kombinacije s namjerom. Pomakni stopala između kombinacija. Vizualiziraj protivnika — nemoj samo mahati rukama. Radi odbranu između napada.\" | Spuštanje ruku, kretanje na ravnim stopalima, bez defanzivnog kretanja između kombinacija, udaranje bez svrhe. | Najspecifičniji kondicijski modalitet za udaranje. Omogućava tehničku praksu pod umorom. Kada se koristi u programima treninga, runde boksa iz sjene služe kao aktivni oporavak dok pojačavaju tehniku i generalstvo u ringu. |\n| Rad na vreći (Bag Work) | Ramena, jezgra (core), noge, ruke, kardiovaskularni sistem | Teška vreća (30-45 kg), rukavice za vreću ili MMA rukavice, bandaže | Objesite bandaže, obucite rukavice. Postavi se na udaljenost udarca od vreće. Borački stav. | \"Baci prave kombinacije — džeb-kroše-huk (jab-cross-hook), ne pojedinačne udarce. Pomakni glavu i stopala između kombinacija. Udari kroz vreću, ne po njoj.\" | Stajanje na ravnim stopalima i bacanje pojedinačnih udaraca, bez kretanja između kombinacija, udaranje s lošim poravnanjem zgloba, 100% svaku rundu bez varijacije. | Kondicija udaranja s punim kontaktom koja gradi izdržljivost udarca, tajming i sposobnost održavanja tehnike pod umorom. Programirano u runde od 3-5 minuta da odgovara taktici borbe. Povratna informacija vreće uči borce da se posvete udarcu. |\n| Proval u burpee (Sprawl-to-Burpee) | Cijelo tijelo (fleksori kuka, kvadricepsi, prsa, ramena, kardiovaskularni sistem) | Vlastita težina | Stani u borački stav. | \"Spusti se u proval (sprawl) (kukovi na pod, noge nazad, prsa gore), odmah uskoči na noge, zatim skoči (ili preskoči skok za brzinu). Resetuj stav i ponovi.\" | Lijeni provali (kukovi ostaju visoko — poništava svrhu), nevraćanje u borački stav, presporo tempiranje za kondicijski efekat. | Najspecifičniji kondicijski pokret MMA s vlastitom težinom. Kombinira odbranu od obaranja (proval / sprawl) s eksplozivnim oporavkom u stojeći. Setovi visokih ponavljanja grade anaerobnu izdržljivost za zaustavljanje obaranja u šampionskim rundama kada se većina borbi odlučuje. |\n", "warmups": "# Protokoli zagrijavanja i hlađenja\n\n---\n\n## 1. Snaga: Zagrijavanje gornjeg dijela tijela (~10 min)\n\n| Redoslijed | Vježba | Trajanje/Ponavljanja | Vrijeme | Uputa |\n|------------|--------|----------------------|---------|-------|\n| 1 | Zvjezdasti skokovi (Jumping Jacks) | 30 sek | 0:30 | Lagano i ritmično, pokrenuti cirkulaciju |\n| 2 | Kruženje rukama (naprijed + nazad) | 15 sek u svakom smjeru | 1:00 | Pun opseg pokreta, postepeno povećavati krug |\n| 3 | Kruženje ramenima - CARs (Shoulder CARs) | 5 u svakom smjeru po ruci | 2:00 | Sporo, kontrolisano, maksimalni opseg — pesnica stisnuta, širiti napetost |\n| 4 | Razvlačenje trake (Band Pull-Aparts) | 2 x 15 | 1:30 | Stisnuti lopatice, ruke ispružene, prsa naprijed |\n| 5 | Hodajući sklekovi (Push-Up Walkouts / Inchworms) | 5 ponavljanja | 1:30 | Sporo hodanje rukama do punog planka, kratko zadržavanje, vratiti ruke nazad |\n| 6 | Torakalne rotacije u četveronoški (Thoracic Rotations) | 5 na svaku stranu | 1:30 | Ruka iza glave, rotirati da se otvore prsa prema plafonu, izdahnuti na vrhu |\n| 7 | Lagani pripremni set 1 (glavna vježba) | 8 ponavljanja @ prazna šipka / vrlo lagano | 1:00 | Fokus na putanju šipke i poziciju — bez forsiranja |\n| 8 | Lagani pripremni set 2 (glavna vježba) | 5 ponavljanja @ ~50% radne težine | 1:00 | Blago povećati brzinu, utvrditi tehniku |\n\n**Ukupno: ~10 min**\n\n---\n\n## 2. Snaga: Zagrijavanje donjeg dijela tijela (~12 min)\n\n| Redoslijed | Vježba | Trajanje/Ponavljanja | Vrijeme | Uputa |\n|------------|--------|----------------------|---------|-------|\n| 1 | Lagano trčanje u mjestu / visoki korak | 30 sek | 0:30 | Lagan tempo, probuditi noge |\n| 2 | Kruženje kukovima - CARs (Hip CARs) u stojećem položaju | 5 u svakom smjeru po nozi | 2:00 | Spori krugovi, karlica stabilna, maksimizirati opseg |\n| 3 | 90/90 prebacivanje (90/90 Switches) | 8 ukupno (4 na svaku stranu) | 1:30 | Koljena pod 90 stepeni, sjediti uspravno, glatko rotirati kukove |\n| 4 | Mobilnost gležnja (koljeno-preko-prstiju) | 10 na svaku stranu | 1:00 | Peta ostaje dolje, gurati koljeno preko prstiju iznad 2./3. prsta |\n| 5 | Čučnjevi s vlastitom težinom | 10 ponavljanja | 1:00 | Puna dubina, prsa gore, gurati koljena van preko prstiju |\n| 6 | Iskoraci u hodu (Walking Lunges) | 8 na svaku nogu | 1:30 | Dug korak, uspravan trup, zadnje koljeno dodiruje pod |\n| 7 | Bočni hodovi s trakom (Banded Lateral Walks) | 10 u svakom smjeru | 1:00 | Traka iznad koljena, ostati nisko u polu-čučnju, gurati koljena van |\n| 8 | Vatrogasni hidrant (Fire Hydrants) | 10 na svaku stranu | 1:00 | Četveronoški položaj, trup stabilan, podići koljeno u stranu |\n| 9 | Lagani pripremni set 1 (glavna vježba) | 8 ponavljanja @ prazna šipka | 1:00 | Uvježbati obrazac — fokus na učvršćivanje i dubinu |\n| 10 | Lagani pripremni set 2 (glavna vježba) | 5 ponavljanja @ ~50% radne težine | 1:00 | Kontrolisan spust, snažan pogon iz najniže tačke |\n\n**Ukupno: ~12 min**\n\n---\n\n## 3. Snaga: Zagrijavanje za dan snage/eksplozivnosti (~11 min)\n\n| Redoslijed | Vježba | Trajanje/Ponavljanja | Vrijeme | Uputa |\n|------------|--------|----------------------|---------|-------|\n| 1 | Zvjezdasti skokovi (Jumping Jacks) | 30 sek | 0:30 | Brz tempo, pune ekstenzije ruku iznad glave |\n| 2 | Visoki korak (High Knees) | 30 sek | 0:30 | Gurati koljena do visine kukova, pokretati ruke |\n| 3 | Zamasi nogama (naprijed-nazad) | 10 na svaku nogu | 1:00 | Držati se za zid za ravnotežu, stojna noga ravna |\n| 4 | Zamasi nogama (bočno) | 10 na svaku nogu | 1:00 | Preko tijela i van, kontrolisan zamas |\n| 5 | Kruženje rukama + provlačenje ramena (Shoulder Pass-Throughs) | 10 svako + 10 provlačenja | 1:00 | Koristiti PVC cijev ili traku za provlačenja — širok hvat, polako |\n| 6 | Kruženje kukovima - CARs (Hip CARs) | 3 u svakom smjeru po nozi | 1:30 | Manji set — samo otvoriti kukove |\n| 7 | Tehnika viseće nabačaj (Hang Clean) — prazna šipka | 2 x 5 ponavljanja | 2:00 | Fokus na pregib kukova, eksplozivna ekstenzija kukova, visoki laktovi u hvatanju |\n| 8 | Priprema za skokove na kutiju (niska kutija) | 3 ponavljanja na nisku kutiju | 1:00 | Meko doskok, puna ekstenzija kukova pri odskoku, silazak korakom |\n| 9 | Priprema za skokove na kutiju (radna visina) | 3 ponavljanja | 1:00 | Zadržati doskok, tiha stopala, apsorbovati kroz kukove |\n| 10 | Lagani pripremni set (glavna eksplozivna vježba) | 3 ponavljanja @ ~50% | 1:00 | Brzo i oštro — pripremiti nervni sistem |\n\n**Ukupno: ~11 min**\n\n---\n\n## 4. MMA zagrijavanje za udarce (~10 min)\n\n| Redoslijed | Vježba | Trajanje/Ponavljanja | Vrijeme | Uputa |\n|------------|--------|----------------------|---------|-------|\n| 1 | Preskakanje vijače | 3 min | 3:00 | Ostati na prstima, lagan odskok, opuštena ramena |\n| 2 | Kruženje ručnim zglobovima | 15 u svakom smjeru | 0:30 | Prepleteni prsti, glatko kruženje — zaštititi zglobove |\n| 3 | Zagrijavanje vrata (kimanje, rotacije, bočno) | 10 u svakom smjeru | 1:00 | Sporo i kontrolisano — nikad ne forsirati opseg, nježno zadržavanje na kraju |\n| 4 | Kruženje rukama + kruženje ramenima | 10 u svakom smjeru | 0:30 | Opustiti lanac udaranja od ramena do pesnice |\n| 5 | Dinamičko otvaranje kukova (zamasi nogama, kruženje kukovima) | 8 na svaku nogu | 1:00 | Priprema za udarce nogama — zamasi naprijed-nazad i bočno |\n| 6 | Rotacije trupa (stojeći) | 10 na svaku stranu | 0:30 | Stopala fiksirana, rotacija iz torakalnog dijela kičme, ruke opuštene |\n| 7 | Boks iz sjene — samo džeb-kros | 1 min | 1:00 | Lagano i tehnički, fokus na vraćanje ruku i stav |\n| 8 | Boks iz sjene — dodati kuke, aperkate | 1 min | 1:00 | Ostati opušten, brzi udarci, brada spuštena |\n| 9 | Boks iz sjene — pune kombinacije + udarci nogama | 1 min | 1:00 | Sve spojiti, progresivni intenzitet, pokretati stopala |\n\n**Ukupno: ~10 min**\n\n---\n\n## 5. MMA zagrijavanje za hrvanje (~12 min)\n\n| Redoslijed | Vježba | Trajanje/Ponavljanja | Vrijeme | Uputa |\n|------------|--------|----------------------|---------|-------|\n| 1 | Lagano trčanje / kretanje na strunjačama | 3 min | 3:00 | Uključiti bočne korake, kretanje unatrag, provjere spravljanja — lagano |\n| 2 | Zagrijavanje vrata (kimanje, rotacije, mostovi) | 10 u svakom smjeru | 1:00 | Nježno — postepeno povećavati visinu mosta, nikad ne forsirati |\n| 3 | Bježanje kukovima / škampi (Hip Escapes / Shrimps) | 5 na svaku stranu (dolje i nazad) | 1:30 | Odgurivanje donjim stopalom, stvaranje prostora, laktovi uski |\n| 4 | Tehnički ustanci (Technical Stand-Ups) | 5 na svaku stranu | 1:30 | Osloniti se na ruku, provući nogu, ustati u borbeni stav |\n| 5 | Granby kotrljanja (Granby Rolls) | 5 u svakom smjeru | 1:30 | Podviti bradu, kotrljanje preko ramena, ostati kompaktan |\n| 6 | Pumling s partnerom (Partner Pumm  | 85 g  | ~2,560  | 3.0                 |\n\n*\\*Dani duplih treninga: bazni unos je ~3,300 kcal + ugljikohidrati tokom treninga donose efektivni ukupni na ~3,600 kcal.*\n\n### Matematika\n\n```\nProtein:        88 kg × 2.1 g/kg = 185 g → 185 × 4 =  740 kcal\nMasti:          88 kg × 1.0 g/kg =  85 g →  85 × 9 =  765 kcal\n\nUgljikohidrati dan treninga:     88 × 4.5 = 400 g → 400 × 4 = 1,600 kcal → Ukupno: 3,105 kcal\nUgljikohidrati dupli dan:        88 × 5.0 = 440 g → 440 × 4 = 1,760 kcal → Ukupno: 3,265 kcal + tokom treninga\nUgljikohidrati dan odmora:       88 × 3.0 = 264 g → 264 × 4 = 1,056 kcal → Ukupno: 2,561 kcal\n```\n\n---\n\n## 2. Tajming obroka\n\n### Prije treninga (2-3 sata ranije)\n\n| Nutrijent | Cilj       | Grami (88 kg) | Svrha                              |\n|-----------|------------|----------------|------------------------------------|\n| Ugljikohidrati | 1-2 g/kg | 88-176 g    | Dopuniti glikogen                  |\n| Protein   | 0.3-0.4 g/kg | 26-35 g     | Pokrenuti sintezu mišićnog proteina |\n| Masti     | Nisko      | < 15 g        | Ubrzati pražnjenje želuca          |\n\n### Užina prije treninga (30-60 min ranije)\n\n- **30-50 g brzo probavljivih ugljikohidrata** — banana, pirinčana pogačica s medom, sportski napitak\n- Minimizirati masti i vlakna da se izbjegnu gastrointestinalni problemi tokom treninga\n\n### Tokom treninga (dupli treninzi ili bilo koji trening > 90 min)\n\n- **30-60 g ugljikohidrata na sat** — sportski napitak, gumeni bomboni, visoko razgranati ciklični dekstrin (Highly Branched Cyclic Dextrin)\n- **Elektroliti** — 500-700 mg natrija po litri tečnosti\n- Piti kontinuirano u gutljajima; ne ispijati odjednom između rundi\n\n### Poslije treninga (u roku od 1-2 sata)\n\n| Nutrijent | Cilj         | Grami (88 kg) | Svrha                          |\n|-----------|--------------|----------------|--------------------------------|\n| Protein   | 0.3-0.5 g/kg | 26-44 g        | Pokrenuti oporavak/MPS         |\n| Ugljikohidrati | 1-1.5 g/kg | 88-132 g    | Obnoviti glikogen              |\n\n---\n\n## 3. Primjeri planova obroka\n\n### Dan treninga (~3,100 kcal)\n\n| Obrok | Vrijeme | Hrana | P | U | M | kcal |\n|-------|---------|-------|---|---|---|------|\n| **Obrok 1 — Doručak** | 7:00 | 4 cijela jaja kajgana, 2 kriške kiselog kruha, 1 banana, 1 kašika maslaca | 32 g | 65 g | 28 g | 640 |\n| **Obrok 2 — Prije treninga** | 11:00 | 150 g pileća prsa, 250 g bijelog pirinča (kuhanog), salata od miješanog zelja, 1 kašika maslinovog ulja | 45 g | 90 g | 18 g | 700 |\n| **Užina prije treninga** | 12:30 | 1 banana + 1 kašika meda | 1 g | 42 g | 0 g | 170 |\n| **Tokom treninga** | 13:00-15:00 | 500 ml sportskog napitka + 30 g praška ugljikohidrata | 0 g | 55 g | 0 g | 220 |\n| **Obrok 3 — Poslije treninga** | 15:30 | 40 g whey proteina, 100 g zobi (suha težina), 200 g borovnica, 1 kašika maslaca od kikirikija | 45 g | 100 g | 14 g | 710 |\n| **Obrok 4 — Večera** | 19:00 | 180 g filet lososa, 200 g slatkog krompira, 150 g brokolija, 1 kašičica maslinovog ulja | 42 g | 50 g | 20 g | 550 |\n| **Obrok 5 — Prije spavanja** | 21:30 | 200 g grčkog jogurta (punomasnog), 30 g oraha, 30 g tamne čokolade | 20 g | 25 g | 22 g | 380 |\n| **DNEVNI ZBIR** | | | **185 g** | **427 g** | **102 g** | **~3,370** |\n\n*Prilagoditi porcije blago na dolje na standardnim danima treninga (smanjiti pirinač na Obroku 2 ili zob na Obroku 3 za ~25 g suhe) da se postigne 3,100. Gornji plan je bliži umjereno-teškom danu treninga. Na duplim danima, zadržati pune porcije i dodati drugi napitak tokom treninga.*\n\n### Dan odmora (~2,560 kcal)\n\n| Obrok | Vrijeme | Hrana | P | U | M | kcal |\n|-------|---------|-------|---|---|---|------|\n| **Obrok 1 — Doručak** | 8:30 | 3 cijela jaja + 2 bjelanca kajgana, 1 kriška kiselog kruha, 1/2 avokada, 100 g cherry paradajza | 35 g | 30 g | 24 g | 480 |\n| **Obrok 2 — Ručak** | 12:30 | 180 g mršavog mljevenog mesa (93%), 150 g bijelog pirinča (kuhanog), pečeno povrće (tikvica, paprike), -------|\n| **Kreatin monohidrat** | 5 g/dan | Bilo kada (bitna je dosljednost) | A-nivo | Snaga, eksplozivnost, oporavak | Faza punjenja nije potrebna. Uzimati svaki dan uključujući dane odmora. Pomiješati u vodu ili šejk. |\n| **Kofein** | 3-6 mg/kg (264-528 mg) | 45-60 min prije treninga | A-nivo | Budnost, snaga, izdržljivost | **Izbjegavati poslije 14:00** da se zaštiti san. Početi s nižom dozom, procijeniti toleranciju. Ciklirati 1 sedmicu/mjesečno po želji. |\n| **Whey Protein** | 30-40 g po obroku | Poslije treninga ili bilo koji razmak obroka | A-nivo | Praktičan kompletni protein | Koristiti da se dostigne dnevni cilj od 185 g. Nije zamjena za protein iz cjelovite hrane. |\n| **Elektroliti** | 500-700 mg natrija/L | Tokom treninga > 60 min | A-nivo | Prevencija grčeva, održavanje performansi | Komercijalni miks ili uradi sam (1/4 kašičice soli + voda + ceđen limun). |\n| **Vitamin D3** | 3,000-5,000 IU/dan | Uz obrok koji sadrži masti | A-nivo | Imunološka funkcija, zdravlje kostiju, oporavak | Provjeriti nivo u krvi; ciljati 40-60 ng/ml. Veća doza zimi / malo sunca. |\n| **Magnezij glicinат** | 400-500 mg/dan | Podijeliti ujutro/naveče; prioritet prije spavanja | B-nivo | Kvalitet sna, opuštanje mišića, oporavak | Glicinатna forma se najbolje apsorbuje i najmanje izaziva GI tegobe. |\n| **Omega-3 (EPA/DHA)** | 2-3 g kombinovanog EPA+DHA/dan | Uz obroke (podijeliti na 2 obroka) | A-nivo | Protuupalno, zdravlje zglobova, funkcija mozga | Tražiti riblje ulje visoke koncentracije. Držati u frižideru. |\n| **Beta-alanin** | 3-6 g/dan | Podijeliti u 2-3 doze (smanjuje trnce) | B-nivo | Puferuje mliječnu kiselinu u naporima od 1-4 min | Opcionalno. Najkorisnije za runde hrvanja s mnogo ponavljanja. Trnci (parestezija) su bezopasni. |\n\n---\n\n## 6. Spisak namirnica\n\n### Proteini\n- Pileća prsa (bez kostiju, bez kože)\n- Pileći bataci (s kožom za dane odmora)\n- Fileti lososa\n- Mršavo mljeveno meso (93% mršavo)\n- Cijela jaja (slobodan uzgoj)\n- Svježi sir (Cottage Cheese)\n- Grčki jogurt (punomasni)\n- Whey protein u prahu\n\n### Ugljikohidrati\n- Bijeli pirinač (jasmin ili basmati)\n- Zob (oljuštena ili brza)\n- Slatki krompir\n- Bijeli krompir\n- Kiseli kruh (Sourdough)\n- Tjestenina (za raznovrsnost)\n\n### Masti\n- Ekstra djevičansko maslinovo ulje\n- Maslac\n- Avokado\n- Bademi\n- Orasi\n- Sjemenke bundeve\n- Prirodni maslac od kikirikija\n- Tamna čokolada (70%+)\n\n### Povrće\n- Brokoli\n- Špinat / miješano lisnato povrće\n- Tikvica\n- Paprike\n- Cherry paradajz\n- Luk\n- Bijeli luk\n\n### Voće\n- Banane\n- Borovnice\n- Jabuke\n- Limunovi / limete\n\n### Osnovne namirnice iz ostave\n- Med\n- Sol (morska ili jodirana)\n- Crni papar\n- Osnovni začini (paprika, kumin, češnjak u prahu)\n- Soja sos ili kokosov aminos (Coconut Aminos)\n- Rižin ocat\n- Kafa (mljevena ili u zrnu)\n\n### Suplementi\n- Kreatin monohidrat (neutralan prašak)\n- Whey protein (čokolada ili vanila)\n- Kapsule ribljeg ulja (visoki EPA/DHA)\n- Vitamin D3 meke kapsule\n- Magnezij glicinat kapsule\n- Miks elektrolita ili tablete natrija\n- Kofein (kafa ili kapsule)\n- Beta-alanin u prahu (opcionalno)\n\n---\n\n## 7. Brze dnevne kontrolne liste\n\n### Dan treninga\n\n- [ ] Dostignut cilj proteina: 185 g kroz sve obroke\n- [ ] Dostignut cilj ugljikohidrata: ~400 g (povećati na 440 g na duple dane)\n- [ ] Obrok prije treninga 2-3 sata ranije: ugljikohidrati + protein, malo masti\n- [ ] Užina prije treninga 30-60 min ranije: banana ili brzi ugljikohidrati\n- [ ] Napitak tokom treninga ako trening > 90 min: ugljikohidrati + elektroliti\n- [ ] Obrok poslije treninga u roku od 1-2 sata: protein + ugljikohidrati\n- [ ] Unos vode: 3.5-4.0 L ukupno (više po vrućini)\n- [ ] 500 ml vode u 2 sata prije treninga\n- [ ] 600-1,200 ml/sat tokom treninga s elektrolitima\n- [ ] Kreatin: 5 g uzeto\n- [ ] Kofein: uzet 45-60 min prije treninga, ne poslije 14:00\n- [ ] Omega-3 uz obrok\n- [ ] Vitamin D uz obrok koji sadrži masti\n- [ ] Magnezij prije spavanja\n- [ ] Izvor proteina prije spavanja (bogat kazeinom: svježi sir, grčki jogurt)\n\n### Dan odmora\n\n- [ ] Dostignut cilj proteina: 185 g kroz sve obroke\n- [ ] Dostignut cilj ugljikohidrata: ~264 g (niže nego na dane treninga)\n- [ ] Masti na ~85 g (izvori proteina s nešto više masti su u redu)\n- [ ] Jesti 4-5 obroka razmaknutih 3-4 sata\n- [ ] Unos vode: 3.0-3.5 L minimum\n- [ ] Kreatin: 5 g uzeto (ne preskakati na dane odmora)\n- [ ] Bez kofeina poslije 14:00 (ili potpuno preskočiti za resetiranje tolerancije)\n- [ ] Omega-3 uz obrok\n- [ ] Vitamin D uz obrok koji sadrži masti\n- [ ] Magnezij prije spavanja\n- [ ] Izvor proteina prije spavanja\n- [ ] Dati prednost cjelovitoj hrani nad šejkovima danas\n", "testing": "# Protokol testiranja kondicije i fizičke spremnosti\n\n## Sedmica 0 — Protokol početnog testiranja\n\n### Kada testirati\n\n- Zakažite testiranje **2–3 dana prije početka Sedmice 1** (npr. ako Sedmica 1 počinje u ponedjeljak, testirajte u prethodni četvrtak ili petak).\n- Izbjegavajte testiranje dan prije početka treninga — ostavite najmanje jedan puni dan odmora između testiranja i Sedmice 1, Dana 1.\n- Ako dijelite testiranje na dva dana, uradite kardiovaskularne + testove mišićne izdržljivosti prvog dana, snagu + MMA-specifične testove drugog dana.\n- Zabilježite tačan datum, doba dana i uslove (natašte/nakon jela, kvalitet sna, itd.) kako biste ih mogli ponoviti pri ponovnom testiranju.\n\n### Protokol zagrijavanja\n\nIzvedite ovo zagrijavanje prije svake sesije testiranja (otprilike 10 minuta):\n\n1. **5 min laganog kardija** — veslanje, bicikl ili lagano trčanje konverzacijskim tempom\n2. **Kruženje zglobova** — gležnjevi, koljena, kukovi, ramena, ručni zglobovi (10 u svakom smjeru)\n3. **Dinamičko istezanje** — zamasi nogama (10/strana), kruženje kukovima (10/strana), kruženje rukama (10/strana), inchworms (5)\n4. **Priprema pokreta** — 5 čučnjeva tjelesnom težinom, 5 sklekova, 5 povlačenja s trakom\n\nZa testove snage, dodajte 2–3 progresivna seta zagrijavanja prije radnih setova (npr. prazna šipka → 50% → 70% → 85% → pokušaj 3RM).\n\n### Redoslijed testova\n\nProvodite testove od **najmanje zamornog do najzamornijeg** kako biste izbjegli da jedan test utiče na sljedeći. Preporučeni redoslijed ispod logički grupiše testove i minimizira međusobno ometanje.\n\n**Odmor između testova:** 3–5 minuta između testova unutar kategorije, 5–10 minuta između kategorija.\n\n---\n\n### Baterija testova\n\n#### Kardiovaskularni\n\n| # | Test | Protokol | Šta mjeri | Cilj / Referentna vrijednost |\n|---|------|----------|-----------|------------------------------|\n| 1 | Puls u mirovanju (Resting Heart Rate) | Izmjerite pri buđenju (prije ustajanja), 3 uzastopna jutra, zabilježite prosjek | Aerobna baza / srčana efikasnost | < 60 bpm (dobro trenirani); < 50 bpm (elitni) |\n| 2 | 2 km veslanje ili trčanje (2 km Row or Run) | Vremenski test — maksimalni napor. Zabilježite završno vrijeme, puls na kraju i puls 1 min nakon završetka | Aerobni kapacitet (VO2 Max procjena) | Veslanje: < 7:30 (dobro), < 7:00 (odlično). Trčanje: < 8:30 (dobro), < 8:00 (odlično) |\n| 3 | 5-minutni Assault Bike (5-min Assault Bike) | Maksimalne kalorije u 5 minuta. Zabilježite ukupne kalorije i prosječni puls | Anaerobni kapacitet + održiva snaga | > 75 kal (dobro), > 90 kal (odlično) |\n\n#### Snaga\n\n| # | Test | Protokol | Šta mjeri | Cilj / Referentna vrijednost |\n|---|------|----------|-----------|------------------------------|\n| 4 | Procijenjeni 1RM stražnji čučanj (Est. 1RM Back Squat) | Progresivno zagrijavanje, radite do teškog 3RM. Izračunajte 1RM koristeći Epley formulu | Maksimalna snaga donjih ekstremiteta | 1,5× tjelesna težina (dobro), 2× (odlično) |\n| 5 | Procijenjeni 1RM bench press (Est. 1RM Bench Press) | Progresivno zagrijavanje, radite do teškog 3RM. Izračunajte 1RM koristeći Epley formulu | Snaga gornjeg tijela — potisak | 1× tjelesna težina (dobro), 1,25× (odlično) |\n| 6 | Procijenjeni 1RM mrtvo dizanje (Est. 1RM Deadlift) | Progresivno zagrijavanje, radite do teškog 3RM. Izračunajte 1RM koristeći Epley formulu | Maksimalna snaga stražnjeg lanca | 2× tjelesna težina (dobro), 2,5× (odlično) |\n| 7 | Maksimalni striktni zgibovi (Max Strict Pull-Ups) | Početak iz mrtvog visa, brada iznad šipke, potpuno ispružanje na dnu. Bez klacanja ili ljuljanja. Brojite ukupna ponavljanja do otkaza | Snaga-izdržljivost gornjeg tijela — povlačenje | 10+ (dobro), 15+ (odlično), 20+ (elitno) |\n\n#### Mišićna izdržljivost\n\n| # | Test | Protokol | Šta mjeri | Cilj / Referentna vrijednost |\n|---|------|----------|-----------|------------------------------|\n| 8 | Maksimalni sklekovi u 2 min (Max Push-Ups in 2 min) | Neprekidno — grudi moraju dodirnuti pod, potpuno zaključavanje na vrhu. Pauziranje u gornjoj poziciji je dozvoljeno. Zaustavljanje na 2:00 | Izdržljivost gornjeg tijela | 50+ (dobro), 70+ (odlično) |\n| 9 | Maksimalno držanje planka (Max Plank Hold) | Plank na podlakticama, laktovi ispod ramena, tijelo u ravnoj liniji. Vrijeme se zaustavlja kada kukovi padnu ili se podignu > 5 cm | Izdržljivost jezgra / anti-ekstenzija | 2:00+ (dobro), 3:00+ (odlično) |\n\n#### MMA-specifični\n\n| # | Test | Protokol | Šta mjeri | Cilj / Referentna vrijednost |\n|---|------|----------|-----------|------------------------------|\n| 10 | 3-minutni test sprawlova (3-min Sprawl Test) | Postavite tajmer na 3 minute. Izvedite maksimalne sprawlove (stajanje → grudi na pod → povratak u stav). Brojite ukupna ponavljanja | Izdržljivost odbrane od obaranja / anaerobni kapacitet | 30+ (dobro), 40+ (odlično) |\n| 11 | Prijelazi s poda u stajanje (Ground-to-Standing Transitions) | Postavite tajmer na 2 minute. Počnite stojeći → lezite ravno na leđa → izvedite tehnički ustanak → ponovite. Brojite ukupna ponavljanja | Sposobnost scramblinga / MMA-specifična izdržljivost | 15+ (dobro), 20+ (odlično) |\n\n#### Tjelesni sastav\n\n| # | Test | Protokol | Šta mjeri | Cilj / Referentna vrijednost |\n|---|------|----------|-----------|------------------------------|\n| 12 | Tjelesna težina (Bodyweight) | Natašte, ujutro, nakon korištenja kupatila. Ista vaga svaki put | Tjelesna masa | Pratite promjenu, ne apsolutnu vrijednost |\n| 13 | Obim struka (Waist Circumference) | Mjerite na nivou pupka, opušteno (bez uvlačenja). Koristite platnenu mjernu traku | Procjena centralne tjelesne kompozicije | Pratite promjenu, ne apsolutnu vrijednost |\n\n---\n\n### Obrazac za bilježenje rezultata\n\n| # | Test | Rezultat Sedmica 0 | Ponovno testiranje Sedmica 5 | Promjena | Napomene |\n|---|------|---------------------|------------------------------|----------|----------|\n| 1 | Puls u mirovanju (bpm) | | | | Prosjek 3 dana |\n| 2 | 2 km veslanje/trčanje (vrijeme) | | | | Puls na kraju: ___ / Puls oporavka 1-min: ___ |\n| 3 | 5-min Assault Bike (kal) | | | | Prosj. puls: ___ |\n| 4 | Stražnji čučanj 3RM → Proc. 1RM | | | | 3RM težina: ___ |\n| 5 | Bench press 3RM → Proc. 1RM | | | | 3RM težina: ___ |\n| 6 | Mrtvo dizanje 3RM → Proc. 1RM | | | | 3RM težina: ___ |\n| 7 | Maks. striktni zgibovi | | | | |\n| 8 | Maks. sklekovi u 2 min | | | | |\n| 9 | Maks. držanje planka (vrijeme) | | | | Razlog zaustavljanja: ___ |\n| 10 | 3-min test sprawlova (ponavljanja) | | | | |\n| 11 | Prijelazi s poda u stajanje (ponavljanja) | | | | |\n| 12 | Tjelesna težina (kg/lb) | | | | Natašte, ujutro |\n| 13 | Obim struka (cm/in) | | | | Na pupku |\n\n---\n\n## Sedmica 5 — Protokol ponovnog testiranja\n\n### Zakazivanje\n\n- Ponovno testirajte u **subotu Sedmice 4** (sedmica rasterećenja).\n- Do ovog trenutka ćete imati 3–4 dana smanjenog obima treninga, tako da biste trebali biti dovoljno svježi za maksimalni napor.\n- Koristite **potpuno iste uslove** kao u Sedmici 0: isto doba dana, ista oprema, isto zagrijavanje, isti redoslijed testova, natašte ili hranjeni na isti način.\n\n### Postupak\n\n1. Izvedite isti protokol zagrijavanja kao u Sedmici 0.\n2. Provedite svih 13 testova istim redoslijedom.\n3. Zabilježite rezultate u kolonu \"Ponovno testiranje Sedmica 5\" u obrascu za bilježenje iznad.\n4. Izračunajte kolonu \"Promjena\" (apsolutna i procentualna).\n\n### Izračun 1RM — Epley formula\n\nKoristite istu formulu za Sedmicu 0 i Sedmicu 5 kako biste osigurali ravnopravno poređenje:\n\n```\nProcijenjeni 1RM = Težina × (1 + Ponavljanja ÷ 30)\n```\n\n**Primjeri:**\n- 3RM od 100 kg → 1RM = 100 × (1 + 3/30) = 100 × 1,10 = **110 kg**\n- 3RM od 80 kg → 1RM = 80 × (1 + 3/30) = 80 × 1,10 = **88 kg**\n\nNapomena: Epley formula je najtačnija za raspon ponavljanja od 1–10. Uvijek koristite 3RM radi dosljednosti.\n\n### Očekivana poboljšanja nakon 4 sedmice\n\nRealna poboljšanja za motiviranog vježbača koji dosljedno prati program:\n\n| Kategorija | Očekivana promjena | Napomene |\n|------------|-------------------|----------|\n| Puls u mirovanju | −2 do −5 bpm | Adaptacije aerobne baze zahtijevaju vrijeme; očekuje se skromna promjena |\n| 2 km veslanje/trčanje | −10 do −30 sek | Srčani minutni volumen i tempo se poboljšavaju |\n| 5-min Assault Bike | +3 do +8 kal | Poboljšanje anaerobnog praga |\n| Čučanj / Bench / Mrtvo dizanje 1RM | +3–8% | Neuromišićne adaptacije dominiraju u ranim sedmicama |\n| Maks. zgibovi | +1 do +4 ponavljanja | Napredak u snazi-izdržljivosti |\n| Sklekovi u 2 min | +5 do +10 ponavljanja | Mišićna izdržljivost se brzo adaptira |\n| Držanje planka | +15 do +30 sek | Izdržljivost jezgra dobro reaguje na dosljedno treniranje |\n| 3-min test sprawlova | +5 do +10 ponavljanja | Poboljšan anaerobni kapacitet + efikasnost pokreta |\n| Prijelazi s poda u stajanje | +3 do +5 ponavljanja | Bolja tehnika + kondicija |\n| Tjelesna težina | −1 do −3 kg (ako ste u deficitu) ili stabilna | Zavisi od nutritivnih ciljeva |\n| Obim struka | −1 do −3 cm | Rekompozicija tjelesnog sastava |\n\n### Tumačenje rezultata\n\n- **Značajno poboljšanje (> 10%):** Program dobro djeluje za ovaj kvalitet. Održavajte ili napredujte.\n- **Skromno poboljšanje (3–10%):** Normalno za 4 sedmice. Nastavite trenirati dosljedno.\n- **Bez promjene ili nazadovanje:** Provjerite oporavak, ishranu, san i stres. Razmotrite da li ovom području treba više volumena ili drugačiji stimulus u sljedećem bloku.\n- **Snaga gore + izdržljivost dolje (ili obrnuto):** Može ukazivati na efekat interferencije — pregledajte balans konkurentnog treninga.\n\n### Sljedeći koraci nakon ponovnog testiranja\n\n- Koristite rezultate Sedmice 5 kao novu početnu osnovu za sljedeći 4-sedmični blok.\n- Prilagodite opterećenja treninga: nove procjene 3RM trebaju informirati radne težine.\n- Identificirajte najslabija područja i razmotrite njihovo prioritiziranje u sljedećem mezociklusu.\n- Ako je ponovno testiranje propušteno, zakažite ga za prvi dan odmora sljedećeg bloka prije nego što se nastavi opterećenje.\n", "sources": "# Izvori i reference\n\nSvi izvori korišteni u razvoju ovog MMA programa treninga, organizovani po kategorijama.\n\n---\n\n## 1. Metodologije trenera i knjige\n\n1. **Joel Jamieson** — *Ultimate MMA Conditioning*, 2009. Web stranica: [8weeksout.com](https://www.8weeksout.com). Bioforce HRV sistem i pristup energetskim sistemima za MMA kondiciju. Intervjui i članci dostupni na 8weeksout.com/blog.\n\n2. **Phil Daru** — Trener snage i kondicije (bivši UFC Performance Institute, American Top Team). Web stranica: [darustrong.com](https://www.darustrong.com). Članci i programi o sportski specifičnom S&C za MMA borce.\n\n3. **Firas Zahabi** — Glavni trener, Tristar Gym. *JRE MMA Show #32* (Joe Rogan Experience), diskusija o filozofiji obima treninga naspram intenziteta. YouTube i podcast intervjui o periodizaciji za borce.\n\n4. **Pavel Tsatsouline** — *Power to the People!*, 1999. *Simple & Sinister*, 2013 (revidirano 2019). StrongFirst metodologija — trening snage s malim brojem ponavljanja i visokom frekvencijom. Web stranica: [strongfirst.com](https://www.strongfirst.com).\n\n5. **Alex Viada** — *The Hybrid Athlete*, 2015. Web stranica: [completehumanperformance.com](https://www.completehumanperformance.com). Metodologija konkurentnog treninga snage i izdržljivosti.\n\n6. **Mike Boyle** — *New Functional Training for Sports*, 2. izdanje, Human Kinetics, 2016. Članci o funkcionalnom treningu i unilateralnom radu. Web stranica: [bodybyboyle.com](https://www.bodybyboyle.com).\n\n7. **Cal Dietz** — *Triphasic Training: A Systematic Approach to Elite Speed and Explosive Strength Performance*, 2012. Web stranica: [triphasictraining.com](https://www.triphasictraining.com). Trening ekscentrične, izometrijske i koncentrične faze.\n\n8. **Loren Landow** — *Ultimate Conditioning for Martial Arts*, Human Kinetics, 2016. Protokoli brzine, agilnosti i kondicije specifični za borilačke sportove.\n\n9. **Eric Cressey** — *Simplified Shoulder Solutions* (video serija). Web stranica: [ericcressey.com](https://www.ericcressey.com). Zdravlje ramena, mobilnost i prevencija povreda za sportaše.\n\n10. **Joe DeFranco** — *Westside for Skinny Bastards III (WS4SB III)*. Web stranica: [defrancostraining.com](https://www.defrancostraining.com). Gornji/donji split s metodama maksimalnog napora i repetitivnog napora prilagođen za sportaše.\n\n---\n\n## 2. Naučni radovi — Ishrana\n\n1. **Reale R, Slater G, Cox GR, Dunican IC, Burke LM, et al.** — \"ISSN position stand: nutrition for combat sports.\" *Journal of the International Society of Sports Nutrition*, 2025. DOI: [10.1080/15502783.2025.2467909](https://doi.org/10.1080/15502783.2025.2467909)\n\n2. **Kasper AM, Cocking S, Cocber M, Sherwood M, et al.** — \"Carbohydrate and fluid manipulation in combat sports.\" *Nutrients*, 2021. PMC: [PMC8334642](https://www.ncbi.nlm.nih.gov/pmc/articles/PMC8334642/)\n\n---\n\n## 3. Naučni radovi — Trening i periodizacija\n\n1. **Wilson JM, Marin PJ, Rhea MR, Wilson SMC, Loenneke JP, Anderson JC.** — \"Concurrent training: a meta-analysis examining interference of aerobic and resistance exercises.\" *Journal of Strength and Conditioning Research*, 2012; 26(8): 2293–2307. PMID: [22002517](https://pubmed.ncbi.nlm.nih.gov/22002517/)\n\n2. **Fyfe JJ, Bishop DJ, Stepto NK.** — \"Interference between concurrent resistance and endurance exercise: molecular bases and the role of individual training variables.\" *Sports Medicine*, 2014; 44(6): 743–762. PMID: [24728927](https://pubmed.ncbi.nlm.nih.gov/24728927/)\n\n3. **Sabag A, Najafi A, Michael S, Esgin T, Halaki M, Hackett D.** — \"The compatibility of concurrent high-intensity interval training and resistance training for muscular strength and hypertrophy: a systematic review and meta-analysis.\" *Journal of Sports Sciences*, 2018; 36(21): 2472–2483. PMID: [29809072](https://pubmed.ncbi.nlm.nih.gov/29809072/)\n\n4. **Franchini E, Cormack S, Takito MY, Hasan AAA, Yuri DA, et al.** — \"Energy system contributions in combat sports: a systematic review.\" *International Journal of Environmental Research and Public Health*, 2023. PMC: [PMC9961508](https://www.ncbi.nlm.nih.gov/pmc/articles/PMC9961508/)\n\n5. **Tota Ł, Drwal T, Fischedick A, et al.** — \"Conditioning training and its effects on preparation of MMA athletes.\" *International Journal of Environmental Research and Public Health*, 2019; 16(9): 1495. PMC: [PMC6942465](https://www.ncbi.nlm.nih.gov/pmc/articles/PMC6942465/)\n\n6. **Kostikiadis IN, Methenitis S, Tsoukos A, Veligekas P, Terzis G, Bogdanis GC.** — \"The effect of short-term sport-specific strength and conditioning training on physical fitness of well-trained mixed martial arts athletes.\" *Journal of Sports Science and Medicine*, 2018; 17(3): 348–358. PMC: [PMC6090403](https://www.ncbi.nlm.nih.gov/pmc/articles/PMC6090403/)\n\n7. **Schoenfeld BJ.** — \"Periodization for MMA: bridging the gap between science and practice.\" Academia.edu. URL: [academia.edu](https://www.academia.edu) (pretraga: Schoenfeld periodization MMA)\n\n8. **James LP, Haff GG, Kelly VG, Beckman EM.** — \"Towards a determination of the physiological characteristics distinguishing successful mixed martial arts athletes: a systematic review of combat sport literature.\" *Sports Medicine*, ResearchGate. URL: [researchgate.net](https://www.researchgate.net) (pretraga: James strength conditioning MMA)\n\n---\n\n## 4. Naučni radovi — Oporavak\n\n1. **Dupuy O, Douzi W, Theurot D, Bosquet L, Dugué B.** — \"An evidence-based approach for choosing post-exercise recovery techniques to reduce markers of muscle damage, soreness, fatigue, and inflammation: a systematic review with meta-analysis.\" *Frontiers in Physiology*, 2020. PMID: [33092328](https://pubmed.ncbi.nlm.nih.gov/33092328/)\n\n2. **Souza DB, Delvaux F, Schwartz C, Croisier JL.** — \"Recovery methods used by combat sport athletes: a scoping review.\" *Sports Medicine - Open*, 2025. PMID: [40378882](https://pubmed.ncbi.nlm.nih.gov/40378882/)\n\n3. **Carvalho L, Freitas TT, Pereira LA, Nakamura FY, Loturco I.** — \"Fatigue markers and performance recovery in mixed martial arts athletes after competitive bouts.\" *Scientific Reports*, 2025. DOI: [10.1038/s41598-025-09719-z](https://doi.org/10.1038/s41598-025-09719-z)\n\n---\n\n## 5. Naučni radovi — Suplementacija\n\n1. **Kreider RB, Kalman DS, Antonio J, Ziegenfuss TN, Wildman R, et al.** — \"International Society of Sports Nutrition position stand: safety and efficacy of creatine supplementation in exercise, sport, and medicine.\" *Journal of the International Society of Sports Nutrition*, 2017; 14: 18. PMC: [PMC5469049](https://www.ncbi.nlm.nih.gov/pmc/articles/PMC5469049/)\n\n2. **Guest NS, VanDusseldorp TA, Nelson MT, Grgic J, Schoenfeld BJ, et al.** — \"International Society of Sports Nutrition position stand: caffeine and exercise performance.\" *Journal of the International Society of Sports Nutrition*, 2021; 18(1): 1. PMC: [PMC7777221](https://www.ncbi.nlm.nih.gov/pmc/articles/PMC7777221/)\n\n3. **Maughan RJ, Burke LM, Dvorak J, Larson-Meyer DE, Peeling P, et al.** — \"IOC consensus statement: dietary supplements and the high-performance athlete.\" *British Journal of Sports Medicine*, 2018; 52(7): 439–455. PMC: [PMC5867441](https://www.ncbi.nlm.nih.gov/pmc/articles/PMC5867441/)\n\n4. **Ashtary-Larky D, Asbaghi O, Moosavian SP, et al.** — \"Creatine supplementation in combat sports: a systematic review.\" *Journal of the International Society of Sports Nutrition*, 2025. PMID: [40755023](https://pubmed.ncbi.nlm.nih.gov/40755023/)\n\n5. **Li Z, Chen Y, Wang X, et al.** — \"Effects of dietary supplements on physical performance in combat athletes: a systematic review and meta-analysis of randomized controlled trials.\" *Scientific Reports*, 2024. DOI: [10.1038/s41598-024-84359-3](https://doi.org/10.1038/s41598-024-84359-3)\n\n---\n\n## 6. Naučni radovi — San i oporavak\n\n1. **Vitale KC, Owens R, Hopkins SR, Malhotra A.** — \"Sleep hygiene for optimizing recovery in athletes: review and recommendations.\" *International Journal of Sports Medicine*, 2019; 40(8): 535–543. PMC: [PMC6988893](https://www.ncbi.nlm.nih.gov/pmc/articles/PMC6988893/)\n\n2. **Bonnar D, Lee S, Roane BM, et al.** — \"Sleep and athletic performance: impacts on physical performance, mental health, injury risk, nutrition, and recovery.\" *Sleep Medicine Reviews*, 2023. PMC: [PMC9960533](https://www.ncbi.nlm.nih.gov/pmc/articles/PMC9960533/)\n\n3. **Mah CD, Mah KE, Kezirian EJ, Dement WC.** — \"The effects of sleep extension on the athletic performance of collegiate basketball players.\" *Sleep*, 2011; 34(7): 943–950. DOI: [10.5665/SLEEP.1132](https://doi.org/10.5665/SLEEP.1132)\n\n---\n\n## 7. Naučni radovi — Hidratacija\n\n1. **Sawka MN, Burke LM, Eichner ER, Maughan RJ, Montain SJ, Stachenfeld NS.** — \"American College of Sports Medicine position stand: exercise and fluid replacement.\" *Medicine & Science in Sports & Exercise*, 2007; 39(2): 377–390. DOI: [10.1249/mss.0b013e31802ca597](https://doi.org/10.1249/mss.0b013e31802ca597)\n\n---\n\n## 8. Naučni radovi — Vitamini i minerali\n\n1. **Chiang CM, Ismaeel A, Griffis RB, Weems S.** — \"Effects of vitamin D supplementation on muscle strength in athletes: a systematic review.\" *Journal of Strength and Conditioning Research*, 2023. PMC: [PMC10768611](https://www.ncbi.nlm.nih.gov/pmc/articles/PMC10768611/)\n\n2. **Heffernan SM, Horner K, et al.** — \"The role of vitamin D and magnesium in athletic performance and recovery.\" *Nutrients*, 2025; 17(10): 1655. DOI: [10.3390/nu17101655](https://doi.org/10.3390/nu17101655)\n\n---\n\n## 9. Organizacije\n\n1. **UFC Performance Institute (UFCPI)** — Web stranica: [ufcpi.com](https://www.ufcpi.com). Faze treninga i grafikon periodizacije za MMA sportaše. *UFC Performance Institute's Training & Nutrition Guide*, 2018 (javno dostupan PDF). Istraživanja sportske nauke o profiliranju MMA sportaša, tjelesnom sastavu i referentnim vrijednostima performansi.\n"};

var SECTIONS = ['overview','schedule','week-1','week-2','week-3','week-4','exercises','warmups','nutrition','testing','sources'];

      { id: 'overview', icon: '\u25C6', text: 'Overview' },
      { id: 'schedule', icon: '\uD83D\uDCC6', text: 'Schedule' }
    ]},
    { label: 'Weekly Plans', items: [
      { id: 'week-1', icon: '01', text: 'Week 1 \u2014 Foundation' },
      { id: 'week-2', icon: '02', text: 'Week 2 \u2014 Build' },
      { id: 'week-3', icon: '03', text: 'Week 3 \u2014 Intensify' },
      { id: 'week-4', icon: '04', text: 'Week 4 \u2014 Peak & Test' }
    ]},
    { label: 'Reference', items: [
      { id: 'exercises', icon: '\u269B', text: 'Exercise Library' },

    ]}

var NAV_BOS = {
  groups: [
    { label: 'Program', items: [
      { id: 'overview', icon: '\u25C6', text: 'Pregled' },
      { id: 'schedule', icon: '\uD83D\uDCC6', text: 'Raspored' }
    ]},
    { label: 'Sedmi\u010Dni planovi', items: [
      { id: 'week-1', icon: '01', text: 'Sedmica 1 \u2014 Temelj' },
      { id: 'week-2', icon: '02', text: 'Sedmica 2 \u2014 Gradnja' },
      { id: 'week-3', icon: '03', text: 'Sedmica 3 \u2014 Intenzitet' },
      { id: 'week-4', icon: '04', text: 'Sedmica 4 \u2014 Vrh & Test' }
    ]},
    { label: 'Referenca', items: [
      { id: 'exercises', icon: '\u269B', text: 'Biblioteka vje\u017Ebi' },
      { id: 'warmups', icon: '\u262F', text: 'Zagrijavanje' },
      { id: 'nutrition', icon: '\u2605', text: 'Ishrana' },

    ]}
  ],

var currentLang = 'en';
var cache = { en: {}, bos: {} };
var markedLoaded = false;

// ── Load marked.js from CDN ──
var s = document.createElement('script');
s.src = 'https://cdn.jsdelivr.net/npm/marked@15/marked.min.js';
s.onload = function() {
  markedLoaded = true;
  marked.setOptions({ breaks: false, gfm: true });
  cache = { en: {}, bos: {} };
  renderCurrent();
};
document.head.appendChild(s);

// ── Markdown rendering ──
function renderMd(src) {
  if (markedLoaded && typeof marked !== 'undefined') {
    return marked.parse(src);
  }
  return '<pre style="white-space:pre-wrap;font-family:inherit;color:var(--text)">' +
    src.replace(/&/g,'&amp;').replace(/</g,'&lt;') + '</pre>';
}

function wrapTables(html) {
  return html.replace(/<table/g, '<div class="table-wrap"><table')
             .replace(/<\/table>/g, '</table></div>');
}

function getContent() {
  return currentLang === 'bos' ? CONTENT_BOS : CONTENT_EN;
}

function getSection(id) {
  var langCache = cache[currentLang];
  if (!langCache[id]) {
    var raw = getContent()[id];
    if (!raw) return '<p style="color:var(--text-dim)">' +
      (currentLang === 'bos' ? 'Sekcija nije prona\u0111ena.' : 'Section not found.') + '</p>';
    langCache[id] = wrapTables(renderMd(raw));
  }
  return langCache[id];
}

// ── Nav rendering ──
function renderNav() {
  var navData = currentLang === 'bos' ? NAV_BOS : NAV_EN;
  var nav = document.getElementById('nav');
  var html = '';
  navData.groups.forEach(function(g) {
    html += '<div class="nav-divider">' + g.label + '</div>';
    g.items.forEach(function(item) {
      html += '<a href="#' + item.id + '"><span class="nav-icon">' + item.icon + '</span>' + item.text + '</a>';
    });
  });
  nav.innerHTML = html;

  nav.querySelectorAll('a').forEach(function(a) {
    a.addEventListener('click', function() {
      closeMenu();
      setTimeout(renderCurrent, 20);
    });
  });

  document.getElementById('brand-text').childNodes[0].textContent = navData.logo + '\n';
  document.getElementById('brand-subtitle').textContent = navData.subtitle;
  document.getElementById('dl-text').textContent = currentLang === 'bos' ? 'Preuzmi Excel Tracker' : 'Download Excel Tracker';
}

// ── Language switch ──
function setLang(lang) {
  currentLang = lang;
  document.getElementById('btn-en').classList.toggle('active', lang === 'en');
  document.getElementById('btn-bos').classList.toggle('active', lang === 'bos');
  document.getElementById('lang-toggle').classList.toggle('bos', lang === 'bos');
  document.documentElement.lang = lang === 'bos' ? 'bs' : 'en';
  try { localStorage.setItem('mma-lang', lang); } catch(e) {}
  renderNav();
  renderCurrent();
}

// ── Routing ──
function renderCurrent() {
  var hash = location.hash.slice(1) || 'overview';
  var id = SECTIONS.indexOf(hash) !== -1 ? hash : 'overview';
  var page = document.getElementById('page');
  page.innerHTML = getSection(id);
  page.style.animation = 'none';
  void page.offsetHeight;
  page.style.animation = '';
  updateNav(id);
  window.scrollTo({ top: 0 });
}

function updateNav(id) {
  document.querySelectorAll('#nav a').forEach(function(a) {
    a.classList.toggle('active', a.getAttribute('href') === '#' + id);
  });
}

// ── Mobile menu ──
var hamburger = document.getElementById('hamburger');
var sidebar = document.getElementById('sidebar');
var overlay = document.getElementById('overlay');

function toggleMenu() {
  var open = sidebar.classList.toggle('open');
  overlay.classList.toggle('open', open);
  hamburger.classList.toggle('active', open);
}
function closeMenu() {
  sidebar.classList.remove('open');
  overlay.classList.remove('open');
  hamburger.classList.remove('active');
}
hamburger.addEventListener('click', toggleMenu);
overlay.addEventListener('click', closeMenu);

// ── Back to top ──
var backtop = document.getElementById('backtop');
window.addEventListener('scroll', function() {
  backtop.classList.toggle('visible', window.scrollY > 400);
});
backtop.addEventListener('click', function() {
  window.scrollTo({ top: 0, behavior: 'smooth' });
});

// ── Init ──
var savedLang = 'bos';
try { savedLang = localStorage.getItem('mma-lang') || 'bos'; } catch(e) {}
setLang(savedLang === 'en' ? 'en' : 'bos');
window.addEventListener('hashchange', renderCurrent);
</script>
