<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#08080c;
  --bg-card:#0f0f14;
  --bg-card-hover:#141419;
  --bg-raised:#18181f;
  --bg-surface:#1c1c24;
  --border:#1a1a22;
  --border-bright:#28283a;
  --text:#c8c8d0;
  --text-bright:#ededf0;
  --text-dim:#62627a;
  --text-faint:#3e3e52;
  --accent:#f97316;
  --accent-soft:rgba(249,115,22,.08);
  --accent-med:rgba(249,115,22,.15);
  --accent-glow:rgba(249,115,22,.3);
  --accent-bright:#fba04b;
  --green:#22c55e;
  --blue:#3b82f6;
  --purple:#a855f7;
  --red:#ef4444;
  --sidebar-w:272px;
  --radius:10px;
  --radius-lg:14px;
  --font-display:'Anybody',system-ui,sans-serif;
  --font-body:'DM Sans',system-ui,-apple-system,sans-serif;
  --font-mono:'JetBrains Mono',monospace;
}
html{scroll-behavior:smooth;scrollbar-color:var(--border) var(--bg)}
body{
  font-family:var(--font-body);font-size:15px;line-height:1.75;
  color:var(--text);background:var(--bg);
  min-height:100vh;overflow-x:hidden;
  -webkit-font-smoothing:antialiased;
}

/* ═══════════════════════════════════
   NOISE TEXTURE OVERLAY
   ═══════════════════════════════════ */
body::after{
  content:'';position:fixed;inset:0;z-index:9999;pointer-events:none;
  opacity:.025;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
  background-repeat:repeat;background-size:256px 256px;
}

/* ═══════════════════════════════════
   SIDEBAR
   ═══════════════════════════════════ */
.sidebar{
  position:fixed;top:0;left:0;bottom:0;width:var(--sidebar-w);
  background:linear-gradient(180deg,#0c0c12 0%,var(--bg) 100%);
  border-right:1px solid var(--border);
  display:flex;flex-direction:column;z-index:100;
  transition:transform .35s cubic-bezier(.4,0,.2,1);
}
.sidebar-header{
  padding:24px 22px 18px;
  border-bottom:1px solid var(--border);
  position:relative;
}
.sidebar-header::after{
  content:'';position:absolute;bottom:-1px;left:22px;width:60px;
  height:2px;background:var(--accent);border-radius:1px;
}
.sidebar-brand{
  display:flex;align-items:center;gap:10px;margin-bottom:14px;
}
.brand-mark{
  width:36px;height:36px;border-radius:10px;
  background:linear-gradient(135deg,var(--accent),#e05a00);
  display:flex;align-items:center;justify-content:center;
  font-size:16px;flex-shrink:0;
  box-shadow:0 2px 12px var(--accent-glow);
}
.brand-text{
  font-family:var(--font-display);font-size:13px;font-weight:900;
  letter-spacing:.05em;text-transform:uppercase;color:var(--text-bright);
  line-height:1.2;
}
.brand-text span{
  color:var(--text-dim);display:block;font-size:9.5px;
  letter-spacing:.12em;margin-top:2px;font-weight:600;
  font-family:var(--font-body);
}

/* ── Download Button ── */
.dl-btn{
  display:flex;align-items:center;gap:8px;
  margin-top:12px;padding:9px 14px;
  background:linear-gradient(135deg,var(--bg-raised),var(--bg-surface));
  border:1px solid var(--border);border-radius:8px;
  color:var(--text-dim);font-family:var(--font-body);font-size:11.5px;font-weight:600;
  text-decoration:none;transition:all .2s;letter-spacing:.02em;
  cursor:pointer;width:100%;
}
.dl-btn:hover{color:var(--text-bright);border-color:var(--accent);background:var(--accent-soft)}
.dl-btn svg{width:16px;height:16px;flex-shrink:0;opacity:.6}
.dl-btn:hover svg{opacity:1}

/* ── Language Toggle ── */
.lang-toggle{
  display:flex;
  background:var(--bg);border-radius:8px;
  border:1px solid var(--border);overflow:hidden;
  position:relative;
}
.lang-toggle::before{
  content:'';position:absolute;top:2px;bottom:2px;width:calc(50% - 2px);
  background:var(--accent);border-radius:6px;
  transition:transform .25s cubic-bezier(.4,0,.2,1);
  left:2px;z-index:0;
}
.lang-toggle.bos::before{transform:translateX(100%)}
.lang-btn{
  flex:1;padding:6px 0;border:none;background:none;
  color:var(--text-dim);font-family:var(--font-body);
  font-size:11px;font-weight:700;letter-spacing:.08em;
  cursor:pointer;transition:color .25s;text-transform:uppercase;
  position:relative;z-index:1;
}
.lang-btn.active{color:#000}
.lang-btn:not(.active):hover{color:var(--text-bright)}

.sidebar-nav{flex:1;overflow-y:auto;padding:14px 10px;scrollbar-width:thin}
.sidebar-nav a{
  display:flex;align-items:center;gap:11px;
  padding:9px 14px;border-radius:9px;
  color:var(--text-dim);text-decoration:none;font-size:13px;font-weight:500;
  transition:all .15s ease;margin-bottom:1px;position:relative;
  letter-spacing:.01em;
}
.sidebar-nav a:hover{color:var(--text-bright);background:rgba(255,255,255,.03)}
.sidebar-nav a.active{
  color:var(--accent);background:var(--accent-soft);
  font-weight:600;
}
.sidebar-nav a.active::before{
  content:'';position:absolute;left:0;top:8px;bottom:8px;width:3px;
  background:var(--accent);border-radius:0 3px 3px 0;
  box-shadow:0 0 10px var(--accent-glow);
}
.nav-icon{
  width:26px;height:22px;display:flex;align-items:center;justify-content:center;
  font-size:12px;flex-shrink:0;opacity:.5;
  font-family:var(--font-mono);font-weight:500;
}
.sidebar-nav a.active .nav-icon{opacity:1}
.nav-divider{
  font-size:9px;text-transform:uppercase;letter-spacing:.16em;
  color:var(--text-faint);padding:18px 14px 6px;font-weight:700;
  user-select:none;
}
.nav-divider:first-child{padding-top:4px}

/* ── Expandable Nav Sub-Items ── */
.nav-parent{position:relative}
.nav-parent>.nav-expand{
  position:absolute;right:8px;top:50%;transform:translateY(-50%);
  width:22px;height:22px;border:none;background:none;
  color:var(--text-faint);cursor:pointer;font-size:10px;
  display:flex;align-items:center;justify-content:center;
  border-radius:4px;transition:all .15s;
}
.nav-parent>.nav-expand:hover{color:var(--text);background:rgba(255,255,255,.05)}
.nav-parent>.nav-expand.open{transform:translateY(-50%) rotate(90deg)}
.nav-sub{
  display:none;overflow:hidden;
  padding-left:14px;margin-bottom:2px;
}
.nav-sub.open{display:block}
.nav-sub a{
  font-size:11.5px !important;padding:5px 10px 5px 22px !important;
  color:var(--text-faint) !important;opacity:.85;
}
.nav-sub a:hover{color:var(--text) !important;opacity:1}
.nav-sub a.active{color:var(--accent) !important;opacity:1}
.nav-day-row{
  display:flex;gap:2px;padding:2px 10px 4px 22px;flex-wrap:wrap;
}
.nav-day-btn{
  padding:3px 7px;border-radius:4px;border:1px solid var(--border);
  background:none;color:var(--text-faint);font-size:9px;font-weight:600;
  cursor:pointer;transition:all .15s;font-family:var(--font-body);
  letter-spacing:.04em;text-transform:uppercase;
}
.nav-day-btn:hover{border-color:var(--accent);color:var(--accent)}
.nav-day-btn.active{background:var(--accent);color:#000;border-color:var(--accent)}

/* ── Clickable Exercise Links ── */
.exercise-link{
  color:var(--accent);cursor:pointer;
  text-decoration:underline;text-decoration-style:dotted;
  text-underline-offset:2px;transition:all .15s;
}
.exercise-link:hover{color:var(--accent-bright);text-decoration-style:solid}

/* ── Exercise Illustrations ── */
.exercise-svg-wrap{
  display:flex;justify-content:center;gap:16px;
  padding:16px 0 8px;margin-bottom:12px;
  border-bottom:1px solid var(--border);
}
.exercise-svg-wrap svg{
  width:120px;height:140px;flex-shrink:0;
}
.exercise-svg-label{
  font-size:10px;text-align:center;color:var(--text-dim);
  margin-top:2px;letter-spacing:.04em;text-transform:uppercase;
  font-family:var(--font-mono);
}
@media(max-width:600px){
  .exercise-svg-wrap svg{width:90px;height:110px}
}

/* ── Collapsible Sections ── */
.collapsible{
  border:1px solid var(--border);border-radius:var(--radius);
  margin:8px 0;overflow:hidden;
  background:var(--bg-card);
}
.collapsible+.collapsible{margin-top:4px}
.collapsible-header{
  display:flex;align-items:center;gap:10px;
  padding:12px 16px;cursor:pointer;
  background:linear-gradient(135deg,var(--bg-card) 0%,var(--bg-raised) 100%);
  border:none;width:100%;text-align:left;
  color:var(--text-bright);font-family:var(--font-body);
  transition:all .15s;user-select:none;
}
.collapsible-header:hover{background:var(--bg-raised)}
.collapsible-header.open{border-bottom:1px solid var(--border)}
.collapsible-arrow{
  font-size:10px;color:var(--accent);transition:transform .2s;
  flex-shrink:0;width:16px;text-align:center;
}
.collapsible-header.open .collapsible-arrow{transform:rotate(90deg)}
.collapsible-title{flex:1;font-weight:600;font-size:14px}
.collapsible-tag{
  font-size:9px;font-weight:700;padding:2px 8px;
  border-radius:4px;text-transform:uppercase;letter-spacing:.08em;
  flex-shrink:0;
}
.collapsible-tag.am{background:rgba(59,130,246,.15);color:var(--blue)}
.collapsible-tag.pm{background:rgba(168,85,247,.15);color:var(--purple)}
.collapsible-tag.rest{background:rgba(34,197,94,.15);color:var(--green)}
.collapsible-tag.week{background:var(--accent-soft);color:var(--accent)}
.collapsible-tag.day{background:rgba(255,255,255,.05);color:var(--text-dim)}
.collapsible-body{
  padding:16px;display:none;
}
.collapsible-body.open{display:block}
/* Nested collapsibles */
.collapsible .collapsible{
  margin:4px 0;border-color:var(--border);
  background:var(--bg);
}
.collapsible .collapsible .collapsible-header{
  padding:9px 14px;
}
.collapsible .collapsible .collapsible-title{font-size:13px}
/* Phase / week level styling */
.collapsible-level-week>.collapsible-header{
  border-left:3px solid var(--accent);
}
.collapsible-level-day>.collapsible-header{
  border-left:3px solid var(--blue);
  padding:8px 14px;
}
.collapsible-level-session>.collapsible-header{
  border-left:3px solid var(--purple);
  padding:7px 12px;
}
.collapsible-level-session .collapsible-title{font-size:12px}

/* ═══════════════════════════════════
   MAIN AREA
   ═══════════════════════════════════ */
.main{margin-left:var(--sidebar-w);min-height:100vh;position:relative}
.main::before{
  content:'';position:fixed;top:-200px;right:-200px;
  width:700px;height:700px;
  background:radial-gradient(circle,rgba(249,115,22,.04) 0%,transparent 60%);
  pointer-events:none;z-index:0;
}
.main::after{
  content:'';position:fixed;bottom:-300px;left:30%;
  width:600px;height:600px;
  background:radial-gradient(circle,rgba(59,130,246,.02) 0%,transparent 60%);
  pointer-events:none;z-index:0;
}
.content{
  max-width:820px;margin:0 auto;padding:48px 44px 100px;
  position:relative;z-index:1;
}

/* ═══════════════════════════════════
   HAMBURGER & OVERLAY (MOBILE)
   ═══════════════════════════════════ */
.hamburger{
  display:none;position:fixed;top:12px;left:12px;z-index:200;
  width:44px;height:44px;border-radius:var(--radius);
  background:rgba(15,15,20,.85);border:1px solid var(--border);
  cursor:pointer;flex-direction:column;align-items:center;justify-content:center;gap:5px;
  backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
  transition:all .2s;
}
.hamburger:hover{background:var(--bg-raised);border-color:var(--border-bright)}
.hamburger span{
  display:block;width:18px;height:1.5px;background:var(--text);
  border-radius:1px;transition:all .3s cubic-bezier(.4,0,.2,1);
}
.hamburger.active span:nth-child(1){transform:rotate(45deg) translate(4.5px,4.5px)}
.hamburger.active span:nth-child(2){opacity:0;transform:scaleX(0)}
.hamburger.active span:nth-child(3){transform:rotate(-45deg) translate(4.5px,-4.5px)}
.overlay{
  display:none;position:fixed;inset:0;
  background:rgba(0,0,0,.65);z-index:90;
  backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
}

/* ═══════════════════════════════════
   MARKDOWN RENDERED CONTENT
   ═══════════════════════════════════ */

/* ── H1 — Page title ── */
.md h1{
  font-family:var(--font-display);font-size:36px;font-weight:900;
  color:var(--text-bright);margin:0 0 6px;line-height:1.1;
  letter-spacing:-.02em;
}
.md h1::after{
  content:'';display:block;width:44px;height:3px;
  background:var(--accent);
  border-radius:2px;margin-top:18px;margin-bottom:12px;
}

/* ── H2 — Major sections ── */
.md h2{
  font-family:var(--font-display);font-size:21px;font-weight:700;
  color:var(--text-bright);margin:48px 0 16px;line-height:1.2;
  letter-spacing:0;
  padding:14px 18px;
  background:linear-gradient(135deg,var(--bg-card) 0%,var(--bg-raised) 100%);
  border:1px solid var(--border);
  border-left:3px solid var(--accent);
  border-radius:var(--radius);
}

/* ── H3 — Sub-sections ── */
.md h3{
  font-size:16.5px;font-weight:600;color:var(--text-bright);
  margin:36px 0 10px;letter-spacing:.01em;
  padding-bottom:8px;
  border-bottom:1px solid var(--border);
}

/* ── H4 — Labels ── */
.md h4{
  font-size:12px;font-weight:700;color:var(--accent);
  margin:28px 0 8px;text-transform:uppercase;letter-spacing:.08em;
  display:flex;align-items:center;gap:8px;
}
.md h4::before{
  content:'';width:8px;height:8px;border-radius:2px;
  background:var(--accent);opacity:.4;flex-shrink:0;
}

.md p{margin:0 0 16px}
.md a{color:var(--accent);text-decoration:none;transition:all .2s;
  background:linear-gradient(transparent 85%,var(--accent-soft) 85%);
}
.md a:hover{color:var(--accent-bright);background:linear-gradient(transparent 85%,var(--accent-med) 85%)}
.md strong{color:var(--text-bright);font-weight:600}
.md em{color:var(--text-dim)}
.md ul,.md ol{margin:0 0 18px;padding-left:22px}
.md li{margin-bottom:5px}
.md li::marker{color:var(--accent)}
.md hr{border:none;height:1px;background:var(--border);margin:36px 0}

/* ── Blockquotes — used for week metadata ── */
.md blockquote{
  margin:20px 0;padding:18px 22px;
  background:linear-gradient(135deg,var(--accent-soft),rgba(249,115,22,.03));
  border:1px solid rgba(249,115,22,.12);
  border-radius:var(--radius-lg);
  color:var(--text);font-style:normal;
  position:relative;overflow:hidden;
}
.md blockquote::before{
  content:'';position:absolute;top:0;left:0;bottom:0;width:3px;
  background:var(--accent);
}
.md blockquote p{margin-bottom:4px}
.md blockquote p:last-child{margin-bottom:0}

/* ── Tables ── */
.table-wrap{
  overflow-x:auto;margin:20px 0 28px;
  border-radius:var(--radius-lg);
  border:1px solid var(--border);
  background:var(--bg-card);
  box-shadow:0 4px 24px rgba(0,0,0,.25),0 1px 3px rgba(0,0,0,.15);
}
.md table{width:100%;border-collapse:collapse;font-size:13.5px}
.md thead{background:var(--bg-surface)}
.md th{
  text-align:left;padding:12px 16px;font-weight:600;color:var(--text-bright);
  border-bottom:2px solid var(--border-bright);font-size:10.5px;
  text-transform:uppercase;letter-spacing:.1em;
  white-space:nowrap;font-family:var(--font-body);
}
.md td{padding:11px 16px;border-bottom:1px solid var(--border)}
.md tr:last-child td{border-bottom:none}
.md tbody tr{transition:background .15s}
.md tbody tr:nth-child(even){background:rgba(255,255,255,.01)}
.md tbody tr:hover{background:rgba(249,115,22,.04)}

/* ── Code ── */
.md code{
  background:var(--bg-raised);border:1px solid var(--border);
  border-radius:5px;padding:2px 7px;font-size:12.5px;color:var(--accent);
  font-family:var(--font-mono);
}
.md pre{
  background:var(--bg-card);border:1px solid var(--border);
  border-radius:var(--radius);padding:18px 20px;margin:18px 0;
  overflow-x:auto;box-shadow:0 2px 8px rgba(0,0,0,.15);
}
.md pre code{background:none;border:none;padding:0;color:var(--text)}

/* ── Lists inside tables ── */
.md td ul,.md td ol{margin:4px 0;padding-left:16px}
.md td li{margin-bottom:2px;font-size:13px}

/* ═══════════════════════════════════
   SECTION TRANSITION
   ═══════════════════════════════════ */
.md{animation:sectionIn .5s cubic-bezier(.16,1,.3,1)}
@keyframes sectionIn{
  from{opacity:0;transform:translateY(20px)}
  to{opacity:1;transform:none}
}

/* ═══════════════════════════════════
   BACK TO TOP
   ═══════════════════════════════════ */
.back-top{
  position:fixed;bottom:28px;right:28px;width:44px;height:44px;
  border-radius:12px;background:var(--accent);color:#000;
  border:none;cursor:pointer;font-size:18px;font-weight:700;
  opacity:0;transform:translateY(10px);
  transition:all .35s cubic-bezier(.4,0,.2,1);
  z-index:50;display:flex;align-items:center;justify-content:center;
  box-shadow:0 4px 24px var(--accent-glow);
}
.back-top.visible{opacity:1;transform:none}
.back-top:hover{transform:scale(1.08) translateY(-2px);box-shadow:0 8px 32px var(--accent-glow)}

/* ═══════════════════════════════════
   RESPONSIVE — TABLET
   ═══════════════════════════════════ */
@media(max-width:1024px){
  :root{--sidebar-w:248px}
  .content{padding:40px 28px 80px}
}

/* ═══════════════════════════════════
   RESPONSIVE — MOBILE
   ═══════════════════════════════════ */
@media(max-width:768px){
  .sidebar{transform:translateX(-100%);width:280px}
  .sidebar.open{transform:translateX(0);box-shadow:12px 0 48px rgba(0,0,0,.6)}
  .hamburger{display:flex}
  .overlay.open{display:block}
  .main{margin-left:0}
  .content{padding:16px 14px 60px;padding-top:70px}
  .md h1{font-size:26px}
  .md h2{font-size:18px;margin-top:32px;padding:12px 14px}
  .md h3{font-size:15px;margin-top:24px}
  .table-wrap{margin-left:-6px;margin-right:-6px;border-radius:10px}
  .md th{padding:10px 12px;font-size:9.5px}
  .md td{padding:9px 12px;font-size:13px}
  .back-top{bottom:16px;right:16px;width:40px;height:40px;font-size:16px;border-radius:10px}
  .md blockquote{padding:14px 16px}
}

/* ═══════════════════════════════════
   RESPONSIVE — SMALL PHONES
   ═══════════════════════════════════ */
@media(max-width:400px){
  .content{padding:12px 10px 50px;padding-top:66px}
  .md h1{font-size:22px}
  .md h2{font-size:16px;padding:10px 12px}
  .md table{font-size:11.5px}
  .md th{padding:8px 8px;font-size:9px}
  .md td{padding:7px 8px;font-size:12px}
}

/* ═══════════════════════════════════
   RESPONSIVE — TABLE CARDS
   ═══════════════════════════════════ */
@media(max-width:600px){
  .table-wrap{border:none;background:none;box-shadow:none;border-radius:0;overflow:visible}
  .md table,.md thead,.md tbody,.md th,.md tr{display:block}
  .md thead{position:absolute;left:-9999px;top:-9999px}
  .md tr{
    margin-bottom:12px;padding:14px 16px;
    background:var(--bg-card);border:1px solid var(--border);
    border-radius:var(--radius);
    box-shadow:0 2px 8px rgba(0,0,0,.15);
  }
  .md td{
    display:flex;justify-content:space-between;align-items:flex-start;
    padding:6px 0;border-bottom:1px solid var(--border);
    font-size:13px;text-align:right;
  }
  .md td:last-child{border-bottom:none}
  .md td::before{
    content:attr(data-label);
    font-weight:600;color:var(--text-bright);text-align:left;
    margin-right:12px;flex-shrink:0;font-size:10.5px;
    text-transform:uppercase;letter-spacing:.08em;
    padding-top:2px;
  }
}

/* Scrollbar */
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--border-bright)}

/* ── Selection ── */
::selection{background:var(--accent-med);color:var(--text-bright)}

/* ── Progress Badge ── */
.progress-badge{
  margin-top:10px;padding:6px 12px;
  background:var(--accent-soft);border:1px solid rgba(249,115,22,.15);
  border-radius:6px;font-size:11px;font-weight:600;
  color:var(--accent);letter-spacing:.02em;
  display:none;text-align:center;
}
.progress-badge.visible{display:block}

/* ── Rest Timer ── */
/* ── Fight Camp Dashboard Widgets ── */
.fc-countdown{
  display:grid;grid-template-columns:repeat(4,1fr);
  gap:12px;margin:16px 0;
}
.fc-countdown-unit{
  text-align:center;padding:20px 12px;
  background:var(--bg-card);border:1px solid var(--border);
  border-radius:var(--radius-lg);
}
.fc-countdown-num{
  font-family:var(--font-mono);font-size:36px;font-weight:700;
  color:var(--accent);line-height:1;
}
.fc-countdown-label{
  font-size:10px;text-transform:uppercase;letter-spacing:.12em;
  color:var(--text-dim);margin-top:6px;
}
.fc-weight{margin:16px 0}
.fc-weight-bar-track{
  height:32px;background:var(--bg-card);border:1px solid var(--border);
  border-radius:16px;position:relative;overflow:hidden;
}
.fc-weight-bar-fill{
  height:100%;background:linear-gradient(90deg,var(--accent),var(--green));
  border-radius:16px;transition:width .5s ease;
}
.fc-weight-labels{
  display:flex;justify-content:space-between;margin-top:8px;
  font-family:var(--font-mono);font-size:13px;
}
.fc-weight-current{color:var(--accent);font-weight:700}
.fc-weight-input{
  display:flex;align-items:center;gap:10px;margin-top:12px;
}
.fc-weight-input input{
  width:100px;padding:8px 12px;background:var(--bg-card);
  border:1px solid var(--border);border-radius:8px;
  color:var(--text-bright);font-family:var(--font-mono);font-size:14px;
}
.fc-weight-input button{
  padding:8px 16px;background:var(--accent);color:#000;
  border:none;border-radius:8px;font-weight:600;cursor:pointer;
  font-family:var(--font-body);
}
.fc-phase-cards{
  display:grid;grid-template-columns:repeat(4,1fr);
  gap:10px;margin:16px 0;
}
.fc-phase-card{
  padding:14px 12px;background:var(--bg-card);
  border:1px solid var(--border);border-radius:var(--radius);
  text-align:center;opacity:.5;transition:all .3s;
}
.fc-phase-card.active{
  opacity:1;border-color:var(--accent);background:var(--accent-soft);
  box-shadow:0 0 20px var(--accent-glow);
}
.fc-phase-card.completed{opacity:.7;border-color:var(--green)}
.fc-phase-card-name{font-weight:600;font-size:12px;color:var(--text-bright)}
.fc-phase-card-dates{font-size:10px;color:var(--text-dim);margin-top:4px}
.fc-today{
  padding:18px 22px;background:var(--bg-card);
  border:1px solid var(--border);border-left:3px solid var(--accent);
  border-radius:var(--radius-lg);margin:16px 0;
}
.fc-today-day{
  font-family:var(--font-display);font-size:16px;
  font-weight:700;color:var(--text-bright);
}
.fc-today-sessions{margin-top:8px;font-size:13px}
.sidebar-nav a.nav-phase-current{border-right:2px solid var(--green)}
@media(max-width:600px){
  .fc-countdown{grid-template-columns:repeat(2,1fr)}
  .fc-phase-cards{grid-template-columns:repeat(2,1fr)}
  .fc-countdown-num{font-size:28px}
}

.rest-timer{
  position:fixed;bottom:28px;left:28px;z-index:50;
}
.timer-toggle{
  width:44px;height:44px;border-radius:12px;
  background:var(--bg-raised);border:1px solid var(--border);
  color:var(--text);font-size:18px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:all .2s;
}
.timer-toggle:hover{border-color:var(--accent);color:var(--accent)}
.timer-toggle.active{background:var(--accent);color:#000;border-color:var(--accent)}
.timer-panel{
  display:none;position:absolute;bottom:54px;left:0;
  background:var(--bg-raised);border:1px solid var(--border-bright);
  border-radius:var(--radius-lg);padding:16px;min-width:200px;
  box-shadow:0 8px 32px rgba(0,0,0,.4);
}
.timer-panel.open{display:block}
.timer-display{
  font-family:var(--font-mono);font-size:36px;font-weight:700;
  color:var(--text-bright);text-align:center;margin-bottom:12px;
  letter-spacing:.05em;
}
.timer-display.warning{color:var(--accent)}
.timer-display.done{color:var(--green);animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
.timer-presets{display:flex;gap:6px;flex-wrap:wrap;justify-content:center;margin-bottom:10px}
.timer-presets button{
  padding:6px 12px;border-radius:6px;border:1px solid var(--border);
  background:var(--bg-card);color:var(--text);font-family:var(--font-mono);
  font-size:12px;cursor:pointer;transition:all .15s;
}
.timer-presets button:hover{border-color:var(--accent);color:var(--accent)}
.timer-stop{
  display:block;width:100%;padding:8px;margin-top:4px;
  border-radius:6px;border:1px solid var(--red);
  background:rgba(239,68,68,.1);color:var(--red);
  font-family:var(--font-body);font-size:12px;font-weight:600;
  cursor:pointer;transition:all .15s;
}
.timer-stop:hover{background:rgba(239,68,68,.2)}
@media(max-width:768px){
  .rest-timer{bottom:16px;left:16px}
}

/* ═══════════════════════════════════
   PRINT LAYOUT
   ═══════════════════════════════════ */
@media print{
  body{background:#fff;color:#000;font-size:12pt}
  body::after{display:none}
  .sidebar,.hamburger,.overlay,.back-top,.lang-toggle,.dl-btn,.progress-badge,.fc-countdown,.fc-weight,.fc-phase-cards,.fc-today{display:none !important}
  .main{margin-left:0}
  .main::before,.main::after{display:none}
  .content{max-width:100%;padding:0}
  .md h1{color:#000;font-size:24pt}
  .md h1::after{background:#000}
  .md h2{color:#000;background:none;border:none;border-left:3px solid #000;font-size:16pt;padding:8px 12px}
  .md h3{color:#000;border-bottom-color:#ccc}
  .md h4{color:#333}
  .md h4::before{background:#333}
  .md a{color:#000;text-decoration:underline;background:none}
  .md blockquote{border-color:#000;background:#f5f5f5}
  .md blockquote::before{background:#000}
  .table-wrap{box-shadow:none;border:1px solid #ccc}
  .md th{color:#000;border-bottom-color:#999}

var CONTENT_EN = {"dashboard": "# Fight Camp Dashboard\n\n> **Fighter:** Anes Kurtovic | **Weight Class:** 77 kg | **Fight Date:** May 16, 2026\n> **Camp Start:** March 16, 2026 | **Duration:** 9 Weeks | **Current Weight:** 89 kg\n\n---\n\n## Countdown to Fight Day\n\n<div id=\"widget-countdown\"></div>\n\n---\n\n## Weight Progress\n\n<div id=\"widget-weight\"></div>\n\n> **Note:** Weight data is stored in your browser's local storage. Clearing browser data will reset the weight log. Weigh yourself every morning — fasted, after using the bathroom, same scale.\n\n---\n\n## Current Phase\n\n<div id=\"widget-phase\"></div>\n\n---\n\n## Today's Training\n\n<div id=\"widget-today\"></div>\n\n---\n\n## Camp Overview\n\n| Phase | Weeks | Dates | Weight Target | Focus |\n|-------|-------|-------|---------------|-------|\n| **Phase 1 — Base Camp** | 1-3 | Mar 16 - Apr 5 | 89 → 85 kg | Movement quality, baseline establishment, gradual deficit |\n| **Phase 2 — Intensification** | 4-6 | Apr 6 - Apr 26 | 85 → 81 kg | Peak volume, hardest conditioning, 2x/week sparring |\n| **Phase 3 — Sharpening** | 7-8 | Apr 27 - May 10 | 81 → 79 kg | Reduce volume, speed work, game plan drilling |\n| **Phase 4 — Fight Week** | 9 | May 11 - May 16 | 79 → 77 kg | Water cut, light technique, mental prep |\n\n---\n\n## Quick Links\n\n- [Phase 1: Base Camp](#phase-1) — Weeks 1-3 (Mar 16 - Apr 5)\n- [Phase 2: Intensification](#phase-2) — Weeks 4-6 (Apr 6 - Apr 26)\n- [Phase 3: Sharpening](#phase-3) — Weeks 7-8 (Apr 27 - May 10)\n- [Phase 4: Fight Week](#phase-4) — Week 9 (May 11 - May 16)\n- [Weight Management](#weight-management) — Nutrition, weight cut, supplements\n- [Training Tools](#training-tools) — Exercise library, warm-up protocols\n- [Fight Prep](#fight-prep) — Safety, testing, game plan\n- [Full Schedule](#schedule) — 9-week calendar view\n\n---\n\n## Estimated 1RMs\n\n| Lift | Estimated 1RM |\n|------|---------------|\n| Back Squat | 150 kg |\n| Deadlift | 180 kg |\n| Bench Press | 115 kg |\n| Overhead Press | 75 kg |\n\n*Reassess at mid-camp (Week 5) and pre-fight (Week 8).*\n\n---\n\n## Training Philosophy\n\nThis fight camp draws from proven methodologies combined into a cohesive framework:\n\n- **Concurrent Training** (Alex Viada) — Develop strength, power, and endurance simultaneously\n- **Energy Systems Development** (Joel Jamieson) — Build aerobic base, then layer anaerobic capacity\n- **Strength Without Mass** (Pavel Tsatsouline) — Neural adaptations over hypertrophy to stay in weight class\n- **Triphasic Training** (Cal Dietz) — Eccentric → Isometric → Explosive concentric progression\n- **Volume Over Intensity for Skills** (Firas Zahabi) — Frequent technical work below injury threshold\n- **Functional Movement** (Mike Boyle) — Single-leg emphasis, anti-movement core work\n- **Fighter-Specific S&C** (Phil Daru) — Exercises with direct cage carryover\n", "phase-1": "# Phase 1 — Base Camp (Weeks 1-3)\n\n> **Phase:** Accumulation / Base Building | **Duration:** March 16 - April 5, 2026\n> **Weight Target:** 89 kg → 85 kg (gradual deficit ~1.3 kg/week)\n> **Training Focus:** Movement quality, baseline establishment, progressive overload\n> **RPE Progression:** Week 1: 6-7 | Week 2: 7-8 | Week 3: 8-9\n> **1RMs:** Squat 150 kg | Deadlift 180 kg | Bench 115 kg | OHP 75 kg\n\n---\n\n## Phase 1 Overview\n\nPhase 1 builds the **aerobic and structural foundation** the entire camp depends on. The goal is not to destroy yourself in Week 1 — it's to establish patterns, dial in technique under moderate load, and begin a sustainable caloric deficit that will carry through all 9 weeks.\n\nStrength work uses **linear progressive overload** across the 3 weeks. Loads start at 65-70% 1RM and climb to 80-85% by Week 3. MMA sessions focus on volume and technique accumulation — sparring is limited to once per week (Thursday) and starts at controlled intensity.\n\n### Phase 1 Goals\n\n- Establish 2x/day training rhythm (AM strength + PM MMA)\n- Build aerobic base with 2-3 cardiac output sessions per week\n- Progressive overload on all compound lifts\n- One hard sparring session per week (Thursday)\n- Begin caloric deficit (~500 kcal/day → ~0.5 kg/week from diet alone)\n- Baseline conditioning test (Week 0 or early Week 1)\n- Establish morning weight tracking habit\n\n### Tempo Key\n\nAll strength movements use the following tempo notation unless otherwise noted:\n- **3** = 3 sec eccentric (lowering)\n- **1** = 1 sec pause at bottom\n- **2** = 2 sec concentric (controlled lift)\n- **0** = no pause at top\n\nWeek 3 shifts to **3-1-X-0** on compound lifts (X = explosive concentric) to prepare for Phase 2.\n\n### Intensity Key\n\n| Marker | Meaning |\n|--------|---------|\n| 🟢 | Easy — recovery pace, low CNS demand |\n| 🟡 | Moderate — working hard but controlled |\n| 🔴 | Hard — high intensity, high CNS demand |\n\n---\n\n## Weekly Schedule Template\n\n| Day | AM Session | PM Session |\n|-----|-----------|------------|\n| **Monday** | Strength Upper 🟡 | Striking 🔴 |\n| **Tuesday** | Cardiac Output 🟢 | Grappling 🟡 |\n| **Wednesday** | Strength Lower 🔴 | Light Technique 🟢 |\n| **Thursday** | HIIT / Fight Circuit 🔴 | Sparring 🔴 |\n| **Friday** | Strength Power 🟡 | Drilling 🟡 |\n| **Saturday** | Conditioning 🟡 | Open Mat 🟢 |\n| **Sunday** | REST | REST |\n\n---\n\n# Week 1 — Base Volume\n\n> **Global RPE Target:** 6-7\n> **Theme:** Establish training patterns, learn the rhythm, moderate intensity across the board.\n> **Weight:** ~89 kg → ~88 kg\n\n---\n\n## Monday — Week 1\n\n### AM — Strength: Upper Push/Pull (60 min) 🟡\n\n**Warm-Up** (10 min) — Protocol 1: Upper Body Warm-Up (see Training Tools).\n\n| Exercise | Sets x Reps | Load | Rest | Tempo | RPE | Notes |\n|----------|-------------|------|------|-------|-----|-------|\n| Bench Press | 4 x 6 | 75 kg (65%) | 2.5 min | 3-1-2-0 | 6 | Control the eccentric. Full ROM, scapulae retracted. |\n| Barbell Row | 4 x 6 | 70 kg | 2.5 min | 3-1-2-0 | 6 | Pull to lower sternum. Torso stays still. No heaving. |\n| Overhead Press | 3 x 8 | 45 kg (60%) | 2 min | 3-1-2-0 | 6 | Strict press. Brace core, press straight up. |\n| Weighted Pull-Up | 3 x 6 | BW + 10 kg | 2 min | 3-1-2-0 | 6 | Dead hang start. Full extension at bottom. |\n| Incline DB Press | 3 x 10 | 28 kg each | 90 s | 3-1-2-0 | 6 | 30-degree incline. Controlled path. |\n| Face Pulls | 3 x 15 | Light cable | 60 s | 2-1-1-0 | 5 | Prehab. External rotation at top. |\n| Pallof Press | 3 x 10/side | Band/cable | 60 s | 2-1-2-0 | 6 | Anti-rotation. Full arm extension. |\n\n**Session Total:** 23 working sets, ~50 min\n\n**Cool-Down** (5 min) — Pec doorway stretch 2x30s/side, banded lat stretch 2x30s/side, thoracic foam roll 60s.\n\n---\n\n### PM — MMA Striking (75 min) 🔴\n\n**Warm-Up** (10 min) — Protocol 4: MMA Striking Warm-Up + Neck Isometrics.\n\n| Block | Duration | Intensity | Description |\n|-------|----------|-----------|-------------|\n| Shadow Boxing | 3 x 3 min (1 min rest) | Moderate | Establish stance, basic combos. Jab-cross, jab-cross-hook. Focus on hand return and footwork. |\n| Pad Work — Fundamentals | 4 x 3 min (1 min rest) | Moderate-High | Coach feeds 3-4 strike combos. Focus on technique, snap, and returning to guard. |\n| Heavy Bag — Combinations | 3 x 3 min (1 min rest) | Moderate | Work basic combinations at 70%. Focus on hip rotation and foot position. |\n| Technical Sparring — Light | 2 x 3 min (1 min rest) | Light-Moderate | Striking only, 50-60% power. Focus on range management and defensive movement. |\n| Body Shot Drill | 2 x 2 min (1 min rest) | Moderate | Partner drill: alternate attacking body with hooks and uppercuts, defend with elbows. |\n\n**Cool-Down** (5 min) — Static stretching: shoulders, hip flexors. Light wrist circles. 1 min easy shadow boxing.\n\n---\n\n## Tuesday — Week 1\n\n### AM — Cardiac Output (40 min) 🟢\n\n**Warm-Up** (5 min) — Protocol 6: Conditioning Warm-Up, easy build-up.\n\n| Block | Duration | Intensity | Notes |\n|-------|----------|-----------|-------|\n| Zone 2 Sustained | 40 min | 130-150 BPM | Assault bike, rower, or easy jog. Nasal breathing preferred. Conversational pace — if you can't talk, slow down. |\n\n> **HR Target:** 130-150 BPM. This builds the aerobic engine that fuels recovery between rounds.\n\n**Cool-Down** (5 min) — Walk 3 min, light stretching.\n\n---\n\n### PM — MMA Grappling (75 min) 🟡\n\n**Warm-Up** (12 min) — Protocol 5: MMA Grappling Warm-Up + Neck Isometrics.\n\n| Block | Duration | Intensity | Description |\n|-------|----------|-----------|-------------|\n| Technique Instruction | 15 min | Low | Coach demonstrates technique of the day. Takedown entries or guard passes. |\n| Positional Drilling — Guard | 3 x 5 min (1 min rest) | Moderate | Start in closed guard. Top works passes, bottom works sweeps/submissions. Reset on pass or sweep. |\n| Positional Drilling — Takedowns | 3 x 3 min (1 min rest) | Moderate | Start standing. Single-leg and double-leg entries. 60-70% resistance. |\n| Live Grappling | 3 x 5 min (1 min rest) | Moderate | Submission only (no strikes). Focus on position before submission. |\n\n**Cool-Down** (5 min) — Partner stretching. Hip 90/90 holds 60s/side. Supine spinal twist 60s/side.\n\n---\n\n## Wednesday — Week 1\n\n### AM — Strength: Lower + Posterior Chain (65 min) 🔴\n\n**Warm-Up** (12 min) — Protocol 2: Lower Body Warm-Up.\n\n| Exercise | Sets x Reps | Load | Rest | Tempo | RPE | Notes |\n|----------|-------------|------|------|-------|-----|-------|\n| Back Squat | 4 x 6 | 98 kg (65%) | 3 min | 3-1-2-0 | 6 | Full depth. Brace hard, spread the floor. |\n| Romanian Deadlift | 4 x 8 | 100 kg | 2.5 min | 3-1-2-0 | 6 | Deep hinge. Feel hamstring stretch. Bar stays on legs. |\n| RFESS (Bulgarian Split Squat) | 3 x 8/leg | 20 kg DBs | 90 s/leg | 3-1-2-0 | 6-7 | Rear foot on bench. Drive through front heel. |\n| Glute-Ham Raise or Nordic Curl | 3 x 6 | BW (assisted) | 2 min | 3-0-2-0 | 6 | Eccentric focus. Control the descent. |\n| Copenhagen Plank | 3 x 20s/side | BW | 60 s | Hold | 6 | Top foot on bench. Straight line from head to feet. |\n| Dead Bug | 3 x 10/side | BW | 60 s | Slow | 5 | Low back glued to floor. Exhale on extension. |\n| Farmer's Carry | 3 x 40m | 36 kg/hand | 90 s | Walk | 6 | Stay tall. Don't lean. Squeeze handles hard. |\n\n**Session Total:** 23 working sets, ~55 min\n\n**Cool-Down** (5 min) — Hip flexor stretch 2x30s/side, hamstring stretch 2x30s/side, foam roll quads and glutes 2 min.\n\n---\n\n### PM — Light Technique / Open Mat (60 min) 🟢\n\n**Warm-Up** (10 min) — Light movement, shadow boxing, basic grappling movements.\n\n| Block | Duration | Intensity | Description |\n|-------|----------|-----------|-------------|\n| Technique Review | 20 min | Low | Review and drill techniques from the week. No resistance. Focus on smooth, correct movement. |\n| Flow Rolling | 3 x 5 min (1 min rest) | Easy | Rolling at 40-50%. No submissions with force. Movement practice only. |\n| Shadow Boxing + Visualization | 2 x 3 min | Easy | Light movement. Visualize an opponent. Practice entries and exits. |\n\n**Cool-Down** (5 min) — Mobility flow: Cat-cow, pigeon pose, thoracic rotations.\n\n---\n\n## Thursday — Week 1\n\n### AM — HIIT / Fight Circuit (35 min) 🔴\n\n**Warm-Up** (8 min) — Protocol 6: Conditioning Warm-Up.\n\n**Circuit: 4 rounds, 5 exercises, 30s work / 20s rest, 2 min between rounds**\n\n| Station | Exercise | Target |\n|---------|----------|--------|\n| 1 | Assault Bike Sprint | Max calories — all-out |\n| 2 | Med Ball Overhead Slam | Power — maximum force each rep |\n| 3 | Sprawl-to-Burpee | Speed — max clean reps |\n| 4 | Battle Rope Slams (alternating) | Endurance — maintain rhythm |\n| 5 | KB Swings (24 kg) | Hip snap — quality over speed |\n\n**Session Total:** 4 rounds × 4:10 = ~17 min work + rest between rounds = ~25 min\n\n**Cool-Down** (5 min) — Walk 3 min, deep breathing, light stretching.\n\n---\n\n### PM — MMA Sparring (90 min) 🔴\n\n**Warm-Up** (15 min) — Protocol 4: Striking Warm-Up + Protocol 5 elements (hip escapes, pummeling) + Neck Isometrics.\n\n| Block | Duration | Intensity | Description |\n|-------|----------|-----------|-------------|\n| Pad Work — Sharp Combos | 3 x 3 min (1 min rest) | Moderate-High | Get sharp before sparring. Short combos, exit angles. |\n| Light Technical Sparring | 2 x 3 min (1 min rest) | 50-60% | Striking only. Focus on distance and timing. No hard shots. |\n| MMA Sparring | 3 x 5 min (2 min rest) | 70-75% | Full MMA rules. Controlled intensity — learning week. Focus on implementing technique. |\n| Positional Sparring — Cage | 2 x 3 min (1 min rest) | 60-70% | Start in clinch against cage. Work pummeling, trips, wall work. |\n\n**Post-Sparring:** Neuro check (see Fight Prep). Ice any impacted areas.\n\n**Cool-Down** (10 min) — Extended cool-down. Partner stretching. Foam roll. Ice as needed.\n\n---\n\n## Friday — Week 1\n\n### AM — Strength: Full Body Power (55 min) 🟡\n\n**Warm-Up** (11 min) — Protocol 3: Power Day Warm-Up.\n\n| Exercise | Sets x Reps | Load | Rest | Tempo | RPE | Notes |\n|----------|-------------|------|------|-------|-----|-------|\n| Hang Clean | 5 x 3 | 65 kg | 2.5 min | Explosive | 6-7 | Triple extension. Fast elbows. Catch in quarter squat. |\n| Box Jump | 4 x 3 | 24\" box | 2 min | Explosive | 6 | Full hip extension on takeoff. Soft landing. Step down. |\n| Push Press | 4 x 5 | 50 kg (67%) | 2 min | 2-0-X-0 | 6-7 | Quick dip, aggressive drive. Legs do the work. |\n| Broad Jump | 3 x 3 | BW | 90 s | Explosive | 6 | Max distance. Stick the landing. |\n| Med Ball Rotational Slam | 3 x 6/side | 14 lb | 90 s | Explosive | 6 | Hip-first rotation. Slam with intent. |\n| Single-Leg RDL | 3 x 8/leg | 20 kg DB | 90 s | 3-1-2-0 | 6 | Balance and posterior chain. Control the hinge. |\n| Ab Wheel Rollout | 3 x 8 | BW | 60 s | 3-0-2-0 | 6 | From knees. Full extension without lumbar sag. |\n| Neck Harness | 2 x 15 | 2.5 kg | 60 s | 2-1-2-0 | 5 | Week 1 intro. Flexion and extension only. Slow and controlled. |\n\n**Session Total:** 27 working sets, ~45 min\n\n**Cool-Down** (5 min) — Hip flexor stretch, shoulder band dislocates, thoracic foam roll.\n\n---\n\n### PM — MMA Drilling (75 min) 🟡\n\n**Warm-Up** (10 min) — Protocol 4: Striking + movement drills.\n\n| Block | Duration | Intensity | Description |\n|-------|----------|-----------|-------------|\n| Shadow Boxing with Takedown Entries | 3 x 3 min (1 min rest) | Moderate | Visualize striking → level change → shot. Work entries from both sides. |\n| Takedown Drilling (No Resistance) | 3 x 5 min (1 min rest) | Moderate | Double-leg, single-leg, body lock entries. Partner cooperates. Focus on mechanics. |\n| Submission Chain Drilling | 3 x 5 min (1 min rest) | Moderate | Practice 2-3 submission chains (e.g., armbar → triangle → omoplata). Flow, don't force. |\n| Cage Work Drilling | 2 x 5 min (1 min rest) | Moderate | Work cage escapes and offensive cage work. Underhooks, trips, wall walks. |\n\n**Cool-Down** (5 min) — Static stretching. Light movement.\n\n---\n\n## Saturday — Week 1\n\n### AM — Fight Conditioning (40 min) 🟡\n\n**Warm-Up** (8 min) — Protocol 6: Conditioning Warm-Up.\n\n| Block | Duration | Intensity | Description |\n|-------|----------|-----------|-------------|\n| Jump Rope | 3 x 3 min (1 min rest) | Moderate | Basic bounce, high knees, double-unders if proficient. |\n| Sled Push | 4 x 40m | Moderate (RPE 7) | Low handle position. Drive with legs. Walk back recovery. |\n| Shadow Boxing Rounds | 3 x 3 min (1 min rest) | Moderate | Full MMA shadow boxing. Visualize opponent. Work offense and defense. |\n\n**Cool-Down** (5 min) — Walk 3 min, light stretching.\n\n---\n\n### PM — Open Mat / Light Technical (60 min) 🟢\n\n| Block | Duration | Intensity | Description |\n|-------|----------|-----------|-------------|\n| Open Mat Grappling | 3 x 5 min (2 min rest) | Easy (40-50%) | Flow rolling. No submissions with force. |\n| Technique Review | 15 min | Low | Work on any techniques that need extra practice from the week. |\n| Mobility Flow | 15 min | Easy | Reference mobility flow from Training Tools. |\n\n---\n\n## Sunday — Week 1\n\n### REST DAY\n\n- Sleep 8-9 hours\n- Walk 20-30 min (active recovery)\n- Foam roll or mobility flow (optional, 15-20 min)\n- Meal prep for the week ahead\n- Weigh-in and log (morning, fasted)\n\n---\n\n# Week 2 — Progressive Overload\n\n> **Global RPE Target:** 7-8\n> **Theme:** Increase loads on all compound lifts. Extend conditioning durations. MMA sessions build on Week 1 foundations.\n> **Weight:** ~88 kg → ~86.5 kg\n\n---\n\n## Monday — Week 2\n\n### AM — Strength: Upper Push/Pull (60 min) 🟡\n\n**Warm-Up** (10 min) — Protocol 1.\n\n| Exercise | Sets x Reps | Load | Rest | Tempo | RPE | Notes |\n|----------|-------------|------|------|-------|-----|-------|\n| Bench Press | 4 x 5 | 82 kg (71%) | 2.5 min | 3-1-2-0 | 7 | +7 kg from Week 1. Maintain bar speed. |\n| Barbell Row | 4 x 5 | 78 kg | 2.5 min | 3-1-2-0 | 7 | Heavier — focus on torso stability. |\n| Overhead Press | 3 x 6 | 50 kg (67%) | 2 min | 3-1-2-0 | 7 | Fewer reps, more weight. Stay strict. |\n| Weighted Pull-Up | 3 x 5 | BW + 15 kg | 2 min | 3-1-2-0 | 7 | Added load. Full ROM. |\n| Dips | 3 x 8 | BW + 10 kg | 90 s | 3-1-2-0 | 7 | Parallel depth. Control descent. |\n| Dumbbell Row | 3 x 8/arm | 34 kg | 90 s | 3-1-1-0 | 7 | Pull to hip. Squeeze at top. |\n| Face Pulls | 3 x 15 | Light cable | 60 s | 2-1-1-0 | 5 | Same as Week 1 — prehab stays light. |\n| Dead Bug | 3 x 12/side | BW | 60 s | Slow | 6 | Increase reps from Week 1. |\n\n**Session Total:** 26 working sets, ~50 min\n\n**Cool-Down** (5 min)\n\n---\n\n### PM — MMA Striking (75 min) 🔴\n\n**Warm-Up** (10 min) — Protocol 4 + Neck Isometrics.\n\n| Block | Duration | Intensity | Description |\n|-------|----------|-----------|-------------|\n| Shadow Boxing | 3 x 3 min (1 min rest) | Moderate | Add kicks this week. Jab-cross-low kick, teep variations. |\n| Pad Work — Extended Combos | 4 x 3 min (1 min rest) | High | 5 Phase 2 — Intensification (Weeks 4-6)\n\n> **Phase:** Transmutation / Peak Volume | **Duration:** April 6 - April 26, 2026\n> **Weight Target:** 85 kg → 81 kg (continue ~1.3 kg/week deficit)\n> **Training Focus:** Peak training volume, hardest conditioning, increased sparring\n> **RPE Progression:** Week 4: 7-8 | Week 5: 8-9 | Week 6: 8-9 (peak)\n> **1RMs:** Squat 150 kg | Deadlift 180 kg | Bench 115 kg | OHP 75 kg\n\n---\n\n## Phase 2 Overview\n\nThis is the **hardest phase of camp**. Everything escalates: sparring frequency doubles to twice per week, conditioning sessions layer on top of each other, and fight simulation circuits appear regularly. Strength work shifts from progression to **maintenance** — loads stay at 80-85% 1RM with reduced volume so that recovery resources can be directed toward MMA-specific work and sparring.\n\n### Key Changes from Phase 1\n\n| Element | Phase 1 | Phase 2 |\n|---------|---------|---------|\n| Sparring | 1x/week (Thu) | **2x/week (Tue PM + Thu PM)** |\n| Strength Goal | Progressive overload | **Maintenance (80-85% 1RM)** |\n| Conditioning | Single session days | **Double conditioning on some days** |\n| Tempo | 3-1-1-0 (varied) | **3-1-X-0 (explosive concentric throughout)** |\n| Rest Periods | Standard (2-3 min) | **Tightened on conditioning work** |\n| Accessories | General | **MMA-specific replacements** |\n| Fight Simulation | Occasional | **Frequent (2-3x/week)** |\n| Opponent Drilling | None | **Integrated into technique sessions** |\n\n### Tempo Key\n\nAll strength movements use **3-1-X-0** unless otherwise noted:\n- **3** = 3 sec eccentric (lowering)\n- **1** = 1 sec pause at bottom\n- **X** = eXplosive concentric (as fast as possible)\n- **0** = no pause at top\n\n### Intensity Key\n\n| Marker | Meaning |\n|--------|---------|\n| 🟢 | Easy — recovery pace, low CNS demand |\n| 🟡 | Moderate — working hard but controlled |\n| 🔴 | Hard — high intensity, high CNS demand, full effort |\n\n---\n\n## Weekly Schedule Template\n\  min) — Pec doorway stretch 2x30s/side, banded lat stretch 2x30s/side, thoracic foam roll 60s.\n\n---\n\n### PM — Striking (75 min) 🔴\n\n**Warm-Up** (10 min) — Jump rope 3 min, dynamic stretches, shadow boxing 2 rounds light.\n\n| Block | Duration | Intensity | Description |\n|-------|----------|-----------|-------------|\n| Shadow Boxing | 3 x 3 min (1 min rest) | Moderate | Full MMA stance. Incorporate level changes and lateral movement. Film one round. |\n| Pad Work — Combination Chains | 4 x 3 min (1 min rest) | High | 5-6 strike combos with coach. Emphasis on setups and exits. Snap punches, return to guard. |\n| Heavy Bag — Power Rounds | 3 x 3 min (1 min rest) | High | Full power shots. Focus on hip rotation, weight transfer, and exhaling on every strike. |\n| Opponent-Specific Drill | 2 x 5 min (1 min rest) | Moderate-High | Simulate opponent tendencies — work entries, angles, and counters. Coach feeds specific looks. |\n| Burnout Round | 1 x 2 min | Max | Non-stop output on bag. Every strike with intent. Simulates end-of-round push. |\n\n**Cool-Down** (5 min) — Static stretching: hip flexors, shoulders, neck. Wrist circles. Light shadow boxing 1 min.\n\n---\n\n## Tuesday — Week 4\n\n### AM — Cardiac Output (45 min) 🟢\n\n**Warm-Up** (5 min) — Easy pace build-up on chosen modality.\n\n| Block | Duration | Intensity | Notes |\n|-------|----------|-----------|-------|\n| Zone 2 Sustained | 45 min | 130-150 BPM | Assault bike, rower, or jog. Nasal breathing where possible. Conversational pace. Extend to 45 min from Phase 1's 40 min. |\n\n> **HR Target:** 130-150 BPM. If HR drifts above 150, reduce pace immediately. Aerobic base maintenance — do not convert to tempo.\n\n**Cool-Down** (5 min) — Walk 3 min, light full-body stretching.\n\n---\n\n### PM — Sparring: Mixed (75 min) 🔴\n\n> **NEW in Phase 2:** Tuesday PM switches from grappling-only to live sparring. This is the first of two weekly sparring sessions.\n\n**Warm-Up** (10 min) — Hip escapes, shadow boxing, m n| Hanging Leg Raise | 3 x 12 | BW | 60 s | 2-1-1-0 | 7 | Controlled. Posterior pelvic tilt at top. No swinging. |\n\n**Session Total:** 26 working sets, ~50 min\n\n**Cool-Down** (5 min) — Couch stretch 2x30s/leg, pigeon stretch 2x30s/side, calf foam roll 60s/side.\n\n---\n\n### PM — Light Technique (60 min) 🟢\n\n**Warm-Up** (5 min) — Joint circles, light shadow boxing, movement flow.\n\n| Block | Duration | Intensity | Description |\n|-------|----------|-----------|-------------|\n| Technique Review | 20 min | Low | Coach-led. Review and refine techniques from Tuesday sparring. Address gaps. |\n| Flow Drilling | 20 min | Low-Moderate | Chains of techniques at 50% speed. Striking → clinch → takedown → ground → stand-up. Smooth transitions. |\n| Opponent Gameplan Work | 15 min | Low | Walk through tactical adjustments. Practice entries and exits specific to opponent's style. |\n\n**Cool-Down** (5 min) — Mobility: 90/90 hip switches, thoracic rotations, wrist stretches.\n\n---\n\n## Thursday — Week 4\n\n### AM — HIIT Conditioning (35 min) 🔴\n\n**Warm-Up** (5 min) — Jump rope 2 min, dynamic stretches, 4 burpees.\n\n| Block | Protocol | Work | Rest | Rounds | Intensity | Notes |\n|-------|----------|------|------|--------|-----------|-------|\n| Assault Bike Intervals | Tabata-style | 30 sec | 30 sec | 8 | Max effort | RPM target: 70+. Full commitment every interval. |\n| Rest | — | — | 3 min | — | — | Walk and breathe. |\n| Fight Simulation Circuit | Continuous | 5 min | — | 1 | High | See circuit below. |\n| Rest | — | — | 2 min | — | — | — |\n| Fight Simulation Circuit | Continuous | 5 min | — | 1 | High | Second round — push through. |\n\n**Fight Simulation Circuit (5 min continuous):**\n\n| Exercise | Duration/Reps | Notes |\n|----------|---------------|-------|\n| Sprawl to Heavy Bag Strike | 30 sec | Sprawl, pop up, throw 3-4 hard shots |\n| Clinch Knees on Bag | 30 sec | Plum clinch on heavy bag, alternating knees |\n| Ground-and-Pound on Bag | 30 sec | Mount he ow. Simulates 3 rounds. |\n| Finisher | Rower | 500m | — | 1 | All-out | Sprint the last 500m. Leave nothing. |\n\n**Fight Simulation Circuit A (5 min continuous):**\n\n| Exercise | Duration | Notes |\n|----------|----------|-------|\n| Sprawl + Stand-Up | 30 sec | Continuous sprawls, pop to feet |\n| Heavy Bag Combination | 30 sec | 3-4 punch combos, constant output |\n| Clinch Knees on Bag | 30 sec | Alternating knees, squeeze the bag |\n| Bodyweight Shoot (level change) | 30 sec | Shoot to single-leg position, return |\n| Ground-and-Pound on Bag | 30 sec | Mount bag, controlled power shots |\n| Shadow Boxing — Max Output | 30 sec | Everything you have left |\n| Repeat | — | 2 cycles = 5 min, transition immediately |\n\n**Cool-Down** (5 min) — Walk 3 min, full-body stretching, breathing exercises.\n\n---\n\n### PM — Open Mat (60 min) 🟡\n\n| Block | Duration | Intensity | Description |\n|-------|----------|-----------|-------------|\n| Free Rolling / Sparring | 40 min | Self-regulated | Choose training partners wisely. Work on weaknesses identified during the week. Stay controlled — this is bonus work, not a competition. |\n| Technique Exploration | 15 min | Low | Try new techniques or revisit problem areas. Ask questions. Film if useful. |\n\n**Cool-Down** (5 min) — Full stretch routine, foam rolling.\n\n---\n\n## Sunday — Week 4\n\n### Full REST\n\nNo training. Active recovery only: walk, light stretching, sauna/cold plunge if available. Focus on sleep (8+ hours), nutrition, and mental recovery. Meal prep for the week ahead.\n\n---\n\n### Week 4 Volume Summary\n\n| Metric | Value |\n|--------|-------|\n| Total Sessions | 12 |\n| Total Training Hours | ~12.5 hours |\n| Strength Sessions | 3 (maintenance loading) |\n| MMA/Skill Sessions | 6 (including 2 sparring) |\n| Conditioning Sessions | 3 (cardiac output + HIIT + fight conditioning) |\n| Sparring Sessions | 2 (Tue PM + Thu PM) |\n| Fight Simulation Circuits | 3 (Thu AM x2 + Sat AM x3) |\n| Intensity Distributi arm-Up** (15 min) — Progressive warm-up: shadow boxing 3 rounds, movement drills, pummeling.\n\n| Block | Duration | Intensity | Description |\n|-------|----------|-----------|-------------|\n| Striking Sparring | 3 x 3 min (45 sec rest) | 85% | Tighter rest. Kickboxing rules. Push forward pressure. |\n| MMA Sparring | 5 x 5 min (90 sec rest) | 85% | Five rounds — full fight simulation. Implement gameplan round by round. |\n| Fatigue Rounds | 2 x 3 min (1 min rest) | 85-90% | After 5 hard rounds, two more. This is where mental toughness is built. |\n\n> **Week 5 sparring note:** This is the hardest sparring session of the entire camp. 5 full MMA rounds plus fatigue rounds. This session exists to prove you can fight through exhaustion. If you can survive this, the fight will feel manageable.\n\n**Cool-Down** (10 min) — Partner stretching, ice everything, neck work, extended breathing.\n\n---\n\n## Friday — Week 5\n\n### AM — Strength: Power (50 min) 🟡\n\n**Warm-Up** (10 min) — Reference `warmups.md`. Add 3 x 3 depth jumps (box height 30-40 cm).\n\n| Exercise | Sets x Reps | Load | Rest | Tempo | RPE | Notes |\n|----------|-------------|------|------|-------|-----|-------|\n| Hang Power Clean | 4 x 3 | 72.5 kg | 2.5 min | Explosive | 7-8 | Small bump. Speed must remain fast. If slow, drop back to 70 kg. |\n| Push Press | 4 x 3 | 62.5 kg (83% OHP) | 2.5 min | 3-1-X-0 | 8 | Aggressive dip-drive. Lock out hard. |\n| Clapping Push-Up | 3 x 5 | BW | 90 s | Explosive | 8 | Maximum intent. Land soft, absorb impact. |\n| Kettlebell Swing | 3 x 15 | 32 kg | 60 s | Explosive | 7-8 | Volume increase from Week 4. Maintain hip snap quality. |\n| Med Ball Rotational Slam | 3 x 8/side | 6-8 kg | 60 s | Explosive | 8 | Higher reps. Full rotation, slam with intent. |\n| Turkish Get-Up | 2 x 3/side | 22 kg KB | 90 s | Controlled | 7 | Small load bump. Smooth transitions. |\n| Landmine Rotation | 3 x 8/side | 20 kg on bar | 60 s | Explosive | 8 | MMA-specific rotational power. Control d n| Heavy Bag — Body Shots | 30 sec | Hooks and uppercuts to body only |\n| Clinch Position → Trip Attempt | 30 sec | Pummeling and trip attempts on partner/bag |\n| Mount Escapes (solo or bag) | 30 sec | Hip escape, bridge-and-roll, repeat |\n| Max Output Shadow Boxing | 30 sec | Empty the tank |\n| Repeat | — | 2 cycles = 5 min |\n\n**Cool-Down** (5 min) — Walk 3 min, stretching, extended breathing.\n\n---\n\n### PM — Open Mat (60 min) 🟡\n\n| Block | Duration | Intensity | Description |\n|-------|----------|-----------|-------------|\n| Free Rolling | 35 min | Self-regulated | Pick partners who challenge you. Work weak positions. |\n| Light Sparring — Hands Only | 15 min | Moderate | Boxing sparring at 60%. Focus on defense, head movement, counter-punching. |\n| Technique Exploration | 10 min | Low | Work on anything that needs attention. |\n\n**Cool-Down** (5 min) — Full stretch routine, foam rolling.\n\n---\n\n## Sunday — Week 5\n\n### Full REST\n\nAbsolute rest. Sleep 9+ hours if possible. Epsom salt bath. Light walk only if desired. Mental preparation and visualization. This week was the peak — recovery is critical before Week 6.\n\n---\n\n### Week 5 Volume Summary\n\n| Metric | Value |\n|--------|-------|\n| Total Sessions | 12 |\n| Total Training Hours | ~14 hours |\n| Strength Sessions | 3 (maintenance, small load bumps) |\n| MMA/Skill Sessions | 6 (including 2 hard sparring sessions) |\n| Conditioning Sessions | 3 (cardiac output + finisher, HIIT, peak fight conditioning) |\n| Sparring Sessions | 2 (Tue PM + Thu PM — both harder than Week 4) |\n| Fight Simulation Circuits | 6 (Thu AM x3 + Sat AM x3) |\n| Intensity Distribution | 🟢 x2 / 🟡 x4 / 🔴 x6 |\n\n---\n\n## Mid-Phase Checkpoint — After Week 5\n\nComplete the following assessments on Sunday evening or Monday morning before Week 6 begins.\n\n### Body Composition Check\n\n| Metric | Target | Action if Off-Track |\n|--------|--------|---------------------|\n| Weight | ~81.5 kg | If above 82.5 kg: tighten nutrition, add 10 min Zone 2 to Tuesday/Saturday AM. If below 81 kg: increase carbs slightly — do not undercut performance. |\n| Visual | Noticeably leaner than Phase 1 start | If holding water: check sodium, sleep quality, and stress. |\n\n### Performance Markers\n\n| Test | Minimum Standard | Notes |\n|------|-----------------|-------|\n| Resting HR | Stable or decreasing from Phase 1 | If elevated >5 BPM: overreaching — reduce Week 6 volume 10%. |\n| HRV | Stable or within normal range | Significant drop = overreaching signal. |\n| Grip Strength | No decline from Phase 1 baseline | Drop = CNS fatigue indicator. |\n| Mood / Motivation | Manageable | Some fatigue is normal. If motivation is critically low, reduce Week 6 sparring to 1x. |\n| Sleep Quality | 7+ hours average | If poor: prioritize sleep hygiene over extra training. |\n| Injury Check | No new injuries | Any joint pain, persistent soreness, or swelling = modify. Do not push through injuries this close to fight. |\n\n### Decision Point\n\n| Condition | Action |\n|-----------|--------|\n| All markers green | Proceed with full Week 6 programming |\n| Resting HR elevated or HRV suppressed | Reduce Week 6 conditioning volume by 15-20%. Maintain sparring. |\n| Joint pain or injury | Modify around the issue. If serious, convert Week 6 to modified taper. Consult medical. |\n| Weight ahead of schedule (<81 kg) | Add carbs to performance meals. Prioritize recovery. |\n| Weight behind schedule (>83 kg) | Add 10 min Zone 2 daily. Tighten nutrition. DO NOT crash diet. |\n| Mental burnout | Reduce volume 10%. Add fun training — open mat, flow rolling, playful sparring. |\n\n---\n---\n\n# Week 6 — Absolute Peak\n\n> **Global RPE Target:** 8-9 (peak of entire camp)\n> **Theme:** The highest point of the camp. After this week, volume drops permanently into taper. Everything is at maximum. This is the week that makes or breaks fight readiness.\n> **Weight:** ~81.5 kg → ~81 kg\n\n---\n\n## Monday — Week 6\n\n### AM — Strength: Upper (55 min) 🟡\n\n**Warm-Up** (10 min) — Reference `warmups.md` for full upper-body protocol.\n\n| Exercise | Sets x Reps | Load | Rest | Tempo | RPE | Notes |\n|----------|-------------|------|------|-------|-----|-------|\n| Bench Press | 4 x 2 | 98 kg (85%) | 3 min | 3-1-X-0 | 8-9 | Peak load. Doubles only. Every rep fast and clean. Rack it if it slows. |\n| Weighted Pull-Up | 4 x 2 | BW + 25 kg | 3 min | 3-1-X-0 | 8-9 | Peak load. Explosive intent. Full ROM. |\n| Single-Arm Landmine Row | 3 x 8/arm | Heavy | 75 s | 3-1-X-0 | 8 | Pull hard. MMA grip strength maintenance. |\n| Dip (weighted) | 3 x 5 | BW + 17.5 kg | 90 s | 3-1-X-0 | 8 | Slightly heavier, slightly fewer reps. |\n| Band-Resisted Punch | 3 x 12/arm | Band | 60 s | Explosive | 8 | Increase reps. Build punch endurance under resistance. |\n| Face Pull to External Rotation | 3 x 12 | Light cable | 60 s | 2-1-1-0 | 6 | Prehab. Never skip. |\n| Standing Anti-Rotation Press (cable) | 3 x 8/side | Moderate-heavy | 60 s | 2-1-2-0 | 8 | Heavier than Pallof. Fight the rotation. |\n| Hanging Windshield Wiper | 3 x 8/side | BW | 60 s | Controlled | 8-9 | Volume increase. Control throughout. |\n\n**Session Total:** 29 working sets, ~50 min\n\n**Cool-Down** (5 min) — Pec stretch, lat stretch, thoracic foam roll.\n\n---\n\n### PM — Striking (80 min) 🔴\n\n**Warm-Up** (10 min) — Jump rope 3 min, dynamic stretches, shadow boxing 2 rounds.\n\n| Block | Duration | Intensity | Description |\n|-------|----------|-----------|-------------|\n| Shadow Boxing | 3 x 3 min (1 min rest) | High | Full MMA. High output. Visualize the opponent. Move like it is fight night. |\n| Pad Work — Fight Simulation | 5 x 3 min (45 sec rest) | High | Five rounds of pads simulating the fight. Coach mimics opponent patterns. Execute the gameplan. |\n| Heavy Bag — Championship Rounds | 2 x 5 min (1 min rest) | High | Two 5-min rounds. Pace yourself like a real fight. Do not fade in the last minute. |\n| Opponent-Specific Drill | 3 x 3 min (1 min rest) | High | Sharpen the gameplan weapons. Entries, counters, exits. |\n\n**Cool-Down** (5 min) — Static stretching, wrist circles, neck stretches.\n\n---\n\n## Tuesday — Week 6\n\n### AM — Cardiac Output + Conditioning Finisher (55 min) 🟢/🟡\n\n**Warm-Up** (5 min) — Easy pace build-up.\n\n| Block | Duration | Intensity | Notes |\n|-------|----------|-----------|-------|\n| Zone 2 Sustained | 35 min | 130-150 BPM | Assault bike or rower. Slight volume reduction from Week 5 — preserving energy for sparring. |\n| EMOM Finisher | 12 min | Moderate-High | Increased from 10 min in Week 5. See below. |\n\n**EMOM Finisher (12 min):**\n\n| Minute | Exercise | Reps | Notes |\n|--------|----------|------|-------|\n| Odd minutes | Burpee to Sprawl | 6 | MMA-specific variation. Sprawl at the top. |\n| Even minutes | Kettlebell Clean & Press (alternating) | 5/arm | 24 kg. Full extension. |\n\n**Cool-Down** (5 min) — Walk, stretching.\n\n---\n\n### PM — Sparring: Mixed (80 min) 🔴\n\n**Warm-Up** (10 min) — Shadow boxing, pummeling, light wrestling.\n\n| Block | Duration | Intensity | Description |\n|-------|----------|-----------|-------------|\n| Clinch Sparring — Aggressive | 3 x 3 min (45 sec rest) | High | Tight rest. Push the clinch game. Dirty boxing, trips, wall work. |\n| Positional Ground — Escapes Only | 3 x 3 min (45 sec rest) | High | Start from worst positions. Get out. Build confidence in scrambles. |\n| Live MMA Rounds | 4 x 5 min (90 sec rest) | 85% | Fight simulation intensity. Implement the gameplan completely. |\n| Shark Tank | 1 x 5 min | 85-90% | Fresh opponent every minute. You stay in. This is the test. |\n| Championship Overtime Round | 1 x 5 min (after 2 min rest) | 80-85% | One more round when you think you are done. Mental toughness builder. |\n\n> **Week 6 sparring note:** Championship overtime round added. This is the moment you prove you have a sixth gear. After the shark tank, one more full round. Dig deep.\n\n**Cool-Down** (10 min) — Partner ynamic stretches, 5 burpees.\n\n| Block | Protocol | Work | Rest | Rounds | Intensity | Notes |\n|-------|----------|------|------|--------|-----------|-------|\n| Assault Bike Intervals | Sprint | 30 sec | 20 sec | 10 | Max effort | 3:2 work-to-rest ratio. Hardest intervals of the camp. |\n| Rest | — | — | 3 min | — | — | Walk. |\n| Fight Simulation Circuit | Continuous | 5 min | 75 sec | 3 | Max | Tightest rest of the camp. Three rounds, fight pace. |\n\n**Fight Simulation Circuit (5 min continuous):**\n\n| Exercise | Duration | Notes |\n|----------|----------|-------|\n| Explosive Level Change + Double Jab | 30 sec | Shoot level, stand, throw jab-jab |\n| Heavy Bag Combination — Power | 30 sec | 4-5 strike combos, full power |\n| Clinch Knees — Alternating | 30 sec | Maximum output |\n| Sprawl → Technical Stand-Up | 30 sec | Defensive scramble simulation |\n| Ground-and-Pound Flurry | 30 sec | Rapid strikes from mount/side control on bag |\n| Shadow Boxing — Championship Round | 30 sec | You are winning. Close it out. |\n| Repeat | — | 2 cycles = 5 min |\n\n**Cool-Down** (5 min) — Walk, stretching, breathing.\n\n---\n\n### PM — Full MMA Sparring (90 min) 🔴\n\n> **This is the hardest sparring session of the entire camp.**\n\n**Warm-Up** (15 min) — Progressive warm-up: shadow boxing 3 rounds, movement drills, pummeling, 1 technical round.\n\n| Block | Duration | Intensity | Description |\n|-------|----------|-----------|-------------|\n| Striking Sparring | 3 x 3 min (45 sec rest) | 85-90% | Full kickboxing. Execute the striking gameplan. Coach scores rounds. |\n| MMA Sparring | 5 x 5 min (90 sec rest) | 85-90% | Five full rounds. This IS the fight rehearsal. Every round has a purpose — opener, pressure, counter, grappling, championship. |\n| Adversity Rounds | 2 x 5 min (1 min rest) | 85% | Start each round from a bad position. Down on the scorecards — fight your way back. |\n| Final Championship Round | 1 x 5 min | 80-85% | One last round. 30 seconds left — close  | 15 min | Moderate | Wall takedowns, defense, getups, scrambles — all in sequence. |\n| Full Fight Simulation Drill | 20 min | Moderate-High | 4 x 5 min rounds of drilling the entire gameplan. Stand-up → clinch → ground → stand-up. Coach calls positions and transitions. This is the final rehearsal. |\n\n**Cool-Down** (5 min) — Partner stretching, mobility.\n\n---\n\n## Saturday — Week 6\n\n### AM — Fight Conditioning — Final Peak (55 min) 🔴\n\n> **Last hard conditioning session of the camp.** After today, the taper begins. Leave everything here.\n\n**Warm-Up** (5 min) — Jump rope 2 min, dynamic stretches, 5 burpees.\n\n| Block | Protocol | Work | Rest | Rounds | Intensity | Notes |\n|-------|----------|------|------|--------|-----------|-------|\n| Assault Bike | Death Intervals | 30 sec | 15 sec | 10 | Max | 2:1 work-to-rest. The hardest bike intervals of the camp. |\n| Rest | — | — | 3 min | — | — | Walk. Breathe. Recover. |\n| Championship Fight Simulation | Continuous | 5 min | 60 sec | 3 | Max | Three rounds, 60 sec rest (tighter than any previous week). |\n| Finisher | Rower | 1000m | — | 1 | All-out | Final 1km sprint of the camp. Personal best attempt. |\n\n**Championship Fight Simulation (5 min continuous):**\n\n| Exercise | Duration | Notes |\n|----------|----------|-------|\n| Shadow Boxing — Round Opening | 30 sec | Establish range, jab, move |\n| Explosive Double-Leg Level Change | 30 sec | Shoot, stand, repeat |\n| Heavy Bag — Pressure Combo | 30 sec | Walk forward throwing, do not retreat |\n| Clinch Knees + Elbow (on bag) | 30 sec | Close range devastation |\n| Sprawl → Scramble → Stand | 30 sec | Defensive chain |\n| Max Output — 10-9 Round | 30 sec | You need a finish. EVERYTHING you have. |\n| Repeat | — | 2 cycles = 5 min |\n\n**Cool-Down** (10 min) — Extended walk 5 min, full-body stretching, diaphragmatic breathing. Take your time. The hard work is done.\n\n---\n\n### PM — Open Mat (60 min) 🟡\n\n| Block | Duration | Intensity | Description |\n|-------|----------|-----------|-------------|\n| Free Rolling | 30 min | Self-regulated | Last hard rolling session before taper. Work positions you need for the fight. |\n| Light Boxing Sparring | 15 min | 50-60% | Technical boxing. Defense only. Head movement and footwork. |\n| Cool-Down Rolls / Flow | 15 min | Low | Easy flow rolling. Enjoy the movement. Last day of peak volume. |\n\n**Cool-Down** (5 min) — Full stretch routine, foam rolling. Celebrate completing the hardest phase.\n\n---\n\n## Sunday — Week 6\n\n### Full REST\n\n**Critical recovery day.** This was the peak week of the entire camp. Full rest is non-negotiable.\n\n- Sleep 9+ hours\n- Epsom salt bath or cold plunge\n- Light walk only\n- Meal prep for the taper phase\n- Mental debrief: journal what went well this phase, what needs polish\n- Visualization: see yourself winning on May 16\n\n---\n\n### Week 6 Volume Summary\n\n| Metric | Value |\n|--------|-------|\n| Total Sessions | 12 |\n| Total Training Hours | ~14.5 hours |\n| Strength Sessions | 3 (peak maintenance loads — 85% 1RM) |\n| MMA/Skill Sessions | 6 (including 2 peak sparring sessions) |\n| Conditioning Sessions | 3 (cardiac output + finisher, HIIT, final peak fight conditioning) |\n| Sparring Sessions | 2 (Tue PM + Thu PM — hardest of entire camp) |\n| Fight Simulation Circuits | 6 (Thu AM x3 + Sat AM x3) |\n| Sparring Rounds (Thu PM) | 11 rounds (~55 min live work) |\n| Intensity Distribution | 🟢 x2 / 🟡 x4 / 🔴 x6 |\n\n---\n---\n\n# Phase 2 Summary\n\n## Training Volume Progression\n\n| Metric | Week 4 | Week 5 | Week 6 |\n|--------|--------|--------|--------|\n| Total Training Hours | ~12.5 | ~14 | ~14.5 |\n| Sparring Sessions | 2 | 2 | 2 |\n| Sparring Rounds (Thu PM) | 9 | 10 | 11 |\n| Fight Simulation Circuits | 5 | 6 | 6 |\n| Strength Load (compound lifts) | 80% 1RM | 82-83% 1RM | 85% 1RM |\n| Strength Rep Scheme | 3s | 3s | 2s |\n| Conditioning Rest Periods | Standard | Tightened | Minimum |\n| Overall RPE | 7-8 | 8-9 | 8-9 (peak) |\n\n## Strength Loads Across Phase 2\n\n| Exercise | 1RM | Week 4 (80%) | Week 5 (82-83%) | Week 6 (85%) |\n|----------|-----|--------------|-----------------|--------------|\n| Bench Press | 115 kg | 92 kg x 3 | 95 kg x 3 | 98 kg x 2 |\n| Back Squat | 150 kg | 120 kg x 3 | 123 kg x 3 | 127.5 kg x 2 |\n| Trap Bar Deadlift | 180 kg | 144 kg x 3 | 148 kg x 3 | 153 kg x 2 |\n| Weighted Pull-Up | — | BW+20 kg x 3 | BW+22.5 kg x 3 | BW+25 kg x 2 |\n| Push Press | 75 kg (OHP) | 60 kg x 3 | 62.5 kg x 3 | 65 kg x 2 |\n| Hang Power Clean | — | 70 kg x 3 | 72.5 kg x 3 | 75 kg x 2 |\n\n## Key Adaptations Expected by End of Phase 2\n\n| Quality | Expected Outcome |\n|---------|-----------------|\n| Aerobic Base | Maintained. Cardiac output work continues throughout. |\n| Anaerobic Capacity | Significantly improved. Fight simulation circuits and HIIT at peak levels. |\n| Strength | Maintained at current 1RMs. No regression despite caloric deficit. |\n| Power | Maintained or slightly improved through explosive tempo work. |\n| Fight Readiness | High. Two sparring sessions per week with full MMA rounds and adversity training. |\n| Mental Toughness | Forged. Shark tanks, fatigue rounds, and championship overtime build deep reserves. |\n| Weight | ~81 kg. On track for 77 kg fight weight with 4 weeks remaining for water cut strategy. |\n| Gameplan | Polished. Opponent-specific drilling integrated throughout all sessions. |\n\n## What Changes in Phase 3 (Taper)\n\nAfter this peak phase, Phase 3 will:\n- **Reduce volume** by 30-40% while maintaining intensity\n- **Cut sparring** back to once per week, then to technical only\n- **Eliminate fight simulation circuits** — they have served their purpose\n- **Maintain strength** with reduced sets (2-3 sets instead of 4)\n- **Focus on sharpness** — technique drilling replaces volume work\n- **Begin water cut strategy** in the final 7-10 days\n- **Prioritize recovery** — sleep, nutrition, and mental preparation take center stage\n\n> **The hardest work is done.** Everything from here is about arriving at fight night sharp, fresh, and dangerous.\n", "phase-3": "# Phase 3 — Sharpening (Weeks 7-8)\n\n> **Phase:** Realization / Taper | **Duration:** April 27 - May 10, 2026\n> **Weight Target:** 81 kg → 79 kg (within water-cut range of 77 kg)\n> **Training Focus:** Technical sharpness, speed work, game plan drilling, volume reduction\n> **RPE:** 7-8 (controlled intensity, reduced volume)\n> **Key Changes:** Strength 2x/week (down from 3), no hard sparring in Week 8, speed/timing replaces volume\n\n---\n\n## Phase 3 Overview\n\nThis phase is about **subtraction, not addition**. You are not building fitness here — you are sharpening what you already have and allowing your body to supercompensate. Every session has a purpose. If it doesn't make you sharper for fight night, cut it.\n\n### Key Principles\n\n- **Strength drops to 2 sessions/week** (Monday and Wednesday only — Friday power session is removed)\n- **Loads drop to 70-75% of 1RM** with emphasis on bar speed and explosiveness\n- **No hard sparring in Week 8** — light technical sparring only\n- **Week 7** — moderate sparring is still permitted (controlled rounds, trusted partners only)\n- **Conditioning becomes shorter and sharper** — intervals under 10 seconds, full recovery between sets\n- **Game plan specific drilling increases** — positional sparring, situational reps, entries and exits\n- **Mental preparation begins** — daily visualization, fight strategy review, routine-setting\n- **Water loading protocol discussion** — coordinate with coach and reference weight-management section\n\n### Reference 1RMs (for percentage calculations)\n\n| Lift | 1RM |\n|------|-----|\n| Back Squat | 150 kg |\n| Deadlift | 180 kg |\n| Bench Press | 115 kg |\n| OHP | 75 kg |\n\n### Load Guidelines This Phase\n\n| Percentage | Squat | Deadlift | Bench | OHP |\n|------------|-------|----------|-------|-----|\n| 70% | 105 kg | 126 kg | 80 kg | 52.5 kg |\n| 72.5% | 109 kg | 130 kg | 83 kg | 54 kg |\n| 75% | 112.5 kg | 135 kg | 86 kg | 56 kg |\n\n---\n\n## Week 7 (April 27 - May 3, 2026)\n\n**Theme:** Controlled sharpening. Moderate sparring still allowed. Volume reduced but intensity stays purposeful.\n\n---\n\n### Monday, April 27 — Strength A + MMA Skills\n\n#### AM: Strength A — Speed-Strength (60-75 min)\n\n**Warm-Up (10 min)**\n\n| Exercise | Duration/Sets |\n|----------|---------------|\n| Jump rope | 3 min |\n| Hip 90/90 rotations | 2 x 8 each side |\n| Band pull-aparts | 2 x 15 |\n| Goblet squat to stand | 2 x 6 |\n| Med ball slam | 2 x 5 |\n\n**Main Work — Bar Speed Emphasis**\n\n| Exercise | Sets x Reps | Load | Rest | Notes |\n|----------|-------------|------|------|-------|\n| Back Squat | 4 x 3 | 75% (112.5 kg) | 2.5 min | Explode up, control down |\n| Bench Press | 4 x 3 | 75% (86 kg) | 2.5 min | Fast concentric, pause at chest |\n| Weighted Pull-Up | 3 x 4 | +15 kg | 2 min | Controlled tempo |\n\n**Accessory Work (reduced volume)**\n\n| Exercise | Sets x Reps | Load | Rest |\n|----------|-------------|------|------|\n| Bulgarian Split Squat | 2 x 6 each | 30 kg DBs | 90 sec |\n| DB Row | 2 x 8 each | 35 kg | 90 sec |\n| Pallof Press | 2 x 10 each | Band | 60 sec |\n\n#### PM: MMA Skills — Striking + Game Plan (75 min)\n\n| Block | Duration | Activity | Notes |\n|-------|----------|----------|-------|\n| Warm-Up | 10 min | Shadow boxing (technical) | Focus on fight-specific combos |\n| Pad Work | 20 min | Game plan combinations | Coach calls fight-specific sequences |\n| Positional Sparring | 20 min | Striking entries/exits | Specific ranges and positions from game plan |\n| Bag Work | 15 min | 3 x 3 min rounds | Fight pace, 1 min rest |\n| Cool-Down | 10 min | Light stretching + visualization | Mentally rehearse game plan |\n\n---\n\n### Tuesday, April 28 — MMA Skills + Conditioning\n\n#### AM: Grappling — Game Plan Drilling (75 min)\n\n| Block | Duration | Activity | Notes |\n|-------|----------|----------|-------|\n| Warm-Up | 10 min | Movement flow + guard pulls | Technical warm-up |\n| Positional Drilling | 25 min | Takedown defense → scramble → stand-up | Game plan specific chains |\n| Situational Sparring | 25 min | Start from specific positions | 3 min rounds, moderate intensity |\n| Technique Review | 10 min | Weak-point drilling | Address gaps identified in sparring |\n| Cool-Down | 5 min | Light stretching |  |\n\n#### PM: Conditioning — Short Intervals (30 min)\n\n| Block | Duration | Activity | Notes |\n|-------|----------|----------|-------|\n| Warm-Up | 5 min | Dynamic movement | |\n| Interval Set 1 | 10 min | 8 x 8 sec Assault Bike sprint / 52 sec rest | All-out effort |\n| Interval Set 2 | 10 min | 6 x 10 sec sled push / 50 sec rest | Max power output |\n| Cool-Down | 5 min | Walk + breathing drills | Box breathing, 4-4-4-4 |\n\n---\n\n### Wednesday, April 29 — Strength B + MMA Skills\n\n#### AM: Strength B — Speed-Strength (60 min)\n\n**Warm-Up (10 min)**\n\n| Exercise | Duration/Sets |\n|----------|---------------|\n| Rowing machine | 3 min easy |\n| Leg swings (front/lateral) | 10 each direction |\n| Push-up to downward dog | 2 x 6 |\n| Kettlebell halo | 2 x 8 each way |\n| Broad jump | 3 x 2 |\n\n**Main Work — Bar Speed Emphasis**\n\n| Exercise | Sets x Reps | Load | Rest | Notes |\n|----------|-------------|------|------|-------|\n| Trap Bar Deadlift | 4 x 3 | 72.5% (130 kg) | 2.5 min | Speed off the floor |\n| OHP | 4 x 3 | 75% (56 kg) | 2 min | Explosive press |\n| Front Squat | 3 x 3 | 70% (105 kg) | 2 min | Speed out of the hole |\n\n**Accessory Work (reduced volume)**\n\n| Exercise | Sets x Reps | Load | Rest |\n|----------|-------------|------|------|\n| Landmine Press | 2 x 6 each | 25 kg | 90 sec |\n| Face Pull | 2 x 12 | Cable | 60 sec |\n| Suitcase Carry | 2 x 30m each | 28 kg KB | 60 sec |\n\n#### PM: MMA Skills — Striking + Wrestling (75 min)\n\n| Block | Duration | Activity | Notes |\n|-------|----------|----------|-------|\n| Warm-Up | 10 min
