 — what is the escape sequence?\", \"opponent shoots from outside — reaction drill\"). |\n| Assign training partners to mimic opponent | At least one training partner should study the opponent's footage and replicate their style, stance, and tendencies during sparring. |\n| Build Plan A, Plan B, and Plan C | **Plan A:** Preferred strategy (play to Anes's strengths vs. opponent's weaknesses). **Plan B:** What to do if Plan A is not working (e.g., opponent is better than expected in the preferred range). **Plan C:** Emergency — what to do if hurt, taken down, or in a bad position. |\n| Drill corner communication cues | Establish specific verbal cues between Anes and his corner for each plan transition (e.g., \"Change levels\" = switch to Plan B). |\n\n#### Weeks 7-8: Sharpen Game Plan, Visualization\n\n| Task | Details |\n|------|---------|\n| Reduce new technical input | Stop learning new techniques. Only sharpen what is already in the toolbox. |\n| High-intensity situational sparring | All sparring should replicate fight conditions — 3x5 min rounds, specific scenarios, corner giving instructions as they would on fight night. |\n| Sharpen transitions between Plans A/B/C | Drill smooth transitions in live sparring. The switch between plans must be automatic, not conscious. |\n| Begin structured visualization | See the Mental Preparation section below. |\n| Finalize walkout, entrance, and ring behavior | Know the plan from locker room to cage and back. Eliminate all unknowns. |\n\n#### Week 9: Mental Rehearsal Only\n\n| Task | Details |\n|------|---------|\n| **No new technical or tactical work** | The game plan is set. Trust the preparation. |\n| Light technical drilling only | Movement, shadow boxing, light pad work at 50-60% intensity. No sparring. |\n| Daily visualization sessions | 2x per day (morning and evening), 10-15 minutes each. |\n| Review game plan with coaches | One final walkthrough of Plans A/B/C with the coaching team. |\n| Prepare mentally for all outcomes | Visualize winning, visualize adversity (getting hit, taken down, cut), visualize responding correctly. |\n\n---\n\n## Mental Preparation\n\n### Visualization Protocols\n\nVisualization is a skill. It must be trained consistently to be effective on fight night.\n\n#### Daily Visualization Schedule\n\n| Camp Phase | Frequency | Duration | Focus |\n|------------|-----------|----------|-------|\n| Weeks 1-4 | 1x daily (evening) | 5-10 min | General — see yourself training hard, executing techniques well |\n| Weeks 5-7 | 1x daily (evening) | 10-15 min | Specific — visualize the opponent, your game plan sequences, specific exchanges |\n| Weeks 8-9 | 2x daily (morning + evening) | 10-15 min each | Fight simulation — walk through the entire fight night from warm-up to hand raised |\n\n#### Visualization Script — Fight Night (Use from Week 7 Onward)\n\nWalk through each of these scenes in vivid, multi-sensory detail. See it, hear it, feel it.\n\n1. **Arrival at the venue.** Feel the energy of the building. You are calm and prepared.\n2. **Locker room warm-up.** Pads with your coach. Body feels loose and sharp. Hands are fast.\n3. **The walk out.** Music playing. Crowd noise. You are focused. Breathing is controlled.\n4. **Entering the cage.** Touch the canvas. Bounce on your feet. The cage feels like home.\n5. **Referee instructions.** Touch gloves. Return to your corner. Deep breath.\n6. **Round 1 opening 30 seconds.** Execute your opening sequence. Find your range. Establish your jab.\n7. **A moment of adversity.** The opponent lands a hard shot. You eat it, reset, and respond with your trained combination. You are not shaken.\n8. **Executing your game plan.** See yourself landing your best techniques, implementing takedowns or sprawls as planned, controlling the pace.\n9. **The final round.** You are tired but your conditioning carries you. You push the pace. The opponent is fading.\n10. **The final bell.** You know you have done enough. Hand raised.\n\n#### Key Principles\n\n- Always visualize in the **first person** (through your own eyes, not watching yourself from outside).\n- Include **all senses**: the sound of the crowd, the feel of the canvas under your feet, the smell of the venue, the taste of your mouthguard.\n- **Visualize adversity and recovery**, not just success. Seeing yourself overcome difficulty builds genuine confidence.\n- If your mind wanders, gently return to the scene. Do not force it.\n\n### Pre-Fight Routine\n\nEstablish a consistent pre-fight routine during camp and rehearse it before every hard sparring session so it becomes automatic.\n\n#### 2 Hours Before Fight\n\n| Time | Activity |\n|------|----------|\n| T-120 min | Arrive at venue. Find the locker room. Settle in. |\n| T-90 min | Light movement — walking, dynamic stretching, joint circles. Nothing intense. |\n| T-60 min | Mental preparation — 10 minutes of visualization, controlled breathing (box breathing: 4 in, 4 hold, 4 out, 4 hold). |\n| T-45 min | Begin physical warm-up with coach. Shadow boxing (3 rounds, light), movement patterns, footwork drills. |\n| T-30 min | Pad work with coach (3-4 rounds, building from 50% to 80% intensity). Focus on the opening sequences of the game plan. |\n| T-15 min | Glove up. Final pad round at fight pace. Short burst of high intensity to activate the nervous system. |\n| T-10 min | Hands wrapped, gloves on. Sit quietly. Controlled breathing. Trust your preparation. |\n| T-5 min | Stand up. Bounce lightly. Coach gives final cues — short, simple, rehearsed. |\n| Walk out | Go. |\n\n### Weight Cut Mental Management\n\nThe weight cut is the most mentally challenging part of fight camp. It must be managed deliberately.\n\n| Phase | Mental Strategy |\n|-------|----------------|\n| **Weeks 1-6 (gradual cut)** | Focus on process, not the scale. Daily weigh-ins are data, not judgments. If weight is trending correctly, trust the process. |\n| **Week 7-8 (intensified cut)** | Expect irritability, low energy, and mood swings. **These are physiological, not psychological.** Warn family and training partners in advance. Reduce decision-making outside of training. Simplify your life. |\n| **Week 9 (water cut, if needed)** | This is the hardest 24-48 hours. Have a precise plan with exact times, amounts, and methods. Do not improvise. Conserve all energy for the weigh-in and rehydration. |\n| **After weigh-in** | The relief is immediate. Follow the rehydration plan precisely. Do not overeat. The discipline continues until after the fight. |\n\n#### Coping Strategies During the Cut\n\n- **Structured distraction:** Have a playlist, podcasts, or shows ready for the final water-cut hours. Keep the mind occupied.\n- **Countdown mentality:** \"X hours until weigh-in\" is more manageable than thinking about how you feel right now.\n- **Partner accountability:** Have someone with you during the final cut who knows the plan and keeps you on track.\n- **Reframe suffering:** Every fighter on the card is going through the same thing. This is part of the job.\n\n### Fight Week Routine\n\n| Day | Date | Focus | Training |\n|-----|------|-------|----------|\n| Monday (Week 9 Day 1) | May 11 | Light technical work, begin water loading if applicable | 30 min light drilling, visualization |\n| Tuesday | May 12 | Light movement, mental rehearsal | Shadow boxing 3 rounds, visualization 2x |\n| Wednesday | May 13 | Last light technical session | 20 min pad work at 50%, game plan walkthrough with coaches |\n| Thursday | May 14 | Rest and weight management | Walking only, sauna if needed for weight, visualization 2x |\n| Friday | May 15 | Weigh-in day | Weigh-in, rehydrate, pre-fight meal, early bed |\n| Saturday | May 16 | **FIGHT DAY** | Pre-fight routine (see above), fight |\n\n---\n\n## Fight Day Protocol\n\n### Morning of Weigh-In (Friday, May 15)\n\n| Time | Action |\n|------|--------|\n| Wake (6:00 AM) | Weigh yourself on your own scale immediately. Know exactly where you stand. |\n| 6:00-7:00 AM | If on weight: relax, sip water (small amounts). If over: execute the final cut protocol (hot bath/sauna — **never alone**). |\n| 8:00-9:00 AM | Travel to weigh-in venue. Bring a towel, change of clothes, and your rehydration supplies. |\n| Weigh-in | Step on the scale. Make weight. Done. |\n| Immediately after | Begin rehydration protocol (see below). |\n\n### Rehydration Plan (Post Weigh-In)\n\n> **The goal is to restore bodyweight to approximately 82-84 kg (6-9% above fight weight) by fight time.** This must be done gradually and systematically, not by gorging.\n\n#### Phase 1: First 2 Hours Post Weigh-In\n\n| What | Amount | Notes |\n|------|--------|-------|\n| Oral rehydration solution (ORS) | 500 ml immediately, then sip 500 ml over next hour | Pedialyte, WHO ORS, or similar. NOT plain water — you need electrolytes. |\n| Light carbohydrate snack | 200-300 cal | White rice, banana, white bread with honey. Easy to digest. No fiber, no fat. |\n| Avoid | Large meals, carbonated drinks, dairy, high-fiber foods, caffeine | The gut is compromised from the cut. Ease it back. |\n\n#### Phase 2: 2-8 Hours Post Weigh-In\n\n| What | Amount | Notes |\n|------|--------|-------|\n| Continue sipping ORS or electrolyte drink | 250 ml every 30 minutes | Total target: 2-3 liters in this phase |\n| Meal 1 (2-3 hours post weigh-in) | 500-700 cal | White rice + lean protein (chicken, fish) + small amount of salt. No heavy sauces. |\n| Meal 2 (5-6 hours post weigh-in) | 500-700 cal | Similar to Meal 1. Add a small amount of healthy fat (avocado, olive oil). |\n| Weigh yourself | After Meal 2 | You should be 79-81 kg at this point. If not, increase fluid intake slightly. |\n\n#### Phase 3: Evening / Before Bed\n\n| What | Amount | Notes |\n|------|--------|-------|\n| Light snack before bed | 200-300 cal | Banana, rice cakes, small amount of nut butter |\n| Final fluids | Sip to thirst | Do not overhydrate — you will be up all night urinating |\n| Sleep target | 8-9 hours | This is the most important night of sleep in the entire camp. Dark room, cool, no screens 30 min before bed. |\n\n### Pre-Fight Meal Timing (Saturday, May 16 — Fight Day)\n\n| Meal | Timing | Content | Calories |\n|------|--------|---------|----------|\n| Breakfast | 4-5 hours before fight time | White rice, eggs, banana, toast with honey, electrolyte drink | 600-800 cal |\n| Snack | 2-3 hours before fight time | Banana, rice cakes, small amount of honey, sip electrolyte drink | 200-300 cal |\n| Final fuel | 60-90 min before fight | Small handful of gummy bears or dates (fast sugar), sip of water | 100 cal |\n| **Nothing** | 30 min before fight | No food. Small sips of water only if thirsty. | — |\n\n> **Do not try anything new on fight day.** Every food item should have been tested during camp. The pre-fight meal should be rehearsed at least 3 times before hard sparring sessions.\n\n### Warm-Up Sequence (Pre-Fight)\n\nThis should take approximately 30-35 minutes, starting 45 minutes before expected walk-out.\n\n| Phase | Duration | Activity |\n|-------|----------|----------|\n| 1. Activate | 5 min | Light skipping, joint circles, dynamic stretching. Get blood flowing. |\n| 2. Movement | 5 min | Shadow boxing — light, focused on footwork and distance. Not power. |\n| 3. Pads — build | 10 min | 3 rounds of pads with coach, building from 50% to 80%. Round 1: jab/cross, movement. Round 2: game plan combinations. Round 3: fight-pace burst. |\n| 4. Grappling activate | 5 min | Light wrestling movement — level changes, sprawls, duck-unders. Just enough to activate the hips. |\n| 5. Peak | 3 min | One final round of pads at 90-100%. Short, explosive. Simulate the opening 30 seconds of the fight. End on a high note. |\n| 6. Rest | 5-10 min | Sit down. Controlled breathing. Glove up. Coach delivers final cues — 3 words maximum. |\n\n### Corner Communication Plan\n\nEstablish these during camp and use them in every sparring session so they are automatic on fight night.\n\n#### Verbal Cues\n\n| Cue | Meaning |\n|-----|---------|\n| \"Jab\" | Re-establish the jab. You're being too passive. |\n| \"Breathe\" | You're tensing up. Relax, reset, exhale on strikes. |\n| \"Levels\" | Switch to body attacks. The head is too well-defended. |\n| \"Hands up\" | Guard has dropped. Protect yourself. |\n| \"Push\" | Increase pace. You need this round. Outwork the opponent. |\n| \"Time\" | Settle down. You are ahead. Control the pace, don't take risks. |\n| \"Underhook\" | Get the underhook in the clinch. You're losing position. |\n| \"Off the cage\" | You're stuck on the fence. Circle out, create space. |\n| \"Plan B\" | Switch to the backup strategy. Plan A is not working. |\n| \"Finish\" | Opponent is hurt. Swarm intelligently — don't get wild. |\n\n#### Between-Round Protocol\n\n| Time | Corner Action |\n|------|---------------|\n| 0-15 sec | Sit the fighter down. Water. Ice on neck if needed. Say nothing yet — let him breathe. |\n| 15-30 sec | **One tactical adjustment.** Maximum two sentences. \"He's dropping his right hand after the jab. Double jab, straight right.\" |\n| 30-45 sec | **One emotional cue.** \"You're ahead. Stay calm.\" or \"You need this round. Push the pace.\" |\n| 45-55 sec | Mouthguard in. Stand up. \"You're ready. Go.\" |\n| 55-60 sec | Fighter standing, bouncing, focused. No more talking. |\n\n> **The corner must resist the urge to give too much information between rounds.** A fighter who is fatigued and full of adrenaline can process ONE instruction, maybe two. More than that creates confusion. Pick the single most important adjustment and deliver it clearly.\n\n---\n\n*This fight preparation plan is for Anes Kurtovic, 77 kg, targeting May 16, 2026. Every section should be reviewed with the coaching team and adjusted based on the specific opponent once confirmed. The plan is a framework — the fighter and his team own the execution.*\n", "schedule": "# 9-Week Fight Camp Schedule\n\n> **Fight Date:** May 16, 2026 | **Weight Class:** 77 kg\n> **Camp Start:** March 16, 2026 | **Starting Weight:** 89 kg\n\n---\n\n## Intensity Key\n\n| Marker | Meaning |\n|--------|---------|\n| Easy | Recovery pace, low CNS demand |\n| Moderate | Working hard but controlled |\n| Hard | High demand, plan recovery accordingly |\n\n---\n\n## Phase 1 — Base Camp (Weeks 1-3)\n\n**Focus:** Movement quality, baseline establishment, gradual caloric deficit begins.\n**Weight Target:** 89 kg → 85 kg\n\n### Week 1 — Base Volume (Mar 16-22) | RPE 6-7\n\n| Day | AM Session | PM Session |\n|-----|-----------|------------|\n| **Monday** | Strength — Upper Push/Pull (60 min) Moderate | MMA Striking (75 min) Hard |\n| **Tuesday** | Cardiac Output (40 min) Easy | MMA Grappling (75 min) Moderate |\n| **Wednesday** | Strength — Lower + Posterior (65 min) Hard | Light Technique / Open Mat (60 min) Easy |\n| **Thursday** | HIIT / Fight Circuit (35 min) Hard | MMA Sparring (90 min) Hard |\n| **Friday** | Strength — Full Body Power (55 min) Moderate | MMA Drilling (75 min) Moderate |\n| **Saturday** | Fight Conditioning (40 min) Moderate | Open Mat / Light Technical (60 min) Easy |\n| **Sunday** | REST | REST |\n\n### Week 2 — Progressive Overload (Mar 23-29) | RPE 7-8\n\n| Day | AM Session | PM Session |\n|-----|-----------|------------|\n| **Monday** | Strength — Upper Push/Pull (60 min) Moderate | MMA Striking (75 min) Hard |\n| **Tuesday** | Cardiac Output (45 min) Easy | MMA Grappling (75 min) Moderate |\n| **Wednesday** | Strength — Lower + Posterior (65 min) Hard | Light Technique / Open Mat (60 min) Easy |\n| **Thursday** | HIIT / Fight Circuit (40 min) Hard | MMA Sparring (90 min) Hard |\n| **Friday** | Strength — Full Body Power (55 min) Moderate | MMA Drilling (75 min) Moderate |\n| **Saturday** | Fight Conditioning (45 min) Moderate | Open Mat / Light Technical (60 min) Easy |\n| **Sunday** | REST | REST |\n\n### Week 3 — Peak Volume (Mar 30 - Apr 5) | RPE 8-9\n\n| Day | AM Session | PM Session |\n|-----|-----------|------------|\n| **Monday** | Strength — Upper Push/Pull (65 min) Hard | MMA Striking (75 min) Hard |\n| **Tuesday** | Cardiac Output (45 min) Easy | MMA Grappling (80 min) Hard |\n| **Wednesday** | Strength — Lower + Posterior (70 min) Hard | Light Technique / Open Mat (60 min) Easy |\n| **Thursday** | HIIT / Fight Circuit (40 min) Hard | MMA Sparring (90 min) Hard |\n| **Friday** | Strength — Full Body Power (60 min) Hard | MMA Drilling (75 min) Moderate |\n| **Saturday** | Fight Conditioning (45 min) Hard | Open Mat / Light Technical (60 min) Easy |\n| **Sunday** | REST | REST |\n\n---\n\n## Phase 2 — Intensification (Weeks 4-6)\n\n**Focus:** Peak training volume, hardest conditioning, sparring ramps to 2x/week.\n**Weight Target:** 85 kg → 81 kg\n\n### Week 4 — Intensification Begins (Apr 6-12) | RPE 7-8\n\n| Day | AM Session | PM Session |\n|-----|-----------|------------|\n| **Monday** | Strength — Upper Push/Pull (60 min) Moderate | MMA Striking + Clinch (75 min) Hard |\n| **Tuesday** | Cardiac Output (45 min) Easy | MMA Sparring — Light (75 min) Hard |\n| **Wednesday** | Strength — Lower + Posterior (65 min) Hard | Light Technique / Open Mat (60 min) Easy |\n| **Thursday** | HIIT / Fight Circuit (40 min) Hard | MMA Full Sparring (90 min) Hard |\n| **Friday** | Strength — Full Body Power (55 min) Moderate | MMA Drilling — Game Plan (75 min) Moderate |\n| **Saturday** | Fight Conditioning (45 min) Hard | Open Mat / Light Technical (60 min) Easy |\n| **Sunday** | REST | REST |\n\n### Week 5 — Deep Intensification (Apr 13-19) | RPE 8-9\n\n| Day | AM Session | PM Session |\n|-----|-----------|------------|\n| **Monday** | Strength — Upper Push/Pull (60 min) Hard | MMA Striking + Clinch (75 min) Hard |\n| **Tuesday** | Cardiac Output (45 min) Easy | MMA Sparring — Moderate (80 min) Hard |\n| **Wednesday** | Strength — Lower + Posterior (65 min) Hard | Light Technique / Open Mat (60 min) Easy |\n| **Thursday** | HIIT / Fight Circuit (45 min) Hard | MMA Full Sparring (90 min) Hard |\n| **Friday** | Strength — Full Body Power (55 min) Hard | MMA Drilling — Game Plan (75 min) Moderate |\n| **Saturday** | Fight Conditioning (50 min) Hard | Open Mat / Light Technical (60 min) Easy |\n| **Sunday** | REST | REST |\n\n### Week 6 — Peak Camp (Apr 20-26) | RPE 8-9 (PEAK)\n\n| Day | AM Session | PM Session |\n|-----|-----------|------------|\n| **Monday** | Strength — Upper Push/Pull (60 min) Hard | MMA Striking + Clinch (75 min) Hard |\n| **Tuesday** | Cardiac Output (45 min) Easy | MMA Sparring — Hard (80 min) Hard |\n| **Wednesday** | Strength — Lower + Posterior (65 min) Hard | Light Technique / Open Mat (60 min) Easy |\n| **Thursday** | HIIT / Fight Circuit (45 min) Hard | MMA Full Sparring (90 min) Hard |\n| **Friday** | Strength — Full Body Power (55 min) Hard | MMA Drilling — Game Plan (75 min) Moderate |\n| **Saturday** | Fight Simulation — 5 Rounds (50 min) Hard | Open Mat / Light Technical (60 min) Easy |\n| **Sunday** | REST | REST |\n\n---\n\n## Phase 3 — Sharpening (Weeks 7-8)\n\n**Focus:** Reduce volume, sharpen technique, speed and timing work, game plan specifics.\n**Weight Target:** 81 kg → 79 kg (within water-cut range)\n\n### Week 7 — Volume Reduction (Apr 27 - May 3) | RPE 7-8\n\n| Day | AM Session | PM Session |\n|-----|-----------|------------|\n| **Monday** | Strength — Upper (45 min) Moderate | MMA Striking — Technical (60 min) Moderate |\n| **Tuesday** | Cardiac Output (30 min) Easy | MMA Sparring — Light (60 min) Moderate |\n| **Wednesday** | Strength — Lower (45 min) Moderate | Light Technique / Visualization (45 min) Easy |\n| **Thursday** | Short HIIT (25 min) Hard | MMA Technical Sparring (60 min) Moderate |\n| **Friday** | Active Recovery (30 min) Easy | MMA Drilling — Game Plan (60 min) Moderate |\n| **Saturday** | Conditioning Test — Mid-Camp (45 min) Moderate | Open Mat / Light (45 min) Easy |\n| **Sunday** | REST | REST |\n\n### Week 8 — Final Sharpening (May 4-10) | RPE 6-7\n\n| Day | AM Session | PM Session |\n|-----|-----------|------------|\n| **Monday** | Strength — Light Full Body (35 min) Easy | MMA Striking — Light Technical (50 min) Easy |\n| **Tuesday** | Cardiac Output (25 min) Easy | MMA Light Drilling — No Sparring (50 min) Easy |\n| **Wednesday** | Mobility / Yoga (30 min) Easy | Game Plan Walkthrough (40 min) Easy |\n| **Thursday** | Light Movement (20 min) Easy | Shadow Boxing + Visualization (30 min) Easy |\n| **Friday** | Active Recovery (20 min) Easy | Conditioning Re-Test (45 min) Moderate |\n| **Saturday** | Light Shadow Boxing (20 min) Easy | Mental Prep / Rest Easy |\n| **Sunday** | REST | REST |\n\n---\n\n## Phase 4 — Fight Week (Week 9)\n\n**Focus:** Water cut, mental preparation, light technical work only.\n**Weight Target:** 79 kg → 77 kg (water manipulation)\n\n### Week 9 — Fight Week (May 11-16)\n\n| Day | AM | PM | Weight Protocol |\n|-----|----|----|----------------|\n| **Sunday May 11** | Light shadow boxing (15 min) | Mental prep, visualization | Water 8L, normal food, sodium normal |\n| **Monday May 12** | Light movement (20 min) | Rest, visualization | Water 8L, normal food, sodium normal |\n| **Tuesday May 13** | Very light walk (20 min) | Rest | Water 6L, normal food, sodium -50% |\n| **Wednesday May 14** | No training | Rest, mental prep | Water 4L, reduce carbs, minimal sodium |\n| **Thursday May 15** | No training | Rest | Water 2L, low carbs, minimal sodium |\n| **Friday May 16** | FIGHT DAY | Weigh-in → Rehydrate → Fight | Sips only until weigh-in |\n\n---\n\n## 9-Week Block Summary\n\n| Week | Phase | Hours | Intensity | Weight Target | Theme |\n|------|-------|-------|-----------|---------------|-------|\n| 1 | Base Camp | ~12.5 | Moderate | 87.7 kg | Build base, establish patterns |\n| 2 | Base Camp | ~13.0 | Moderate | 86.4 kg | Progressive overload |\n| 3 | Base Camp | ~13.75 | Hard | 85.1 kg | Peak volume of Phase 1 |\n| 4 | Intensification | ~13.5 | Moderate-Hard | 83.8 kg | Transition to fight-specific |\n| 5 | Intensification | ~14.0 | Hard | 82.5 kg | Deep intensification |\n| 6 | Intensification | ~14.0 | Hard (Peak) | 81.2 kg | Hardest week of camp |\n| 7 | Sharpening | ~10.0 | Moderate | 80.0 kg | Volume reduction, speed focus |\n| 8 | Sharpening | ~7.0 | Easy-Moderate | 79.0 kg | Final sharpening, no hard sparring |\n| 9 | Fight Week | ~2.0 | Easy | 77.0 kg | Water cut, mental prep |\n| **Total** | | **~100 hrs** | | **-12 kg** | **Full Fight Camp** |\n\n---\n\n## Session Spacing Guidelines\n\n- **Minimum 6 hours** between AM strength and PM MMA sessions\n- **48 hours** between heavy lower body and hard sparring when possible\n- **No back-to-back hard days** except during Phase 2 peak weeks (Wed-Thu)\n- **Post-hard sessions:** 15 min cool-down, foam rolling, protein within 60 min\n\n---\n\n## Auto-Regulation\n\n### Missed Session Policy\n\n| Scenario | Action |\n|----------|--------|\n| Miss 1 day | Continue as planned, shift sessions if needed |\n| Miss 2+ consecutive days | Adjust remaining phase, do not try to \"make up\" sessions |\n| Miss 3+ days due to illness | Return with half-volume session, add rest days |\n\n### Resting Heart Rate Monitoring\n\n| RHR Elevation | Duration | Action |\n|---------------|----------|--------|\n| 1-3 bpm above baseline | Any | Normal variation, continue |\n| 4-6 bpm | 1-2 days | Reduce intensity one level |\n| 4-6 bpm | 3+ days | Scale back volume 20% |\n| 7+ bpm | 3+ consecutive days | Immediate deload regardless of phase |\n", "sources": "# Sources & References\n\nAll sources used in the development of this MMA training program, organized by category.\n\n---\n\n## 1. Coach Methodologies & Books\n\n1. **Joel Jamieson** — *Ultimate MMA Conditioning*, 2009. Website: [8weeksout.com](https://www.8weeksout.com). Bioforce HRV system and energy-systems approach to MMA conditioning. Interviews and articles available at 8weeksout.com/blog.\n\n2. **Phil Daru** — Strength and conditioning coach (former UFC Performance Institute, American Top Team). Website: [darustrong.com](https://www.darustrong.com). Articles and programs on sport-specific S&C for MMA fighters.\n\n3. **Firas Zahabi** — Head coach, Tristar Gym. *JRE MMA Show #32* (Joe Rogan Experience), discussing training volume vs. intensity philosophy. YouTube and podcast interviews on periodization for fighters.\n\n4. **Pavel Tsatsouline** — *Power to the People!*, 1999. *Simple & Sinister*, 2013 (revised 2019). StrongFirst methodology — low-rep, high-frequency strength training. Website: [strongfirst.com](https://www.strongfirst.com).\n\n5. **Alex Viada** — *The Hybrid Athlete*, 2015. Website: [completehumanperformance.com](https://www.completehumanperformance.com). Concurrent strength and endurance training methodology.\n\n6. **Mike Boyle** — *New Functional Training for Sports*, 2nd ed., Human Kinetics, 2016. Articles on functional training and unilateral work. Website: [bodybyboyle.com](https://www.bodybyboyle.com).\n\n7. **Cal Dietz** — *Triphasic Training: A Systematic Approach to Elite Speed and Explosive Strength Performance*, 2012. Website: [triphasictraining.com](https://www.triphasictraining.com). Eccentric, isometric, and concentric phase training.\n\n8. **Loren Landow** — *Ultimate Conditioning for Martial Arts*, Human Kinetics, 2016. Speed, agility, and conditioning protocols specific to combat sports.\n\n9. **Eric Cressey** — *Simplified Shoulder Solutions* (video series). Website: [ericcressey.com](https://www.ericcressey.com). Shoulder health, mobility, and injury prevention for athletes.\n\n10. **Joe DeFranco** — *Westside for Skinny Bastards III (WS4SB III)*. Website: [defrancostraining.com](https://www.defrancostraining.com). Upper/lower split with max-effort and repetition-effort methods adapted for athletes.\n\n---\n\n## 2. Scientific Papers — Nutrition\n\n1. **Reale R, Slater G, Cox GR, Dunican IC, Burke LM, et al.** — \"ISSN position stand: nutrition for combat sports.\" *Journal of the International Society of Sports Nutrition*, 2025. DOI: [10.1080/15502783.2025.2467909](https://doi.org/10.1080/15502783.2025.2467909)\n\n2. **Kasper AM, Cocking S, Cocber M, Sherwood M, et al.** — \"Carbohydrate and fluid manipulation in combat sports.\" *Nutrients*, 2021. PMC: [PMC8334642](https://www.ncbi.nlm.nih.gov/pmc/articles/PMC8334642/)\n\n---\n\n## 3. Scientific Papers — Training & Periodization\n\n1. **Wilson JM, Marin PJ, Rhea MR, Wilson SMC, Loenneke JP, Anderson JC.** — \"Concurrent training: a meta-analysis examining interference of aerobic and resistance exercises.\" *Journal of Strength and Conditioning Research*, 2012; 26(8): 2293–2307. PMID: [22002517](https://pubmed.ncbi.nlm.nih.gov/22002517/)\n\n2. **Fyfe JJ, Bishop DJ, Stepto NK.** — \"Interference between concurrent resistance and endurance exercise: molecular bases and the role of individual training variables.\" *Sports Medicine*, 2014; 44(6): 743–762. PMID: [24728927](https://pubmed.ncbi.nlm.nih.gov/24728927/)\n\n3. **Sabag A, Najafi A, Michael S, Esgin T, Halaki M, Hackett D.** — \"The compatibility of concurrent high-intensity interval training and resistance training for muscular strength and hypertrophy: a systematic review and meta-analysis.\" *Journal of Sports Sciences*, 2018; 36(21): 2472–2483. PMID: [29809072](https://pubmed.ncbi.nlm.nih.gov/29809072/)\n\n4. **Franchini E, Cormack S, Takito MY, Hasan AAA, Yuri DA, et al.** — \"Energy system contributions in combat sports: a systematic review.\" *International Journal of Environmental Research and Public Health*, 2023. PMC: [PMC9961508](https://www.ncbi.nlm.nih.gov/pmc/articles/PMC9961508/)\n\n5. **Tota Ł, Drwal T, Fischedick A, et al.** — \"Conditioning training and its effects on preparation of MMA athletes.\" *International Journal of Environmental Research and Public Health*, 2019; 16(9): 1495. PMC: [PMC6942465](https://www.ncbi.nlm.nih.gov/pmc/articles/PMC6942465/)\n\n6. **Kostikiadis IN, Methenitis S, Tsoukos A, Veligekas P, Terzis G, Bogdanis GC.** — \"The effect of short-term sport-specific strength and conditioning training on physical fitness of well-trained mixed martial arts athletes.\" *Journal of Sports Science and Medicine*, 2018; 17(3): 348–358. PMC: [PMC6090403](https://www.ncbi.nlm.nih.gov/pmc/articles/PMC6090403/)\n\n7. **Schoenfeld BJ.** — \"Periodization for MMA: bridging the gap between science and practice.\" Academia.edu. URL: [academia.edu](https://www.academia.edu) (search: Schoenfeld periodization MMA)\n\n8. **James LP, Haff GG, Kelly VG, Beckman EM.** — \"Towards a determination of the physiological characteristics distinguishing successful mixed martial arts athletes: a systematic review of combat sport literature.\" *Sports Medicine*, ResearchGate. URL: [researchgate.net](https://www.researchgate.net) (search: James strength conditioning MMA)\n\n---\n\n## 4. Scientific Papers — Recovery\n\n1. **Dupuy O, Douzi W, Theurot D, Bosquet L, Dugué B.** — \"An evidence-based approach for choosing post-exercise recovery techniques to reduce markers of muscle damage, soreness, fatigue, and inflammation: a systematic review with meta-analysis.\" *Frontiers in Physiology*, 2020. PMID: [33092328](https://pubmed.ncbi.nlm.nih.gov/33092328/)\n\n2. **Souza DB, Delvaux F, Schwartz C, Croisier JL.** — \"Recovery methods used by combat sport athletes: a scoping review.\" *Sports Medicine - Open*, 2025. PMID: [40378882](https://pubmed.ncbi.nlm.nih.gov/40378882/)\n\n3. **Carvalho L, Freitas TT, Pereira LA, Nakamura FY, Loturco I.** — \"Fatigue markers and performance recovery in mixed martial arts athletes after competitive bouts.\" *Scientific Reports*, 2025. DOI: [10.1038/s41598-025-09719-z](https://doi.org/10.1038/s41598-025-09719-z)\n\n---\n\n## 5. Scientific Papers — Supplementation\n\n1. **Kreider RB, Kalman DS, Antonio J, Ziegenfuss TN, Wildman R, et al.** — \"International Society of Sports Nutrition position stand: safety and efficacy of creatine supplementation in exercise, sport, and medicine.\" *Journal of the International Society of Sports Nutrition*, 2017; 14: 18. PMC: [PMC5469049](https://www.ncbi.nlm.nih.gov/pmc/articles/PMC5469049/)\n\n2. **Guest NS, VanDusseldorp TA, Nelson MT, Grgic J, Schoenfeld BJ, et al.** — \"International Society of Sports Nutrition position stand: caffeine and exercise performance.\" *Journal of the International Society of Sports Nutrition*, 2021; 18(1): 1. PMC: [PMC7777221](https://www.ncbi.nlm.nih.gov/pmc/articles/PMC7777221/)\n\n3. **Maughan RJ, Burke LM, Dvorak J, Larson-Meyer DE, Peeling P, et al.** — \"IOC consensus statement: dietary supplements and the high-performance athlete.\" *British Journal of Sports Medicine*, 2018; 52(7): 439–455. PMC: [PMC5867441](https://www.ncbi.nlm.nih.gov/pmc/articles/PMC5867441/)\n\n4. **Ashtary-Larky D, Asbaghi O, Moosavian SP, et al.** — \"Creatine supplementation in combat sports: a systematic review.\" *Journal of the International Society of Sports Nutrition*, 2025. PMID: [40755023](https://pubmed.ncbi.nlm.nih.gov/40755023/)\n\n5. **Li Z, Chen Y, Wang X, et al.** — \"Effects of dietary supplements on physical performance in combat athletes: a systematic review and meta-analysis of randomized controlled trials.\" *Scientific Reports*, 2024. DOI: [10.1038/s41598-024-84359-3](https://doi.org/10.1038/s41598-024-84359-3)\n\n---\n\n## 6. Scientific Papers — Sleep & Recovery\n\n1. **Vitale KC, Owens R, Hopkins SR, Malhotra A.** — \"Sleep hygiene for optimizing recovery in athletes: review and recommendations.\" *International Journal of Sports Medicine*, 2019; 40(8): 535–543. PMC: [PMC6988893](https://www.ncbi.nlm.nih.gov/pmc/articles/PMC6988893/)\n\n2. **Bonnar D, Lee S, Roane BM, et al.** — \"Sleep and athletic performance: impacts on physical performance, mental health, injury risk, nutrition, and recovery.\" *Sleep Medicine Reviews*, 2023. PMC: [PMC9960533](https://www.ncbi.nlm.nih.gov/pmc/articles/PMC9960533/)\n\n3. **Mah CD, Mah KE, Kezirian EJ, Dement WC.** — \"The effects of sleep extension on the athletic performance of collegiate basketball players.\" *Sleep*, 2011; 34(7): 943–950. DOI: [10.5665/SLEEP.1132](https://doi.org/10.5665/SLEEP.1132)\n\n---\n\n## 7. Scientific Papers — Hydration\n\n1. **Sawka MN, Burke LM, Eichner ER, Maughan RJ, Montain SJ, Stachenfeld NS.** — \"American College of Sports Medicine position stand: exercise and fluid replacement.\" *Medicine & Science in Sports & Exercise*, 2007; 39(2): 377–390. DOI: [10.1249/mss.0b013e31802ca597](https://doi.org/10.1249/mss.0b013e31802ca597)\n\n---\n\n## 8. Scientific Papers — Vitamin & Mineral\n\n1. **Chiang CM, Ismaeel A, Griffis RB, Weems S.** — \"Effects of vitamin D supplementation on muscle strength in athletes: a systematic review.\" *Journal of Strength and Conditioning Research*, 2023. PMC: [PMC10768611](https://www.ncbi.nlm.nih.gov/pmc/articles/PMC10768611/)\n\n2. **Heffernan SM, Horner K, et al.** — \"The role of vitamin D and magnesium in athletic performance and recovery.\" *Nutrients*, 2025; 17(10): 1655. DOI: [10.3390/nu17101655](https://doi.org/10.3390/nu17101655)\n\n---\n\n## 9. Organizations\n\n1. **UFC Performance Institute (UFCPI)** — Website: [ufcpi.com](https://www.ufcpi.com). Training phases and periodization chart for MMA athletes. *UFC Performance Institute's Training & Nutrition Guide*, 2018 (publicly available PDF). Sport science research on MMA athlete profiling, body composition, and performance benchmarks.\n"};
var CONTENT_BOS = {"dashboard": "# Kontrolna Tabla Borilačkog Kampa\n\n> **Borac:** Anes Kurtovic | **Težinska Klasa:** 77 kg | **Datum Borbe:** 16. maj 2026\n> **Početak Kampa:** 16. mart 2026 | **Trajanje:** 9 Sedmica | **Trenutna Težina:** 89 kg\n\n---\n\n## Odbrojavanje do Dana Borbe\n\n<div id=\"widget-countdown\"></div>\n\n---\n\n## Napredak Težine\n\n<div id=\"widget-weight\"></div>\n\n> **Napomena:** Podaci o težini se čuvaju u lokalnom skladištu vašeg preglednika. Brisanje podataka preglednika će resetovati evidenciju težine. Vagajte se svako jutro — natašte, nakon korištenja kupatila, ista vaga.\n\n---\n\n## Trenutna Faza\n\n<div id=\"widget-phase\"></div>\n\n---\n\n## Današnji Trening\n\n<div id=\"widget-today\"></div>\n\n---\n\n## Pregled Kampa\n\n| Faza | Sedmice | Datumi | Ciljna Težina | Fokus |\n|------|---------|--------|----------------|-------|\n| **Faza 1 — Baza** | 1-3 | 16. mar - 5. apr | 89 → 85 kg | Kvalitet pokreta, uspostavljanje osnove, postepeni deficit |\n| **Faza 2 — Intenzifikacija** | 4-6 | 6. apr - 26. apr | 85 → 81 kg | Maksimalni volumen, najteži kondicioni, sparring 2x/sed |\n| **Faza 3 — Oštrenje** | 7-8 | 27. apr - 10. maj | 81 → 79 kg | Smanjenje volumena, rad na brzini, uvježbavanje plana igre |\n| **Faza 4 — Sedmica Borbe** | 9 | 11. maj - 16. maj | 79 → 77 kg | Skidanje vode, lagana tehnika, mentalna priprema |\n\n---\n\n## Brze Veze\n\n- [Faza 1: Baza](#phase-1) — Sedmice 1-3 (16. mar - 5. apr)\n- [Faza 2: Intenzifikacija](#phase-2) — Sedmice 4-6 (6. apr - 26. apr)\n- [Faza 3: Oštrenje](#phase-3) — Sedmice 7-8 (27. apr - 10. maj)\n- [Faza 4: Sedmica Borbe](#phase-4) — Sedmica 9 (11. maj - 16. maj)\n- [Upravljanje Težinom](#weight-management) — Ishrana, skidanje težine, suplementi\n- [Alati za Trening](#training-tools) — Biblioteka vježbi, protokoli zagrijavanja\n- [Priprema za Borbu](#fight-prep) — Sigurnost, testiranje, plan igre\n- [Kompletan Raspored](#schedule) — Kalendarski pregled 9 sedmica\n\n---\n\n## Procijenjeni 1RM\n\n| Vježba | Procijenjeni 1RM |\n|--------|------------------|\n| Čučanj | 150 kg |\n| Mrtvo dizanje | 180 kg |\n| Potisak na klupi | 115 kg |\n| Potisak iznad glave | 75 kg |\n\n*Ponovo procijeniti na sredini kampa (Sedmica 5) i prije borbe (Sedmica 8).*\n\n---\n\n## Filozofija Treninga\n\nOvaj borilački kamp koristi provjerene metodologije kombinovane u kohezivni okvir:\n\n- **Konkurentni Trening** (Alex Viada) — Istovremeni razvoj snage, eksplozivnosti i izdržljivosti\n- **Razvoj Energetskih Sistema** (Joel Jamieson) — Izgradnja aerobne baze, zatim anaerobni kapacitet\n- **Snaga Bez Mase** (Pavel Tsatsouline) — Neuralne adaptacije umjesto hipertrofije za ostanak u kategoriji\n- **Trofazični Trening** (Cal Dietz) — Ekscentrična → Izometrička → Eksplozivna koncentrična progresija\n- **Volumen Iznad Intenziteta za Vještine** (Firas Zahabi) — Čest tehnički rad ispod praga povrede\n- **Funkcionalni Pokret** (Mike Boyle) — Naglasak na jednoj nozi, anti-pokretni rad jezgra\n- **Borilački S&C** (Phil Daru) — Vježbe s direktnim prijenosom u kavez\n", "nutrition-plan": "# Dnevni Plan Ishrane — Skidanje Kilaže za Borbu\n\n**Profil Borca:** 89 kg → 77 kg | **Datum Borbe:** 16. maj 2026. | **Kamp:** 9 Sedmica (16. mart – 16. maj)\n\n> Ovaj plan pruža konkretne dnevne opcije obroka za svaku fazu skidanja kilaže. Svaki obrok ima 2–3 opcije za raznolikost. Protein je održavan na 2,3 g/kg tokom cijelog kampa radi očuvanja mišićne mase u kalorijskom deficitu. Ugljikohidrati se cikliraju prema zahtjevima treninga. Masti su na minimumu potrebnom za hormonalno zdravlje.\n\n---\n\n## Brzi Pregled — Kalorijski i Makro Ciljevi po Fazama\n\n| Faza | Sedmice | Tjelesna težina (aproks.) | Dan Treninga | Dan Odmora | Protein | Napomene |\n|------|---------|--------------------------|-------------|------------|---------|----------|\n| **Faza 1** | 1–3 | 89→85 kg | ~2.600 kcal | ~2.100 kcal | ~200 g (2,3 g/kg × 87) | Osnovno skidanje, uspostavljanje deficita |\n| **Faza 2** | 4–6 | 85→81 kg | ~2.400 kcal | ~1.900 kcal | ~191 g (2,3 g/kg × 83) | Dublji deficit |\n| **Faza 3** | 7–8 | 81→79 kg | ~2.400 kcal | ~2.000 kcal | ~184 g (2,3 g/kg × 80) | Zaštita performansi |\n| **Faza 4** | 9 | 79→77 kg | Minimalno/strateški | — | Smanjen | Vodeno/natrijumsko skidanje |\n\n---\n\n## Opće Smjernice\n\n- **Priprema obroka:** Kuhajte proteine u većim količinama (pileća prsa, mljeveno meso, jaja) nedjeljom i srijedom.\n- **Vagajte hranu sirovu** (meso, rižu, zobene) radi tačnosti.\n- **Hidracija:** Ciljevi unosa vode navedeni su po fazama. Pijte ravnomjerno tokom dana — ne pijte velike količine odjednom prije obroka.\n- **Suplementi (sve faze):** Multivitamin, 5 g kreatin (prestati u Fazi 4), riblje ulje 2 g, magnezijum 400 mg prije spavanja.\n- **Natrij:** Držati umjerenim u Fazama 1–3 (~2.000–2.500 mg/dan). Manipuliše se u Fazi 4.\n- **Kofein:** Crna kafa ili zeleni čaj — bez šećera, bez mlijeka tokom skidanja kilaže (mlijeko dodaje nepotrebne kalorije).\n\n---\n\n# FAZA 1 — OSNOVNO SKIDANJE (Sedmice 1–3)\n\n**Datumi:** 16. mart – 5. april 2026.\n**Cilj:** 89 kg → 85 kg (~1,3 kg/sedmično)\n**Protein:** ~200 g/dan | **Hidracija:** 4–5 L vode/dan\n**Elektroliti:** Prstohvat soli u jutarnju vodu. Tabletа elektrolita tokom treninga.\n\n---\n\n## Faza 1 — DAN TRENINGA (~2.600 kcal)\n\n**Makro Cilj:** 200 P / 250 UH / 72 M\n\n### Obrok 1 — Doručak (7:00)\n\n| Opcija | Hrana | Protein | UH | Masti | kcal |\n|--------|-------|---------|-----|-------|------|\n| **A** | 4 cijela jaja (kajgana) + 2 bjelanca, 1 kriška integralnog hljeba, 1/2 avokada (40 g) | 34 g | 18 g | 22 g | 402 |\n| **B** | 80 g zobenih pahuljica kuhanih u vodi, 1 mjerica whey proteina (30 g), 1 banana, 10 g maslaca od kikirikija | 35 g | 68 g | 10 g | 502 |\n| **C** | 200 g grčkog jogurta (0% masti), 40 g granole, 100 g miješanog bobičastog voća, 1 mjerica whey proteina (30 g) | 40 g | 42 g | 6 g | 382 |\n\n### Obrok 2 — Užina Prijepodne (10:00)\n\n| Opcija | Hrana | Protein | UH | Masti | kcal |\n sauna ili vruća kupka po potrebi (maks. 15 min sesije, odmor između) | Samo ako težina nije na cilju |\n| **Praćenje** | Provjeravajte težinu svaka 3–4 sata | |\n| **Dnevni zbir** | ~25 P / ~0 UH / ~2 M / ~118 kcal (ili manje) | |\n\n### Četvrtak (15. maj) — Prije Vaganja\n\n| Vrijeme | Hrana / Tečnost | Napomene |\n|---------|----------------|----------|\n| **Jutro** | Nula vode, nula hrane | Izvagajte se: ako ste na 77 kg ili ispod, idite na vaganje |\n| **Ako ste iznad 77 kg** | Protokol vruće kupke: 10 min unutra, 10 min odmora, ponoviti dok se težina ne postigne | Maksimalno 3 sesije. Prestanite ako vam se vrti. |\n| **Vaganje** | Postići težinu | |\n\n---\n\n## Rehidracija i Ponovno Punjenje Poslije Vaganja (Kritično)\n\n> Započnite rehidraciju ODMAH nakon vaganja. Ovo je jednako važno kao i postizanje težine.\n\n### Odmah (0–30 min poslije vaganja)\n\n| Stavka | Količina | Napomene |\n|--------|----------|----------|\n| ORS rastvor (Pedialyte ili ekvivalent) | 500 ml | Gutljajte polako tokom 30 min |\n| Banana | 1 srednja | Nadopuna kalijuma |\n| Bijeli hljeb sa medom | 2 kriške | Brzo probavljivi ugljikohidrati |\n\n### 1–2 sata poslije vaganja\n\n| Stavka | Količina | Napomene |\n|--------|----------|----------|\n| Bijela riža (kuhana) | 200 g | Laki ugljikohidrati |\n| Pileća prsa | 150 g | Protein |\n| Elektrolitni napitak | 500 ml | Nastaviti gutljajima |\n| Voda | 500 ml | Gutljajte, ne pijte odjednom |\n\n### 3–4 sata poslije vaganja\n\n| Stavka | Količina | Napomene |\n|--------|----------|----------|\n| Tjestenina ili riža | 250 g kuhano | Dopuna glikogena |\n| Piletina ili riba | 200 g | Protein |\n| Banana | 1 | Još kalijuma |\n| Voda sa elektrolitima | 500 ml | |\n\n### Večer prije borbe (5–8 sati poslije vaganja)\n\n| Stavka | Količina | Napomene |\n|--------|----------|----------|\n| Poznati obrok: riža + piletina + povrće | Normalna porcija | Ništa egzotično, ništa ljuto |\n| Voćni sok (narandža ili jabuka) | 250 ml | Šećer + hidracija |\n| Voda | Pijte slobodno gutljajima | Prestanite piti na silu — želite se osjećati ugodno, ne naduto |\n\n### Jutro Dana Borbe (16. maj)\n\n| Stavka | Količina | Napomene |\n|--------|----------|----------|\n| Zobena kaša (50 g) sa medom i bananom | 1 zdjelica | 3–4 sata prije borbe |\n| Tost sa maslacem od kikirikija | 2 kriške | Dugotrajna energija |\n| Voda | 500 ml | Gutljajte uz doručak |\n| Kafa (opcionalno) | 1 šolja crna | Ako je dio normalne rutine |\n| **30 min prije borbe** | 1 banana + mali gutljaj sportskog napitka | Brza energija |\n\n---\n\n## Protokol Suplemenata po Fazama\n\n| Suplement | Faza 1–3 | Faza 4 (Sedmica Borbe) | Poslije Vaganja |\n|-----------|----------|------------------------|-----------------|\n| Kreatin monohidrat | 5 g/dan | PRESTATI (zadržava vodu) | Nastaviti poslije borbe |\n| Riblje ulje | 2 g/dan | Prestati | Nastaviti |\n| Multivitamin | Dnevno | Dnevno | Dnevno |\n| Magnezijum | 400 mg prije spavanja | 400 mg | 400 mg |\n| Kofein | Po potrebi (crna kafa) | Smanjiti radi izbjegavanja dehidracije | Po potrebi |\n| Tablete elektrolita | Tokom treninga | Ne koristiti (natrij) | Da — odmah |\n| BCAA | 10 g tokom treninga | Opcionalno | Nije potrebno |\n\n---\n\n## Šablon za Sedmičnu Kupovinu (Faze 1–3)\n\n**Proteini:** 2,5 kg pileća prsa, 500 g mljevena junetina/puretina, 500 g bijela riba, 2 tuceta jaja, 1 kg svježi sir, 500 g grčki jogurt (0%), 2 kutije whey proteina (mjesečno), 1 kutija kazein proteina (mjesečno)\n\n**Ugljikohidrati:** 1 kg bijela riža, 1 kg slatki krompir, 1 kg zobene pahuljice, integralni hljeb (1 vekna), rižini kolačići (1 pakovanje), banane (grozd od 6–8), miješano bobičasto voće (300 g), jabuke (4–5)\n\n**Masti:** 1 mala boca maslinovog ulja, 1 tegla maslaca od kikirikija (prirodni), 1 pakovanje badema (200 g), 2–3 avokada\n\n**Povrće:** Brokula (500 g), špinat (300 g), šparoge (300 g), zelene mahune (300 g), miješana salata u kesama, krastavci, paradajz, tikvice, paprike\n\n**Ostalo:** Med, limun, cimet, sol, biber, bijeli luk, tablete elektrolita, kafa\n\n---\n\n*Ovaj plan je osmišljen za specifično skidanje kilaže sa 89 kg na 77 kg tokom 9 sedmica. Svi kalorijski ciljevi su aproksimacije — prilagodite na osnovu dnevnog vaganja i sedmičnog napretka. Ako gubitak težine konstantno prelazi 1,5 kg/sedmično, blago povećajte ugljikohidrate. Ako se težina zaustavi duže od 5 dana, smanjite ugljikohidrate za 25 g na dane odmora.*\n", "exercise-detail": "# Vodič za Vježbe\n\nKliknite na bilo koje ime vježbe u planu treninga da dođete ovdje. Svaka vježba uključuje postavu, izvođenje, česte greške i kako se prenosi na MMA borbu.\n\n---\n\n## Čučanj (Back Squat)\n\n**Kategorija:** Složene vježbe sa šipkom (Compound Barbell Lifts)  \n**Primarne mišićne grupe:** Kvadricepsi, gluteusi, aduktori, erektori  \n**Oprema:** Šipka, stalak za čučanj\n\n### Postava\n\nŠipka na gornjim trapezima (visoki položaj) ili zadnjim deltoidima (niski položaj). Stopala u širini ramena, prsti blago prema van.\n\n### Izvođenje\n\nJako stabilizuj jezgru (core), raširuj pod, kukovi i koljena se savijaju zajedno. Pogon prema gore kroz sredinu stopala.\n\n### Česte greške\n\n- Koljena padaju prema unutra\n- naginjanje naprijed / pad prsa\n- skraćivanje dubine\n- gubitak stabilnosti na dnu.\n\n### MMA primjena\n\nGradi produkciju sile donjih ekstremiteta koja pokreće promjene nivoa, odbranu od obaranja (ustajanje pod pritiskom) i nokaut-snagu udaraca od nogu prema gore.\n\n---\n\n## Prednji čučanj (Front Squat)\n\n**Kategorija:** Složene vježbe sa šipkom (Compound Barbell Lifts)  \n**Primarne mišićne grupe:** Kvadricepsi, gluteusi, gornja leđa, jezgra (core)  \n**Oprema:** Šipka, stalak za čučanj\n\n### Postava\n\nŠipka u prednjem hvatu (čisti hvat ili prekrštene ruke). Laktovi visoko, prsa uspravna. Stopala u širini ramena.\n\n### Izvođenje\n\nLaktovi gore cijelo vrijeme. Sjedni ravno dolje između kukova. Pogon gore držeći torzo vertikalno.\n\n### Česte greške\n\n- Padanje laktova (šipka se kotrlja naprijed)\n- nefleksibilnost zglobova prisiljavajući prekršteni hvat kada je čisti hvat bolji\n- plitka dubina.\n\n### MMA primjena\n\nUspravan obrazac torza oponaša držanje potrebno u klinču i tokom završavanja duplog obaranja (double-leg). Veliki zahtjev na prednju jezgru (core) prenosi se na otpor savijanju u grapplingu.\n\n---\n\n## Mrtvo dizanje (Deadlift)\n\n**Kategorija:** Složene vježbe sa šipkom (Compound Barbell Lifts)  \n**Primarne mišićne grupe:** Zadnji lanac (gluteusi, zadnja loža, erektori), latisimus (lats), hvat  \n**Oprema:** Šipka\n\n### Postava\n\nStopala u širini kukova ispod šipke, potkoljenice blizu šipke. Fleksija u kukovima, hvat odmah izvan koljena. Neutralna kičma, latisimus angažiran.\n\n### Izvođenje\n\nGuraj pod od sebe, zaključaj latisimus, šipka klizi uz noge. Stani uspravno — stisni gluteuse na kraju.\n\n### Česte greške\n\n- Zaokruživanje donjih leđa\n- trzanje šipke s poda\n- kukovi koji pucaju gore prvi\n- prekomjerno opružanje na kraju.\n\n### MMA primjena\n\nUkupna snaga zadnjeg lanca za eksplozivnu ekstenziju kukova — motor iza bacanja, obaranja, proval (sprawl) i teških udaraca zadnjom rukom. Izdržljivost hvata pod opterećenjem.\n\n---\n\n## Rumunsko mrtvo dizanje (Romanian Deadlift / RDL)\n\n**Kategorija:** Složene vježbe sa šipkom (Compound Barbell Lifts)  \n**Primarne mišićne grupe:** Zadnja loža, gluteusi, erektori  \n**Oprema:** Šipka\n\n### Postava\n\nStani sa šipkom na visini kukova (iz stalka ili nakon mrtvog dizanja). Stopala u širini kukova, blagi savijak koljena, ramena povučena.\n\n### Izvođenje\n\nGuraj kukove ravno nazad kao da zatvararaš vrata automobila. Šipka ostaje na butinama/potkoljenicama. Osjeti duboko istezanje zadnje lože, zatim pogoni kukove naprijed.\n\n### Česte greške\n\n- Previše savijanja koljena (pretvara se u čučanj)\n- zaokruživanje leđa\n- nedovoljno duboko savijanje.\n\n### MMA primjena\n\nEkscentrična snaga zadnje lože smanjuje rizik od povreda koljena od provala (sprawl) i udaranja nogom. Obrazac šarki kukova (hip-hinge) pokreće potkopavanja i povratke na strunjač.\n\n---\n\n## Potisak s klupe (Bench Press)\n\n**Kategorija:** Složene vježbe sa šipkom (Compound Barbell Lifts)  \n**Primarne mišićne grupe:** Prsa, prednji deltoidi, tricepsi  \n**Oprema:** Šipka, klupa, stalak\n\n### Postava\n\nLezi na klupu, oči ispod šipke. Povuci i spusti lopatice. Hvat malo širi od širine ramena. Stopala ravno na podu.\n\n### Izvođenje\n\nSkini šipku, kontrolirano spusti na donja prsa, pogon kroz stopala, potisni šipku u blagom luku nazad iznad ramena.\n\n### Česte greške\n\n- Širenje laktova na 90 stepeni (stres na ramena)\n- odbijanje šipke od prsa\n- gubitak retrakcije lopatica\n- podizanje kukova.\n\n### MMA primjena\n\nHorizontalna potisna snaga za okvire (frame), krute ruke i podizanje protivnika s klupe iz donje pozicije. Snaga tricepsa pomaže u postavljanju i stvaranju distance.\n\n---\n\n## Potisak iznad glave (Overhead Press)\n\n**Kategorija:** Složene vježbe sa šipkom (Compound Barbell Lifts)  \n**Primarne mišićne grupe:** Deltoidi, tricepsi, gornji trapezius, jezgra (core)  \n**Oprema:** Šipka, stalak za čučanj\n\n### Postava\n\nŠipka u prednjem hvatu na ključnoj kosti. Stopala u širini kukova, gluteusi i trbušnjaci stabilizirani.\n\n### Izvođenje\n\nPotisni šipku ravno gore — pomakni glavu s puta, zatim je vrati natrag kad šipka prođe. Zaključaj direktno iznad sredine stopala.\n\n### Česte greške\n\n- Pretjerano savijanje leđa (pretvara se u kosi potisak)\n- potiskivanje šipke naprijed umjesto ravno gore\n- nestabilizirana jezgra (core).\n\n### MMA primjena\n\nSnaga iznad glave za oslanjanje na kavez, borbu rukama iz ovratničkih hvata i otpor guranju nadolje u klinču. Stabilnost jezgre pod opterećenjem iznad glave odražava zahtjeve borbe za poziciju.\n\n---\n\n## Veslanje šipkom (Barbell Row)\n\n**Kategorija:** Složene vježbe sa šipkom (Compound Barbell Lifts)  \n**Primarne mišićne grupe:** Latisimus (lats), romboidni, zadnji deltoidi, bicepsi, erektori  \n**Oprema:** Šipka\n\n### Postava\n\nSavijanje do otprilike 45 stepeni torza. Nadlani ili podlani hvat odmah izvan koljena. Blagi savijak koljena.\n\n### Izvođenje\n\nPovuci šipku do donjeg sternuma, stisni lopatice na vrhu, kontroliraj negativnu fazu. Torzo miruje.\n\n### Česte greške\n\n- Pretjerano pomicanje torza (veslanje s momentumom)\n- povlačenje prema trbuhu\n- prestojanje previše uspravno.\n\n### MMA primjena\n\nSnaga povlačenja za rad u klinču, kontrolu potkopavanja (underhook), povlačenje ruke (arm drag) i završavanje giljotine. Održava držanje gornjeg dijela leđa za otpor slamanju.\n\n---\n\n## Hang čišćenje (Hang Clean)\n\n**Kategorija:** Složene vježbe sa šipkom (Compound Barbell Lifts)  \n**Primarne mišićne grupe:** Kvadricepsi, gluteusi, trapezius, gornja leđa, podlaktice  \n**Oprema:** Šipka\n\n### Postava\n\nPočni stojeći sa šipkom na visini kukova, nadlani hvat. Blago se savij da dovedeš šipku tik iznad koljena (hang pozicija).\n\n### Izvođenje\n\nEksplodiraj kukovima, slij, povuci laktove visoko, uhvati u prednji hvat s četvrt čučnjem. Ustani.\n\n### Česte greške\n\n- Povlačenje rukama umjesto pogona kukovima\n- nedovoljno brzo provlačenje laktova\n- hvatanje na zglobovima umjesto na deltoidima.\n\n### MMA primjena\n\nTrostruka ekstenzija (gležanj-koljeno-kuk) je isti motorni obrazac kao ulazak u duplo obaranje (double-leg) ili bacanje aperkota. Uči brzinu razvoja sile — koliko brzo možeš izraziti snagu.\n\n---\n\n## Potisak s pogonom (Push Press)\n\n**Kategorija:** Složene vježbe sa šipkom (Compound Barbell Lifts)  \n**Primarne mišićne grupe:** Deltoidi, tricepsi, kvadricepsi, gluteusi, jezgra (core)  \n**Oprema:** Šipka, stalak za čučanj\n\n### Postava\n\nŠipka u prednjem hvatu na ključnoj kosti. Stopala u širini kukova.\n\n### Izvođenje\n\nBrzi zamah dolje (10-15 cm) držeći torzo vertikalno, zatim agresivno pogoni kroz noge i potisni šipku iznad glave u jednom pokretu. Zaključaj.\n\n### Česte greške\n\n- Naginjanje zamaha naprijed (težina na prstima)\n- potiskivanje prije nego noge završe pogon\n- spor zamah koji ubija ciklus istezanja i skraćivanja.\n\n### MMA primjena\n\nUči prijenos sile od nogu do ruku — isti kinetički lanac koji se koristi u svakom udarcu i u izbacivanju protivnika iz ravnoteže iz klinča. Razvija snagu zaključavanja iznad glave za rad uz kavez.\n\n---\n\n## Bugarski split čučanj (RFESS / Bulgarian Split Squat)\n\n**Kategorija:** Jednostrane vježbe (Single-Leg / Unilateral)  \n**Primarne mišićne grupe:** Kvadricepsi, gluteusi, aduktori  \n**Oprema:** Bučice ili šipka, klupa\n\n### Postava\n\nZadnje stopalo gornjim dijelom na klupu iza sebe. Prednje stopalo dovoljno daleko naprijed da koljeno ostaje iznad gležnja na dnu.\n\n### Izvođenje\n\nSpusti se ravno dolje dok zadnje koljeno skoro ne dodirne pod. Pogon kroz prednju petu. Drži torzo uspravno.\n\n### Česte greške\n\n- Prednje stopalo preblizu klupi (koljeno puca naprijed)\n- pretjerano naginjanje torza\n- zadnje stopalo nosi previše tereta.\n\n### MMA primjena\n\nSnaga i ravnoteža na jednoj nozi za udaranje nogom, proval (sprawl) s jedne noge i održavanje baze kada protivnik zgrabi nogu. Smanjuje bilateralne neravnoteže snage koje uzrokuju povrede.\n\n---\n\n## Rumunsko mrtvo dizanje na jednoj nozi (Single-Leg RDL)\n\n**Kategorija:** Jednostrane vježbe (Single-Leg / Unilateral)  \n**Primarne mišićne grupe:** Zadnja loža, gluteusi, jezgra (core) (anti-rotacija)  \n**Oprema:** Bučica ili girja (kettlebell)\n\n### Postava\n\nStani na jednu nogu, meko koljeno. Drži teg u suprotnoj ruci.\n\n### Izvođenje\n\nSavij se u kuku, slobodna noga se pruža iza tebe kao protutežo. Leđa ravna. Stisni gluteus da se uspraviš.\n\n### Česte greške\n\n- Zaokruživanje leđa\n- otvaranje kuka (rotiranje)\n- nedovoljno duboko savijanje\n- žurenje pokreta.\n\n### MMA primjena\n\nSnaga zadnjeg lanca na jednoj nozi direktno se prenosi na udaranje nogom (stabilnost stajne noge), odbranu od obaranja na jednu nogu i doskok nakon bacanja koljena. Zahtjev anti-rotacije odražava rotacijski kaos grapplinga.\n\n---\n\n## Iskoraci u hodu (Walking Lunges)\n\n**Kategorija:** Jednostrane vježbe (Single-Leg / Unilateral)  \n**Primarne mišićne grupe:** Kvadricepsi, gluteusi, fleksori kuka  \n**Oprema:** Bučice, šipka ili vlastita težina\n\n### Postava\n\nStani uspravno, tegovi sa strane ili na leđima.\n\n### Izvođenje\n\nNapravi dugačak korak naprijed, spusti zadnje koljeno prema podu, pogon kroz prednju petu da zakoračiš u sljedeće ponavljanje. Ostani uspravan.\n\n### Česte greške\n\n- Kratki koraci (koljeno preko prstiju)\n- pad torza naprijed\n- odguravanje zadnjim stopalom umjesto povlačenja prednjom nogom.\n\n### MMA primjena\n\nDinamička snaga jedne noge s komponentom kretanja — prenosi se na ulaze za obaranje, promjene nivoa i održavanje ravnoteže tokom kretanja naprijed u zoni udaranja.\n\n---\n\n## Ustajanje na kutiju (Step-Ups)\n\n**Kategorija:** Jednostrane vježbe (Single-Leg / Unilateral)  \n**Primarne mišićne grupe:** Kvadricepsi, gluteusi  \n**Oprema:** Kutija (40-50 cm), bučice\n\n### Postava\n\nPostavi jedno stopalo potpuno na kutiju. Drži bučice sa strane.\n\n### Izvođenje\n\nPogon kroz gornje stopalo da ustaneš na kutiju. NEMOJ se odgurivati donjim stopalom. Kontroliraj silazak.\n\n### Česte greške\n\n- Korištenje donjeg stopala za odguravanje (varanje)\n- kutija preniska da izazove pokret\n- naginjanje naprijed.\n\n### MMA primjena\n\nKoncentrična snaga jedne noge za pogon s podloge (ustajanje iz donje pozicije), prodorni koraci za obaranja i eksplozivne promjene nivoa.\n\n---\n\n## Progresija pištolja čučnja (Pistol Squat Progression)\n\n**Kategorija:** Jednostrane vježbe (Single-Leg / Unilateral)  \n**Primarne mišićne grupe:** Kvadricepsi, gluteusi, fleksori kuka, gležnjevi  \n**Oprema:** Vlastita težina (traka ili kutija za pomoć)\n\n### Postava\n\nStani na jednu nogu. Ispruži drugu nogu ispred sebe. Ruke naprijed za protutežu.\n\n### Izvođenje\n\nSjedi natrag i dolje na jednoj nozi, držeći petu ravno. Idi koliko duboko mobilnost dozvoljava, zatim pogoni gore. Koristi traku ili kutiju za potpomognute verzije po potrebi.\n\n### Česte greške\n\n- Koljeno pada prema unutra\n- peta se podiže\n- zaokruživanje donjih leđa na dnu\n- korištenje momenta za ustajanje.\n\n### MMA primjena\n\nUltimativni izraz snage i mobilnosti jedne noge. Prenosi se na vraćanje ravnoteže nakon čišćenja ili guranja, duboke pozicije jedne noge u borbama za poziciju i demonstrira mobilnost koju borci trebaju u kukovima i gležnjevima.\n\n---\n\n## Skokovi na kutiju (Box Jumps)\n\n**Kategorija:** Snaga / Eksplozivnost (Power / Explosive)  \n**Primarne mišićne grupe:** Kvadricepsi, gluteusi, listovi  \n**Oprema:** Pliometrijska kutija (50-75 cm)\n\n### Postava\n\nStani licem prema kutiji, stopala u širini ramena, ruke nazad.\n\n### Izvođenje\n\nZamahni rukama, opruži kukove-koljena-gležnjeve, doskoči meko na kutiju s punim kontaktom stopala. Stani uspravno, siđi korakom.\n\n### Česte greške\n\n- Odskakivanje od poda (koristi pauzu između ponavljanja)\n- doskok u dubok čučanj na kutiji (znači da je kutija previsoka)\n- skakanje dolje umjesto silaska.\n\n### MMA primjena\n\nTrenira brzinu razvoja sile i reaktivnu snagu za eksplozivne ulaze za obaranje, proval (sprawl) i zatvaranje distance za udarce.\n\n---\n\n## Skokovi u dalj (Broad Jumps)\n\n**Kategorija:** Snaga / Eksplozivnost (Power / Explosive)  \n**Primarne mišićne grupe:** Gluteusi, kvadricepsi, zadnja loža, listovi  \n**Oprema:** Otvoren prostor na podu\n\n### Postava\n\nStopala u širini ramena, ruke iza tijela.\n\n### Izvođenje\n\nZamahni rukama naprijed, pogoni kukove i skoči naprijed za maksimalnu udaljenost. Apsorbiraj doskok mekim koljenima, zadrži poziciju.\n\n### Česte greške\n\n- Nekorištenje ruku\n- doskok ukočenih nogu\n- nepotpuna ekstenzija kukova.\n\n### MMA primjena\n\nHorizontalna eksplozivna snaga — tačan vektor koji se koristi u obaranjima i zatvaranju distance za udarce. Uči agresivnu ekstenziju kukova prema meti.\n\n---\n\n## Udaranje medicinkom o pod (Med Ball Overhead Slam)\n\n**Kategorija:** Snaga / Eksplozivnost (Power / Explosive)  \n**Primarne mišićne grupe:** Latisimus (lats), jezgra (core), ramena, tricepsi  \n**Oprema:** Slam lopta (7-14 kg)\n\n### Postava\n\nStani uspravno, lopta iznad glave s ispruženim rukama.\n\n### Izvođenje\n\nStabiliziraj jezgru, udari loptom o pod što jače moguće koristeći cijelo tijelo. Savij se i prati pokret. Uhvati odskočenu loptu ili je podigni.\n\n### Česte greške\n\n- Korištenje samo ruku (bez angažmana jezgre/kukova)\n- bez praćenja pokreta\n- prelagana lopta.\n\n### MMA primjena\n\nEkspresija snage cijelim tijelom slična bacanju udaraca čekićem iz gornje pozicije ili obaranju protivnika na pod. Uči agresivnu proizvodnju sile prema dolje.\n\n---\n\n## Rotacijski udarac medicinkom (Med Ball Rotational Slam)\n\n**Kategorija:** Snaga / Eksplozivnost (Power / Explosive)  \n**Primarne mišićne grupe:** Kosi trbušni mišići (obliques), jezgra (core), kukovi, ramena  \n**Oprema:** Slam lopta (5-9 kg), zid\n\n### Postava\n\nStani okomito na zid, lopta na suprotnom kuku od zida. Stopala malo šire od širine ramena.\n\n### Izvođenje\n\nRotiraj kukove prvo, zatim trup, zatim ruke — udari loptom u zid. Uhvati i resetuj. Optereti iz zadnjeg kuka.\n\n### Česte greške\n\n- Bacanje rukama umjesto rotiranja kukovima\n- stopala ostaju ravna (rotiraj na jastučiću zadnjeg stopala)\n- stajanje preblizu zidu.\n\n### MMA primjena\n\nDirektno trenira rotacijsku snagu sekvence udarca kukama (hook), overkend (overhand) i kružnog udarca nogom (round kick). Rotacija s početkom u kukovima je ključ za završnu snagu udaraca.\n\n---\n\n## Dodavanje medicinkom od prsa (Med Ball Chest Pass)\n\n**Kategorija:** Snaga / Eksplozivnost (Power / Explosive)  \n**Primarne mišićne grupe:** Prsa, tricepsi, prednji deltoidi, jezgra (core)  \n**Oprema:** Medicinska lopta (5-9 kg), zid ili partner\n\n### Postava\n\nStani licem prema zidu, lopta na prsima, laktovi unutra.\n\n### Izvođenje\n\nEksplozivno pogoni loptu od prsa u zid, potpuno opružajući ruke. Uhvati i odmah preusmjeri. Ostani na jastučićima stopala.\n\n### Česte greške\n\n- Korak naprijed (gubitak baze)\n- lobanje umjesto pogona\n- spor hvat i preusmjeravanje.\n\n### MMA primjena\n\nTrenira horizontalnu brzinu guranja za okvire (frame), postavljanje i podizanje protivnika s klupe. Reaktivan hvat i preusmjeravanje odražava zahtjeve brzine borbe rukama.\n\n---\n\n## Zamasi girjom (KB Swings)\n\n**Kategorija:** Snaga / Eksplozivnost (Power / Explosive)  \n**Primarne mišićne grupe:** Gluteusi, zadnja loža, jezgra (core), latisimus (lats)  \n**Oprema:** Girja (kettlebell)\n\n### Postava\n\nStopala malo šire od širine ramena. Girja na podu malo ispred tebe. Zamahni zvono nazad između nogu.\n\n### Izvođenje\n\nPucni kukovima naprijed — ruke samo prate vožnju. Zvono bi trebalo lebdjeti do visine prsa/očiju (ruski stil) ili iznad glave (američki stil). Jako stisni gluteuse na vrhu.\n\n### Česte greške\n\n- Čučanj umjesto zamaha (treba biti šarka u kukovima)\n- korištenje ruku za dizanje\n- prekomjerno opružanje leđa na vrhu.\n\n### MMA primjena\n\nSnažan pucanj kukova direktno se prenosi na snagu udaraca, brzinu provala (sprawl) i premošćivanje/škrimanje u grapplingu. Zamasi s mnogo ponavljanja također grade izdržljivost zadnjeg lanca za kasne runde.\n\n---\n\n## Trzaj girjom (KB Snatch)\n\n**Kategorija:** Snaga / Eksplozivnost (Power / Explosive)  \n**Primarne mišićne grupe:** Gluteusi, zadnja loža, ramena, trapezius, jezgra (core)  \n**Oprema:** Girja (kettlebell)\n\n### Postava\n\nSlično kao početak zamaha. Jedna ruka na zvonu.\n\n### Izvođenje\n\nZamahni nazad, pucni kukovima, dok zvono raste vodi ga oko zgloba i probij do zaključavanja iznad glave. Kontroliraj spuštanje preusmjeravajući zvono nazad između nogu.\n\n### Česte greške\n\n- Zvono udara u zglob (putanja je pogrešna)\n- istiskivanje na vrhu umjesto probijanja\n- nekorištenje kukova.\n\n### MMA primjena\n\nKombinira eksplozivnu ekstenziju kukova sa stabilnošću iznad glave i hvatom — odražava ekspresiju snage cijelim tijelom prilikom bacanja overhenda ili završavanja podizanja s visokim zahvatom. Odličan efekat kondicije.\n\n---\n\n## Hang čišćenje (Hang Clean)\n\n**Kategorija:** Snaga / Eksplozivnost (Power / Explosive)  \n**Primarne mišićne grupe:** —  \n**Oprema:** —\n\n### Postava\n\n—\n\n### Izvođenje\n\n—\n\n### Česte greške\n\n- —\n\n### MMA primjena\n\nPogledaj sekciju Složene vježbe sa šipkom iznad.\n\n---\n\n## Potisak s pogonom (Push Press)\n\n**Kategorija:** Snaga / Eksplozivnost (Power / Explosive)  \n**Primarne mišićne grupe:** —  \n**Oprema:** —\n\n### Postava\n\n—\n\n### Izvođenje\n\n—\n\n### Česte greške\n\n- —\n\n### MMA primjena\n\nPogledaj sekciju Složene vježbe sa šipkom iznad.\n\n---\n\n## Udaranje bojnim užadima (Battle Rope Slams)\n\n**Kategorija:** Snaga / Eksplozivnost (Power / Explosive)  \n**Primarne mišićne grupe:** Ramena, jezgra (core), latisimus (lats), hvat  \n**Oprema:** Bojna užad (3-5 cm, 12-15 m)\n\n### Postava\n\nStani u atletski stav, blago savijanje, jedan kraj užeta u svakoj ruci. Sidrište ispred.\n\n### Izvođenje\n\nIzmjenjuj ruke (valovi) ili udari obje zajedno. Generiraj silu iz kukova, ne samo iz ramena. Drži ritam — ne dopusti da užad oslabe.\n\n### Česte greške\n\n- Stajanje previše uspravno (bez angažmana kukova)\n- grčenje rukama (podlaktice instant izgaraju)\n- stajanje preblizu sidrištu (nema tenzije).\n\n### MMA primjena\n\nIzdržljivost snage gornjeg dijela tijela pod umorom — simulira ponovljene eksplozivne radnje ruku tokom udaranja u kasnijim rundama. Bilateralni udarci treniraju snagu ground-and-pounda; izmjenični valovi grade izdržljivost ramena potrebnu za duge razmjene u klinču.\n\n---\n\n## Zgibovi s opterećenjem (Weighted Pull-Ups)\n\n**Kategorija:** Dodaci za gornji dio tijela (Upper Body Accessories)  \n**Primarne mišićne grupe:** Latisimus (lats), bicepsi, zadnji deltoidi, hvat  \n**Oprema:** Šipka za zgibove, pojas za tegove ili bučica između stopala\n\n### Postava\n\nVisi sa šipke, nadlani hvat malo širi od ramena. Dodaj opterećenje putem pojasa ili bučice.\n\n### Izvođenje\n\nPokreni latisimusom (misli laktovi prema kukovima), povuci bradu iznad šipke, kontroliraj spuštanje do pune ekstenzije.\n\n### Česte greške\n\n- Kip / ljuljanje\n- nedostizanje pune ekstenzije na dnu\n- brada ne prelazi šipku.\n\n### MMA primjena\n\nSnaga povlačenja je esencijalna za kontrolu klinča, giljotine, prednje zahvate glave, povlačenje ruke (arm drag) i povlačenje protivnika od kaveza. Hvat pod opterećenjem gradi trajnu izdržljivost klinča.\n\n---\n\n## Veslanje bučicom (Dumbbell Row)\n\n**Kategorija:** Dodaci za gornji dio tijela (Upper Body Accessories)  \n**Primarne mišićne grupe:** Latisimus (lats), romboidni, zadnji deltoidi, bicepsi  \n**Oprema:** Bučica, klupa\n\n### Postava\n\nJedno koljeno i ruka na klupi, suprotno stopalo na podu. Ravna leđa, bučica visi na ispruženoj ruci.\n\n### Izvođenje\n\nPovuci bučicu prema kuku, stisni lopaticu nazad i dolje. Spusti pod kontrolom.\n\n### Česte greške\n\n- Rotiranje torza da se digne teg\n- veslanje prema ramenu umjesto kuku\n- žurenje ponavljanja.\n\n### MMA primjena\n\nJednostrana snaga povlačenja za zahvate jednom rukom za ovratnik, borbe za potkopavanje (underhook) i kontrolu ruke u gardi. Rješava lijevu-desnu neravnotežu čestu kod boraca s dominantnim stavom.\n\n---\n\n## Kosi potisak sa šipkom (Landmine Press)\n\n**Kategorija:** Dodaci za gornji dio tijela (Upper Body Accessories)  \n**Primarne mišićne grupe:** Prsa, ramena, tricepsi, jezgra (core) (anti-rotacija)  \n**Oprema:** Šipka, landmine nastavak (ili ugao)\n\n### Postava\n\nStani u razdvojeni stav, drži kraj šipke na visini ramena jednom rukom.\n\n### Izvođenje\n\nPotisni šipku gore i naprijed pod blagim uglom. Stisni jezgru da spriječiš rotaciju. Kontroliraj povratak.\n\n### Česte greške\n\n- Širenje lakta\n- rotiranje torza\n- nestabilizirana jezgra\n- potiskivanje ravno gore umjesto duž luka šipke.\n\n### MMA primjena\n\nUgaoni put potiskivanja vjerno oponaša džeb (jab) i kroše (cross). Izvođenje jednom rukom zahtijeva anti-rotaciju — istu stabilnost jezgre potrebnu pri oslanjanju na protivnika ili okviru iz donje pozicije.\n\n---\n\n## Kosi potisak bučicama (Incline DB Press)\n\n**Kategorija:** Dodaci za gornji dio tijela (Upper Body Accessories)  \n**Primarne mišićne grupe:** Gornja prsa, prednji deltoidi, tricepsi  \n**Oprema:** Bučice, podesiva klupa (30-45 stepeni)\n\n### Postava\n\nSjedi na kosu klupu, bučice na ramenima, stopala ravno na podu, leđa prislonjena na podlogu.\n\n### Izvođenje\n\nPotisni bučice gore i blago prema unutra, bez udaranja na vrhu. Spusti na ramena pod kontrolom.\n\n### Česte greške\n\n- Pretjerano savijanje leđa (smanjuje kosi ugao)\n- širenje laktova\n- odskakivanje na dnu.\n\n### MMA primjena\n\nSnaga potiskivanja gornjih prsa i ramena za okvire iz donje pozicije, oslanjanje na kavez i odguravanje protivnika. Putanja bučice omogućava opseg kretanja pogodan za ramena boraca s postojećim habanjem ramena.\n\n---\n\n## Sklekovi — standardni (Push-Up — Standard)\n\n**Kategorija:** Dodaci za gornji dio tijela (Upper Body Accessories)  \n**Primarne mišićne grupe:** Prsa, tricepsi, prednji deltoidi, jezgra (core)  \n**Oprema:** Vlastita težina\n\n### Postava\n\nRuke u širini ramena, tijelo u ravnoj liniji od glave do peta.\n\n### Izvođenje\n\nSpusti prsa do poda, laktovi na 45 stepeni, potisni nazad gore. Zaključaj na vrhu.\n\n### Česte greške\n\n- Tonjenje kukova\n- širenje laktova na 90 stepeni\n- djelomičan opseg kretanja.\n\n### MMA primjena\n\nOsnovna izdržljivost potiskivanja za održavanje okvira (frame), bijeg iz donjih pozicija i postavljanje. Kapacitet visokog broja ponavljanja znači snaga potiskivanja koja traje i u šampionskim rundama.\n\n---\n\n## Sklekovi — dijamant (Push-Up — Diamond)\n\n**Kategorija:** Dodaci za gornji dio tijela (Upper Body Accessories)  \n**Primarne mišićne grupe:** Tricepsi, unutrašnja prsa, jezgra (core)  \n**Op
