<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MMA Fighter Development Program</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Anybody:wght@400;600;700;900&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#08080c;
  --bg-card:#0f0f14;
  --bg-card-hover:#141419;
  --bg-raised:#18181f;
  --bg-surface:#1c1c24;
  --border:#1a1a22;
  --border-bright:#28283a;
  --text:#c8c8d0;
  --text-bright:#ededf0;
  --text-dim:#62627a;
  --text-faint:#3e3e52;
  --accent:#f97316;
  --accent-soft:rgba(249,115,22,.08);
  --accent-med:rgba(249,115,22,.15);
  --accent-glow:rgba(249,115,22,.3);
  --accent-bright:#fba04b;
  --green:#22c55e;
  --blue:#3b82f6;
  --purple:#a855f7;
  --red:#ef4444;
  --sidebar-w:272px;
  --radius:10px;
  --radius-lg:14px;
  --font-display:'Anybody',system-ui,sans-serif;
  --font-body:'DM Sans',system-ui,-apple-system,sans-serif;
  --font-mono:'JetBrains Mono',monospace;
}
html{scroll-behavior:smooth;scrollbar-color:var(--border) var(--bg)}
body{
  font-family:var(--font-body);font-size:15px;line-height:1.75;
  color:var(--text);background:var(--bg);
  min-height:100vh;overflow-x:hidden;
  -webkit-font-smoothing:antialiased;
}

/* ═══════════════════════════════════
   NOISE TEXTURE OVERLAY
   ═══════════════════════════════════ */
body::after{
  content:'';position:fixed;inset:0;z-index:9999;pointer-events:none;
  opacity:.025;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
  background-repeat:repeat;background-size:256px 256px;
}

/* ═══════════════════════════════════
   SIDEBAR
   ═══════════════════════════════════ */
.sidebar{
  position:fixed;top:0;left:0;bottom:0;width:var(--sidebar-w);
  background:linear-gradient(180deg,#0c0c12 0%,var(--bg) 100%);
  border-right:1px solid var(--border);
  display:flex;flex-direction:column;z-index:100;
  transition:transform .35s cubic-bezier(.4,0,.2,1);
}
.sidebar-header{
  padding:24px 22px 18px;
  border-bottom:1px solid var(--border);
  position:relative;
}
.sidebar-header::after{
  content:'';position:absolute;bottom:-1px;left:22px;width:60px;
  height:2px;background:var(--accent);border-radius:1px;
}
.sidebar-brand{
  display:flex;align-items:center;gap:10px;margin-bottom:14px;
}
.brand-mark{
  width:36px;height:36px;border-radius:10px;
  background:linear-gradient(135deg,var(--accent),#e05a00);
  display:flex;align-items:center;justify-content:center;
  font-size:16px;flex-shrink:0;
  box-shadow:0 2px 12px var(--accent-glow);
}
.brand-text{
  font-family:var(--font-display);font-size:13px;font-weight:900;
  letter-spacing:.05em;text-transform:uppercase;color:var(--text-bright);
  line-height:1.2;
}
.brand-text span{
  color:var(--text-dim);display:block;font-size:9.5px;
  letter-spacing:.12em;margin-top:2px;font-weight:600;
  font-family:var(--font-body);
}

/* ── Download Button ── */
.dl-btn{
  display:flex;align-items:center;gap:8px;
  margin-top:12px;padding:9px 14px;
  background:linear-gradient(135deg,var(--bg-raised),var(--bg-surface));
  border:1px solid var(--border);border-radius:8px;
  color:var(--text-dim);font-family:var(--font-body);font-size:11.5px;font-weight:600;
  text-decoration:none;transition:all .2s;letter-spacing:.02em;
  cursor:pointer;width:100%;
}
.dl-btn:hover{color:var(--text-bright);border-color:var(--accent);background:var(--accent-soft)}
.dl-btn svg{width:16px;height:16px;flex-shrink:0;opacity:.6}
.dl-btn:hover svg{opacity:1}

/* ── Language Toggle ── */
.lang-toggle{
  display:flex;
  background:var(--bg);border-radius:8px;
  border:1px solid var(--border);overflow:hidden;
  position:relative;
}
.lang-toggle::before{
  content:'';position:absolute;top:2px;bottom:2px;width:calc(50% - 2px);
  background:var(--accent);border-radius:6px;
  transition:transform .25s cubic-bezier(.4,0,.2,1);
  left:2px;z-index:0;
}
.lang-toggle.bos::before{transform:translateX(100%)}
.lang-btn{
  flex:1;padding:6px 0;border:none;background:none;
  color:var(--text-dim);font-family:var(--font-body);
  font-size:11px;font-weight:700;letter-spacing:.08em;
  cursor:pointer;transition:color .25s;text-transform:uppercase;
  position:relative;z-index:1;
}
.lang-btn.active{color:#000}
.lang-btn:not(.active):hover{color:var(--text-bright)}

.sidebar-nav{flex:1;overflow-y:auto;padding:14px 10px;scrollbar-width:thin}
.sidebar-nav a{
  display:flex;align-items:center;gap:11px;
  padding:9px 14px;border-radius:9px;
  color:var(--text-dim);text-decoration:none;font-size:13px;font-weight:500;
  transition:all .15s ease;margin-bottom:1px;position:relative;
  letter-spacing:.01em;
}
.sidebar-nav a:hover{color:var(--text-bright);background:rgba(255,255,255,.03)}
.sidebar-nav a.active{
  color:var(--accent);background:var(--accent-soft);
  font-weight:600;
}
.sidebar-nav a.active::before{
  content:'';position:absolute;left:0;top:8px;bottom:8px;width:3px;
  background:var(--accent);border-radius:0 3px 3px 0;
  box-shadow:0 0 10px var(--accent-glow);
}
.nav-icon{
  width:26px;height:22px;display:flex;align-items:center;justify-content:center;
  font-size:12px;flex-shrink:0;opacity:.5;
  font-family:var(--font-mono);font-weight:500;
}
.sidebar-nav a.active .nav-icon{opacity:1}
.nav-divider{
  font-size:9px;text-transform:uppercase;letter-spacing:.16em;
  color:var(--text-faint);padding:18px 14px 6px;font-weight:700;
  user-select:none;
}
.nav-divider:first-child{padding-top:4px}

/* ═══════════════════════════════════
   MAIN AREA
   ═══════════════════════════════════ */
.main{margin-left:var(--sidebar-w);min-height:100vh;position:relative}
.main::before{
  content:'';position:fixed;top:-200px;right:-200px;
  width:700px;height:700px;
  background:radial-gradient(circle,rgba(249,115,22,.04) 0%,transparent 60%);
  pointer-events:none;z-index:0;
}
.main::after{
  content:'';position:fixed;bottom:-300px;left:30%;
  width:600px;height:600px;
  background:radial-gradient(circle,rgba(59,130,246,.02) 0%,transparent 60%);
  pointer-events:none;z-index:0;
}
.content{
  max-width:820px;margin:0 auto;padding:48px 44px 100px;
  position:relative;z-index:1;
}

/* ═══════════════════════════════════
   HAMBURGER & OVERLAY (MOBILE)
   ═══════════════════════════════════ */
.hamburger{
  display:none;position:fixed;top:12px;left:12px;z-index:200;
  width:44px;height:44px;border-radius:var(--radius);
  background:rgba(15,15,20,.85);border:1px solid var(--border);
  cursor:pointer;flex-direction:column;align-items:center;justify-content:center;gap:5px;
  backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
  transition:all .2s;
}
.hamburger:hover{background:var(--bg-raised);border-color:var(--border-bright)}
.hamburger span{
  display:block;width:18px;height:1.5px;background:var(--text);
  border-radius:1px;transition:all .3s cubic-bezier(.4,0,.2,1);
}
.hamburger.active span:nth-child(1){transform:rotate(45deg) translate(4.5px,4.5px)}
.hamburger.active span:nth-child(2){opacity:0;transform:scaleX(0)}
.hamburger.active span:nth-child(3){transform:rotate(-45deg) translate(4.5px,-4.5px)}
.overlay{
  display:none;position:fixed;inset:0;
  background:rgba(0,0,0,.65);z-index:90;
  backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
}

/* ═══════════════════════════════════
   MARKDOWN RENDERED CONTENT
   ═══════════════════════════════════ */

/* ── H1 — Page title ── */
.md h1{
  font-family:var(--font-display);font-size:36px;font-weight:900;
  color:var(--text-bright);margin:0 0 6px;line-height:1.1;
  letter-spacing:-.02em;
}
.md h1::after{
  content:'';display:block;width:44px;height:3px;
  background:var(--accent);
  border-radius:2px;margin-top:18px;margin-bottom:12px;
}

/* ── H2 — Major sections ── */
.md h2{
  font-family:var(--font-display);font-size:21px;font-weight:700;
  color:var(--text-bright);margin:48px 0 16px;line-height:1.2;
  letter-spacing:0;
  padding:14px 18px;
  background:linear-gradient(135deg,var(--bg-card) 0%,var(--bg-raised) 100%);
  border:1px solid var(--border);
  border-left:3px solid var(--accent);
  border-radius:var(--radius);
}

/* ── H3 — Sub-sections ── */
.md h3{
  font-size:16.5px;font-weight:600;color:var(--text-bright);
  margin:36px 0 10px;letter-spacing:.01em;
  padding-bottom:8px;
  border-bottom:1px solid var(--border);
}

/* ── H4 — Labels ── */
.md h4{
  font-size:12px;font-weight:700;color:var(--accent);
  margin:28px 0 8px;text-transform:uppercase;letter-spacing:.08em;
  display:flex;align-items:center;gap:8px;
}
.md h4::before{
  content:'';width:8px;height:8px;border-radius:2px;
  background:var(--accent);opacity:.4;flex-shrink:0;
}

.md p{margin:0 0 16px}
.md a{color:var(--accent);text-decoration:none;transition:all .2s;
  background:linear-gradient(transparent 85%,var(--accent-soft) 85%);
}
.md a:hover{color:var(--accent-bright);background:linear-gradient(transparent 85%,var(--accent-med) 85%)}
.md strong{color:var(--text-bright);font-weight:600}
.md em{color:var(--text-dim)}
.md ul,.md ol{margin:0 0 18px;padding-left:22px}
.md li{margin-bottom:5px}
.md li::marker{color:var(--accent)}
.md hr{border:none;height:1px;background:var(--border);margin:36px 0}

/* ── Blockquotes — used for week metadata ── */
.md blockquote{
  margin:20px 0;padding:18px 22px;
  background:linear-gradient(135deg,var(--accent-soft),rgba(249,115,22,.03));
  border:1px solid rgba(249,115,22,.12);
  border-radius:var(--radius-lg);
  color:var(--text);font-style:normal;
  position:relative;overflow:hidden;
}
.md blockquote::before{
  content:'';position:absolute;top:0;left:0;bottom:0;width:3px;
  background:var(--accent);
}
.md blockquote p{margin-bottom:4px}
.md blockquote p:last-child{margin-bottom:0}

/* ── Tables ── */
.table-wrap{
  overflow-x:auto;margin:20px 0 28px;
  border-radius:var(--radius-lg);
  border:1px solid var(--border);
  background:var(--bg-card);
  box-shadow:0 4px 24px rgba(0,0,0,.25),0 1px 3px rgba(0,0,0,.15);
}
.md table{width:100%;border-collapse:collapse;font-size:13.5px}
.md thead{background:var(--bg-surface)}
.md th{
  text-align:left;padding:12px 16px;font-weight:600;color:var(--text-bright);
  border-bottom:2px solid var(--border-bright);font-size:10.5px;
  text-transform:uppercase;letter-spacing:.1em;
  white-space:nowrap;font-family:var(--font-body);
}
.md td{padding:11px 16px;border-bottom:1px solid var(--border)}
.md tr:last-child td{border-bottom:none}
.md tbody tr{transition:background .15s}
.md tbody tr:nth-child(even){background:rgba(255,255,255,.01)}
.md tbody tr:hover{background:rgba(249,115,22,.04)}

/* ── Code ── */
.md code{
  background:var(--bg-raised);border:1px solid var(--border);
  border-radius:5px;padding:2px 7px;font-size:12.5px;color:var(--accent);
  font-family:var(--font-mono);
}
.md pre{
  background:var(--bg-card);border:1px solid var(--border);
  border-radius:var(--radius);padding:18px 20px;margin:18px 0;
  overflow-x:auto;box-shadow:0 2px 8px rgba(0,0,0,.15);
}
.md pre code{background:none;border:none;padding:0;color:var(--text)}

/* ── Lists inside tables ── */
.md td ul,.md td ol{margin:4px 0;padding-left:16px}
.md td li{margin-bottom:2px;font-size:13px}

/* ═══════════════════════════════════
   SECTION TRANSITION
   ═══════════════════════════════════ */
.md{animation:sectionIn .5s cubic-bezier(.16,1,.3,1)}
@keyframes sectionIn{
  from{opacity:0;transform:translateY(20px)}
  to{opacity:1;transform:none}
}

/* ═══════════════════════════════════
   BACK TO TOP
   ═══════════════════════════════════ */
.back-top{
  position:fixed;bottom:28px;right:28px;width:44px;height:44px;
  border-radius:12px;background:var(--accent);color:#000;
  border:none;cursor:pointer;font-size:18px;font-weight:700;
  opacity:0;transform:translateY(10px);
  transition:all .35s cubic-bezier(.4,0,.2,1);
  z-index:50;display:flex;align-items:center;justify-content:center;
  box-shadow:0 4px 24px var(--accent-glow);
}
.back-top.visible{opacity:1;transform:none}
.back-top:hover{transform:scale(1.08) translateY(-2px);box-shadow:0 8px 32px var(--accent-glow)}

/* ═══════════════════════════════════
   RESPONSIVE — TABLET
   ═══════════════════════════════════ */
@media(max-width:1024px){
  :root{--sidebar-w:248px}
  .content{padding:40px 28px 80px}
}

/* ═══════════════════════════════════
   RESPONSIVE — MOBILE
   ═══════════════════════════════════ */
@media(max-width:768px){
  .sidebar{transform:translateX(-100%);width:280px}
  .sidebar.open{transform:translateX(0);box-shadow:12px 0 48px rgba(0,0,0,.6)}
  .hamburger{display:flex}
  .overlay.open{display:block}
  .main{margin-left:0}
  .content{padding:16px 14px 60px;padding-top:70px}
  .md h1{font-size:26px}
  .md h2{font-size:18px;margin-top:32px;padding:12px 14px}
  .md h3{font-size:15px;margin-top:24px}
  .table-wrap{margin-left:-6px;margin-right:-6px;border-radius:10px}
  .md th{padding:10px 12px;font-size:9.5px}
  .md td{padding:9px 12px;font-size:13px}
  .back-top{bottom:16px;right:16px;width:40px;height:40px;font-size:16px;border-radius:10px}
  .md blockquote{padding:14px 16px}
}

/* ═══════════════════════════════════
   RESPONSIVE — SMALL PHONES
   ═══════════════════════════════════ */
@media(max-width:400px){
  .content{padding:12px 10px 50px;padding-top:66px}
  .md h1{font-size:22px}
  .md h2{font-size:16px;padding:10px 12px}
  .md table{font-size:11.5px}
  .md th{padding:8px 8px;font-size:9px}
  .md td{padding:7px 8px;font-size:12px}
}

/* Scrollbar */
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--border-bright)}

/* ── Selection ── */
::selection{background:var(--accent-med);color:var(--text-bright)}
</style>
</head>
<body>

<!-- Mobile hamburger -->
<button class="hamburger" id="hamburger" aria-label="Open navigation">
  <span></span><span></span><span></span>
</button>
<div class="overlay" id="overlay"></div>

<!-- Sidebar -->
<aside class="sidebar" id="sidebar">
  <div class="sidebar-header">
    <div class="sidebar-brand">
      <div class="brand-mark">&#9876;</div>
      <div class="brand-text" id="brand-text">
        MMA Training
        <span id="brand-subtitle">4-Week Development Program</span>

    <a class="dl-btn" href="MMA_Training_Tracker.xlsx" download id="dl-btn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      <span id="dl-text">Download Excel Tracker</span>
    </a>
  </div>
  <nav class="sidebar-nav" id="nav"></nav>
</aside>

<!-- Main content -->
<main class="main">
  <div class="content">
    <div id="page" class="md"></div>

</main>

<!-- Back to top -->
<button class="back-top" id="backtop" aria-label="Back to top">&#8593;</button>

<script>
// ── Content data (injected at build time) ──
var CONTENT_EN = {"overview": "# MMA Fighter Development Program — 4-Week General Preparation Mesocycle\n\n## Athlete Profile\n\n| Attribute | Detail |\n|-----------|--------|\n| Sex | Male |\n| Walking Weight | 87-90 kg |\n| Height | 185 cm |\n| Target Weight Class | Middleweight (83.9 kg) or Light Heavyweight (93 kg) |\n| Experience | 3-4 years amateur MMA |\n| Availability | Monday-Saturday (Sunday full rest) |\n| Facility Access | Full commercial gym + MMA gym |\n| Injuries | None current |\n| Primary Goal | All-around improvement — gas tank, strength without mass, technique, durability |\n\n---\n\n## Training Philosophy\n\nThis program draws from several proven methodologies, combined into a cohesive framework for MMA fighter development.\n\n### Concurrent Training Model (Alex Viada)\nDevelop multiple physical qualities — strength, power, endurance, and sport-specific conditioning — simultaneously within the same training week. Sessions are sequenced to minimize interference between competing adaptations (e.g., heavy strength is separated from high-volume endurance by at least 6 hours).\n\n### Energy Systems Development (Joel Jamieson)\nBuild a robust aerobic base through cardiac output work (sustained heart rate at 130-150 BPM for 30-60 minutes). Once the aerobic floor is established, layer in anaerobic capacity work through intervals and fight-specific circuits. A strong aerobic base accelerates recovery between rounds and between sessions.\n\n### Strength Without Mass (Pavel Tsatsouline)\nPrioritize neural adaptations over hypertrophy. Use low rep ranges (1-5 reps), submaximal loads (70-85% 1RM), and longer rest periods (3-5 minutes). Avoid training to failure. This builds maximal strength and rate of force development without adding bodyweight that could push past the target weight class.\n\n### Triphasic Training Elements (Cal Dietz)\nStructure strength work through three contraction phases:\n- **Eccentric** — controlled lowering (3-5 second tempos) to build force absorption capacity and tendon resilience\n- **Isometric** — paused reps at sticking points to develop positional strength and stability\n- **Concentric** — explosive lifting to develop power output and rate of force development\n\n### Volume Over Intensity for Skill Work (Firas Zahabi)\nTrain MMA skills frequently but stay below the injury threshold. Most technical sessions should feel like a 6-7 out of 10 effort. Hard sparring is limited to once per week. This approach accumulates more total skill reps over time while keeping the athlete healthy and available for training.\n\n### Functional Movement (Mike Boyle)\nEmphasize single-leg exercises (Bulgarian split squats, single-leg RDLs, lunges) to address bilateral deficits and mirror the demands of fighting. Core work focuses on anti-rotation, anti-extension, and anti-lateral flexion rather than crunches — the core's primary job in fighting is to resist unwanted movement.\n\n### Prehab Focus (Eric Cressey)\nEvery session includes dedicated prehab work: shoulder health (band pull-aparts, face pulls, external rotations), hip mobility (90/90 switches, hip CARs, adductor work), and ankle/wrist mobility. Prevention is built into the warm-up, not treated as an afterthought.\n\n### Fighter-Specific Programming (Phil Daru)\nCompound movements are selected for direct cage carryover. Exercises mimic the force vectors, joint angles, and energy demands of fighting. Landmine presses for clinch work, hip escapes loaded with bands, Turkish get-ups for ground-to-standing transitions.\n\n---\n\n## How to Read the Plans\n\n### RPE Scale (Rate of Perceived Exertion)\n\n| RPE | Description |\n|-----|-------------|\n| 1-2 | Very light — barely any effort |\n| 3-4 | Light — easy conversation, warm-up intensity |\n| 5-6 | Moderate — steady effort, can talk in short sentences |\n| 7 | Hard — challenging, could do 3 more reps |\n| 8 | Very hard — could do 1-2 more reps |\n| 9 | Near maximal — maybe 1 more rep with good form |\n| 10 | Maximal — absolute limit, form may break |\n\n### Percentage-Based Loading\n\nAll barbell lifts are programmed as a percentage of your estimated 1-rep max (1RM). For example, \"Back Squat 4x3 @ 80%\" means 4 sets of 3 reps at 80% of your Back Squat 1RM (120 kg in this case).\n\n### Tempo Notation\n\nWritten as four numbers: **Eccentric-Pause at Bottom-Concentric-Pause at Top**\n\nExample: **3-1-1-0**\n- **3** = 3 seconds lowering the weight (eccentric)\n- **1** = 1 second pause at the bottom position\n- **1** = 1 second lifting the weight (concentric)\n- **0** = 0 seconds pause at the top before the next rep\n\nAn **X** in the concentric position means explosive (move as fast as possible).\n\n### Heart Rate Zones\n\n| Zone | Name | BPM Range | Feel |\n|------|------|-----------|------|\n| Zone 1 | Recovery | 100-120 BPM | Very easy, can hold full conversation |\n| Zone 2 | Aerobic Base | 130-150 BPM | Comfortable, could sustain for 60+ min |\n| Zone 3 | Tempo | 150-165 BPM | Moderately hard, conversation in fragments |\n| Zone 4 | Threshold | 165-180 BPM | Hard, can only speak a few words |\n| Zone 5 | Max Effort | 180+ BPM | All-out, unsustainable beyond 30-60 seconds |\n\n*BPM ranges are approximate for a trained male athlete aged 25-35. Adjust based on individual max heart rate.*\n\n### Session Intensity Markers\n\n- 🟢 **Easy** — Recovery pace, low CNS demand, should feel refreshed after\n- 🟡 **Moderate** — Working hard but controlled, manageable fatigue\n- 🔴 **Hard** — High demand, significant fatigue expected, plan recovery accordingly\n\n---\n\n## Estimated 1RMs Used for Programming\n\n| Lift | Estimated 1RM |\n|------|---------------|\n| Back Squat | 150 kg |\n| Deadlift | 180 kg |\n| Bench Press | 115 kg |\n| Overhead Press | 75 kg |\n\nThese numbers drive all percentage-based loading in the program. Reassess at the end of each mesocycle.\n\n---\n\n## Equipment Needed\n\n### Gym Equipment\n- Barbell and plates (up to 180+ kg)\n- Dumbbells (range up to 40+ kg)\n- Kettlebells (16 kg, 20 kg, 24 kg, 28 kg, 32 kg)\n- Pull-up bar\n- Dip station\n- Assault bike / Airdyne\n- Rowing machine (Concept2 or similar)\n- Ski erg\n- Resistance bands — light, medium, heavy\n- Medicine balls (4 kg, 6 kg, 8 kg, 10 kg)\n- Battle ropes\n- Sledgehammer + tire\n- Foam roller\n- Lacrosse ball\n\n### Monitoring\n- Heart rate monitor — chest strap recommended (see Tracking section below)\n\n### MMA Gym\n- Heavy bag\n- Thai pads\n- Focus mitts\n- Wrestling mats\n- Cage access\n\n---\n\n## Recommended Tracking\n\n| Tool | Purpose | Recommendation |\n|------|---------|----------------|\n| Heart Rate Monitor | Session intensity, cardiac output pacing, recovery | Polar H10 or Garmin HRM-Pro (chest strap for accuracy) |\n| Training Log | Track loads, sets, reps, and session notes | Google Sheets, Strong app, or a physical notebook |\n| RPE Tracking | Monitor fatigue and readiness each session | Log RPE for every working set and an overall session RPE |\n| Weekly Weigh-ins | Track body composition trends | Same conditions every time: morning, fasted, post-bathroom |\n| Resting Heart Rate | Monitor recovery and overtraining risk | Measure upon waking before getting out of bed, log daily |\n\nA rising resting heart rate (5-7+ BPM above baseline over several days) is an early warning sign of accumulated fatigue or illness. Consider backing off training if this occurs.\n", "schedule": "# 4-Week Training Schedule — Calendar View\n\n## Intensity Key\n\n| Marker | Meaning |\n|--------|---------|\n| 🟢 | Easy — recovery pace, low CNS demand |\n| 🟡 | Moderate — working hard but controlled |\n| 🔴 | Hard — high demand, plan recovery accordingly |\n\n---\n\n## Week 1 — Base Volume\n\n**Focus:** Movement quality, establish loading baselines, RPE 6-7 across all sessions.\n\n| Day | AM Session | PM Session |\n|-----|-----------|------------|\n| **Monday** | Strength — Upper Push/Pull (60 min) 🟡 | MMA Striking (75 min) 🔴 |\n| **Tuesday** | Cardiac Output Cardio (40 min) 🟢 | MMA Grappling (75 min) 🟡 |\n| **Wednesday** | Strength — Lower Body + Posterior Chain (65 min) 🔴 | Light Technique / Open Mat (60 min) 🟢 |\n| **Thursday** | HIIT / Fight-Specific Circuit (35 min) 🔴 | MMA Sparring (90 min) 🔴 |\n| **Friday** | Strength — Full Body Power (55 min) 🟡 | MMA Drilling — Technique Refinement (75 min) 🟡 |\n| **Saturday** | Fight Conditioning / Active Recovery (40 min) 🟡 | Open Mat / Light Technical (60 min) 🟢 |\n| **Sunday** | REST | REST |\n\n### Week 1 — Volume Summary\n\n| Metric | Value |\n|--------|-------|\n| Total Sessions | 12 |\n| Total Training Hours | ~12.5 hours |\n| Strength Sessions | 3 |\n| MMA/Skill Sessions | 5 |\n| Conditioning Sessions | 3 |\n| Active Recovery | 1 |\n| Intensity Distribution | 🟢 x3 / 🟡 x5 / 🔴 x4 |\n\n### Week 1 — Progression Notes\n- Main lifts at 70-75% 1RM, 3-4 sets of 3-5 reps\n- Conditioning: 3-4 rounds per circuit, 1:2 work-to-rest ratio\n- Cardiac output: sustain Zone 2 (130-150 BPM) for full duration\n- Sparring: controlled, ~70% intensity, focus on implementing specific techniques\n- Log all weights, RPEs, and heart rate data to establish baselines\n\n---\n\n## Week 2 — Progressive Overload\n\n**Focus:** Incremental load increase, +1 conditioning round, RPE 7-8.\n\n| Day | AM Session | PM Session |\n|-----|-----------|------------|\n| **Monday** | Strength — Upper Push/Pull (60 min) 🟡 | MMA Striking (75 min) 🔴 |\n| **Tuesday** | Cardiac Output Cardio (45 min) 🟢 | MMA Grappling (75 min) 🟡 |\n| **Wednesday** | Strength — Lower Body + Posterior Chain (65 min) 🔴 | Light Technique / Open Mat (60 min) 🟢 |\n| **Thursday** | HIIT / Fight-Specific Circuit (40 min) 🔴 | MMA Sparring (90 min) 🔴 |\n| **Friday** | Strength — Full Body Power (55 min) 🟡 | MMA Drilling — Technique Refinement (75 min) 🟡 |\n| **Saturday** | Fight Conditioning / Active Recovery (45 min) 🟡 | Open Mat / Light Technical (60 min) 🟢 |\n| **Sunday** | REST | REST |\n\n### Week 2 — Volume Summary\n\n| Metric | Value |\n|--------|-------|\n| Total Sessions | 12 |\n| Total Training Hours | ~13.0 hours |\n| Strength Sessions | 3 |\n| MMA/Skill Sessions | 5 |\n| Conditioning Sessions | 3 |\n| Active Recovery | 1 |\n| Intensity Distribution | 🟢 x3 / 🟡 x5 / 🔴 x4 |\n\n### Week 2 — Progression Notes\n- Main lifts: +2.5 kg on upper lifts, +5 kg on lower lifts (or +1 set on accessories)\n- Conditioning: +1 round per circuit, tighten rest intervals slightly (1:1.5 work-to-rest)\n- Cardiac output: extend duration by 5 min, maintain Zone 2\n- Sparring: increase intensity to ~75-80%, start pressuring pace\n- Accessory work: add 1 set to 2-3 exercises\n\n---\n\n## Week 3 — Peak Volume / Intensity\n\n**Focus:** Hardest week of the block, RPE 8-9, push all qualities.\n\n| Day | AM Session | PM Session |\n|-----|-----------|------------|\n| **Monday** | Strength — Upper Push/Pull (65 min) 🔴 | MMA Striking (75 min) 🔴 |\n| **Tuesday** | Cardiac Output Cardio (45 min) 🟢 | MMA Grappling (80 min) 🔴 |\n| **Wednesday** | Strength — Lower Body + Posterior Chain (70 min) 🔴 | Light Technique / Open Mat (60 min) 🟢 |\n| **Thursday** | HIIT / Fight-Specific Circuit (40 min) 🔴 | MMA Sparring (90 min) 🔴 |\n| **Friday** | Strength — Full Body Power (60 min) 🔴 | MMA Drilling — Technique Refinement (75 min) 🟡 |\n| **Saturday** | Fight Conditioning (45 min) 🔴 | Open Mat / Light Technical (60 min) 🟢 |\n| **Sunday** | REST | REST |\n\n### Week 3 — Volume Summary\n\n| Metric | Value |\n|--------|-------|\n| Total Sessions | 12 |\n| Total Training Hours | ~13.75 hours |\n| Strength Sessions | 3 |\n| MMA/Skill Sessions | 5 |\n| Conditioning Sessions | 3 |\n| Active Recovery | 1 |\n| Intensity Distribution | 🟢 x3 / 🟡 x1 / 🔴 x8 |\n\n### Week 3 — Progression Notes\n- Main lifts at 80-85% 1RM, push top sets to RPE 8-9\n- Conditioning: peak rounds (5-6 per circuit), 1:1 work-to-rest ratio\n- Cardiac output: maintain 45 min Zone 2 — this is the recovery anchor, do not push intensity\n- Sparring: hardest session of the block, full-speed exchanges, simulate fight pace\n- Grappling: add positional sparring rounds, increase resistance from partners\n- Expect significant fatigue by Thursday/Friday — manage sleep and nutrition carefully\n\n---\n\n## Week 4 — Deload\n\n**Focus:** Recovery and supercompensation, volume cut 40-50%, intensity at 70-75%, no hard sparring.\n\n| Day | AM Session | PM Session |\n|-----|-----------|------------|\n| **Monday** | Strength — Upper Push/Pull (40 min) 🟢 | MMA Striking — Light Technical (50 min) 🟡 |\n| **Tuesday** | Cardiac Output Cardio (30 min) 🟢 | MMA Grappling — Flow Rolling (50 min) 🟢 |\n| **Wednesday** | Strength — Lower Body + Posterior Chain (40 min) 🟢 | Mobility / Yoga / Recovery (45 min) 🟢 |\n| **Thursday** | Light Conditioning — Zone 1-2 Only (25 min) 🟢 | MMA Technical Drilling — No Sparring (60 min) 🟡 |\n| **Friday** | Strength — Full Body (35 min) 🟢 | MMA Drilling — Technique Refinement (50 min) 🟢 |\n| **Saturday** | Active Recovery — Easy Cardio (30 min) 🟢 | Open Mat / Light Technical (45 min) 🟢 |\n| **Sunday** | REST | REST |\n\n### Week 4 — Volume Summary\n\n| Metric | Value |\n|--------|-------|\n| Total Sessions | 12 |\n| Total Training Hours | ~8.3 hours |\n| Strength Sessions | 3 |\n| MMA/Skill Sessions | 5 |\n| Conditioning Sessions | 2 |\n| Active Recovery | 2 |\n| Intensity Distribution | 🟢 x10 / 🟡 x2 / 🔴 x0 |\n\n### Week 4 — Progression Notes\n- Main lifts: reduce to 2-3 sets of 3 reps at 70-75% 1RM, focus on speed and crisp technique\n- Drop all accessory work to 2 sets max, reduce weight by 30-40%\n- Conditioning: Zone 1-2 cardio only (heart rate below 150 BPM at all times)\n- No sparring — replace with light technical rolls and positional flow\n- Prioritize sleep (8-9 hours), hydration, and nutrition quality\n- Use soft tissue work daily (foam rolling, lacrosse ball, stretching)\n- Reassess 1RMs and resting heart rate at end of week to gauge adaptation\n\n---\n\n## 4-Week Block Summary\n\n| Week | Total Hours | Session Count | Avg Intensity | Key Theme |\n|------|------------|---------------|---------------|-----------|\n| Week 1 | ~12.5 hrs | 12 | 🟡 Moderate | Build base, establish patterns |\n| Week 2 | ~13.0 hrs | 12 | 🟡 Moderate | Progressive overload |\n| Week 3 | ~13.75 hrs | 12 | 🔴 Hard | Peak volume and intensity |\n| Week 4 | ~8.3 hrs | 12 | 🟢 Easy | Deload and recover |\n| **Total** | **~47.5 hrs** | **48** | — | **General Preparation** |\n\n### Intensity Distribution Across the Block\n\n| Intensity | Week 1 | Week 2 | Week 3 | Week 4 | Total |\n|-----------|--------|--------|--------|--------|-------|\n| 🟢 Easy | 3 | 3 | 3 | 10 | 19 |\n| 🟡 Moderate | 5 | 5 | 1 | 2 | 13 |\n| 🔴 Hard | 4 | 4 | 8 | 0 | 16 |\n\n---\n\n## Session Spacing Guidelines\n\n- **Minimum 6 hours** between AM strength and PM MMA sessions\n- **48 hours** between heavy lower body and hard sparring when possible\n- **No back-to-back 🔴 days** except during Week 3 peak (Thursday)\n- **Post-🔴 sessions**: prioritize 15 min cool-down, foam rolling, and protein intake within 60 min\n", "week-1": "# Week 1 — Base Volume\n\n> **Mesocycle:** Base / Accumulation\n> **Training Age Context:** Intermediate-Advanced\n> **Bodyweight:** 87-90 kg | **Height:** 185 cm\n> **Global RPE Target:** 6-7 (leave 3-4 reps in reserve on all strength work)\n> **Theme:** Movement quality, baseline establishment, conservative loading\n> **1RMs:** Squat 150 kg | Deadlift 180 kg | Bench 115 kg | OHP 75 kg\n\n---\n\n## Monday\n\n### AM — Strength: Upper Push/Pull (60 min) 🟡\n\n**Warm-Up** (10 min) — Reference `warmups.md` for full upper-body protocol\n\n| Exercise | Sets x Reps | Load | Rest | Tempo | RPE | Notes |\n|----------|-------------|------|------|-------|-----|-------|\n| Bench Press | 4 x 4 | 82 kg (71%) | 3 min | 3-1-1-0 | 6-7 | Retract scaps, feet flat, control the eccentric. No bouncing off chest. |\n| Weighted Pull-Up | 4 x 4 | BW + 15 kg | 3 min | 3-1-1-0 | 6-7 | Dead hang start, chin over bar, no kipping. Full extension each rep. |\n| Landmine Press | 3 x 8 | Moderate | 90 s | 2-0-1-0 | 6 | Staggered stance, press at slight angle. Brace core throughout. |\n| DB Row | 3 x 10 | Moderate | 90 s | 2-1-1-0 | 6 | Chest-supported or hand on bench. Pull to hip, squeeze at top. |\n| Push-Up Variation (ring or deficit) | 3 x 12-15 | BW | 60 s | 2-0-1-0 | 6 | Full ROM, protract scaps at top. Slow and controlled. |\n| Face Pull | 3 x 15 | Light band/cable | 60 s | 2-1-1-0 | 5-6 | External rotate at top, thumbs back. Prehab — do not rush. |\n| Band External Rotation | 2 x 15 | Light band | 45 s | 2-1-1-0 | 5 | Elbow pinned to side. Shoulder health work. |\n| Pallof Press | 3 x 10/side | Band/cable | 60 s | 2-1-2-0 | 6 | Lock out arms fully, resist rotation. Breathe. |\n| Ab Wheel Rollout | 3 x 8 | BW | 60 s | 3-0-1-0 | 6 | From knees. Maintain hollow body, no lumbar extension at bottom. |\n\n**Session Total:** 28 working sets, ~55 min\n\n**Cool-Down** (5 min) — Pec doorway stretch 2x30s/side, banded lat stretch 2x30s/side, thoracic foam roll 60s.\n\n---\n\n### PM — MMA Striking (75 min) 🔴\n\n**Warm-Up** (10 min) — Jump rope 3 min, dynamic stretching, neck circles, shadow boxing light 2 min.\n\n| Block | Duration | Description |\n|-------|----------|-------------|\n| Shadow Boxing | 3 x 3 min (1 min rest) | Boxing only. Focus on stance, guard return, footwork. Film one round for coach review. |\n| Pad / Bag Work | 3 x 3 min (1 min rest) | Specific combos as directed by coach. Snap punches, don't load up. Breathe on every shot. |\n| Partner Drills | 3 x 3 min (1 min rest) | Coached technique — focus on clean reps, not speed. Reset between combos. |\n| Live Rounds | 2 x 5 min (2 min rest) | Boxing only. 70% intensity. Prioritize defense and ring movement over output. |\n\n**Cool-Down** (5 min) — Static stretching: hip flexors, shoulders, neck. Light shadow boxing 1 min to decompress.\n\n---\n\n## Tuesday\n\n### AM — Cardiac Output (40 min) 🟢\n\n**Warm-Up** (5 min) — Easy pace build-up on chosen modality.\n\n| Block | Duration | Intensity | Notes |\n|-------|----------|-----------|-------|\n| Zone 2 Sustained | 40 min | 130-150 BPM | Assault bike, rower, or light jog. Pick one and maintain steady HR. Nasal breathing where possible. Should be able to hold a conversation. |\n\n> **HR Target:** Stay in 130-150 BPM. If HR drifts above 150, reduce pace. This is aerobic base work — do not turn it into a tempo session.\n\n**Cool-Down** (5 min) — Walk 2-3 min, light full-body stretching.\n\n---\n\n### PM — MMA Grappling (75 min) 🔴\n\n**Warm-Up** (10 min) — Hip escapes, technical stand-ups, granby rolls, solo movement drills.\n\n| Block | Duration | Description |\n|-------|----------|-------------|\n| Positional Drilling | 20 min | Guard retention and mount escapes. Coach-led technique. Focus on frames, hip movement, and breathing under pressure. |\n| Specific Training | 10 min | Start from positions drilled above. Reset on escape or submission. |\n| Live Rolls | 5 x 5 min (1 min rest) | 70% intensity. Flow roll mentality — work positions, don't death grip. Tap early, reset fast. |\n\n**Cool-Down** (10 min) — Partner stretching, hip 90/90 holds, supine spinal twist 60s/side.\n\n---\n\n## Wednesday\n\n### AM — Strength: Lower + Posterior Chain (65 min) 🟡\n\n**Warm-Up** (10 min) — Reference `warmups.md` for full lower-body protocol\n\n| Exercise | Sets x Reps | Load | Rest | Tempo | RPE | Notes |\n|----------|-------------|------|------|-------|-----|-------|\n| Back Squat | 4 x 4 | 108 kg (72%) | 3 min | 3-1-1-0 | 6-7 | Brace hard, knees track toes, control the descent. Pause briefly at bottom. |\n| RDL | 4 x 5 | 125 kg (69%) | 3 min | 3-1-1-0 | 6-7 | Hinge at hips, soft knees, bar close to legs. Feel hamstrings load. No lower back rounding. |\n| Rear Foot Elevated Split Squat | 3 x 8/leg | Moderate DB | 90 s/leg | 2-1-1-0 | 6 | Front shin vertical, torso upright. Control the eccentric. |\n| Single-Leg RDL | 3 x 8/leg | Light-moderate DB | 90 s/leg | 3-0-1-0 | 6 | Hinge pattern, maintain level hips. Touch-and-go or brief floor tap. |\n| Copenhagen Plank | 3 x 20s/side | BW | 60 s | Isometric | 6 | Top leg on bench, maintain straight line. Adductor prehab. |\n| 90/90 Hip Switch | 2 x 10 | BW | 45 s | Controlled | — | Mobility work. Smooth transitions, no forcing ROM. |\n| Hanging Leg Raise | 3 x 10 | BW | 60 s | 2-1-1-0 | 6 | Controlled — no swinging. Posterior pelvic tilt at top. |\n| Dead Bug | 3 x 8/side | BW | 60 s | 3-0-1-0 | 5-6 | Press lower back into floor. Exhale fully as limbs extend. |\n\n**Session Total:** 28 working sets, ~60 min\n\n**Cool-Down** (5 min) — Couch stretch 2x30s/leg, pigeon stretch 2x30s/side, calf foam roll 60s/side.\n\n---\n\n### PM — Light Technique / Open Mat (60 min) 🟢\n\n**Warm-Up** (10 min) — Movement flow: animal crawls, light shadow boxing, solo grappling drills.\n\n| Block | Duration | Description |\n|-------|----------|-------------|\n| Technique Review | 30 min | Coach-led or self-directed. Revisit techniques from Monday/Tuesday. Slow reps, focus on details. Ask questions. |\n| Light Positional Sparring | 20 min | 50-60% intensity. Pick specific positions to work. No ego, no scrambles — just reps. |\n\n**Cool-Down** (10 min) — Full-body static stretching. Foam roll any tight spots from morning squat session.\n\n> **Note:** This is a recovery-oriented session. Keep intensity LOW. The morning squats will have you fatigued — respect that.\n\n---\n\n## Thursday\n\n### AM — HIIT / Fight Circuit (35 min) 🔴\n\n**Warm-Up** (8 min) — Easy bike/row 3 min, dynamic stretching, 2 x 10s bike sprints to prime.\n\n**Option A — Assault Bike Intervals**\n\n| Block | Work | Rest | Rounds | Notes |\n|-------|------|------|--------|-------|\n| Assault Bike Sprints | 30 s max effort | 30 s easy spin | 8 | Seated, hands and feet driving. Track cals or watts per round for baseline. |\n\n**Option B — Rowing Repeats**\n\n| Block | Work | Rest | Rounds | Notes |\n|-------|------|------|--------|-------|\n| 500 m Row | ~1:45-2:00 pace | 2 min easy | 4 | Consistent pacing across all 4. Record split times for baseline. |\n\n> **Week 1 Note:** Pick one option and stick with it for the block. Record all outputs — these are your baselines. RPE should feel hard but manageable. Don't redline on round 1.\n\n**Cool-Down** (5 min) — Walk 2 min, diaphragmatic breathing 2 min (box breathing 4-4-4-4), light stretching.\n\n---\n\n### PM — MMA Sparring (90 min) 🔴\n\n**Warm-Up** (15 min) — Jump rope 5 min, shadow boxing 3 x 2 min, partner mirror drill 2 min, light technical exchanges 3 min.\n\n| Block | Duration | Description |\n|-------|----------|-------------|\n| Technical Sparring | 5 x 5 min (1 min rest) | Boxing only. 70% intensity. **Week 1 priorities:** head movement, jab mechanics, maintaining distance. Do not chase knockdowns. |\n| Round Debrief | 5 min | Quick self-assessment after each round. What worked, what leaked. |\n\n> **Week 1 Sparring Rules:**\n> - Boxing only (no kicks, no clinch unless coach says otherwise)\n> - 70% power cap — focus on timing and placement, not damage\n> - Defense first: if you're getting hit clean, slow down and reset\n> - Pick ONE thing to work on per round (e.g., round 1 = jab, round 2 = head movement)\n\n**Cool-Down** (10 min) — Neck isometrics 3x10s/direction, static stretching, ice anything that needs it.\n\n---\n\n## Friday\n\n### AM — Strength: Full Body Power (55 min) 🟡\n\n**Warm-Up** (10 min) — Reference `warmups.md` for full power-day protocol (emphasize CNS priming: jumps, med ball throws)\n\n| Exercise | Sets x Reps | Load | Rest | Tempo | RPE | Notes |\n|----------|-------------|------|------|-------|-----|-------|\n| Hang Clean | 4 x 3 | 72 kg (~70%) | 2.5 min | Explosive | 6-7 | Triple extension, elbows high and fast. Catch in quarter front squat. Reset each rep. |\n| Push Press | 4 x 3 | 54 kg (72%) | 2.5 min | Explosive | 6-7 | Controlled dip, aggressive drive. Lock out overhead, pause 1s at top. |\n| Box Jump | 4 x 3 | BW (24-30\" box) | 90 s | Explosive | 6 | Step down between reps. Full hip extension at top. Focus on rate of force development. |\n| Med Ball Slam | 3 x 6 | 8-10 kg | 90 s | Explosive | 6 | Full overhead reach, slam through the floor. Reset fully between reps. |\n| KB Swing | 3 x 10 | 26 kg | 90 s | Explosive | 6-7 | Russian swing (eye level). Hinge-snap pattern, glutes drive. Tight core at top. |\n| Turkish Get-Up | 2 x 3/side | 16 kg | 90 s/side | Controlled | 6 | Slow and deliberate. Eyes on bell throughout. This is movement quality work. |\n| Farmer's Carry | 3 x 40 m | Heavy DB/KB | 90 s | Controlled | 6-7 | Tall posture, packed shoulders, no lateral lean. Grip hard, breathe. |\n\n**Session Total:** 23 working sets, ~50 min\n\n**Cool-Down** (5 min) — Wrist circles, hip flexor stretch 2x30s/side, thoracic extension over foam roller 60s.\n\n---\n\n### PM — MMA Drilling (75 min) 🟡\n\n**Warm-Up** (10 min) — Movement drills: agility ladder, reaction drills, light shadow work.\n\n| Block | Duration | Description |\n|-------|----------|-------------|\n| Focused Technique Drilling | 45 min | Coach-directed technique reps. High volume, low intensity. Prioritize precision over speed. Take notes on corrections. |\n| Positional Sparring | 30 min | Start from specific positions. 60-70% intensity. Apply techniques drilled above in live context. Reset frequently. |\n\n**Cool-Down** (5 min) — Partner stretching, deep breathing, review session notes.\n\n> **Note:** Morning was a power session — CNS may be fatigued. Drilling intensity should be moderate. Focus on absorbing technique, not athletic output.\n\n---\n\n## Saturday\n\n### AM — Fight Conditioning / Active Recovery (40 min) 🟡\n\n**Warm-Up** (5 min) — Light jump rope 2 min, dynamic stretching, arm circles, bodyweight squats.\n\n**Fight Simulation Circuit — 3 Rounds**\n\n| Exercise | Duration/Reps | Notes |\n|----------|---------------|-------|\n| Heavy Bag Work | 60 s | Mix combos — jab-cross-hook, body shots. Stay technical. |\n| Sprawls | 8 reps | Snap down, hip losive | 7-8 | +2.5 kg from Week 1. Drive through legs, lock out overhead |\n\n**Power Accessories**\n\n| Exercise | Sets x Reps | Load | Rest | RPE | Notes |\n|----------|-------------|------|------|-----|-------|\n| Box Jumps | 4x3 | BW | 90s | 7 | Step down each rep. Focus on maximal height/speed |\n| Med Ball Slams | 3x8 | 8-10 kg | 60s | 7-8 | +2 reps from Week 1 (was 6). Full hip extension, slam with intent |\n| KB Swings | 3x12 | 28 kg | 60s | 7-8 | +2 reps, heavier load from Week 1 (was 3x10 @ 24-28 kg). Russian-style, explosive hips |\n\n**Core**\n\n| Exercise | Sets x Reps | Load | Rest | RPE | Notes |\n|----------|-------------|------|------|-----|-------|\n| Turkish Get-Up | 2x3/side | 20 kg | 60s/side | 7-8 | +4 kg from Week 1 (was 16 kg). Slow and controlled each phase |\n| Farmer's Carry | 3x40m | Heavy DB/KB | 60s | 7-8 | Heavier load than Week 1. Brace hard, shoulders packed, no lean |\n\n---\n\n### PM — MMA Drilling (75 min)\n\n> **Progression from Week 1:** Emphasize transitions and chaining techniques.\n\n| Block | Duration | Details |\n|-------|----------|---------|\n| Warm-Up | 10 min | Movement flow, light shadow work, partner pummeling |\n| Technique Drilling — Chains | 30 min | Chain techniques: strike > takedown > pass > submission. Drill transitions — e.g., failed single-leg to body-lock, guard pass to mount to arm triangle |\n| Situational Drilling | 20 min | Start from disadvantageous positions. Work escapes into counters. Emphasize scrambles and transitions |\n| Light Flow Rounds | 15 min | 3x5 min. 50-60% intensity. Apply the drilled chains in a live but cooperative setting |\n\n---\n\n## Saturday\n\n### AM — Fight Conditioning / Active Recovery (45 min)\n\n> **Progression from Week 1:** +1 round on fight simulation circuits (was 3 rounds, now 4). Rest tightened from 2 min to 90s.\n\n**Option A: Fight Simulation Circuit (4 rounds)**\n\nEach round = 5 min continuous work, 90s rest between rounds.\n\n| Station | Duration | Details |\n|-- ress | 52.5-55 kg | 55-58 kg | +2.5 kg |\n| TGU Load | 16 kg | 20 kg | +4 kg |\n| KB Swings | 3x10 @ 24-28 kg | 3x12 @ 28 kg | +2 reps, heavier |\n| Assault Bike Intervals | 8 rounds | 10 rounds | +2 rounds |\n| Rowing Repeats | 4x500m / 2 min rest | 5x500m / 90s rest | +1 round, -30s rest |\n| Fight Circuit | 3 rounds / 2 min rest | 4 rounds / 90s rest | +1 round, -30s rest |\n| Cardiac Output | 40 min | 45 min | +5 min |\n| Sparring Striking | Boxing only | Boxing + Kicks | Added kicks |\n| Grappling Rounds | 5x5 min | 6x5 min | +1 round |\n| Accessory Reps | Lower volume | +2 reps most exercises | Increased volume |\n", "week-3": "# Week 3 — PEAK VOLUME / INTENSITY\n\n**Mesocycle Role:** This is the hardest week of the block. Volume and intensity are at their highest before the Week 4 deload. RPE targets are 8-9 across the board.\n\n**Tempo Shift:** The triphasic progression advances this week. Eccentric control remains (3 seconds down), but the concentric is now **EXPLOSIVE (X)**. Full tempo notation: **3-1-X-0** (3s eccentric, 1s pause, explosive concentric, no pause at top).\n\n**Fatigue Management:**\n- Expect significant accumulated fatigue by Thursday. Sleep 8-9 hours minimum, especially Tue-Wed nights.\n- Nutrition must be on point — aim for 3,800-4,000 kcal on double-session days. Prioritize carbs around training.\n- Thursday is the hardest day of the entire block (HIIT AM + full MMA sparring PM). Pre-load with extra carbs Wednesday evening.\n- If anything feels genuinely \"off\" (sharp joint pain, dizziness, unusual HR), scale back. Week 4 deload is coming — push hard but don't break.\n\n---\n\n## Monday — Upper Push/Pull + MMA Striking\n\n> **Progression from Week 2:** Bench +2.5kg (now 92-98kg range). Pull-Ups +2.5kg (now BW+22.5kg). Main lifts move to 5x3. Added Dips 3x8 as new accessory. Push-ups upgraded to include clap variations. Concentric tempo shifts to explosive.\n\n### AM — Strength: Upper Push/Pull (65 min) :red_circle:\n\n**Warm-Up (8 min)**\n\n| Exercise | Sets x Reps | Notes |\n|----------|-------------|-------|\n| Band Pull-Aparts | 2 x 15 | Light band, slow |\n| Band Dislocates | 2 x 10 | Full ROM |\n| Scap Push-Ups | 2 x 10 | — |\n| Empty Bar Bench | 2 x 8 | Groove the tempo |\n\n**Main Lifts**\n\n| Exercise | Sets x Reps | Load | Tempo | RPE |\n|----------|-------------|------|-------|-----|\n| Bench Press | 5 x 3 | 92-98 kg (80-85% of 115) | 3-1-X-0 | 8-9 |\n| Weighted Pull-Ups | 5 x 3 | BW + 22.5 kg | 3-1-X-0 | 8-9 |\n\n- Rest 2.5-3 min between sets on main lifts.\n- Explosive concentric — accelerate the bar as hard as possible through the sticking point.\n\n**Accessories**\n\n| Exercise | Sets x Reps | Load/Notes |\n|----------|-------------|------------|\n| Landmine Press | 4 x 8 | Moderate — punching transfer |\n| DB Row | 4 x 10 | Heavy enough for RPE 8 |\n| Clap Push-Ups | 3 x 15-20 | Mix clap and standard reps |\n| Dips | 3 x 8 | BW or lightly weighted — NEW |\n| Face Pulls | 3 x 15 | Band or cable, slow squeeze |\n| Band External Rotations | 2 x 15 | Prehab — light band |\n\n**Core**\n\n| Exercise | Sets x Reps | Notes |\n|----------|-------------|-------|\n| Pallof Press | 3 x 12/side | Anti-rotation, 2s hold |\n| Ab Wheel | 3 x 12 | Full extension if possible |\n\n**Cooldown (3 min):** Pec doorway stretch, lat hang, band-assisted shoulder flexion.\n\n---\n\n### PM — MMA Striking (75 min) :red_circle:\n\n| Block | Duration | Details |\n|-------|----------|---------|\n| Warm-Up | 10 min | Jump rope, shadow boxing, dynamic stretches |\n| Technique | 20 min | Full MMA striking: punches, kicks, knees. Clinch entry drills (collar tie to knee, underhook to dirty boxing) |\n| Pad/Bag Work | 20 min | 4 x 4 min rounds. Mix combinations with clinch entries. Coach calls for level changes. |\n| Live Rounds | 15 min | 3 x 5 min rounds — light-to-moderate contact. Focus on range management and clinch transitions. |\n| Cooldown | 10 min | Partner stretching, neck work (isometric holds), breathing drills |\n\n---\n\n## Tuesday — Cardiac Output + MMA Grappling\n\n> **Progression from Week 2:** Cardiac output stays at 45 min Zone 2 — this is the recovery anchor, not a progression target. Grappling intensity increases: live rolls move to 6x5 min at 85%. Added scramble drills.\n\n### AM — Cardiac Output (45 min) :green_circle:\n\n| Activity | Duration | Heart Rate | Notes |\n|----------|----------|------------|-------|\n| Bike / Jog / Row | 45 min | 130-150 BPM | Strictly Zone 2. Nose-breathe if possible. This session exists to flush fatigue and build aerobic base — do NOT push intensity. |\n\n- Keep it genuinely easy. If HR drifts above 150, slow down.\n- Good day for mobility work during or after: hip 90/90 switches, thoracic rotations.\n\n---\n\n### PM — MMA Grappling (80 min) :red_circle:\n\n| Block | Duration | Details |\n|-------|----------|---------|\n| Warm-Up | 10 min | Guard pull to stand-up flow, hip escapes, granby rolls |\n| Technique | 20 min | Positional escapes and sweeps — focus on 2-3 chain sequences |\n| Positional Sparring | 20 min | Start from bad positions (bottom side control, turtle). Rounds: 3 min work, 1 min rest. Partner gives progressive resistance. |\n| Scramble Drills | 10 min | NEW — Start from neutral, coach blows whistle, scramble for dominant position. 30s bursts x 10. |\n| Live Rolls | 20 min | 6 x 5 min rounds at 85% intensity. Match with varied partners (bigger/smaller). Focus on imposing pace. |\n\n---\n\n## Wednesday — Lower + Posterior Chain + Light Technique\n\n> **Progression from Week 2:** Squat +5kg (now 120-128kg). RDL +5kg (now 135-140kg). Main lifts move to 5x3 (Squat) and 5x4 (RDL). RFESS goes heavier. Hanging Leg Raises add ankle weight. Concentric tempo shifts to explosive.\n\n### AM — Strength: Lower + Posterior Chain (70 min) :red_circle:\n\n**Warm-Up (10 min)**\n\n| Exercise | Sets x Reps | Notes |\n|----------|-------------|-------|\n| Goblet Squat | 2 x 8 | Light, full depth |\n| Glute Bridge | 2 x 10 | 2s squeeze at top |\n| Leg Swings (front/lateral) | 2 x 10/direction | — |\n| Empty Bar Squat | 2 x 5 | Groove the tempo |\n\n**Main Lifts**\n\n| Exercise | Sets x Reps | Load | Tempo | RPE |\n|----------|-------------|------|-------|-----|\n| Back Squat | 5 x 3 | 120-128 kg (80-85% of 150) | 3-1-X-0 | 8-9 |\n| RDL | 5 x 4 | 135-140 kg (75-78% of 180) | 3-1-X-0 | 8-9 |\n\n- Rest 3 min between squat sets, 2.5 min between RDL sets.\n- Explosive concentric on squats — drive through the floor hard out of the hole.\n- RDL: control the eccentric, then powerful hip extension to lockout.\n\n**Accessories**\n\n| Exercise | Sets x Reps | Load/Notes |\n|----------|-------------|------------|\n| Rear Foot Elevated Split Squat (RFESS) | 4 x 8/leg | Heavier than Week 2 — hold DBs or barbell |\n| Single-Leg RDL | 3 x 10/leg | DB or KB, focus on balance |\n| Copenhagen Plank | 3 x 30s/side | Adductor + groin integrity |\n| Hip CARs | 2 x 5/side | Controlled, full ROM |\n\n**Core**\n\n| Exercise | Sets x Reps | Notes |\n|----------|-------------|-------|\n| Hanging Leg Raises | 3 x 15 | Add ankle weight (1-2 kg) |\n| Dead Bug | 3 x 10/side | Opposite arm-leg extension, slow |\n\n**Cooldown (5 min):** Couch stretch, pigeon stretch, hamstring PNF stretch.\n\n---\n\n### PM — Light Technique / Open Mat (60 min) :green_circle:\n\n| Block | Duration | Details |\n|-------|----------|---------|\n| Warm-Up | 10 min | Flow rolling at 40% — movement quality focus |\n| Technique Review | 30 min | Drill weak areas from Tuesday's grappling. Coach-guided or self-directed. |\n| Light Positional Play | 15 min | 50% intensity max. Work entries and transitions only. |\n| Stretch/Mobility | 5 min | Hips, shoulders, spine |\n\n- This session is RECOVERY-ORIENTED. Keep intensity low. The legs will be fatigued from AM squats.\n- **Wednesday night: eat a big meal and sleep 8-9 hours. Tomorrow is the hardest day of the block.**\n\n---\n\n## Thursday — HIIT / Fight Circuit + MMA Sparring\n\n> **Progression from Week 2:** HIIT tightens rest intervals (30s on/20s off, was 30/30). Rowing rest drops to 75s. Added alactic sprint set. Sparring increases to 6x5 min at 85-90% — full fight-pace simulation. This is the hardest day of the entire training block.\n\n### AM — HIIT / Fight Circuit (40 min) :red_circle:\n\n**Option A: Assault Bike**\n\n| Protocol | Details |\n|----------|---------|\n| Warm-Up | 5 min easy spin |\n| Intervals | 30s all-out / 20s rest x 12 rounds (tighter rest than Week 2) |\n| Recovery | 3 min easy spin |\n| Alactic Set | 10s TRUE all-out sprint / 2 min full recovery x 4 |\n| Cooldown | 3 min easy spin |\n\n**Option B: Rowing**\n\n| Protocol | Details |\n|----------|---------|\n| Warm-Up | 5 min easy row |\n| Intervals | 500m repeats x 6, 75s rest between (was 90s) |\n| Recovery | 3 min easy row |\n| Alactic Set | 10s max effort sprint / 2 min full recovery x 4 |\n| Cooldown | 3 min easy row |\n\n- The alactic set is NEW this week — trains the ATP-CP system for explosive bursts. Full recovery is critical between sprints.\n- Eat and hydrate well between AM and PM sessions. Nap if possible.\n\n---\n\n### PM — MMA Sparring (90 min) :red_circle:\n\n> **This is the hardest sparring session of the entire 4-week block. Fight-pace simulation. 85-90% intensity.**\n\n| Block | Duration | Details |\n|-------|----------|---------|\n| Warm-Up | 10 min | Shadow boxing with takedown entries, light flow |\n| Technical Review | 10 min | Coach brief: game plan focus, 2-3 key sequences to implement |\n| Full MMA Sparring | 30 min | **6 x 5 min rounds**, 60s rest between. Full MMA rules — striking, clinch, takedowns, ground. Rotate partners every 2 rounds. |\n| Situational Rounds | 15 min | Cage-specific: starts against the fence, clinch breaks, ground-and-pound defense. 3 x 3 min. |\n| Cooldown | 15 min | Easy shadow boxing, partner stretching, neck strengthening (manual resistance), nasal breathing |\n| Debrief | 10 min | Video review if available. Coach feedback. Note what worked under fatigue. |\n\n- Mouthguard, cup, shin guards mandatory. 16oz gloves minimum.\n- Have a corner person track rounds and monitor for excessive fatigue.\n- **Post-session:** Protein + fast carbs within 30 min. Cold shower or contrast therapy if available.\n\n---\n\n## Friday — Full Body Power + MMA Drilling\n\n> **Progression from Week 2:** Hang Clean +2.5-5kg (now 80-85kg). Push Press +2.5kg (now 58-62kg). Box Jumps and KB Swings add 1 set (now 5x3 and 4x10). Main lifts at 5x3. TGU load increases to 24kg.\n\n### AM — Strength: Full Body Power (60 min) :red_circle:\n\n**Warm-Up (8 min)**\n\n| Exercise | Sets x Reps | Notes |\n|----------|-------------|-------|\n| Jump Rope | 2 min | Light, wake up CNS |\n| Broad Jumps | 3 x 3 | Prime explosive patterns |\n| PVC Overhead Squat | 2 x 5 | Mobility + warm-up |\n| Empty Bar Hang Clean | 2 x 3 | Groove the pull |\n\n**Main Lifts**\n\n| Exercise | Sets x Reps | Load | RPE |\n|----------|-------------|------|-----|\n| Hang Clean | 5 x 3 | 80-85 kg | 8-9 |\n| Push Press | 5 x 3 | 58-62 kg | 8-9 |\n\n- Rest 2-2.5 min between sets.\n- These are POWER movements — maximal intent on every rep. If bar speed drops noticeably, reduce load by 5%.\n\n**Power Accessories**\n\n| Exercise | Sets x Reps | Load/Notes |\n|----------|-------------|------------|\n| Box Jumps | 5 x 3 | Step down (save joints), max height intent |\n| Med Ball Rotational Throws | 4 x 5/side | Slam into wall, reset each rep — fight-specific rotation |\n| KB Swings | 4 x 10 | 32 kg, Russian-style, hip snap |\n\n**Core**\n\n| Exercise | Sets x Reps | Notes |\n|----------|-------------|-------|\n| Turkish Get-Up | 3 x 2/side | 24 kg — slow and controlled |\n| Suitcase Carry | 3 x 30m/side | Heavy KB or DB, brace hard |\n\n**Cooldown (3 min):** Hang from bar, wrist circles, shoulder band stretch.\n\n---\n\n### PM — MMA Drilling (75 min) :yellow_circle:\n\n| Block | Duration | Details |\n|-------|----------|---------|\n| Warm-Up | 10 min | Movement flow — sprawls, shoots, stand-ups, light pummeling |\n| Chain Wrestling Drills | 25 min | Single-leg to double-leg chains, front headlock series, underhook battles. High reps, technical precision. |\n| Transition Drills | 20 min | Takedown-to-pass-to-submission chains. Drilling at 70% speed, increasing to 85% by end. |\n| Positional Sparring | 20 min | Start from specific positions (half guard, back control). 3 min rounds, rotate partners. Moderate intensity. |\n\n- Friday PM is moderate intensity — the week's hardest sessions are behind you. Focus on technical sharpness, not output.\n\n---\n\n## Saturday — Fight Conditioning + Open Mat\n\n> **Progression from Week 2:** Fight conditioning reaches peak: 5 rounds of 5-min circuits with only 60s rest (was 4 rounds, 90s rest). This is the peak conditioning session of the block. Open mat stays light.\n\n### AM — Fight Conditioning (45 min) :red_circle:\n\n> **Peak conditioning session of the block. 5 rounds simulating fight-length efforts.**\n\n**Warm-Up (5 min):** Jump rope + dynamic stretches.\n\n**Fight Simulation Circuit — 5 rounds x 5 min, 60s rest between rounds**\n\nEach round cycles through these stations (45s work / 15s transition):\n\n| Station | Exercise | Notes |\n|---------|----------|-------|\n| 1 | Heavy Bag — Combo Flurries | Max output for 45s |\n| 2 | Sprawl to Shot | Continuous — fight pace |\n| 3 | Assault Bike Sprint | All-out |\n| 4 | Ground-and-Pound on Bag | Mount or guard position |\n| 5 | Clinch Knees on Bag | Drive knees, maintain control |\n\n- 60s rest between rounds (1:1 work-to-rest for 5-min rounds). Walk and breathe.\n- This is HARD. The goal is to maintain output quality across all 5 rounds. When round 4-5 feel terrible, keep technique clean.\n\n**Cooldown (5 min):** Walk, nasal breathing, light stretching.\n\n---\n\n### PM — Open Mat / Light Technical (60 min) :green_circle:\n\n| Block | Duration | Details |\n|-------|----------|---------|\n| Flow Rolling | 20 min | 40-50% intensity. Movement exploration, no submissions. |\n| Technique Play | 25 min | Work on setups and entries you struggled with this week. Ask training partners for specific looks. |\n| Stretch / Mobility | 15 min | Full-body: hip openers, thoracic spine, hamstrings, shoulders. Foam roll if needed. |\n\n- Keep this session LIGHT. You've accumulated enormous training stress this week.\n- **Saturday night: begin pre-loading recovery for the Week 4 deload. Extra sleep, extra food.**\n\n---\n\n## Sunday — REST\n\n> **Full rest day. No training.**\n\n| Priority | Details |\n|----------|---------|\n| Sleep | 9+ hours. Nap if possible. |\n| Nutrition | Maintenance calories (~3,400 kcal). High protein (2g/kg = 180g). Anti-inflammatory foods (berries, fatty fish, turmeric). |\n| Active Recovery | Walk 20-30 min. Light stretching or yoga only if it feels good. |\n| Mental | No fight film, no training planning. Disconnect and recover. |\n| Prep | Prepare meals for Week 4 (deload). Review Week 3 training log — note PRs, what felt good, what broke down. |\n\n---\n\n## Week 3 Summary\n\n| Metric | Value |\n|--------|-------|\n| Total Training Sessions | 12 (6 days x 2 sessions) |\n| Strength Sessions | 3 (Upper / Lower / Power) |\n| MMA Sessions | 5 (Striking, Grappling, Sparring, Drilling, Open Mat x2) |\n| Conditioning Sessions | 3 (Cardiac Output, HIIT, Fight Conditioning) |\n| Main Lift RPE | 8-9 |\n| Sparring Intensity | 85-90% (peak) |\n| Work-to-Rest (Conditioning) | 1:1 |\n| Rest Day | Sunday |\n\n**Key Reminders for Week 3:**\n- This is the PEAK week. Everything is at its highest. Push hard but stay smart.\n- Wednesday night and Saturday night are critical recovery windows — sleep and eat.\n- Thursday (HIIT + Sparring) is the hardest single day. Manage energy accordingly.\n- If form breaks down on main lifts, drop 2.5-5kg. RPE 8-9 means hard, not grinding to failure.\n- Week 4 is a deload — the light at the end of the tunnel. Earn it this week.\n", "week-4": "# Week 4 — DELOAD\n\n**Focus:** Recovery and supercompensation. Volume cut 40-50%, intensity at 70-75% 1RM, NO hard sparring. Every session this week serves recovery — if something feels heavy or grinding, back off immediately. The goal is to arrive at next week fresher and stronger than you started this block.\n\n**Athlete:** 87-90 kg, 185 cm | Squat 150 kg | Deadlift 180 kg | Bench 115 kg | OHP 75 kg\n\n## Intensity Key\n\n| Marker | Meaning |\n|--------|---------|\n| 🟢 | Easy — recovery pace, low CNS demand |\n| 🟡 | Moderate — working hard but controlled |\n\n> There are ZERO 🔴 sessions this week. If you find yourself pushing into 🔴 territory, you are doing it wrong.\n\n---\n\n## Weekly Overview\n\n| Day | AM Session | PM Session |\n|-----|-----------|------------|\n| **Monday** | Strength — Upper Push/Pull (40 min) 🟢 | MMA Striking — Light Technical (50 min) 🟡 |\n| **Tuesday** | Cardiac Output (30 min) 🟢 | MMA Grappling — Flow Rolling (50 min) 🟢 |\n| **Wednesday** | Strength — Lower + Posterior Chain (40 min) 🟢 | Mobility / Yoga / Recovery (45 min) 🟢 |\n| **Thursday** | Light Conditioning Zone 1-2 (25 min) 🟢 | MMA Technical Drilling — No Sparring (60 min) 🟡 |\n| **Friday** | Strength — Full Body (35 min) 🟢 | MMA Drilling — Light (50 min) 🟢 |\n| **Saturday** | Active Recovery — Easy Cardio (30 min) 🟢 | Benchmark Re-Tests / Open Mat (45 min) 🟢 |\n| **Sunday** | REST | REST |\n\n### Volume Summary\n\n| Metric | Value |\n|--------|-------|\n| Total Sessions | 12 |\n| Total Training Hours | ~8.3 hours |\n| Strength Sessions | 3 |\n| MMA/Skill Sessions | 5 |\n| Conditioning Sessions | 2 |\n| Active Recovery | 2 |\n| Intensity Distribution | 🟢 x10 / 🟡 x2 / 🔴 x0 |\n\n---\n\n## Monday — Upper Push/Pull + Light Striking\n\n### AM — Strength: Upper Push/Pull (40 min) 🟢\n\n**Warm-Up (8 min)**\n\n| Exercise | Sets x Reps | Notes |\n|----------|-------------|-------|\n| Band Pull-Aparts | 2 x 15 | Light band, open up chest |\n| Shoulder CARs | 1 x 5/direction | Slow, controlled circles |\n| Push-Up to Downward Dog | 2 x 5 | Flow through the movement |\n| Empty Bar Bench Press | 2 x 8 | Groove the pattern |\n\n**Main Work**\n\n| Exercise | Sets x Reps | Load | RPE | Tempo | Notes |\n|----------|-------------|------|-----|-------|-------|\n| Bench Press | 3 x 3 | 80 kg (70% 1RM) | 5-6 | Fast concentric | Focus on bar SPEED — every rep should fly. No grinding. |\n| Pull-Ups | 3 x 5 | Bodyweight only | 5-6 | Controlled | Full ROM, no kipping, dead hang each rep |\n\n**Accessories**\n\n| Exercise | Sets x Reps | Load | Notes |\n|----------|-------------|------|-------|\n| Landmine Press | 2 x 8 | Light (~25 kg on bar) | Smooth pressing, feel the shoulder stabilise |\n| Face Pulls | 2 x 15 | Light band or cable | Slow eccentric, squeeze at end range |\n\n**Core**\n\n| Exercise | Sets x Reps | Notes |\n|----------|-------------|-------|\n| Pallof Press | 2 x 10/side | Light band/cable, hold 2 sec at extension |\n\n**Cool-Down (5 min):** Hang from bar 3 x 20 sec. Doorway pec stretch 2 x 30 sec/side.\n\n---\n\n### PM — MMA Striking: Light Technical (50 min) 🟡\n\n> NO power shots. NO live rounds. This is a movement quality session.\n\n| Block | Duration | Activity | Intensity |\n|-------|----------|----------|-----------|\n| Warm-Up | 10 min | Jump rope at easy pace, dynamic stretches | 🟢 |\n| Shadow Boxing | 15 min | 3 x 5 min rounds at 50% speed. Focus on footwork angles, head movement, and clean technique. Film yourself if possible. | 🟢 |\n| Pad Work | 15 min | Light pad work with a partner. Emphasise timing and placement over power. Jab-cross combinations, defensive reactions. No hard shots. | 🟡 |\n| Footwork Drills | 5 min | Ladder or cone drills. Lateral movement, pivots, level changes. | 🟢 |\n| Cool-Down | 5 min | Static stretching: hip flexors, hamstrings, shoulders | 🟢 |\n\n**Recovery Notes for Monday:**\n- Foam roll upper back, lats, and pecs for 10 min before bed\n- Sleep target: 8-9 hours\n- Post-training meal: high protein (40g+), moderate carbs, hydrate well\n- Avoid screens 30 min before bed\n\n---\n\n## Tuesday — Cardiac Output + Flow Rolling\n\n### AM — Cardiac Output (30 min) 🟢\n\n| Block | Duration | Activity | HR Target |\n|-------|----------|----------|-----------|\n| Warm-Up | 5 min | Easy walk or light jog | < 120 BPM |\n| Main | 20 min | Steady-state cardio: light jog, easy bike, or swimming. Pick whatever feels best on joints. | 120-145 BPM (Zone 1-2) |\n| Cool-Down | 5 min | Walk + deep breathing | Bring HR below 100 |\n\n> This is NOT a workout. This is active recovery that happens to involve movement. If you can't hold a full conversation, you're going too hard.\n\n---\n\n### PM — MMA Grappling: Flow Rolling (50 min) 🟢\n\n> NO submissions. NO holding positions. Continuous movement and transitions only. 50% intensity max.\n\n| Block | Duration | Activity | Intensity |\n|-------|----------|----------|-----------|\n| Warm-Up | 10 min | Hip escapes, technical stand-ups, partner drills at walking pace | 🟢 |\n| Flow Rolling | 30 min | 5 x 6 min rounds of flow rolling. Continuous movement — when you get a position, transition out of it. Focus on chaining movements together. No holding, no cranking. If you catch a sub position, let it go and move to the next sequence. | 🟢 |\n| Positional Flow | 5 min | Partner positional cycling: guard > half guard > side control > mount > back. Repeat. Smooth transitions, no resistance. | 🟢 |\n| Cool-Down | 5 min | Stretch: hip flexors, hamstrings, neck, lower back | 🟢 |\n\n**Recovery Notes for Tuesday:**\n- Foam roll hips, adductors, and lower back for 10 min\n- Epsom salt bath if available (15-20 min)\n- Sleep target: 8-9 hours\n- Nutrition: prioritise anti-inflammatory foods (fish, berries, leafy greens)\n\n---\n\n## Wednesday — Lower Body Strength + Mobility/Recovery\n\n### AM — Strength: Lower + Posterior Chain (40 min) 🟢\n\n**Warm-Up (8 min)**\n\n| Exercise | Sets x Reps | Notes |\n|----------|-------------|-------|\n| Goblet Squat | 2 x 8 | Light KB (16 kg), sit deep, open hips |\n| Banded Lateral Walk | 2 x 10/direction | Light band, feel glutes activate |\n| Hip 90/90 Stretch | 1 x 5/side | Slow transitions, breathe into tight spots |\n| Empty Bar Squat | 2 x 5 | Groove the pattern |\n\n**Main Work**\n\n| Exercise | Sets x Reps | Load | RPE | Tempo | Notes |\n|----------|-------------|------|-----|-------|-------|\n| Back Squat | 3 x 3 | 105 kg (70% 1RM) | 5-6 | Fast concentric | Explode out of the hole. Every rep should feel EASY. |\n| Romanian Deadlift | 3 x 3 | 117 kg (65% DL 1RM) | 5-6 | Controlled eccentric | Hinge pattern practice, don't grind |\n\n**Accessories**\n\n| Exercise | Sets x Reps | Load | Notes |\n|----------|-------------|------|-------|\n| Rear Foot Elevated Split Squat | 2 x 6/leg | Light (bodyweight or 12 kg DBs) | Balance and stability focus |\n| 90/90 Hip Switches | 2 x 10 | Bodyweight | Slow and controlled, improve hip mobility |\n\n**Core**\n\n| Exercise | Sets x Reps | Notes |\n|----------|-------------|-------|\n| Dead Bug | 2 x 8/side | Slow, press low back into floor, full exhale each rep |\n\n**Cool-Down (5 min):** Couch stretch 2 x 45 sec/side. Pigeon stretch 2 x 45 sec/side.\n\n---\n\n### PM — Mobility / Yoga / Recovery (45 min) 🟢\n\n> This is the most important recovery session of the week. Do not skip it.\n\n| Block | Duration | Activity |\n|-------|----------|----------|\n| Foam Rolling | 15 min | Full body: quads, hamstrings, glutes, IT band, thoracic spine, lats. Spend extra time on any sore spots. Use a lacrosse ball on traps and piriformis if needed. |\n| Mobility Flow | 15 min | World's Greatest Stretch x 5/side. Cat-Cow x 10. Thread the Needle x 8/side. Deep squat hold 3 x 30 sec. Scorpion stretch x 8/side. Jefferson Curl 3 x 5 (light or bodyweight). |\n| Yoga / Breathing | 15 min | Hold each for 60-90 sec: Pigeon Pose, Lizard Pose, Supine Twist, Child's Pose, Legs Up Wall. Finish with 3 min box breathing (4 sec in, 4 sec hold, 4 sec out, 4 sec hold). |\n\n**Recovery Notes for Wednesday:**\n- This is the midweek recovery anchor — protect this session\n- Foam roll before bed (10 min minimum)\n- Consider a contrast shower: 2 min hot / 30 sec cold x 3 rounds\n- Sleep target: 9 hours (the most important sleep night of the week)\n- Nutrition: eat at maintenance or slight surplus, high protein, quality carbs\n\n---\n\n## Thursday — Light Conditioning + Technical Drilling\n\n### AM — Light Conditioning Zone 1-2 (25 min) 🟢\n\n> HR must stay below 140 BPM at ALL times. This is movement prep, not conditioning work.\n\n| Block | Duration | Activity | HR Target |\n|-------|----------|----------|-----------|\n| Warm-Up | 5 min | Easy walk or light skip | < 110 BPM |\n| Circuit (2 rounds) | 15 min | Jump rope easy pace (2 min) > Light shadow boxing (2 min) > Bodyweight mobility circuit: inchworms, leg swings, arm circles (2 min) > Easy lateral shuffles (1.5 min). Rest 60 sec between rounds. | < 140 BPM |\n| Cool-Down | 5 min | Walk + diaphragmatic breathing | Bring HR below 100 |\n\n---\n\n### PM — MMA Technical Drilling — No Sparring (60 min) 🟡\n\n> This replaces the usual sparring session. NO live rounds. NO hard exchanges. Moderate pace technical work only.\n\n| Block | Duration | Activity | Intensity |\n|-------|----------|----------|-----------|\n| Warm-Up | 10 min | Movement flow: animal walks, sprawls at 50%, level changes | 🟢 |\n| Striking Combinations | 15 min | Practise 3-4 key combinations from this mesocycle. Slow and deliberate. Partner holds pads or plays defence at 30% resistance. Focus on clean transitions between strikes. | 🟡 |\n| Takedown Entries | 15 min | Drill entries only — no full throws or slams. Single-leg entry > finish to wall. Double-leg penetration step drill. Work setups from striking combinations into takedown entries. | 🟡 |\n| Clinch Pummelling | 10 min | Light clinch work. Pummel for underhooks, work collar ties. 50% resistance. Focus on posture and hand fighting. | 🟢 |\n| Transition Drill | 5 min | Full sequence at walking pace: jab-cross > level change > single-leg > pass to side control > transition to mount. Repeat other side. | 🟢 |\n| Cool-Down | 5 min | Partner-assisted stretching: hamstrings, hip flexors, shoulders | 🟢 |\n\n**Recovery Notes for Thursday:**\n- Foam roll full body for 10 min\n- Sleep target: 8-9 hours\n- Hydration check: aim for clear/light yellow urine throughout the day\n- Pre-bed: magnesium supplement if part of your protocol (see nutrition-recovery-supplements.md)\n\n---\n\n## Friday — Full Body Strength + Light MMA Drilling\n\n### AM — Strength: Full Body (35 min) 🟢\n\n**Warm-Up (8 min)**\n\n| Exercise | Sets x Reps | Notes |\n|----------|-------------|-------|\n| KB Halo | 2 x 8/direction | Light KB (12 kg), open up shoulders |\n| Bodyweight Squat | 2 x 8 | Slow and controlled |\n| Hip Hinge with PVC | 2 x 8 | Pattern the hinge |\n| Hang from Bar | 2 x 15 sec | Decompress spine |\n\n**Main Work — Technique Focus**\n\n| Exercise | Sets x Reps | Load | RPE | Notes |\n|----------|-------------|------|-----|-------|\n| Hang Clean | 3 x 2 | 65-70 kg | 5-6 | TECHNIQUE focus. Fast elbows, full triple extension. Every rep should be crisp. |\n| Push Press | 3 x 2 | 50 kg | 5 | Leg drive into smooth lockout. Speed emphasis. |\n\n**Accessories**\n\n| Exercise | Sets x Reps | Load | Notes |\n|----------|-------------|------|-------|\n| KB Swings | 2 x 8 | 24 kg | Hip snap, don't arm pull. Powerful but controlled. |\n\n**Core**\n\n| Exercise | Sets x Reps | Load | Notes |\n|----------|-------------|------|-------|\n| Turkish Get-Up | 2 x 2/side | 16 kg | Slow and deliberate. Own every position. |\n\n**Cool-Down (5 min):** Hang from bar 2 x 20 sec. World's Greatest Stretch 3/side.\n\n---\n\n### PM — MMA Drilling: Light (50 min) 🟢\n\n> Slow, deliberate practice. This is a technique polishing session — not a workout.\n\n| Block | Duration | Activity | Intensity |\n|-------|----------|----------|-----------|\n| Warm-Up | 10 min | Light movement: solo drills, hip escapes, shadow wrestling | 🟢 |\n| Technique Repetitions | 25 min | Pick 2-3 key techniques from this mesocycle. Drill each for 8 min blocks. Slow reps — think 50-60% speed. Focus on details: grip placement, foot position, weight distribution, timing. Ask your coach or partner for feedback. | 🟢 |\n| Situational Drilling | 10 min | Light positional rounds from specific positions (e.g., start in half guard, work a sweep). Partner gives 30% resistance only. Reset and repeat. | 🟢 |\n| Cool-Down | 5 min | Stretch and decompress. Neck stretches, shoulder rolls, hip openers. | 🟢 |\n\n**Recovery Notes for Friday:**\n- Foam roll and stretch 10-15 min before bed\n- Sleep target: 8-9 hours — critical before Saturday's benchmark tests\n- Nutrition: eat well, don't restrict. Quality carbs with dinner to fuel tomorrow\n- Review conditioning-tests.md tonight to know what tests you'll run Saturday\n\n---\n\n## Saturday — Active Recovery + Benchmark Re-Tests\n\n### AM — Active Recovery: Easy Cardio (30 min) 🟢\n\n| Block | Duration | Activity | HR Target |\n|-------|----------|----------|-----------|\n| Easy Cardio | 30 min | Walk, light bike, or easy swim. This is NOT a run. Keep it truly easy. Move gently, enjoy being outside if weather permits. | < 130 BPM (Zone 1) |\n\n> Use this time to mentally prepare for the benchmark tests. Visualise the tests, set target numbers, stay relaxed.\n\n---\n\n### PM — Benchmark Re-Tests / Open Mat (45 min) 🟢\n\n> Compare all results to your Week 0 baselines from conditioning-tests.md. Log everything.\n\n**Pre-Test:** Record resting heart rate (should have been taken on waking this morning).\n\n| Order | Test | Protocol | Rest Before Next Test | Notes |\n|-------|------|----------|----------------------|-------|\n| 0 | Resting Heart Rate | Recorded on waking, before getting out of bed. Lie still for 2 min, then record. | — | Compare to Week 0 baseline. Lower = better recovery adaptation. |\n| 1 | Max Strict Pull-Ups | Dead hang, full ROM, chin over bar. No kipping. Count until failure. | 3 min | Fresh test — do this first. |\n| 2 | Max Push-Ups in 2 min | Chest to floor, full lockout. Continuous timer, rest in plank position if needed. | 3 min | Pace yourself — don't burn out in the first 30 sec. |\n| 3 | Max Plank Hold | Forearm plank, body straight, no sagging or piking. Time until failure or form breakdown. | 3 min | Squeeze glutes, brace core, breathe. |\n| 4 | 2 km Run or Row Time Trial | OPTIONAL — only if feeling fresh and recovered. If in doubt, skip it. Run on flat surface or row on erg. All-out effort. | — | This is the only high-intensity effort permitted this week. Skip if fatigued. |\n\n**Post-Test:**\n\n| Time | Activity |\n|------|----------|\n| 10 min | Light open mat — easy rolling, technique play, nothing competitive |\n| 5 min | Full cool-down stretch |\n\n**Log your results:**\n\n| Test | Week 0 Baseline | Week 4 Result | Change |\n|------|----------------|---------------|--------|\n| Resting Heart Rate | ___ bpm | ___ bpm | |\n| Max Strict Pull-Ups | ___ reps | ___ reps | |\n| Max Push-Ups (2 min) | ___ reps | ___ reps | |\n| Max Plank Hold | ___ sec | ___ sec | |\n| 2 km Run/Row | ___ min:sec | ___ min:sec | |\n\n**Recovery Notes for Saturday:**\n- Post-test: protein shake or meal within 30 min\n- Foam roll and stretch 15 min\n- This is the last training day — celebrate completing the block\n- Sleep: go to bed early, aim for 9 hours\n\n---\n\n## Sunday — FULL REST\n\nNo training. No \"active recovery.\" No gym. Rest completely.\n\n| Priority | Action |\n|----------|--------|\n| Sleep | 9+ hours. Sleep in if your body wants it. |\n| Nutrition | Eat at maintenance or slight surplus. High protein, quality carbs, healthy fats. |\n| Hydration | 3-4 litres of water throughout the day. |\n| Soft Tissue | Optional: 15 min foam rolling / lacrosse ball work if you feel tight. |\n| Mental | Do something non-training related that you enjoy. Disconnect from fight prep. |\n| Review | Review your Week 4 benchmark results. Compare to Week 0. Note improvements and areas to target in the next block. |\n\n---\n\n## Week 4 Recovery Checklist\n\nUse this daily. Check off each item before bed.\n\n### Daily Non-Negotiables\n\n- [ ] **Sleep:** 8-9 hours minimum (9 on Wednesday and Sunday)\n- [ ] **Hydration:** 3-4 litres of water. Urine should be clear/light yellow.\n- [ ] **Protein:** 2g/kg bodyweight minimum (~180g/day). Spread across 4-5 meals.\n- [ ] **Foam Rolling:** 10 min minimum. Full body, extra time on sore spots.\n- [ ] **Stretching/Mobility:** 5-10 min dedicated stretching (separate from training cool-downs)\n\n### Daily Bonus Recovery Actions\n\n- [ ] **Cold/Contrast Exposure:** Contrast shower (2 min hot / 30 sec cold x 3) or cold water immersion\n- [ ] **Breathing Work:** 3-5 min box breathing or nasal-only breathing practice\n- [ ] **Screen Curfew:** No screens 30 min before bed\n- [ ] **Magnesium:** Pre-bed magnesium if part of your supplement protocol\n- [ ] **Walk:** 15-20 min easy walk outdoors (sunlight exposure for circadian rhythm)\n\n### Weekly Targets\n\n- [ ] Zero 🔴 intensity sessions (if any session felt hard, you pushed too much)\n- [ ] All HR-based sessions stayed below prescribed caps (145 BPM cardiac output, 140 BPM Thursday conditioning, 130 BPM Saturday easy cardio)\n- [ ] Body weight stable or slightly up (you should NOT be cutting during deload)\n- [ ] No new aches, pains, or injuries — existing soreness should be reducing day by day\n- [ ] Benchmark tests completed Saturday and logged\n- [ ] Results compared to Week 0 baselines from conditioning-tests.md\n- [ ] Training log updated with all weights, reps, and RPE data for the week\n- [ ] Mental state: feeling eager to train hard again (not dreading next week)\n\n### Signs the Deload Worked\n\n- Resting heart rate has dropped compared to end of Week 3\n- Grip strength and bar speed feel noticeably better by Friday\n- Mood and motivation are up\n- Sleep quality has improved\n- Minor aches from Week 3 have resolved\n- Benchmark test results match or exceed Week 0 baselines\n\n### Signs You Need More Recovery\n\n- Still feeling flat or fatigued by Thursday\n- Resting heart rate hasn't come down\n- Sleep quality is still poor\n- Lingering joint pain or muscle soreness\n- No motivation to train\n\n> If you see multiple warning signs above, consider extending the deload by 2-3 days before starting the next block. Recovery is not weakness — it is where adaptation happens.\n", "exercises": "# Exercise Glossary\n\nThis glossary covers every exercise used in the MMA training program. Each entry explains setup, execution, common errors, and — most importantly — how the movement transfers to fighting. Use this as a quick reference when programming or coaching.\n\n---\n\n## 1. Compound Barbell Lifts\n\n| Exercise | Primary Muscles | Equipment | Setup | Execution Cues | Common Mistakes | MMA Benefit |\n|---|---|---|---|---|---|---|\n| Back Squat | Quads, glutes, adductors, erectors | Barbell, squat rack | Bar on upper traps (high bar) or rear delts (low bar). Feet shoulder-width, toes slightly out. | \"Brace hard, spread the floor, hips and knees break together. Drive up through mid-foot.\" | Knees caving, forward lean / chest drop, cutting depth short, losing brace at the bottom. | Builds the lower-body force production that powers level changes, takedown defense (standing up under pressure), and knockout-level punching from the legs up. |\n| Front Squat | Quads, glutes, upper back, core | Barbell, squat rack | Bar in front rack (clean grip or cross-arm). Elbows high, chest tall. Feet shoulder-width. | \"Elbows up the whole way. Sit straight down between your hips. Drive up keeping torso vertical.\" | Elbows dropping (bar rolls forward), wrist inflexibility forcing cross-arm when clean grip is better, shallow depth. | Upright torso pattern mimics posture needed in the clinch and during double-leg finishes. Heavy anterior core demand transfers to resisting being bent over in grappling. |\n| D
