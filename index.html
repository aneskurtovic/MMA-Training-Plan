etalji |\n|---------|----------|---------|\n| Spraul u šut (Sprawl to Shot) | 45s | Naizmjenični spraulovi i ulazi u jednonožno rušenje |\n| Kombinacije na teškoj vreći | 60s | Visok output — udarci rukama i nogama |\n| Burpee u klinč koljeno | 45s | Eksplozivan burpee, baci 2 koljena na fokuser/vreću |\n| Sprint na Assault biku | 60s | Maksimalni napor |\n| Vuča partnera / Guranje saonica | 45s | Ako je dostupno; inače medvjeđe puzanje |\n| Udarci iz gornje pozicije na vreći (Ground & Pound) | 45s | Udarci iz gornje pozicije, održavaj bazu |\n\nPonovi za **4 runde** (bilo 3). Odmor **90s** između rundi (bio 2 min).\n\n**Opcija B: Aktivni oporavak (ako si umoran)**\n\n| Vježba | Trajanje | Napomene |\n|--------|----------|----------|\n| Lagano plivanje / Vožnja bicikla | 20 min | Zona 1, lagan napor |\n| Mobilnost / Tok joge | 15 min | Fokus na kukove, ramena, torakalni dio kičme |\n| Pjenasti valjak | 10 min | Cijelo tijelo |\n\n---\n\n### Poslijepodne — Otvoreni mat / Lagana tehnika (60 min)\n\n| Blok | Trajanje | Detalji |\n|------|----------|---------|\n| Slobodno vježbanje | 30 min | Radi na ličnim slabim tačkama, traži od partnera specifične situacije |\n| Lagano kotrljanje / Protok | 20 min | 50% intenziteta. Razigrano, istraživački |\n| Hlađenje i istezanje | 10 min | Statičko istezanje, vježbe disanja |\n\n---\n\n## Nedjelja — ODMOR\n\n| Aktivnost | Trajanje | Napomene |\n|-----------|----------|----------|\n| Potpuni odmor | Cijeli dan | Bez treninga. Spavanje 8-9 sati |\n| Fokus na ishranu | — | Pogodi cilj proteina (1.8-2.0 g/kg = 160-180 g). Prioritet cjelovita hrana, hidratacija |\n| Rad na mekim tkivima (opcionalno) | 15-20 min | Pjenasti valjak, lacrosse loptica, lagano istezanje po želji |\n| Mentalna priprema | 10-15 min | Pregled ciljeva Sedmice 2, vizualizacija tehnika, planiranje Sedmice 3 |\n\n---\n\n## Rezime Sedmice 2 — Ključne progresije\n\n| Kategorija | Sedmica 1 | Sedmica 2 | Razlika |\n|------------|-----------|-----------|---------|\n| Potisak s klupe | 82-86 kg | 84-89 kg | +2.5 kg |\n| Zgibovi s opterećenjem | TM+15 kg | TM+17.5 kg | +2.5 kg |\n| Čučanj | 105-111 kg | 110-116 kg | +5 kg |\n| Rumunjsko mrtvo dizanje | 121-130 kg | 126-135 kg | +5 kg |\n| Vučenje iz visa | 70-75 kg | 75-80 kg | +5 kg |\n| Potisak s nogama | 52.5-55 kg | 55-58 kg | +2.5 kg |\n| Turski ustanak | 16 kg | 20 kg | +4 kg |\n| Zamah girjom | 3x10 @ 24-28 kg | 3x12 @ 28 kg | +2 ponavljanja, teže |\n| Intervali na Assault biku | 8 rundi | 10 rundi | +2 runde |\n| Veslačka ponavljanja | 4x500m / 2 min odmor | 5x500m / 90s odmor | +1 runda, -30s odmor |\n| Borbeni krug | 3 runde / 2 min odmor | 4 runde / 90s odmor | +1 runda, -30s odmor |\n| Kardio-aerobni rad | 40 min | 45 min | +5 min |\n| Udarci u sparringu | Samo boks | Boks + Udarci nogama | Dodani udarci nogama |\n| Grappling runde | 5x5 min | 6x5 min | +1 runda |\n| Ponavljanja pomoćnih vježbi | Manji volumen | +2 ponavljanja većina vježbi | Povećan volumen |\n", "week-3": "# Sedmica 3 — VRHUNAC VOLUMENA / INTENZITETA\n\n**Uloga mezociklusa:** Ovo je najteža sedmica bloka. Volumen i intenzitet su na najvišem nivou prije deloada (rasterećenja) u Sedmici 4. RPE ciljevi su 8-9 na svim treninzima.\n\n**Promjena tempa:** Trifazična progresija napreduje ove sedmice. Ekscentrična kontrola ostaje (3 sekunde dolje), ali koncentrična faza je sada **EKSPLOZIVNA (X)**. Puna oznaka tempa: **3-1-X-0** (3s ekscentrična, 1s pauza, eksplozivna koncentrična, bez pauze na vrhu).\n\n**Upravljanje umorom:**\n- Očekujte značajan akumulirani umor do četvrtka. Spavajte minimalno 8-9 sati, posebno noći utorak-srijeda.\n- Ishrana mora biti na nivou — ciljajte 3.800-4.000 kcal na dane s duplim treninzima. Prioritizirajte ugljikohidrate oko treninga.\n- Četvrtak je najteži dan cijelog bloka (HIIT ujutro + puni MMA sparring popodne). Napunite se dodatnim ugljikohidratima u srijedu navečer.\n- Ako nešto ne štima (oštar bol u zglobovima, vrtoglavica, neobičan puls), smanjite intenzitet. Deload (rasterećenje) u Sedmici 4 dolazi — gurajte jako, ali se ne slomite.\n\n---\n\n## Ponedjeljak — Gornji dio tijela Potisak/Povlačenje + MMA Udarci\n\n> **Progresija od Sedmice 2:** Potisak s klupe (Bench Press) +2,5kg (sada raspon 92-98kg). Zgibovi s opterećenjem +2,5kg (sada TT+22,5kg). Glavni podizaji prelaze na 5x3. Dodate Propadanja (Dips) 3x8 kao novi dodatni rad. Sklekovi unaprijeđeni da uključuju varijacije s pljeskom. Koncentrični tempo prelazi na eksplozivan.\n\n### Ujutro — Snaga: Gornji dio tijela Potisak/Povlačenje (65 min) :red_circle:\n\n**Zagrijavanje (8 min)**\n\n| Vježba | Serije x Ponavljanja | Napomene |\n|----------|-------------|-------|\n| Razvlačenje s trakom (Band Pull-Aparts) | 2 x 15 | Lagana traka, polako |\n| Dislociranje s trakom (Band Dislocates) | 2 x 10 | Puni opseg pokreta |\n| Sklekovi za lopatice (Scap Push-Ups) | 2 x 10 | — |\n| Potisak s praznom šipkom | 2 x 8 | Uhodajte tempo |\n\n**Glavni podizaji**\n\n| Vježba | Serije x Ponavljanja | Opterećenje | Tempo | RPE |\n|----------|-------------|------|-------|-----|\n| Potisak s klupe (Bench Press) | 5 x 3 | 92-98 kg (80-85% od 115) | 3-1-X-0 | 8-9 |\n| Zgibovi s opterećenjem (Weighted Pull-Ups) | 5 x 3 | TT + 22,5 kg | 3-1-X-0 | 8-9 |\n\n- Odmor 2,5-3 min između serija na glavnim podizajima.\n- Eksplozivna koncentrična faza — ubrzajte šipku što jače moguće kroz točku zastoja.\n\n**Dodatne vježbe**\n\n| Vježba | Serije x Ponavljanja | Opterećenje/Napomene |\n|----------|-------------|------------|\n| Potisak s minom (Landmine Press) | 4 x 8 | Umjereno — transfer za udarce |\n| Veslanje s bučicom (DB Row) | 4 x 10 | Dovoljno teško za RPE 8 |\n| Sklekovi s pljeskom (Clap Push-Ups) | 3 x 15-20 | Miješajte ponavljanja s pljeskom i standardna |\n| Propadanja (Dips) | 3 x 8 | TT ili lagano opterećenje — NOVO |\n| Povlačenje za lice (Face Pulls) | 3 x 15 | Traka ili kabel, polako stiskanje |\n| Vanjske rotacije s trakom | 2 x 15 | Prevencija — lagana traka |\n\n**Trup**\n\n| Vježba | Serije x Ponavljanja | Napomene |\n|----------|-------------|-------|\n| Pallof potisak (Pallof Press) | 3 x 12/strana | Anti-rotacija, zadržaj 2s |\n| Kotač za trbušnjake (Ab Wheel) | 3 x 12 | Puno ispružanje ako je moguće |\n\n**Hlađenje (3 min):** Istezanje prsnih mišića u dovratku, vješanje za leđne mišiće, istezanje ramena s trakom.\n\n---\n\n### Popodne — MMA Udarci (75 min) :red_circle:\n\n| Blok | Trajanje | Detalji |\n|-------|----------|---------|\n| Zagrijavanje | 10 min | Preskakanje užeta, boks iz sjene, dinamička istezanja |\n| Tehnika | 20 min | Puni MMA udarci: šake, šutevi, koljena. Vježbe ulaska u klinč (ovratnik u koljeno, underhook u prljav boks) |\n| Rad na fokuseru/vreći | 20 min | 4 x 4 min runde. Miješajte kombinacije s ulascima u klinč. Trener poziva promjene nivoa. |\n| Žive runde | 15 min | 3 x 5 min runde — lagani do umjereni kontakt. Fokus na upravljanje distancom i klinč tranzicije. |\n| Hlađenje | 10 min | Istezanje s partnerom, rad na vratu (izometrička držanja), vježbe disanja |\n\n---\n\n## Utorak — Kardio izdržljivost + MMA Grappling\n\n> **Progresija od Sedmice 2:** Kardio izdržljivost ostaje na 45 min Zona 2 — ovo je sidro za oporavak, ne cilj za progresiju. Intenzitet grappinga raste: žive borbe prelaze na 6x5 min na 85%. Dodane vježbe scramble.\n\n### Ujutro — Kardio izdržljivost (45 min) :green_circle:\n\n| Aktivnost | Trajanje | Puls | Napomene |\n|----------|----------|------------|-------|\n| Bicikl / Trčanje / Veslanje | 45 min | 130-150 BPM | Striktno Zona 2. Dišite na nos ako je moguće. Ova sesija postoji da ispere umor i gradi aerobnu bazu — NEMOJTE forsirati intenzitet. |\n\n- Držite tempo zaista laganim. Ako puls ode iznad 150, usporite.\n- Dobar dan za rad na pokretljivosti tokom ili nakon: 90/90 rotacije kukova, torakalne rotacije.\n\n---\n\n### Popodne — MMA Grappling (80 min) :red_circle:\n\n| Blok | Trajanje | Detalji |\n|-------|----------|---------|\n| Zagrijavanje | 10 min | Guard pull do ustajanja, ispadi kukovima, granby kotrljanja |\n| Tehnika | 20 min | Bijeg iz pozicija i preokretanja — fokus na 2-3 lančane sekvence |\n| Pozicioni sparring | 20 min | Počnite iz loših pozicija (donja bočna kontrola, kornjača). Runde: 3 min rad, 1 min odmor. Partner daje progresivni otpor. |\n| Scramble vježbe | 10 min | NOVO — Počnite iz neutralne pozicije, trener puše u pištaljku, scramble za dominantnu poziciju. Sprintevi od 30s x 10. |\n| Žive borbe | 20 min | 6 x 5 min rundi na 85% intenziteta. Mijenjajte partnere (veći/manji). Fokus na nametanje tempa. |\n\n---\n\n## Srijeda — Donji dio tijela + Stražnji lanac + Lagana tehnika\n\n> **Progresija od Sedmice 2:** Čučanj +5kg (sada 120-128kg). Rumunsko mrtvo dizanje +5kg (sada 135-140kg). Glavni podizaji prelaze na 5x3 (Čučanj) i 5x4 (Rumunsko mrtvo dizanje). Bugarski čučanj (RFESS) ide teže. Podizanje nogu u visu dodaje uteg za gležnjeve. Koncentrični tempo prelazi na eksplozivan.\n\n### Ujutro — Snaga: Donji dio tijela + Stražnji lanac (70 min) :red_circle:\n\n**Zagrijavanje (10 min)**\n\n| Vježba | Serije x Ponavljanja | Napomene |\n|----------|-------------|-------|\n| Goblet čučanj | 2 x 8 | Lagano, puna dubina |\n| Glutealni most | 2 x 10 | 2s stiskanje na vrhu |\n| Zamasi nogama (naprijed/bočno) | 2 x 10/smjer | — |\n| Čučanj s praznom šipkom | 2 x 5 | Uhodajte tempo |\n\n**Glavni podizaji**\n\n| Vježba | Serije x Ponavljanja | Opterećenje | Tempo | RPE |\n|----------|-------------|------|-------|-----|\n| Stražnji čučanj (Back Squat) | 5 x 3 | 120-128 kg (80-85% od 150) | 3-1-X-0 | 8-9 |\n| Rumunsko mrtvo dizanje (RDL) | 5 x 4 | 135-140 kg (75-78% od 180) | 3-1-X-0 | 8-9 |\n\n- Odmor 3 min između serija čučnja, 2,5 min između serija rumunskog mrtvog dizanja.\n- Eksplozivna koncentrična faza na čučnjevima — snažno gurajte kroz pod iz najniže pozicije.\n- Rumunsko mrtvo dizanje: kontrolirajte ekscentričnu fazu, zatim snažna ekstenzija kukova do zaključavanja.\n\n**Dodatne vježbe**\n\n| Vježba | Serije x Ponavljanja | Opterećenje/Napomene |\n|----------|-------------|------------|\n| Bugarski čučanj (RFESS) | 4 x 8/noga | Teže nego Sedmica 2 — držite bučice ili šipku |\n| Jednonožno rumunsko mrtvo dizanje (Single-Leg RDL) | 3 x 10/noga | Bučica ili kettlebell, fokus na ravnotežu |\n| Kopenhagenski plank (Copenhagen Plank) | 3 x 30s/strana | Aduktori + integritet preponske regije |\n| CARs za kukove (Hip CARs) | 2 x 5/strana | Kontrolirano, puni opseg pokreta |\n\n**Trup**\n\n| Vježba | Serije x Ponavljanja | Napomene |\n|----------|-------------|-------|\n| Podizanje nogu u visu (Hanging Leg Raises) | 3 x 15 | Dodajte uteg za gležnjeve (1-2 kg) |\n| Mrtva buba (Dead Bug) | 3 x 10/strana | Suprotna ruka-noga ekstenzija, polako |\n\n**Hlađenje (5 min):** Istezanje na kauču, golub istezanje, PNF istezanje zadnje lože.\n\n---\n\n### Popodne — Lagana tehnika / Slobodni mat (60 min) :green_circle:\n\n| Blok | Trajanje | Detalji |\n|-------|----------|---------|\n| Zagrijavanje | 10 min | Flow borba na 40% — fokus na kvalitet pokreta |\n| Pregled tehnike | 30 min | Vježbajte slabe oblasti iz utorkovog grappinga. Vođeno od trenera ili samostalno. |\n| Lagana poziciona igra | 15 min | Maksimalno 50% intenziteta. Radite samo ulaze i tranzicije. |\n| Istezanje/Pokretljivost | 5 min | Kukovi, ramena, kičma |\n\n- Ova sesija je ORIJENTISANA NA OPORAVAK. Držite intenzitet niskim. Noge će biti umorne od jutarnjeg čučnja.\n- **Srijeda navečer: jedite obilan obrok i spavajte 8-9 sati. Sutra je najteži dan bloka.**\n\n---\n\n## Četvrtak — HIIT / Borbeni krug + MMA Sparring\n\n> **Progresija od Sedmice 2:** HIIT skraćuje intervale odmora (30s rad/20s odmor, bilo je 30/30). Odmor na veslanju pada na 75s. Dodat alaktički sprint set. Sparring raste na 6x5 min na 85-90% — puna simulacija tempa borbe. Ovo je najteži dan cijelog trening bloka.\n\n### Ujutro — HIIT / Borbeni krug (40 min) :red_circle:\n\n**Opcija A: Assault bicikl**\n\n| Protokol | Detalji |\n|----------|---------|\n| Zagrijavanje | 5 min lagano pedaliranje |\n| Intervali | 30s maksimalno / 20s odmor x 12 rundi (kraći odmor nego Sedmica 2) |\n| Oporavak | 3 min lagano pedaliranje |\n| Alaktički set | 10s PRAVI maksimalni sprint / 2 min potpuni oporavak x 4 |\n| Hlađenje | 3 min lagano pedaliranje |\n\n**Opcija B: Veslanje**\n\n| Protokol | Detalji |\n|----------|---------|\n| Zagrijavanje | 5 min lagano veslanje |\n| Intervali | 500m ponavljanja x 6, 75s odmor između (bilo je 90s) |\n| Oporavak | 3 min lagano veslanje |\n| Alaktički set | 10s maksimalni sprint / 2 min potpuni oporavak x 4 |\n| Hlađenje | 3 min lagano veslanje |\n\n- Alaktički set je NOV ove sedmice — trenira ATP-CP sistem za eksplozivne rafale. Potpuni oporavak je ključan između sprintova.\n- Jedite i hidrirajte se dobro između jutarnje i popodnevne sesije. Odspavajte ako je moguće.\n\n---\n\n### Popodne — MMA Sparring (90 min) :red_circle:\n\n> **Ovo je najteža sparring sesija cijelog 4-sedmičnog bloka. Simulacija tempa borbe. 85-90% intenziteta.**\n\n| Blok | Trajanje | Detalji |\n|-------|----------|---------|\n| Zagrijavanje | 10 min | Boks iz sjene s ulascima u rušenje, lagani flow |\n| Tehnički pregled | 10 min | Brifing trenera: fokus na gameplan, 2-3 ključne sekvence za implementaciju |\n| Puni MMA sparring | 30 min | **6 x 5 min rundi**, 60s odmor između. Puna MMA pravila — udarci, klinč, rušenja, parter. Rotacija partnera svake 2 runde. |\n| Situacione runde | 15 min | Specifične za kavez: počeci uz ogradu, izlasci iz klinča, odbrana na parteru. 3 x 3 min. |\n| Hlađenje | 15 min | Lagani boks iz sjene, istezanje s partnerom, jačanje vrata (manualni otpor), disanje na nos |\n| Razbor | 10 min | Pregled videa ako je dostupan. Povratna informacija trenera. Zabilježite šta je funkcioniralo pod umorom. |\n\n- Štitnik za zube, suspenzor, štitnici za potkoljenice obavezni. Minimalno 16oz rukavice.\n- Imajte osobu u uglu koja prati runde i nadgleda pretjerani umor.\n- **Poslije sesije:** Protein + brzi ugljikohidrati unutar 30 min. Hladan tuš ili kontrastna terapija ako je dostupno.\n\n---\n\n## Petak — Snaga punog tijela + MMA Vježbanje\n\n> **Progresija od Sedmice 2:** Hang clean +2,5-5kg (sada 80-85kg). Potisak iznad glave (Push Press) +2,5kg (sada 58-62kg). Skokovi na kutiju i zamasi kettlebellom dobijaju 1 seriju (sada 5x3 i 4x10). Glavni podizaji na 5x3. Tursko ustajanje (TGU) opterećenje raste na 24kg.\n\n### Ujutro — Snaga: Snaga punog tijela (60 min) :red_circle:\n\n**Zagrijavanje (8 min)**\n\n| Vježba | Serije x Ponavljanja | Napomene |\n|----------|-------------|-------|\n| Preskakanje užeta | 2 min | Lagano, probudite CNS |\n| Skokovi u dalj | 3 x 3 | Priprema eksplozivnih obrazaca |\n| PVC Čučanj iznad glave (PVC Overhead Squat) | 2 x 5 | Pokretljivost + zagrijavanje |\n| Hang clean s praznom šipkom | 2 x 3 | Uhodajte povlačenje |\n\n**Glavni podizaji**\n\n| Vježba | Serije x Ponavljanja | Opterećenje | RPE |\n|----------|-------------|------|-----|\n| Hang clean | 5 x 3 | 80-85 kg | 8-9 |\n| Potisak iznad glave (Push Press) | 5 x 3 | 58-62 kg | 8-9 |\n\n- Odmor 2-2,5 min između serija.\n- Ovo su EKSPLOZIVNE vježbe — maksimalna namjera na svakom ponavljanju. Ako brzina šipke primjetno padne, smanjite opterećenje za 5%.\n\n**Eksplozivne dodatne vježbe**\n\n| Vježba | Serije x Ponavljanja | Opterećenje/Napomene |\n|----------|-------------|------------|\n| Skokovi na kutiju (Box Jumps) | 5 x 3 | Siđite korakom (čuvajte zglobove), maksimalna namjera visine |\n| Rotacioni bacanje medicinke (Med Ball Rotational Throws) | 4 x 5/strana | Bacite u zid, resetujte svako ponavljanje — rotacija specifična za borbu |\n| Zamasi kettlebellom (KB Swings) | 4 x 10 | 32 kg, ruski stil, snažan udarac kukovima |\n\n**Trup**\n\n| Vježba | Serije x Ponavljanja | Napomene |\n|----------|-------------|-------|\n| Tursko ustajanje (Turkish Get-Up) | 3 x 2/strana | 24 kg — polako i kontrolirano |\n| Nošenje kofera (Suitcase Carry) | 3 x 30m/strana | Težak kettlebell ili bučica, snažno učvrstite trup |\n\n**Hlađenje (3 min):** Vješanje na šipki, kruženje ručnim zglobovima, istezanje ramena s trakom.\n\n---\n\n### Popodne — MMA Vježbanje (75 min) :yellow_circle:\n\n| Blok | Trajanje | Detalji |\n|-------|----------|---------|\n| Zagrijavanje | 10 min | Flow pokreta — sprawlovi, shootovi, ustajanja, lagano pummeling |\n| Lančano hrvanje | 25 min | Lanci jednonožno u dvonožno rušenje, serija prednjeg headlocka, borbe za underhook. Mnogo ponavljanja, tehnička preciznost. |\n| Vježbe tranzicije | 20 min | Lanci rušenje-do-prolaza-do-submisije. Vježbanje na 70% brzine, raste do 85% do kraja. |\n| Pozicioni sparring | 20 min | Počnite iz specifičnih pozicija (pola garda, kontrola leđa). Runde od 3 min, rotacija partnera. Umjeren intenzitet. |\n\n- Petak popodne je umjerenog intenziteta — najteže sesije sedmice su iza vas. Fokus na tehničku oštrinu, ne na izlaz.\n\n---\n\n## Subota — Borbena kondicija + Slobodni mat\n\n> **Progresija od Sedmice 2:** Borbena kondicija dostiže vrhunac: 5 rundi od 5-minutnih krugova sa samo 60s odmora (bilo je 4 runde, 90s odmora). Ovo je vrhunac kondicione sesije bloka. Slobodni mat ostaje lagan.\n\n### Ujutro — Borbena kondicija (45 min) :red_circle:\n\n> **Vrhunac kondicione sesije bloka. 5 rundi koje simuliraju napor dužine borbe.**\n\n**Zagrijavanje (5 min):** Preskakanje užeta + dinamička istezanja.\n\n**Krug simulacije borbe — 5 rundi x 5 min, 60s odmor između rundi**\n\nSvaka runda kruži kroz ove stanice (45s rad / 15s tranzicija):\n\n| Stanica | Vježba | Napomene |\n|---------|----------|-------|\n| 1 | Teška vreća — Rafali kombinacija | Maksimalni output 45s |\n| 2 | Sprawl u shoot | Neprekidno — tempo borbe |\n| 3 | Sprint na assault biciklu | Sve od sebe |\n| 4 | Udaranje na parteru na vreći | Pozicija mounta ili garda |\n| 5 | Koljena iz klinča na vreći | Udari koljenima, održavajte kontrolu |\n\n- 60s odmor između rundi (1:1 rad-odmor za 5-minutne runde). Hodajte i dišite.\n- Ovo je TEŠKO. Cilj je održati kvalitet izlaza kroz svih 5 rundi. Kada se runde 4-5 osjećaju užasno, držite tehniku čistom.\n\n**Hlađenje (5 min):** Hodanje, disanje na nos, lagano istezanje.\n\n---\n\n### Popodne — Slobodni mat / Lagana tehnika (60 min) :green_circle:\n\n| Blok | Trajanje | Detalji |\n|-------|----------|---------|\n| Flow borba | 20 min | 40-50% intenziteta. Istraživanje pokreta, bez submisija. |\n| Igra tehnike | 25 min | Radite na setupima i ulascima s kojima ste se mučili ove sedmice. Tražite od trening partnera specifične pozicije. |\n| Istezanje / Pokretljivost | 15 min | Cijelo tijelo: otvaranje kukova, torakalna kičma, zadnja loža, ramena. Foam roller ako treba. |\n\n- Držite ovu sesiju LAGANOM. Akumulirali ste enormni trening stres ove sedmice.\n- **Subota navečer: počnite s pripremom oporavka za Sedmicu 4 deload (rasterećenje). Više sna, više hrane.**\n\n---\n\n## Nedjelja — ODMOR\n\n> **Puni dan odmora. Bez treninga.**\n\n| Prioritet | Detalji |\n|----------|---------|\n| San | 9+ sati. Odspavajte popodne ako je moguće. |\n| Ishrana | Kalorije održavanja (~3.400 kcal). Visok protein (2g/kg = 180g). Protuupalna hrana (bobičasto voće, masna riba, kurkuma). |\n| Aktivni oporavak | Šetnja 20-30 min. Lagano istezanje ili joga samo ako se osjeća dobro. |\n| Mentalno | Bez analize borbi, bez planiranja treninga. Isključite se i oporavite se. |\n| Priprema | Pripremite obroke za Sedmicu 4 (deload/rasterećenje). Pregledajte dnevnik treninga Sedmice 3 — zabilježite rekorde, šta se osjećalo dobro, šta je popustilo. |\n\n---\n\n## Sažetak Sedmice 3\n\n| Metrika | Vrijednost |\n|--------|-------|\n| Ukupno trening sesija | 12 (6 dana x 2 sesije) |\n| Sesije snage | 3 (Gornji dio tijela / Donji dio tijela / Eksplozivnost) |\n| MMA sesije | 5 (Udarci, Grappling, Sparring, Vježbanje, Slobodni mat x2) |\n| Kondicione sesije | 3 (Kardio izdržljivost, HIIT, Borbena kondicija) |\n| RPE glavnih podizaja | 8-9 |\n| Intenzitet sparringa | 85-90% (vrhunac) |\n| Odnos rad-odmor (kondicija) | 1:1 |\n| Dan odmora | Nedjelja |\n\n**Ključni podsjetnici za Sedmicu 3:**\n- Ovo je VRHUNAC sedmice. Sve je na najvišem nivou. Gurajte jako ali budite pametni.\n- Srijeda navečer i subota navečer su kritični prozori za oporavak — spavajte i jedite.\n- Četvrtak (HIIT + Sparring) je najteži pojedinačni dan. Upravljajte energijom u skladu s tim.\n- Ako forma popusti na glavnim podizajima, smanjite 2,5-5kg. RPE 8-9 znači teško, ne mljevenje do otkaza.\n- Sedmica 4 je deload (rasterećenje) — svjetlo na kraju tunela. Zaradite ga ove sedmice.\n", "week-4": "# Sedmica 4 — DELOAD (RASTEREĆENJE)\n\n**Fokus:** Oporavak i superkompenzacija. Volumen smanjen 40-50%, intenzitet na 70-75% 1RM, BEZ teškog sparringa. Svaka sesija ove sedmice služi oporavku — ako nešto djeluje teško ili se muči, odmah smanjite. Cilj je da u sljedeću sedmicu uđete svježiji i jači nego na početku ovog bloka.\n\n**Sportaš:** 87-90 kg, 185 cm | Čučanj 150 kg | Mrtvo dizanje 180 kg | Potisak s klupe 115 kg | Potisak iznad glave 75 kg\n\n## Ključ intenziteta\n\n| Oznaka | Značenje |\n|--------|---------|\n| 🟢 | Lagano — tempo oporavka, nizak zahtjev na CNS |\n| 🟡 | Umjereno — naporan rad ali kontroliran |\n\n> Ove sedmice nema NIJEDNE 🔴 sesije. Ako se nađete u 🔴 teritoriji, radite pogrešno.\n\n---\n\n## Sedmični pregled\n\n| Dan | Jutarnja sesija | Popodnevna sesija |\n|-----|-----------|------------|\n| **Ponedjeljak** | Snaga — Gornji dio tijela Potisak/Povlačenje (40 min) 🟢 | MMA Udarci — Lagana tehnika (50 min) 🟡 |\n| **Utorak** | Kardio izdržljivost (30 min) 🟢 | MMA Grappling — Flow borba (50 min) 🟢 |\n| **Srijeda** | Snaga — Donji dio tijela + Stražnji lanac (40 min) 🟢 | Pokretljivost / Joga / Oporavak (45 min) 🟢 |\n| **Četvrtak** | Lagana kondicija Zona 1-2 (25 min) 🟢 | MMA Tehničko vježbanje — Bez sparringa (60 min) 🟡 |\n| **Petak** | Snaga — Puno tijelo (35 min) 🟢 | MMA Vježbanje — Lagano (50 min) 🟢 |\n| **Subota** | Aktivni oporavak — Lagani kardio (30 min) 🟢 | Benchmark ponovna testiranja / Slobodni mat (45 min) 🟢 |\n| **Nedjelja** | ODMOR | ODMOR |\n\n### Sažetak volumena\n\n| Metrika | Vrijednost |\n|--------|-------|\n| Ukupno sesija | 12 |\n| Ukupno sati treninga | ~8,3 sata |\n| Sesije snage | 3 |\n| MMA/Vještine sesije | 5 |\n| Kondicione sesije | 2 |\n| Aktivni oporavak | 2 |\n| Distribucija intenziteta | 🟢 x10 / 🟡 x2 / 🔴 x0 |\n\n---\n\n## Ponedjeljak — Gornji dio tijela Potisak/Povlačenje + Lagani udarci\n\n### Ujutro — Snaga: Gornji dio tijela Potisak/Povlačenje (40 min) 🟢\n\n**Zagrijavanje (8 min)**\n\n| Vježba | Serije x Ponavljanja | Napomene |\n|----------|-------------|-------|\n| Razvlačenje s trakom (Band Pull-Aparts) | 2 x 15 | Lagana traka, otvorite prsa |\n| CARs za ramena (Shoulder CARs) | 1 x 5/smjer | Polako, kontrolirani krugovi |\n| Sklek u poziciju psa koji gleda dolje | 2 x 5 | Tečno kroz pokret |\n| Potisak s klupe s praznom šipkom | 2 x 8 | Uhodajte obrazac |\n\n**Glavni rad**\n\n| Vježba | Serije x Ponavljanja | Opterećenje | RPE | Tempo | Napomene |\n|----------|-------------|------|-----|-------|-------|\n| Potisak s klupe (Bench Press) | 3 x 3 | 80 kg (70% 1RM) | 5-6 | Brza koncentrična | Fokus na BRZINU šipke — svako ponavljanje treba letjeti. Bez mljevenja. |\n| Zgibovi (Pull-Ups) | 3 x 5 | Samo tjelesna težina | 5-6 | Kontrolirano | Puni opseg pokreta, bez kipinga, mrtvi vis svako ponavljanje |\n\n**Dodatne vježbe**\n\n| Vježba | Serije x Ponavljanja | Opterećenje | Napomene |\n|----------|-------------|------|-------|\n| Potisak s minom (Landmine Press) | 2 x 8 | Lagano (~25 kg na šipki) | Glatko potiskivanje, osjetite stabilizaciju ramena |\n| Povlačenje za lice (Face Pulls) | 2 x 15 | Lagana traka ili kabel | Spora ekscentrična, stiskanje u krajnjem opsegu |\n\n**Trup**\n\n| Vježba | Serije x Ponavljanja | Napomene |\n|----------|-------------|-------|\n| Pallof potisak (Pallof Press) | 2 x 10/strana | Lagana traka/kabel, zadržaj 2 sek na ispružanju |\n\n**Hlađenje (5 min):** Vješanje na šipki 3 x 20 sek. Istezanje prsnih mišića u dovratku 2 x 30 sek/strana.\n\n---\n\n### Popodne — MMA Udarci: Lagana tehnika (50 min) 🟡\n\n> BEZ jakih udaraca. BEZ živih rundi. Ovo je sesija kvalitete pokreta.\n\n| Blok | Trajanje | Aktivnost | Intenzitet |\n|-------|----------|----------|-----------|\n| Zagrijavanje | 10 min | Preskakanje užeta laganim tempom, dinamička istezanja | 🟢 |\n| Boks iz sjene | 15 min | 3 x 5 min runde na 50% brzine. Fokus na uglove kretanja, pokrete glave i čistu tehniku. Snimite se ako je moguće. | 🟢 |\n| Rad na fokuseru | 15 min | Lagani rad na fokuseru s partnerom. Naglasak na tajming i plasiranje umjesto snage. Kombinacije džeb-kros, defanzivne reakcije. Bez jakih udaraca. | 🟡 |\n| Vježbe kretanja | 5 min | Ljestve ili čunjevi. Bočno kretanje, pivoti, promjene nivoa. | 🟢 |\n| Hlađenje | 5 min | Statičko istezanje: fleksori kukova, zadnja loža, ramena | 🟢 |\n\n**Napomene za oporavak u ponedjeljak:**\n- Foam roller na gornji dio leđa, latissimus i prsa 10 min prije spavanja\n- Cilj sna: 8-9 sati\n- Obrok nakon treninga: visok protein (40g+), umjereni ugljikohidrati, dobra hidracija\n- Izbjegavajte ekrane 30 min prije spavanja\n\n---\n\n## Utorak — Kardio izdržljivost + Flow borba\n\n### Ujutro — Kardio izdržljivost (30 min) 🟢\n\n| Blok | Trajanje | Aktivnost | Ciljni puls |\n|-------|----------|----------|-----------|\n| Zagrijavanje | 5 min | Lagana šetnja ili lagan trk | < 120 BPM |\n| Glavni dio | 20 min | Kardio ustaljenim tempom: lagan trk, lagani bicikl ili plivanje. Izaberite što najbolje odgovara zglobovima. | 120-145 BPM (Zona 1-2) |\n| Hlađenje | 5 min | Šetnja + duboko disanje | Spustite puls ispod 100 |\n\n> Ovo NIJE trening. Ovo je aktivni oporavak koji uključuje kretanje. Ako ne možete voditi puni razgovor, idete previše jako.\n\n---\n\n### Popodne — MMA Grappling: Flow borba (50 min) 🟢\n\n> BEZ submisija. BEZ držanja pozicija. Samo neprekidno kretanje i tranzicije. Maksimalno 50% intenziteta.\n\n| Blok | Trajanje | Aktivnost | Intenzitet |\n|-------|----------|----------|-----------|\n| Zagrijavanje | 10 min | Ispadi kukovima, tehnička ustajanja, vježbe s partnerom hodajućim tempom | 🟢 |\n| Flow borba | 30 min | 5 x 6 min rundi flow borbe. Neprekidno kretanje — kada dobijete poziciju, pređite iz nje. Fokus na lančanje pokreta zajedno. Bez držanja, bez forsiranja. Ako uhvatite poziciju za submisiju, pustite je i pređite na sljedeću sekvencu. | 🟢 |\n| Pozicioni flow | 5 min | Poziciono kruženje s partnerom: gard > pola garda > bočna kontrola > mount > leđa. Ponovite. Glatke tranzicije, bez otpora. | 🟢 |\n| Hlađenje | 5 min | Istezanje: fleksori kukova, zadnja loža, vrat, donji dio leđa | 🟢 |\n\n**Napomene za oporavak u utorak:**\n- Foam roller na kukove, aduktore i donji dio leđa 10 min\n- Kupka s Epsom solju ako je dostupna (15-20 min)\n- Cilj sna: 8-9 sati\n- Ishrana: prioritizirajte protuupalnu hranu (riba, bobičasto voće, zeleno lisnato povrće)\n\n---\n\n## Srijeda — Snaga donjeg dijela tijela + Pokretljivost/Oporavak\n\n### Ujutro — Snaga: Donji dio tijela + Stražnji lanac (40 min) 🟢\n\n**Zagrijavanje (8 min)**\n\n| Vježba | Serije x Ponavljanja | Napomene |\n|----------|-------------|-------|\n| Goblet čučanj | 2 x 8 | Lagani kettlebell (16 kg), sjednite duboko, otvorite kukove |\n| Bočni hod s trakom (Banded Lateral Walk) | 2 x 10/smjer | Lagana traka, osjetite aktivaciju gluteusa |\n| 90/90 istezanje kukova | 1 x 5/strana | Polane tranzicije, dišite u napeta mjesta |\n| Čučanj s praznom šipkom | 2 x 5 | Uhodajte obrazac |\n\n**Glavni rad**\n\n| Vježba | Serije x Ponavljanja | Opterećenje | RPE | Tempo | Napomene |\n|----------|-------------|------|-----|-------|-------|\n| Stražnji čučanj (Back Squat) | 3 x 3 | 105 kg (70% 1RM) | 5-6 | Brza koncentrična | Eksplodirajte iz najniže pozicije. Svako ponavljanje treba biti LAGANO. |\n| Rumunsko mrtvo dizanje (Romanian Deadlift) | 3 x 3 | 117 kg (65% 1RM mrtvog dizanja) | 5-6 | Kontrolirana ekscentrična | Praksa obrasca pregiba, bez mljevenja |\n\n**Dodatne vježbe**\n\n| Vježba | Serije x Ponavljanja | Opterećenje | Napomene |\n|----------|-------------|------|-------|\n| Bugarski čučanj (Rear Foot Elevated Split Squat) | 2 x 6/noga | Lagano (tjelesna težina ili 12 kg bučice) | Fokus na ravnotežu i stabilnost |\n| 90/90 rotacije kukovima | 2 x 10 | Tjelesna težina | Polako i kontrolirano, poboljšajte pokretljivost kukova |\n\n**Trup**\n\n| Vježba | Serije x Ponavljanja | Napomene |\n|----------|-------------|-------|\n| Mrtva buba (Dead Bug) | 2 x 8/strana | Polako, pritisnite donji dio leđa u pod, puni izdah svako ponavljanje |\n\n**Hlađenje (5 min):** Istezanje na kauču 2 x 45 sek/strana. Golub istezanje 2 x 45 sek/strana.\n\n---\n\n### Popodne — Pokretljivost / Joga / Oporavak (45 min) 🟢\n\n> Ovo je najvažnija sesija oporavka u sedmici. Nemojte je preskočiti.\n\n| Blok | Trajanje | Aktivnost |\n|-------|----------|----------|\n| Foam roller | 15 min | Cijelo tijelo: kvadricepsi, zadnja loža, gluteusi, IT traka, torakalna kičma, latissimus. Provedite dodatno vrijeme na bolnim mjestima. Koristite lacrosse lopticu na trapezima i piriformisu po potrebi. |\n| Flow pokretljivosti | 15 min | Najbolje istezanje na svijetu (World's Greatest Stretch) x 5/strana. Mačka-krava x 10. Provlačenje igle (Thread the Needle) x 8/strana. Duboki čučanj držanje 3 x 30 sek. Škorpion istezanje x 8/strana. Jefferson uvijanje (Jefferson Curl) 3 x 5 (lagano ili tjelesna težina). |\n| Joga / Disanje | 15 min | Držite svaku poziciju 60-90 sek: Poza goluba, Poza guštera, Ležeće uvijanje, Poza djeteta, Noge uz zid. Završite s 3 min box disanja (4 sek udah, 4 sek zadržavanje, 4 sek izdah, 4 sek zadržavanje). |\n\n**Napomene za oporavak u srijedu:**\n- Ovo je sidro oporavka sredinom sedmice — zaštitite ovu sesiju\n- Foam roller prije spavanja (minimalno 10 min)\n- Razmislite o kontrastnom tušu: 2 min toplo / 30 sek hladno x 3 runde\n- Cilj sna: 9 sati (najvažnija noć sna u sedmici)\n- Ishrana: jedite na održavanju ili u blagom suficitu, visok protein, kvalitetni ugljikohidrati\n\n---\n\n## Četvrtak — Lagana kondicija + Tehničko vježbanje\n\n### Ujutro — Lagana kondicija Zona 1-2 (25 min) 🟢\n\n> Puls mora ostati ispod 140 BPM U SVAKOM TRENUTKU. Ovo je priprema pokreta, ne kondicioni rad.\n\n| Blok | Trajanje | Aktivnost | Ciljni puls |\n|-------|----------|----------|-----------|\n| Zagrijavanje | 5 min | Lagana šetnja ili lagano preskakanje | < 110 BPM |\n| Krug (2 runde) | 15 min | Preskakanje užeta laganim tempom (2 min) > Lagani boks iz sjene (2 min) > Krug pokretljivosti s tjelesnom težinom: crvi (inchworms), zamasi nogama, kruženje rukama (2 min) > Lagano bočno šafliranje (1,5 min). Odmor 60 sek između rundi. | < 140 BPM |\n| Hlađenje | 5 min | Šetnja + dijafragmalno disanje | Spustite puls ispod 100 |\n\n---\n\n### Popodne — MMA Tehničko vježbanje — Bez sparringa (60 min) 🟡\n\n> Ovo zamjenjuje uobičajenu sparring sesiju. BEZ živih rundi. BEZ teških razmjena. Samo tehnički rad umjerenim tempom.\n\n| Blok | Trajanje | Aktivnost | Intenzitet |\n|-------|----------|----------|-----------|\n| Zagrijavanje | 10 min | Flow pokreta: životinjski hodovi, sprawlovi na 50%, promjene nivoa | 🟢 |\n| Kombinacije udaraca | 15 min | Vježbajte 3-4 ključne kombinacije iz ovog mezociklusa. Polako i promišljeno. Partner drži fokusere ili igra odbranu na 30% otpora. Fokus na čiste tranzicije između udaraca. | 🟡 |\n| Ulasci u rušenje | 15 min | Vježbajte samo ulaze — bez punih bacanja ili slamova. Ulaz u jednonožno rušenje > završetak uz zid. Vježba koraka penetracije za dvonožno rušenje. Rad na setupima iz kombinacija udaraca u ulaze za rušenje. | 🟡 |\n| Pummeling u klinču | 10 min | Lagani rad u klinču. Pummeling za underhookove, rad s ovratnikom. 50% otpora. Fokus na posturu i borbu rukama. | 🟢 |\n| Vježba tranzicije | 5 min | Puna sekvenca hodajućim tempom: džeb-kros > promjena nivoa > jednonožno rušenje > prolaz u bočnu kontrolu > tranzicija u mount. Ponovite drugu stranu. | 🟢 |\n| Hlađenje | 5 min | Istezanje uz pomoć partnera: zadnja loža, fleksori kukova, ramena | 🟢 |\n\n**Napomene za oporavak u četvrtak:**\n- Foam roller za cijelo tijelo 10 min\n- Cilj sna: 8-9 sati\n- Provjera hidracije: ciljajte bistru/svijetložutu boju urina tokom dana\n- Prije spavanja: magnezij suplement ako je dio vašeg protokola (pogledajte nutrition-recovery-supplements.md)\n\n---\n\n## Petak — Snaga punog tijela + Lagano MMA vježbanje\n\n### Ujutro — Snaga: Puno tijelo (35 min) 🟢\n\n**Zagrijavanje (8 min)**\n\n| Vježba | Serije x Ponavljanja | Napomene |\n|----------|-------------|-------|\n| Halo s kettlebellom (KB Halo) | 2 x 8/smjer | Lagani kettlebell (12 kg), otvorite ramena |\n| Čučanj s tjelesnom težinom | 2 x 8 | Polako i kontrolirano |\n| Pregib kukova s PVC cijevi | 2 x 8 | Uhodajte obrazac pregiba |\n| Vješanje na šipki | 2 x 15 sek | Dekompresija kičme |\n\n**Glavni rad — Fokus na tehniku**\n\n| Vježba | Serije x Ponavljanja | Opterećenje | RPE | Napomene |\n|----------|-------------|------|-----|-------|\n| Hang clean | 3 x 2 | 65-70 kg | 5-6 | FOKUS na tehniku. Brzi laktovi, puna trostruka ekstenzija. Svako ponavljanje treba biti oštro. |\n| Potisak iznad glave (Push Press) | 3 x 2 | 50 kg | 5 | Pogon nogama u glatko zaključavanje. Naglasak na brzini. |\n\n**Dodatne vježbe**\n\n| Vježba | Serije x Ponavljanja | Opterećenje | Napomene |\n|----------|-------------|------|-------|\n| Zamasi kettlebellom (KB Swings) | 2 x 8 | 24 kg | Udarac kukovima, ne povlačite rukama. Snažno ali kontrolirano. |\n\n**Trup**\n\n| Vježba | Serije x Ponavljanja | Opterećenje | Napomene |\n|----------|-------------|------|-------|\n| Tursko ustajanje (Turkish Get-Up) | 2 x 2/strana | 16 kg | Polako i promišljeno. Posjedujte svaku poziciju. |\n\n**Hlađenje (5 min):** Vješanje na šipki 2 x 20 sek. Najbolje istezanje na svijetu (World's Greatest Stretch) 3/strana.\n\n---\n\n### Popodne — MMA Vježbanje: Lagano (50 min) 🟢\n\n> Spora, promišljena praksa. Ovo je sesija poliranja tehnike — ne trening.\n\n| Blok | Trajanje | Aktivnost | Intenzitet |\n|-------|----------|----------|-----------|\n| Zagrijavanje | 10 min | Lagano kretanje: solo vježbe, ispadi kukovima, boks iz sjene za hrvanje | 🟢 |\n| Ponavljanja tehnika | 25 min | Izaberite 2-3 ključne tehnike iz ovog mezociklusa. Vježbajte svaku u blokovima od 8 min. Spora ponavljanja — mislite 50-60% brzine. Fokus na detalje: postavljanje hvata, pozicija stopala, distribucija težine, tajming. Tražite povratnu informaciju od trenera ili partnera. | 🟢 |\n| Situaciono vježbanje | 10 min | Lagane pozicione runde iz specifičnih pozicija (npr. počnite u pola gardu, radite preokret). Partner daje samo 30% otpora. Resetujte i ponovite. | 🟢 |\n| Hlađenje | 5 min | Istezanje i dekompresija. Istezanje vrata, kruženje ramenima, otvaranje kukova. | 🟢 |\n\n**Napomene za oporavak u petak:**\n- Foam roller i istezanje 10-15 min prije spavanja\n- Cilj sna: 8-9 sati — kritično prije subotnjeg benchmark testiranja\n- Ishrana: jedite dobro, ne ograničavajte. Kvalitetni ugljikohidrati s večerom za gorivo za sutra\n- Pregledajte conditioning-tests.md večeras da znate koje testove ćete raditi u subotu\n\n---\n\n## Subota — Aktivni oporavak + Benchmark ponovna testiranja\n\n### Ujutro — Aktivni oporavak: Lagani kardio (30 min) 🟢\n\n| Blok | Trajanje | Aktivnost | Ciljni puls |\n|-------|----------|----------|-----------|\n| Lagani kardio | 30 min | Šetnja, lagani bicikl ili lagano plivanje. Ovo NIJE trčanje. Držite tempo zaista laganim. Krećite se nježno, uživajte vani ako vrijeme dozvoljava. | < 130 BPM (Zona 1) |\n\n> Iskoristite ovo vrijeme za mentalnu pripremu za benchmark testove. Vizualizirajte testove, postavite ciljane brojke, ostanite opušteni.\n\n---\n\n### Popodne — Benchmark ponovna testiranja / Slobodni mat (45 min) 🟢\n\n> Uporedite sve rezultate s vašim početnim vrijednostima iz Sedmice 0 iz conditioning-tests.md. Zabilježite sve.\n\n**Pred-test:** Zabilježite puls u mirovanju (trebao je biti izmjeren jutros pri buđenju).\n\n| Redoslijed | Test | Protokol | Odmor prije sljedećeg testa | Napomene |\n|-------|------|----------|----------------------|-------|\n| 0 | Puls u mirovanju | Zabilježen pri buđenju, prije ustajanja iz kreveta. Ležite mirno 2 min, zatim zabilježite. | — | Uporedite s početnom vrijednosti Sedmice 0. Niži = bolja adaptacija oporavka. |\n| 1 | Maksimalni striktni zgibovi | Mrtvi vis, puni opseg pokreta, brada iznad šipke. Bez kipinga. Brojite do otkaza. | 3 min | Svjež test — radite ovo prvo. |\n| 2 | Maksimalni sklekovi u 2 min | Prsa do poda, puno zaključavanje. Neprekidni tajmer, odmorite u plank poziciji ako treba. | 3 min | Rasporedite tempo — ne izgorite u prvih 30 sek. |\n| 3 | Maksimalno držanje planka | Plank na podlakticama, tijelo ravno, bez propadanja ili dizanja. Vrijeme do otkaza ili raspada forme. | 3 min | Stisnite gluteuse, učvrstite trup, dišite. |\n| 4 | 2 km trčanje ili veslanje na vrijeme | OPCIONO — samo ako se osjećate svježi i oporavljeni. Ako ste u nedoumici, preskočite. Trčanje na ravnoj površini ili veslanje na ergometru. Maksimalni napor. | — | Ovo je jedini visoko-intenzivni napor dozvoljen ove sedmice. Preskočite ako ste umorni. |\n\n**Poslije-test:**\n\n| Vrijeme | Aktivnost |\n|------|----------|\n| 10 min | Lagani slobodni mat — lagano kotrljanje, igra tehnike, ništa takmičarsko |\n| 5 min | Puno hlađenje istezanjem |\n\n**Zabilježite svoje rezultate:**\n\n| Test | Početna vrijednost Sedmica 0 | Rezultat Sedmica 4 | Promjena |\n|------|----------------|---------------|--------|\n| Puls u mirovanju | ___ bpm | ___ bpm | |\n| Maksimalni striktni zgibovi | ___ ponavljanja | ___ ponavljanja | |\n| Maksimalni sklekovi (2 min) | ___ ponavljanja | ___ ponavljanja | |\n| Maksimalno držanje planka | ___ sek | ___ sek | |\n| 2 km trčanje/veslanje | ___ min:sek | ___ min:sek | |\n\n**Napomene za oporavak u subotu:**\n- Poslije testa: proteinski šejk ili obrok unutar 30 min\n- Foam roller i istezanje 15 min\n- Ovo je posljednji dan treninga — proslavite završetak bloka\n- San: idite rano u krevet, ciljajte 9 sati\n\n---\n\n## Nedjelja — POTPUNI ODMOR\n\nBez treninga. Bez \"aktivnog oporavka.\" Bez teretane. Odmorite se potpuno.\n\n| Prioritet | Akcija |\n|----------|--------|\n| San | 9+ sati. Prespavajte ako vaše tijelo to želi. |\n| Ishrana | Jedite na održavanju ili u blagom suficitu. Visok protein, kvalitetni ugljikohidrati, zdrave masti. |\n| Hidracija | 3-4 litre vode tokom dana. |\n| Meka tkiva | Opciono: 15 min foam roller / rad s lacrosse lopticom ako osjećate zategnutost. |\n| Mentalno | Radite nešto nevezano za trening u čemu uživate. Isključite se od pripreme za borbu. |\n| Pregled | Pregledajte rezultate benchmark testiranja Sedmice 4. Uporedite sa Sedmicom 0. Zabilježite poboljšanja i oblasti za ciljanje u sljedećem bloku. |\n\n---\n\n## Kontrolna lista oporavka Sedmice 4\n\nKoristite ovo svakodnevno. Označite svaku stavku prije spavanja.\n\n### Dnevni nepregovarači\n\n- [ ] **San:** Minimalno 8-9 sati (9 u srijedu i nedjelju)\n- [ ] **Hidracija:** 3-4 litre vode. Urin treba biti bistar/svijetložut.\n- [ ] **Protein:** Minimalno 2g/kg tjelesne težine (~180g/dan). Raspoređeno na 4-5 obroka.\n- [ ] **Foam roller:** Minimalno 10 min. Cijelo tijelo, dodatno vrijeme na bolnim mjestima.\n- [ ] **Istezanje/Pokretljivost:** 5-10 min posvećenog istezanja (odvojeno od hlađenja na treningu)\n\n### Dnevne bonus akcije za oporavak\n\n- [ ] **Izlaganje hladnoći/kontrastu:** Kontrastni tuš (2 min toplo / 30 sek hladno x 3) ili uranjanje u hladnu vodu\n- [ ] **Rad na disanju:** 3-5 min box disanja ili praksa disanja samo na nos\n- [ ] **Zabrana ekrana:** Bez ekrana 30 min prije spavanja\n- [ ] **Magnezij:** Magnezij prije spavanja ako je dio vašeg suplementskog protokola\n- [ ] **Šetnja:** 15-20 min lagana šetnja vani (izlaganje sunčevom svjetlu za cirkadijalni ritam)\n\n### Sedmični ciljevi\n\n- [ ] Nula 🔴 intenzitetnih sesija (ako se bilo koja sesija osjećala teško, previše ste forsirali)\n- [ ] Sve sesije bazirane na pulsu su ostale ispod propisanih granica (145 BPM kardio izdržljivost, 140 BPM četvrtak kondicija, 130 BPM subota lagani kardio)\n- [ ] Tjelesna težina stabilna ili blago povećana (NE SMIJETE biti u deficitu tokom deloada)\n- [ ] Nema novih bolova ili povreda — postojeća bolnost bi se trebala smanjivati iz dana u dan\n- [ ] Benchmark testovi završeni u subotu i zabilježeni\n- [ ] Rezultati upoređeni s početnim vrijednostima Sedmice 0 iz conditioning-tests.md\n- [ ] Dnevnik treninga ažuriran sa svim težinama, ponavljanjima i RPE podacima za sedmicu\n- [ ] Mentalno stanje: osjećate želju za ponovnim teškim treningom (ne strahuete od sljedeće sedmice)\n\n### Znakovi da je deload (rasterećenje) uspio\n\n- Puls u mirovanju je pao u odnosu na kraj Sedmice 3\n- Snaga stiska i brzina šipke se osjetno bolje osjećaju do petka\n- Raspoloženje i motivacija su porasli\n- Kvalitet sna se poboljšao\n- Manji bolovi iz Sedmice 3 su se povukli\n- Rezultati benchmark testova odgovaraju ili premašuju početne vrijednosti Sedmice 0\n\n### Znakovi da vam treba više oporavka\n\n- I dalje se osjećate ravno ili umorno do četvrtka\n- Puls u mirovanju se nije spustio\n- Kvalitet sna je i dalje loš\n- Dugotrajni bol u zglobovima ili mišićna bolnost\n- Nema motivacije za trening\n\n> Ako vidite više znakova upozorenja iznad, razmislite o produženju deloada (rasterećenja) za 2-3 dana prije početka sljedećeg bloka. Oporavak nije slabost — tu se dešava adaptacija.\n", "exercises": "# Rječnik vježbi\n\nOvaj rječnik pokriva svaku vježbu korištenu u MMA programu treninga. Svaki unos objašnjava pripremu, izvođenje, česte greške i — najvažnije — kako se pokret prenosi na borbu. Koristite ovo kao brzu referencu pri programiranju ili treniranju.\n\n---\n\n## 1. Složene vježbe sa šipkom (Compound Barbell Lifts)\n\n| Vježba | Primarne mišićne grupe | Oprema | Postava | Upute za izvođenje | Česte greške | MMA korist |\n|---|---|---|---|---|---|---|\n| Čučanj (Back Squat) | Kvadricepsi, gluteusi, aduktori, erektori | Šipka, stalak za čučanj | Šipka na gornjim trapezima (visoki položaj) ili zadnjim deltoidima (niski položaj). Stopala u širini ramena, prsti blago prema van. | \"Jako stabilizuj jezgru (core), raširuj pod, kukovi i koljena se savijaju zajedno. Pogon prema gore kroz sredinu stopala.\" | Koljena padaju prema unutra, naginjanje naprijed / pad prsa, skraćivanje dubine, gubitak stabilnosti na dnu. | Gradi produkciju sile donjih ekstremiteta koja pokreće promjene nivoa, odbranu od obaranja (ustajanje pod pritiskom) i nokaut-snagu udaraca od nogu prema gore. |\n| Prednji čučanj (Front Squat) | Kvadricepsi, gluteusi, gornja leđa, jezgra (core) | Šipka, stalak za čučanj | Šipka u prednjem hvatu (čisti hvat ili prekrštene ruke). Laktovi visoko, prsa uspravna. Stopala u širini ramena. | \"Laktovi gore cijelo vrijeme. Sjedni ravno dolje između kukova. Pogon gore držeći torzo vertikalno.\" | Padanje laktova (šipka se kotrlja naprijed), nefleksibilnost zglobova prisiljavajući prekršteni hvat kada je čisti hvat bolji, plitka dubina. | Uspravan obrazac torza oponaša držanje potrebno u klinču i tokom završavanja duplog obaranja (double-leg). Veliki zahtjev na prednju jezgru (core) prenosi se na otpor savijanju u grapplingu. |\n| Mrtvo dizanje (Deadlift) | Zadnji lanac (gluteusi, zadnja loža, erektori), latisimus (lats), hvat | Šipka | Stopala u širini kukova ispod šipke, potkoljenice blizu šipke. Fleksija u kukovima, hvat odmah izvan koljena. Neutralna kičma, latisimus angažiran. | \"Guraj pod od sebe, zaključaj latisimus, šipka klizi uz noge. Stani uspravno — stisni gluteuse na kraju.\" | Zaokruživanje donjih leđa, trzanje šipke s poda, kukovi koji pucaju gore prvi, prekomjerno opružanje na kraju. | Ukupna snaga zadnjeg lanca za eksplozivnu ekstenziju kukova — motor iza bacanja, obaranja, proval (sprawl) i teških udaraca zadnjom rukom. Izdržljivost hvata pod opterećenjem. |\n| Rumunsko mrtvo dizanje (Romanian Deadlift / RDL) | Zadnja loža, gluteusi, erektori | Šipka | Stani sa šipkom na visini kukova (iz stalka ili nakon mrtvog dizanja). Stopala u širini kukova, blagi savijak koljena, ramena povučena. | \"Guraj kukove ravno nazad kao da zatvararaš vrata automobila. Šipka ostaje na butinama/potkoljenicama. Osjeti duboko istezanje zadnje lože, zatim pogoni kukove naprijed.\" | Previše savijanja koljena (pretvara se u čučanj), zaokruživanje leđa, nedovoljno duboko savijanje. | Ekscentrična snaga zadnje lože smanjuje rizik od povreda koljena od provala (sprawl) i udaranja nogom. Obrazac šarki kukova (hip-hinge) pokreće potkopavanja i povratke na strunjač. |\n| Potisak s klupe (Bench Press) | Prsa, prednji deltoidi, tricepsi | Šipka, klupa, stalak | Lezi na klupu, oči ispod šipke. Povuci i spusti lopatice. Hvat malo širi od širine ramena. Stopala ravno na podu. | \"Skini šipku, kontrolirano spusti na donja prsa, pogon kroz stopala, potisni šipku u blagom luku nazad iznad ramena.\" | Širenje laktova na 90 stepeni (stres na ramena), odbijanje šipke od prsa, gubitak retrakcije lopatica, podizanje kukova. | Horizontalna potisna snaga za okvire (frame), krute ruke i podizanje protivnika s klupe iz donje pozicije. Snaga tricepsa pomaže u postavljanju i stvaranju distance. |\n| Potisak iznad glave (Overhead Press) | Deltoidi, tricepsi, gornji trapezius, jezgra (core) | Šipka, stalak za čučanj | Šipka u prednjem hvatu na ključnoj kosti. Stopala u širini kukova, gluteusi i trbušnjaci stabilizirani. | \"Potisni šipku ravno gore — pomakni glavu s puta, zatim je vrati natrag kad šipka prođe. Zaključaj direktno iznad sredine stopala.\" | Pretjerano savijanje leđa (pretvara se u kosi potisak), potiskivanje šipke naprijed umjesto ravno gore, nestabilizirana jezgra (core). | Snaga iznad glave za oslanjanje na kavez, borbu rukama iz ovratničkih hvata i otpor guranju nadolje u klinču. Stabilnost jezgre pod opterećenjem iznad glave odražava zahtjeve borbe za poziciju. |\n| Veslanje šipkom (Barbell Row) | Latisimus (lats), romboidni, zadnji deltoidi, bicepsi, erektori | Šipka | Savijanje do otprilike 45 stepeni torza. Nadlani ili podlani hvat odmah izvan koljena. Blagi savijak koljena. | \"Povuci šipku do donjeg sternuma, stisni lopatice na vrhu, kontroliraj negativnu fazu. Torzo miruje.\" | Pretjerano pomicanje torza (veslanje s momentumom), povlačenje prema trbuhu, prestojanje previše uspravno. | Snaga povlačenja za rad u klinču, kontrolu potkopavanja (underhook), povlačenje ruke (arm drag) i završavanje giljotine. Održava držanje gornjeg dijela leđa za otpor slamanju. |\n| Hang čišćenje (Hang Clean) | Kvadricepsi, gluteusi, trapezius, gornja leđa, podlaktice | Šipka | Počni stojeći sa šipkom na visini kukova, nadlani hvat. Blago se savij da dovedeš šipku tik iznad koljena (hang pozicija). | \"Eksplodiraj kukovima, slij, povuci laktove visoko, uhvati u prednji hvat s četvrt čučnjem. Ustani.\" | Povlačenje rukama umjesto pogona kukovima, nedovoljno brzo provlačenje laktova, hvatanje na zglobovima umjesto na deltoidima. | Trostruka ekstenzija (gležanj-koljeno-kuk) je isti motorni obrazac kao ulazak u duplo obaranje (double-leg) ili bacanje aperkota. Uči brzinu razvoja sile — koliko brzo možeš izraziti snagu. |\n| Potisak s pogonom (Push Press) | Deltoidi, tricepsi, kvadricepsi, gluteusi, jezgra (core) | Šipka, stalak za čučanj | Šipka u prednjem hvatu na ključnoj kosti. Stopala u širini kukova. | \"Brzi zamah dolje (10-15 cm) držeći torzo vertikalno, zatim agresivno pogoni kroz noge i potisni šipku iznad glave u jednom pokretu. Zaključaj.\" | Naginjanje zamaha naprijed (težina na prstima), potiskivanje prije nego noge završe pogon, spor zamah koji ubija ciklus istezanja i skraćivanja. | Uči prijenos sile od nogu do ruku — isti kinetički lanac koji se koristi u svakom udarcu i u izbacivanju protivnika iz ravnoteže iz klinča. Razvija snagu zaključavanja iznad glave za rad uz kavez. |\n\n---\n\n## 2. Jednostrane vježbe (Single-Leg / Unilateral)\n\n| Vježba | Primarne mišićne grupe | Oprema | Postava | Upute za izvođenje | Česte greške | MMA korist |\n|---|---|---|---|---|---|---|\n| Bugarski split čučanj (RFESS / Bulgarian Split Squat) | Kvadricepsi, gluteusi, aduktori | Bučice ili šipka, klupa | Zadnje stopalo gornjim dijelom na klupu iza sebe. Prednje stopalo dovoljno daleko naprijed da koljeno ostaje iznad gležnja na dnu. | \"Spusti se ravno dolje dok zadnje koljeno skoro ne dodirne pod. Pogon kroz prednju petu. Drži torzo uspravno.\" | Prednje stopalo preblizu klupi (koljeno puca naprijed), pretjerano naginjanje torza, zadnje stopalo nosi previše tereta. | Snaga i ravnoteža na jednoj nozi za udaranje nogom, proval (sprawl) s jedne noge i održavanje baze kada protivnik zgrabi nogu. Smanjuje bilateralne neravnoteže snage koje uzrokuju povrede. |\n| Rumunsko mrtvo dizanje na jednoj nozi (Single-Leg RDL) | Zadnja loža, gluteusi, jezgra (core) (anti-rotacija) | Bučica ili girja (kettlebell) | Stani na jednu nogu, meko koljeno. Drži teg u suprotnoj ruci. | \"Savij se u kuku, slobodna noga se pruža iza tebe kao protutežo. Leđa ravna. Stisni gluteus da se uspraviš.\" | Zaokruživanje leđa, otvaranje kuka (rotiranje), nedovoljno duboko savijanje, žurenje pokreta. | Snaga zadnjeg lanca na jednoj nozi direktno se prenosi na udaranje nogom (stabilnost stajne noge), odbranu od obaranja na jednu nogu i doskok nakon bacanja koljena. Zahtjev anti-rotacije odražava rotacijski kaos grapplinga. |\n| Iskoraci u hodu (Walking Lunges) | Kvadricepsi, gluteusi, fleksori kuka | Bučice, šipka ili vlastita težina | Stani uspravno, tegovi sa strane ili na leđima. | \"Napravi dugačak korak naprijed, spusti zadnje koljeno prema podu, pogon kroz prednju petu da zakoračiš u sljedeće ponavljanje. Ostani uspravan.\" | Kratki koraci (koljeno preko prstiju), pad torza naprijed, odguravanje zadnjim stopalom umjesto povlačenja prednjom nogom. | Dinamička snaga jedne noge s komponentom kretanja — prenosi se na ulaze za obaranje, promjene nivoa i održavanje ravnoteže tokom kretanja naprijed u zoni udaranja. |\n| Ustajanje na kutiju (Step-Ups) | Kvadricepsi, gluteusi | Kutija (40-50 cm), bučice | Postavi jedno stopalo potpuno na kutiju. Drži bučice sa strane. | \"Pogon kroz gornje stopalo da ustaneš na kutiju. NEMOJ se odgurivati donjim stopalom. Kontroliraj silazak.\" | Korištenje donjeg stopala za odguravanje (varanje), kutija preniska da izazove pokret, naginjanje naprijed. | Koncentrična snaga jedne noge za pogon s podloge (ustajanje iz donje pozicije), prodorni koraci za obaranja i eksplozivne promjene nivoa. |\n| Progresija pištolja čučnja (Pistol Squat Progression) | Kvadricepsi, gluteusi, fleksori kuka, gležnjevi | Vlastita težina (traka ili kutija za pomoć) | Stani na jednu nogu. Ispruži drugu nogu ispred sebe. Ruke naprijed za protutežu. | \"Sjedi natrag i dolje na jednoj nozi, držeći petu ravno. Idi koliko duboko mobilnost dozvoljava, zatim pogoni gore. Koristi traku ili kutiju za potpomognute verzije po potrebi.\" | Koljeno pada prema unutra, peta se podiže, zaokruživanje donjih leđa na dnu, korištenje momenta za ustajanje. | Ultimativni izraz snage i mobilnosti jedne noge. Prenosi se na vraćanje ravnoteže nakon čišćenja ili guranja, duboke pozicije jedne noge u borbama za poziciju i demonstrira mobilnost koju borci trebaju u kukovima i gležnjevima. |\n\n---\n\n## 3. Snaga / Eksplozivnost (Power / Explosive)\n\n| Vježba | Primarne mišićne grupe | Oprema | Postava | Upute za izvođenje | Česte greške | MMA korist |\n|---|---|---|---|---|---|---|\n| Skokovi na kutiju (Box Jumps) | Kvadricepsi, gluteusi, listovi | Pliometrijska kutija (50-75 cm) | Stani licem prema kutiji, stopala u širini ramena, ruke nazad. | \"Zamahni rukama, opruži kukove-koljena-gležnjeve, doskoči meko na kutiju s punim kontaktom stopala. Stani uspravno, siđi korakom.\" | Odskakivanje od poda (koristi pauzu između ponavljanja), doskok u dubok čučanj na kutiji (znači da je kutija previsoka), skakanje dolje umjesto silaska. | Trenira brzinu razvoja sile i reaktivnu snagu za eksplozivne ulaze za obaranje, proval (sprawl) i zatvaranje distance za udarce. |\n| Skokovi u dalj (Broad Jumps) | Gluteusi, kvadricepsi, zadnja loža, listovi | Otvoren prostor na podu | Stopala u širini ramena, ruke iza tijela. | \"Zamahni rukama naprijed, pogoni kukove i skoči naprijed za maksimalnu udaljenost. Apsorbiraj doskok mekim koljenima, zadrži poziciju.\" | Nekorištenje ruku, doskok ukočenih nogu, nepotpuna ekstenzija kukova. | Horizontalna eksplozivna snaga — tačan vektor koji se koristi u obaranjima i zatvaranju distance za udarce. Uči agresivnu ekstenziju kukova prema meti. |\n| Udaranje medicinkom o pod (Med Ball Overhead Slam) | Latisimus (lats), jezgra (core), ramena, tricepsi | Slam lopta (7-14 kg) | Stani uspravno, lopta iznad glave s ispruženim rukama. | \"Stabiliziraj jezgru, udari loptom o pod što jače moguće koristeći cijelo tijelo. Savij se i prati pokret. Uhvati odskočenu loptu ili je podigni.\" | Korištenje samo ruku (bez angažmana jezgre/kukova), bez praćenja pokreta, prelagana lopta. | Ekspresija snage cijelim tijelom slična bacanju udaraca čekićem iz gornje pozicije ili obaranju protivnika na pod. Uči agresivnu proizvodnju sile prema dolje. |\n| Rotacijski udarac medicinkom (Med Ball Rotational Slam) | Kosi trbušni mišići (obliques), jezgra (core), kukovi, ramena | Slam lopta (5-9 kg), zid | Stani okomito na zid, lopta na suprotnom kuku od zida. Stopala malo šire od širine ramena. | \"Rotiraj kukove prvo, zatim trup, zatim ruke — udari loptom u zid. Uhvati i resetuj. Optereti iz zadnjeg kuka.\" | Bacanje rukama umjesto rotiranja kukovima, stopala ostaju ravna (rotiraj na jastučiću zadnjeg stopala), stajanje preblizu zidu. | Direktno trenira rotacijsku snagu sekvence udarca kukama (hook), overkend (overhand) i kružnog udarca nogom (round kick). Rotacija s početkom u kukovima je ključ za završnu snagu udaraca. |\n| Dodavanje medicinkom od prsa (Med Ball Chest Pass) | Prsa, tricepsi, prednji deltoidi, jezgra (core) | Medicinska lopta (5-9 kg), zid ili partner | Stani licem prema zidu, lopta na prsima, laktovi unutra. | \"Eksplozivno pogoni loptu od prsa u zid, potpuno opružajući ruke. Uhvati i odmah preusmjeri. Ostani na jastučićima stopala.\" | Korak naprijed (gubitak baze), lobanje umjesto pogona, spor hvat i preusmjeravanje. | Trenira horizontalnu brzinu guranja za okvire (frame), postavljanje i podizanje protivnika s klupe. Reaktivan hvat i preusmjeravanje odražava zahtjeve brzine borbe rukama. |\n| Zamasi girjom (KB Swings) | Gluteusi, zadnja loža, jezgra (core), latisimus (lats) | Girja (kettlebell) | Stopala malo šire od širine ramena. Girja na podu malo ispred tebe. Zamahni zvono nazad između nogu. | \"Pucni kukovima naprijed — ruke samo prate vožnju. Zvono bi trebalo lebdjeti do visine prsa/očiju (ruski stil) ili iznad glave (američki stil). Jako stisni gluteuse na vrhu.\" | Čučanj umjesto zamaha (treba biti šarka u kukovima), korištenje ruku za dizanje, prekomjerno opružanje leđa na vrhu. | Snažan pucanj kukova direktno se prenosi na snagu udaraca, brzinu provala (sprawl) i premošćivanje/škrimanje u grapplingu. Zamasi s mnogo ponavljanja također grade izdržljivost zadnjeg lanca za kasne runde. |\n| Trzaj girjom (KB Snatch) | Gluteusi, zadnja loža, ramena, trapezius, jezgra (core) | Girja (kettlebell) | Slično kao početak zamaha. Jedna ruka na zvonu. | \"Zamahni nazad, pucni kukovima, dok zvono raste vodi ga oko zgloba i probij do zaključavanja iznad glave. Kontroliraj spuštanje preusmjeravajući zvono nazad između nogu.\" | Zvono udara u zglob (putanja je pogrešna), istiskivanje na vrhu umjesto probijanja, nekorištenje kukova. | Kombinira eksplozivnu ekstenziju kukova sa stabilnošću iznad glave i hvatom — odražava ekspresiju snage cijelim tijelom prilikom bacanja overhenda ili završavanja podizanja s visokim zahvatom. Odličan efekat kondicije. |\n| Hang čišćenje (Hang Clean) | — | — | — | — | — | Pogledaj sekciju Složene vježbe sa šipkom iznad. |\n| Potisak s pogonom (Push Press) | — | — | — | — | — | Pogledaj sekciju Složene vježbe sa šipkom iznad. |\n| Udaranje bojnim užadima (Battle Rope Slams) | Ramena, jezgra (core), latisimus (lats), hvat | Bojna užad (3-5 cm, 12-15 m) | Stani u atletski stav, blago savijanje, jedan kraj užeta u svakoj ruci. Sidrište ispred. | \"Izmjenjuj ruke (valovi) ili udari obje zajedno. Generiraj silu iz kukova, ne samo iz ramena. Drži ritam — ne dopusti da užad oslabe.\" | Stajanje previše uspravno (bez angažmana kukova), grčenje rukama (podlaktice instant izgaraju), stajanje preblizu sidrištu (nema tenzije). | Izdržljivost snage gornjeg dijela tijela pod umorom — simulira ponovljene eksplozivne radnje ruku tokom udaranja u kasnijim rundama. Bilateralni udarci treniraju snagu ground-and-pounda; izmjenični valovi grade izdržljivost ramena potrebnu za duge razmjene u klinču. |\n\n---\n\n## 4. Dodaci za gornji dio tijela (Upper Body Accessories)\n\n| Vježba | Primarne mišićne grupe | Oprema | Postava | Upute za izvođenje | Česte greške | MMA korist |\n|---|---|---|---|---|---|---|\n| Zgibovi s opterećenjem (Weighted Pull-Ups) | Latisimus (lats), bicepsi, zadnji deltoidi, hvat | Šipka za zgibove, pojas za tegove ili bučica između stopala | Visi sa šipke, nadlani hvat malo širi od ramena. Dodaj opterećenje putem pojasa ili bučice. | \"Pokreni latisimusom (misli laktovi prema kukovima), povuci bradu iznad šipke, kontroliraj spuštanje do pune ekstenzije.\" | Kip / ljuljanje, nedostizanje pune ekstenzije na dnu, brada ne prelazi šipku. | Snaga povlačenja je esencijalna za kontrolu klinča, giljotine, prednje zahvate glave, povlačenje ruke (arm drag) i povlačenje protivnika od kaveza. Hvat pod opterećenjem gradi trajnu izdržljivost klinča. |\n| Veslanje bučicom (Dumbbell Row) | Latisimus (lats), romboidni, zadnji deltoidi, bicepsi | Bučica, klupa | Jedno koljeno i ruka na klupi, suprotno stopalo na podu. Ravna leđa, bučica visi na ispruženoj ruci. | \"Povuci bučicu prema kuku, stisni lopaticu nazad i dolje. Spusti pod kontrolom.\" | Rotiranje torza da se digne teg, veslanje prema ramenu umjesto kuku, žurenje pona nja iz pozicije spuštenih ramena — direktno se prenosi na oslanjanje na strunjači, potiskivanje iz donje pozicije i generiranje sile guranja kad si prikliješten uz kavez. |\n| Povlačenje prema licu (Face Pulls) | Zadnji deltoidi, vanjski rotatori, srednji trapezius | Koloturnik ili traka | Nastavak užeta na visini lica. Korakni nazad da stvoriš tenziju. | \"Povuci uže prema licu, razdvajajući ruke i vanjski rotirajući na kraju. Stisni na trenutak. Spor povratak.\" | Povlačenje prenisko (postaje veslanje), korištenje momenta tijela, bez vanjske rotacije na krajnjoj poziciji. | Zdravlje ramena i posturalna ravnoteža. Borci rade ogromne količine potiskivanja i unutrašnje rotacije (udaranje, guranje); povlačenje prema licu to uravnotežava kako bi ramena bila zdrava i držanje održano protiv ovratničkih hvata. |\n| Razdvajanje trake (Band Pull-Aparts) | Zadnji deltoidi, romboidni, srednji trapezius | Elastična traka | Drži traku na ispruženoj ruci ispred prsa, ruke u širini ramena, dlanovi dolje. | \"Razdvoji traku stiskajući lopatice zajedno dok traka ne dodirne prsa. Spor povratak.\" | Podizanje ramena, savijanje laktova, korištenje momenta. | Zdravlje lopatica i održavanje držanja. Drži gornja leđa jakima i ramena uravnotežena protiv visokog volumena udaranja i posezanja u treningu. Idealan svakodnevni pokret preventive. |\n\n---\n\n## 5. Jezgra / Anti-pokret (Core / Anti-Movement)\n\n| Vježba | Primarne mišićne grupe | Oprema | Postava | Upute za izvođenje | Česte greške | MMA korist |\n|---|---|---|---|---|---|---|\n| Pallof potisak (Pallof Press) | Kosi trbušni mišići (obliques), poprečni trbušni mišić (transverse abdominis), stabilizatori kukova | Koloturnik ili traka | Stani okomito na koloturnik, ručka na prsima. Stopala u širini ramena, blagi atletski savijak. | \"Potisni ručku ravno od prsa i drži. Odupri se rotaciji. Vrati na prsa. Drži kukove ravne.\" | Dopuštanje koloturku da te rotira, zaključana koljena, potiskivanje pod uglom umjesto ravno. | Stabilnost jezgre protiv rotacije — sposobnost odupiranja okretanju u klinču, tokom borbi za poziciju i pri apsorpciji udaraca u tijelo. Direktno trenira primarnu funkciju jezgre u borbi: otpor neželjenom pokretu. |\n| Kotačić za trbušnjake (Ab Wheel Rollout) | Ravni trbušni mišić (rectus abdominis), kosi trbušni, latisimus (lats), fleksori kuka | Kotačić za trbušnjake | Klekni na podlogu, uhvati kotačić, ruke ispružene. | \"Kotrljaj se polako naprijed, držeći kukove opružene (ne sjedi nazad). Idi koliko daleko možeš kontrolirati, zatim povuci natrag koristeći trbušnjake.\" | Tonjenje donjih leđa, savijanje u kukovima umjesto opružanja, odlazak dalje nego što možeš kontrolirati. | Snaga jezgre protiv ekstenzije za održavanje držanja u klinču, otpor savijanju leđa u hrvanju i stabilizaciju kičme tokom udaraca. Ekscentrični izazov odražava povlačenje naprijed od strane protivnika. |\n| Podizanje nogu u visu (Hanging Leg Raises) | Fleksori kuka, donji trbušnjaci, hvat | Šipka za zgibove | Visi sa šipke s punim hvatom, ramena povučena. | \"Podigni noge do paralelne pozicije (ili prstima do šipke za napredne). Kontroliraj spuštanje — bez ljuljanja. Pokreni iz jezgre, ne iz momenta.\" | Ljuljanje, korištenje momenta, samo podizanje koljena (ako su podizanja punih nogu cilj), gubitak hvata. | Snaga fleksora kuka za zadržavanje garde, visoke udarce nogama i udarce koljenom. Izdržljivost hvata tokom izvođenja pokreta jezgre odražava istovremene zahtjeve visenja na protivniku dok radiš jezgrom u klinču. |\n| Kopenhagenska daska (Copenhagen Plank) | Aduktori, kosi trbušni, jezgra (core) | Klupa | Ležeći na boku, gornje stopalo na klupi, donje stopalo visi. Oslonac na podlaktici. | \"Podigni kukove i donju nogu tako da tijelo formira ravnu liniju. Drži. Aduktor gornje noge radi teški dio.\" | Rotiranje kukova naprijed ili nazad, tonjenje u kuku, zadržavanje daha. | Snaga aduktora i bočne jezgre kritična za zatvorenu gardu, postavljanje trokuta (triangle), stiskanje zaključavanja tijelom (b se Carry) | Kosi trbušni (obliques), jezgra (core) (anti-bočna fleksija), hvat | Teška bučica ili girja (kettlebell) | Drži teški teg u jednoj ruci sa strane. Stani uspravno, ne naginjaj se prema ili od opterećenja. | \"Hodaj kontroliranim koracima, odupirući se naginjanju prema opterećenoj strani. Ostani savršeno uspravan.\" | Naginjanje prema tegu, kompenzacija suprotnim kukom, podizanje opterećenog ramena. | Jednostrana anti-bočna fleksija — sposobnost odupiranja povlačenju na jednu stranu. Prenosi se na odbranu od zahvata jednom rukom za ovratnik, otpor povlačenju ruke (arm drag) i održavanje držanja kada protivnik vuče jednu stranu tvog tijela. |\n| Tursko ustajanje (Turkish Get-Up) | Ramena, jezgra (core), kukovi, stabilizatori (cijelo tijelo) | Girja (kettlebell) | Lezi na leđa, potisni girju gore jednom rukom. Suprotna ruka i noga pod uglom za bazu. | \"Zakotrljaj se na lakat, postavi se na ruku, premosti kukove, provuci nogu ispod u klečeći, ustani. Obrni sekvencu. Oči na zvonu cijelo vrijeme.\" | Žurenje pokreta, gubitak vizualnog kontakta sa zvonom, preskakanje premošćivanja kukova, potiskivanje zvona umjesto držanja ruke vertikalno. | Najspecifičnija vježba jezgre za MMA. Svaka faza oponaša grappling tranziciju: premošćivanje iz donje pozicije, oslanjanje na lakat, stvaranje okvira, izgradnja baze i ustajanje sa strunjače — sve dok se stabilizira opterećenje iznad glave (simulirajući kontrolu protivnikovog uda). |\n\n---\n\n## 6. Prevencija povreda / Mobilnost (Prehab / Mobility)\n\n| Vježba | Primarne mišićne grupe | Oprema | Postava | Upute za izvođenje | Česte greške | MMA korist |\n|---|---|---|---|---|---|---|\n| Vanjske rotacije s trakom (Band External Rotations) | Infraspinatus, teres minor (rotatorna manšeta) | Lagana elastična traka | Stani s laktom priljubljenim uz bok pod 90 stepeni, traka pričvršćena na visini lakta. | \"Rotiraj podlakticu prema van protiv trake, držeći lakat zalijepljen uz rebra. Polako i kontrolirano u oba smjera.\" | Lakat
