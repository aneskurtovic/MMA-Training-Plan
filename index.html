ght Pad Work | 10 min | Timing rounds, 50% power | Coach keeps it relaxed, positive |\n| Movement Drills | 10 min | Footwork, entries, exits | Rehearse distance management |\n| Cool-Down | 5 min | Stretching + team talk | Confidence building |\n\n> **This is the last training session before fight week begins.** Everything from here is about staying sharp, calm, and ready.\n\n---\n\n### Saturday, May 10 — Rest + Mental Prep\n\nComplete rest. No training.\n\n| Activity | Notes |\n|----------|-------|\n| Light walk | 20-30 min, easy |\n| Visualization | 15 min — round-by-round fight rehearsal |\n| Strategy review | Final review of game plan notes |\n| Logistics confirmation | Confirm fight day schedule, weigh-in time, arrival time |\n| Nutrition | Eat well, stay hydrated, enjoy meals (weight cut begins tomorrow) |\n| Sleep | 8-9 hours minimum |\n\n**Begin discussing water loading protocol with coach.** Reference Phase 4 for the full protocol starting Sunday, May 11.\n\n---\n\n## Phase 3 Summary\n\n| Parameter | Week 7 | Week 8 |\n|-----------|--------|--------|\n| Strength Sessions | 2 (Mon, Wed) | 2 (Mon, Wed) — final sessions |\n| Strength Volume | 4x3 main lifts + 2-3 accessories | 3x2 main lifts + minimal accessories |\n| Strength Load | 70-75% 1RM | 70-72.5% 1RM |\n| Sparring | Moderate (Friday, 5 rounds) | Light technical only (Monday) |\n| Conditioning | Short intervals (2 sessions) | Minimal intervals (1 session) |\n| MMA Skills | Game plan focus, positional sparring | Technical rehearsal, shadow boxing |\n| Mental Prep | Visualization begins, strategy review | Daily visualization, logistics finalized |\n| Estimated Body Weight | ~80-81 kg | ~79-80 kg |\n| Recovery Focus | High | Very high |\n\n---\n\n## Notes for Coach\n\n1. **Monitor fatigue closely.** If the athlete reports unusual soreness, sleep disruption, or mood changes, cut volume further.\n2. **Sparring partners in Week 7** should be briefed — controlled rounds, no ego, game plan focus.\n3. **Week 8 has zero hard sparring.** This is non-negotiable. The fight is won in the weeks before, not the week of.\n4. **Weight should be trending toward 79-80 kg** naturally by end of Week 8. If still above 81 kg, consult with nutritionist before beginning water cut.\n5. **Transition to Phase 4 (Fight Week)** begins Sunday, May 11.\n", "phase-4": "# Phase 4 — Fight Week (Week 9)\n\n> **Phase:** Fight Week | **Duration:** May 11 - May 16, 2026\n> **Weight:** 79 kg → 77 kg (water cut)\n> **Focus:** Light technical work, weight management, mental preparation\n> **Training:** Minimal — shadow boxing, visualization, light movement only\n\n---\n\n## Fight Week Overview\n\nThis is not a training week. This is a **preparation and execution** week. The work is done. Your only jobs now are:\n\n1. Make weight safely\n2. Stay mentally sharp\n3. Arrive at the fight healthy, hydrated, and confident\n\nThe 2 kg water cut from 79 kg to 77 kg is a **mild cut** and should be manageable with proper water loading and sodium manipulation. Follow the protocols below exactly as planned with your coach.\n\n---\n\n## Water Loading Protocol\n\nBegin water loading on Sunday. The goal is to upregulate your body's water excretion mechanisms by drinking large volumes, then sharply reducing intake so the body continues flushing water even when intake drops.\n\n| Day | Date | Water Intake | Notes |\n|-----|------|-------------|-------|\n| Sunday | May 11 | 8 L | Begin water loading. Spread across waking hours. |\n| Monday | May 12 | 8 L | Continue loading. Urine should be clear and frequent. |\n| Tuesday | May 13 | 6 L | Begin tapering water. Body still excreting at high rate. |\n| Wednesday | May 14 | 4 L | Further reduction. Noticeable water loss begins. |\n| Thursday | May 15 | 2 L | Minimal water. Sip throughout day. Stop by evening. |\n| Friday | May 16 | Sips only | Small sips until weigh-in. Full rehydration after. |\n\n**Key Rules:**\n- Spread water intake evenly across the day (do not chug large volumes at once)\n- Distilled water is preferred during loading days (lower mineral content)\n- Track all fluid intake — use a measured bottle\n- Weigh yourself morning and evening to track progress\n- If weight is not trending on schedule, consult coach before adjusting\n\n---\n\n## Sodium Manipulation Protocol\n\nSodium manipulation works alongside water loading. High sodium early causes water retention; dropping sodium causes the body to flush stored water.\n\n| Day | Date | Sodium Intake | Food Notes |\n|-----|------|--------------|------------|\n| Sunday | May 11 | Normal (~3,000-4,000 mg) | Eat normally, add salt to food |\n| Monday | May 12 | Normal (~3,000-4,000 mg) | Continue normal salting |\n| Tuesday | May 13 | Reduced (~1,500-2,000 mg) | Begin reducing — avoid processed food, no added salt |\n| Wednesday | May 14 | Low (~500-1,000 mg) | Plain foods only — rice, chicken, vegetables, no seasoning |\n| Thursday | May 15 | Minimal (~200-500 mg) | Very plain food, small portions, no added salt |\n| Friday | May 16 | None until post-weigh-in | No food until after weigh-in |\n\n**Carbohydrate Notes:**\n- Sunday-Tuesday: Normal carb intake\n- Wednesday: Reduce carbs to ~100g (reduces glycogen-bound water)\n- Thursday: Reduce carbs to ~50g\n- Friday: No food until post-weigh-in\n\n---\n\n## Day-by-Day Plan\n\n---\n\n### Sunday, May 11 — Last Light Training + Water Loading Begins\n\n| Time | Activity | Details |\n|------|----------|---------|\n| 7:00 AM | Wake up, weigh in | Record weight (target: ~79 kg) |\n| 7:30 AM | Water: 1 L | Begin water loading |\n| 8:30 AM | Breakfast | Normal meal — oats, eggs, fruit, salt food normally |\n| 10:00 AM | Water: 1 L | Sip steadily |\n| 10:30 AM | Light Training Session (40 min) | See session plan below |\n| 12:00 PM | Lunch + Water: 1 L | Normal meal — rice, protein, vegetables |\n| 2:00 PM | Water: 1 L | |\n| 3:00 PM | Visualization (15 min) | Round-by-round mental rehearsal |\n| 4:00 PM | Water: 1 L | |\n| 6:00 PM | Dinner + Water: 1 L | Normal meal |\n| 8:00 PM | Water: 1 L | |\n| 9:00 PM | Water: 1 L | Final intake |\n| 9:30 PM | Evening weigh-in | Record weight |\n| 10:00 PM | Sleep | Target 8-9 hours |\n\n**Training Session — Sunday (40 min):**\n\n| Block | Duration | Activity | Notes |\n|-------|----------|----------|-------|\n| Shadow Boxing | 15 min | Light, technical, game plan combos | Last real movement session |\n| Light Pad Work | 10 min | Timing and distance, 40% power | Stay sharp, stay relaxed |\n| Movement Drills | 10 min | Footwork patterns, entries/exits | Rehearsal, not training |\n| Visualization | 5 min | Close eyes, breathe, visualize fight | |\n\n> **This is the last training session of fight camp.**\n\n---\n\n### Monday, May 12 — Shadow Boxing + Water Loading\n\n| Time | Activity | Details |\n|------|----------|---------|\n| 7:00 AM | Wake up, weigh in | Record weight |\n| 7:30 AM | Water: 1 L | |\n| 8:30 AM | Breakfast | Normal meal, salt normally |\n| 10:00 AM | Water: 1 L | |\n| 10:30 AM | Shadow Boxing (20 min) | Light, technical, game plan only. No intensity. |\n| 12:00 PM | Lunch + Water: 1 L | Normal meal |\n| 2:00 PM | Water: 1 L | |\n| 3:00 PM | Mental Prep (20 min) | Visualization + strategy review notes |\n| 4:00 PM | Water: 1 L | |\n| 6:00 PM | Dinner + Water: 1 L | Normal meal |\n| 8:00 PM | Water: 1 L | |\n| 9:00 PM | Water: 1 L | |\n| 9:30 PM | Evening weigh-in | Record weight |\n| 10:00 PM | Sleep | 8-9 hours |\n\n---\n\n### Tuesday, May 13 — Very Light Movement + Water Taper Begins\n\n| Time | Activity | Details |\n|------|----------|---------|\n| 7:00 AM | Wake up, weigh in | Record weight — should be trending down |\n| 7:30 AM | Water: 1 L | |\n| 8:30 AM | Breakfast | Reduce sodium — no added salt, avoid processed food |\n| 10:00 AM | Water: 1 L | |\n| 10:30 AM | Light Walk (20-30 min) | Easy pace, outdoors if possible |\n| 11:00 AM | Very Light Movement (15 min) | Gentle stretching, mobility flow, deep breathing |\n| 12:00 PM | Lunch + Water: 1 L | Plain food — rice, grilled chicken, steamed vegetables |\n| 2:00 PM | Water: 1 L | |\n| 3:00 PM | Visualization (15 min) | |\n| 5:00 PM | Water: 1 L | |\n| 6:00 PM | Dinner + Water: 1 L | Plain food, low sodium |\n| 9:00 PM | Evening weigh-in | Record weight |\n| 10:00 PM | Sleep | 8-9 hours |\n\n---\n\n### Wednesday, May 14 — No Training, Water Reduction, Mental Prep\n\n| Time | Activity | Details |\n|------|----------|---------|\n| 7:00 AM | Wake up, weigh in | Record weight — should be noticeably dropping |\n| 7:30 AM | Water: 0.5 L | Sip slowly |\n| 8:30 AM | Breakfast | Small meal — plain rice, egg whites, ~100g carbs for the day |\n| 10:00 AM | Water: 0.5 L | |\n| 10:30 AM | Light Walk (15 min) | Very easy, keep legs moving |\n| 12:00 PM | Lunch + Water: 0.5 L | Small portion — plain chicken, steamed broccoli |\n| 2:00 PM | Water: 0.5 L | |\n| 2:30 PM | Visualization + Strategy (30 min) | Full mental rehearsal — walk-out, touch gloves, Round 1 opening, key sequences, finish |\n| 4:00 PM | Water: 0.5 L | |\n| 5:00 PM | Water: 0.5 L | |\n| 6:00 PM | Dinner + Water: 0.5 L | Small meal — plain rice, lean protein |\n| 7:00 PM | Water: 0.5 L | Final intake for the day |\n| 8:00 PM | Confirm logistics | Final check — travel, cornermen, cutman, equipment, schedule |\n| 9:00 PM | Evening weigh-in | Record weight |\n| 10:00 PM | Sleep | 8-9 hours — prioritize rest |\n\n---\n\n### Thursday, May 15 — No Training, Final Water Reduction, Weight Check\n\n| Time | Activity | Details |\n|------|----------|---------|\n| 7:00 AM | Wake up, weigh in | **Critical weigh-in** — should be within 1-1.5 kg of 77 kg |\n| 7:30 AM | Water: sips | Small sips only when needed |\n| 8:30 AM | Small breakfast | Minimal — half cup rice, 2 egg whites, no salt |\n| 10:00 AM | Water: sips | |\n| 11:00 AM | Light Walk (10 min) | Very easy, stay off feet otherwise |\n| 12:00 PM | Small lunch | Quarter cup rice, small piece of chicken |\n| 1:00 PM | Water: sips | Minimal |\n| 2:00 PM | Mental prep (20 min) | Visualization, breathing exercises, stay calm |\n| 4:00 PM | Water: final sips | Stop water intake by evening |\n| 5:00 PM | Very small dinner | Plain protein, small portion, no carbs |\n| 7:00 PM | Evening weigh-in | Should be very close to 77 kg or within 0.5 kg |\n| 8:00 PM | No more food or water | Done for the night |\n| 9:00 PM | Pack fight bag | Use checklist below |\n| 9:30 PM | Sleep | Sleep as much as possible — 9+ hours target |\n\n**If over 77.5 kg at evening weigh-in:**\n- A warm bath (20 min) can shed 0.5-1 kg\n- Do NOT use sauna unless supervised by experienced coach\n- Light sweat walk in warm clothing (15-20 min maximum)\n\n**If at or below 77 kg at evening weigh-in:**\n- Have a few small sips of water\n- Relax — you are on weight\n\n---\n\n### Friday, May 16 — FIGHT DAY\n\n| Time | Activity | Details |\n|------|----------|---------|\n| 6:00 AM | Wake up, weigh in (private) | Final private weight check — confirm on or under 77 kg |\n| 6:00-8:00 AM | Sips of water only | Very small sips if needed, do not drink freely |\n| 8:00 AM (est.) | **OFFICIAL WEIGH-IN** | Step on scale, make weight, done |\n| **Immediately after weigh-in** | **BEGIN REHYDRATION** | See rehydration protocol below |\n| 8:15 AM | Electrolyte drink (500 mL) | Oral rehydration solution — sip, do not chug |\n| 8:30 AM | Small snack | Banana + white bread with honey |\n| 9:00 AM | Electrolyte drink (500 mL) | Continue sipping |\n| 9:30 AM | Pre-fight Meal 1 | See meal plan below |\n| 11:00 AM | Electrolyte drink (500 mL) | |\n| 11:30 AM | Pre-fight Meal 2 | See meal plan below |\n| 1:00 PM | Sipping water/electrolytes | Continue rehydrating steadily |\n| 2:00 PM | Light snack | Rice cake with honey, banana |\n| 3:00-4:00 PM | Rest / nap if possible | Stay off feet, relax, conserve energy |\n| 4:00 PM | Final pre-fight snack | Small, easily digestible — see meal plan |\n| 5:00 PM | Begin fight prep | Arrive at venue, settle in, start mental routine |\n| 5:30 PM | Light warm-up | Shadow boxing (5 min), dynamic stretches, pad work (2-3 min with corner) |\n| 6:00 PM (est.) | **FIGHT TIME** | Execute the game plan. Trust your preparation. |\n\n> **Note:** Adjust times based on actual weigh-in and fight schedule. The structure remains the same regardless of specific times.\n\n---\n\n## Rehydration Protocol (Post-Weigh-In)\n\nThe goal is to rehydrate from ~77 kg back toward ~79-80 kg before the fight. You have approximately 8-10 hours to rehydrate.\n\n| Timeframe | Fluid | Food | Target |\n|-----------|-------|------|--------|\n| 0-30 min post-weigh-in | 500 mL ORS (oral rehydration solution) | Banana, white bread + honey | Begin absorption |\n| 30-90 min | 500 mL ORS, sip steadily | Pre-fight Meal 1 (see below) | |\n| 90 min - 3 hours | 500 mL water/electrolyte | Pre-fight Meal 2 (see below) | ~1.5 L consumed |\n| 3-6 hours | Sip water/electrolytes as desired | Light snacks as desired | ~2-2.5 L consumed |\n| 6-8 hours | Small sips only | Final small snack (2 hrs before fight) | ~3 L total consumed |\n\n**Rehydration Rules:**\n- **NEVER chug water.** Sip steadily. Chugging causes bloating, nausea, and poor absorption.\n- Use an oral rehydration solution (ORS) or add electrolyte tabs to water (Pedialyte, LMNT, or similar)\n- Do NOT drink plain water only — you need sodium and potassium to retain fluid\n- Stop drinking large volumes 2 hours before fight time\n- Target total fluid intake: 2.5-3.5 L between weigh-in and fight\n- Monitor urine color — aim for pale yellow, not clear (clear means you're flushing, not retaining)\n\n---\n\n## Pre-Fight Meal Plan\n\nAll food should be **easily digestible, familiar, and not gas-producing.** Do not eat anything new on fight day.\n\n### Pre-Fight Meal 1 (~90 min post-weigh-in)\n\n| Food | Amount | Notes |\n|------|--------|-------|\n| White rice | 1.5 cups cooked | Easy carbs, familiar |\n| Grilled chicken breast | 120g | Lean protein |\n| Banana | 1 medium | Potassium source |\n| Honey | 1 tbsp (on rice or bread) | Quick energy |\n\n### Pre-Fight Meal 2 (~3 hours post-weigh-in)\n\n| Food | Amount | Notes |\n|------|--------|-------|\n| White rice or white pasta | 1 cup cooked | Carb loading |\n| Lean protein (chicken/fish) | 100g | |\n| White bread | 1-2 slices | Easily digestible carbs |\n| Small amount of fruit | Banana or melon | |\n\n### Final Pre-Fight Snack (~2 hours before fight)\n\n| Food | Amount | Notes |\n|------|--------|-------|\n| Rice cake | 2 | Light, easy carbs |\n| Honey | 1 tbsp | Quick energy |\n| Banana | Half | |\n| Sips of electrolyte drink | 100-200 mL | |\n\n**Foods to AVOID on fight day:**\n- Dairy (bloating, gas)\n- High fiber foods (beans, whole grains, raw vegetables)\n- Spicy food\n- Fatty or fried food\n- Anything new or unusual\n- Large volumes of any single food\n- Caffeine in excess (one small coffee is fine if habitual)\n\n---\n\n## Mental Preparation Checklist\n\nComplete these tasks across the final week:\n\n### Strategy (Complete by Wednesday, May 14)\n- [ ] Review game plan with coach — know your A-plan and B-plan\n- [ ] Identify opponent's 3 biggest threats and your counter for each\n- [ ] Identify your 3 best weapons and the setups to land them\n- [ ] Know your Round 1 opening — first 30 seconds are scripted\n- [ ] Know your clinch strategy (initiate vs. disengage)\n- [ ] Know your ground strategy (top game vs. get-up plan)\n\n### Visualization (Daily from Thursday, May 8 onward)\n- [ ] Visualize the walk-out — music, crowd, corner team\n- [ ] Visualize touching gloves, opening stance, first exchange\n- [ ] Visualize landing your best combinations\n- [ ] Visualize recovering from adversity (getting hit, taken down)\n- [ ] Visualize executing your game plan under pressure\n- [ ] Visualize winning — hand raised, celebration\n\n### Emotional Readiness\n- [ ] Accept nervousness as normal and useful (adrenaline is fuel)\n- [ ] Identify your pre-fight routine (music, warm-up, breathing)\n- [ ] Practice box breathing (4-4-4-4) — use it between rounds\n- [ ] Have a \"reset word\" for when things get chaotic in the fight\n- [ ] Talk to your corner about communication — keep it simple (1-2 cues max between rounds)\n\n---\n\n## Fight Day Bag Checklist\n\nPack this bag by **Thursday evening, May 15.**\n\n### Competition Gear\n- [ ] MMA gloves (competition approved)\n- [ ] Mouthguard (primary + backup)\n- [ ] Groin protector / cup\n- [ ] MMA shorts (competition approved, no pockets, no zippers)\n- [ ] Rash guard (if required by promotion)\n- [ ] Hand wraps (2 pairs)\n- [ ] Athletic tape\n\n### Warm-Up / Corner\n- [ ] Training gloves or pads (for corner warm-up)\n- [ ] Vaseline (for cornerman to apply)\n- [ ] Ice bags (ask venue or bring cooler)\n- [ ] Towels (2-3)\n- [ ] Gauze and tape (corner supplies)\n- [ ] Adrenaline / epinephrine swabs (if allowed — ask corner)\n- [ ] Enswell (cold compress for swelling)\n\n### Nutrition / Hydration\n- [ ] Electrolyte solution/powder (Pedialyte, LMNT, or similar)\n- [ ] Water bottles (at least 2, filled)\n- [ ] Bananas (2-3)\n- [ ] White rice (pre-cooked in container)\n- [ ] Honey packets\n- [ ] Rice cakes\n- [ ] White bread\n- [ ] Pre-cooked chicken breast (in container, keep cool)\n\n### Personal\n- [ ] Photo ID (required for weigh-in)\n- [ ] Medical clearance / fight license documentation\n- [ ] Insurance documentation (if required)\n- [ ] Phone + charger\n- [ ] Headphones + fight playlist loaded\n- [ ] Change of clothes (post-fight)\n- [ ] Flip-flops / slides\n- [ ] Toiletries (deodorant, etc.)\n- [ ] Cash (for incidentals)\n\n### Recovery (Post-Fight)\n- [ ] Extra food for after the fight (whatever you want — you earned it)\n- [ ] More electrolytes\n- [ ] Compression gear (optional)\n- [ ] Arnica gel or anti-inflammatory cream\n\n---\n\n## Warning Signs During the Water Cut\n\nMonitor for these warning signs throughout the week. **If any STOP signs appear, halt the cut immediately and seek medical advice.**\n\n### Normal / Expected\n| Symptom | Notes |\n|---------|-------|\n| Mild thirst | Expected from Wednesday onward |\n| Slightly reduced energy | Normal, conserve energy |\n| Darker urine | Expected as water intake drops |\n| Mild irritability | Normal — manage with breathing exercises |\n| Slight headache (brief) | Can occur, usually resolves |\n| Dry mouth | Expected Thursday/Friday |\n\n### Caution — Slow Down\n| Symptom | Action |\n|---------|--------|\n| Persistent headache | Small sips of electrolyte solution, reassess in 30 min |\n| Mild dizziness when standing | Sit down, sip electrolytes, move slowly |\n| Muscle cramps | Electrolytes needed — small sips of ORS |\n| Extreme irritability / mood swings | Rest, breathe, reduce any remaining activity |\n| Poor sleep quality | Accept it, stay in bed, rest even if not sleeping |\n\n### STOP — Seek Help Immediately\n| Symptom | Action |\n|---------|--------|\n| Severe dizziness or fainting | **STOP CUT.** Drink electrolytes. Call coach/doctor. |\n| Rapid or irregular heartbeat | **STOP CUT.** Seek medical attention immediately. |\n| Confusion or disorientation | **STOP CUT.** This is dangerous. Rehydrate now. |\n| Inability to stand | **STOP CUT.** Medical emergency possible. |\n| Chest pain | **STOP CUT. CALL EMERGENCY SERVICES.** |\n| Vomiting (unable to keep fluids down) | **STOP CUT.** Seek medical help — dehydration will worsen. |\n| Seizures or muscle spasms (severe) | **STOP CUT. CALL EMERGENCY SERVICES.** |\n\n> **Remember:** No fight is worth your health. A 2 kg water cut is mild and should be straightforward. If it becomes anything more than mildly uncomfortable, something is wrong. Speak up.\n\n---\n\n## Phase 4 Summary\n\n| Day | Date | Training | Water | Sodium | Key Focus |\n|-----|------|----------|-------|--------|-----------|\n| Sunday | May 11 | Last light session (40 min) | 8 L | Normal | Water loading begins |\n| Monday | May 12 | Shadow boxing (20 min) | 8 L | Normal | Continue loading |\n| Tuesday | May 13 | Light walk + movement (30 min) | 6 L | Reduced | Begin sodium reduction |\n| Wednesday | May 14 | No training | 4 L | Low | Mental prep, reduce carbs |\n| Thursday | May 15 | No training | 2 L | Minimal | Final weight check, pack bag |\n| Friday | May 16 | **FIGHT DAY** | Sips → rehydrate | None → normal | Make weight, rehydrate, fight |\n\n---\n\n## Final Note\n\nThe work is done. Eight weeks of preparation have built your body, sharpened your skills, and hardened your mind. Fight week is about executing the plan, making weight safely, and showing up ready.\n\nTrust your preparation. Trust your corner. Trust yourself.\n\nGo get it.\n", "weight-management": "# Weight Management\n\n**Fight Date:** May 16, 2026 | **Weight Class:** 77 kg | **Camp Duration:** 9 weeks\n\n---\n\n## 1. Weight Cut Overview\n\n| Parameter | Value |\n|-----------|-------|\n| Starting weight | 89 kg |\n| Target weigh-in weight | 77 kg |\n| Total cut | 12 kg |\n| Chronic dieting (Weeks 1-8) | ~9 kg (fat loss + glycogen depletion) |\n| Acute water cut (Week 9) | ~3 kg |\n| Camp duration | 9 weeks |\n\n**Strategy:** Lose the majority of weight through sustained caloric deficit over 8 weeks, preserving as much muscle and performance as possible. Reserve the final 3 kg for a water/sodium manipulation protocol in fight week. This keeps the acute water cut within safe limits (~3.8% of body weight at 79 kg).\n\n> **WARNING:** A 12 kg total cut is aggressive. This requires strict dietary compliance, consistent monitoring, and ideally supervision from a sports nutritionist experienced with combat athletes. If weight loss stalls or performance degrades significantly, reassess the target weight class.\n\n---\n\n## 2. Per-Phase Caloric Targets\n\n| Phase | Weeks | Caloric Deficit | Training Day kcal | Rest Day kcal | Target Weight (end of phase) | Notes |\n|-------|-------|----------------|-------------------|---------------|------------------------------|-------|\n| **Phase 1 — Base Cut** | 1-3 | ~500 kcal/day | ~2,600 | ~2,100 | 85 kg | Establish deficit, maintain training intensity. ~1.3 kg/week loss. |\n| **Phase 2 — Accelerated Cut** | 4-6 | ~600 kcal/day | ~2,400 | ~1,900 | 81 kg | Slightly deeper deficit. Increase protein to offset muscle loss. ~1.3 kg/week loss. |\n| **Phase 3 — Final Trim** | 7-8 | ~500 kcal/day | ~2,400 | ~2,000 | 79 kg | Reduce deficit slightly to protect performance before fight. Begin water loading prep at end of Week 8. ~1 kg/week loss. |\n| **Phase 4 — Fight Week** | 9 | Water/sodium manipulation | Minimal structured meals | — | 77 kg | Glycogen depletion + water cut for final ~3 kg. Food intake is minimal and strategic. |\n\n**Key principles:**\n- Protein stays at 2.3 g/kg throughout (higher than maintenance to preserve lean mass during deficit)\n- Deficit is created primarily by reducing carbohydrates and fats — never by cutting protein\n- Training day calories are always higher than rest day calories (carb cycling)\n\n---\n\n## 3. Weight Cut Timeline\n\nTarget weight at the end of each week (weighed fasted, morning, same scale):\n\n| Week | Target Weight (kg) | Cumulative Loss (kg) | Phase | Notes |\n|------|-------------------|----------------------|-------|-------|\n| Start | 89.0 | 0.0 | — | Camp begins |\n| 1 | 87.7 | 1.3 | Phase 1 | Initial water/glycogen drop may be faster |\n| 2 | 86.4 | 2.6 | Phase 1 | Steady loss |\n| 3 | 85.0 | 4.0 | Phase 1 | End of Phase 1 — reassess |\n| 4 | 83.7 | 5.3 | Phase 2 | Deeper deficit begins |\n| 5 | 82.3 | 6.7 | Phase 2 | Mid-camp check — conditioning test |\n| 6 | 81.0 | 8.0 | Phase 2 | End of Phase 2 — reassess |\n| 7 | 80.0 | 9.0 | Phase 3 | Protect performance, moderate deficit |\n| 8 | 79.0 | 10.0 | Phase 3 | Water loading prep begins end of week |\n| 9 | 77.0 | 12.0 | Phase 4 (Fight Week) | Water/sodium cut for final 2-3 kg |\n\n> **If you are more than 1 kg behind target at any checkpoint**, do NOT increase the deficit beyond 600 kcal/day. Instead, add 20-30 minutes of low-intensity steady-state cardio (walking, cycling) on 2-3 rest days. Crash dieting destroys training quality and fight performance.\n\n---\n\n## 4. Macronutrient Framework\n\n### Per-Kilogram Targets\n\n| Nutrient | g/kg | Notes |\n|----------|------|-------|\n| **Protein** | 2.3 | Higher than maintenance (was 2.1) to preserve muscle during deficit. ~185 g constant. |\n| **Carbs** | Varies by day type | Cycled by training demand — see table below |\n| **Fat** | 0.8-1.0 | Minimum for hormonal health. ~65-80 g depending on phase. |\n\n### Daily Totals by Day Type (Phase 1-2 Example at ~83 kg)\n\n| Day Type | Protein | Carbs | Fat | kcal | Carb g/kg |\n|----------|---------|-------|-----|------|-----------|\n| **Training Day** | 185 g | 280-300 g | 70 g | ~2,400-2,600 | 3.4-3.6 |\n| **Double Session Day** | 185 g | 320 g | 75 g | ~2,700 | 3.9 |\n| **Rest Day** | 185 g | 170-200 g | 65 g | ~1,900-2,100 | 2.0-2.4 |\n\n**Adjustments as weight drops:**\n- Protein stays at 185 g constant (this becomes a higher g/kg as weight decreases — protective)\n- Carbs are the primary lever — reduce by 20-30 g per phase as needed\n- Fat should not drop below 0.8 g/kg (~65 g at 80 kg) to maintain testosterone and recovery\n\n---\n\n## 5. Meal Timing\n\n### Pre-Training (2-3 hours before)\n\n| Nutrient | Target | Grams | Goal |\n|----------|--------|-------|------|\n| Carbs | 1-1.5 g/kg | 80-120 g | Top off glycogen without excess calories |\n| Protein | 0.3-0.4 g/kg | 25-35 g | Start muscle protein synthesis |\n| Fat | Low | < 10 g | Speed gastric emptying |\n\n### Pre-Training Snack (30-60 min before)\n\n- **30-40 g fast-digesting carbs** — banana, white rice cake with honey, sports drink\n- Keep fat and fiber minimal to avoid GI distress during training\n\n### Intra-Workout (double sessions or any session > 90 min)\n\n- **30-60 g carbs per hour** — sports drink, gummy bears, highly branched cyclic dextrin\n- **Electrolytes** — 500-700 mg sodium per liter of fluid\n- Sip continuously; do not chug between rounds\n- During a cut, intra-workout carbs are even more critical to protect training quality\n\n### Post-Training (within 1-2 hours)\n\n| Nutrient | Target | Grams | Goal |\n|----------|--------|-------|------|\n| Protein | 0.3-0.5 g/kg | 25-40 g | Kickstart recovery/MPS |\n| Carbs | 1-1.2 g/kg | 80-100 g | Replenish glycogen |\n\n---\n\n## 6. Sample Meal Plans\n\n### Training Day (~2,600 kcal — Phase 1)\n\n| Meal | Time | Food | P | C | F | kcal |\n|------|------|------|---|---|---|------|\n| **Meal 1 — Breakfast** | 7:00 AM | 3 whole eggs scrambled, 1 slice sourdough toast, 1 banana | 25 g | 50 g | 18 g | 460 |\n| **Meal 2 — Pre-Training** | 11:00 AM | 150 g chicken breast, 200 g white rice (cooked), mixed greens, 1 tsp olive oil | 45 g | 70 g | 12 g | 570 |\n| **Pre-Training Snack** | 12:30 PM | 1 banana + 1 tsp honey | 1 g | 35 g | 0 g | 145 |\n| **Intra-Training** | 1:00-3:00 PM | 500 ml sports drink | 0 g | 30 g | 0 g | 120 |\n| **Meal 3 — Post-Training** | 3:30 PM | 40 g whey protein, 80 g oats (dry weight), 150 g blueberries | 40 g | 85 g | 8 g | 570 |\n| **Meal 4 — Dinner** | 7:00 PM | 180 g salmon fillet, 150 g sweet potato, 150 g broccoli | 42 g | 35 g | 18 g | 470 |\n| **Meal 5 — Pre-Bed** | 9:30 PM | 200 g Greek yogurt (full fat), 20 g walnuts | 18 g | 15 g | 16 g | 275 |\n| **DAILY TOTAL** | | | **171 g** | **320 g** | **72 g** | **~2,610** |\n\n*Increase chicken portion at Meal 2 by 30 g to push protein closer to 185 g target. Adjust rice portion down by 25 g if weight loss stalls.*\n\n### Rest Day (~2,100 kcal — Phase 1)\n\n| Meal | Time | Food | P | C | F | kcal |\n|------|------|------|---|---|---|------|\n| **Meal 1 — Breakfast** | 8:30 AM | 3 whole eggs + 2 egg whites scrambled, 100 g cherry tomatoes, 1/4 avocado | 32 g | 10 g | 20 g | 350 |\n| **Meal 2 — Lunch** | 12:30 PM | 180 g lean ground beef (93%), 120 g white rice (cooked), roasted vegetables | 45 g | 40 g | 15 g | 475 |\n| **Meal 3 — Afternoon** | 4:00 PM | 30 g whey protein, 1 apple, 20 g almonds | 30 g | 30 g | 12 g | 350 |\n| **Meal 4 — Dinner** | 7:00 PM | 150 g chicken thigh (skin removed), large mixed salad, 1 tbsp olive oil dressing | 38 g | 12 g | 18 g | 370 |\n| **Meal 5 — Pre-Bed** | 9:30 PM | 250 g cottage cheese, 10 g honey | 32 g | 15 g | 5 g | 235 |\n| **DAILY TOTAL** | | | **177 g** | **107 g** | **70 g** | **~1,780** |\n\n*Add a rice cake or piece of fruit at lunch to bring closer to 2,100 kcal target if needed. Adjust carbs upward with simple additions, not fats.*\n\n---\n\n## 7. Hydration Protocol\n\n### Daily Baseline (Non-Fight-Week)\n\n| Metric | Calculation | Target |\n|--------|-------------|--------|\n| Body weight method | Current weight x 35-45 ml/kg | **3.0-3.8 L per day** |\n\nAim for the higher end on training days and in warm conditions.\n\n### Around Training\n\n| Window | Protocol |\n|--------|----------|\n| **Pre-training** (2 hours before) | 500 ml water, steadily sipped |\n| **During training** | 600-1,200 ml per hour with electrolytes |\n| **Post-training** | Replace 150% of fluid lost (weigh before/after if possible) |\n\n### Electrolyte Targets During Training\n\n- **Sodium:** 500-700 mg per liter of fluid\n- **Potassium:** 150-200 mg per liter\n- Add a pinch of salt to water or use a commercial electrolyte mix\n\n### Monitoring\n\n- **Urine color:** Aim for pale straw yellow. Clear = overhydrated. Dark yellow/amber = dehydrated.\n- Check first thing in the morning — this is your best baseline indicator.\n- If weigh-in shows > 2% body weight loss post-session, increase fluid intake next session.\n\n---\n\n## 8. Water Loading Protocol (Fight Week — Week 9)\n\n> **WARNING: Water manipulation is DANGEROUS if done incorrectly. Work with an experienced coach or nutritionist who has managed weight cuts before. The protocol below is an outline only — individual responses vary significantly.**\n\n**Pre-conditions:** You must be at or below 79 kg entering fight week. If you are above 80 kg at the start of Week 9, reconsider whether the water cut is safe — you may need to cut more than 3 kg acutely, which increases risk.\n\n| Days Out from Weigh-In | Water Intake | Sodium | Carbs | Food | Notes |\n|-------------------------|-------------|--------|-------|------|-------|\n| **7 days (Saturday)** | 8 L/day | Normal (~3,000 mg) | Normal | Normal meals | Begin water loading — train kidneys to excrete at high rate |\n| **6 days (Sunday)** | 8 L/day | Normal | Normal | Normal meals | Continue loading. Spread intake across waking hours. |\n| **5 days (Monday)** | 8 L/day | Normal | Normal | Normal meals | Continue loading. Monitor urine — should be very clear. |\n| **4 days (Tuesday)** | 6 L/day | Reduce by 50% (~1,500 mg) | Normal | Normal meals | Begin tapering. Body still excreting at high rate. |\n| **3 days (Wednesday)** | 4 L/day | Reduce to minimal (~500 mg) | Begin reducing (~150 g) | Smaller meals, lean protein + low-fiber carbs | Taper continues. Avoid high-sodium foods. |\n| **2 days (Thursday)** | 2 L/day | Minimal (~300 mg) | Low (~75 g) | Small meals: chicken, rice, banana | Body still excreting at high rate but intake is low. Weight drops noticeably. |\n| **1 day (Friday — 24h before weigh-in)** | Sips only (~500 ml max) | Minimal | Very low (~50 g) | Light: chicken breast, small portion rice | Restrict to small sips as needed. Hot bath (20 min at 40-42C) for final 0.5-1 kg if needed. |\n| **Weigh-in morning (Saturday)** | Nothing until after weigh-in | — | — | Nothing | Weigh in. Then immediately begin rehydration protocol below. |\n\n**Additional fight week tactics:**\n- Low-fiber diet from Wednesday onward to reduce gut content weight (~0.5 kg)\n- A hot Epsom salt bath (20 min) the night before weigh-in can shed an extra 0.5-1 kg through sweat\n- Sauna use should be limited to 15-20 minute sessions maximum with monitoring — never alone\n- Weigh yourself multiple times per day during fight week to track progress\n\n---\n\n## 9. Rehydration & Refueling Plan (Post-Weigh-In)\n\nBegin immediately after stepping off the scale. The goal is to regain as much of the cut weight as possible before fight time.\n\n| Priority | Protocol | Timing |\n|----------|----------|--------|\n| **Fluid** | 1.5 L per kg of bodyweight lost. Sip steadily — do not chug. | Begin immediately, spread over 2-4 hours |\n| **Electrolytes** | Mandatory with every drink. Sodium, potassium, magnesium. Use oral rehydration solution (ORS) or electrolyte mix. | With every fluid intake |\n| **Carbohydrates** | 8-10 g/kg over the rehydration period. Simple carbs first (white rice, bananas, sports drinks), then gradually add complexity. | Begin within 30 min of weigh-in |\n| **Protein** | 1.5-2 g/kg spread across meals. Lean sources (chicken, whey). | With each meal |\n| **Fat** | Keep low initially — fats slow gastric emptying and can cause GI distress. Add moderate fat only in final pre-fight meal. | Minimal for first 4 hours, moderate after |\n\n### Sample Post-Weigh-In Rehydration Schedule\n\n| Time After Weigh-In | Action |\n|---------------------|--------|\n| 0-30 min | 500 ml ORS + banana + 30 g whey protein shake |\n| 30-60 min | Sip 500 ml sports drink. Small bowl of white rice + chicken (200 g rice, 100 g chicken). |\n| 1-2 hours | 500 ml water with electrolytes. Rice cakes with honey. |\n| 2-4 hours | Full meal: 250 g white rice, 150 g chicken, steamed vegetables, small amount of butter. Continue sipping fluids. |\n| 4-6 hours | Continue sipping fluids. Light snack if hungry: banana, yogurt, crackers. |\n| Pre-fight meal (3-4 hours before fight) | Familiar, moderate meal: rice + chicken + banana. Nothing new or heavy. Small amount of caffeine if part of routine. |\n\n> **Timing is critical.** You need a minimum of 12-24 hours between weigh-in and fight time to rehydrate properly. Same-day weigh-ins are significantly more dangerous — the rehydration window is too short to fully recover.\n\n---\n\n## 10. Supplement Stack\n\nAll supplements listed are **WADA-compliant as of the writing date.** Verify at [globaldro.com](https://www.globaldro.com) before taking any supplement.\n\n| Supplement | Dose | Timing | Evidence | Key Benefit | Cut-Phase Notes |\n|------------|------|--------|----------|-------------|-----------------|\n| **Creatine Monohydrate** | 5 g/day | Any time (consistency matters) | A-tier | Strength, power output, recovery | **Discontinue 3 weeks before weigh-in** (Week 6) — creatine holds 1-2 kg intracellular water. Resume post-weigh-in. |\n| **Caffeine** | 3-6 mg/kg (250-500 mg) | 45-60 min pre-training | A-tier | Alertness, power, endurance | Helpful during deficit for maintaining training intensity. Avoid after 2 PM. Consider 7-day washout before fight for maximal competition effect. |\n| **Whey Protein** | 30-40 g per serving | Post-training or any meal gap | A-tier | Convenient complete protein | Essential during a cut to hit 185 g protein target. Not a replacement for whole food. |\n| **Electrolytes** | 500-700 mg sodium/L | During training > 60 min | A-tier | Prevent cramping, maintain output | Even more important during a cut. Monitor sodium carefully during fight week water manipulation. |\n| **Vitamin D3** | 3,000-5,000 IU/day | With a fat-containing meal | A-tier | Immune function, bone health, recovery | Caloric deficit can suppress immune function — vitamin D provides protective support. |\n| **Magnesium Glycinate** | 400-500 mg/day | Split AM/PM; prioritize before bed | B-tier | Sleep quality, muscle relaxation, recovery | Sleep quality often suffers during a cut. Magnesium helps. Glycinate form is best absorbed. |\n| **Omega-3 (EPA/DHA)** | 2-3 g combined EPA+DHA/day | With meals (split across 2 meals) | A-tier | Anti-inflammatory, joint health, brain function | Anti-inflammatory effect helpful when training volume is high and recovery is compromised by deficit. |\n| **Beta-Alanine** | 3-6 g/day | Split into 2-3 doses | B-tier | Buffers lactic acid in 1-4 min efforts | Optional. Most useful for high-rep grappling rounds. Tingling (paresthesia) is harmless. |\n\n---\n\n## 11. Daily Weigh-In Protocol\n\nConsistent, accurate daily weigh-ins are essential for tracking cut progress and making timely adjustments.\n\n| Parameter | Protocol |\n|-----------|----------|\n| **Time** | Immediately upon waking |\n| **Condition** | Fasted — no food, no water. After using the bathroom. |\n| **Clothing** | Underwear only, or naked. Same every day. |\n| **Scale** | Same digital scale every day. Place on a hard, flat surface (not carpet). |\n| **Recording** | Log weight in a tracking app or spreadsheet immediately. Include the date. |\n| **Trend tracking** | Use a 7-day rolling average, not single-day readings. Daily fluctuations of 0.5-1.5 kg are normal (water, food, bowel movements). |\n\n### Decision Rules\n\n| Scenario | Action |\n|----------|--------|\n| 7-day average is on target | Continue as planned |\n| 7-day average is 0.5+ kg ahead of schedule | Slightly increase carbs on training days (+30 g) to protect performance |\n| 7-day average is 0.5+ kg behind schedule | Add 20-30 min low-intensity cardio on 2-3 rest days. Do NOT increase deficit beyond 600 kcal. |\n| 7-day average is 1+ kg behind schedule | Add cardio AND reduce rest day carbs by 30 g. Consult with coach/nutritionist. |\n| Weight stalls for 10+ days | Likely water retention masking fat loss. Stay the course for 3-4 more days. If no change, reduce carbs by 20 g on rest days. |\n\n---\n\n## 12. WADA Compliance & Supplement Safety\n\n### Verification Protocol\n\n- **Before taking ANY supplement**, verify its status at [globaldro.com](https://www.globaldro.com) — the Global Drug Reference Online maintained by WADA-accredited agencies.\n- Check every time you buy a new batch — even the same brand and product can change formulation between production runs.\n- If a substance is not listed on GlobalDRO, do not assume it is permitted. Contact your sanctioning body for guidance.\n\n### Recommended Certifications\n\n| Certification | What It Means |\n|--------------|---------------|\n| **NSF Certified for Sport** | Independent testing for banned substances and label accuracy. Gold standard. |\n| **Informed Sport** | Batch-tested by LGC for prohibited substances. Widely recognised internationally. |\n| **BSCG Certified Drug Free** | Tests for 500+ drugs including WADA-prohibited substances. |\n\n> **Use certified brands whenever possible.** The cost difference is minimal compared to the career-ending consequences of a positive test.\n\n### Common Contamination Risks\n\n| Product Category | Risk | Details |\n|-----------------|------|---------|\n| Pre-workouts | High | May contain undeclared stimulants (DMAA, DMHA, higenamine) that are prohibited in competition |\n| Herbal supplements | High | May contain unlisted ingredients, heavy metals, or pro-hormones |\n| Imported products | High | Products manufactured outside major regulated markets carry higher contamination risk |\n| Fat burners / weight loss products | Very high | Frequently contain prohibited stimulants or diuretics |\n| Protein powders (major brands) | Low | Generally safe, but verify certification |\n| Creatine monohydrate (major brands) | Very low | One of the safest and most well-studied supplements |\n\n### Athlete Responsibility\n\nIf competing under any athletic commission or sanctioning body, the athlete is **personally responsible for everything they ingest**. This is a strict liability, \"no excuse\" policy:\n\n- \"I didn't know it was in there\" is not a valid defence.\n- \"My coach/nutritionist told me to take it\" is not a valid defence.\n- \"The label didn't list it\" is not a valid defence.\n\n**You are responsible. Verify everything.**\n\n---\n\n## 13. Grocery List\n\n### Proteins\n- Chicken breast (boneless, skinless)\n- Chicken thighs (skin-on for rest days)\n- Salmon fillets\n- Lean ground beef (93% lean)\n- Whole eggs (free range)\n- Cottage cheese\n- Greek yogurt (full fat)\n- Whey protein powder\n\n### Carbohydrates\n- White rice (jasmine or basmati)\n- Oats (rolled or quick)\n- Sweet potatoes\n- White potatoes\n- Sourdough bread\n- Bananas (pre/post training staple)\n\n### Fats\n- Extra virgin olive oil\n- Butter (small quantities)\n- Avocados\n- Almonds\n- Walnuts\n- Pumpkin seeds\n- Natural peanut butter\n- Dark chocolate (70%+ — limited during cut)\n\n### Vegetables\n- Broccoli\n- Spinach / mixed greens\n- Zucchini\n- Bell peppers\n- Cherry tomatoes\n- Onions\n- Garlic\n\n### Fruits\n- Bananas\n- Blueberries\n- Apples\n- Lemons / limes\n\n### Pantry Staples\n- Honey\n- Salt (sea salt or iodized)\n- Black pepper\n- Spice basics (paprika, cumin, garlic powder)\n- Soy sauce or coconut aminos\n- Rice vinegar\n- Coffee (ground or beans)\n\n### Supplements\n- Creatine monohydrate (unflavored powder)\n- Whey protein (chocolate or vanilla)\n- Fish oil capsules (high EPA/DHA)\n- Vitamin D3 softgels\n- Magnesium glycinate capsules\n- Electrolyte mix or sodium tablets\n- Caffeine (coffee or capsules)\n- Beta-alanine powder (optional)\n- Oral rehydration solution (for fight week rehydration)\n", "training-tools": "# Training Tools\n\n> **Reference Guide** | Exercise library, warm-up protocols, cool-down sequences, and equipment lists.\n> Use this section as a quick-reference during training sessions.\n\n---\n\n## Exercise Library\n\n### Compound Barbell Lifts\n\n| Exercise | Primary Muscles | Key Cues | MMA Transfer |\n|----------|----------------|----------|--------------|\n| Back Squat | Quads, glutes, adductors, erectors | Brace hard, spread the floor, hips and knees break together. Drive up through mid-foot. | Lower-body force for level changes, takedown defense, punching power from the ground up. |\n| Front Squat | Quads, glutes, upper back, core | Elbows up the whole way. Sit straight down between hips. Drive up keeping torso vertical. | Upright torso pattern mimics clinch posture and double-leg finishes. Heavy anterior core demand. |\n| Deadlift | Posterior chain, lats, grip | Push the floor away, lock lats, bar drags up the legs. Stand tall — squeeze glutes at lockout. | Total-body posterior chain for throws, slams, sprawls, and heavy rear-hand strikes. Grip endurance under load. |\n| Romanian Deadlift (RDL) | Hamstrings, glutes, erectors | Push hips straight back. Bar stays on thighs/shins. Feel deep hamstring stretch, then drive hips forward. | Eccentric hamstring strength reduces knee-injury risk from sprawling and kicking. |\n| Bench Press | Pecs, anterior delts, triceps | Control bar to lower chest, drive through feet, press bar in slight arc back over shoulders. | Horizontal pressing power for frames, stiff-arms, bench pressing opponent off from bottom. |\n| Overhead Press | Deltoids, triceps, upper traps, core | Press bar straight up — move head out of the way, then back through. Lock out over mid-foot. | Overhead strength for posting on cage, hand fighting, resisting being driven down in clinch. |\n| Barbell Row | Lats, rhomboids, rear delts, biceps | Pull bar to lower sternum, squeeze shoulder blades at top, control the negative. Torso stays still. | Pulling strength for clinch work, underhook control, arm drags, and guillotine finishes. |\n| Hang Clean | Quads, glutes, traps, upper back | Explode hips, shrug, pull elbows high, catch in front rack with quarter squat. | Triple extension = same motor pattern as shooting a double-leg or throwing an uppercut. Rate of force development. |\n| Push Press | Deltoids, triceps, quads, core | Quick dip keeping torso vertical, then drive aggressively through legs and press overhead. | Legs-to-arms force transfer — same kinetic chain used in every punch and clinch off-balancing. |\n\n---\n\n### Single-Leg / Unilateral\n\n| Exercise | Primary Muscles | Key Cues | MMA Transfer |\n|----------|----------------|----------|--------------|\n| RFESS (Bulgarian Split Squat) | Quads, glutes, adductors | Lower straight down until rear knee nearly touches floor. Drive through front heel. Keep torso upright. | Single-leg strength for kicking, sprawling off one leg, maintaining base when opponent grabs a leg. |\n| Single-Leg RDL | Hamstrings, glutes, core (anti-rotation) | Hinge at hip, free leg extends behind as counterbalance. Back stays flat. Squeeze glute to stand. | Standing leg stability for kicks, single-leg TD defense. Anti-rotation mirrors rotational chaos of grappling. |\n| Walking Lunges | Quads, glutes, hip flexors | Take a long step forward, lower rear knee toward floor, drive through front heel. Stay tall. | Dynamic single-leg strength for shooting entries, level changes, maintaining balance in the pocket. |\n| Step-Ups | Quads, glutes | Drive through top foot to stand on box. Do NOT push off bottom foot. Control descent. | Concentric single-leg power for standing up from bottom, penetration steps for takedowns. |\n| Pistol Squat (Progression) | Quads, glutes, hip flexors, ankles | Sit back and down on one leg, keeping heel flat. Use band or box assist as needed. | Ultimate single-leg strength/mobility for recovering balance after sweeps, deep scramble positions. |\n\n---\n\n### Power / Explosive\n\n| Exercise | Primary Muscles | Key Cues | MMA Transfer |\n|----------|----------------|----------|--------------|\n| Box Jumps | Quads, glutes, calves | Swing arms, extend hips-knees-ankles, land softly on box with full foot contact. Step down. | Rate of force development for explosive takedown entries, sprawls, and closing distance. |\n| Broad Jumps | Glutes, quads, hamstrings | Swing arms forward, drive hips and jump for max distance. Absorb landing with soft knees. | Horizontal explosive power — exact vector for shooting takedowns and closing distance for strikes. |\n| Med Ball Overhead Slam | Lats, core, shoulders | Brace core, slam ball into ground as hard as possible using whole body. Hinge and follow through. | Full-body power expression similar to hammerfists from top or slam finishes. |\n| Med Ball Rotational Slam | Obliques, core, hips | Rotate hips first, then trunk, then arms — slam ball into wall. Load from back hip. | Directly trains rotational power sequence of hooks, overhands, and round kicks. |\n| Med Ball Chest Pass | Pecs, triceps, core | Drive ball off chest explosively into wall. Catch and immediately redirect. Stay on balls of feet. | Horizontal pushing speed for frames, posting, bench-pressing opponent off you. |\n| KB Swings | Glutes, hamstrings, core | Snap hips forward — arms just go along for the ride. Squeeze glutes hard at top. | Hip snap transfers to striking power, sprawl speed, and bridging/shrimping. High-rep = posterior chain endurance. |\n| KB Snatch | Glutes, hamstrings, shoulders | Hike back, snap hips, guide bell around wrist and punch through to lockout overhead. | Combines explosive hip extension with overhead stability and grip. Full-body power expression. |\n| Battle Rope Slams | Shoulders, core, lats, grip | Alternate arms or slam both together. Generate force from hips. Keep a rhythm. | Upper-body power-endurance under fatigue — simulates repeated explosive arm actions of punching in later rounds. |\n\n---\n\n### Core / Anti-Movement\n\n| Exercise | Primary Muscles | Key Cues | MMA Transfer |\n|----------|----------------|----------|--------------|\n| Pallof Press | Obliques, transverse abdominis | Press handle straight out from chest and hold. Resist rotation. Keep hips square. | Anti-rotation core stability — resisting being twisted in clinch, scrambles, and when absorbing body shots. |\n| Ab Wheel Rollout | Rectus abdominis, obliques, lats | Roll forward slowly, keeping hips extended. Go as far as you can control, then pull back with abs. | Anti-extension strength for maintaining posture in clinch, resisting back bends in wrestling. |\n| Hanging Leg Raises | Hip flexors, lower abs, grip | Raise legs to parallel (or toes to bar). Control descent — no swinging. Initiate from core. | Hip flexor strength for guard retention, high kicks, knee strikes. Grip endurance while working core. |\n| Copenhagen Plank | Adductors, obliques | Top foot on bench, lift hips and bottom leg to form straight line. Hold. | Adductor and lateral core strength for closed guard, body locks, and groin injury prevention. |\n| Dead Bug | Deep core stabilizers | Extend opposite arm and leg toward floor while keeping low back glued to mat. | Core stabilizing spine while limbs move independently — exactly what happens during transitions. |\n| Farmer's Carry | Traps, grip, core (anti-lateral flexion) | Walk with short, controlled steps. Stay tall — don't lean. Squeeze handles hard. | Total-body stability, grip endurance, and postural strength. Directly transfers to clinch endurance. |\n| Suitcase Carry | Obliques, core, grip | Walk resisting the urge to lean toward loaded side. Stay perfectly upright. | Unilateral anti-lateral flexion — resisting being pulled to one side in clinch, defending arm drags. |\n| Turkish Get-Up | Full body | Roll to elbow, post on hand, bridge hips, sweep leg under to kneeling, stand up. Eyes on bell. | Most MMA-specific core exercise. Every phase mimics a grappling transition. |\n\n---\n\n### Upper Body Accessories\n\n| Exercise | Key Cues | MMA Transfer |\n|----------|----------|--------------|\n| Weighted Pull-Ups | Initiate with lats, pull chin over bar, control descent to full extension. | Pulling strength for clinch control, guillotines, arm drags. Grip under load. |\n| Dumbbell Row | Pull dumbbell to hip, squeezing shoulder blade back and down. | Unilateral pulling for single-collar ties, underhook battles. |\n| Landmine Press | Press bar up and forward at slight angle. Squeeze core to prevent rotation. | Angled pressing mimics jab/cross. Anti-rotation demand mirrors posting. |\n| Incline DB Press | Press dumbbells up and slightly inward. Lower to shoulders with control. | Upper chest pressing for frames from bottom, posting on cage. |\n| Push-Up Variations | Standard, Diamond, Archer, Clap — all with full ROM and proper alignment. | Pressing endurance, explosive frames, short-range pushing power. |\n| Dips | Lower until upper arms parallel to floor, press to full lockout. | Pressing from depressed shoulder position — posting on mat, pressing up from bottom. |\n| Face Pulls | Pull rope to face, split hands apart and externally rotate. Squeeze for a beat. | Shoulder health and postural balance against high volumes of punching. |\n| Band Pull-Aparts | Pull band apart by squeezing shoulder blades together. Slow return. | Scapular health and posture maintenance. Daily prehab movement. |\n\n---\n\n### Grip & Neck\n\n| Exercise | Key Cues | MMA Transfer |\n|----------|----------|--------------|\n| Plate Pinch Holds | Squeeze two plates together (smooth sides out). Hold for time. | Pinch grip for controlling wrists, maintaining grip on sweaty opponent. |\n| Towel Pull-Ups | Perform pull-ups while gripping towels draped over bar. | Grip endurance on thick, pliable surface — mimics controlling sweaty wrist/ankle. |\n| Fat Grip Rows | Row with thick handles. Reduce weight 20-30% vs normal. | Open-hand grip strength for no-gi grappling and wrist control. |\n| Neck Harness (4-Way) | Controlled flexion/extension through comfortable ROM. 3-4 sec per rep. NEVER do neck bridges. | Strong neck directly reduces concussion risk. Resists guillotines, can openers, cranks. |\n| Band Neck Isometrics | Hold head neutral against band pull. 10-20 sec holds, all 4 directions. | Low-impact daily neck strengthening. Isometric endurance for real-time resistance. |\n\n---\n\n### Conditioning Modalities\n\n| Exercise | Key Cues | MMA Transfer |\n|----------|----------|--------------|\n| Assault Bike Intervals | Push/pull with arms, drive with legs. All-out for work, easy spin for rest. | Whole-body energy system training. Explosive-burst-then-recover pattern of MMA rounds. |\n| Rowing — 500m Repeats | Drive with legs first, then hips, then arms. Target consistent splits. | Full posterior chain conditioning. Lactic tolerance for scrambles and late takedown battles. |\n| Jump Rope | Small bounces, turn from wrists. Stay relaxed. | Footwork coordination, calf endurance, rhythm — foundation of striking movement. |\n| Sled Push / Pull | Push: drive with legs, stay low. Pull: sit back and row hand-over-hand. | Zero eccentric = heavy conditioning without DOMS. Pushing mimics cage driving, pulling mimics dragging. |\n| Shadow Boxing | Throw combinations with intent. Move feet. Visualize an opponent. | Most specific conditioning for striking. Technical practice under fatigue. |\n| Bag Work | Throw real combinations. Move head and feet between combos. Hit through the bag. | Full-contact striking conditioning. Builds punch endurance and timing under fatigue. |\n| Sprawl-to-Burpee | Drop into sprawl (hips to floor), pop back to feet. Reset stance and repeat. | Most MMA-specific bodyweight conditioning. Combines TD defense with explosive recovery. |\n\n---\n\n### Prehab / Mobility\n\n| Exercise | Key Cues | Purpose |\n|----------|----------|---------|\n| Band External Rotations | Rotate forearm outward, elbow glued to ribs. Slow both directions. | Rotator cuff health — non-negotiable for fighters. |\n| 90/90 Hip Switches | Rotate both legs to opposite position in one smooth motion. Chest tall. | Hip IR/ER mobility for guard play, sweeps, hip escapes, kicking. |\n| Hip CARs | Largest possible circle with knee — slowly, with maximum tension. | Maintaining full hip ROM. Prevents loss from tight guards and heavy squatting. |\n| Thoracic Spine Rotations | Side-lying, rotate top arm up opening chest to ceiling. Knees glued together. | T-spine rotation is the engine of punching power and shot defense. |\n| Goblet Squat | Sit between hips, elbows push knees out. Chest tall. | Warm-up for squat patterns. Upright position transfers to clinch posture. |\n| World's Greatest Stretch | Lunge → rotate inside arm up → straighten front leg for hamstring stretch. | Most efficient dynamic warm-up. Addresses hip flexors, T-spine, hamstrings, groin. |\n| Band Dislocates | Keeping arms straight, raise band overhead and behind back in slow arc. | Full shoulder ROM warm-up. Counteracts tight anterior shoulders from punching. |\n\n---\n\n## Warm-Up Protocols\n\n### Protocol 1: Upper Body Strength (~10 min)\n\n| Order | Exercise | Duration/Reps | Cue |\n|-------|----------|---------------|-----|\n| 1 | Jumping jacks | 30 sec | Light and rhythmic, get blood flowing |\n| 2 | Arm circles (forward + backward) | 15 sec each direction | Full range, gradually increase size |\n| 3 | Shoulder CARs | 5 each direction per arm | Slow, controlled, maximal range |\n| 4 | Band pull-aparts | 2 x 15 | Squeeze shoulder blades together |\n| 5 | Push-up walkouts (inchworms) | 5 reps | Slow walk out to full plank, brief hold |\n| 6 | Thoracic rotations (quadruped) | 5 each side | Rotate to open chest to ceiling |\n| 7 | Ramp-up set 1 (main lift) | 8 reps @ empty bar | Focus on bar path and setup |\n| 8 | Ramp-up set 2 (main lift) | 5 reps @ ~50% working weight | Lock in cues |\n\n---\n\n### Protocol 2: Lower Body Strength (~12 min)\n\n| Order | Exercise | Duration/Reps | Cue |\n|-------|----------|---------------|-----|\n| 1 | Light jog in place / high knees | 30 sec | Easy pace, wake up the legs |\n| 2 | Hip CARs (standing) | 5 each direction per leg | Slow circles, keep pelvis stable |\n| 3 | 90/90 switches | 8 total (4 each side) | Sit tall, rotate hips smoothly |\n| 4 | Ankle mobility (knee-over-toe rocks) | 10 each side | Heel stays down, drive knee past toes |\n| 5 | Bodyweight squats | 10 reps | Full depth, chest up, knees out |\n| 6 | Walking lunges | 8 each leg | Long stride, upright torso |\n| 7 | Banded lateral walks | 10 each direction | Stay low in half squat, push knees out |\n| 8 | Fire hydrants | 10 each side | Quadruped, core braced, lift knee to side |\n| 9 | Ramp-up set 1 (main lift) | 8 reps @ empty bar | Groove the pattern |\n| 10 | Ramp-up set 2 (main lift) | 5 reps @ ~50% working weight | Controlled descent, strong drive |\n\n---\n\n### Protocol 3: Power Day (~11 min)\n\n| Order | Exercise | Duration/Reps | Cue |\n|-------|----------|---------------|-----|\n| 1 | Jumping jacks | 30 sec | Brisk pace |\n| 2 | High knees | 30 sec | Drive knees to hip height |\n| 3 | Leg swings (front-to-back) | 10 each leg | Hold wall for balance |\n| 4 | Leg swings (lateral) | 10 each leg | Cross body and out, controlled |\n| 5 | Arm circles + shoulder pass-throughs | 10 each + 10 | Use PVC or band for pass-throughs |\n| 6 | Hip CARs | 3 each direction per leg | Open up hips |\n| 7 | Hang clean technique (empty bar) | 2 x 5 reps | Hip hinge, explosive extension, high elbows |\n| 8 | Box jump build-up (low box) | 3 reps | Soft landing, step down |\n| 9 | Box jump build-up (working height) | 3 reps | Stick the landing, quiet feet |\n| 10 | Ramp-up set (main power lift) | 3 reps @ ~50% | Fast and crisp |\n\n---\n\n### Protocol 4: MMA Striking (~10 min)\n\n| Order | Exercise | Duration/Reps | Cue |\n|-------|----------|---------------|-----|\n| 1 | Jump rope | 3 min | Stay on balls of feet, light bounce |\n| 2 | Wrist circles | 15 each direction | Interlace fingers, roll smoothly |\n| 3 | Neck warm-up (nods, rotations, lateral) | 10 each direction | Slow and controlled |\n| 4 | Arm circles + shoulder rolls | 10 each direction | Loosen the striking chain |\n| 5 | Dynamic hip openers (leg swings) | 8 each leg | Prepare for kicks |\n| 6 | Torso rotations (standing) | 10 each side | Feet planted, rotate from T-spine |\n| 7 | Shadow boxing — jab-cross only | 1 min | Light and technical |\n| 8 | Shadow boxing — add hooks, uppercuts | 1 min | Stay relaxed, snap punches |\n| 9 | Shadow boxing — full combos + kicks | 1 min | Progressive intensity, move feet |\n\n**Add Pre-Session Neck Protocol:** 4-way isometric holds, 10 sec × 2 rounds each direction (~3 min)\n\n---\n\n### Protocol 5: MMA Grappling (~12 min)\n\n| Order | Exercise | Duration/Reps | Cue |\n|-------|----------|---------------|-----|\n| 1 | Light jogging / movement on mats | 3 min | Include shuffles, backpedals, sprawl checks |\n| 2 | Neck warm-up (nods, rotations, bridges) | 10 each direction | Gentle, build up gradually |\n| 3 | Hip escapes / shrimps | 5 each side | Drive off bottom foot, create space |\n| 4 | Technical stand-ups | 5 each side | Post on hand, kick through, stand |\n| 5 | Granby rolls | 5 each direction | Tuck chin, roll over shoulder |\n| 6 | Partner pummeling (or solo: forward/backward rolls) | 2 min | Fight for underhooks, stay square |\n| 7 | Partner arm drags (or solo: shot entries) | 5 each side | Grip wrist and tricep, pull across |\n\n**Add Pre-Session Neck Protocol:** 4-way isometric holds, 10 sec × 2 rounds each direction (~3 min)\n\n---\n\n### Protocol 6: Conditioning / Cardio (~8 min)\n\n| Order | Exercise | Duration/Reps | Cue |\n|-------|----------|---------------|-----|\n| 1 | Light movement (walk / jog / pedal) | 2 min | Zone 1, conversational pace |\n| 2 | Leg swings (front-to-back + lateral) | 8 each direction, each leg | Controlled, progressively bigger |\n| 3 | Bodyweight squats | 10 reps | Full depth, open up hips |\n| 4 | Torso rotations + arm swings | 10 each | Wake up the trunk |\n| 5 | Progressive build-up — easy | 1 min @ ~50% target | Find rhythm |\n| 6 | Progressive build-up — moderate | 1 min @ ~70% target | HR climbing but controlled |\n| 7 | Progressive build-up — near target | 1 min @ ~85-90% target | Approaching working pace |\n\n---\n\n## Cool-Down Protocol (Universal — ~15-20 min)\n\n### Phase 1: Light Movement (5 min)\n\n| Exercise | Duration | Cue |\n|----------|----------|-----|\n| Walking (or easy bike) | 3 min | Slow pace, bring HR down |\n| Deep breathing | 2 min | 4-count inhale through nose, 6-count exhale through mouth |\n\n### Phase 2: Static Stretching (5 min — 30 sec holds)\n\n| Stretch | Duration | Cue |\n|---------|----------|-----|\n| Standing hamstring stretch (each leg) | 30 sec × 2 | Hinge at hips, flat back |\n| Kneeling hip flexor stretch (each side) | 30 sec × 2 | Squeeze glute on back leg, push hips forward |\n| Standing quad stretch (each leg) | 30 sec × 2 | Pull heel to glute, knees together |\n| Doorway chest stretch (each side) | 30 sec × 2 | Arm at 90° on wall, lean through |\n| Overhead lat stretch (each side) | 30 sec × 2 | Grab overhead surface, sink hips away |\n\n### Phase 3: Foam Rolling (5-10 min)\n\n| Area | Duration | Cue |\n|------|----------|-----|\n| Quads / hip flexors | 60-90 sec each leg | Slow rolls, pause on tender spots |\n| IT band / outer thigh | 60 sec each leg | Hip to knee, go slow |\n| Upper back (thoracic) | 60-90 sec | Arms crossed, roll mid-back |\n| Lats | 60 sec each side | Side-lying, armpit to mid-rib |\n| Glutes | 60 sec each side | Lacrosse ball optional, cross ankle over knee |\n| Calves | 60 sec each leg | Stack legs, point/flex foot |\n\n---\n\n## Mobility Flow (Recovery Days — ~25 min)\n\n*Perform as a continuous flow. Breathe deeply. No rushing.*\n\n| Order | Position | Duration | Cue |\n|-------|----------|----------|-----|\n| 1 | Cat-cow | 90 sec | Inhale extension, exhale flexion — full spinal wave |\n| 2 | Thread the needle (each side) | 60 sec/side | Reach under, follow hand with eyes |\n| 3 | Open books (each side) | 60 sec/side | Knees stacked, top arm opens to ceiling |\n| 4 | 90/90 hip — front leg focus (each side) | 90 sec/side | Sit tall, hinge forward over front shin |\n| 5 | 90/90 hip — back leg focus (each side) | 60 sec/side | Lean back slightly, feel inner thigh |\n| 6 | Pigeon pose (each side) | 90 sec/side | Walk hands forward to deepen |\n| 7 | Frog stretch | 90 sec | Knees wide, hips push back |\n| 8 | Shoulder CARs | 60 sec | 3 each direction per arm, slow and maximal |\n| 9 | Sleeper stretch (each side) | 60 sec/side | Side-lying, gently press hand toward floor |\n| 10 | Supine hamstring stretch (each leg) | 60 sec/side | Use strap, keep leg straight |\n| 11 | Ankle mobility (half-kneeling, each side) | 60 sec/side | Drive knee past toes, heel stays down |\n| 12 | Wrist mobility (quadruped) | 60 sec | Fingers forward, back, then backs of hands |\n| 13 | Seated spinal twist (each side) | 60 sec/side | Cross leg, twist toward bent knee |\n| 14 | Child's pose | 90 sec | Arms extended, sink hips to heels |\n\n---\n\n## Neck Strengthening Protocol\n\n### Pre-Session Neck Warm-Up (Before Striking & Grappling)\n\n| Exercise | Protocol | Cue |\n|----------|----------|-----|\n| Isometric Hold — Forward | 10 sec × 2 rounds | Palm on forehead, push at ~50% effort. Resist all movement. |\n| Isometric Hold — Backward | 10 sec × 2 rounds | Palm on back of head. Keep chin slightly tucked. |\n| Isometric Hold — Left | 10 sec × 2 rounds | Left palm on left temple. Keep shoulders level. |\n| Isometric Hold — Right | 10 sec × 2 rounds | Right palm on right temple. Match effort to left side. |\n\n**2 rounds through all 4 directions = ~3 min.** Use 50-70% effort — activation, not max effort.\n\n### Progressive Neck Harness Work (Friday Power Sessions)\n\n| Week | Sets × Reps | Load | Notes |\n|------|-------------|------|-------|\n| 1 | 2 × 15 | 2.5 kg | Learn the movement. Slow, controlled. |\n| 2 | 3 × 12 | 5 kg | Increase volume and load. |\n| 3 | 3 × 10 | 7.5 kg | Peak load. Drop back if form degrades. |\n| 4+ | 2 × 10 | 5 kg | Maintenance. |\n\n**NEVER do neck bridges or rapid rotations under load.** Each rep = 2 sec concentric, 2 sec eccentric.\n\n---\n\n## Warm-Up Assignment by Session\n\n| Session Type | Warm-Up Protocol | Neck Protocol | Total Time |\n|--------------|------------------|---------------|------------|\n| Strength: Upper Body | Protocol 1 | — | ~10 min |\n| Strength: Lower Body | Protocol 2 | — | ~12 min |\n| Strength: Power Day | Protocol 3 | Harness work post-session | ~11 min + 5 min |\n| MMA Striking | Protocol 4 | Pre-session isometric 4-way | ~10 min + 3 min |\n| MMA Grappling | Protocol 5 | Pre-session isometric 4-way | ~12 min + 3 min |\n| Conditioning / Cardio | Protocol 6 | — | ~8 min |\n| All sessions (post) | Cool-Down | — | ~15-20 min |\n| Recovery day | Mobility Flow | — | ~25 min |\n\n---\n\n## Equipment Needed\n\n### Gym Equipment\n\n- Barbell + plates (Olympic standard)\n- Squat rack with pull-up bar\n- Adjustable bench (flat + incline)\n- Dumbbells (range: 10-50 kg)\n- Kettlebells (16 kg, 24 kg, 32 kg)\n- Cable machine or resistance bands\n- Plyo boxes (20\", 24\", 30\")\n- Slam balls (15 lb, 20 lb, 30 lb)\n- Med balls (10 lb, 14 lb, 20 lb)\n- Battle ropes (1.5-2\", 40-50 ft)\n- Ab wheel\n- Pull-up bar + dip station\n- Sled + turf/track\n- Assault bike and/or rowing ergometer\n- Foam roller + lacrosse ball\n- Resistance bands (mini + long loop)\n- Neck harness\n- Fat Gripz (or thick-handle implements)\n- PVC pipe or broomstick\n\n### MMA Training Gear\n\n- MMA gloves (4 oz for grappling, 7 oz for sparring)\n- Boxing gloves (16 oz for sparring, 12-14 oz for pads/bag)\n- Hand wraps (180\" minimum)\n- Mouthguard (custom-fitted recommended)\n- Groin protector / cup\n- Headgear (mandatory from Week 3+)\n- Shin guards\n- Rashguard + fight shorts\n- Jump rope (speed rope)\n- Heavy bag (70-100 lbs)\n- Focus mitts + Thai pads\n- Gym towels (for towel pull-ups / grip work)\n- Old gi (for gi pull-ups)\n- Timer (round timer app or Tabata timer)\n", "fight-prep": "# Fight Preparation\n\n**Fighter:** Anes Kurtovic\n**Weight Class:** 77 kg\n**Fight Date:** May 16, 2026\n**Camp Duration:** 9 weeks (March 16 - May 16, 2026)\n\n---\n\n## Safety & Injury Prevention\n\n> **Training through pain is not toughness — it is stupidity that costs you training weeks.** Every session missed to a preventable injury is a session your opponent is gaining on you.\n\n### Concussion Protocol — Graduated Return-to-Play (6 Steps)\n\n**Mandatory minimum stand-down: 7 days from the date of concussion.** No athlete may advance through these steps in less than 7 days total. Each step requires a minimum of 24 hours symptom-free before progressing to the next.\n\n| Step | Activity | Objective | Duration |\n|------|----------|-----------|----------|\n| 1 | Complete physical and cognitive rest | Recovery | 24-48 hours minimum |\n| 2 | Light aerobic exercise (walking, stationary bike at <70% max HR) | Increase heart rate | 1 day minimum |\n| 3 | Sport-specific exercise (shadow boxing, movement drills — no contact, no head impact risk) | Add movement complexity | 1 day minimum |\n| 4 | Non-contact training drills (pad work, grappling drills at 50%, technical sparring with zero contact to head) | Increase intensity, restore coordination | 1 day minimum |\n| 5 | Full contact practice (return to normal sparring with trusted partners, coach monitoring) | Restore confidence, test functional recovery | 1 day minimum |\n| 6 | Return to competition | Full clearance | Medical sign-off recommended |\n\n- If symptoms return at any step, drop back to the previous step and wait 24 hours before retrying.\n- A second concussion within 12 months requires medical clearance before returning to any contact training.\n- **Fight camp context:** A concussion during camp that requires the full 7-day protocol will cost a minimum of 7-10 training days. If this occurs after Week 6, seriously evaluate whether the fight should proceed. Fighter health comes first.\n\n### Emergency Red Flags — Go to the ER Immediately\n\n| Red Flag | Description |\n|----------|-------------|\n| Repeated vomiting | Two or more episodes after head impact |\n| Seizure | Any seizure activity, even brief |\n| Loss of consciousness >30 seconds | Unresponsive or unable to be woken |\n| Worsening headache | Headache that intensifies over time rather than improving |\n| Slurred speech | Difficulty forming words or sentences that weren't present before impact |\n| Weakness or numbness | One-sided weakness, numbness in extremities, or difficulty with coordination |\n| Unequal pupils | One pupil visibly larger than the other |\n| Unusual drowsiness | Cannot stay awake, extreme confusion, or combativeness |\n\n### Sparring Safety\n\n#### Partner Matching\n\n- Match sparring partners within **+/- 10% bodyweight**. For Anes at 77 kg (likely training around 80-82 kg), acceptable range is 72-90 kg.\n- If a significant weight mismatch is unavoidable, the heavier partner must reduce power output proportionally.\n- Skill level should be within 1-2 levels. Never pair a first-day beginner against an experienced fighter in live rounds.\n\n#### Required Gear by Camp Phase\n\n| Camp Phase | Required Gear |\n|------------|---------------|\n| Weeks 1-2 (base phase) | 16 oz gloves, mouthguard, cup |\n| Weeks 3-8 (intensity phase) | All of the above + headgear mandatory, shin guards mandatory |\n| Week 9 (fight week) | No sparring — technique only |\n\n> **No exceptions on mouthguard and cup — ever.** Headgear is mandatory from Week 3 onward because sparring intensity increases to 85-90%. If headgear is not available, cap sparring intensity at 60%.\n\n#### Corner Person Criteria\n\nEvery sparring session must have a designated corner person who:\n\n| Requirement | Details |\n|-------------|---------|\n| Experience | Must be an experienced fighter or coach who has cornered before |\n| Authority | Has the authority to stop rounds at any time, for any reason |\n| Monitoring | Actively watches for signs of fatigue, disorientation, or excessive damage |\n| Positioning | Stands mat-side with a clear view of both fighters, not distracted |\n| Communication | Can communicate clearly with both fighters and the timekeeper |\n\n#### Post-Sparring Neuro Check\n\nPerform after every sparring session, especially after any significant head contact:\n\n| Check | Method | Concern If... |\n|-------|--------|---------------|\n| Orientation | Ask: \"What day is it? Where are we? Who did you spar with?\" | Cannot answer correctly or hesitates significantly |\n| Balance | Stand on one foot for 10 seconds, eyes closed | Cannot hold balance, sways excessively, falls |\n| Recall | Ask about a specific combination or exchange from the round | Cannot recall events from the session |\n| Tracking | Follow a finger smoothly left to right, up and down | Eyes jump, cannot track smoothly, reports dizziness |\n\n> **If the athlete fails any part of the neuro check:** no more training that day, monitor for 24 hours, apply the concussion protocol if symptoms persist.\n\n### Injury Modification Table\n\n| Body Part | Avoid | Substitutes | See Doctor If... |\n|-----------|-------|-------------|------------------|\n| **Shoulder** | Overhead pressing, bench press at full ROM, heavy pull-ups, throwing combinations with full extension | Landmine press (neutral path), floor press (limited ROM), band pull-aparts, isometric holds at pain-free angles | Pain at rest, inability to raise arm above shoulder height, clicking/catching with sharp pain, numbness down the arm |\n| **Knee** | Deep squats, lunging with full depth, explosive jumping/landing, heavy leg press at full ROM | Box squat to pain-free depth, leg press at partial ROM, step-ups (low box), wall sits, hamstring curls, hip thrusts | Swelling that doesn't resolve in 48 hours, locking/giving way, inability to fully straighten or bend, pain walking downstairs |\n| **Lower Back** | Heavy deadlifts, loaded spinal flexion (sit-ups, GHD), back squats with heavy load, explosive rotational movements | Hip hinge with light KB (RDL pattern), bird dogs, dead bugs, McGill Big 3 (curl-up, side plank, bird dog), belt squat | Pain radiating down either leg, numbness/tingling in feet, loss of bladder/bowel control, pain that worsens despite 5+ days rest |\n| **Neck** | Neck bridges, heavy shrugs, sparring with head contact, any exercise that loads the neck under flexion | Isometric 4-way holds (light, pain-free), gentle ROM exercises, upper trap stretches, avoid headgear sparring until cleared | Pain radiating into arms/hands, persistent headache associated with neck movement, weakness in grip, dizziness when turning head |\n| **Wrist/Hand** | Heavy gripping (deadlift, pull-ups, farmer's carry), wrist extension under load, heavy bag work without wraps | Straps for pulling movements, push-ups on fists or parallettes, hook grip alternatives, open-hand guard work, focus mitt work with proper wrapping | Swelling that doesn't resolve in 48 hours, inability to grip at all, visible deformity, numbness in fingers, pain on the snuffbox (scaphoid fracture risk) |\n| **Ankle** | Running, box jumps, any plyometrics, heavy calf work, kicking with the injured side | Cycling or rowing for cardio, seated calf raises (light), balance board work at pain-free ROM, upper body and grappling focus | Inability to bear weight, significant bruising/swelling, pain on both sides of the ankle (possible fracture), instability (ankle gives way) |\n| **Ribs** | Trunk rotation under load, heavy bag work, sparring (any contact), exercises requiring bracing under load (squats, deadlifts) | Machine-based isolation work (leg extension, hamstring curl, cable exercises), light technique drilling with no contact, walking/cycling for conditioning | Pain with deep breathing that worsens, bruising that spreads, pain on specific rib when pressed, shortness of breath |\n\n#### General Injury Rules\n\n1. If an exercise causes **sharp pain**, stop immediately. Dull discomfort during warm-up that resolves within 2-3 minutes is generally acceptable.\n2. Never increase load on a modified exercise until the original exercise can be performed pain-free.\n3. Ice acute injuries for 15-20 minutes, 3-4 times per day for the first 48-72 hours.\n4. Log all injuries and modifications in your training journal — patterns reveal root causes.\n\n### When to Stop Training / Pull Out of the Fight\n\n| Situation | Decision |\n|-----------|----------|\n| Concussion after Week 6 | Strongly consider pulling out. A 2-3 week gap in sparring before a fight is dangerous. |\n| Broken hand/foot | Pull out. Cannot compete safely with a fracture. |\n| Knee or ankle ligament sprain (Grade 2+) | Pull out. Risk of catastrophic re-injury under fight conditions is too high. |\n| Illness with fever within 2 weeks of fight | Reassess at 7 days out. If still symptomatic, pull out. |\n| Weight cut not on track at Week 7 | If more than 5 kg above fight weight at start of Week 7, reassess viability. Cutting more than 8% bodyweight (>6.2 kg for a 77 kg class) is dangerous. |\n| 3+ overtraining red flags for 5+ consecutive days | Mandatory deload. If within 2 weeks of fight, reduce volume dramatically but maintain skill work. |\n\n---\n\n## Conditioning Tests\n\n### Testing Schedule\n\n| Test Point | When | Purpose |\n|------------|------|---------|\n| **Baseline** | Week 0 (March 14-15, 2026) | Establish starting fitness levels, identify weaknesses, set training targets |\n| **Mid-Camp** | Week 5 (April 18, during deload) | Measure progress, adjust programming for final 4 weeks |\n| **Final** | Week 8 (May 9, 2026) | Confirm fight readiness, final confidence check |\n\n> **Week 9 (fight week) has NO conditioning tests.** The body must be resting and recovering, not testing.\n\n### Testing Conditions\n\n- Same time of day for every test point\n- Same equipment, same warm-up protocol, same test order\n- Record date, time, fasted/fed status, sleep quality, and bodyweight\n- If splitting across two days: cardiovascular + muscular endurance on Day 1, strength + MMA-specific on Day 2\n- Allow at least one full rest day between testing and the next training session\n\n### Warm-Up Protocol (Before Every Testing Session)\n\n1. **5 min easy cardio** — row, bike, or jog at conversational pace\n2. **Joint circles** — ankles, knees, hips, shoulders, wrists (10 each direction)\n3. **Dynamic stretches** — leg swings (10/side), hip circles (10/side), arm circles (10/side), inchworms (5)\n4. **Movement prep** — 5 bodyweight squats, 5 push-ups, 5 pull-apart band pulls\n5. For strength tests, add 2-3 progressive warm-up sets (empty bar, 50%, 70%, 85%, then test attempt)\n\n### Test Battery\n\n**Rest between tests:** 3-5 minutes within a category, 5-10 minutes between categories.\n\n#### Cardiovascular\n\n| # | Test | Protocol | Target (Good) | Target (Excellent) |\n|---|------|----------|---------------|-------------------|\n| 1 | Resting Heart Rate | Measure on waking, 3 consecutive mornings, record average | < 60 bpm | < 50 bpm |\n| 2 | 2 km Row or Run | All-out time trial. Record finish time, HR at finish, HR 1 min post-finish | Row < 7:30 / Run < 8:30 | Row < 7:00 / Run < 8:00 |\n| 3 | 5-min Assault Bike | Max calories in 5 minutes. Record total cals and average HR | > 75 cal | > 90 cal |\n\n#### Strength\n\n| # | Test | Protocol | Target (Good) | Target (Excellent) |\n|---|------|----------|---------------|-------------------|\n| 4 | Est. 1RM Back Squat | Work up to heavy 3RM, calculate 1RM via Epley formula | 1.5x BW (115.5 kg) | 2x BW (154 kg) |\n| 5 | Est. 1RM Bench Press | Work up to heavy 3RM, calculate 1RM via Epley formula | 1x BW (77 kg) | 1.25x BW (96 kg) |\n| 6 | Est. 1RM Deadlift | Work up to heavy 3RM, calculate 1RM via Epley formula | 2x BW (154 kg) | 2.5x BW (192.5 kg) |\n| 7 | Max Strict Pull-Ups | Dead hang, chin over bar, full extension, no kipping | 10+ | 15+ |\n\n#### Muscular Endurance\n\n| # | Test | Protocol | Target (Good) | Target (Excellent) |\n|---|------|----------|---------------|-------------------|\n| 8 | Max Push-Ups in 2 min | Chest to floor, full lockout. Pausing in up position allowed | 50+ | 70+ |\n| 9 | Max Plank Hold | Forearm plank, straight line. Stops when hips sag/rise > 2 inches | 2:00+ | 3:00+ |\n\n#### MMA-Specific\n\n| # | Test | Protocol | Target (Good) | Target (Excellent) |\n|---|------|----------|---------------|-------------------|\n| 10 | 3-min Sprawl Test | Max sprawls in 3 minutes (standing to chest to floor to stance) | 30+ | 40+ |\n| 11 | Ground-to-Standing Transitions | Max reps in 2 min (standing to flat on back to technical stand-up) | 15+ | 20+ |\n\n#### Body Composition\n\n| # | Test | Protocol | Notes |\n|---|------|----------|-------|\n| 12 | Bodyweight | Fasted, morning, after bathroom. Same scale each time | Track change over camp — must trend toward 77 kg |\n| 13 | Waist Circumference | At navel level, relaxed, cloth tape measure | Track change, not absolute |\n\n#### Grip & Neck Strength\n\n| # | Test | Protocol | Target (Good) | Target (Excellent) |\n|---|------|----------|---------------|-------------------|\n| 14 | Dead Hang | Overhand grip, shoulder-width, dead hang until failure | 60s+ | 90s+ |\n| 15 | Neck Strength (Isometric) | Partner applies steady pressure in 4 directions, hold 10s each | Pass all 4 directions | No asymmetry (< 3s difference L vs R) |\n\n### Epley Formula for 1RM Estimation\n\n```\nEstimated 1RM = Weight x (1 + Reps / 30)\n```\n\nExample: 3RM of 100 kg = 100 x (1 + 3/30) = 100 x 1.10 = **110 kg**\n\n### Recording Template\n\n| # | Test | Week 1 Baseline | Week 5 Mid-Camp | Week 8 Final | Change (Baseline to Final) |\n|---|------|-----------------|-----------------|--------------|---------------------------|\n| 1 | Resting Heart Rate (bpm) | | | | |\n| 2 | 2 km Row/Run (time) | | | | |\n| 3 | 5-min Assault Bike (cals) | | | | |\n| 4 | Back Squat Est. 1RM (kg) | | | | |\n| 5 | Bench Press Est. 1RM (kg) | | | | |\n| 6 | Deadlift Est. 1RM (kg) | | | | |\n| 7 | Max Strict Pull-Ups | | | | |\n| 8 | Max Push-Ups in 2 min | | | | |\n| 9 | Max Plank Hold (time) | | | | |\n| 10 | 3-min Sprawl Test (reps) | | | | |\n| 11 | Ground-to-Standing (reps) | | | | |\n| 12 | Bodyweight (kg) | | | | |\n| 13 | Waist Circumference (cm) | | | | |\n| 14 | Dead Hang (sec) | | | | |\n| 15 | Neck Isometric (P/F) | | | | |\n\n### Pass/Fail Criteria — Fight Readiness (Week 8 Final Test)\n\nThe fighter must meet the following minimum standards to confirm conditioning is adequate for competition. These are **minimums**, not targets.\n\n| Category | Minimum Standard | Rationale |\
