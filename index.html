 is the most important night of sleep in the entire camp. Dark room, cool, no screens 30 min before bed. |\n\n### Pre-Fight Meal Timing (Saturday, May 16 — Fight Day)\n\n| Meal | Timing | Content | Calories |\n|------|--------|---------|----------|\n| Breakfast | 4-5 hours before fight time | White rice, eggs, banana, toast with honey, electrolyte drink | 600-800 cal |\n| Snack | 2-3 hours before fight time | Banana, rice cakes, small amount of honey, sip electrolyte drink | 200-300 cal |\n| Final fuel | 60-90 min before fight | Small handful of gummy bears or dates (fast sugar), sip of water | 100 cal |\n| **Nothing** | 30 min before fight | No food. Small sips of water only if thirsty. | — |\n\n> **Do not try anything new on fight day.** Every food item should have been tested during camp. The pre-fight meal should be rehearsed at least 3 times before hard sparring sessions.\n\n### Warm-Up Sequence (Pre-Fight)\n\nThis should take approximately 30-35 minutes, starting 45 minutes before expected walk-out.\n\n| Phase | Duration | Activity |\n|-------|----------|----------|\n| 1. Activate | 5 min | Light skipping, joint circles, dynamic stretching. Get blood flowing. |\n| 2. Movement | 5 min | Shadow boxing — light, focused on footwork and distance. Not power. |\n| 3. Pads — build | 10 min | 3 rounds of pads with coach, building from 50% to 80%. Round 1: jab/cross, movement. Round 2: game plan combinations. Round 3: fight-pace burst. |\n| 4. Grappling activate | 5 min | Light wrestling movement — level changes, sprawls, duck-unders. Just enough to activate the hips. |\n| 5. Peak | 3 min | One final round of pads at 90-100%. Short, explosive. Simulate the opening 30 seconds of the fight. End on a high note. |\n| 6. Rest | 5-10 min | Sit down. Controlled breathing. Glove up. Coach delivers final cues — 3 words maximum. |\n\n### Corner Communication Plan\n\nEstablish these during camp and use them in every sparring session so they are automatic on fight night.\n\n#### Verbal Cues\n\n| Cue | Meaning |\n|-----|---------|\n| \"Jab\" | Re-establish the jab. You're being too passive. |\n| \"Breathe\" | You're tensing up. Relax, reset, exhale on strikes. |\n| \"Levels\" | Switch to body attacks. The head is too well-defended. |\n| \"Hands up\" | Guard has dropped. Protect yourself. |\n| \"Push\" | Increase pace. You need this round. Outwork the opponent. |\n| \"Time\" | Settle down. You are ahead. Control the pace, don't take risks. |\n| \"Underhook\" | Get the underhook in the clinch. You're losing position. |\n| \"Off the cage\" | You're stuck on the fence. Circle out, create space. |\n| \"Plan B\" | Switch to the backup strategy. Plan A is not working. |\n| \"Finish\" | Opponent is hurt. Swarm intelligently — don't get wild. |\n\n#### Between-Round Protocol\n\n| Time | Corner Action |\n|------|---------------|\n| 0-15 sec | Sit the fighter down. Water. Ice on neck if needed. Say nothing yet — let him breathe. |\n| 15-30 sec | **One tactical adjustment.** Maximum two sentences. \"He's dropping his right hand after the jab. Double jab, straight right.\" |\n| 30-45 sec | **One emotional cue.** \"You're ahead. Stay calm.\" or \"You need this round. Push the pace.\" |\n| 45-55 sec | Mouthguard in. Stand up. \"You're ready. Go.\" |\n| 55-60 sec | Fighter standing, bouncing, focused. No more talking. |\n\n> **The corner must resist the urge to give too much information between rounds.** A fighter who is fatigued and full of adrenaline can process ONE instruction, maybe two. More than that creates confusion. Pick the single most important adjustment and deliver it clearly.\n\n---\n\n*This fight preparation plan is for Anes Kurtovic, 77 kg, targeting May 16, 2026. Every section should be reviewed with the coaching team and adjusted based on the specific opponent once confirmed. The plan is a framework — the fighter and his team own the execution.*\n"};

// ── Markdown rendering ──
function renderMd(src) {
  if (markedLoaded && typeof marked !== 'undefined') {
    return marked.parse(src);
  }
  return '<pre style="white-space:pre-wrap;font-family:inherit;color:var(--text)">' +
    src.replace(/&/g,'&amp;').replace(/</g,'&lt;') + '</pre>';
}

function wrapTables(html) {
  return html.replace(/<table/g, '<div class="table-wrap"><table')
             .replace(/<\/table>/g, '</table></div>');
}

function addTableLabels(container) {
  container.querySelectorAll('table').forEach(function(table) {
    var headers = [];
    table.querySelectorAll('thead th').forEach(function(th) {
      headers.push(th.textContent.trim());
    });
    if (headers.length === 0) return;
    table.querySelectorAll('tbody tr').forEach(function(tr) {
      tr.querySelectorAll('td').forEach(function(td, i) {
        if (headers[i]) td.setAttribute('data-label', headers[i]);
      });
    });
  });
}

function getContent() {
  return currentLang === 'bos' ? CONTENT_BOS : CONTENT_EN;
}

function getSection(id) {
  var langCache = cache[currentLang];
  if (!langCache[id]) {
    var raw = getContent()[id];
    if (!raw) return '<p style="color:var(--text-dim)">' +
      (currentLang === 'bos' ? 'Sekcija nije prona\u0111ena.' : 'Section not found.') + '</p>';
    langCache[id] = wrapTables(renderMd(raw));
  }
  return langCache[id];
}

// ── Sub-anchor scrolling target ──
var pendingScroll = null;

// ── Nav rendering ──
function renderNav() {
  var navData = currentLang === 'bos' ? NAV_BOS : NAV_EN;
  var nav = document.getElementById('nav');
  var weekLabel = navData.weekLabel || 'Week';
  var dayNames = currentLang === 'bos' ? DAY_NAMES_BOS : DAY_NAMES_EN;
  var dayFull = currentLang === 'bos' ? DAY_FULL_BOS : DAY_FULL_EN;
  var html = '';
  navData.groups.forEach(function(g) {
    html += '<div class="nav-divider">' + g.label + '</div>';
    g.items.forEach(function(item) {
      if (item.weeks) {
        // Expandable phase item
        html += '<div class="nav-parent">';
        html += '<a href="#' + item.id + '" class="nav-phase-link"><span class="nav-icon">' + item.icon + '</span>' + item.text + '</a>';
        html += '<button class="nav-expand" data-target="sub-' + item.id + '" aria-label="Expand">&#9654;</button>';
        html += '<div class="nav-sub" id="sub-' + item.id + '">';
        item.weeks.forEach(function(w) {
          html += '<a href="#' + item.id + ':week-' + w + '" class="nav-week-link">' + weekLabel + ' ' + w + '</a>';
          html += '<div class="nav-day-row" data-week="' + w + '" data-phase="' + item.id + '">';
          dayNames.forEach(function(d, di) {
            html += '<button class="nav-day-btn" data-phase="' + item.id + '" data-day="' + dayFull[di] + '" data-week="' + w + '">' + d + '</button>';
          });
          html += '</div>';
        });
        html += '</div></div>';
      } else {
        html += '<a href="#' + item.id + '"><span class="nav-icon">' + item.icon + '</span>' + item.text + '</a>';
      }
    });
  });
  nav.innerHTML = html;

  // Expand/collapse handlers
  nav.querySelectorAll('.nav-expand').forEach(function(btn) {
    btn.addEventListener('click', function(e) {
      e.stopPropagation();
      var target = document.getElementById(btn.getAttribute('data-target'));
      if (target) {
        target.classList.toggle('open');
        btn.classList.toggle('open');
      }
    });
  });

  // Week link handlers
  nav.querySelectorAll('.nav-week-link').forEach(function(a) {
    a.addEventListener('click', function(e) {
      e.preventDefault();
      var parts = a.getAttribute('href').slice(1).split(':');
      var sectionId = parts[0];
      var anchor = parts[1];
      closeMenu();
      location.hash = sectionId;
      pendingScroll = anchor;
      setTimeout(renderCurrent, 20);
    });
  });

  // Day button handlers
  nav.querySelectorAll('.nav-day-btn').forEach(function(btn) {
    btn.addEventListener('click', function() {
      var phaseId = btn.getAttribute('data-phase');
      var dayName = btn.getAttribute('data-day');
      var weekNum = btn.getAttribute('data-week');
      closeMenu();
      location.hash = phaseId;
      pendingScroll = 'day-' + dayName.toLowerCase() + '-week-' + weekNum;
      setTimeout(renderCurrent, 20);
    });
  });

  // Regular nav links
  nav.querySelectorAll('a:not(.nav-week-link)').forEach(function(a) {
    a.addEventListener('click', function() {
      closeMenu();
      pendingScroll = null;
      setTimeout(renderCurrent, 20);
    });
  });

  document.getElementById('brand-text').childNodes[0].textContent = navData.logo + '\n';
  var daysLeft = Math.ceil((FIGHT_DATE - new Date()) / 86400000);
  if (daysLeft > 0) {
    document.getElementById('brand-subtitle').textContent = currentLang === 'bos'
      ? daysLeft + ' dana do borbe'
      : daysLeft + ' days to fight';
  } else {
    document.getElementById('brand-subtitle').textContent = currentLang === 'bos' ? 'Dan borbe!' : 'Fight day!';
  }
  document.getElementById('dl-text').textContent = currentLang === 'bos' ? 'Preuzmi Excel Tracker' : 'Download Excel Tracker';
  // Highlight current phase in nav
  var currentPhaseIdx = getCurrentPhase();
  var currentPhaseId = PHASES[currentPhaseIdx].id;
  nav.querySelectorAll('.nav-phase-link').forEach(function(a) {
    if (a.getAttribute('href') === '#' + currentPhaseId) {
      a.classList.add('nav-phase-current');
    }
  });
  // Auto-expand current phase
  var currentSub = document.getElementById('sub-' + currentPhaseId);
  if (currentSub) {
    currentSub.classList.add('open');
    var expandBtn = nav.querySelector('[data-target="sub-' + currentPhaseId + '"]');
    if (expandBtn) expandBtn.classList.add('open');
  }
}

// ── Language switch ──
function setLang(lang) {
  currentLang = lang;
  document.getElementById('btn-en').classList.toggle('active', lang === 'en');
  document.getElementById('btn-bos').classList.toggle('active', lang === 'bos');
  document.getElementById('lang-toggle').classList.toggle('bos', lang === 'bos');
  document.documentElement.lang = lang === 'bos' ? 'bs' : 'en';
  try { localStorage.setItem('mma-lang', lang); } catch(e) {}
  renderNav();
  renderCurrent();
}

// ── Phase Detection ──
function getCurrentPhase() {
  var now = new Date();
  for (var i = 0; i < PHASES.length; i++) {
    var start = new Date(PHASES[i].start);
    var end = new Date(PHASES[i].end + 'T23:59:59');
    if (now >= start && now <= end) return i;
  }
  if (now < new Date(PHASES[0].start)) return 0;
  return PHASES.length - 1;
}

// ── Countdown Widget ──
function renderCountdown(container) {
  var now = new Date();
  var diff = FIGHT_DATE - now;
  if (diff < 0) diff = 0;
  var days = Math.floor(diff / 86400000);
  var hours = Math.floor((diff % 86400000) / 3600000);
  var mins = Math.floor((diff % 3600000) / 60000);
  var secs = Math.floor((diff % 60000) / 1000);
  var labels = currentLang === 'bos'
    ? ['Dana', 'Sati', 'Minuta', 'Sekundi']
    : ['Days', 'Hours', 'Minutes', 'Seconds'];
  if (diff <= 0) {
    container.innerHTML = '<div class="fc-countdown"><div class="fc-countdown-unit" style="grid-column:1/-1"><div class="fc-countdown-num" style="color:var(--green)">' +
      (currentLang === 'bos' ? 'DAN BORBE!' : 'FIGHT DAY!') + '</div></div></div>';
    return;
  }
  container.innerHTML = '<div class="fc-countdown">' +
    [days,hours,mins,secs].map(function(v,i) {
      return '<div class="fc-countdown-unit"><div class="fc-countdown-num">' +
        v + '</div><div class="fc-countdown-label">' + labels[i] + '</div></div>';
    }).join('') + '</div>';
}

// ── Weight Widget ──
function renderWeightWidget(container) {
  var stored = null;
  try { stored = JSON.parse(localStorage.getItem('fc-weight-log') || '[]'); } catch(e) { stored = []; }
  var currentWeight = stored.length > 0 ? stored[stored.length-1].kg : START_WEIGHT;
  var totalCut = START_WEIGHT - TARGET_WEIGHT;
  var cutSoFar = START_WEIGHT - currentWeight;
  var pct = Math.min(100, Math.max(0, (cutSoFar / totalCut) * 100));
  var lbl = currentLang === 'bos'
    ? { current: 'Trenutna', target: 'Cilj', update: 'A\u017Euriraj', start: 'Start', remaining: 'Preostalo' }
    : { current: 'Current', target: 'Target', update: 'Update', start: 'Start', remaining: 'Remaining' };
  container.innerHTML =
    '<div class="fc-weight">' +
      '<div class="fc-weight-bar-track"><div class="fc-weight-bar-fill" style="width:' + pct + '%"></div></div>' +
      '<div class="fc-weight-labels">' +
        '<span>' + lbl.start + ': ' + START_WEIGHT + ' kg</span>' +
        '<span class="fc-weight-current">' + lbl.current + ': ' + currentWeight.toFixed(1) + ' kg (' + lbl.remaining + ': ' + (currentWeight - TARGET_WEIGHT).toFixed(1) + ' kg)</span>' +
        '<span>' + lbl.target + ': ' + TARGET_WEIGHT + ' kg</span>' +
      '</div>' +
      '<div class="fc-weight-input">' +
        '<input type="number" id="weight-input" step="0.1" min="70" max="100" placeholder="kg">' +
        '<button onclick="logWeight()">' + lbl.update + '</button>' +
      '</div>' +
    '</div>';
}

function logWeight() {
  var input = document.getElementById('weight-input');
  var val = parseFloat(input.value);
  if (isNaN(val) || val < 60 || val > 120) return;
  var log = [];
  try { log = JSON.parse(localStorage.getItem('fc-weight-log') || '[]'); } catch(e) {}
  log.push({ date: new Date().toISOString().slice(0,10), kg: val });
  try { localStorage.setItem('fc-weight-log', JSON.stringify(log)); } catch(e) {}
  var container = document.getElementById('widget-weight');
  if (container) renderWeightWidget(container);
}

// ── Phase Cards Widget ──
function renderPhaseWidget(container) {
  var current = getCurrentPhase();
  var now = new Date();
  var html = '<div class="fc-phase-cards">';
  PHASES.forEach(function(p, i) {
    var cls = 'fc-phase-card';
    var end = new Date(p.end + 'T23:59:59');
    if (i === current) cls += ' active';
    else if (now > end) cls += ' completed';
    var name = currentLang === 'bos' ? p.bos.name : p.en.name;
    var startD = new Date(p.start);
    var endD = new Date(p.end);
    var dateStr = startD.toLocaleDateString(currentLang === 'bos' ? 'bs' : 'en', {month:'short',day:'numeric'}) +
      ' - ' + endD.toLocaleDateString(currentLang === 'bos' ? 'bs' : 'en', {month:'short',day:'numeric'});
    html += '<a href="#' + p.id + '" class="' + cls + '" style="text-decoration:none;color:inherit">' +
      '<div class="fc-phase-card-name">' + name + '</div>' +
      '<div class="fc-phase-card-dates">' + dateStr + '</div></a>';
  });
  html += '</div>';
  container.innerHTML = html;
}

// ── Today's Training Widget ──
function renderTodayWidget(container) {
  var now = new Date();
  var dayOfWeek = now.getDay();
  var dayNames = currentLang === 'bos'
    ? ['Nedjelja','Ponedjeljak','Utorak','Srijeda','\u010Cetvrtak','Petak','Subota']
    : ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  var rest = currentLang === 'bos' ? 'Dan odmora. Potpuni oporavak.' : 'Rest day. Full recovery.';
  if (dayOfWeek === 0) {
    container.innerHTML = '<div class="fc-today"><div class="fc-today-day">' + dayNames[0] + '</div>' +
      '<div class="fc-today-sessions">' + rest + '</div></div>';
    return;
  }
  var phase = getCurrentPhase();
  var phaseId = PHASES[phase].id;
  var linkText = currentLang === 'bos' ? 'Pogledaj detaljan plan' : 'View detailed plan';
  container.innerHTML = '<div class="fc-today"><div class="fc-today-day">' + dayNames[dayOfWeek] + '</div>' +
    '<div class="fc-today-sessions"><a href="#' + phaseId + '">' + linkText + ' &rarr;</a></div></div>';
}

// ── Master init for dashboard ──
function initDashboardWidgets() {
  var c = document.getElementById('widget-countdown');
  var w = document.getElementById('widget-weight');
  var p = document.getElementById('widget-phase');
  var t = document.getElementById('widget-today');
  if (c) renderCountdown(c);
  if (w) renderWeightWidget(w);
  if (p) renderPhaseWidget(p);
  if (t) renderTodayWidget(t);
}

  if (!raw) return;
  exerciseNames = {};
  // Find all ## headings in exercise-detail markdown
  var lines = raw.split('\n');
  for (var i = 0; i < lines.length; i++) {
    var m = lines[i].match(/^## (.+)/);
    if (m) {
      var name = m[1].trim();
      // Generate slug matching marked.js behavior
      var slug = name.toLowerCase().replace(/[^\w\s-]/g, '').replace(/\s+/g, '-').replace(/-+/g, '-');
      exerciseNames[name.toLowerCase()] = slug;
      // Also store without parenthetical (for Bosnian "Čučanj (Back Squat)" → also index "back squat")
      var paren = name.match(/\(([^)]+)\)/);
      if (paren) {
        exerciseNames[paren[1].toLowerCase()] = slug;
      }
    }
  }
}

function linkExercises(container) {
  buildExerciseMap();
  if (!exerciseNames) return;
  // Find exercise names in table first-column cells
  container.querySelectorAll('td:first-child').forEach(function(td) {
    var text = td.textContent.trim();
    // Strip markdown formatting artifacts
    var cleanText = text.replace(/\*\*/g, '').trim();
    // Check common patterns: "Exercise Name" or "Exercise Name (variant)"
    var baseName = cleanText.split('(')[0].trim().split(' — ')[0].trim();
    var key = baseName.toLowerCase();
    if (exerciseNames[key] || exerciseNames[cleanText.toLowerCase()]) {
      var slug = exerciseNames[key] || exerciseNames[cleanText.toLowerCase()];
      td.querySelectorAll('strong, span').forEach(function(el) {
        if (el.querySelector('.exercise-link')) return;
      });
      if (td.querySelector('.exercise-link')) return;
      var inner = td.innerHTML;
      td.innerHTML = '<span class="exercise-link" data-exercise="' + slug + '">' + inner + '</span>';
    }
  });
  // Click handler for exercise links
  container.querySelectorAll('.exercise-link').forEach(function(el) {
    el.addEventListener('click', function(e) {
      e.preventDefault();
      var slug = el.getAttribute('data-exercise');
      location.hash = 'exercise-detail';
      pendingScroll = slug;
      renderCurrent();
    });
  });
}

// ── Add IDs to week/day headings for scrolling ──
function addScrollAnchors(container) {
  container.querySelectorAll('h1, h2').forEach(function(h) {
    var text = h.textContent.trim();
    // Match "Week X" headings (H1)
    var weekMatch = text.match(/(?:Week|Sedmica)\s+(\d+)/i);
    if (weekMatch && h.tagName === 'H1') {
      h.id = 'week-' + weekMatch[1];
    }
    // Match day headings like "Monday — Week 1" or "Ponedjeljak — Sedmica 1"
    var dayMatch = text.match(/^(Monday|Tuesday|Wednesday|Thursday|Friday|Saturday|Ponedjeljak|Utorak|Srijeda|Četvrtak|Petak|Subota)\s*[—\-]\s*(?:Week|Sedmica)\s*(\d+)/i);
    if (dayMatch) {
      h.id = 'day-' + dayMatch[1].toLowerCase() + '-week-' + dayMatch[2];
    }
  });
}

// ── Collapsible sections ──
function makeCollapsible(container) {
  // Only apply to phase pages, nutrition-plan, and exercise-detail
  var hash = location.hash.slice(1).split(':')[0] || 'dashboard';
  if (hash.indexOf('phase-') !== 0 && hash !== 'nutrition-plan' && hash !== 'exercise-detail') return;

  // Strategy: find heading hierarchy and wrap content between headings
  var nodes = Array.from(container.childNodes);
  var result = document.createDocumentFragment();
  var weekCollapsible = null;
  var dayCollapsible = null;
  var sessionCollapsible = null;
  var currentBody = null;

  function closeSession() {
    if (sessionCollapsible && currentBody) {
      currentBody = dayCollapsible ? dayCollapsible.querySelector('.collapsible-body') : (weekCollapsible ? weekCollapsible.querySelector('.collapsible-body') : null);
    }
    sessionCollapsible = null;
  }
  function closeDay() {
    closeSession();
    if (dayCollapsible && currentBody) {
      currentBody = weekCollapsible ? weekCollapsible.querySelector('.collapsible-body') : null;
    }
    dayCollapsible = null;
  }
  function closeWeek() {
    closeDay();
    weekCollapsible = null;
    currentBody = null;
  }

  function createCollapsible(title, level, tag) {
    var wrapper = document.createElement('div');
    wrapper.className = 'collapsible collapsible-level-' + level;
    var header = document.createElement('div');
    header.className = 'collapsible-header';
    header.innerHTML = '<span class="collapsible-arrow">&#9654;</span>' +
      '<span class="collapsible-title">' + title + '</span>' +
      (tag ? '<span class="collapsible-tag ' + tag + '">' + tag.toUpperCase() + '</span>' : '');
    header.addEventListener('click', function() {
      header.classList.toggle('open');
      var body = wrapper.querySelector('.collapsible-body');
      if (body) body.classList.toggle('open');
    });
    var body = document.createElement('div');
    body.className = 'collapsible-body';
    wrapper.appendChild(header);
    wrapper.appendChild(body);
    return wrapper;
  }

  for (var i = 0; i < nodes.length; i++) {
    var node = nodes[i];
    if (node.nodeType !== 1) {
      if (currentBody) currentBody.appendChild(node);
      else result.appendChild(node);
      continue;
    }

    var tag = node.tagName;
    var text = node.textContent.trim();

    // H1 = Week level heading
    if (tag === 'H1' && /(?:Week|Sedmica)\s+\d/i.test(text)) {
      closeWeek();
      weekCollapsible = createCollapsible(text, 'week', 'week');
      // Auto-open current week
      var weekNum = text.match(/(\d+)/);
      if (weekNum) {
        weekCollapsible.id = 'week-' + weekNum[1];
        // Auto-open week 1 on first visit (or current week based on date)
        var campWeek = Math.ceil((new Date() - CAMP_START) / (7 * 86400000));
        if (parseInt(weekNum[1]) === campWeek || parseInt(weekNum[1]) === 1 && campWeek < 1) {
          weekCollapsible.querySelector('.collapsible-header').classList.add('open');
          weekCollapsible.querySelector('.collapsible-body').classList.add('open');
        }
      }
      currentBody = weekCollapsible.querySelector('.collapsible-body');
      result.appendChild(weekCollapsible);
      continue;
    }

    // H2 = Day level heading (e.g., "Monday — Week 1" or "Tuesday — Week 2")
    if (tag === 'H2' && /(?:Monday|Tuesday|Wednesday|Thursday|Friday|Saturday|Sunday|Ponedjeljak|Utorak|Srijeda|Četvrtak|Petak|Subota|Nedjelja)/i.test(text)) {
      closeDay();
      var dayTag = 'day';
      if (/Sunday|Nedjelja/i.test(text)) dayTag = 'rest';
      dayCollapsible = createCollapsible(text, 'day', dayTag);
      // Set scroll anchor ID
      var dayMatch = text.match(/^(\w+)\s*[—\-]\s*(?:Week|Sedmica)\s*(\d+)/i);
      if (dayMatch) {
        dayCollapsible.id = 'day-' + dayMatch[1].toLowerCase() + '-week-' + dayMatch[2];
      }
      currentBody = dayCollapsible.querySelector('.collapsible-body');
      if (weekCollapsible) {
        weekCollapsible.querySelector('.collapsible-body').appendChild(dayCollapsible);
      } else {
        result.appendChild(dayCollapsible);
      }
      continue;
    }

    // H3 = Session level (e.g., "AM — Strength: Upper Push/Pull" or "PM — MMA Striking")
    if (tag === 'H3' && dayCollapsible && /(?:AM|PM|Jutro|Popodne|Večer)/i.test(text)) {
      closeSession();
      var sessionTag = /AM|Jutro/i.test(text) ? 'am' : 'pm';
      sessionCollapsible = createCollapsible(text, 'session', sessionTag);
      currentBody = sessionCollapsible.querySelector('.collapsible-body');
      dayCollapsible.querySelector('.collapsible-body').appendChild(sessionCollapsible);
      continue;
    }

    // H2 in exercise-detail or nutrition-plan = collapsible section
    if (tag === 'H2' && (hash === 'exercise-detail' || hash === 'nutrition-plan')) {
      closeWeek();
      var sectionTag = hash === 'nutrition-plan' ? '' : '';
      weekCollapsible = createCollapsible(text, 'week', '');
      // Preserve heading ID for exercise linking
      if (node.id) weekCollapsible.id = node.id;
      currentBody = weekCollapsible.querySelector('.collapsible-body');
      result.appendChild(weekCollapsible);
      continue;
    }

    // Everything else goes to current body
    if (currentBody) {
      currentBody.appendChild(node);
    } else {
      result.appendChild(node);
    }
  }

  container.innerHTML = '';
  container.appendChild(result);
}

// ── Exercise SVG Illustrations ──
// Minimalist stick-figure exercise diagrams showing start & end positions.
// Each entry: [startPoseSVG, endPoseSVG] or single pose for isometric holds.
// Figure is drawn in a 120x140 viewBox. Colors use CSS variables.

function svgWrap(inner) {
  return '<svg viewBox="0 0 120 140" xmlns="http://www.w3.org/2000/svg">' +
    '<style>line,polyline,path{stroke:#f97316;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round;fill:none}' +
    'circle{fill:#f97316}.eq{stroke:#62627a;stroke-width:2;fill:none}.plate{fill:#3b82f6;opacity:.6}' +
    '.ground{stroke:#28283a;stroke-width:1.5}.muscle{fill:rgba(249,115,22,.12);stroke:none}' +
    'text{fill:#62627a;font-size:8px;font-family:sans-serif;text-anchor:middle}</style>' + inner + '</svg>';
}

// Reusable parts: head, torso, limbs
function head(x,y){return '<circle cx="'+x+'" cy="'+y+'" r="7"/>';}
function torso(x1,y1,x2,y2){return '<line x1="'+x1+'" y1="'+y1+'" x2="'+x2+'" y2="'+y2+'"/>';}
function limb(pts){return '<polyline points="'+pts+'"/>';}
function bar(x1,y1,x2,y2){return '<line class="eq" x1="'+x1+'" y1="'+y1+'" x2="'+x2+'" y2="'+y2+'"/>';}
function plate(x,y,w,h){return '<rect class="plate" x="'+x+'" y="'+y+'" width="'+w+'" height="'+h+'" rx="1"/>';}
function ground(y){return '<line class="ground" x1="10" y1="'+y+'" x2="110" y2="'+y+'"/>';}
function kb(x,y){return '<circle class="eq" cx="'+x+'" cy="'+y+'" r="6"/><path class="eq" d="M'+(x-3)+','+(y-6)+' Q'+x+','+(y-14)+' '+(x+3)+','+(y-6)+'"/>';}
function db(x,y,a){
  a=a||0;
  var r=a*Math.PI/180;var dx=Math.cos(r)*8;var dy=Math.sin(r)*8;
  return '<line class="eq" x1="'+(x-dx)+'" y1="'+(y-dy)+'" x2="'+(x+dx)+'" y2="'+(y+dy)+'"/>'+
    '<rect class="plate" x="'+(x-dx-3)+'" y="'+(y-dy-2)+'" width="6" height="4" rx="1" transform="rotate('+a+','+(x-dx)+','+(y-dy)+')"/>'+
    '<rect class="plate" x="'+(x+dx-3)+'" y="'+(y+dy-2)+'" width="6" height="4" rx="1" transform="rotate('+a+','+(x+dx)+','+(y+dy)+')"/>';
}
function arrow(x1,y1,x2,y2){
  return '<line x1="'+x1+'" y1="'+y1+'" x2="'+x2+'" y2="'+y2+'" style="stroke:#22c55e;stroke-width:1.5;stroke-dasharray:3,2"/>'+
    '<polygon points="'+(x2-3)+','+(y2-3)+' '+x2+','+y2+' '+(x2+3)+','+(y2-3)+'" style="fill:#22c55e;stroke:none"/>';
}
function label(x,y,t){return '<text x="'+x+'" y="'+y+'">'+t+'</text>';}

// Inject SVG illustrations into exercise collapsible sections
function injectExerciseSVGs(container) {
  var hash = location.hash.slice(1).split(':')[0] || 'dashboard';
  if (hash !== 'exercise-detail') return;

  container.querySelectorAll('.collapsible-level-week').forEach(function(col) {
    var slug = col.id;
    if (!slug) return;
    var svgs = EXERCISE_SVGS[slug];
    if (!svgs) return;

    var body = col.querySelector('.collapsible-body');
    if (!body) return;

    var wrap = document.createElement('div');
    wrap.className = 'exercise-svg-wrap';

    if (Array.isArray(svgs)) {
      for (var i = 0; i < svgs.length; i++) {
        var fig = document.createElement('div');
        fig.innerHTML = svgs[i];
        wrap.appendChild(fig);
      }
    } else {
      var fig = document.createElement('div');
      fig.innerHTML = svgs;
      wrap.appendChild(fig);
    }

    body.insertBefore(wrap, body.firstChild);
  });
}

// ── Routing ──
function renderCurrent() {
  var hash = location.hash.slice(1) || 'dashboard';
  // Handle phase:week-N style anchors
  var parts = hash.split(':');
  var id = parts[0];
  if (parts.length > 1 && !pendingScroll) {
    pendingScroll = parts[1];
  }
  if (SECTIONS.indexOf(id) === -1) id = 'dashboard';
  var page = document.getElementById('page');
  page.innerHTML = getSection(id);
  addTableLabels(page);
  addScrollAnchors(page);
  // Link exercises in phase pages
  if (id.indexOf('phase-') === 0) {
    linkExercises(page);
  }
  // Make sections collapsible
  makeCollapsible(page);
  injectExerciseSVGs(page);
  page.style.animation = 'none';
  void page.offsetHeight;
  page.style.animation = '';
  updateNav(id);
  updateProgress(id);
  // Dashboard widgets
  clearInterval(countdownInterval);
  if (id === 'dashboard') {
    initDashboardWidgets();
    countdownInterval = setInterval(function() {
      var c = document.getElementById('widget-countdown');
      if (c) renderCountdown(c);
    }, 1000);
  }
  // Handle sub-anchor scrolling
  if (pendingScroll) {
    var scrollTarget = pendingScroll;
    pendingScroll = null;
    setTimeout(function() {
      var target = document.getElementById(scrollTarget);
      if (target) {
        // Auto-open all parent collapsibles
        var el = target;
        while (el && el !== page) {
          if (el.classList && el.classList.contains('collapsible')) {
            var h = el.querySelector('.collapsible-header');
            var b = el.querySelector('.collapsible-body');
            if (h && !h.classList.contains('open')) h.classList.add('open');
            if (b && !b.classList.contains('open')) b.classList.add('open');
          }
          el = el.parentElement;
        }
        // If target itself is a collapsible, open it
        if (target.classList && target.classList.contains('collapsible')) {
          var th = target.querySelector('.collapsible-header');
          var tb = target.querySelector('.collapsible-body');
          if (th && !th.classList.contains('open')) th.classList.add('open');
          if (tb && !tb.classList.contains('open')) tb.classList.add('open');
        }
        target.scrollIntoView({ behavior: 'smooth', block: 'start' });
      }
    }, 150);
  } else {
    window.scrollTo({ top: 0 });
  }
}

function updateNav(id) {
  document.querySelectorAll('#nav a').forEach(function(a) {
    a.classList.toggle('active', a.getAttribute('href') === '#' + id);
  });
}

// ── Mobile menu ──
var hamburger = document.getElementById('hamburger');
var sidebar = document.getElementById('sidebar');
var overlay = document.getElementById('overlay');

function toggleMenu() {
  var open = sidebar.classList.toggle('open');
  overlay.classList.toggle('open', open);
  hamburger.classList.toggle('active', open);
}
function closeMenu() {
  sidebar.classList.remove('open');
  overlay.classList.remove('open');
  hamburger.classList.remove('active');
}
hamburger.addEventListener('click', toggleMenu);
overlay.addEventListener('click', closeMenu);

// ── Back to top ──
var backtop = document.getElementById('backtop');
window.addEventListener('scroll', function() {
  backtop.classList.toggle('visible', window.scrollY > 400);
});
backtop.addEventListener('click', function() {
  window.scrollTo({ top: 0, behavior: 'smooth' });
});

// ── Init ──
var savedLang = 'bos';
try { savedLang = localStorage.getItem('mma-lang') || 'bos'; } catch(e) {}
setLang(savedLang === 'en' ? 'en' : 'bos');
window.addEventListener('hashchange', renderCurrent);

// ── Rest Timer ──
var timerInterval = null;
var timerSeconds = 0;
var timerToggle = document.getElementById('timer-toggle');
var timerPanel = document.getElementById('timer-panel');
var timerDisplay = document.getElementById('timer-display');

timerToggle.addEventListener('click', function() {
  timerPanel.classList.toggle('open');
});

function startTimer(seconds) {
  clearInterval(timerInterval);
  timerSeconds = seconds;
  timerDisplay.className = 'timer-display';
  timerToggle.classList.add('active');
  updateTimerDisplay();
  timerInterval = setInterval(function() {
    timerSeconds--;
    updateTimerDisplay();
    if (timerSeconds <= 5 && timerSeconds > 0) {
      timerDisplay.classList.add('warning');
    }
    if (timerSeconds <= 0) {
      clearInterval(timerInterval);
      timerDisplay.classList.remove('warning');
      timerDisplay.classList.add('done');
      timerDisplay.textContent = 'REST!';
      timerToggle.classList.remove('active');
      // Vibrate if supported
      if (navigator.vibrate) navigator.vibrate([200, 100, 200, 100, 200]);
      // Beep using Web Audio API
      try {
        var ctx = new (window.AudioContext || window.webkitAudioContext)();
        var osc = ctx.createOscillator();
        var gain = ctx.createGain();
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.frequency.value = 800;
        gain.gain.value = 0.3;
        osc.start();
        setTimeout(function(){ osc.stop(); ctx.close(); }, 500);
      } catch(e) {}
    }
  }, 1000);
}

function stopTimer() {
  clearInterval(timerInterval);
  timerSeconds = 0;
  timerDisplay.className = 'timer-display';
  timerDisplay.textContent = '0:00';
  timerToggle.classList.remove('active');
}

function updateTimerDisplay() {
  var m = Math.floor(timerSeconds / 60);
  var s = timerSeconds % 60;
  timerDisplay.textContent = m + ':' + (s < 10 ? '0' : '') + s;
}
