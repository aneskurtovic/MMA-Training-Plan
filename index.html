eadlift | Posterior chain (glutes, hamstrings, erectors), lats, grip | Barbell | Feet hip-width under bar, shins near bar. Hinge at hips, grip just outside knees. Neutral spine, lats engaged. | \"Push the floor away, lock lats, bar drags up the legs. Stand tall — squeeze glutes at lockout.\" | Rounding the lower back, jerking the bar off the floor, hips shooting up first, hyperextending at lockout. | Total-body posterior chain strength for explosive hip extension — the engine behind throws, slams, sprawls, and heavy rear-hand strikes. Grip endurance under load. |\n| Romanian Deadlift (RDL) | Hamstrings, glutes, erectors | Barbell | Stand with bar at hip height (from rack or after a deadlift). Feet hip-width, slight knee bend, shoulders packed. | \"Push hips straight back like closing a car door. Bar stays on the thighs/shins. Feel a deep hamstring stretch, then drive hips forward.\" | Bending the knees too much (turns into a squat), rounding the back, not hinging far enough. | Eccentric hamstring strength reduces knee-injury risk from sprawling and kicking. Hip-hinge patterning powers underhooks-to-trips and mat returns. |\n| Bench Press | Pecs, anterior delts, triceps | Barbell, bench, rack | Lie on bench, eyes under bar. Retract and depress shoulder blades. Grip slightly wider than shoulder-width. Feet flat on floor. | \"Unrack, control bar to lower chest, drive through feet, press bar in a slight arc back over shoulders.\" | Flaring elbows to 90 degrees (shoulder stress), bouncing bar off chest, losing scapular retraction, lifting hips. | Horizontal pressing power for frames, stiff-arms, and bench pressing an opponent off you from bottom position. Tricep strength aids in posting and creating distance. |\n| Overhead Press | Deltoids, triceps, upper traps, core | Barbell, squat rack | Bar in front rack at collarbone. Feet hip-width, glutes and abs braced. | \"Press bar straight up — move your head out of the way, then back through once bar passes. Lock out directly over mid-foot.\" | Excessive back arch (turns into incline press), pressing the bar forward instead of straight up, not bracing core. | Overhead strength for posting on the cage, hand fighting from collar ties, and resisting being driven down in the clinch. Core stability under overhead load mirrors scramble demands. |\n| Barbell Row | Lats, rhomboids, rear delts, biceps, erectors | Barbell | Hinge to roughly 45-degree torso. Overhand or underhand grip just outside knees. Slight knee bend. | \"Pull bar to lower sternum, squeeze shoulder blades at top, control the negative. Torso stays still.\" | Excessive torso movement (rowing with momentum), pulling to the belly, standing too upright. | Pulling strength for clinch work, underhook control, arm drags, and guillotine finishes. Maintains upper-back posture to resist being broken down. |\n| Hang Clean | Quads, glutes, traps, upper back, forearms | Barbell | Start standing with bar at hip height, overhand grip. Hinge slightly to bring bar to just above the knee (hang position). | \"Explode hips, shrug, pull elbows high, catch in front rack with a quarter squat. Stand up.\" | Arm-pulling instead of hip-driving, not getting elbows through fast enough, catching on wrists instead of delts. | Triple extension (ankle-knee-hip) is the same motor pattern as shooting a double-leg or throwing an uppercut. Teaches rate of force development — how fast you can express strength. |\n| Push Press | Deltoids, triceps, quads, glutes, core | Barbell, squat rack | Bar in front rack at collarbone. Feet hip-width. | \"Quick dip (4-6 inches) keeping torso vertical, then drive aggressively through legs and press bar overhead in one motion. Lock out.\" | Dipping forward (weight on toes), pressing before legs finish driving, slow dip killing the stretch-shortening cycle. | Teaches legs-to-arms force transfer — the same kinetic chain used in every punch and in off-balancing an opponent from the clinch. Develops overhead lockout power for cage work. |\n\n---\n\n## 2. Single-Leg / Unilateral\n\n| Exercise | Primary Muscles | Equipment | Setup | Execution Cues | Common Mistakes | MMA Benefit |\n|---|---|---|---|---|---|---|\n| RFESS (Bulgarian Split Squat) | Quads, glutes, adductors | Dumbbells or barbell, bench | Rear foot laces-down on bench behind you. Front foot far enough forward that knee stays over ankle at bottom. | \"Lower straight down until rear knee nearly touches floor. Drive through front heel. Keep torso upright.\" | Front foot too close to bench (knee shoots forward), torso leaning excessively, rear foot bearing too much load. | Single-leg strength and balance for kicking, sprawling off one leg, and maintaining base when an opponent grabs a leg. Reduces bilateral strength imbalances that cause injury. |\n| Single-Leg RDL | Hamstrings, glutes, core (anti-rotation) | Dumbbell or kettlebell | Stand on one leg, soft knee. Hold weight in opposite hand. | \"Hinge at the hip, free leg extends behind you as a counterbalance. Back stays flat. Squeeze glute to stand.\" | Rounding the back, opening the hip (rotating), not hinging deep enough, rushing the movement. | Posterior chain strength on one leg directly transfers to kicking (standing leg stability), single-leg takedown defense, and landing after throwing knees. Anti-rotation demand mirrors the rotational chaos of grappling. |\n| Walking Lunges | Quads, glutes, hip flexors | Dumbbells, barbell, or bodyweight | Stand tall, weights at sides or on back. | \"Take a long step forward, lower rear knee toward floor, drive through front heel to step into the next rep. Stay tall.\" | Short steps (knee over toe), torso collapsing forward, pushing off rear foot instead of pulling with front leg. | Dynamic single-leg strength with a locomotion component — transfers to shooting entries, level changes, and maintaining balance while moving forward in the pocket. |\n| Step-Ups | Quads, glutes | Box (16-20 inches), dumbbells | Place one foot fully on the box. Hold dumbbells at sides. | \"Drive through the top foot to stand on the box. Do NOT push off the bottom foot. Control the descent.\" | Using the bottom foot to push off (cheating), box too low to challenge the movement, leaning forward. | Concentric single-leg power for driving off the mat (standing up from bottom), penetration steps for takedowns, and explosive level changes. |\n| Pistol Squat Progression | Quads, glutes, hip flexors, ankles | Bodyweight (band or box for assistance) | Stand on one leg. Extend the other leg in front of you. Arms forward for counterbalance. | \"Sit back and down on one leg, keeping heel flat. Go as low as mobility allows, then drive up. Use a band or box to assisted versions as needed.\" | Knee collapsing inward, heel lifting, rounding the lower back at the bottom, using momentum to stand. | Ultimate expression of single-leg strength and mobility. Translates to recovering balance after being swept or pushed, deep single-leg positions in scrambles, and demonstrating the mobility fighters need at the hips and ankles. |\n\n---\n\n## 3. Power / Explosive\n\n| Exercise | Primary Muscles | Equipment | Setup | Execution Cues | Common Mistakes | MMA Benefit |\n|---|---|---|---|---|---|---|\n| Box Jumps | Quads, glutes, calves | Plyo box (20-30 inches) | Stand facing box, feet shoulder-width, arms back. | \"Swing arms, extend hips-knees-ankles, land softly on box with full foot contact. Stand tall, step down.\" | Rebounding off the floor (use a reset between reps), landing in a deep squat on the box (means the box is too high), jumping down instead of stepping. | Trains rate of force development and reactive power for explosive takedown entries, sprawls, and closing distance to land strikes. |\n| Broad Jumps | Glutes, quads, hamstrings, calves | Open floor space | Feet shoulder-width, arms loaded behind you. | \"Swing arms forward, drive hips and jump forward for max distance. Absorb landing with soft knees, stick it.\" | Not using the arms, landing stiff-legged, not committing to full hip extension. | Horizontal explosive power — the exact vector used in shooting for takedowns and closing distance for punches. Teaches aggressive hip extension into a target. |\n| Med Ball Overhead Slam | Lats, core, shoulders, triceps | Slam ball (15-30 lbs) | Stand tall, ball overhead with arms extended. | \"Brace core, slam ball into the ground as hard as possible using your whole body. Hinge and follow through. Catch the bounce or pick it up.\" | Using only arms (not engaging core/hips), not following through, too light a ball. | Full-body power expression similar to throwing hammerfists from top position or slamming an opponent in a takedown finish. Teaches aggressive downward force production. |\n| Med Ball Rotational Slam | Obliques, core, hips, shoulders | Slam ball (10-20 lbs), wall | Stand perpendicular to wall, ball at hip opposite the wall. Feet slightly wider than shoulder-width. | \"Rotate hips first, then trunk, then arms — slam ball into wall. Catch and reset. Load from the back hip.\" | Arm-throwing instead of hip-rotating, feet staying flat (rotate on the ball of the back foot), standing too close to the wall. | Directly trains the rotational power sequence of hooks, overhands, and round kicks. Hip-first rotation is the key to fight-ending power in strikes. |\n| Med Ball Chest Pass | Pecs, triceps, anterior delts, core | Med ball (10-20 lbs), wall or partner | Stand facing wall, ball at chest, elbows in. | \"Drive ball off chest explosively into wall, extending arms fully. Catch and immediately redirect. Stay on the balls of your feet.\" | Stepping forward (losing base), lobbing instead of driving, slow catch-and-redirect. | Trains horizontal pushing speed for frames, posting, and bench-pressing an opponent off you. Reactive catch-and-redirect mirrors the speed demands of hand fighting. |\n| KB Swings | Glutes, hamstrings, core, lats | Kettlebell | Feet slightly wider than shoulder-width. KB on floor a foot in front of you. Hike the bell back between legs. | \"Snap hips forward — the arms just go along for the ride. Bell should float to chest/eye height (Russian) or overhead (American). Squeeze glutes hard at the top.\" | Squatting the swing (should be a hinge), using the arms to lift, hyperextending the back at the top. | Powerful hip snap transfers directly to striking power, sprawl speed, and bridging/shrimping in grappling. High-rep swings also build posterior chain endurance for later rounds. |\n| KB Snatch | Glutes, hamstrings, shoulders, traps, core | Kettlebell | Similar to swing start. One hand on the bell. | \"Hike back, snap hips, as the bell rises guide it around your wrist and punch through to lockout overhead. Control the descent by redirecting the bell back between your legs.\" | Bell banging the wrist (path is wrong), pressing out the top instead of punching through, not using the hips. | Combines explosive hip extension with overhead stability and grip — mirrors the full-body power expression of throwing an overhand right or finishing a high-crotch lift. Excellent conditioning effect. |\n| Hang Clean | — | — | — | — | — | See Compound Barbell Lifts section above. |\n| Push Press | — | — | — | — | — | See Compound Barbell Lifts section above. |\n| Battle Rope Slams | Shoulders, core, lats, grip | Battle ropes (1.5-2 inch, 40-50 ft) | Stand in athletic stance, slight hinge, one rope end in each hand. Anchor point ahead. | \"Alternate arms (waves) or slam both together. Generate force from the hips, not just the shoulders. Keep a rhythm — don't let the ropes go slack.\" | Standing too upright (no hip involvement), death-gripping (forearms burn out instantly), standing too close to the anchor (no tension). | Upper-body power-endurance under fatigue — simulates the repeated explosive arm actions of punching in later rounds. Bilateral slams train ground-and-pound power; alternating waves build the shoulder endurance needed for long clinch exchanges. |\n\n---\n\n## 4. Upper Body Accessories\n\n| Exercise | Primary Muscles | Equipment | Setup | Execution Cues | Common Mistakes | MMA Benefit |\n|---|---|---|---|---|---|---|\n| Weighted Pull-Ups | Lats, biceps, rear delts, grip | Pull-up bar, dip belt or dumbbell between feet | Hang from bar, overhand grip slightly wider than shoulders. Add load via belt or dumbbell. | \"Initiate with lats (think elbows to hips), pull chin over bar, control the descent to full extension.\" | Kipping / swinging, not reaching full extension at the bottom, chin not clearing the bar. | Pulling strength is essential for clinch control, guillotines, front headlocks, arm drags, and dragging an opponent down from the cage. Grip under load builds lasting clinch endurance. |\n| Dumbbell Row | Lats, rhomboids, rear delts, biceps | Dumbbell, bench | One knee and hand on bench, opposite foot on floor. Flat back, dumbbell hanging at arm's length. | \"Pull dumbbell to hip, squeezing shoulder blade back and down. Lower under control.\" | Rotating the torso to heave the weight, rowing to the shoulder instead of the hip, rushing reps. | Unilateral pulling strength for single-collar ties, underhook battles, and controlling an arm in guard. Addresses left-right imbalances common in fighters with a dominant stance. |\n| Landmine Press | Chest, shoulders, triceps, core (anti-rotation) | Barbell, landmine attachment (or corner) | Stand in split stance, hold the end of the barbell at shoulder height with one hand. | \"Press the bar up and forward at a slight angle. Squeeze the core to prevent rotation. Control the return.\" | Flaring the elbow, rotating the torso, not bracing the core, pressing straight up instead of along the bar's arc. | The angled pressing path closely mimics a jab and cross. Single-arm execution demands anti-rotation — the same core stability needed when posting off an opponent or framing from bottom. |\n| Incline DB Press | Upper pecs, anterior delts, triceps | Dumbbells, adjustable bench (30-45 degrees) | Sit on incline bench, dumbbells at shoulders, feet flat on floor, back pressed into pad. | \"Press dumbbells up and slightly inward, without clanking them at the top. Lower to shoulders with control.\" | Over-arching the back (reducing the incline angle), flaring elbows, bouncing at the bottom. | Upper chest and shoulder pressing strength for frames from bottom, posting on the cage, and pushing an opponent away. Dumbbell path allows shoulder-friendly range of motion for fighters with existing shoulder wear. |\n| Push-Up — Standard | Pecs, triceps, anterior delts, core | Bodyweight | Hands shoulder-width, body in a straight line from head to heels. | \"Lower chest to the floor, elbows at 45 degrees, press back up. Lock out at top.\" | Sagging hips, flaring elbows to 90 degrees, partial range of motion. | Foundational pressing endurance for maintaining frames, escaping bottom positions, and posting. High-rep capacity means pressing strength that lasts into championship rounds. |\n| Push-Up — Diamond | Triceps, inner chest, core | Bodyweight | Hands together under chest forming a diamond shape with index fingers and thumbs. | \"Keep elbows tight to the body as you lower. Touch chest to hands, press up.\" | Flaring elbows, letting hips sag, reducing range of motion. | Tricep-dominant pressing for short-range pushing — creating frames inside the guard and posting off an opponent's head in scrambles. |\n| Push-Up — Archer | Chest, triceps, core | Bodyweight | Wide hand placement. One arm bends while the other stays extended to the side. | \"Lower toward one hand, keeping the other arm straight as a guide. Push back up. Alternate sides.\" | Rotating the torso, bending the straight arm, shortening the range. | Asymmetric pressing strength for single-arm frames and posts — common in scrambles where only one arm is available for base. Bridges the gap toward one-arm push-up strength. |\n| Push-Up — Clap | Pecs, triceps, fast-twitch fibers | Bodyweight | Standard push-up position. | \"Explode off the floor, clap, land with soft elbows, immediately descend into the next rep.\" | Landing with locked elbows (injury risk), losing body alignment, not achieving full flight. | Upper-body plyometric power for explosive frames and the initial burst of a punch. Trains the stretch-shortening cycle in horizontal pressing — speed kills in striking. |\n| Dips | Triceps, lower chest, anterior delts | Parallel bars or rings | Grip the bars, arms locked, slight forward lean. | \"Lower until upper arms are parallel to floor, press back up to full lockout. Keep elbows tracking over wrists.\" | Going too deep (shoulder stress), excessive forward lean, partial range of motion. | Pressing strength from a depressed shoulder position — directly transfers to posting on the mat, pressing up from bottom, and generating pushing force when pinned against the cage. |\n| Face Pulls | Rear delts, external rotators, mid traps | Cable machine or band | Rope attachment at face height. Step back to create tension. | \"Pull rope to face, splitting hands apart and externally rotating at the end. Squeeze for a beat. Slow return.\" | Pulling too low (becomes a row), using body momentum, not externally rotating at the end position. | Shoulder health and postural balance. Fighters do enormous volumes of pressing and internal rotation (punching, pushing); face pulls counterbalance this to keep shoulders healthy and maintain posture against collar ties. |\n| Band Pull-Aparts | Rear delts, rhomboids, mid traps | Resistance band | Hold band at arm's length in front of chest, hands shoulder-width, palms down. | \"Pull band apart by squeezing shoulder blades together until band touches chest. Slow return.\" | Shrugging shoulders, bending elbows, using momentum. | Scapular health and posture maintenance. Keeps the upper back strong and shoulders balanced against the high volume of punching and reaching in training. Ideal daily-dose prehab movement. |\n\n---\n\n## 5. Core / Anti-Movement\n\n| Exercise | Primary Muscles | Equipment | Setup | Execution Cues | Common Mistakes | MMA Benefit |\n|---|---|---|---|---|---|---|\n| Pallof Press | Obliques, transverse abdominis, hip stabilizers | Cable machine or band | Stand perpendicular to cable, handle at chest. Feet shoulder-width, slight athletic bend. | \"Press handle straight out from chest and hold. Resist the rotation. Return to chest. Keep hips square.\" | Letting the cable rotate you, locking knees, pressing at an angle instead of straight out. | Anti-rotation core stability — the ability to resist being twisted or turned in the clinch, during scrambles, and when absorbing body shots. Directly trains the core's primary fight function: resisting unwanted movement. |\n| Ab Wheel Rollout | Rectus abdominis, obliques, lats, hip flexors | Ab wheel | Kneel on a pad, grip the wheel, arms extended. | \"Roll forward slowly, keeping hips extended (don't sit back). Go as far as you can control, then pull back using your abs.\" | Sagging the lower back, bending at the hips instead of extending, going farther than you can control. | Anti-extension core strength for maintaining posture in the clinch, resisting back bends in wrestling, and stabilizing the spine during strikes. The eccentric challenge mirrors being pulled forward by an opponent. |\n| Hanging Leg Raises | Hip flexors, lower abs, grip | Pull-up bar | Hang from bar with full grip, shoulders packed. | \"Raise legs to parallel (or toes to bar for advanced). Control the descent — no swinging. Initiate from the core, not momentum.\" | Swinging, using momentum, only lifting knees (if full leg raises are the target), losing grip. | Hip flexor strength for guard retention, high kicks, and knee strikes. Grip endurance while performing a core movement mirrors the simultaneous demands of hanging on an opponent while working your core in the clinch. |\n| Copenhagen Plank | Adductors, obliques, core | Bench | Side-lying, top foot on bench, bottom foot hanging. Support on forearm. | \"Lift hips and bottom leg so the body forms a straight line. Hold. The top leg's adductor does the heavy lifting.\" | Rotating hips forward or back, sagging at the hip, holding breath. | Adductor and lateral core strength critical for closed guard, triangle setups, body lock squeezes, and injury prevention during lateral movement and kicking. Groin injuries are common in MMA — this is direct armor. |\n| Dead Bug | Deep core stabilizers, hip flexors | Bodyweight (mat) | Lie on back, arms reaching to ceiling, knees bent at 90 degrees over hips. Press low back into floor. | \"Extend opposite arm and leg toward the floor while keeping the low back glued to the mat. Return and switch sides.\" | Low back arching off the floor, moving too fast, not exhaling fully on extension. | Teaches the core to stabilize the spine while the limbs move independently — exactly what happens when striking, grappling, and transitioning between positions. Foundation for all other core work. |\n| Bird Dog | Erectors, glutes, deep core stabilizers | Bodyweight (mat) | Hands-and-knees position, wrists under shoulders, knees under hips. | \"Extend opposite arm and leg until parallel with the floor. Pause. Return. Keep hips level — no rotation.\" | Rotating the hips, arching the back, rushing through reps, lifting the limbs too high. | Anti-rotation and anti-extension in a quadruped position — directly mimics the demands of maintaining base in turtle position and during scrambles on the mat. Excellent warm-up and prehab movement. |\n| Farmer's Carry | Traps, grip, core (anti-lateral flexion), whole body | Heavy dumbbells or farmer's walk handles | Stand tall with heavy weights at your sides. Shoulders packed, chest up. | \"Walk with short, controlled steps. Stay tall — don't lean. Squeeze the handles hard. Breathe.\" | Leaning to one side, taking long strides, shrugging the shoulders, letting posture break down. | Total-body stability, grip endurance, and postural strength under load. Directly transfers to clinch endurance, maintaining posture while gripping an opponent, and the general full-body tension required in grappling. |\n| Suitcase Carry | Obliques, core (anti-lateral flexion), grip | Heavy dumbbell or kettlebell | Hold a heavy weight in one hand at your side. Stand tall, don't lean toward or away from the load. | \"Walk with controlled steps, resisting the urge to lean toward the loaded side. Stay perfectly upright.\" | Leaning toward the weight, compensating with the opposite hip, shrugging the loaded shoulder. | Unilateral anti-lateral flexion — the ability to resist being pulled to one side. Transfers to single-collar tie defense, resisting an arm drag, and maintaining posture when an opponent pulls one side of your body. |\n| Turkish Get-Up | Shoulders, core, hips, stabilizers (full body) | Kettlebell | Lie on back, press kettlebell up with one arm. Opposite arm and leg angled out for base. | \"Roll to elbow, post on hand, bridge hips, sweep leg under to kneeling, stand up. Reverse the sequence. Eyes on the bell at all times.\" | Rushing the movement, losing visual contact with the bell, skipping the hip bridge, pressing the bell instead of keeping the arm vertical. | The most MMA-specific core exercise. Every phase mimics a grappling transition: bridging from bottom, posting up to an elbow, creating a frame, building base, and standing from the mat — all while stabilizing load overhead (simulating controlling an opponent's limb). |\n\n---\n\n## 6. Prehab / Mobility\n\n| Exercise | Primary Muscles | Equipment | Setup | Execution Cues | Common Mistakes | MMA Benefit |\n|---|---|---|---|---|---|---|\n| Band External Rotations | Infraspinatus, teres minor (rotator cuff) | Light resistance band | Stand with elbow pinned to side at 90 degrees, band attached at elbow height. | \"Rotate forearm outward against band, keeping elbow glued to your ribs. Slow and controlled both directions.\" | Elbow drifting away from the body, using too heavy a band, moving too fast. | Rotator cuff health is non-negotiable for fighters. The shoulder absorbs enormous stress from punching, posting, and being manipulated in grappling. This keeps the external rotators strong enough to balance the dominant internal rotators. |\n| Face Pulls | — | — | — | — | — | See Upper Body Accessories section above. |\n| 90/90 Hip Switches | Hip internal and external rotators, glutes | Bodyweight (mat) | Sit on floor with one leg in front (shin perpendicular, externally rotated) and one behind (shin perpendicular, internally rotated). Both knees at 90 degrees. | \"Rotate both legs to the opposite position in one smooth motion. Keep chest tall. Pause at each end position.\" | Leaning back, using hands excessively, rushing through transitions, knees not staying at 90 degrees. | Hip mobility in both internal and external rotation — essential for guard play, sweeps, hip escapes, and kicking. Fighters with restricted hips compensate with their spine, leading to back injuries. |\n| Hip CARs (Controlled Articular Rotations) | Hip joint (all surrounding musculature) | Bodyweight | On hands and knees (or standing). Lift one knee to the side. | \"Make the largest possible circle with your knee — up, out, back, and around — using only the hip joint. Move slowly and with maximum tension. Reverse direction.\" | Using momentum, moving the spine to fake hip range, rushing, not engaging max tension. | Maintaining full usable hip range of motion. Fighters lose hip mobility over time from tight guards, repeated impact, and heavy squatting. CARs preserve the range needed for high kicks, rubber guard, and deep half guard. |\n| Thoracic Spine Rotations (Open Books) | Thoracic spine rotators, obliques | Bodyweight (mat) | Lie on your side, knees stacked and bent at 90 degrees. Arms extended in front, palms together. | \"Rotate the top arm up and over, opening the chest to the ceiling. Follow the hand with your eyes. Let the thoracic spine rotate — keep knees glued together.\" | Rotating from the lumbar spine (knees separate), not fully opening, rushing. | Thoracic rotation is the engine of punching power and shot defense. Fighters who lose T-spine rotation compensate with the lower back and shoulders, leading to chronic pain. This preserves the rotation needed for hooks, elbows, and looking over the shoulder to defend takedowns. |\n| Goblet Squat | Quads, glutes, core | Kettlebell or dumbbell | Hold weight at chest height, elbows inside knees. Feet shoulder-width, toes slightly out. | \"Sit between your hips, elbows push knees out at the bottom. Chest tall, drive through whole foot.\" | Leaning forward, heels rising, not hitting depth. | Warm-up and movement prep for squatting patterns. Teaches an upright squat position that transfers to posture in the clinch and double-leg finishes. |\n| Glute Bridge | Glutes, hamstrings | Bodyweight or barbell (mat) | Lie on back, knees bent, feet flat on floor hip-width apart. Arms at sides. | \"Drive hips to ceiling by squeezing glutes. Hold for a beat at the top. Lower with control.\" | Hyperextending the lower back, driving through toes instead of heels, not achieving full hip extension. | Hip extension activation for warm-ups. Directly mimics the bridge escape from bottom mount — one of the most fundamental grappling movements. |\n| Band Dislocates | Shoulders, rotator cuff, pecs | Resistance band or PVC pipe | Hold band/pipe with wide overhand grip in front of hips. | \"Keeping arms straight, raise the band overhead and behind your back in a slow arc. Reverse. Widen grip if needed.\" | Bending elbows, going too fast, using too narrow a grip before mobility allows. | Full shoulder range-of-motion warm-up. Prepares the shoulder capsule for pressing and overhead work while counteracting the tight anterior shoulders fighters develop from punching and clinch work. |\n| Scap Push-Ups | Serratus anterior, lower traps | Bodyweight | Standard push-up position with arms locked. | \"Without bending the elbows, protract shoulder blades (push floor away) then retract (let chest sink). Small controlled movement.\" | Bending the elbows (turning it into a push-up), moving too fast, excessive range. | Serratus anterior activation for scapular stability. Protects the shoulder during pressing and posting — especially important for fighters who spend time on their hands in grappling. |\n| PVC Overhead Squat | Shoulders, thoracic spine, hips, ankles | PVC pipe or broomstick | Hold PVC overhead with wide snatch-width grip. Feet shoulder-width. | \"Squat to full depth while keeping the PVC directly overhead and arms locked. Chest tall, heels down.\" | Bar drifting forward, heels lifting, losing thoracic extension, excessive forward lean. | Full-body mobility diagnostic and warm-up. Reveals restrictions in ankles, hips, thoracic spine, and shoulders simultaneously. Builds the overhead stability needed for sprawling with arms extended. |\n| KB Halo | Shoulders, core, upper back | Kettlebell | Stand tall, hold KB by the horns upside-down at chest height. | \"Circle the KB around your head in a smooth arc, keeping it close. Alternate directions each rep. Brace the core.\" | Leaning the torso, moving the head instead of the KB, going too fast. | Shoulder warm-up with rotational demand. Prepares shoulders for pressing while building the circular shoulder mobility needed for clinch pummeling and underhook battles. |\n| Banded Lateral Walk | Glute medius, hip abductors | Mini band | Place band around ankles or just above knees. Quarter-squat athletic stance. | \"Take controlled lateral steps, maintaining tension on the band. Don't let knees cave. Stay low.\" | Standing too upright, letting the trailing leg snap back, knees collapsing inward. | Glute medius activation for lateral movement stability. Strengthens the hip abductors that stabilize the stance during kicks, lateral cage cutting, and single-leg takedown defense. |\n| World's Greatest Stretch | Hip flexors, thoracic spine, hamstrings, groin | Bodyweight | Step into a deep lunge position, place both hands on the floor inside the front foot. | \"Rotate the inside arm up toward the ceiling, opening the chest. Hold 2-3 seconds. Return hand to floor. Straighten front leg for hamstring stretch. Repeat other side.\" | Rushing through positions, not rotating fully, back knee slamming the floor. | The single most efficient dynamic warm-up movement. Addresses hip flexor tightness, thoracic rotation, hamstring length, and groin mobility in one sequence — all areas that take a beating during MMA training. |\n| Wall Ankle Stretch | Soleus, Achilles, anterior tibialis | Wall | Place one foot a few inches from a wall, other foot behind for support. Front knee drives forward toward the wall. | \"Push the knee over the toes toward the wall without the heel lifting. Move the foot farther back to increase difficulty.\" | Heel lifting off the ground, knee collapsing inward, not progressing distance. | Ankle dorsiflexion is required for deep squat positions, shooting levels changes, and absorbing force when moving laterally. Restricted ankles cause compensatory knee and hip issues — common in fighters who skip mobility work. |\n| Band Pull-Aparts | — | — | — | — | — | See Upper Body Accessories section above. |\n| Prone Y/T/W Raises | Lower traps, mid traps, rotator cuff, rear delts | Bodyweight or light dumbbells (2-5 lbs) | Lie face-down on floor or incline bench. Arms hanging. | \"Y: raise arms overhead in a Y-shape, thumbs up. T: raise arms to sides in a T. W: pull elbows down and back into a W, squeezing shoulder blades. Hold each top position for 2 seconds.\" | Using too much weight, shrugging the traps instead of activating lower/mid traps, moving too fast. | Lower and mid trap activation combats the rounded-shoulder posture caused by heavy bag work, grappling, and desk sitting. Healthy scapular mechanics protect the shoulder during armbars, kimuras, and posted landings. |\n\n---\n\n## 7. Grip / Neck\n\n| Exercise | Primary Muscles | Equipment | Setup | Execution Cues | Common Mistakes | MMA Benefit |\n|---|---|---|---|---|---|---|\n| Plate Pinch Holds | Finger flexors, thumb, forearm | Weight plates (two smooth-side-out) | Pinch two plates together (smooth sides out) between fingers and thumb. Stand tall. | \"Squeeze the plates as hard as possible. Hold for time. Keep shoulders level.\" | Using bumper plates (too easy to grip), letting the plates slide, shrugging. | Pinch grip strength for controlling wrists during grappling, maintaining grip on a sweaty opponent, and securing collar ties. The thumb-dominant grip pattern is specific to controlling limbs. |\n| Towel Pull-Ups | Lats, forearms, finger flexors | Pull-up bar, two gym towels | Drape towels over the bar, grip one in each hand. | \"Perform pull-ups while gripping the towels. Squeeze hard — if your grip fails, the set is over.\" | Wrapping towels around the hands (defeats the purpose), kipping, cutting range of motion. | Grip endurance on a thick, pliable surface mimics gripping a gi or controlling a sweaty wrist/ankle. The forearm and finger fatigue is directly transferable to late-round grappling grip. |\n| Fat Grip Rows | Lats, rhomboids, forearms | Barbell or dumbbells, Fat Gripz / thick bar | Attach Fat Gripz to the bar or use a thick-handle bar. Set up for a standard row. | \"Row as normal, but the thick handle forces a much harder grip. Reduce weight by 20-30% compared to normal rows.\" | Using the same weight as regular rows (grip fails before back), squeezing too tentatively. | Thick-bar training builds the open-hand grip strength used in no-gi grappling, where you cannot close your fingers around a collar or sleeve. Stronger hands mean better wrist control and submission defense. |\n| Gi Pull-Ups | Lats, forearms, finger flexors | Pull-up bar, old gi or gi pants | Drape a gi over the pull-up bar. Grip the lapels or fabric. | \"Pull up while gripping the gi material. Vary grip positions — lapel, sleeve, collar. Hold at the top for extra credit.\" | Using thin fabric that tears, wrapping the gi around hands instead of gripping, partial range of motion. | The most sport-specific grip exercise for gi-based grappling. Even in no-gi and MMA, the wrist-and-fabric-type grip endurance transfers to controlling rashguards and maintaining wrist control. |\n| Neck Harness (4-Way) | Sternocleidomastoid, upper traps, neck extensors, lateral flexors | Neck harness, weight plate or loading pin | Attach weight to harness. Perform flexion (chin to chest), extension (look up), and lateral flexion (ear to shoulder) from a seated or standing hinged position. | \"Controlled range of motion through the full movement. 2-second hold at end range. Start very light (5-10 lbs) and add load slowly over weeks.\" | Going too heavy too soon, jerking the weight, hyperextending at end range, skipping warm-up sets. | A strong neck directly reduces concussion risk by limiting rapid head acceleration from strikes. Neck strength also resists guillotines, can openers, and cranks. This is the most injury-preventive exercise a fighter can do. |\n| Band Neck Isometrics | All neck musculature | Resistance band | Loop band around the head (forehead for extension resistance, back of head for flexion resistance, side for lateral). Anchor band at head height. | \"Hold head in a neutral position against the band's pull. 10-20 second holds. Rotate through all four directions.\" | Band too heavy (neck compensates with torso movement), not training all four directions, holding breath. | Low-impact neck strengthening ideal for daily training. Builds isometric neck endurance — the type of strength needed to resist a head-position change in real time when being punched or caught in a front headlock. Safe enough to perform at every session. |\n\n---\n\n## 8. Conditioning Modalities\n\n| Exercise | Primary Muscles | Equipment | Setup | Execution Cues | Common Mistakes | MMA Benefit |\n|---|---|---|---|---|---|---|\n| Assault Bike Intervals | Quads, hamstrings, shoulders, cardiovascular system | Assault / air bike | Adjust seat height so there's a slight bend in the knee at the bottom. Grip the handles. | \"Push and pull with arms, drive with legs. For intervals: all-out effort for the work period, easy spin for rest. Focus on RPM or calories as your target.\" | Sitting too high (hip rocking), arms and legs not coordinated, not going truly all-out during work intervals. | Whole-body energy system training with zero impact. The concurrent arm and leg work mimics the metabolic demand of fighting. Intervals (e.g., 10s on / 20s off) replicate the explosive-burst-then-recover pattern of MMA rounds. |\n| Rowing — 500m Repeats | Legs, back, arms, cardiovascular system | Rowing ergometer (Concept2) | Strap feet in, set damper to 4-6. Start with arms extended, shins vertical. | \"Drive with legs first, then open the hips, then pull handle to sternum. Reverse the order on the recovery. Target consistent split times across repeats.\" | Pulling with the arms first (should be legs-hips-arms), setting damper too high, inconsistent pacing. | Full posterior chain conditioning with a pulling emphasis — balances the push-dominant demands of striking. 500m repeats at race pace build the lactic tolerance needed for scramble-heavy rounds and late takedown battles. |\n| Jump Rope | Calves, shoulders, coordination, cardiovascular system | Speed rope | Hold handles at hip height, elbows tight to body. Stand on balls of feet. | \"Small bounces — just enough to clear the rope. Turn from the wrists, not the shoulders. Stay relaxed.\" | Jumping too high, turning from the elbows, tension in the shoulders, double-bouncing. | Footwork coordination, calf endurance, and rhythm — the foundation of striking movement. Builds the light, bouncy base that allows fighters to maintain distance, change angles, and stay on the balls of their feet for five rounds. |\n| Sled Push / Pull | Quads, glutes, hamstrings, calves, core | Sled, turf or smooth surface | Load the sled. For pushes: hands on high or low handles, lean in. For pulls: attach a strap or rope and face the sled. | \"Push: drive with legs, keep arms extended, stay low. Pull: sit back and row hand-over-hand, or backpedal with the strap over your shoulders.\" | Standing too upright on pushes (losing drive angle), loading too heavy and losing speed, resting between steps. | Zero eccentric load means heavy conditioning without delayed-onset soreness — critical for fighters who need to train skill work the next day. Pushing mimics cage driving; pulling mimics dragging an opponent. Both build leg drive capacity. |\n| Sledgehammer Tire Strikes | Core, shoulders, lats, grip, cardiovascular system | Sledgehammer (10-20 lbs), large tire | Stand in a staggered stance facing the tire, hammer overhead with a slight chop angle. | \"Slide the top hand up during the lift, slide it down to meet the bottom hand during the strike. Rotate hips into each swing. Alternate sides.\" | Gripping too tight (grip fatigue), all arms / no hip rotation, not alternating lead side. | Rotational power-endurance — the ability to throw powerful, hip-driven strikes repeatedly. The tool's weight and deceleration demand mirror the impact absorption of hitting pads or an opponent. Builds fight-specific grip endurance. |\n| Shadow Boxing | Shoulders, core, legs, cardiovascular system | None (gloves optional) | Fight stance, hands up, chin tucked, weight on balls of feet. | \"Throw combinations with intent. Move your feet between combos. Visualize an opponent — don't just wave your hands. Work defense between offense.\" | Dropping the hands, flat-footed movement, no defensive movement between combos, punching with no purpose. | The most specific conditioning modality for striking. Allows technical practice under fatigue. When used in training programs, shadow boxing rounds serve as active recovery while reinforcing technique and ring generalship. |\n| Bag Work | Shoulders, core, legs, arms, cardiovascular system | Heavy bag (70-100 lbs), bag gloves or MMA gloves, hand wraps | Wrap hands, glove up. Set up at punching range from the bag. Fight stance. | \"Throw real combinations — jab-cross-hook, not single shots. Move your head and feet between combos. Hit through the bag, not at it.\" | Standing flat-footed and winging punches, not moving between combos, hitting with bad wrist alignment, going 100% every round without variation. | Full-contact striking conditioning that builds punch endurance, timing, and the ability to maintain technique under fatigue. Programmed in 3-5 minute rounds to match fight timing. The bag's feedback teaches fighters to commit to their shots. |\n| Sprawl-to-Burpee | Full body (hip flexors, quads, chest, shoulders, cardiovascular system) | Bodyweight | Stand in fight stance. | \"Drop into a sprawl (hips to floor, legs back, chest up), immediately pop back to feet, then jump (or skip the jump for speed). Reset stance and repeat.\" | Lazy sprawls (hips stay high — defeats the purpose), not returning to a fight stance, pacing too slow for conditioning effect. | The most MMA-specific bodyweight conditioning movement. Combines takedown defense (the sprawl) with explosive recovery to standing. High-rep sets build the anaerobic endurance to stuff takedowns in the championship rounds when most fights are decided. |\n", "warmups": "# Warm-Up & Cool-Down Protocols\n\n---\n\n## 1. Strength: Upper Body Warm-Up (~10 min)\n\n| Order | Exercise | Duration/Reps | Time | Cue |\n|-------|----------|---------------|------|-----|\n| 1 | Jumping jacks | 30 sec | 0:30 | Light and rhythmic, get blood flowing |\n| 2 | Arm circles (forward + backward) | 15 sec each direction | 1:00 | Full range, gradually increase circle size |\n| 3 | Shoulder CARs | 5 each direction per arm | 2:00 | Slow, controlled, maximal range — fist tight, irradiate tension |\n| 4 | Band pull-aparts | 2 x 15 | 1:30 | Squeeze shoulder blades together, arms straight, chest proud |\n| 5 | Push-up walkouts (inchworms) | 5 reps | 1:30 | Slow walk out to full plank, brief hold, walk hands back |\n| 6 | Thoracic rotations (quadruped) | 5 each side | 1:30 | Hand behind head, rotate to open chest to ceiling, exhale at top |\n| 7 | Light ramp-up set 1 (main lift) | 8 reps @ empty bar / very light | 1:00 | Focus on bar path and setup — no grinding |\n| 8 | Light ramp-up set 2 (main lift) | 5 reps @ ~50% working weight | 1:00 | Increase speed slightly, lock in cues |\n\n**Total: ~10 min**\n\n---\n\n## 2. Strength: Lower Body Warm-Up (~12 min)\n\n| Order | Exercise | Duration/Reps | Time | Cue |\n|-------|----------|---------------|------|-----|\n| 1 | Light jog in place / high knees | 30 sec | 0:30 | Easy pace, wake up the legs |\n| 2 | Hip CARs (standing) | 5 each direction per leg | 2:00 | Slow circles, keep pelvis stable, maximize range |\n| 3 | 90/90 switches | 8 total (4 each side) | 1:30 | Knees at 90 degrees, sit tall, rotate hips smoothly |\n| 4 | Ankle mobility (knee-over-toe rocks) | 10 each side | 1:00 | Heel stays down, drive knee past toes over 2nd/3rd toe |\n| 5 | Bodyweight squats | 10 reps | 1:00 | Full depth, chest up, drive knees out over toes |\n| 6 | Walking lunges | 8 each leg | 1:30 | Long stride, upright torso, back knee grazes floor |\n| 7 | Banded lateral walks | 10 each direction | 1:00 | Band above knees, stay low in half squat, push knees out |\n| 8 | Fire hydrants | 10 each side | 1:00 | Quadruped position, keep core braced, lift knee out to side |\n| 9 | Light ramp-up set 1 (main lift) | 8 reps @ empty bar | 1:00 | Groove the pattern — focus on brace and depth |\n| 10 | Light ramp-up set 2 (main lift) | 5 reps @ ~50% working weight | 1:00 | Controlled descent, strong drive out of the hole |\n\n**Total: ~12 min**\n\n---\n\n## 3. Strength: Power Day Warm-Up (~11 min)\n\n| Order | Exercise | Duration/Reps | Time | Cue |\n|-------|----------|---------------|------|-----|\n| 1 | Jumping jacks | 30 sec | 0:30 | Brisk pace, full arm extension overhead |\n| 2 | High knees | 30 sec | 0:30 | Drive knees to hip height, pump arms |\n| 3 | Leg swings (front-to-back) | 10 each leg | 1:00 | Hold wall for balance, keep standing leg straight |\n| 4 | Leg swings (lateral) | 10 each leg | 1:00 | Cross body and out, controlled swing |\n| 5 | Arm circles + shoulder pass-throughs | 10 each + 10 pass-throughs | 1:00 | Use PVC or band for pass-throughs — wide grip, go slow |\n| 6 | Hip CARs | 3 each direction per leg | 1:30 | Smaller set here — just open up the hips |\n| 7 | Hang clean technique (empty bar) | 2 x 5 reps | 2:00 | Focus on hip hinge, explosive hip extension, high elbows in catch |\n| 8 | Box jump build-up (low box) | 3 reps to low box | 1:00 | Soft landing, full hip extension on takeoff, step down |\n| 9 | Box jump build-up (working height) | 3 reps | 1:00 | Stick the landing, quiet feet, absorb through hips |\n| 10 | Light ramp-up set (main power lift) | 3 reps @ ~50% | 1:00 | Fast and crisp — prime the nervous system |\n\n**Total: ~11 min**\n\n---\n\n## 4. MMA Striking Warm-Up (~10 min)\n\n| Order | Exercise | Duration/Reps | Time | Cue |\n|-------|----------|---------------|------|-----|\n| 1 | Jump rope | 3 min | 3:00 | Stay on balls of feet, light bounce, relaxed shoulders |\n| 2 | Wrist circles | 15 each direction | 0:30 | Interlace fingers, roll smoothly — protect the wrists |\n| 3 | Neck warm-up (nods, rotations, lateral) | 10 each direction | 1:00 | Slow and controlled — never force range, gentle end-range holds |\n| 4 | Arm circles + shoulder rolls | 10 each direction | 0:30 | Loosen up the striking chain from shoulder to fist |\n| 5 | Dynamic hip openers (leg swings, hip circles) | 8 each leg | 1:00 | Prepare for kicks — front-to-back and lateral swings |\n| 6 | Torso rotations (standing) | 10 each side | 0:30 | Feet planted, rotate from thoracic spine, arms relaxed |\n| 7 | Shadow boxing — jab-cross only | 1 min | 1:00 | Light and technical, focus on hand return and stance |\n| 8 | Shadow boxing — add hooks, uppercuts | 1 min | 1:00 | Stay relaxed, snap punches, keep chin tucked |\n| 9 | Shadow boxing — full combos + kicks | 1 min | 1:00 | Put it all together, progressive intensity, move feet |\n\n**Total: ~10 min**\n\n---\n\n## 5. MMA Grappling Warm-Up (~12 min)\n\n| Order | Exercise | Duration/Reps | Time | Cue |\n|-------|----------|---------------|------|-----|\n| 1 | Light jogging / movement on mats | 3 min | 3:00 | Include shuffles, backpedals, sprawl checks — keep it easy |\n| 2 | Neck warm-up (nods, rotations, bridges) | 10 each direction | 1:00 | Gentle — build up bridge height gradually, never force |\n| 3 | Hip escapes / shrimps | 5 each side (down and back) | 1:30 | Drive off the bottom foot, create space, keep elbows tight |\n| 4 | Technical stand-ups | 5 each side | 1:30 | Post on hand, kick leg through, stand to fighting stance |\n| 5 | Granby rolls | 5 each direction | 1:30 | Tuck chin, roll over shoulder, stay compact |\n| 6 | Partner pummeling (if available) | 2 min | 2:00 | Fight for underhooks, stay square, heavy hips |\n| 7 | Partner arm drags (if available) | 5 each side | 1:30 | Grip wrist and tricep, pull across body, angle off |\n\n*Solo alternative for exercises 6-7: replace with forward/backward rolls (5 each) and shot entries (5 each side).*\n\n**Total: ~12 min**\n\n---\n\n## 6. Conditioning / Cardio Warm-Up (~8 min)\n\n| Order | Exercise | Duration/Reps | Time | Cue |\n|-------|----------|---------------|------|-----|\n| 1 | Light movement (walk / easy jog / pedal) | 2 min | 2:00 | Zone 1 effort — conversational pace, loosen up |\n| 2 | Leg swings (front-to-back + lateral) | 8 each direction, each leg | 1:30 | Controlled, progressively bigger swings |\n| 3 | Bodyweight squats | 10 reps | 0:30 | Full depth, open up hips and ankles |\n| 4 | Torso rotations + arm swings | 10 each | 0:30 | Wake up the trunk, stay relaxed |\n| 5 | Progressive build-up on modality — easy | 1 min @ ~50% target intensity | 1:00 | Find your rhythm, smooth technique |\n| 6 | Progressive build-up — moderate | 1 min @ ~70% target intensity | 1:00 | HR climbing, breathing picks up but controlled |\n| 7 | Progressive build-up — near target | 1 min @ ~85-90% target intensity | 1:00 | Approaching working pace, mentally lock in |\n\n**Total: ~8 min**\n\n---\n\n## 7. Cool-Down Protocol (Universal — After Every Session, ~15-20 min)\n\n### Phase 1: Light Movement (5 min)\n\n| Exercise | Duration | Cue |\n|----------|----------|-----|\n| Walking (or easy bike / treadmill) | 3 min | Slow pace, bring heart rate down gradually |\n| Deep breathing (standing or seated) | 2 min | 4-count inhale through nose, 6-count exhale through mouth |\n\n### Phase 2: Static Stretching (5 min — 30 sec holds each)\n\n| Order | Stretch | Duration | Cue |\n|-------|---------|----------|-----|\n| 1 | Standing hamstring stretch (each leg) | 30 sec x 2 | Hinge at hips, flat back, feel stretch behind knee |\n| 2 | Kneeling hip flexor stretch (each side) | 30 sec x 2 | Squeeze glute on back leg, tall torso, push hips forward |\n| 3 | Standing quad stretch (each leg) | 30 sec x 2 | Pull heel to glute, knees together, stand tall |\n| 4 | Doorway / post chest stretch (each side) | 30 sec x 2 | Arm at 90 degrees on wall, lean through, open chest |\n| 5 | Overhead lat stretch (each side) | 30 sec x 2 | Grab overhead surface, sink hips away, feel side/back stretch |\n\n### Phase 3: Foam Rolling (5-10 min)\n\n| Priority Area | Duration | Cue |\n|---------------|----------|-----|\n| Quads / hip flexors | 60-90 sec each leg | Slow rolls, pause on tender spots 10-15 sec |\n| IT band / outer thigh | 60 sec each leg | Roll from hip to knee, go slow — this one is intense |\n| Upper back (thoracic) | 60-90 sec | Arms crossed over chest, roll mid-back, extend over roller |\n| Lats | 60 sec each side | Side-lying, roller in armpit area, roll down to mid-rib |\n| Glutes (lacrosse ball optional) | 60 sec each side | Sit on roller/ball, cross ankle over knee, target deep glute |\n| Calves | 60 sec each leg | Stack legs for pressure, point/flex foot while rolling |\n\n**Total: ~15-20 min**\n\n---\n\n## 8. Mobility Flow (Recovery Days / Week 4 Wednesday PM, ~25 min)\n\n*Perform as a continuous flow. Breathe deeply throughout — exhale into each stretch. No rushing.*\n\n| Order | Position / Exercise | Duration | Cue |\n|-------|---------------------|----------|-----|\n| 1 | Cat-cow (quadruped) | 90 sec (slow reps) | Inhale into extension, exhale into flexion — full spinal wave |\n| 2 | Thread the needle (each side) | 60 sec per side | Reach under and through, follow hand with eyes, feel thoracic rotation |\n| 3 | Open books (side-lying, each side) | 60 sec per side | Knees stacked, top arm opens to ceiling, let gravity pull you open |\n| 4 | 90/90 hip stretch — front leg focus (each side) | 90 sec per side | Both knees at 90, sit tall, hinge forward over front shin |\n| 5 | 90/90 hip stretch — back leg focus (each side) | 60 sec per side | Same setup, lean back slightly, feel inner thigh / hip of back leg |\n| 6 | Pigeon pose (each side) | 90 sec per side | Front shin angled, back leg extended, walk hands forward to deepen |\n| 7 | Frog stretch | 90 sec | Knees wide, hips push back, forearms on floor — go easy at first |\n| 8 | Shoulder CARs (standing) | 60 sec (3 each direction per arm) | Slow and maximal — own every degree of the circle |\n| 9 | Sleeper stretch (each side) | 60 sec per side | Side-lying, bottom arm at 90, gently press hand toward floor for internal rotation |\n| 10 | Supine hamstring stretch (each leg) | 60 sec per side | Use strap or towel, keep leg straight, pull gently toward face |\n| 11 | Ankle mobility (half-kneeling, each side) | 60 sec per side | Drive knee past toes, heel stays down, feel stretch in calf/ankle |\n| 12 | Wrist mobility (quadruped) | 60 sec | Fingers forward, lean in — then fingers back, lean gently — then backs of hands |\n| 13 | Seated spinal twist (each side) | 60 sec per side | Cross leg over, twist toward bent knee, press elbow outside knee |\n| 14 | Child's pose | 90 sec | Arms extended, sink hips to heels, breathe into lower back |\n\n**Total: ~25 min**\n\n---\n\n### Quick Reference: Warm-Up Assignment by Session\n\n| Session Type | Warm-Up Protocol | Time |\n|--------------|------------------|------|\n| Strength: Upper Body | Protocol 1 | ~10 min |\n| Strength: Lower Body | Protocol 2 | ~12 min |\n| Strength: Power Day | Protocol 3 | ~11 min |\n| MMA Striking | Protocol 4 | ~10 min |\n| MMA Grappling | Protocol 5 | ~12 min |\n| Conditioning / Cardio | Protocol 6 | ~8 min |\n| All sessions (post) | Cool-Down Protocol 7 | ~15-20 min |\n| Recovery day | Mobility Flow Protocol 8 | ~25 min |\n", "nutrition": "# MMA Nutrition Framework\n\n**Athlete Profile:** 87-90 kg (88 kg reference weight) | Amateur MMA Fighter\n\n---\n\n## 1. Macro Calculations\n\n**Core Principle:** Protein stays constant every day. Carbs cycle based on training demand. Fat stays relatively stable.\n\n### Per-Kilogram Targets (88 kg)\n\n| Nutrient | g/kg     | Grams | Notes                        |\n|----------|----------|-------|------------------------------|\n| Protein  | 2.1      | 185 g | Constant across all days     |\n| Carbs    | Varies   | —     | Cycled by training volume    |\n| Fat      | ~1.0     | 85-88 g | Minimum for hormonal health |\n\n### Daily Totals by Day Type\n\n| Day Type                  | Protein | Carbs | Fat  | kcal    | Carb g/kg |\n|---------------------------|---------|-------|------|---------|-----------|\n| **Training Day**          | 185 g   | 400 g | 85 g | ~3,100  | 4.5       |\n| **High-Volume Double Day**| 185 g   | 440 g | 88 g | ~3,300* | 5.0       |\n| **Rest Day**              | 185 g   | 264 g | 85 g | ~2,560  | 3.0       |\n\n*\\*Double session days: base intake is ~3,300 kcal + intra-workout carbs bring effective total to ~3,600 kcal.*\n\n### The Math\n\n```\nProtein:  88 kg × 2.1 g/kg = 185 g → 185 × 4 =  740 kcal\nFat:      88 kg × 1.0 g/kg =  85 g →  85 × 9 =  765 kcal\n\nTraining day carbs:    88 × 4.5 = 400 g → 400 × 4 = 1,600 kcal → Total: 3,105 kcal\nDouble day carbs:      88 × 5.0 = 440 g → 440 × 4 = 1,760 kcal → Total: 3,265 kcal + intra\nRest day carbs:        88 × 3.0 = 264 g → 264 × 4 = 1,056 kcal → Total: 2,561 kcal\n```\n\n---\n\n## 2. Meal Timing\n\n### Pre-Training (2-3 hours before)\n\n| Nutrient | Target     | Grams (88 kg) | Goal                              |\n|----------|------------|----------------|------------------------------------|\n| Carbs    | 1-2 g/kg   | 88-176 g       | Top off glycogen                   |\n| Protein  | 0.3-0.4 g/kg | 26-35 g      | Start muscle protein synthesis     |\n| Fat      | Low        | < 15 g         | Speed gastric emptying             |\n\n### Pre-Training Snack (30-60 min before)\n\n- **30-50 g fast-digesting carbs** — banana, white rice cake with honey, sports drink\n- Keep fat and fiber minimal to avoid GI distress during training\n\n### Intra-Workout (double sessions or any session > 90 min)\n\n- **30-60 g carbs per hour** — sports drink, gummy bears, highly branched cyclic dextrin\n- **Electrolytes** — 500-700 mg sodium per liter of fluid\n- Sip continuously; do not chug between rounds\n\n### Post-Training (within 1-2 hours)\n\n| Nutrient | Target       | Grams (88 kg) | Goal                          |\n|----------|--------------|----------------|-------------------------------|\n| Protein  | 0.3-0.5 g/kg | 26-44 g        | Kickstart recovery/MPS        |\n| Carbs    | 1-1.5 g/kg   | 88-132 g       | Replenish glycogen             |\n\n---\n\n## 3. Sample Meal Plans\n\n### Training Day (~3,100 kcal)\n\n| Meal | Time | Food | P | C | F | kcal |\n|------|------|------|---|---|---|------|\n| **Meal 1 — Breakfast** | 7:00 AM | 4 whole eggs scrambled, 2 slices sourdough toast, 1 banana, 1 tbsp butter | 32 g | 65 g | 28 g | 640 |\n| **Meal 2 — Pre-Training** | 11:00 AM | 150 g chicken breast, 250 g white rice (cooked), mixed greens salad, 1 tbsp olive oil | 45 g | 90 g | 18 g | 700 |\n| **Pre-Training Snack** | 12:30 PM | 1 banana + 1 tbsp honey | 1 g | 42 g | 0 g | 170 |\n| **Intra-Training** | 1:00-3:00 PM | 500 ml sports drink + 30 g carb powder | 0 g | 55 g | 0 g | 220 |\n| **Meal 3 — Post-Training** | 3:30 PM | 40 g whey protein, 100 g oats (dry weight), 200 g blueberries, 1 tbsp peanut butter | 45 g | 100 g | 14 g | 710 |\n| **Meal 4 — Dinner** | 7:00 PM | 180 g salmon fillet, 200 g sweet potato, 150 g broccoli, 1 tsp olive oil | 42 g | 50 g | 20 g | 550 |\n| **Meal 5 — Pre-Bed** | 9:30 PM | 200 g Greek yogurt (full fat), 30 g walnuts, 30 g dark chocolate | 20 g | 25 g | 22 g | 380 |\n| **DAILY TOTAL** | | | **185 g** | **427 g** | **102 g** | **~3,370** |\n\n*Adjust portions down slightly on standard training days (reduce rice at Meal 2 or oats at Meal 3 by ~25 g dry) to hit 3,100. The plan above is closer to a moderate-heavy session day. On double days, keep full portions and add a second intra-workout drink.*\n\n### Rest Day (~2,560 kcal)\n\n| Meal | Time | Food | P | C | F | kcal |\n|------|------|------|---|---|---|------|\n| **Meal 1 — Breakfast** | 8:30 AM | 3 whole eggs + 2 egg whites scrambled, 1 slice sourdough, 1/2 avocado, 100 g cherry tomatoes | 35 g | 30 g | 24 g | 480 |\n| **Meal 2 — Lunch** | 12:30 PM | 180 g lean ground beef (93%), 150 g white rice (cooked), roasted vegetables (zucchini, peppers), 1 tsp olive oil | 45 g | 55 g | 18 g | 560 |\n| **Meal 3 — Afternoon** | 4:00 PM | 30 g whey protein, 1 apple, 25 g almonds | 30 g | 35 g | 14 g | 390 |\n| **Meal 4 — Dinner** | 7:00 PM | 150 g chicken thigh (skin removed), 200 g roasted potatoes, large mixed salad, 1 tbsp olive oil dressing | 40 g | 50 g | 20 g | 540 |\n| **Meal 5 — Pre-Bed** | 9:30 PM | 250 g cottage cheese, 15 g honey, 20 g pumpkin seeds | 35 g | 25 g | 10 g | 330 |\n| **DAILY TOTAL** | | | **185 g** | **195 g** | **86 g** | **~2,300** |\n\n*If coming in under the 264 g carb target, add a piece of fruit at Meal 2 and an extra 50 g rice at lunch. Adjust carbs upward with easy additions (bread, rice, fruit) rather than adding fat.*\n\n---\n\n## 4. Hydration Protocol\n\n### Daily Baseline\n\n| Metric | Calculation | Target |\n|--------|-------------|--------|\n| Body weight method | 88 kg × 35-45 ml/kg | **3.1 - 4.0 L per day** |\n\nAim for the higher end on training days and in warm conditions.\n\n### Around Training\n\n| Window | Protocol |\n|--------|----------|\n| **Pre-training** (2 hours before) | 500 ml water, steadily sipped |\n| **During training** | 600-1,200 ml per hour with electrolytes |\n| **Post-training** | Replace 150% of fluid lost (weigh before/after if possible) |\n\n### Electrolyte Targets During Training\n\n- **Sodium:** 500-700 mg per liter of fluid\n- **Potassium:** 150-200 mg per liter\n- Add a pinch of salt to water or use a commercial electrolyte mix\n\n### Monitoring\n\n- **Urine color:** Aim for pale straw yellow. Clear = overhydrated. Dark yellow/amber = dehydrated.\n- Check first thing in the morning — this is your best baseline indicator.\n- If weigh-in shows > 2% body weight loss post-session, increase fluid intake next session.\n\n---\n\n## 5. Supplement Stack\n\n| Supplement | Dose | Timing | Evidence | Key Benefit | Notes |\n|------------|------|--------|----------|-------------|-------|\n| **Creatine Monohydrate** | 5 g/day | Any time (consistency matters) | A-tier | Strength, power output, recovery | No loading phase needed. Take daily including rest days. Mix in water or shake. |\n| **Caffeine** | 3-6 mg/kg (264-528 mg) | 45-60 min pre-training | A-tier | Alertness, power, endurance | **Avoid after 2:00 PM** to protect sleep. Start at lower dose, assess tolerance. Cycle off 1 week/month if desired. |\n| **Whey Protein** | 30-40 g per serving | Post-training or any meal gap | A-tier | Convenient complete protein | Use to hit daily 185 g target. Not a replacement for whole food protein. |\n| **Electrolytes** | 500-700 mg sodium/L | During training > 60 min | A-tier | Prevent cramping, maintain output | Commercial mix or DIY (1/4 tsp salt + water + squeeze of lemon). |\n| **Vitamin D3** | 3,000-5,000 IU/day | With a fat-containing meal | A-tier | Immune function, bone health, recovery | Get blood levels tested; target 40-60 ng/ml. Higher dose in winter / low sun. |\n| **Magnesium Glycinate** | 400-500 mg/day | Split AM/PM; prioritize before bed | B-tier | Sleep quality, muscle relaxation, recovery | Glycinate form is best absorbed and least likely to cause GI issues. |\n| **Omega-3 (EPA/DHA)** | 2-3 g combined EPA+DHA/day | With meals (split across 2 meals) | A-tier | Anti-inflammatory, joint health, brain function | Look for high-concentration fish oil. Keep refrigerated. |\n| **Beta-Alanine** | 3-6 g/day | Split into 2-3 doses (reduces tingling) | B-tier | Buffers lactic acid in 1-4 min efforts | Optional. Most useful for high-rep grappling rounds. Tingling (paresthesia) is harmless. |\n\n---\n\n## 6. Grocery List\n\n### Proteins\n- Chicken breast (boneless, skinless)\n- Chicken thighs (skin-on for rest days)\n- Salmon fillets\n- Lean ground beef (93% lean)\n- Whole eggs (free range)\n- Cottage cheese\n- Greek yogurt (full fat)\n- Whey protein powder\n\n### Carbohydrates\n- White rice (jasmine or basmati)\n- Oats (rolled or quick)\n- Sweet potatoes\n- White potatoes\n- Sourdough bread\n- Pasta (for variety)\n\n### Fats\n- Extra virgin olive oil\n- Butter\n- Avocados\n- Almonds\n- Walnuts\n- Pumpkin seeds\n- Natural peanut butter\n- Dark chocolate (70%+)\n\n### Vegetables\n- Broccoli\n- Spinach / mixed greens\n- Zucchini\n- Bell peppers\n- Cherry tomatoes\n- Onions\n- Garlic\n\n### Fruits\n- Bananas\n- Blueberries\n- Apples\n- Lemons / limes\n\n### Pantry Staples\n- Honey\n- Salt (sea salt or iodized)\n- Black pepper\n- Spice basics (paprika, cumin, garlic powder)\n- Soy sauce or coconut aminos\n- Rice vinegar\n- Coffee (ground or beans)\n\n### Supplements\n- Creatine monohydrate (unflavored powder)\n- Whey protein (chocolate or vanilla)\n- Fish oil capsules (high EPA/DHA)\n- Vitamin D3 softgels\n- Magnesium glycinate capsules\n- Electrolyte mix or sodium tablets\n- Caffeine (coffee or capsules)\n- Beta-alanine powder (optional)\n\n---\n\n## 7. Quick-Reference Daily Checklists\n\n### Training Day\n\n- [ ] Hit protein target: 185 g across all meals\n- [ ] Hit carb target: ~400 g (scale up to 440 g on double days)\n- [ ] Pre-training meal 2-3 hours before: carbs + protein, low fat\n- [ ] Pre-training snack 30-60 min before: banana or fast carbs\n- [ ] Intra-workout drink if session > 90 min: carbs + electrolytes\n- [ ] Post-training meal within 1-2 hours: protein + carbs\n- [ ] Water intake: 3.5-4.0 L total (more in heat)\n- [ ] 500 ml water in 2 hours before training\n- [ ] 600-1,200 ml/hour during training with electrolytes\n- [ ] Creatine: 5 g taken\n- [ ] Caffeine: taken 45-60 min pre-training, not after 2 PM\n- [ ] Omega-3 with a meal\n- [ ] Vitamin D with a fat-containing meal\n- [ ] Magnesium before bed\n- [ ] Pre-bed protein source (casein-rich: cottage cheese, Greek yogurt)\n\n### Rest Day\n\n- [ ] Hit protein target: 185 g across all meals\n- [ ] Hit carb target: ~264 g (lower than training days)\n- [ ] Keep fat at ~85 g (slightly higher-fat protein sources are fine)\n- [ ] Eat 4-5 meals spaced 3-4 hours apart\n- [ ] Water intake: 3.0-3.5 L minimum\n- [ ] Creatine: 5 g taken (do not skip on rest days)\n- [ ] No caffeine after 2 PM (or skip entirely for tolerance reset)\n- [ ] Omega-3 with a meal\n- [ ] Vitamin D with a fat-containing meal\n- [ ] Magnesium before bed\n- [ ] Pre-bed protein source\n- [ ] Prioritize whole foods over shakes today\n", "testing": "# Conditioning & Fitness Testing Protocol\n\n## Week 0 — Baseline Testing Protocol\n\n### When to Test\n\n- Schedule testing **2–3 days before Week 1 begins** (e.g., if Week 1 starts Monday, test on the prior Thursday or Friday).\n- Avoid testing the day before training starts — allow at least one full rest day between testing and Week 1 Day 1.\n- If splitting across two days, do cardiovascular + muscular endurance on Day 1, strength + MMA-specific on Day 2.\n- Record the exact date, time of day, and conditions (fasted/fed, sleep quality, etc.) so you can replicate them at re-test.\n\n### Warm-Up Protocol\n\nPerform this warm-up before each testing session (approximately 10 minutes):\n\n1. **5 min easy cardio** — row, bike, or jog at conversational pace\n2. **Joint circles** — ankles, knees, hips, shoulders, wrists (10 each direction)\n3. **Dynamic stretches** — leg swings (10/side), hip circles (10/side), arm circles (10/side), inchworms (5)\n4. **Movement prep** — 5 bodyweight squats, 5 push-ups, 5 pull-apart band pulls\n\nFor strength tests, add 2–3 progressive warm-up sets before working sets (e.g., empty bar → 50% → 70% → 85% → 3RM attempt).\n\n### Order of Tests\n\nRun tests from **least fatiguing to most fatiguing** to avoid one test skewing the next. The recommended order below groups tests logically and minimizes interference.\n\n**Rest between tests:** 3–5 minutes between tests within a category, 5–10 minutes between categories.\n\n---\n\n### Test Battery\n\n#### Cardiovascular\n\n| # | Test | Protocol | What It Measures | Target / Benchmark |\n|---|------|----------|------------------|--------------------|\n| 1 | Resting Heart Rate | Measure on waking (before standing), 3 consecutive mornings, record average | Aerobic base / cardiac efficiency | < 60 bpm (well-trained); < 50 bpm (elite) |\n| 2 | 2 km Row or Run | Time trial — all-out effort. Record finish time, HR at finish, and HR 1 min post-finish | Aerobic capacity (VO2max proxy) | Row: < 7:30 (good), < 7:00 (excellent). Run: < 8:30 (good), < 8:00 (excellent) |\n| 3 | 5-min Assault Bike | Max calories in 5 minutes. Record total cals and average HR | Anaerobic capacity + sustained power | > 75 cal (good), > 90 cal (excellent) |\n\n#### Strength\n\n| # | Test | Protocol | What It Measures | Target / Benchmark |\n|---|------|----------|------------------|--------------------|\n| 4 | Est. 1RM Back Squat | Warm up progressively, work up to a heavy 3RM. Calculate 1RM using Epley formula | Lower body maximal strength | 1.5× bodyweight (good), 2× (excellent) |\n| 5 | Est. 1RM Bench Press | Warm up progressively, work up to a heavy 3RM. Calculate 1RM using Epley formula | Upper body pressing strength | 1× bodyweight (good), 1.25× (excellent) |\n| 6 | Est. 1RM Deadlift | Warm up progressively, work up to a heavy 3RM. Calculate 1RM using Epley formula | Posterior chain maximal strength | 2× bodyweight (good), 2.5× (excellent) |\n| 7 | Max Strict Pull-Ups | Dead hang start, chin over bar, full extension at bottom. No kipping or swinging. Count total reps until failure | Upper body pulling strength-endurance | 10+ (good), 15+ (excellent), 20+ (elite) |\n\n#### Muscular Endurance\n\n| # | Test | Protocol | What It Measures | Target / Benchmark |\n|---|------|----------|------------------|--------------------|\n| 8 | Max Push-Ups in 2 min | Continuous — chest must touch floor, full lockout at top. Pausing in the up position is allowed. Stop at 2:00 | Upper body endurance | 50+ (good), 70+ (excellent) |\n| 9 | Max Plank Hold | Forearm plank, elbows under shoulders, body in straight line. Time stops when hips sag or rise > 2 inches | Core endurance / anti-extension | 2:00+ (good), 3:00+ (excellent) |\n\n#### MMA-Specific\n\n| # | Test | Protocol | What It Measures | Target / Benchmark |\n|---|------|----------|------------------|--------------------|\n| 10 | 3-min Sprawl Test | Set a 3-minute timer. Perform max sprawls (standing → chest to floor → return to stance). Count total reps | Takedown defense endurance / anaerobic capacity | 30+ (good), 40+ (excellent) |\n| 11 | Ground-to-Standing Transitions | Set a 2-minute timer. Start standing → lie flat on back → perform a technical stand-up → repeat. Count total reps | Scramble ability / MMA-specific endurance | 15+ (good), 20+ (excellent) |\n\n#### Body Composition\n\n| # | Test | Protocol | What It Measures | Target / Benchmark |\n|---|------|----------|------------------|--------------------|\n| 12 | Bodyweight | Fasted, morning, after using the bathroom. Same scale each time | Body mass | Track change, not absolute |\n| 13 | Waist Circumference | Measure at navel level, relaxed (not sucking in). Use a cloth tape measure | Central body composition proxy | Track change, not absolute |\n\n---\n\n### Recording Template\n\n| # | Test | Week 0 Result | Week 5 Re-Test | Change | Notes |\n|---|------|---------------|----------------|--------|-------|\n| 1 | Resting Heart Rate (bpm) | | | | 3-day avg |\n| 2 | 2 km Row/Run (time) | | | | HR at finish: ___ / 1-min recovery HR: ___ |\n| 3 | 5-min Assault Bike (cals) | | | | Avg HR: ___ |\n| 4 | Back Squat 3RM → Est. 1RM | | | | 3RM weight: ___ |\n| 5 | Bench Press 3RM → Est. 1RM | | | | 3RM weight: ___ |\n| 6 | Deadlift 3RM → Est. 1RM | | | | 3RM weight: ___ |\n| 7 | Max Strict Pull-Ups | | | | |\n| 8 | Max Push-Ups in 2 min | | | | |\n| 9 | Max Plank Hold (time) | | | | Reason for stopping: ___ |\n| 10 | 3-min Sprawl Test (reps) | | | | |\n| 11 | Ground-to-Standing (reps) | | | | |\n| 12 | Bodyweight (kg/lb) | | | | Fasted, morning |\n| 13 | Waist Circumference (cm/in) | | | | At navel |\n\n---\n\n## Week 5 — Re-Testing Protocol\n\n### Scheduling\n\n- Re-test on the **Saturday of Week 4** (the deload week).\n- By this point you will have had 3–4 days of reduced training volume, so you should be fresh enough for maximal effort.\n- Use the **exact same conditions** as Week 0: same time of day, same equipment, same warm-up, same test order, fasted or fed the same way.\n\n### Procedure\n\n1. Perform the same warm-up protocol as Week 0.\n2. Run all 13 tests in the same order.\n3. Record results in the \"Week 5 Re-Test\" column of the recording template above.\n4. Calculate the \"Change\" column (absolute and percentage).\n\n### 1RM Calculation — Epley Formula\n\nUse the same formula for both Week 0 and Week 5 to ensure apples-to-apples comparison:\n\n```\nEstimated 1RM = Weight × (1 + Reps ÷ 30)\n```\n\n**Examples:**\n- 3RM of 100 kg → 1RM = 100 × (1 + 3/30) = 100 × 1.10 = **110 kg**\n- 3RM of 80 kg → 1RM = 80 × (1 + 3/30) = 80 × 1.10 = **88 kg**\n\nNote: The Epley formula is most accurate for rep ranges of 1–10. Always use a 3RM for consistency.\n\n### Expected Improvements After 4 Weeks\n\nRealistic improvements for a motivated trainee following the program consistently:\n\n| Category | Expected Change | Notes |\n|----------|----------------|-------|\n| Resting Heart Rate | −2 to −5 bpm | Aerobic base adaptations take time; modest change expected |\n| 2 km Row/Run | −10 to −30 sec | Cardiac output and pacing improve |\n| 5-min Assault Bike | +3 to +8 cal | Anaerobic threshold improvement |\n| Squat / Bench / Deadlift 1RM | +3–8% | Neuromuscular adaptations dominate in early weeks |\n| Max Pull-Ups | +1 to +4 reps | Strength-endurance gains |\n| Push-Ups in 2 min | +5 to +10 reps | Muscular endurance adapts quickly |\n| Plank Hold | +15 to +30 sec | Core endurance responds well to consistent training |\n| 3-min Sprawl Test | +5 to +10 reps | Improved anaerobic capacity + movement efficiency |\n| Ground-to-Standing | +3 to +5 reps | Better technique + conditioning |\n| Bodyweight | −1 to −3 kg (if in deficit) or stable | Depends on nutrition targets |\n| Waist Circumference | −1 to −3 cm | Body composition recomposition |\n\n### Interpreting Results\n\n- **Significant improvement (> 10%):** The program is working well for this quality. Maintain or progress.\n- **Modest improvement (3–10%):** Normal for 4 weeks. Keep training consistently.\n- **No change or regression:** Check recovery, nutrition, sleep, and stress. Consider whether this area needs more volume or different stimulus in the next block.\n- **Strength up + endurance down (or vice versa):** May indicate interference effect — review concurrent training balance.\n\n### Next Steps After Re-Test\n\n- Use Week 5 results as the new baseline for the next 4-week block.\n- Adjust training loads: new 3RM estimates should inform working weights.\n- Identify weakest areas and consider prioritizing them in the next mesocycle.\n- If re-test was missed, schedule it for the first rest day of the next block before loading resumes.\n", "sources": "# Sources & References\n\nAll sources used in the development of this MMA training program, organized by category.\n\n---\n\n## 1. Coach Methodologies & Books\n\n1. **Joel Jamieson** — *Ultimate MMA Conditioning*, 2009. Website: [8weeksout.com](https://www.8weeksout.com). Bioforce HRV system and energy-systems approach to MMA conditioning. Interviews and articles available at 8weeksout.com/blog.\n\n2. **Phil Daru** — Strength and conditioning coach (former UFC Performance Institute, American Top Team). Website: [darustrong.com](https://www.darustrong.com). Articles and programs on sport-specific S&C for MMA fighters.\n\n3. **Firas Zahabi** — Head coach, Tristar Gym. *JRE MMA Show #32* (Joe Rogan Experience), discussing training volume vs. intensity philosophy. YouTube and podcast interviews on periodization for fighters.\n\n4. **Pavel Tsatsouline** — *Power to the People!*, 1999. *Simple & Sinister*, 2013 (revised 2019). StrongFirst methodology — low-rep, high-frequency strength training. Website: [strongfirst.com](https://www.strongfirst.com).\n\n5. **Alex Viada** — *The Hybrid Athlete*, 2015. Website: [completehumanperformance.com](https://www.completehumanperformance.com). Concurrent strength and endurance training methodology.\n\n6. **Mike Boyle** — *New Functional Training for Sports*, 2nd ed., Human Kinetics, 2016. Articles on functional training and unilateral work. Website: [bodybyboyle.com](https://www.bodybyboyle.com).\n\n7. **Cal Dietz** — *Triphasic Training: A Systematic Approach to Elite Speed and Explosive Strength Performance*, 2012. Website: [triphasictraining.com](https://www.triphasictraining.com). Eccentric, isometric, and concentric phase training.\n\n8. **Loren Landow** — *Ultimate Conditioning for Martial Arts*, Human Kinetics, 2016. Speed, agility, and conditioning protocols specific to combat sports.\n\n9. **Eric Cressey** — *Simplified Shoulder Solutions* (video series). Website: [ericcressey.com](https://www.ericcressey.com). Shoulder health, mobility, and injury prevention for athletes.\n\n10. **Joe DeFranco** — *Westside for Skinny Bastards III (WS4SB III)*. Website: [defrancostraining.com](https://www.defrancostraining.com). Upper/lower split with max-effort and repetition-effort methods adapted for athletes.\n\n---\n\n## 2. Scientific Papers — Nutrition\n\n1. **Reale R, Slater G, Cox GR, Dunican IC, Burke LM, et al.** — \"ISSN position stand: nutrition for combat sports.\" *Journal of the International Society of Sports Nutrition*, 2025. DOI: [10.1080/15502783.2025.2467909](https://doi.org/10.1080/15502783.2025.2467909)\n\n2. **Kasper AM, Cocking S, Cocber M, Sherwood M, et al.** — \"Carbohydrate and fluid manipulation in combat sports.\" *Nutrients*, 2021. PMC: [PMC8334642](https://www.ncbi.nlm.nih.gov/pmc/articles/PMC8334642/)\n\n---\n\n## 3. Scientific Papers — Training & Periodization\n\n1. **Wilson JM, Marin PJ, Rhea MR, Wilson SMC, Loenneke JP, Anderson JC.** — \"Concurrent training: a meta-analysis examining interference of aerobic and resistance exercises.\" *Journal of Strength and Conditioning Research*, 2012; 26(8): 2293–2307. PMID: [22002517](https://pubmed.ncbi.nlm.nih.gov/22002517/)\n\n2. **Fyfe JJ, Bishop DJ, Stepto NK.** — \"Interference between concurrent resistance and endurance exercise: molecular bases and the role of individual training variables.\" *Sports Medicine*, 2014; 44(6): 743–762. PMID: [24728927](https://pubmed.ncbi.nlm.nih.gov/24728927/)\n\n3. **Sabag A, Najafi A, Michael S, Esgin T, Halaki M, Hackett D.** — \"The compatibility of concurrent high-intensity interval training and resistance training for muscular strength and hypertrophy: a systematic review and meta-analysis.\" *Journal of Sports Sciences*, 2018; 36(21): 2472–2483. PMID: [29809072](https://pubmed.ncbi.nlm.nih.gov/29809072/)\n\n4. **Franchini E, Cormack S, Takito MY, Hasan AAA, Yuri DA, et al.** — \"Energy system contributions in combat sports: a systematic review.\" *International Journal of Environmental Research and Public Health*, 2023. PMC: [PMC9961508](https://www.ncbi.nlm.nih.gov/pmc/articles/PMC9961508/)\n\n5. **Tota Ł, Drwal T, Fischedick A, et al.** — \"Conditioning training and its effects on preparation of MMA athletes.\" *International Journal of Environmental Research and Public Health*, 2019; 16(9): 1495. PMC: [PMC6942465](https://www.ncbi.nlm.nih.gov/pmc/articles/PMC6942465/)\n\n6. **Kostikiadis IN, Methenitis S, Tsoukos A, Veligekas P, Terzis G, Bogdanis GC.** — \"The effect of short-term sport-specific strength and conditioning training on physical fitness of well-trained mixed martial arts athletes.\" *Journal of Sports Science and Medicine*, 2018; 17(3): 348–358. PMC: [PMC6090403](https://www.ncbi.nlm.nih.gov/pmc/articles/PMC6090403/)\n\n7. **Schoenfeld BJ.** — \"Periodization for MMA: bridging the gap between science and practice.\" Academia.edu. URL: [academia.edu](https://www.academia.edu) (search: Schoenfeld periodization MMA)\n\n8. **James LP, Haff GG, Kelly VG, Beckman EM.** — \"Towards a determination of the physiological characteristics distinguishing successful mixed martial arts athletes: a systematic review of combat sport literature.\" *Sports Medicine*, ResearchGate. URL: [researchgate.net](https://www.researchgate.net) (search: James strength conditioning MMA)\n\n---\n\n## 4. Scientific Papers — Recovery\n\n1. **Dupuy O, Douzi W, Theurot D, Bosquet L, Dugué B.** — \"An evidence-based approach for choosing post-exercise recovery techniques to reduce markers of muscle damage, soreness, fatigue, and inflammation: a systematic review with meta-analysis.\" *Frontiers in Physiology*, 2020. PMID: [33092328](https://pubmed.ncbi.nlm.nih.gov/33092328/)\n\n2. **Souza DB, Delvaux F, Schwartz C, Croisier JL.** — \"Recovery methods used by combat sport athletes: a scoping review.\" *Sports Medicine - Open*, 2025. PMID: [40378882](https://pubmed.ncbi.nlm.nih.gov/40378882/)\n\n3. **Carvalho L, Freitas TT, Pereira LA, Nakamura FY, Loturco I.** — \"Fatigue markers and performance recovery in mixed martial arts athletes after competitive bouts.\" *Scientific Reports*, 2025. DOI: [10.1038/s41598-025-09719-z](https://doi.org/10.1038/s41598-025-09719-z)\n\n---\n\n## 5. Scientific Papers — Supplementation\n\n1. **Kreider RB, Kalman DS, Antonio J, Ziegenfuss TN, Wildman R, et al.** — \"International Society of Sports Nutrition position stand: safety and efficacy of creatine supplementation in exercise, sport, and medicine.\" *Journal of the International Society of Sports Nutrition*, 2017; 14: 18. PMC: [PMC5469049](https://www.ncbi.nlm.nih.gov/pmc/articles/PMC5469049/)\n\n2. **Guest NS, VanDusseldorp TA, Nelson MT, Grgic J, Schoenfeld BJ, et al.** — \"International Society of Sports Nutrition position stand: caffeine and exercise performance.\" *Journal of the International Society of Sports Nutrition*, 2021; 18(1): 1. PMC: [PMC7777221](https://www.ncbi.nlm.nih.gov/pmc/articles/PMC7777221/)\n\n3. **Maughan RJ, Burke LM, Dvorak J, Larson-Meyer DE, Peeling P, et al.** — \"IOC consensus statement: dietary supplements and the high-performance athlete.\" *British Journal of Sports Medicine*, 2018; 52(7): 439–455. PMC: [PMC5867441](https://www.ncbi.nlm.nih.gov/pmc/articles/PMC5867441/)\n\n4. **Ashtary-Larky D, Asbaghi O, Moosavian SP, et al.** — \"Creatine supplementation in combat sports: a systematic review.\" *Journal of the International Society of Sports Nutrition*, 2025. PMID: [40755023](https://pubmed.ncbi.nlm.nih.gov/40755023/)\n\n5. **L
