t needs adjustment |\n\n---\n\n### Saturday, May 3 — Light Conditioning + Mental Prep\n\n#### AM: Light Conditioning (30 min)\n\n| Block | Duration | Activity | Notes |\n|-------|----------|----------|-------|\n| Warm-Up | 5 min | Easy jog / skip | |\n| Tempo Intervals | 15 min | 4 x 2 min moderate pace Assault Bike / 2 min easy | HR 140-150, not maximal |\n| Cool-Down | 10 min | Walk + stretching | |\n\n#### PM: Mental Preparation (30 min)\n\n| Activity | Duration | Notes |\n|----------|----------|-------|\n| Fight strategy review | 10 min | Review game plan notes with coach |\n| Visualization | 10 min | Walk through full fight mentally — entrances, Round 1 start, key exchanges |\n| Journaling/Reflection | 10 min | Write down confidence points, what you've trained, what you trust |\n\n---\n\n### Sunday, May 4 — Full Rest\n\nComplete rest day. No training. Light walk permitted. Focus on sleep (8-9 hours), nutrition, and hydration. Begin mentally rehearsing fight week routine.\n\n---\n\n## Week 8 (May 4 - May 10, 2026)\n\n**Theme:** Volume drops significantly. No hard sparring. Sharpness and speed only. Mental preparation ramps up. Begin water loading protocol discussion.\n\n> **IMPORTANT:** No hard or moderate sparring this week. Light technical sparring only — timing, distance management, movement. No damage, no fatigue accumulation.\n\n---\n\n### Monday, May 5 — Strength A (Final Heavy Session) + Light MMA\n\n#### AM: Strength A — Speed-Strength, Reduced (50 min)\n\n**Warm-Up (10 min)**\n\n| Exercise | Duration/Sets |\n|----------|---------------|\n| Jump rope | 3 min |\n| World's greatest stretch | 2 x 4 each |\n| Band pull-aparts | 2 x 12 |\n| Box jump (low) | 2 x 3 |\n\n**Main Work — Reduced Volume, Speed Focus**\n\n| Exercise | Sets x Reps | Load | Rest | Notes |\n|----------|-------------|------|------|-------|\n| Back Squat | 3 x 2 | 72.5% (109 kg) | 2.5 min | Speed emphasis, perfect form |\n| Bench Press | 3 x 2 | 72.5% (83 kg) | 2 min | Fast concentric |\n| Weighted Pull-Up | 2 x 3 | +10 kg | 2 min | Controlled |\n\n**Accessory (minimal)**\n\n| Exercise | Sets x Reps | Load | Rest |\n|----------|-------------|------|------|\n| Goblet Squat | 2 x 6 | 24 kg | 60 sec |\n| Band Face Pull | 2 x 12 | Band | 60 sec |\n\n#### PM: Light MMA — Technical Striking (50 min)\n\n| Block | Duration | Activity | Notes |\n|-------|----------|----------|-------|\n| Shadow Boxing | 15 min | Technical, game plan combos | Light, fluid movement |\n| Pad Work (light) | 15 min | Timing and placement focus | 60% power, 100% precision |\n| Light Technical Sparring | 15 min | Touch sparring — distance and timing | NO power, NO body shots |\n| Cool-Down | 5 min | Stretching + visualization | |\n\n---\n\n### Tuesday, May 6 — Light Grappling + Short Conditioning\n\n#### AM: Grappling — Technical Only (50 min)\n\n| Block | Duration | Activity | Notes |\n|-------|----------|----------|-------|\n| Warm-Up | 10 min | Movement flow | |\n| Technique Reps | 20 min | Game plan sequences only | Rehearsal, not learning |\n| Light Flow Rolling | 15 min | 3 x 3 min, 60% effort | Movement and transitions only |\n| Cool-Down | 5 min | Stretching | |\n\n#### PM: Short Conditioning (20 min)\n\n| Block | Duration | Activity | Notes |\n|-------|----------|----------|-------|\n| Warm-Up | 3 min | Dynamic movement | |\n| Intervals | 12 min | 6 x 6 sec Assault Bike sprint / 54 sec rest | Maximum power output, full recovery |\n| Cool-Down | 5 min | Walk + box breathing | |\n\n---\n\n### Wednesday, May 7 — Strength B (Final Session) + Light Skills\n\n#### AM: Strength B — Speed Work, Minimal Volume (45 min)\n\n**Warm-Up (10 min)**\n\n| Exercise | Duration/Sets |\n|----------|---------------|\n| Rowing machine | 3 min easy |\n| Hip circles | 10 each direction |\n| Arm circles | 10 each direction |\n| Kettlebell deadlift | 2 x 5 (light) |\n\n**Main Work — Last Lifting Session Before Fight**\n\n| Exercise | Sets x Reps | Load | Rest | Notes |\n|----------|-------------|------|------|-------|\n| Trap Bar Deadlift | 3 x 2 | 70% (126 kg) | 2.5 min | Clean, explosive reps |\n| OHP | 3 x 2 | 70% (52.5 kg) | 2 min | Crisp lockout |\n\n**Accessory (minimal)**\n\n| Exercise | Sets x Reps | Load | Rest |\n|----------|-------------|------|------|\n| Lateral Lunge | 2 x 5 each | BW | 60 sec |\n| Band Pull-Apart | 2 x 15 | Band | 60 sec |\n\n> **This is the final strength session before the fight.** No more lifting until after May 16.\n\n#### PM: Light MMA — Game Plan Review (50 min)\n\n| Block | Duration | Activity | Notes |\n|-------|----------|----------|-------|\n| Shadow Boxing | 15 min | Full game plan walkthrough | Visualize opponent in front of you |\n| Light Pad Work | 15 min | Key combos and counter sequences | Precision and timing |\n| Positional Review | 10 min | Walk through key grappling positions | Slow, deliberate, technical |\n| Strategy Session | 10 min | Sit down with coach, review fight plan | Verbal walkthrough, Q&A |\n\n---\n\n### Thursday, May 8 — Active Recovery + Visualization\n\n#### Recovery Day (45 min)\n\n| Block | Duration | Activity | Notes |\n|-------|----------|----------|-------|\n| Light Walk | 15 min | Outdoors if possible | Easy pace, fresh air |\n| Mobility | 15 min | Full-body flow | Hips, t-spine, shoulders |\n| Breathing + Visualization | 15 min | Box breathing + full fight visualization | Round-by-round mental rehearsal |\n\n**Additional Mental Prep:**\n- Review fight strategy notes\n- Confirm fight day logistics (schedule, travel, cornermen, equipment)\n- Pack fight bag (see Phase 4 checklist)\n\n---\n\n### Friday, May 9 — Light Technical Session (Final Training)\n\n#### Final Training Session (40 min)\n\n| Block | Duration | Activity | Notes |\n|-------|----------|----------|-------|\n| Shadow Boxing | 15 min | Light, technical, game plan combos | Feel sharp, stay loose |\n| Light Pad Work | 10 min | Timing rounds, 50% power | Coach keeps it relaxed, positive |\n| Movement Drills | 10 min | Footwork, entries, exits | Rehearse distance management |\n| Cool-Down | 5 min | Stretching + team talk | Confidence building |\n\n> **This is the last training session before fight week begins.** Everything from here is about staying sharp, calm, and ready.\n\n---\n\n### Saturday, May 10 — Rest + Mental Prep\n\nComplete rest. No training.\n\n| Activity | Notes |\n|----------|-------|\n| Light walk | 20-30 min, easy |\n| Visualization | 15 min — round-by-round fight rehearsal |\n| Strategy review | Final review of game plan notes |\n| Logistics confirmation | Confirm fight day schedule, weigh-in time, arrival time |\n| Nutrition | Eat well, stay hydrated, enjoy meals (weight cut begins tomorrow) |\n| Sleep | 8-9 hours minimum |\n\n**Begin discussing water loading protocol with coach.** Reference Phase 4 for the full protocol starting Sunday, May 11.\n\n---\n\n## Phase 3 Summary\n\n| Parameter | Week 7 | Week 8 |\n|-----------|--------|--------|\n| Strength Sessions | 2 (Mon, Wed) | 2 (Mon, Wed) — final sessions |\n| Strength Volume | 4x3 main lifts + 2-3 accessories | 3x2 main lifts + minimal accessories |\n| Strength Load | 70-75% 1RM | 70-72.5% 1RM |\n| Sparring | Moderate (Friday, 5 rounds) | Light technical only (Monday) |\n| Conditioning | Short intervals (2 sessions) | Minimal intervals (1 session) |\n| MMA Skills | Game plan focus, positional sparring | Technical rehearsal, shadow boxing |\n| Mental Prep | Visualization begins, strategy review | Daily visualization, logistics finalized |\n| Estimated Body Weight | ~80-81 kg | ~79-80 kg |\n| Recovery Focus | High | Very high |\n\n---\n\n## Notes for Coach\n\n1. **Monitor fatigue closely.** If the athlete reports unusual soreness, sleep disruption, or mood changes, cut volume further.\n2. **Sparring partners in Week 7** should be briefed — controlled rounds, no ego, game plan focus.\n3. **Week 8 has zero hard sparring.** This is non-negotiable. The fight is won in the weeks before, not the week of.\n4. **Weight should be trending toward 79-80 kg** naturally by end of Week 8. If still above 81 kg, consult with nutritionist before beginning water cut.\n5. **Transition to Phase 4 (Fight Week)** begins Sunday, May 11.\n", "phase-4": "# Phase 4 — Fight Week (Week 9)\n\n> **Phase:** Fight Week | **Duration:** May 11 - May 16, 2026\n> **Weight:** 79 kg → 77 kg (water cut)\n> **Focus:** Light technical work, weight management, mental preparation\n> **Training:** Minimal — shadow boxing, visualization, light movement only\n\n---\n\n## Fight Week Overview\n\nThis is not a training week. This is a **preparation and execution** week. The work is done. Your only jobs now are:\n\n1. Make weight safely\n2. Stay mentally sharp\n3. Arrive at the fight healthy, hydrated, and confident\n\nThe 2 kg water cut from 79 kg to 77 kg is a **mild cut** and should be manageable with proper water loading and sodium manipulation. Follow the protocols below exactly as planned with your coach.\n\n---\n\n## Water Loading Protocol\n\nBegin water loading on Sunday. The goal is to upregulate your body's water excretion mechanisms by drinking large volumes, then sharply reducing intake so the body continues flushing water even when intake drops.\n\n| Day | Date | Water Intake | Notes |\n|-----|------|-------------|-------|\n| Sunday | May 11 | 8 L | Begin water loading. Spread across waking hours. |\n| Monday | May 12 | 8 L | Continue loading. Urine should be clear and frequent. |\n| Tuesday | May 13 | 6 L | Begin tapering water. Body still excreting at high rate. |\n| Wednesday | May 14 | 4 L | Further reduction. Noticeable water loss begins. |\n| Thursday | May 15 | 2 L | Minimal water. Sip throughout day. Stop by evening. |\n| Friday | May 16 | Sips only | Small sips until weigh-in. Full rehydration after. |\n\n**Key Rules:**\n- Spread water intake evenly across the day (do not chug large volumes at once)\n- Distilled water is preferred during loading days (lower mineral content)\n- Track all fluid intake — use a measured bottle\n- Weigh yourself morning and evening to track progress\n- If weight is not trending on schedule, consult coach before adjusting\n\n---\n\n## Sodium Manipulation Protocol\n\nSodium manipulation works alongside water loading. High sodium early causes water retention; dropping sodium causes the body to flush stored water.\n\n| Day | Date | Sodium Intake | Food Notes |\n|-----|------|--------------|------------|\n| Sunday | May 11 | Normal (~3,000-4,000 mg) | Eat normally, add salt to food |\n| Monday | May 12 | Normal (~3,000-4,000 mg) | Continue normal salting |\n| Tuesday | May 13 | Reduced (~1,500-2,000 mg) | Begin reducing — avoid processed food, no added salt |\n| Wednesday | May 14 | Low (~500-1,000 mg) | Plain foods only — rice, chicken, vegetables, no seasoning |\n| Thursday | May 15 | Minimal (~200-500 mg) | Very plain food, small portions, no added salt |\n| Friday | May 16 | None until post-weigh-in | No food until after weigh-in |\n\n**Carbohydrate Notes:**\n- Sunday-Tuesday: Normal carb intake\n- Wednesday: Reduce carbs to ~100g (reduces glycogen-bound water)\n- Thursday: Reduce carbs to ~50g\n- Friday: No food until post-weigh-in\n\n---\n\n## Day-by-Day Plan\n\n---\n\n### Sunday, May 11 — Last Light Training + Water Loading Begins\n\n| Time | Activity | Details |\n|------|----------|---------|\n| 7:00 AM | Wake up, weigh in | Record weight (target: ~79 kg) |\n| 7:30 AM | Water: 1 L | Begin water loading |\n| 8:30 AM | Breakfast | Normal meal — oats, eggs, fruit, salt food normally |\n| 10:00 AM | Water: 1 L | Sip steadily |\n| 10:30 AM | Light Training Session (40 min) | See session plan below |\n| 12:00 PM | Lunch + Water: 1 L | Normal meal — rice, protein, vegetables |\n| 2:00 PM | Water: 1 L | |\n| 3:00 PM | Visualization (15 min) | Round-by-round mental rehearsal |\n| 4:00 PM | Water: 1 L | |\n| 6:00 PM | Dinner + Water: 1 L | Normal meal |\n| 8:00 PM | Water: 1 L | |\n| 9:00 PM | Water: 1 L | Final intake |\n| 9:30 PM | Evening weigh-in | Record weight |\n| 10:00 PM | Sleep | Target 8-9 hours |\n\n**Training Session — Sunday (40 min):**\n\n| Block | Duration | Activity | Notes |\n|-------|----------|----------|-------|\n| Shadow Boxing | 15 min | Light, technical, game plan combos | Last real movement session |\n| Light Pad Work | 10 min | Timing and distance, 40% power | Stay sharp, stay relaxed |\n| Movement Drills | 10 min | Footwork patterns, entries/exits | Rehearsal, not training |\n| Visualization | 5 min | Close eyes, breathe, visualize fight | |\n\n> **This is the last training session of fight camp.**\n\n---\n\n### Monday, May 12 — Shadow Boxing + Water Loading\n\n| Time | Activity | Details |\n|------|----------|---------|\n| 7:00 AM | Wake up, weigh in | Record weight |\n| 7:30 AM | Water: 1 L | |\n| 8:30 AM | Breakfast | Normal meal, salt normally |\n| 10:00 AM | Water: 1 L | |\n| 10:30 AM | Shadow Boxing (20 min) | Light, technical, game plan only. No intensity. |\n| 12:00 PM | Lunch + Water: 1 L | Normal meal |\n| 2:00 PM | Water: 1 L | |\n| 3:00 PM | Mental Prep (20 min) | Visualization + strategy review notes |\n| 4:00 PM | Water: 1 L | |\n| 6:00 PM | Dinner + Water: 1 L | Normal meal |\n| 8:00 PM | Water: 1 L | |\n| 9:00 PM | Water: 1 L | |\n| 9:30 PM | Evening weigh-in | Record weight |\n| 10:00 PM | Sleep | 8-9 hours |\n\n---\n\n### Tuesday, May 13 — Very Light Movement + Water Taper Begins\n\n| Time | Activity | Details |\n|------|----------|---------|\n| 7:00 AM | Wake up, weigh in | Record weight — should be trending down |\n| 7:30 AM | Water: 1 L | |\n| 8:30 AM | Breakfast | Reduce sodium — no added salt, avoid processed food |\n| 10:00 AM | Water: 1 L | |\n| 10:30 AM | Light Walk (20-30 min) | Easy pace, outdoors if possible |\n| 11:00 AM | Very Light Movement (15 min) | Gentle stretching, mobility flow, deep breathing |\n| 12:00 PM | Lunch + Water: 1 L | Plain food — rice, grilled chicken, steamed vegetables |\n| 2:00 PM | Water: 1 L | |\n| 3:00 PM | Visualization (15 min) | |\n| 5:00 PM | Water: 1 L | |\n| 6:00 PM | Dinner + Water: 1 L | Plain food, low sodium |\n| 9:00 PM | Evening weigh-in | Record weight |\n| 10:00 PM | Sleep | 8-9 hours |\n\n---\n\n### Wednesday, May 14 — No Training, Water Reduction, Mental Prep\n\n| Time | Activity | Details |\n|------|----------|---------|\n| 7:00 AM | Wake up, weigh in | Record weight — should be noticeably dropping |\n| 7:30 AM | Water: 0.5 L | Sip slowly |\n| 8:30 AM | Breakfast | Small meal — plain rice, egg whites, ~100g carbs for the day |\n| 10:00 AM | Water: 0.5 L | |\n| 10:30 AM | Light Walk (15 min) | Very easy, keep legs moving |\n| 12:00 PM | Lunch + Water: 0.5 L | Small portion — plain chicken, steamed broccoli |\n| 2:00 PM | Water: 0.5 L | |\n| 2:30 PM | Visualization + Strategy (30 min) | Full mental rehearsal — walk-out, touch gloves, Round 1 opening, key sequences, finish |\n| 4:00 PM | Water: 0.5 L | |\n| 5:00 PM | Water: 0.5 L | |\n| 6:00 PM | Dinner + Water: 0.5 L | Small meal — plain rice, lean protein |\n| 7:00 PM | Water: 0.5 L | Final intake for the day |\n| 8:00 PM | Confirm logistics | Final check — travel, cornermen, cutman, equipment, schedule |\n| 9:00 PM | Evening weigh-in | Record weight |\n| 10:00 PM | Sleep | 8-9 hours — prioritize rest |\n\n---\n\n### Thursday, May 15 — No Training, Final Water Reduction, Weight Check\n\n| Time | Activity | Details |\n|------|----------|---------|\n| 7:00 AM | Wake up, weigh in | **Critical weigh-in** — should be within 1-1.5 kg of 77 kg |\n| 7:30 AM | Water: sips | Small sips only when needed |\n| 8:30 AM | Small breakfast | Minimal — half cup rice, 2 egg whites, no salt |\n| 10:00 AM | Water: sips | |\n| 11:00 AM | Light Walk (10 min) | Very easy, stay off feet otherwise |\n| 12:00 PM | Small lunch | Quarter cup rice, small piece of chicken |\n| 1:00 PM | Water: sips | Minimal |\n| 2:00 PM | Mental prep (20 min) | Visualization, breathing exercises, stay calm |\n| 4:00 PM | Water: final sips | Stop water intake by evening |\n| 5:00 PM | Very small dinner | Plain protein, small portion, no carbs |\n| 7:00 PM | Evening weigh-in | Should be very close to 77 kg or within 0.5 kg |\n| 8:00 PM | No more food or water | Done for the night |\n| 9:00 PM | Pack fight bag | Use checklist below |\n| 9:30 PM | Sleep | Sleep as much as possible — 9+ hours target |\n\n**If over 77.5 kg at evening weigh-in:**\n- A warm bath (20 min) can shed 0.5-1 kg\n- Do NOT use sauna unless supervised by experienced coach\n- Light sweat walk in warm clothing (15-20 min maximum)\n\n**If at or below 77 kg at evening weigh-in:**\n- Have a few small sips of water\n- Relax — you are on weight\n\n---\n\n### Friday, May 16 — FIGHT DAY\n\n| Time | Activity | Details |\n|------|----------|---------|\n| 6:00 AM | Wake up, weigh in (private) | Final private weight check — confirm on or under 77 kg |\n| 6:00-8:00 AM | Sips of water only | Very small sips if needed, do not drink freely |\n| 8:00 AM (est.) | **OFFICIAL WEIGH-IN** | Step on scale, make weight, done |\n| **Immediately after weigh-in** | **BEGIN REHYDRATION** | See rehydration protocol below |\n| 8:15 AM | Electrolyte drink (500 mL) | Oral rehydration solution — sip, do not chug |\n| 8:30 AM | Small snack | Banana + white bread with honey |\n| 9:00 AM | Electrolyte drink (500 mL) | Continue sipping |\n| 9:30 AM | Pre-fight Meal 1 | See meal plan below |\n| 11:00 AM | Electrolyte drink (500 mL) | |\n| 11:30 AM | Pre-fight Meal 2 | See meal plan below |\n| 1:00 PM | Sipping water/electrolytes | Continue rehydrating steadily |\n| 2:00 PM | Light snack | Rice cake with honey, banana |\n| 3:00-4:00 PM | Rest / nap if possible | Stay off feet, relax, conserve energy |\n| 4:00 PM | Final pre-fight snack | Small, easily digestible — see meal plan |\n| 5:00 PM | Begin fight prep | Arrive at venue, settle in, start mental routine |\n| 5:30 PM | Light warm-up | Shadow boxing (5 min), dynamic stretches, pad work (2-3 min with corner) |\n| 6:00 PM (est.) | **FIGHT TIME** | Execute the game plan. Trust your preparation. |\n\n> **Note:** Adjust times based on actual weigh-in and fight schedule. The structure remains the same regardless of specific times.\n\n---\n\n## Rehydration Protocol (Post-Weigh-In)\n\nThe goal is to rehydrate from ~77 kg back toward ~79-80 kg before the fight. You have approximately 8-10 hours to rehydrate.\n\n| Timeframe | Fluid | Food | Target |\n|-----------|-------|------|--------|\n| 0-30 min post-weigh-in | 500 mL ORS (oral rehydration solution) | Banana, white bread + honey | Begin absorption |\n| 30-90 min | 500 mL ORS, sip steadily | Pre-fight Meal 1 (see below) | |\n| 90 min - 3 hours | 500 mL water/electrolyte | Pre-fight Meal 2 (see below) | ~1.5 L consumed |\n| 3-6 hours | Sip water/electrolytes as desired | Light snacks as desired | ~2-2.5 L consumed |\n| 6-8 hours | Small sips only | Final small snack (2 hrs before fight) | ~3 L total consumed |\n\n**Rehydration Rules:**\n- **NEVER chug water.** Sip steadily. Chugging causes bloating, nausea, and poor absorption.\n- Use an oral rehydration solution (ORS) or add electrolyte tabs to water (Pedialyte, LMNT, or similar)\n- Do NOT drink plain water only — you need sodium and potassium to retain fluid\n- Stop drinking large volumes 2 hours before fight time\n- Target total fluid intake: 2.5-3.5 L between weigh-in and fight\n- Monitor urine color — aim for pale yellow, not clear (clear means you're flushing, not retaining)\n\n---\n\n## Pre-Fight Meal Plan\n\nAll food should be **easily digestible, familiar, and not gas-producing.** Do not eat anything new on fight day.\n\n### Pre-Fight Meal 1 (~90 min post-weigh-in)\n\n| Food | Amount | Notes |\n|------|--------|-------|\n| White rice | 1.5 cups cooked | Easy carbs, familiar |\n| Grilled chicken breast | 120g | Lean protein |\n| Banana | 1 medium | Potassium source |\n| Honey | 1 tbsp (on rice or bread) | Quick energy |\n\n### Pre-Fight Meal 2 (~3 hours post-weigh-in)\n\n| Food | Amount | Notes |\n|------|--------|-------|\n| White rice or white pasta | 1 cup cooked | Carb loading |\n| Lean protein (chicken/fish) | 100g | |\n| White bread | 1-2 slices | Easily digestible carbs |\n| Small amount of fruit | Banana or melon | |\n\n### Final Pre-Fight Snack (~2 hours before fight)\n\n| Food | Amount | Notes |\n|------|--------|-------|\n| Rice cake | 2 | Light, easy carbs |\n| Honey | 1 tbsp | Quick energy |\n| Banana | Half | |\n| Sips of electrolyte drink | 100-200 mL | |\n\n**Foods to AVOID on fight day:**\n- Dairy (bloating, gas)\n- High fiber foods (beans, whole grains, raw vegetables)\n- Spicy food\n- Fatty or fried food\n- Anything new or unusual\n- Large volumes of any single food\n- Caffeine in excess (one small coffee is fine if habitual)\n\n---\n\n## Mental Preparation Checklist\n\nComplete these tasks across the final week:\n\n### Strategy (Complete by Wednesday, May 14)\n- [ ] Review game plan with coach — know your A-plan and B-plan\n- [ ] Identify opponent's 3 biggest threats and your counter for each\n- [ ] Identify your 3 best weapons and the setups to land them\n- [ ] Know your Round 1 opening — first 30 seconds are scripted\n- [ ] Know your clinch strategy (initiate vs. disengage)\n- [ ] Know your ground strategy (top game vs. get-up plan)\n\n### Visualization (Daily from Thursday, May 8 onward)\n- [ ] Visualize the walk-out — music, crowd, corner team\n- [ ] Visualize touching gloves, opening stance, first exchange\n- [ ] Visualize landing your best combinations\n- [ ] Visualize recovering from adversity (getting hit, taken down)\n- [ ] Visualize executing your game plan under pressure\n- [ ] Visualize winning — hand raised, celebration\n\n### Emotional Readiness\n- [ ] Accept nervousness as normal and useful (adrenaline is fuel)\n- [ ] Identify your pre-fight routine (music, warm-up, breathing)\n- [ ] Practice box breathing (4-4-4-4) — use it between rounds\n- [ ] Have a \"reset word\" for when things get chaotic in the fight\n- [ ] Talk to your corner about communication — keep it simple (1-2 cues max between rounds)\n\n---\n\n## Fight Day Bag Checklist\n\nPack this bag by **Thursday evening, May 15.**\n\n### Competition Gear\n- [ ] MMA gloves (competition approved)\n- [ ] Mouthguard (primary + backup)\n- [ ] Groin protector / cup\n- [ ] MMA shorts (competition approved, no pockets, no zippers)\n- [ ] Rash guard (if required by promotion)\n- [ ] Hand wraps (2 pairs)\n- [ ] Athletic tape\n\n### Warm-Up / Corner\n- [ ] Training gloves or pads (for corner warm-up)\n- [ ] Vaseline (for cornerman to apply)\n- [ ] Ice bags (ask venue or bring cooler)\n- [ ] Towels (2-3)\n- [ ] Gauze and tape (corner supplies)\n- [ ] Adrenaline / epinephrine swabs (if allowed — ask corner)\n- [ ] Enswell (cold compress for swelling)\n\n### Nutrition / Hydration\n- [ ] Electrolyte solution/powder (Pedialyte, LMNT, or similar)\n- [ ] Water bottles (at least 2, filled)\n- [ ] Bananas (2-3)\n- [ ] White rice (pre-cooked in container)\n- [ ] Honey packets\n- [ ] Rice cakes\n- [ ] White bread\n- [ ] Pre-cooked chicken breast (in container, keep cool)\n\n### Personal\n- [ ] Photo ID (required for weigh-in)\n- [ ] Medical clearance / fight license documentation\n- [ ] Insurance documentation (if required)\n- [ ] Phone + charger\n- [ ] Headphones + fight playlist loaded\n- [ ] Change of clothes (post-fight)\n- [ ] Flip-flops / slides\n- [ ] Toiletries (deodorant, etc.)\n- [ ] Cash (for incidentals)\n\n### Recovery (Post-Fight)\n- [ ] Extra food for after the fight (whatever you want — you earned it)\n- [ ] More electrolytes\n- [ ] Compression gear (optional)\n- [ ] Arnica gel or anti-inflammatory cream\n\n---\n\n## Warning Signs During the Water Cut\n\nMonitor for these warning signs throughout the week. **If any STOP signs appear, halt the cut immediately and seek medical advice.**\n\n### Normal / Expected\n| Symptom | Notes |\n|---------|-------|\n| Mild thirst | Expected from Wednesday onward |\n| Slightly reduced energy | Normal, conserve energy |\n| Darker urine | Expected as water intake drops |\n| Mild irritability | Normal — manage with breathing exercises |\n| Slight headache (brief) | Can occur, usually resolves |\n| Dry mouth | Expected Thursday/Friday |\n\n### Caution — Slow Down\n| Symptom | Action |\n|---------|--------|\n| Persistent headache | Small sips of electrolyte solution, reassess in 30 min |\n| Mild dizziness when standing | Sit down, sip electrolytes, move slowly |\n| Muscle cramps | Electrolytes needed — small sips of ORS |\n| Extreme irritability / mood swings | Rest, breathe, reduce any remaining activity |\n| Poor sleep quality | Accept it, stay in bed, rest even if not sleeping |\n\n### STOP — Seek Help Immediately\n| Symptom | Action |\n|---------|--------|\n| Severe dizziness or fainting | **STOP CUT.** Drink electrolytes. Call coach/doctor. |\n| Rapid or irregular heartbeat | **STOP CUT.** Seek medical attention immediately. |\n| Confusion or disorientation | **STOP CUT.** This is dangerous. Rehydrate now. |\n| Inability to stand | **STOP CUT.** Medical emergency possible. |\n| Chest pain | **STOP CUT. CALL EMERGENCY SERVICES.** |\n| Vomiting (unable to keep fluids down) | **STOP CUT.** Seek medical help — dehydration will worsen. |\n| Seizures or muscle spasms (severe) | **STOP CUT. CALL EMERGENCY SERVICES.** |\n\n> **Remember:** No fight is worth your health. A 2 kg water cut is mild and should be straightforward. If it becomes anything more than mildly uncomfortable, something is wrong. Speak up.\n\n---\n\n## Phase 4 Summary\n\n| Day | Date | Training | Water | Sodium | Key Focus |\n|-----|------|----------|-------|--------|-----------|\n| Sunday | May 11 | Last light session (40 min) | 8 L | Normal | Water loading begins |\n| Monday | May 12 | Shadow boxing (20 min) | 8 L | Normal | Continue loading |\n| Tuesday | May 13 | Light walk + movement (30 min) | 6 L | Reduced | Begin sodium reduction |\n| Wednesday | May 14 | No training | 4 L | Low | Mental prep, reduce carbs |\n| Thursday | May 15 | No training | 2 L | Minimal | Final weight check, pack bag |\n| Friday | May 16 | **FIGHT DAY** | Sips → rehydrate | None → normal | Make weight, rehydrate, fight |\n\n---\n\n## Final Note\n\nThe work is done. Eight weeks of preparation have built your body, sharpened your skills, and hardened your mind. Fight week is about executing the plan, making weight safely, and showing up ready.\n\nTrust your preparation. Trust your corner. Trust yourself.\n\nGo get it.\n", "nutrition-plan": "# Daily Nutrition & Meal Plan — Weight Cut Camp\n\n**Fighter Profile:** 89 kg → 77 kg | **Fight Date:** May 16, 2026 | **Camp:** 9 Weeks (March 16 – May 16)\n\n> This plan provides specific daily meal options for each phase of the weight cut. Every meal slot has 2–3 options for variety. Protein is kept at 2.3 g/kg throughout to preserve muscle during the caloric deficit. Carbohydrates are cycled by training demand. Fat is kept at the minimum needed for hormonal health.\n\n---\n\n## Quick Reference — Phase Calorie & Macro Targets\n\n| Phase | Weeks | Body Weight (approx.) | Training Day | Rest Day | Protein | Notes |\n|-------|-------|-----------------------|-------------|----------|---------|-------|\n| **Phase 1** | 1–3 | 89→85 kg | ~2,600 kcal | ~2,100 kcal | ~200 g (2.3 g/kg × 87) | Base cut, establish deficit |\n| **Phase 2** | 4–6 | 85→81 kg | ~2,400 kcal | ~1,900 kcal | ~191 g (2.3 g/kg × 83) | Deeper deficit |\n| **Phase 3** | 7–8 | 81→79 kg | ~2,400 kcal | ~2,000 kcal | ~184 g (2.3 g/kg × 80) | Protect performance |\n| **Phase 4** | 9 | 79→77 kg | Minimal/strategic | — | Reduced | Water/sodium cut |\n\n---\n\n## General Guidelines\n\n- **Meal prep:** Cook protein in bulk (chicken breast, lean beef, eggs) on Sundays and Wednesdays.\n- **Weigh food raw** (meat, rice, oats) for accuracy.\n- **Hydrate:** Water intake targets are listed per phase. Drink consistently throughout the day — do not chug before meals.\n- **Supplements (all phases):** Multivitamin, 5 g creatine (drop in Phase 4), fish oil 2 g, magnesium 400 mg before bed.\n- **Sodium:** Keep moderate in Phases 1–3 (~2,000–2,500 mg/day). Manipulated in Phase 4.\n- **Caffeine:** Black coffee or green tea only — no sugar, no milk during cut (milk adds unnecessary calories).\n\n---\n\n# PHASE 1 — BASE CUT (Weeks 1–3)\n\n**Dates:** March 16 – April 5, 2026\n**Target:** 89 kg → 85 kg (~1.3 kg/week)\n**Protein:** ~200 g/day | **Hydration:** 4–5 L water/day\n**Electrolytes:** Pinch of salt in morning water. Electrolyte tablet during training.\n\n---\n\n## Phase 1 — TRAINING DAY (~2,600 kcal)\n\n**Macro Target:** 200 P / 250 C / 72 F\n\n### Meal 1 — Breakfast (7:00 AM)\n\n| Option | Food | Protein | Carbs | Fat | kcal |\n|--------|------|---------|-------|-----|------|\n| **A** | 4 whole eggs scrambled + 2 egg whites, 1 slice wholegrain toast, 1/2 avocado (40 g) | 34 g | 18 g | 22 g | 402 |\n| **B** | 80 g oats cooked with water, 1 scoop whey (30 g), 1 banana, 10 g peanut butter | 35 g | 68 g | 10 g | 502 |\n| **C** | 200 g Greek yogurt (0% fat), 40 g granola, 100 g mixed berries, 1 scoop whey (30 g) | 40 g | 42 g | 6 g | 382 |\n\n### Meal 2 — Mid-Morning Snack (10:00 AM)\n\n| Option | Food | Protein | Carbs | Fat | kcal |\n|--------|------|---------|-------|-----|------|\n| **A** | 1 scoop whey in water, 1 apple, 15 g almonds | 28 g | 25 g | 10 g | 302 |\n| **B** | 150 g cottage cheese, 1 rice cake, 10 g honey | 18 g | 22 g | 3 g | 187 |\n| **C** | 2 boiled eggs, 1 banana | 14 g | 27 g | 10 g | 254 |\n\n### Meal 3 — Lunch / Pre-Training Meal (12:30 PM — eat 2–2.5 hrs before training)\n\n| Option | Food | Protein | Carbs | Fat | kcal |\n|--------|------|---------|-------|-----|------|\n| **A** | 200 g chicken breast (grilled), 180 g white rice (cooked), 150 g steamed broccoli, 1 tsp olive oil | 50 g | 58 g | 10 g | 522 |\n| **B** | 200 g lean ground turkey (5% fat), 200 g sweet potato (baked), large mixed salad, 1 tsp olive oil | 46 g | 52 g | 12 g | 500 |\n| **C** | 200 g white fish (tilapia/cod), 180 g white rice (cooked), 150 g green beans, 1 tsp olive oil | 44 g | 58 g | 8 g | 480 |\n\n### Meal 4 — Pre-Training Snack (2:30 PM — 30–45 min before training)\n\n| Option | Food | Protein | Carbs | Fat | kcal |\n|--------|------|---------|-------|-----|------|\n| **A** | 1 rice cake + 1 tbsp honey, 10 g BCAA | 10 g | 25 g | 1 g | 149 |\n| **B** | 1 banana + 1/2 scoop whey in water | 16 g | 27 g | 1 g | 181 |\n| **C** | 2 dates (30 g) + 10 g BCAA | 10 g | 22 g | 0 g | 128 |\n\n### Meal 5 — Post-Training (within 30–45 min of finishing)\n\n| Option | Food | Protein | Carbs | Fat | kcal |\n|--------|------|---------|-------|-----|------|\n| **A** | 1.5 scoops whey protein in water, 1 banana, 30 g oats blended in | 42 g | 48 g | 4 g | 396 |\n| **B** | 250 g chicken breast, 150 g white rice (cooked), squeeze of lemon | 52 g | 45 g | 5 g | 433 |\n| **C** | 2 scoops whey in water, 2 rice cakes with honey | 52 g | 36 g | 3 g | 379 |\n\n### Meal 6 — Dinner (7:30 PM)\n\n| Option | Food | Protein | Carbs | Fat | kcal |\n|--------|------|---------|-------|-----|------|\n| **A** | 200 g salmon fillet, 200 g roasted potatoes, 150 g asparagus | 44 g | 40 g | 18 g | 498 |\n| **B** | 200 g lean beef steak (sirloin), 150 g sweet potato, large side salad with 1 tsp olive oil | 46 g | 38 g | 16 g | 476 |\n| **C** | 200 g chicken thigh (skin removed), 150 g brown rice (cooked), 150 g mixed roasted vegetables | 42 g | 46 g | 12 g | 460 |\n\n### Meal 7 — Pre-Bed (9:30 PM)\n\n| Option | Food | Protein | Carbs | Fat | kcal |\n|--------|------|---------|-------|-----|------|\n| **A** | 250 g cottage cheese (low-fat), 10 g peanut butter | 30 g | 8 g | 8 g | 224 |\n| **B** | 1 scoop casein protein in water, 15 g almonds | 28 g | 4 g | 10 g | 214 |\n| **C** | 200 g Greek yogurt (0% fat), 5 g honey, pinch cinnamon | 20 g | 12 g | 1 g | 137 |\n\n### Phase 1 Training Day — Daily Totals (using Option A line)\n\n| | Protein | Carbs | Fat | kcal |\n|--|---------|---  | 42 g | 22 g | 4 g | 292 |\n\n### Meal 4 — Afternoon Snack (4:00 PM)\n\n| Option | Food | Protein | Carbs | Fat | kcal |\n|--------|------|---------|-------|-----|------|\n| **A** | 1 scoop whey in water, 1 small apple | 28 g | 18 g | 2 g | 202 |\n| **B** | 100 g turkey breast slices, 1 rice cake | 22 g | 12 g | 2 g | 154 |\n\n### Meal 5 — Dinner (7:00 PM)\n\n| Option | Food | Protein | Carbs | Fat | kcal |\n|--------|------|---------|-------|-----|------|\n| **A** | 180 g salmon, 200 g roasted vegetables, 1 tsp olive oil | 40 g | 16 g | 18 g | 386 |\n| **B** | 200 g chicken breast, 100 g sweet potato, green salad | 48 g | 26 g | 5 g | 341 |\n| **C** | 200 g lean beef, large mixed salad, 1 tsp olive oil | 44 g | 8 g | 16 g | 352 |\n\n### Meal 6 — Pre-Bed (9:30 PM)\n\n| Option | Food | Protein | Carbs | Fat | kcal |\n|--------|------|---------|-------|-----|------|\n| **A** | 250 g cottage cheese (low-fat) | 28 g | 8 g | 4 g | 180 |\n| **B** | 1 scoop casein in water | 26 g | 3 g | 2 g | 134 |\n\n### Phase 3 Rest Day — Daily Totals (using Option A line)\n\n| | Protein | Carbs | Fat | kcal |\n|--|---------|-------|-----|------|\n| **Total** | ~188 g | ~138 g | ~67 g | ~2,013 |\n\n---\n\n## Phase 3 — Water Loading Protocol (End of Week 8)\n\nBegin 3 days before fight week (Thursday–Saturday of Week 8):\n\n| Day | Water Intake | Sodium | Notes |\n|-----|-------------|--------|-------|\n| **Thursday** | 7 L | 3,000 mg (add salt to meals) | Begin overloading |\n| **Friday** | 8 L | 3,500 mg | Peak loading |\n| **Saturday** | 8 L | 3,500 mg | Maintain — body adjusts to high output |\n\n> This conditions the body to excrete large volumes of water. When water intake drops dramatically in fight week, the body continues excreting at the elevated rate, resulting in rapid weight loss.\n\n---\n\n# PHASE 4 — FIGHT WEEK (Week 9)\n\n**Dates:** May 11 – May 16, 2026\n**Target:** 79 kg → 77 kg (weigh-in morning of May 16)\n**Strategy:** Water and sodium manipulation + glycogen depletion + minimal food intake\n\n> **WARNING:** This protocol should be supervised. Monitor for signs of excessive dehydration: dizziness, dark urine, cramping, confusion. Have ORS (oral rehydration salts) on standby.\n\n---\n\n## Fight Week Daily Protocol\n\n### Sunday (May 11) — Start Water Cut\n\n| Timing | Food / Fluid | Notes |\n|--------|-------------|-------|\n| **Morning** | 500 ml water with lemon | Sip, don't chug |\n| **Breakfast** | 150 g chicken breast, 100 g cucumber, 50 g spinach | No carbs, no sodium |\n| **Lunch** | 150 g white fish, large green salad (no dressing) | Low residue |\n| **Water throughout day** | 2 L total (drastically reduced from 8 L) | Body still excreting at high rate |\n| **Dinner** | 150 g chicken breast, 100 g asparagus | Asparagus is a natural diuretic |\n| **Pre-bed** | 200 ml water | Small sips |\n| **Sodium** | ZERO added sodium | Remove all salt |\n| **Day total** | ~85 P / ~10 C / ~8 F / ~450 kcal | |\n\n### Monday (May 12) — Deep Water Cut\n\n| Timing | Food / Fluid | Notes |\n|--------|-------------|-------|\n| **Morning** | 250 ml water | Sip |\n| **Breakfast** | 3 egg whites, 50 g cucumber | Minimal |\n| **Lunch** | 150 g chicken breast, 100 g celery | Low residue, diuretic foods |\n| **Water throughout day** | 1 L total | Continue reducing |\n| **Dinner** | 100 g chicken breast, 100 g asparagus | Light |\n| **Sodium** | ZERO | Continue |\n| **Day total** | ~70 P / ~6 C / ~5 F / ~350 kcal | |\n\n### Tuesday (May 13) — Depletion\n\n| Timing | Food / Fluid | Notes |\n|--------|-------------|-------|\n| **Morning** | Small sips of water only | No more than 500 ml total for day |\n| **Breakfast** | 3 egg whites | Dry food only |\n| **Lunch** | 100 g chicken breast, small handful spinach | |\n| **Dinner** | 100 g chicken breast | Keep stomach empty |\n| **Water** | Max 500 ml total, sipped | |\n| **Day total** | ~55 P / ~3 C / ~4 F / ~268 kcal | |\n\n### Wednesday (May 14) — Final Dry-Out\n\n| Timing | Food / Fluid | Notes |\n|--------|-------------|-------|\n| **All day** | Minimal sips of water (250 ml max) | If weight is on target, stop cutting |\n| **Food** | 100 g chicken breast if hungry, otherwise nothing | Keep gut empty |\n| **Sweat session** | Light sauna or hot bath if needed (15 min max sessions, rest between) | Only if weight is not on target |\n| **Monitor** | Check weight every 3–4 hours | |\n| **Day total** | ~25 P / ~0 C / ~2 F / ~118 kcal (or less) | |\n\n### Thursday (May 15) — Pre-Weigh-In\n\n| Timing | Food / Fluid | Notes |\n|--------|-------------|-------|\n| **Morning** | Zero water, zero food | Weigh yourself: if at 77 kg or under, proceed to weigh-in |\n| **If over 77 kg** | Hot bath protocol: 10 min in, 10 min rest, repeat until weight is made | Maximum 3 sessions. Stop if dizzy. |\n| **Weigh-in** | Make weight | |\n\n---\n\n## Post Weigh-In REHYDRATION & REFEED (Critical)\n\n> Start rehydration IMMEDIATELY after weigh-in. This is as important as making weight.\n\n### Immediate (0–30 min post weigh-in)\n\n| Item | Amount | Notes |\n|------|--------|-------|\n| ORS solution (Pedialyte or equivalent) | 500 ml | Sip slowly over 30 min |\n| Banana | 1 medium | Potassium replenishment |\n| White bread with honey | 2 slices | Fast-digesting carbs |\n\n### 1–2 hours post weigh-in\n\n| Item | Amount | Notes |\n|------|--------|-------|\n| White rice (cooked) | 200 g | Easy carbs |\n| Chicken breast | 150 g | Lean protein |\n| Electrolyte drink | 500 ml | Continue sipping |\n| Water | 500 ml | Sip, don't chug |\n\n### 3–4 hours post weigh-in\n\n| Item | Amount | Notes |\n|------|--------|-------|\n| Pasta or rice | 250 g cooked | Glycogen reload |\n| Chicken or fish | 200 g | Protein |\n| Banana | 1 | More potassium |\n| Water with electrolytes | 500 ml | |\n\n### Evening before fight (5–8 hours post weigh-in)\n\n| Item | Amount | Notes |\n|------|--------|-------|\n| Familiar meal: rice + chicken + vegetables | Normal portion | Nothing exotic, nothing spicy |\n| Fruit juice (orange or apple) | 250 ml | Sugar + hydration |\n| Water | Sip freely | Stop chugging — you want to feel comfortable, not bloated |\n\n### Fight Day Morning (May 16)\n\n| Item | Amount | Notes |\n|------|--------|-------|\n| Oatmeal (50 g) with honey and banana | 1 bowl | 3–4 hours before fight |\n| Toast with peanut butter | 2 slices | Sustained energy |\n| Water | 500 ml | Sip with breakfast |\n| Coffee (optional) | 1 cup black | If part of normal routine |\n| **30 min pre-fight** | 1 banana + small sip of sports drink | Quick energy |\n\n---\n\n## Supplement Protocol by Phase\n\n| Supplement | Phase 1–3 | Phase 4 (Fight Week) | Post Weigh-In |\n|-----------|-----------|---------------------|---------------|\n| Creatine monohydrate | 5 g/day | STOP (holds water) | Resume after fight |\n| Fish oil | 2 g/day | Stop | Resume |\n| Multivitamin | Daily | Daily | Daily |\n| Magnesium | 400 mg before bed | 400 mg | 400 mg |\n| Caffeine | As needed (black coffee) | Reduce to avoid dehydration | As needed |\n| Electrolyte tabs | During training | Do not use (sodium) | Yes — immediately |\n| BCAA | 10 g during training | Optional | Not needed |\n\n---\n\n## Grocery List Template (Weekly — Phases 1–3)\n\n**Proteins:** 2.5 kg chicken breast, 500 g lean ground beef/turkey, 500 g white fish, 2 dozen eggs, 1 kg cottage cheese, 500 g Greek yogurt (0%), 2 tubs whey protein (monthly), 1 tub casein (monthly)\n\n**Carbs:** 1 kg white rice, 1 kg sweet potatoes, 1 kg oats, wholegrain bread (1 loaf), rice cakes (1 pack), bananas (bunch of 6–8), mixed berries (300 g), apples (4–5)\n\n**Fats:** 1 small bottle olive oil, 1 jar peanut butter (natural), 1 pack almonds (200 g), 2–3 avocados\n\n**Vegetables:** Broccoli (500 g), spinach (300 g), asparagus (300 g), green beans (300 g), mixed salad bags, cucumbers, tomatoes, zucchini, peppers\n\n**Other:** Honey, lemon, cinnamon, salt, pepper, garlic, electrolyte tablets, coffee\n\n---\n\n*This plan is designed for the specific weight cut from 89 kg to 77 kg over 9 weeks. All caloric targets are approximations — adjust based on daily weigh-ins and weekly progress. If weight loss exceeds 1.5 kg/week consistently, slightly increase carbs. If weight stalls for more than 5 days, reduce carbs by 25 g on rest days.*\n", "exercise-detail": "# Exercise Guide\n\nClick any exercise name in the training plan to jump here. Each exercise includes setup, execution, common mistakes, and how it transfers to MMA fighting.\n\n---\n\n## Back Squat\n\n**Category:** Compound Barbell Lifts  \n**Primary Muscles:** Quads, glutes, adductors, erectors  \n**Equipment:** Barbell, squat rack\n\n### Setup\n\nBar on upper traps (high bar) or rear delts (low bar). Feet shoulder-width, toes slightly out.\n\n### Execution\n\nBrace hard, spread the floor, hips and knees break together. Drive up through mid-foot.\n\n### Common Mistakes\n\n- Knees caving\n- forward lean / chest drop\n- cutting depth short\n- losing brace at the bottom.\n\n### MMA Application\n\nBuilds the lower-body force production that powers level changes, takedown defense (standing up under pressure), and knockout-level punching from the legs up.\n\n---\n\n## Front Squat\n\n**Category:** Compound Barbell Lifts  \n**Primary Muscles:** Quads, glutes, upper back, core  \n**Equipment:** Barbell, squat rack\n\n### Setup\n\nBar in front rack (clean grip or cross-arm). Elbows high, chest tall. Feet shoulder-width.\n\n### Execution\n\nElbows up the whole way. Sit straight down between your hips. Drive up keeping torso vertical.\n\n### Common Mistakes\n\n- Elbows dropping (bar rolls forward)\n- wrist inflexibility forcing cross-arm when clean grip is better\n- shallow depth.\n\n### MMA Application\n\nUpright torso pattern mimics posture needed in the clinch and during double-leg finishes. Heavy anterior core demand transfers to resisting being bent over in grappling.\n\n---\n\n## Deadlift\n\n**Category:** Compound Barbell Lifts  \n**Primary Muscles:** Posterior chain (glutes, hamstrings, erectors), lats, grip  \n**Equipment:** Barbell\n\n### Setup\n\nFeet hip-width under bar, shins near bar. Hinge at hips, grip just outside knees. Neutral spine, lats engaged.\n\n### Execution\n\nPush the floor away, lock lats, bar drags up the legs. Stand tall — squeeze glutes at lockout.\n\n### Common Mistakes\n\n- Rounding the lower back\n- jerking the bar off the floor\n- hips shooting up first\n- hyperextending at lockout.\n\n### MMA Application\n\nTotal-body posterior chain strength for explosive hip extension — the engine behind throws, slams, sprawls, and heavy rear-hand strikes. Grip endurance under load.\n\n---\n\n## Romanian Deadlift (RDL)\n\n**Category:** Compound Barbell Lifts  \n**Primary Muscles:** Hamstrings, glutes, erectors  \n**Equipment:** Barbell\n\n### Setup\n\nStand with bar at hip height (from rack or after a deadlift). Feet hip-width, slight knee bend, shoulders packed.\n\n### Execution\n\nPush hips straight back like closing a car door. Bar stays on the thighs/shins. Feel a deep hamstring stretch, then drive hips forward.\n\n### Common Mistakes\n\n- Bending the knees too much (turns into a squat)\n- rounding the back\n- not hinging far enough.\n\n### MMA Application\n\nEccentric hamstring strength reduces knee-injury risk from sprawling and kicking. Hip-hinge patterning powers underhooks-to-trips and mat returns.\n\n---\n\n## Bench Press\n\n**Category:** Compound Barbell Lifts  \n**Primary Muscles:** Pecs, anterior delts, triceps  \n**Equipment:** Barbell, bench, rack\n\n### Setup\n\nLie on bench, eyes under bar. Retract and depress shoulder blades. Grip slightly wider than shoulder-width. Feet flat on floor.\n\n### Execution\n\nUnrack, control bar to lower chest, drive through feet, press bar in a slight arc back over shoulders.\n\n### Common Mistakes\n\n- Flaring elbows to 90 degrees (shoulder stress)\n- bouncing bar off chest\n- losing scapular retraction\n- lifting hips.\n\n### MMA Application\n\nHorizontal pressing power for frames, stiff-arms, and bench pressing an opponent off you from bottom position. Tricep strength aids in posting and creating distance.\n\n---\n\n## Overhead Press\n\n**Category:** Compound Barbell Lifts  \n**Primary Muscles:** Deltoids, triceps, upper traps, core  \n**Equipment:** Barbell, squat rack\n\n### Setup\n\nBar in front rack at collarbone. Feet hip-width, glutes and abs braced.\n\n### Execution\n\nPress bar straight up — move your head out of the way, then back through once bar passes. Lock out directly over mid-foot.\n\n### Common Mistakes\n\n- Excessive back arch (turns into incline press)\n- pressing the bar forward instead of straight up\n- not bracing core.\n\n### MMA Application\n\nOverhead strength for posting on the cage, hand fighting from collar ties, and resisting being driven down in the clinch. Core stability under overhead load mirrors scramble demands.\n\n---\n\n## Barbell Row\n\n**Category:** Compound Barbell Lifts  \n**Primary Muscles:** Lats, rhomboids, rear delts, biceps, erectors  \n**Equipment:** Barbell\n\n### Setup\n\nHinge to roughly 45-degree torso. Overhand or underhand grip just outside knees. Slight knee bend.\n\n### Execution\n\nPull bar to lower sternum, squeeze shoulder blades at top, control the negative. Torso stays still.\n\n### Common Mistakes\n\n- Excessive torso movement (rowing with momentum)\n- pulling to the belly\n- standing too upright.\n\n### MMA Application\n\nPulling strength for clinch work, underhook control, arm drags, and guillotine finishes. Maintains upper-back posture to resist being broken down.\n\n---\n\n## Hang Clean\n\n**Category:** Compound Barbell Lifts  \n**Primary Muscles:** Quads, glutes, traps, upper back, forearms  \n**Equipment:** Barbell\n\n### Setup\n\nStart standing with bar at hip height, overhand grip. Hinge slightly to bring bar to just above the knee (hang position).\n\n### Execution\n\nExplode hips, shrug, pull elbows high, catch in front rack with a quarter squat. Stand up.\n\n### Common Mistakes\n\n- Arm-pulling instead of hip-driving\n- not getting elbows through fast enough\n- catching on wrists instead of delts.\n\n### MMA Application\n\nTriple extension (ankle-knee-hip) is the same motor pattern as shooting a double-leg or throwing an uppercut. Teaches rate of force development — how fast you can express strength.\n\n---\n\n## Push Press\n\n**Category:** Compound Barbell Lifts  \n**Primary Muscles:** Deltoids, triceps, quads, glutes, core  \n**Equipment:** Barbell, squat rack\n\n### Setup\n\nBar in front rack at collarbone. Feet hip-width.\n\n### Execution\n\nQuick dip (4-6 inches) keeping torso vertical, then drive aggressively through legs and press bar overhead in one motion. Lock out.\n\n### Common Mistakes\n\n- Dipping forward (weight on toes)\n- pressing before legs finish driving\n- slow dip killing the stretch-shortening cycle.\n\n### MMA Application\n\nTeaches legs-to-arms force transfer — the same kinetic chain used in every punch and in off-balancing an opponent from the clinch. Develops overhead lockout power for cage work.\n\n---\n\n## RFESS (Bulgarian Split Squat)\n\n**Category:** Single-Leg / Unilateral  \n**Primary Muscles:** Quads, glutes, adductors  \n**Equipment:** Dumbbells or barbell, bench\n\n### Setup\n\nRear foot laces-down on bench behind you. Front foot far enough forward that knee stays over ankle at bottom.\n\n### Execution\n\nLower straight down until rear knee nearly touches floor. Drive through front heel. Keep torso upright.\n\n### Common Mistakes\n\n- Front foot too close to bench (knee shoots forward)\n- torso leaning excessively\n- rear foot bearing too much load.\n\n### MMA Application\n\nSingle-leg strength and balance for kicking, sprawling off one leg, and maintaining base when an opponent grabs a leg. Reduces bilateral strength imbalances that cause injury.\n\n---\n\n## Single-Leg RDL\n\n**Category:** Single-Leg / Unilateral  \n**Primary Muscles:** Hamstrings, glutes, core (anti-rotation)  \n**Equipment:** Dumbbell or kettlebell\n\n### Setup\n\nStand on one leg, soft knee. Hold weight in opposite hand.\n\n### Execution\n\nHinge at the hip, free leg extends behind you as a counterbalance. Back stays flat. Squeeze glute to stand.\n\n### Common Mistakes\n\n- Rounding the back\n- opening the hip (rotating)\n- not hinging deep enough\n- rushing the movement.\n\n### MMA Application\n\nPosterior chain strength on one leg directly transfers to kicking (standing leg stability), single-leg takedown defense, and landing after throwing knees. Anti-rotation demand mirrors the rotational chaos of grappling.\n\n---\n\n## Walking Lunges\n\n**Category:** Single-Leg / Unilateral  \n**Primary Muscles:** Quads, glutes, hip flexors  \n**Equipment:** Dumbbells, barbell, or bodyweight\n\n### Setup\n\nStand tall, weights at sides or on back.\n\n### Execution\n\nTake a long step forward, lower rear knee toward floor, drive through front heel to step into the next rep. Stay tall.\n\n### Common Mistakes\n\n- Short steps (knee over toe)\n- torso collapsing forward\n- pushing off rear foot instead of pulling with front leg.\n\n### MMA Application\n\nDynamic single-leg strength with a locomotion component — transfers to shooting entries, level changes, and maintaining balance while moving forward in the pocket.\n\n---\n\n## Step-Ups\n\n**Category:** Single-Leg / Unilateral  \n**Primary Muscles:** Quads, glutes  \n**Equipment:** Box (16-20 inches), dumbbells\n\n### Setup\n\nPlace one foot fully on the box. Hold dumbbells at sides.\n\n### Execution\n\nDrive through the top foot to stand on the box. Do NOT push off the bottom foot. Control the descent.\n\n### Common Mistakes\n\n- Using the bottom foot to push off (cheating)\n- box too low to challenge the movement\n- leaning forward.\n\n### MMA Application\n\nConcentric single-leg power for driving off the mat (standing up from bottom), penetration steps for takedowns, and explosive level changes.\n\n---\n\n## Pistol Squat Progression\n\n**Category:** Single-Leg / Unilateral  \n**Primary Muscles:** Quads, glutes, hip flexors, ankles  \n**Equipment:** Bodyweight (band or box for assistance)\n\n### Setup\n\nStand on one leg. Extend the other leg in front of you. Arms forward for counterbalance.\n\n### Execution\n\nSit back and down on one leg, keeping heel flat. Go as low as mobility allows, then drive up. Use a band or box to assisted versions as needed.\n\n### Common Mistakes\n\n- Knee collapsing inward\n- heel lifting\n- rounding the lower back at the bottom\n- using momentum to stand.\n\n### MMA Application\n\nUltimate expression of single-leg strength and mobility. Translates to recovering balance after being swept or pushed, deep single-leg positions in scrambles, and demonstrating the mobility fighters need at the hips and ankles.\n\n---\n\n## Box Jumps\n\n**Category:** Power / Explosive  \n**Primary Muscles:** Quads, glutes, calves  \n**Equipment:** Plyo box (20-30 inches)\n\n### Setup\n\nStand facing box, feet shoulder-width, arms back.\n\n### Execution\n\nSwing arms, extend hips-knees-ankles, land softly on box with full foot contact. Stand tall, step down.\n\n### Common Mistakes\n\n- Rebounding off the floor (use a reset between reps)\n- landing in a deep squat on the box (means the box is too high)\n- jumping down instead of stepping.\n\n### MMA Application\n\nTrains rate of force development and reactive power for explosive takedown entries, sprawls, and closing distance to land strikes.\n\n---\n\n## Broad Jumps\n\n**Category:** Power / Explosive  \n**Primary Muscles:** Glutes, quads, hamstrings, calves  \n**Equipment:** Open floor space\n\n### Setup\n\nFeet shoulder-width, arms loaded behind you.\n\n### Execution\n\nSwing arms forward, drive hips and jump forward for max distance. Absorb landing with soft knees, stick it.\n\n### Common Mistakes\n\n- Not using the arms\n- landing stiff-legged\n- not committing to full hip extension.\n\n### MMA Application\n\nHorizontal explosive power — the exact vector used in shooting for takedowns and closing distance for punches. Teaches aggressive hip extension into a target.\n\n---\n\n## Med Ball Overhead Slam\n\n**Category:** Power / Explosive  \n**Primary Muscles:** Lats, core, shoulders, triceps  \n**Equipment:** Slam ball (15-30 lbs)\n\n### Setup\n\nStand tall, ball overhead with arms extended.\n\n### Execution\n\nBrace core, slam ball into the ground as hard as possible using your whole body. Hinge and follow through. Catch the bounce or pick it up.\n\n### Common Mistakes\n\n- Using only arms (not engaging core/hips)\n- not following through\n- too light a ball.\n\n### MMA Application\n\nFull-body power expression similar to throwing hammerfists from top position or slamming an opponent in a takedown finish. Teaches aggressive downward force production.\n\n---\n\n## Med Ball Rotational Slam\n\n**Category:** Power / Explosive  \n**Primary Muscles:** Obliques, core, hips, shoulders  \n**Equipment:** Slam ball (10-20 lbs), wall\n\n### Setup\n\nStand perpendicular to wall, ball at hip opposite the wall. Feet slightly wider than shoulder-width.\n\n### Execution\n\nRotate hips first, then trunk, then arms — slam ball into wall. Catch and reset. Load from the back hip.\n\n### Common Mistakes\n\n- Arm-throwing instead of hip-rotating\n- feet staying flat (rotate on the ball of the back foot)\n- standing too close to the wall.\n\n### MMA Application\n\nDirectly trains the rotational power sequence of hooks, overhands, and round kicks. Hip-first rotation is the key to fight-ending power in strikes.\n\n---\n\n## Med Ball Chest Pass\n\n**Category:** Power / Explosive  \n**Primary Muscles:** Pecs, triceps, anterior delts, core  \n**Equipment:** Med ball (10-20 lbs), wall or partner\n\n### Setup\n\nStand facing wall, ball at chest, elbows in.\n\n### Execution\n\nDrive ball off chest explosively into wall, extending arms fully. Catch and immediately redirect. Stay on the balls of your feet.\n\n### Common Mistakes\n\n- Stepping forward (losing base)\n- lobbing instead of driving\n- slow catch-and-redirect.\n\n### MMA Application\n\nTrains horizontal pushing speed for frames, posting, and bench-pressing an opponent off you. Reactive catch-and-redirect mirrors the speed demands of hand fighting.\n\n---\n\n## KB Swings\n\n**Category:** Power / Explosive  \n**Primary Muscles:** Glutes, hamstrings, core, lats  \n**Equipment:** Kettlebell\n\n### Setup\n\nFeet slightly wider than shoulder-width. KB on floor a foot in front of you. Hike the bell back between legs.\n\n### Execution\n\nSnap hips forward — the arms just go along for the ride. Bell should float to chest/eye height (Russian) or overhead (American). Squeeze glutes hard at the top.\n\n### Common Mistakes\n\n- Squatting the swing (should be a hinge)\n- using the arms to lift\n- hyperextending the back at the top.\n\n### MMA Application\n\nPowerful hip snap transfers directly to striking power, sprawl speed, and bridging/shrimping in grappling. High-rep swings also build posterior chain endurance for later rounds.\n\n---\n\n## KB Snatch\n\n**Category:** Power / Explosive  \n**Primary Muscles:** Glutes, hamstrings, shoulders, traps, core  \n**Equipment:** Kettlebell\n\n### Setup\n\nSimilar to swing start. One hand on the bell.\n\n### Execution\n\nHike back, snap hips, as the bell rises guide it around your wrist and punch through to lockout overhead. Control the descent by redirecting the bell back between your legs.\n\n### Common Mistakes\n\n- Bell banging the wrist (path is wrong)\n- pressing out the top instead of punching through\n- not using the hips.\n\n### MMA Application\n\nCombines explosive hip extension with overhead stability and grip — mirrors the full-body power expression of throwing an overhand right or finishing a high-crotch lift. Excellent conditioning effect.\n\n---\n\n## Hang Clean\n\n**Category:** Power / Explosive  \n**Primary Muscles:** —  \n**Equipment:** —\n\n### Setup\n\n—\n\n### Execution\n\n—\n\n### Common Mistakes\n\n- —\n\n### MMA Application\n\nSee Compound Barbell Lifts section above.\n\n---\n\n## Push Press\n\n**Category:** Power / Explosive  \n**Primary Muscles:** —  \n**Equipment:** —\n\n### Setup\n\n—\n\n### Execution\n\n—\n\n### Common Mistakes\n\n- —\n\n### MMA Application\n\nSee Compound Barbell Lifts section above.\n\n---\n\n## Battle Rope Slams\n\n**Category:** Power / Explosive  \n**Primary Muscles:** Shoulders, core, lats, grip  \n**Equipment:** Battle ropes (1.5-2 inch, 40-50 ft)\n\n### Setup\n\nStand in athletic stance, slight hinge, one rope end in each hand. Anchor point ahead.\n\n### Execution\n\nAlternate arms (waves) or slam both together. Generate force from the hips, not just the shoulders. Keep a rhythm — don't let the ropes go slack.\n\n### Common Mistakes\n\n- Standing too upright (no hip involvement)\n- death-gripping (forearms burn out instantly)\n- standing too close to the anchor (no tension).\n\n### MMA Application\n\nUpper-body power-endurance under fatigue — simulates the repeated explosive arm actions of punching in later rounds. Bilateral slams train ground-and-pound power; alternating waves build the shoulder endurance needed for long clinch exchanges.\n\n---\n\n## Weighted Pull-Ups\n\n**Category:** Upper Body Accessories  \n**Primary Muscles:** Lats, biceps, rear delts, grip  \n**Equipment:** Pull-up bar, dip belt or dumbbell between feet\n\n### Setup\n\nHang from bar, overhand grip slightly wider than shoulders. Add load via belt or dumbbell.\n\n### Execution\n\nInitiate with lats (think elbows to hips), pull chin over bar, control the descent to full extension.\n\n### Common Mistakes\n\n- Kipping / swinging\n- not reaching full extension at the bottom\n- chin not clearing the bar.\n\n### MMA Application\n\nPulling strength is essential for clinch control, guillotines, front headlocks, arm drags, and dragging an opponent down from the cage. Grip under load builds lasting clinch endurance.\n\n---\n\n## Dumbbell Row\n\n**Category:** Upper Body Accessories  \n**Primary Muscles:** Lats, rhomboids, rear delts, biceps  \n**Equipment:** Dumbbell, bench\n\n### Setup\n\nOne knee and hand on bench, opposite foot on floor. Flat back, dumbbell hanging at arm's length.\n\n### Execution\n\nPull dumbbell to hip, squeezing shoulder blade back and down. Lower under control.\n\n### Common Mistakes\n\n- Rotating the torso to heave the weight\n- rowing to the shoulder instead of the hip\n- rushing reps.\n\n### MMA Application\n\nUnilateral pulling strength for single-collar ties, underhook battles, and controlling an arm in guard. Addresses left-right imbalances common in fighters with a dominant stance.\n\n---\n\n## Landmine Press\n\n**Category:** Upper Body Accessories  \n**Primary Muscles:** Chest, shoulders, triceps, core (anti-rotation)  \n**Equipment:** Barbell, landmine attachment (or corner)\n\n### Setup\n\nStand in split stance, hold the end of the barbell at shoulder height with one hand.\n\n### Execution\n\nPress the bar up and forward at a slight angle. Squeeze the core to prevent rotation. Control the return.\n\n### Common Mistakes\n\n- Flaring the elbow\n- rotating the torso\n- not bracing the core\n- pressing straight up instead of along the bar's arc.\n\n### MMA Application\n\nThe angled pressing path closely mimics a jab and cross. Single-arm execution demands anti-rotation — the same core stability needed when posting off an opponent or framing from bottom.\n\n---\n\n## Incline DB Press\n\n**Category:** Upper Body Accessories  \n**Primary Muscles:** Upper pecs, anterior delts, triceps  \n**Equipment:** Dumbbells, adjustable bench (30-45 degrees)\n\n### Setup\n\nSit on incline bench, dumbbells at shoulders, feet flat on floor, back pressed into pad.\n\n### Execution\n\nPress dumbbells up and slightly inward, without clanking them at the top. Lower to shoulders with control.\n\n### Common Mistakes\n\n- Over-arching the back (reducing the incline angle)\n- flaring elbows\n- bouncing at the bottom.\n\n### MMA Application\n\nUpper chest and shoulder pressing strength for frames from bottom, posting on the cage, and pushing an opponent away. Dumbbell path allows shoulder-friendly range of motion for fighters with existing shoulder wear.\n\n---\n\n## Push-Up — Standard\n\n**Category:** Upper Body Accessories  \n**Primary Muscles:** Pecs, triceps, anterior delts, core  \n**Equipment:** Bodyweight\n\n### Setup\n\nHands shoulder-width, body in a straight line from head to heels.\n\n### Execution\n\nLower chest to the floor, elbows at 45 degrees, press back up. Lock out at top.\n\n### Common Mistakes\n\n- Sagging hips\n- flaring elbows to 90 degrees\n- partial range of motion.\n\n### MMA Application\n\nFoundational pressing endurance for maintaining frames, escaping bottom positions, and posting. High-rep capacity means pressing strength that lasts into championship rounds.\n\n---\n\n## Push-Up — Diamond\n\n**Category:** Upper Body Accessories  \n**Primary Muscles:** Triceps, inner chest, core  \n**Equipment:** Bodyweight\n\n### Setup\n\nHands together under chest forming a diamond shape with index fingers and thumbs.\n\n### Execution\n\nKeep elbows tight to the body as you lower. Touch chest to hands, press up.\n\n### Common Mistakes\n\n- Flaring elbows\n- letting hips sag\n- reducing range of motion.\n\n### MMA Application\n\nTricep-dominant pressing for short-range pushing — creating frames inside the guard and posting off an opponent's head in scrambles.\n\n---\n\n## Push-Up — Archer\n\n**Category:** Upper Body Accessories  \n**Primary Muscles:** Chest, triceps, core  \n**Equipment:** Bodyweight\n\n### Setup\n\nWide hand placement. One arm bends while the other stays extended to the side.\n\n### Execution\n\nLower toward one hand, keeping the other arm straight as a guide. Push back up. Alternate sides.\n\n### Common Mistakes\n\n- Rotating the torso\n- bending the straight arm\n- shortening the range.\n\n### MMA Application\n\nAsymmetric pressing strength for single-arm frames and posts — common in scrambles where only one arm is available for base. Bridges the gap toward one-arm push-up strength.\n\n---\n\n## Push-Up — Clap\n\n**Category:** Upper Body Accessories  \n**Primary Muscles:** Pecs, triceps, fast-twitch fibers  \n**Equipment:** Bodyweight\n\n### Setup\n\nStandard push-up position.\n\n### Execution\n\nExplode off the floor, clap, land with soft elbows, immediately descend into the next rep.\n\n### Common Mistakes\n\n- Landing with locked elbows (injury risk)\n- losing body alignment\n- not achieving full flight.\n\n### MMA Application\n\nUpper-body plyometric power for explosive frames and the initial burst of a punch. Trains the stretch-shortening cycle in horizontal pressing — speed kills in striking.\n\n---\n\n## Dips\n\n**Category:** Upper Body Accessories  \n**Primary Muscles:** Triceps, lower chest, anterior delts  \n**Equipment:** Parallel bars or rings\n\n### Setup\n\nGrip the bars, arms locked, slight forward lean.\n\n### Execution\n\nLower until upper arms are parallel to floor, press back up to full lockout. Keep elbows tracking over wrists.\n\n### Common Mistakes\n\n- Going too deep (shoulder stress)\n- excessive forward lean\n- partial range of motion.\n\n### MMA Application\n\nPressing strength from a depressed shoulder position — directly transfers to posting on the mat, pressing up from bottom, and generating pushing force when pinned against the cage.\n\n---\n\n## Face Pulls\n\n**Category:** Upper Body Accessories  \n**Primary Muscles:** Rear delts, external rotators, mid traps  \n**Equipment:** Cable machine or band\n\n### Setup\n\nRope attachment at face height. Step back to create tension.\n\n### Execution\n\nPull rope to face, splitting hands apart and externally rotating at the end. Squeeze for a beat. Slow return.\n\n### Common Mistakes\n\n- Pulling too low (becomes a row)\n- using body momentum\n- not externally rotating at the end position.\n\n### MMA Application\n\nShoulder health and postural balance. Fighters do enormous volumes of pressing and internal rotation (punching, pushing); face pulls counterbalance this to keep shoulders healthy and maintain posture against collar ties.\n\n---\n\n## Band Pull-Aparts\n\n**Category:** Upper Body Accessories  \n**Primary Muscles:** Rear delts, rhomboids, mid traps  \n**Equipment:** Resistance band\n\n### Setup\n\nHold band at arm's length in front of chest, hands shoulder-width, palms down.\n\n### Execution\n\nPull band apart by squeezing shoulder blades together until band touches chest. Slow return.\n\n### Common Mistakes\n\n- Shrugging shoulders\n- bending elbows\n- using momentum.\n\n### MMA Application\n\nScapular health and posture maintenance. Keeps the upper back strong and shoulders balanced against the high volume of punching and reaching in training. Ideal daily-dose prehab movement.\n\n---\n\n## Pallof Press\n\n**Category:** Core / Anti-Movement  \n**Primary Muscles:** Obliques, transverse abdominis, hip stabilizers  \n**Equipment:** Cable machine or band\n\n### Setup\n\nStand perpendicular to cable, handle at chest. Feet shoulder-width, slight athletic bend.\n\n### Execution\n\nPress handle straight out from chest and hold. Resist the rotation. Return to chest. Keep hips square.\n\n### Common Mistakes\n\n- Letting the cable rotate you\n- locking knees\n- pressing at an angle instead of straight out.\n\n### MMA Application\n\nAnti-rotation core stability — the ability to resist being twisted or turned in the clinch, during scrambles, and when absorbing body shots. Directly trains the core's primary fight function: resisting unwanted movement.\n\n---\n\n## Ab Wheel Rollout\n\n**Category:** Core / Anti-Movement  \n**Primary Muscles:** Rectus abdominis, obliques, lats, hip flexors  \n**Equipment:** Ab wheel\n\n### Setup\n\nKneel on a pad, grip the wheel, arms extended.\n\n### Execution\n\nRoll forward slowly, keeping hips extended (don't sit back). Go as far as you can control, then pull back using your abs.\n\n### Common Mistakes\n\n- Sagging the lower back\n- bending at the hips instead of extending\n- going farther than you can control.\n\n### MMA Application\n\nAnti-extension core strength for maintaining posture in the clinch, resisting back bends in wrestling, and stabilizing the spine during strikes. The eccentric challenge mirrors being pulled forward by an opponent.\n\n---\n\n## Hanging Leg Raises\n\n**Category:** Core / Anti-Movement  \n**Primary Muscles:** Hip flexors, lower abs, grip  \n**Equipment:** Pull-up bar\n\n### Setup\n\nHang from bar with full grip, shoulders packed.\n\n### Execution\n\nRaise legs to parallel (or toes to bar for advanced). Control the descent — no swinging. Initiate from the core, not momentum.\n\n### Common Mistakes\n\n- Swinging\n- using momentum\n- only lifting knees (if full leg raises are the target)\n- losing grip.\n\n### MMA Application\n\nHip flexor strength for guard retention, high kicks, and knee strikes. Grip endurance while performing a core movement mirrors the simultaneous demands of hanging on an opponent while working your core in the clinch.\n\n---\n\n## Copenhagen Plank\n\n**Category:** Core / Anti-Movement  \n**Primary Muscles:** Adductors, obliques, core  \n**Equipment:** Bench\n\n### Setup\n\nSide-lying, top foot on bench, bottom foot hanging. Support on forearm.\n\n### Execution\n\nLift hips and bottom leg so the body forms a straight line. Hold. The top leg's adductor does the heavy lifting.\n\n### Common Mistakes\n\n- Rotating hips forward or back\n- sagging at the hip\n- holding breath.\n\n### MMA Application\n\nAdductor and lateral core strength critical for closed guard, triangle setups, body lock squeezes, and injury prevention during lateral movement and kicking. Groin injuries are common in MMA — this is direct armor.\n\n---\n\n## Dead Bug\n\n**Category:** Core / Anti-Movement  \n**Primary Muscles:** Deep core stabilizers, hip flexors  \n**Equipment:** Bodyweight (mat)\n\n### Setup\n\nLie on back, arms reaching to ceiling, knees bent at 90 degrees over hips. Press low back into floor.\n\n### Execution\n\nExtend opposite arm and leg toward the floor while keeping the low back glued to the mat. Return and switch sides.\n\n### Common Mistakes\n\n- Low back arching off the floor\n- moving too fast\n- not exhaling fully on extension.\n\n### MMA Application\n\nTeaches the core to stabilize the spine while the limbs move independently — exactly what happens when striking, grappling, and transitioning between positions. Foundation for all other core work.\n\n---\n\n## Bird Dog\n\n**Category:** Core / Anti-Movement  \n**Primary Muscles:** Erectors, glutes, deep core stabilizers  \n**Equipment:** Bodyweight (mat)\n\n### Setup\n\nHands-and-knees position, wrists under shoulders, knees under hips.\n\n### Execution\n\nExtend opposite arm and leg until parallel with the floor. Pause. Return. Keep hips level — no rotation.\n\n### Common Mistakes\n\n- Rotating the hips\n- arching the back\n- rushing through reps\n- lifting the limbs too high.\n\n### MMA Application\n\nAnti-rotation and anti-extension in a quadruped position — directly mimics the demands of maintaining base in turtle position and during scrambles on the mat. Excellent warm-up and prehab movement.\n\n---\n\n## Farmer's Carry\n\n**Category:** Core / Anti-Movement  \n**Primary Muscles:** Traps, grip, core (anti-lateral flexion), whole body  \n**Equipment:** Heavy dumbbells or farmer's walk handles\n\n### Setup\n\nStand tall with heavy weights at your sides. Shoulders packed, chest up.\n\n### Execution\n\nWalk with short, controlled steps. Stay tall — don't lean. Squeeze the handles hard. Breathe.\n\n### Common Mistakes\n\n- Leaning to one side\n- taking long strides\n- shrugging the shoulders\n- letting posture break down.\n\n### MMA Application\n\nTotal-body stability, grip endurance, and postural strength under load. Directly transfers to clinch endurance, maintaining posture while gripping an opponent, and the general full-body tension required in grappling.\n\n---\n\n## Suitcase Carry\n\n**Category:** Core / Anti-Movement  \n**Primary Muscles:** Obliques, core (anti-lateral flexion), grip  \n**Equipment:** Heavy dumbbell or kettlebell\n\n### Setup\n\nHold a heavy weight in one hand at your side. Stand tall, don't lean toward or away from the load.\n\n### Execution\n\nWalk with controlled steps, resisting the urge to lean toward the loaded side. Stay perfectly upright.\n\n### Common Mistakes\n\n- Leaning toward the weight\n- compensating with the opposite hip\n- shrugging the loaded shoulder.\n\n### MMA Application\n\nUnilateral anti-lateral flexion — the ability to resist being pulled to one side. Transfers to single-collar tie defense, resisting an arm drag, and maintaining posture when an opponent pulls one side of your body.\n\n---\n\n## Turkish Get-Up\n\n**Category:** Core / Anti-Movement  \n**Primary Muscles:** Shoulders, core, hips, stabilizers (full body)  \n**Equipment:** Kettlebell\n\n### Setup\n\nLie on back, press kettlebell up with one arm. Opposite arm and leg angled out for base.\n\n### Execution\n\nRoll to elbow, post on hand, bridge hips, sweep leg under to kneeling, stand up. Reverse the sequence. Eyes on the bell at all times.\n\n### Common Mistakes\n\n- Rushing the movement\n- losing visual contact with the bell\n- skipping the hip bridge\n- pressing the bell instead of keeping the arm vertical.\n\n### MMA Application\n\nThe most MMA-specific core exercise. Every phase mimics a grappling transition: bridging from bottom, posting up to an elbow, creating a frame, building base, and standing from the mat — all while stabilizing load overhead (simulating controlling an opponent's limb).\n\n---\n\n## Band External Rotations\n\n**Category:** Prehab / Mobility  \n**Primary Muscles:** Infraspinatus, teres minor (rotator cuff)  \n**Equipment:** Light resistance band\n\n### Setup\n\nStand with elbow pinned to side at 90 degrees, band attached at elbow height.\n\n### Execution\n\nRotate forearm outward against band, keeping elbow glued to your ribs. Slow and controlled both directions.\n\n### Common Mistakes\n\n- Elbow drifting away from the body\n- using too heavy a band\n- moving too fast.\n\n### MMA Application\n\nRotator cuff health is non-negotiable for fighters. The shoulder absorbs enormous stress from punching, posting, and being manipulated in grappling. This keeps the external rotators strong enough to balance the dominant internal rotators.\n\n---\n\n## Face Pulls\n\n**Category:** Prehab / Mobility  \n**Primary Muscles:** —  \n**Equipment:** —\n\n### Setup\n\n—\n\n### Execution\n\n—\n\n### Common Mistakes\n\n- —\n\n### MMA Application\n\nSee Upper Body Accessories section above.\n\n---\n\n## 90/90 Hip Switches\n\n**Category:** Prehab / Mobility  \n**Primary Muscles:** Hip internal and external rotators, glutes  \n**Equipment:** Bodyweight (mat)\n\n### Setup\n\nSit on floor with one leg in front (shin perpendicular, externally rotated) and one behind (shin perpendicular, internally rotated). Both knees at 90 degrees.\n\n### Execution\n\nRotate both legs to the opposite position in one smooth motion. Keep chest tall. Pause at each end position.\n\n### Common Mistakes\n\n- Leaning back\n- using hands excessively\n- rushing through transitions\n- knees not staying at 90 degrees.\n\n### MMA Application\n\nHip mobility in both internal and external rotation — essential for guard play, sweeps, hip escapes, and kicking. Fighters with restricted hips compensate with their spine, leading to back injuries.\n\n---\n\n## Hip CARs (Controlled Articular Rotations)\n\n**Category:** Prehab / Mobility  \n**Primary Muscles:** Hip joint (all surrounding musculature)  \n**Equipment:** Bodyweight\n\n### Setup\n\nOn hands and knees (or standing). Lift one knee to the side.\n\n### Execution\n\nMake the largest possible circle with your knee — up, out, back, and around — using only the hip joint. Move slowly and with maximum tension. Reverse direction.\n\n### Common Mistakes\n\n- Using momentum\n- moving the spine to fake hip range\n- rushing\n- not engaging max tension.\n\n### MMA Application\n\nMaintaining full usable hip range of motion. Fighters lose hip mobility over time from tight guards, repeated impact, and heavy squatting. CARs preserve the range needed for high kicks, rubber guard, and deep half guard.\n\n---\n\n## Thoracic Spine Rotations (Open Books)\n\n**Category:** Prehab / Mobility  \n**Primary Muscles:** Thoracic spine rotators, obliques  \n**Equipment:** Bodyweight (mat)\n\n### Setup\n\nLie on your side, knees stacked and bent at 90 degrees. Arms extended in front, palms together.\n\n### Execution\n\nRotate the top arm up and over, opening the chest to the ceiling. Follow the hand with your eyes. Let the thoracic spine rotate — keep knees glued together.\n\n### Common Mistakes\n\n- Rotating from the lumbar spine (knees separate)\n- not fully opening\n- rushing.\n\n### MMA Application\n\nThoracic rotation is the engine of punching power and shot defense. Fighters who lose T-spine rotation compensate with the lower back and shoulders, leading to chronic pain. This preserves the rotation needed for hooks, elbows, and looking over the shoulder to defend takedowns.\n\n---\n\n## Goblet Squat\n\n**Category:** Prehab / Mobility  \n**Primary Muscles:** Quads, glutes, core  \n**Equipment:** Kettlebell or dumbbell\n\n### Setup\n\nHold weight at chest height, elbows inside knees. Feet shoulder-width, toes slightly out.\n\n### Execution\n\nSit between your hips, elbows push knees out at the bottom. Chest tall, drive through whole foot.\n\n### Common Mistakes\n\n- Leaning forward\n- heels rising\n- not hitting depth.\n\n### MMA Application\n\nWarm-up and movement prep for squatting patterns. Teaches an upright squat position that transfers to posture in the clinch and double-leg finishes.\n\n---\n\n## Glute Bridge\n\n**Category:** Prehab / Mobility  \n**Primary Muscles:** Glutes, hamstrings  \n**Equipment:** Bodyweight or barbell (mat)\n\n### Setup\n\nLie on back, knees bent, feet flat on floor hip-width apart. Arms at sides.\n\n### Execution\n\nDrive hips to ceiling by squeezing glutes. Hold for a beat at the top. Lower with control.\n\n### Common Mistakes\n\n- Hyperextending the lower back\n- driving through toes instead of heels\n- not achieving full hip extension.\n\n### MMA Application\n\nHip extension activation for warm-ups. Directly mimics the bridge escape from bottom mount — one of the most fundamental grappling movements.\n\n---\n\n## Band Dislocates\n\n**Category:** Prehab / Mobility  \n**Primary Muscles:** Shoulders, rotator cuff, pecs  \n**Equipment:** Resistance band or PVC pipe\n\n### Setup\n\nHold band/pipe with wide overhand grip in front of hips.\n\n### Execution\n\nKeeping arms straight, raise the band overhead and behind your back in a slow arc. Reverse. Widen grip if needed.\n\n### Common Mistakes\n\n- Bending elbows\n- going too fast\n- using too narrow a grip before mobility allows.\n\n### MMA Application\n\nFull shoulder range-of-motion warm-up. Prepares the shoulder capsule for pressing and overhead work while counteracting the tight anterior shoulders fighters develop from punching and clinch work.\n\n---\n\n## Scap Push-Ups\n\n**Category:** Prehab / Mobility  \n**Primary Muscles:** Serratus anterior, lower traps  \n**Equipment:** Bodyweight\n\n### Setup\n\nStandard push-up position with arms locked.\n\n### Execution\n\nWithout bending the elbows, protract shoulder blades (push floor away) then retract (let chest sink). Small controlled movement.\n\n### Common Mistakes\n\n- Bending the elbows (turning it into a push-up)\n- moving too fast\n- excessive range.\n\n### MMA Application\n\nSerratus anterior activation for scapular stability. Protects the shoulder during pressing and posting — especially important for fighters who spend time on their hands in grappling.\n\n---\n\n## PVC Overhead Squat\n\n**Category:** Prehab / Mobility  \n**Primary Muscles:** Shoulders, thoracic spine, hips, ankles  \n**Equipment:** PVC pipe or broomstick\n\n### Setup\n\nHold PVC overhead with wide snatch-width grip. Feet shoulder-width.\n\n### Execution\n\nSquat to full depth while keeping the PVC directly overhead and arms locked. Chest tall, heels down.\n\n### Common Mistakes\n\n- Bar drifting forward\n- heels lifting\n- losing thoracic extension\n- excessive forward lean.\n\n### MMA Application\n\nFull-body mobility diagnostic and warm-up. Reveals restrictions in ankles, hips, thoracic spine, and shoulders simultaneously. Builds the overhead stability needed for sprawling with arms extended.\n\n---\n\n## KB Halo\n\n**Category:** Prehab / Mobility  \n**Primary Muscles:** Shoulders, core, upper back  \n**Equipment:** Kettlebell\n\n### Setup\n\nStand tall, hold KB by the horns upside-down at chest height.\n\n### Execution\n\nCircle the KB around your head in a smooth arc, keeping it close. Alternate directions each rep. Brace the core.\n\n### Common Mistakes\n\n- Leaning the torso\n- moving the head instead of the KB\n- going too fast.\n\n### MMA Application\n\nShoulder warm-up with rotational demand. Prepares shoulders for pressing while building the circular shoulder mobility needed for clinch pummeling and underhook battles.\n\n---\n\n## Banded Lateral Walk\n\n**Category:** Prehab / Mobility  \n**Primary Muscles:** Glute medius, hip abductors  \n**Equipment:** Mini band\n\n### Setup\n\nPlace band around ankles or just above knees. Quarter-squat athletic stance.\n\n### Execution\n\nTake controlled lateral steps, maintaining tension on the band. Don't let knees cave. Stay low.\n\n### Common Mistakes\n\n- Standing too upright\n- letting the trailing leg snap back\n- knees collapsing inward.\n\n### MMA Application\n\nGlute medius activation for lateral movement stability. Strengthens the hip abductors that stabilize the stance during kicks, lateral cage cutting, and single-leg takedown defense.\n\n--
